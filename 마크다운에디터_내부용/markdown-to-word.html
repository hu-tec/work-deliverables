<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown to Word 변환기</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #667085;
      --line: #d9e0eb;
      --accent: #1f6feb;
      --accent-dark: #1758bc;
      --good: #0f8f5f;
      --warn: #b54708;
      font-family: "Noto Sans KR", "Malgun Gothic", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 24px;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(16, 24, 40, 0.08);
    }

    .control-panel {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subcopy {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .drop-zone {
      min-height: 210px;
      border: 2px dashed #9eb3d4;
      border-radius: 8px;
      background: #f8fbff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 22px;
      text-align: center;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .drop-zone.dragover {
      border-color: var(--accent);
      background: #edf5ff;
    }

    .file-icon {
      width: 56px;
      height: 56px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #e9f2ff;
      color: var(--accent);
      font-size: 28px;
      font-weight: 800;
    }

    .drop-title {
      font-size: 17px;
      font-weight: 800;
    }

    .drop-help {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button,
    .file-button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 42px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #ffffff;
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
      flex: 1 1 180px;
    }

    button.primary:hover {
      background: var(--accent-dark);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .meta {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfe;
      font-size: 13px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .meta-row span:first-child {
      color: var(--muted);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .status.good {
      color: var(--good);
      font-weight: 700;
    }

    .status.warn {
      color: var(--warn);
      font-weight: 700;
    }

    .progress-wrap {
      display: none;
      gap: 8px;
    }

    .progress-wrap.visible {
      display: grid;
    }

    .progress-track {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e4e9f2;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      transition: width 0.18s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .file-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
    }

    .file-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #ffffff;
      display: grid;
      gap: 4px;
      text-align: left;
      cursor: pointer;
    }

    .file-item.active {
      border-color: var(--accent);
      background: #f0f6ff;
    }

    .file-item strong {
      overflow-wrap: anywhere;
      font-size: 13px;
    }

    .file-item span {
      color: var(--muted);
      font-size: 12px;
    }

    .preview-panel {
      min-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      min-height: 58px;
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .preview-header strong {
      font-size: 15px;
    }

    .preview-header span {
      color: var(--muted);
      font-size: 12px;
    }

    .preview {
      flex: 1;
      overflow: auto;
      padding: 22px 28px 36px;
      background: #ffffff;
      line-height: 1.7;
      font-size: 15px;
    }

    .preview h1,
    .preview h2,
    .preview h3 {
      margin: 22px 0 10px;
      line-height: 1.35;
    }

    .preview h1:first-child,
    .preview h2:first-child,
    .preview h3:first-child {
      margin-top: 0;
    }

    .preview pre {
      overflow: auto;
      background: #101828;
      color: #f9fafb;
      border-radius: 8px;
      padding: 14px;
      line-height: 1.55;
    }

    .preview code {
      font-family: Consolas, Menlo, monospace;
      background: #eef2f7;
      padding: 2px 5px;
      border-radius: 4px;
    }

    .preview pre code {
      background: transparent;
      padding: 0;
    }

    .preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 14px;
    }

    .preview th,
    .preview td {
      border: 1px solid var(--line);
      padding: 8px 10px;
      vertical-align: top;
      text-align: left;
    }

    .preview blockquote {
      margin: 14px 0;
      padding: 2px 0 2px 14px;
      border-left: 4px solid #9eb3d4;
      color: #475467;
    }

    .preview .tree-list {
      margin: 10px 0 18px;
      padding: 0;
      list-style: none;
    }

    .preview .tree-list li {
      margin: 4px 0;
      padding-left: 18px;
      line-height: 1.55;
    }

    .preview .tree-list li::before {
      content: "•";
      display: inline-block;
      width: 14px;
      color: #667085;
      margin-left: -14px;
    }

    .empty-preview {
      height: 100%;
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
      }

      main {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel control-panel">
      <div>
        <h1>Markdown to Word 변환기</h1>
        <p class="subcopy">마크다운 파일을 올리면 Word에서 열 수 있는 .docx 파일로 변환합니다.</p>
      </div>

      <label class="drop-zone" id="dropZone" for="fileInput">
        <span class="file-icon">M</span>
        <span class="drop-title">.md 파일을 드래그하거나 클릭</span>
        <span class="drop-help">지원: .md, .markdown, .txt<br>파일은 브라우저 안에서만 처리됩니다.</span>
      </label>
      <input id="fileInput" type="file" accept=".md,.markdown,.txt,text/markdown,text/plain" multiple>

      <div class="button-row">
        <label class="file-button" for="fileInput">파일 선택</label>
        <button class="primary" id="convertButton" disabled>Word/ZIP 다운로드</button>
      </div>

      <div class="progress-wrap" id="progressWrap" aria-live="polite">
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-text">
          <span id="progressLabel">대기 중</span>
          <strong id="progressValue">0%</strong>
        </div>
      </div>

      <div class="file-list" id="fileList" aria-label="선택한 파일 목록"></div>

      <div class="meta" aria-live="polite">
        <div class="meta-row">
          <span>선택 파일</span>
          <strong id="fileName">선택 안 됨</strong>
        </div>
        <div class="meta-row">
          <span>전체 크기</span>
          <strong id="fileSize">-</strong>
        </div>
        <div class="meta-row">
          <span>전체 문자 수</span>
          <strong id="charCount">-</strong>
        </div>
      </div>

      <div class="status" id="status">변환할 마크다운 파일을 선택하세요.</div>
    </section>

    <section class="panel preview-panel">
      <div class="preview-header">
        <div>
          <strong>미리보기</strong>
          <span id="previewHint">변환 전에 문서 내용을 확인할 수 있습니다.</span>
        </div>
      </div>
      <article class="preview" id="preview">
        <div class="empty-preview">아직 불러온 문서가 없습니다.</div>
      </article>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const dropZone = document.getElementById("dropZone");
    const convertButton = document.getElementById("convertButton");
    const fileNameEl = document.getElementById("fileName");
    const fileSizeEl = document.getElementById("fileSize");
    const charCountEl = document.getElementById("charCount");
    const statusEl = document.getElementById("status");
    const previewEl = document.getElementById("preview");
    const previewHint = document.getElementById("previewHint");
    const progressWrap = document.getElementById("progressWrap");
    const progressBar = document.getElementById("progressBar");
    const progressLabel = document.getElementById("progressLabel");
    const progressValue = document.getElementById("progressValue");
    const fileListEl = document.getElementById("fileList");

    let loadedFiles = [];
    let activeFileIndex = 0;

    fileInput.addEventListener("change", () => {
      if (fileInput.files && fileInput.files.length) {
        readMarkdownFiles(fileInput.files);
      }
    });

    ["dragenter", "dragover"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropZone.classList.remove("dragover");
      });
    });

    dropZone.addEventListener("drop", (event) => {
      const files = event.dataTransfer.files;
      if (files && files.length) {
        readMarkdownFiles(files);
      }
    });

    convertButton.addEventListener("click", async () => {
      if (!loadedFiles.length) return;
      await convertLoadedFiles();
    });

    async function readMarkdownFiles(fileList) {
      const files = Array.from(fileList);
      const validFiles = files.filter((file) => /\.(md|markdown|txt)$/i.test(file.name));

      if (!validFiles.length) {
        setStatus("마크다운 또는 텍스트 파일만 선택할 수 있습니다.", "warn");
        resetLoadedFiles();
        return;
      }

      hideProgress();
      convertButton.disabled = true;
      setStatus(validFiles.length + "개 파일을 읽는 중입니다.", "");

      try {
        loadedFiles = await Promise.all(validFiles.map(readMarkdownFile));
        activeFileIndex = 0;
        renderFileList();
        renderActivePreview();
        updateMeta();
        convertButton.disabled = !loadedFiles.some((item) => item.blocks.length);

        const ignoredCount = files.length - validFiles.length;
        const ignoredText = ignoredCount ? " 지원하지 않는 " + ignoredCount + "개 파일은 제외했습니다." : "";
        const downloadType = loadedFiles.length > 1 ? "ZIP 다운로드" : "Word 파일 다운로드";
        setStatus("파일을 불러왔습니다. " + downloadType + "를 누르세요." + ignoredText, "good");
      } catch (error) {
        resetLoadedFiles();
        setStatus("파일을 읽지 못했습니다.", "warn");
      }
    }

    function readMarkdownFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const markdown = String(reader.result || "");
          const blocks = parseMarkdown(markdown);
          resolve({
            name: file.name,
            size: file.size,
            markdown,
            blocks,
            outputName: getOutputDocxName(file.name)
          });
        };
        reader.onerror = reject;
        reader.readAsText(file, "utf-8");
      });
    }

    function resetLoadedFiles() {
      loadedFiles = [];
      activeFileIndex = 0;
      fileListEl.innerHTML = "";
      fileNameEl.textContent = "선택 안 됨";
      fileSizeEl.textContent = "-";
      charCountEl.textContent = "-";
      previewHint.textContent = "변환 전에 문서 내용을 확인할 수 있습니다.";
      previewEl.innerHTML = '<div class="empty-preview">아직 불러온 문서가 없습니다.</div>';
      convertButton.disabled = true;
      hideProgress();
    }

    function renderFileList() {
      fileListEl.innerHTML = loadedFiles.map((item, index) => {
        const activeClass = index === activeFileIndex ? " active" : "";
        const blockText = item.blocks.length + "개 블록";
        return `<button type="button" class="file-item${activeClass}" data-index="${index}"><strong>${escapeHtml(item.name)}</strong><span>${formatSize(item.size)} · ${blockText}</span></button>`;
      }).join("");

      fileListEl.querySelectorAll(".file-item").forEach((button) => {
        button.addEventListener("click", () => {
          activeFileIndex = Number(button.dataset.index);
          renderFileList();
          renderActivePreview();
        });
      });
    }

    function renderActivePreview() {
      const activeFile = loadedFiles[activeFileIndex];
      if (!activeFile) {
        previewEl.innerHTML = '<div class="empty-preview">아직 불러온 문서가 없습니다.</div>';
        previewHint.textContent = "변환 전에 문서 내용을 확인할 수 있습니다.";
        return;
      }
      previewEl.innerHTML = renderPreview(activeFile.blocks);
      previewHint.textContent = activeFile.name + " · " + activeFile.blocks.length + "개 블록";
    }

    function updateMeta() {
      const totalSize = loadedFiles.reduce((sum, item) => sum + item.size, 0);
      const totalChars = loadedFiles.reduce((sum, item) => sum + item.markdown.length, 0);
      fileNameEl.textContent = loadedFiles.length ? loadedFiles.length.toLocaleString("ko-KR") + "개" : "선택 안 됨";
      fileSizeEl.textContent = loadedFiles.length ? formatSize(totalSize) : "-";
      charCountEl.textContent = loadedFiles.length ? totalChars.toLocaleString("ko-KR") : "-";
    }

    async function convertLoadedFiles() {
      convertButton.disabled = true;
      showProgress("변환 준비 중", 0);

      try {
        if (loadedFiles.length === 1) {
          const item = loadedFiles[0];
          showProgress(item.name + " 변환 중", 45);
          await nextFrame();
          const docxBlob = createDocx(item.blocks, getTitleFromFile(item.name));
          showProgress("다운로드 준비 중", 100);
          downloadBlob(docxBlob, item.outputName);
          setStatus("Word 파일 다운로드를 시작했습니다.", "good");
          return;
        }

        const zipFiles = {};
        for (let i = 0; i < loadedFiles.length; i += 1) {
          const item = loadedFiles[i];
          const percent = Math.round((i / loadedFiles.length) * 90);
          showProgress((i + 1) + "/" + loadedFiles.length + " 변환 중: " + item.name, percent);
          await nextFrame();
          zipFiles[uniqueZipName(zipFiles, item.outputName)] = createDocxBytes(item.blocks, getTitleFromFile(item.name));
        }

        showProgress("ZIP 파일 생성 중", 95);
        await nextFrame();
        const zipBlob = new Blob([zipStore(zipFiles)], { type: "application/zip" });
        showProgress("다운로드 준비 완료", 100);
        downloadBlob(zipBlob, "converted-word-files.zip");
        setStatus("ZIP 다운로드를 시작했습니다.", "good");
      } catch (error) {
        setStatus("변환 중 오류가 발생했습니다.", "warn");
      } finally {
        convertButton.disabled = !loadedFiles.some((item) => item.blocks.length);
      }
    }

    function showProgress(label, percent) {
      progressWrap.classList.add("visible");
      progressBar.style.width = Math.max(0, Math.min(100, percent)) + "%";
      progressLabel.textContent = label;
      progressValue.textContent = Math.round(percent) + "%";
    }

    function hideProgress() {
      progressWrap.classList.remove("visible");
      progressBar.style.width = "0%";
      progressLabel.textContent = "대기 중";
      progressValue.textContent = "0%";
    }

    function nextFrame() {
      return new Promise((resolve) => requestAnimationFrame(() => resolve()));
    }

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function parseMarkdown(markdown) {
      const lines = markdown.replace(/\r\n?/g, "\n").split("\n");
      const blocks = [];
      let paragraph = [];
      let code = null;

      function flushParagraph() {
        if (paragraph.length) {
          blocks.push({ type: "paragraph", text: paragraph.join(" ") });
          paragraph = [];
        }
      }

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const trimmed = line.trim();

        if (/^```/.test(trimmed)) {
          if (code) {
            blocks.push(codeBlockToBlock(code));
            code = null;
          } else {
            flushParagraph();
            code = { lang: trimmed.slice(3).trim(), lines: [] };
          }
          continue;
        }

        if (code) {
          code.lines.push(line);
          continue;
        }

        if (!trimmed) {
          flushParagraph();
          continue;
        }

        if (/^<table[\s>]/i.test(trimmed)) {
          flushParagraph();
          const htmlLines = [line];
          while (!/<\/table>/i.test(lines[i]) && i + 1 < lines.length) {
            i += 1;
            htmlLines.push(lines[i]);
          }
          const table = parseHtmlTable(htmlLines.join("\n"));
          if (table) {
            blocks.push(table);
          } else {
            blocks.push({ type: "paragraph", text: htmlToText(htmlLines.join(" ")) });
          }
          continue;
        }

        const heading = trimmed.match(/^(#{1,6})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          blocks.push({ type: "heading", level: heading[1].length, text: heading[2].trim() });
          continue;
        }

        if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
          flushParagraph();
          blocks.push({ type: "hr" });
          continue;
        }

        if (isTableStart(lines, i)) {
          flushParagraph();
          const headers = splitTableRow(lines[i]);
          const aligns = splitTableRow(lines[i + 1]).map((cell) => {
            if (/^:-+:$/.test(cell)) return "center";
            if (/^-+:$/.test(cell)) return "right";
            return "left";
          });
          const rows = [];
          i += 2;
          while (i < lines.length && /^\s*\|?.+\|.+/.test(lines[i])) {
            rows.push(splitTableRow(lines[i]));
            i += 1;
          }
          i -= 1;
          blocks.push({ type: "table", headers, aligns, rows });
          continue;
        }

        const ordered = trimmed.match(/^(\d+)\.\s+(.+)$/);
        if (ordered) {
          flushParagraph();
          blocks.push({ type: "list", ordered: true, text: ordered[2].trim() });
          continue;
        }

        const unordered = trimmed.match(/^[-*+]\s+(.+)$/);
        if (unordered) {
          flushParagraph();
          blocks.push({ type: "list", ordered: false, text: unordered[1].trim() });
          continue;
        }

        const quote = trimmed.match(/^>\s?(.+)$/);
        if (quote) {
          flushParagraph();
          blocks.push({ type: "quote", text: quote[1].trim() });
          continue;
        }

        paragraph.push(trimmed);
      }

      if (code) {
        blocks.push(codeBlockToBlock(code));
      }
      flushParagraph();
      return blocks;
    }

    function codeBlockToBlock(code) {
      const text = code.lines.join("\n");
      const tree = parseTreeBlock(text);
      return tree || { type: "code", text, lang: code.lang };
    }

    function parseTreeBlock(text) {
      if (!/[├└│─]/.test(text)) return null;

      const items = String(text).split("\n").map((line) => {
        if (!line.trim() || /^[\s│]+$/.test(line)) return null;

        const markerIndex = line.search(/[├└]─/);
        if (markerIndex >= 0) {
          return {
            level: Math.floor(markerIndex / 3) + 1,
            text: line.slice(markerIndex).replace(/^[├└]─\s*/, "").trim()
          };
        }

        const textOnly = line.replace(/[│]/g, " ").trim();
        if (!textOnly) return null;
        return { level: 0, text: textOnly };
      }).filter(Boolean);

      if (items.length < 2) return null;
      return { type: "tree", items };
    }

    function isTableStart(lines, index) {
      if (index + 1 >= lines.length) return false;
      return /^\s*\|?.+\|.+/.test(lines[index]) && /^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(lines[index + 1]);
    }

    function splitTableRow(line) {
      return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((cell) => cell.trim());
    }

    function parseHtmlTable(html) {
      const rowMatches = Array.from(html.matchAll(/<tr\b[^>]*>([\s\S]*?)<\/tr>/gi));
      if (!rowMatches.length) return null;

      const rawRows = rowMatches.map((rowMatch) => {
        const cells = [];
        const cellPattern = /<(th|td)\b([^>]*)>([\s\S]*?)<\/\1>/gi;
        let cellMatch;
        while ((cellMatch = cellPattern.exec(rowMatch[1])) !== null) {
          cells.push({
            text: htmlToText(cellMatch[3]),
            header: cellMatch[1].toLowerCase() === "th",
            rowspan: getSpanValue(cellMatch[2], "rowspan"),
            colspan: getSpanValue(cellMatch[2], "colspan")
          });
        }
        return cells;
      }).filter((row) => row.length);

      if (!rawRows.length) return null;

      const hasThead = /<thead\b/i.test(html);
      const firstRowIsHeader = hasThead || rawRows[0].some((cell) => cell.header);
      const headers = firstRowIsHeader ? rawRows[0] : [];
      const rows = firstRowIsHeader ? rawRows.slice(1) : rawRows;
      return { type: "table", headers, rows };
    }

    function getSpanValue(attributes, name) {
      const match = attributes.match(new RegExp(name + "\\s*=\\s*[\"']?(\\d+)", "i"));
      return match ? Math.max(1, parseInt(match[1], 10)) : 1;
    }

    function htmlToText(html) {
      return decodeHtmlEntities(String(html)
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/p\s*>/gi, "\n")
        .replace(/<[^>]+>/g, "")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim());
    }

    function decodeHtmlEntities(text) {
      return String(text)
        .replace(/&nbsp;/gi, " ")
        .replace(/&amp;/gi, "&")
        .replace(/&lt;/gi, "<")
        .replace(/&gt;/gi, ">")
        .replace(/&quot;/gi, '"')
        .replace(/&#39;/gi, "'")
        .replace(/&#(\d+);/g, (_, code) => String.fromCharCode(parseInt(code, 10)));
    }

    function cellText(cell) {
      return typeof cell === "string" ? cell : cell.text;
    }

    function cellSpanAttr(cell, name) {
      if (typeof cell === "string" || !cell[name] || cell[name] <= 1) return "";
      return ` ${name}="${cell[name]}"`;
    }

    function renderPreview(blocks) {
      if (!blocks.length) {
        return '<div class="empty-preview">문서 내용이 비어 있습니다.</div>';
      }

      return blocks.map((block) => {
        if (block.type === "heading") {
          const level = Math.min(block.level, 3);
          return `<h${level}>${inlineHtml(block.text)}</h${level}>`;
        }
        if (block.type === "paragraph") return `<p>${inlineHtml(block.text)}</p>`;
        if (block.type === "quote") return `<blockquote>${inlineHtml(block.text)}</blockquote>`;
        if (block.type === "list") {
          const tag = block.ordered ? "ol" : "ul";
          return `<${tag}><li>${inlineHtml(block.text)}</li></${tag}>`;
        }
        if (block.type === "code") return `<pre><code>${escapeHtml(block.text)}</code></pre>`;
        if (block.type === "tree") return treePreviewHtml(block);
        if (block.type === "hr") return "<hr>";
        if (block.type === "table") {
          const headerHtml = block.headers.map((cell) => {
            return `<th${cellSpanAttr(cell, "rowspan")}${cellSpanAttr(cell, "colspan")}>${inlineHtml(cellText(cell))}</th>`;
          }).join("");
          const rowHtml = block.rows.map((row) => {
            return "<tr>" + row.map((cell) => {
              return `<td${cellSpanAttr(cell, "rowspan")}${cellSpanAttr(cell, "colspan")}>${inlineHtml(cellText(cell))}</td>`;
            }).join("") + "</tr>";
          }).join("");
          return headerHtml ? `<table><thead><tr>${headerHtml}</tr></thead><tbody>${rowHtml}</tbody></table>` : `<table><tbody>${rowHtml}</tbody></table>`;
        }
        return "";
      }).join("");
    }

    function treePreviewHtml(block) {
      const items = block.items.map((item) => {
        const level = Math.min(Math.max(item.level, 0), 8);
        return `<li style="margin-left:${level * 20}px">${inlineHtml(item.text)}</li>`;
      }).join("");
      return `<ul class="tree-list">${items}</ul>`;
    }

    function inlineHtml(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/__([^_]+)__/g, "<strong>$1</strong>");
      html = html.replace(/\*([^*]+)\*/g, "<em>$1</em>");
      html = html.replace(/_([^_]+)_/g, "<em>$1</em>");
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      return html;
    }

    function createDocx(blocks, title) {
      return new Blob([createDocxBytes(blocks, title)], {
        type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      });
    }

    function createDocxBytes(blocks, title) {
      const files = {
        "[Content_Types].xml": contentTypesXml(),
        "_rels/.rels": relsXml(),
        "docProps/core.xml": coreXml(title),
        "docProps/app.xml": appXml(),
        "word/_rels/document.xml.rels": documentRelsXml(),
        "word/styles.xml": stylesXml(),
        "word/document.xml": documentXml(blocks)
      };
      return zipStore(files);
    }

    function documentXml(blocks) {
      const body = blocks.map(blockToWordXml).join("");
      return xmlHeader() +
        '<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">' +
        "<w:body>" + body +
        '<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="720" w:footer="720" w:gutter="0"/></w:sectPr>' +
        "</w:body></w:document>";
    }

    function blockToWordXml(block) {
      if (block.type === "heading") {
        const size = block.level === 1 ? 36 : block.level === 2 ? 30 : 26;
        return paragraphXml(block.text, { bold: true, size, spacingBefore: 180, spacingAfter: 80 });
      }
      if (block.type === "paragraph") return paragraphXml(block.text, {});
      if (block.type === "quote") return paragraphXml(block.text, { italic: true, indent: 360, color: "475467" });
      if (block.type === "list") {
        const prefix = block.ordered ? "1. " : "• ";
        return paragraphXml(prefix + block.text, { indent: 360, hanging: 260 });
      }
      if (block.type === "code") return paragraphXml(block.text, { mono: true, size: 19, shading: "F2F4F7" });
      if (block.type === "tree") return treeXml(block);
      if (block.type === "hr") {
        return '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="D0D5DD"/></w:pBdr></w:pPr></w:p>';
      }
      if (block.type === "table") return tableXml(block);
      return "";
    }

    function treeXml(block) {
      return block.items.map((item) => {
        const level = Math.min(Math.max(item.level, 0), 8);
        const indent = 280 + level * 360;
        return paragraphXml("• " + item.text, {
          indent,
          hanging: 220,
          spacingAfter: 20,
          size: level === 0 ? 23 : 21,
          bold: level <= 1
        });
      }).join("");
    }

    function paragraphXml(text, options) {
      const pPr = [];
      if (options.spacingBefore || options.spacingAfter) {
        pPr.push(`<w:spacing w:before="${options.spacingBefore || 0}" w:after="${options.spacingAfter || 120}"/>`);
      } else {
        pPr.push('<w:spacing w:after="120"/>');
      }
      if (options.indent) {
        pPr.push(`<w:ind w:left="${options.indent}"${options.hanging ? ` w:hanging="${options.hanging}"` : ""}/>`);
      }
      if (options.shading) {
        pPr.push(`<w:shd w:val="clear" w:color="auto" w:fill="${options.shading}"/>`);
      }
      return `<w:p><w:pPr>${pPr.join("")}</w:pPr>${inlineWordRuns(text, options)}</w:p>`;
    }

    function inlineWordRuns(text, options) {
      const tokens = tokenizeInline(text);
      return tokens.map((token) => {
        const runOptions = Object.assign({}, options);
        if (token.bold) runOptions.bold = true;
        if (token.italic) runOptions.italic = true;
        if (token.code) {
          runOptions.mono = true;
          runOptions.shading = "EEF2F7";
        }
        return runXml(token.text, runOptions);
      }).join("");
    }

    function tokenizeInline(text) {
      const tokens = [];
      const pattern = /(\*\*[^*]+\*\*|__[^_]+__|`[^`]+`|\*[^*]+\*|_[^_]+_|\[[^\]]+\]\([^)]+\))/g;
      let lastIndex = 0;
      let match;
      while ((match = pattern.exec(text)) !== null) {
        if (match.index > lastIndex) tokens.push({ text: text.slice(lastIndex, match.index) });
        const value = match[0];
        if (value.startsWith("**") || value.startsWith("__")) {
          tokens.push({ text: value.slice(2, -2), bold: true });
        } else if (value.startsWith("`")) {
          tokens.push({ text: value.slice(1, -1), code: true });
        } else if (value.startsWith("*") || value.startsWith("_")) {
          tokens.push({ text: value.slice(1, -1), italic: true });
        } else {
          const link = value.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
          tokens.push({ text: link ? link[1] + " (" + link[2] + ")" : value });
        }
        lastIndex = pattern.lastIndex;
      }
      if (lastIndex < text.length) tokens.push({ text: text.slice(lastIndex) });
      return tokens;
    }

    function runXml(text, options) {
      const props = [];
      const font = options.mono ? "Consolas" : "Malgun Gothic";
      props.push(`<w:rFonts w:ascii="${font}" w:hAnsi="${font}" w:eastAsia="${font}"/>`);
      props.push(`<w:sz w:val="${options.size || 22}"/>`);
      if (options.bold) props.push("<w:b/>");
      if (options.italic) props.push("<w:i/>");
      if (options.color) props.push(`<w:color w:val="${options.color}"/>`);
      if (options.shading) props.push(`<w:shd w:val="clear" w:color="auto" w:fill="${options.shading}"/>`);
      return `<w:r><w:rPr>${props.join("")}</w:rPr>${textXml(text)}</w:r>`;
    }

    function textXml(text) {
      return String(text).split("\n").map((line, index) => {
        const prefix = index > 0 ? "<w:br/>" : "";
        return prefix + `<w:t xml:space="preserve">${escapeXml(line)}</w:t>`;
      }).join("");
    }

    function tableXml(block) {
      const allRows = expandTableRows(block);
      const columnCount = Math.max(1, ...allRows.map((row) => row.reduce((sum, cell) => sum + (cell.colspan || 1), 0)));
      const baseCellWidth = Math.floor(5000 / columnCount);
      const grid = "<w:tblGrid>" + Array.from({ length: columnCount }, () => '<w:gridCol w:w="1"/>').join("") + "</w:tblGrid>";
      const rows = allRows.map((row, rowIndex) => {
        const cells = row.map((cell) => {
          const shade = cell.header ? '<w:shd w:val="clear" w:color="auto" w:fill="EEF2F7"/>' : "";
          const gridSpan = cell.colspan && cell.colspan > 1 ? `<w:gridSpan w:val="${cell.colspan}"/>` : "";
          const vMerge = cell.vMerge ? `<w:vMerge w:val="${cell.vMerge}"/>` : "";
          const width = Math.min(5000, baseCellWidth * (cell.colspan || 1));
          return `<w:tc><w:tcPr><w:tcW w:w="${width}" w:type="pct"/>` + gridSpan + vMerge + shade + '</w:tcPr>' +
            paragraphXml(cell.text, { bold: cell.header, spacingAfter: 0 }) +
            "</w:tc>";
        }).join("");
        return "<w:tr>" + cells + "</w:tr>";
      }).join("");
      return '<w:tbl><w:tblPr><w:tblW w:w="5000" w:type="pct"/><w:tblLayout w:type="autofit"/><w:tblBorders><w:top w:val="single" w:sz="4" w:color="D0D5DD"/><w:left w:val="single" w:sz="4" w:color="D0D5DD"/><w:bottom w:val="single" w:sz="4" w:color="D0D5DD"/><w:right w:val="single" w:sz="4" w:color="D0D5DD"/><w:insideH w:val="single" w:sz="4" w:color="D0D5DD"/><w:insideV w:val="single" w:sz="4" w:color="D0D5DD"/></w:tblBorders></w:tblPr>' + grid + rows + "</w:tbl>";
    }

    function expandTableRows(block) {
      const sourceRows = [];
      if (block.headers && block.headers.length) {
        sourceRows.push(block.headers.map((cell) => normalizeCell(cell, true)));
      }
      block.rows.forEach((row) => sourceRows.push(row.map((cell) => normalizeCell(cell, false))));

      const activeRowspans = [];
      return sourceRows.map((row) => {
        const expanded = [];
        let colIndex = 0;

        function addPendingSpans() {
          while (activeRowspans[colIndex] && activeRowspans[colIndex].remaining > 0) {
            const span = activeRowspans[colIndex];
            expanded.push({
              text: "",
              header: span.header,
              colspan: span.colspan,
              vMerge: "continue"
            });
            span.remaining -= 1;
            colIndex += span.colspan;
          }
        }

        row.forEach((cell) => {
          addPendingSpans();
          const outputCell = Object.assign({}, cell);
          if (cell.rowspan > 1) {
            outputCell.vMerge = "restart";
            activeRowspans[colIndex] = {
              remaining: cell.rowspan - 1,
              colspan: cell.colspan,
              header: cell.header
            };
          }
          expanded.push(outputCell);
          colIndex += cell.colspan;
        });
        addPendingSpans();
        return expanded;
      });
    }

    function normalizeCell(cell, forceHeader) {
      if (typeof cell === "string") {
        return { text: cell, header: forceHeader, rowspan: 1, colspan: 1 };
      }
      return {
        text: cell.text || "",
        header: forceHeader || !!cell.header,
        rowspan: cell.rowspan || 1,
        colspan: cell.colspan || 1
      };
    }

    function contentTypesXml() {
      return xmlHeader() +
        '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">' +
        '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>' +
        '<Default Extension="xml" ContentType="application/xml"/>' +
        '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>' +
        '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>' +
        '<Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>' +
        '<Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>' +
        "</Types>";
    }

    function relsXml() {
      return xmlHeader() +
        '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">' +
        '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>' +
        '<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>' +
        '<Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>' +
        "</Relationships>";
    }

    function documentRelsXml() {
      return xmlHeader() + '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>';
    }

    function coreXml(title) {
      const now = new Date().toISOString();
      return xmlHeader() +
        '<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:dcmitype="http://purl.org/dc/dcmitype/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">' +
        `<dc:title>${escapeXml(title)}</dc:title><dc:creator>Markdown to Word Converter</dc:creator>` +
        `<cp:lastModifiedBy>Markdown to Word Converter</cp:lastModifiedBy><dcterms:created xsi:type="dcterms:W3CDTF">${now}</dcterms:created><dcterms:modified xsi:type="dcterms:W3CDTF">${now}</dcterms:modified>` +
        "</cp:coreProperties>";
    }

    function appXml() {
      return xmlHeader() +
        '<Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties" xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes">' +
        "<Application>Markdown to Word Converter</Application></Properties>";
    }

    function stylesXml() {
      return xmlHeader() +
        '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">' +
        '<w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Malgun Gothic" w:hAnsi="Malgun Gothic" w:eastAsia="Malgun Gothic"/><w:sz w:val="22"/></w:rPr></w:rPrDefault></w:docDefaults>' +
        "</w:styles>";
    }

    function zipStore(files) {
      const encoder = new TextEncoder();
      const localParts = [];
      const centralParts = [];
      let offset = 0;
      let count = 0;

      Object.keys(files).forEach((name) => {
        const nameBytes = encoder.encode(name);
        const data = toZipBytes(files[name], encoder);
        const crc = crc32(data);
        const localHeader = concatBytes(
          u32(0x04034b50), u16(20), u16(0x0800), u16(0), u16(0), u16(0), u32(crc),
          u32(data.length), u32(data.length), u16(nameBytes.length), u16(0), nameBytes
        );
        localParts.push(localHeader, data);

        const centralHeader = concatBytes(
          u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0), u16(0), u16(0), u32(crc),
          u32(data.length), u32(data.length), u16(nameBytes.length), u16(0), u16(0),
          u16(0), u16(0), u32(0), u32(offset), nameBytes
        );
        centralParts.push(centralHeader);
        offset += localHeader.length + data.length;
        count += 1;
      });

      const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
      const endRecord = concatBytes(
        u32(0x06054b50), u16(0), u16(0), u16(count), u16(count),
        u32(centralSize), u32(offset), u16(0)
      );
      return concatBytes(...localParts, ...centralParts, endRecord);
    }

    function toZipBytes(value, encoder) {
      if (value instanceof Uint8Array) return value;
      if (value instanceof ArrayBuffer) return new Uint8Array(value);
      return encoder.encode(String(value));
    }

    function crc32(bytes) {
      let crc = -1;
      for (let i = 0; i < bytes.length; i += 1) {
        crc = (crc >>> 8) ^ crcTable[(crc ^ bytes[i]) & 0xff];
      }
      return (crc ^ -1) >>> 0;
    }

    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let i = 0; i < 256; i += 1) {
        let c = i;
        for (let k = 0; k < 8; k += 1) {
          c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
        }
        table[i] = c >>> 0;
      }
      return table;
    })();

    function concatBytes(...arrays) {
      const size = arrays.reduce((sum, array) => sum + array.length, 0);
      const merged = new Uint8Array(size);
      let offset = 0;
      arrays.forEach((array) => {
        merged.set(array, offset);
        offset += array.length;
      });
      return merged;
    }

    function u16(value) {
      return new Uint8Array([value & 255, (value >>> 8) & 255]);
    }

    function u32(value) {
      return new Uint8Array([value & 255, (value >>> 8) & 255, (value >>> 16) & 255, (value >>> 24) & 255]);
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(1) + " MB";
    }

    function getTitleFromFile(fileName) {
      return fileName.replace(/\.[^.]+$/, "") || "Markdown Document";
    }

    function getOutputDocxName(fileName) {
      const baseName = fileName.replace(/\.(md|markdown|txt)$/i, "").replace(/[\\/:*?"<>|]/g, "_").trim();
      return (baseName || "converted") + ".docx";
    }

    function uniqueZipName(files, fileName) {
      if (!Object.prototype.hasOwnProperty.call(files, fileName)) return fileName;
      const extension = fileName.match(/\.[^.]+$/);
      const ext = extension ? extension[0] : "";
      const base = ext ? fileName.slice(0, -ext.length) : fileName;
      let index = 2;
      let candidate = base + "-" + index + ext;
      while (Object.prototype.hasOwnProperty.call(files, candidate)) {
        index += 1;
        candidate = base + "-" + index + ext;
      }
      return candidate;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeXml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&apos;");
    }

    function xmlHeader() {
      return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>';
    }
  </script>
</body>
</html>
