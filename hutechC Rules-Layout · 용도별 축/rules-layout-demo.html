<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rules-Layout · 용도별 축 노출 (DS · 직각/둥근 Switch)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ─── design_system 토큰 ─── */
    :root{
      --ds-color-text-primary:#222222; --ds-color-text-secondary:#666666; --ds-color-text-muted:#808080;
      --ds-color-text-inverse:#ffffff;
      --ds-color-brand-primary:#0088ff; --ds-color-brand-secondary:#822afd;
      --ds-color-accent-success:#51b117; --ds-color-accent-warning:#f7b22c; --ds-color-accent-danger:#dc3d3d;
      --ds-color-bg-base:#ffffff; --ds-color-bg-page:#f8f9fc; --ds-color-bg-sidebar:#eff0fa;
      --ds-color-bg-soft:#faf9ff; --ds-color-bg-selected:#d7e7fc; --ds-color-bg-footer:#fbfaff;
      --ds-color-border-default:#e3e5ed; --ds-color-border-strong:#cccccc;
      /* 둥근(rounded) 기본값 */
      --ds-radius-xs:4px; --ds-radius-sm:6px; --ds-radius-md:8px; --ds-radius-lg:10px; --ds-radius-full:100px;
      --ds-font-family:"Noto Sans KR","Pretendard","Apple SD Gothic Neo",Arial,sans-serif;
    }
    /* ▶ 직각(squared) 모드: 모든 radius 토큰 0 */
    body.squared{
      --ds-radius-xs:0; --ds-radius-sm:0; --ds-radius-md:0; --ds-radius-lg:0; --ds-radius-full:0;
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; height:100%; }
    body{
      font-family:var(--ds-font-family);
      background:var(--ds-color-bg-page); color:var(--ds-color-text-primary);
      font-size:13px; line-height:20px;
    }
    .scroll::-webkit-scrollbar{ width:9px; height:9px; }
    .scroll::-webkit-scrollbar-thumb{ background:var(--ds-color-border-strong); border-radius:var(--ds-radius-full); }

    /* ─── 버튼 (design_system .btn) ─── */
    .btn{ display:inline-flex; align-items:center; justify-content:center; gap:4px;
      height:32px; padding:6px 14px; font:inherit; font-size:14px; font-weight:500;
      border:1px solid transparent; cursor:pointer; color:#fff; background:var(--ds-color-brand-primary);
      border-radius:var(--ds-radius-sm);
      transition:filter .12s, transform .04s, background .12s, border-color .12s, color .12s; user-select:none; }
    .btn:hover{ filter:brightness(0.96); }
    .btn:active{ transform:translateY(1px); filter:brightness(0.9); }
    .btn:focus-visible{ outline:2px solid var(--ds-color-bg-selected); outline-offset:2px; }

    /* ─── 선택형 옵션/칩 ─── */
    .opt,.chip,.row-item,.dept,.rank,.c-card{
      cursor:pointer; user-select:none; font:inherit; background:var(--ds-color-bg-base);
      border:1px solid var(--ds-color-border-default); color:var(--ds-color-text-secondary);
      border-radius:var(--ds-radius-xs);
      transition:transform .04s, background .12s, border-color .12s, color .12s, box-shadow .12s; }
    .opt:active,.chip:active,.row-item:active,.dept:active,.rank:active,.c-card:active{ transform:translateY(1px); }
    .opt:hover,.chip:hover,.row-item:hover,.dept:hover,.rank:hover,.c-card:hover{ border-color:var(--ds-color-brand-primary); }
    .opt:focus-visible,.chip:focus-visible,.row-item:focus-visible,.dept:focus-visible,.rank:focus-visible,.c-card:focus-visible{
      outline:2px solid var(--ds-color-bg-selected); outline-offset:1px; }
    .is-selected{ background:var(--ds-color-bg-selected) !important; border-color:var(--ds-color-brand-primary) !important;
      color:var(--ds-color-brand-primary) !important; font-weight:700; }

    /* ─── 프레임 ─── */
    .app{ display:flex; flex-direction:column; height:100%; }
    header.top{ background:var(--ds-color-bg-base); border-bottom:1px solid var(--ds-color-border-default);
      padding:10px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .logo{ width:30px; height:30px; background:var(--ds-color-brand-primary); color:#fff; font-weight:900; font-size:15px;
      display:flex; align-items:center; justify-content:center; border-radius:var(--ds-radius-sm); }
    .title{ font-size:17px; font-weight:700; }

    /* ─── 스타일 Switch (직각 ⇄ 둥근) ─── */
    .switch{ display:flex; border:1px solid var(--ds-color-border-default); border-radius:var(--ds-radius-sm); overflow:hidden; }
    .sw-opt{ height:34px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; user-select:none;
      background:#fff; border:0; color:var(--ds-color-text-muted); transition:background .12s, color .12s; }
    .sw-opt:active{ transform:translateY(1px); }
    .sw-opt.active{ background:var(--ds-color-brand-secondary); color:#fff; }
    .sw-opt+.sw-opt{ border-left:1px solid var(--ds-color-border-default); }

    .configbar{ background:var(--ds-color-bg-sidebar); border-bottom:1px solid var(--ds-color-border-default);
      padding:10px 16px; display:flex; align-items:center; gap:14px; font-size:13px; flex-wrap:wrap; }
    .cb-label{ font-weight:900; color:var(--ds-color-text-muted); font-size:11px; letter-spacing:.08em; text-transform:uppercase; }
    .shorthand{ font-family:ui-monospace,Menlo,monospace; font-size:14px; font-weight:700; color:var(--ds-color-brand-primary);
      background:#fff; border:1px solid var(--ds-color-border-default); padding:4px 12px; border-radius:var(--ds-radius-xs); }
    .reason{ color:var(--ds-color-text-secondary); font-style:italic; }

    /* ─── 본문: 좌측 카테고리 + 컬럼 ─── */
    .workspace{ flex:1; display:flex; overflow:hidden; }
    aside.modes{ width:190px; flex-shrink:0; background:var(--ds-color-bg-base);
      border-right:1px solid var(--ds-color-border-default); display:flex; flex-direction:column; overflow:hidden; }
    .modes-label{ padding:12px 14px; border-bottom:1px solid var(--ds-color-border-default); background:var(--ds-color-bg-soft);
      font-size:11px; font-weight:900; color:var(--ds-color-text-muted); letter-spacing:.08em; text-transform:uppercase; }
    .modes-list{ flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; }
    .mode-item{ text-align:left; padding:10px 12px; font-size:13px; font-weight:500; cursor:pointer; user-select:none;
      background:#fff; border:1px solid var(--ds-color-border-default); color:var(--ds-color-text-secondary);
      border-radius:var(--ds-radius-sm); transition:background .12s, color .12s, border-color .12s, transform .04s; }
    .mode-item:hover{ border-color:var(--ds-color-brand-primary); }
    .mode-item:active{ transform:translateY(1px); }
    .mode-item.active{ background:var(--ds-color-brand-primary); border-color:var(--ds-color-brand-primary); color:#fff; font-weight:700; }

    main.cols{ flex:1; display:grid; gap:12px; padding:12px; overflow:hidden; }
    section.col{ background:var(--ds-color-bg-base); border:1px solid var(--ds-color-border-default);
      border-radius:var(--ds-radius-md); display:flex; flex-direction:column; overflow:hidden;
      transition:opacity .15s, border-color .15s; }
    section.col.dim{ opacity:.55; border-style:dashed; border-color:var(--ds-color-border-strong); }
    .col-head{ padding:12px 14px; border-bottom:1px solid var(--ds-color-border-default);
      display:flex; align-items:center; justify-content:space-between; background:var(--ds-color-bg-soft); }
    .col-head .lead{ display:flex; align-items:center; gap:10px; }
    .num{ width:24px; height:24px; background:var(--ds-color-brand-primary); color:#fff; font-weight:700; font-size:13px;
      display:flex; align-items:center; justify-content:center; border-radius:var(--ds-radius-sm); }
    .num.muted{ background:var(--ds-color-border-default); color:var(--ds-color-text-muted); }
    .col-title{ font-size:15px; font-weight:700; }
    .grade{ font-size:11px; font-weight:700; padding:3px 10px; border:1px solid transparent; border-radius:var(--ds-radius-xs); }
    .grade-fixed{ background:var(--ds-color-brand-primary); color:#fff; }
    .grade-semi{ background:var(--ds-color-bg-selected); color:var(--ds-color-brand-primary); border-color:var(--ds-color-brand-primary); }
    .grade-opt{ background:#fff; color:var(--ds-color-text-muted); border-color:var(--ds-color-border-default); }
    .col-body{ padding:14px; overflow-y:auto; flex:1; }

    /* 축 콘텐츠 */
    .cat-btn{ width:100%; text-align:left; height:38px; padding:6px 14px; display:flex; align-items:center; justify-content:space-between;
      font-size:14px; margin-bottom:6px; }
    .cat-btn .chev{ transition:transform .12s; font-size:16px; }
    .cat-btn.is-open .chev{ transform:rotate(90deg); }
    .sub{ padding:6px 0 12px 12px; border-left:2px solid var(--ds-color-bg-selected); margin:0 0 10px 10px;
      display:flex; flex-wrap:wrap; gap:6px; }
    .chip{ padding:5px 12px; font-size:13px; }

    .track-row{ display:flex; gap:6px; margin-bottom:12px; }
    .track-row .opt{ flex:1; height:36px; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; }
    .lvl-block{ margin-bottom:14px; }
    .lvl-label{ font-size:12px; font-weight:900; color:var(--ds-color-text-muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:8px; }
    .lvl-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
    .lvl{ height:34px; font-size:13px; font-family:ui-monospace,monospace; display:flex; align-items:center; justify-content:center; }

    /* ▶ C.홈페이지 = 멀티컬럼 그리드 (수직 1단 금지) */
    .c-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .c-card{ display:flex; align-items:center; justify-content:center; text-align:center; min-height:68px;
      padding:12px 10px; font-size:14px; font-weight:500; line-height:1.35; }

    .d-label{ font-size:12px; font-weight:900; color:var(--ds-color-text-muted); letter-spacing:.06em; text-transform:uppercase; margin:14px 0 8px; }
    .d-label:first-child{ margin-top:0; }
    .team{ margin-bottom:12px; }
    .team-name{ font-size:13px; font-weight:700; color:var(--ds-color-text-secondary); }
    .chip-wrap{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
    .dept-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:6px; }
    .dept{ padding:10px 6px; font-size:13px; text-align:center; }

    .rank{ display:flex; align-items:center; gap:10px; padding:9px 14px; font-size:14px; margin-bottom:6px; }
    .rank .dot{ width:7px; height:7px; background:var(--ds-color-border-strong); border-radius:var(--ds-radius-full); }
    .rank.is-selected .dot{ background:var(--ds-color-brand-primary); }

    /* ─── 하단 축 순서 지정 + 저장 바 ─── */
    footer.order-bar{ background:var(--ds-color-text-primary); color:#cfd3da; border-top:1px solid #000;
      padding:10px 16px; display:flex; align-items:center; gap:12px; font-size:12px; flex-wrap:wrap; }
    .order-bar .ob-label{ font-weight:900; letter-spacing:.1em; text-transform:uppercase; flex-shrink:0; }
    .ord-list{ display:flex; gap:8px; flex-wrap:wrap; }
    .ord-item{ display:flex; align-items:center; gap:8px; height:32px; padding:4px 12px; font-size:13px; font-weight:500;
      cursor:pointer; user-select:none; background:#3a3f47; border:1px solid #555; color:#cfd3da;
      border-radius:var(--ds-radius-sm); transition:background .12s, color .12s, border-color .12s, transform .04s; }
    .ord-item:hover{ border-color:#9aa0ab; }
    .ord-item:active{ transform:translateY(1px); }
    .ord-item.on{ background:#fff; color:var(--ds-color-text-primary); border-color:#fff; font-weight:700; }
    .ord-num{ width:18px; height:18px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700;
      border:1px solid #6b7280; color:#9aa0ab; border-radius:var(--ds-radius-full); }
    .ord-item.on .ord-num{ background:var(--ds-color-brand-primary); border-color:var(--ds-color-brand-primary); color:#fff; }
    .ord-reset{ height:30px; padding:4px 12px; font-size:12px; font-weight:700; cursor:pointer; user-select:none;
      background:transparent; border:1px solid #555; color:#9aa0ab; border-radius:var(--ds-radius-sm); transition:background .12s, color .12s; }
    .ord-reset:hover{ background:#3a3f47; color:#fff; }
    .ord-hint{ margin-left:auto; opacity:.6; }
    .ord-save{ height:30px; padding:4px 16px; font-size:12px; font-weight:700; cursor:pointer; user-select:none;
      background:var(--ds-color-accent-success); border:1px solid var(--ds-color-accent-success); color:#fff;
      border-radius:var(--ds-radius-sm); transition:filter .12s, transform .04s; flex-shrink:0; }
    .ord-save:hover{ filter:brightness(.95); }
    .ord-save:active{ transform:translateY(1px); }

    /* Toast */
    #toast{ position:fixed; bottom:64px; left:50%; transform:translateX(-50%) translateY(8px);
      background:var(--ds-color-text-primary); color:#fff; padding:10px 18px; font-size:14px; font-weight:500;
      box-shadow:0 6px 20px rgba(0,0,0,.18); opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; z-index:99;
      border-radius:var(--ds-radius-sm); }
    #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    #toast.ok{ background:var(--ds-color-accent-success); }
    #toast.off{ background:var(--ds-color-text-muted); }
    .demo-note{ font-size:11px; color:var(--ds-color-text-muted); }
  </style>
</head>
<body class="squared">
<div class="app">
  <header class="top">
    <div class="logo">R</div>
    <div class="title">Rules-Layout · 용도별 축 노출</div>

    <div class="switch" id="styleSwitch" title="모서리 스타일 전환">
      <button class="sw-opt active" data-style="squared">▢ 직각</button>
      <button class="sw-opt" data-style="rounded">◖ 둥근</button>
    </div>

    <span class="demo-note" style="margin-left:auto">※ 모의 데모 — 선택 상태만 토글(백엔드 저장 없음)</span>
  </header>

  <div class="configbar">
    <span class="cb-label">현재 구성</span>
    <span class="shorthand" id="shorthand"></span>
    <span id="hiddenInfo" style="color:var(--ds-color-text-muted)"></span>
    <span class="reason" id="reason"></span>
  </div>

  <div class="workspace">
    <!-- 좌측 상위 카테고리(용도) -->
    <aside class="modes">
      <div class="modes-label">상위 카테고리 (용도)</div>
      <nav class="modes-list" id="modeTabs" role="tablist"></nav>
    </aside>

    <main class="cols" id="columns"></main>
  </div>

  <footer class="order-bar">
    <span class="ob-label">축 순서 지정</span>
    <div class="ord-list" id="orderList"></div>
    <button class="ord-reset" id="orderReset">초기화</button>
    <span class="ord-hint">클릭한 순서대로 컬럼 정렬 · 다시 클릭 시 해제</span>
    <button class="ord-save" id="saveBtn" title="현재 구성 저장">💾 저장</button>
  </footer>
</div>
<div id="toast"></div>

<script>
// ───────────── 축/모드 정의 ─────────────
const AXES = {
  A:{key:'A',label:'분야',icon:'🗂️'}, B:{key:'B',label:'급수',icon:'🏅'},
  C:{key:'C',label:'홈페이지',icon:'🌐'}, D:{key:'D',label:'부서',icon:'🏢'}, E:{key:'E',label:'직급',icon:'🛡️'},
};
const ALL = ['A','B','C','D','E'];
// hidden 은 더 이상 숨기지 않고, "기본 체크 순서(우선순위)"의 프리셋으로만 쓴다.
const MODE_CONFIGS = {
  시험용:{label:'🎓 시험용', priority:['C','B','A'], grades:{C:'고정',B:'고정',A:'준고정'},
    reason:'응시자 관점. 진입은 홈페이지(C) 관문, 상품 본질은 자격·급수(B), 과목(A)은 필터. 사내 조직(D·E)은 후순위.'},
  테솔:{label:'🌐 테솔(TESOL)', priority:['C','B','D'], grades:{C:'고정',B:'고정',D:'준고정'},
    reason:'테솔은 분야(A)가 아니라 강사팀 중심. A 자리에 부서/매칭(D). 진입(C)→자격등급(B)→강사팀(D).'},
  직원용:{label:'🧑‍💼 직원용', priority:['E','D'], grades:{E:'고정',D:'선택'},
    reason:'사내 도구. 기준은 "누가 어떤 권한"이라 직급(E)만, 권한 스코프 필요 시 부서(D) 추가. 마케팅 축은 후순위.'},
  AI번역:{label:'🔤 AI번역(TTT)', priority:['C','A','B'], grades:{C:'고정',A:'준고정',B:'선택'},
    reason:'홈페이지 활성 항목이 "번역(109개언어)"(C). 번역은 도메인(A)이 급수보다 먼저, 등급(B)은 보조.'},
  음성:{label:'🔊 음성(TTS)', priority:['A','C','B'], grades:{A:'고정',C:'준고정',B:'선택'},
    reason:'음성은 분야(A: 아나운서·가이드·큐레이터·안내방송·강의)가 곧 상품 구성. 분야 선택이 1순위.'},
  교육센터:{label:'📚 교육센터', priority:['B','C','D'], grades:{B:'고정',C:'준고정',D:'선택'},
    reason:'교육은 급수(B 교육 트랙=8급)가 중심, 운영은 강사팀(D)이 담당.'},
  전시행사:{label:'🎪 전시/행사', priority:['C','A','D'], grades:{C:'고정',A:'준고정',D:'선택'},
    reason:'전시회는 홈페이지(C: 전시회 항목)·콘텐츠(A: 영상/SNS)·전문가매칭(D) 순.'},
};
const DATA = {
  A:[ {name:'문서',sub:['비즈니스','법률','의료','특허','노무','교재','논문','기사','고전']},
      {name:'음성',sub:['아나운서','관광가이드','큐레이터','안내 방송','교육 강의']},
      {name:'영상/SNS',sub:['미디어/장르']}, {name:'IT/개발',sub:['개발/보안','디자인/기획']},
      {name:'창의적활동',sub:['콘텐츠']}, {name:'번역',sub:['통번역 방식']}, {name:'확장영역',sub:['라이프/전문']} ],
  B:['프롬','번역','윤리'],
  C:['교육','번역 (109개언어)','통독 문서','전시회 (박물관/전시회)','전문가 매칭 (번역가)'],
  D:{ 관리:[ {team:'강사 팀',subs:['테슬','프롬프트','AI번역','윤리']},
            {team:'커리 교재 팀',subs:['테슬','프롬프트','AI번역','윤리']},
            {team:'문제은행팀',subs:['프롬프트','AI번역','윤리']} ],
      전체:['기획','홈페이지','영업','마케팅','회계','인사','관리','상담','총무','강사','커리/교재','문제은행'] },
  E:['알바','신입','강사','팀장','개발','외부','임원','대표'],
};
const LEVELS = { '교육':[1,2,3,4,5,6,7,8], '일반':[1,2,3], '전문':[1,2] };
const GRADE_CLASS = { '고정':'grade-fixed', '준고정':'grade-semi', '선택':'grade-opt' };

// ───────────── 축 콘텐츠 ─────────────
function axisBody(key){
  if(key==='A') return DATA.A.map(c=>`
    <button class="opt cat-btn ${c.name==='IT/개발'?'is-open is-selected':''}" data-act="cat" data-cat="${c.name}">
      ${c.name}<span class="chev">›</span></button>
    <div class="sub" data-sub="${c.name}" style="display:${c.name==='IT/개발'?'flex':'none'}">
      ${c.sub.map(s=>`<button class="chip" data-act="toggle">${s}</button>`).join('')}
    </div>`).join('');

  if(key==='B') return `
    <div class="track-row">
      ${DATA.B.map((g,i)=>`<button class="opt track ${i===0?'is-selected':''}" data-act="single" data-group="trackB">${g}</button>`).join('')}
    </div>
    ${['교육','일반','전문'].map(s=>`
      <div class="lvl-block"><div class="lvl-label">${s}</div>
        <div class="lvl-grid">${LEVELS[s].map(lv=>`<button class="chip lvl" data-act="toggle">${lv}급</button>`).join('')}</div>
      </div>`).join('')}`;

  if(key==='C') return `<div class="c-grid">
    ${DATA.C.map((it,i)=>`<button class="c-card ${i===1?'is-selected':''}" data-act="single" data-group="C">${it}</button>`).join('')}
  </div>`;

  if(key==='D') return `
    <div class="d-label">관리 (팀)</div>
    ${DATA.D.관리.map(t=>`<div class="team"><span class="team-name">${t.team}</span>
      <div class="chip-wrap">${t.subs.map(s=>`<button class="chip" data-act="toggle">${s}</button>`).join('')}</div></div>`).join('')}
    <div class="d-label">전체 (12부서)</div>
    <div class="dept-grid">${DATA.D.전체.map(d=>`<button class="dept" data-act="toggle">${d}</button>`).join('')}</div>`;

  if(key==='E') return DATA.E.map(r=>`
    <button class="rank ${r==='팀장'?'is-selected':''}" data-act="single" data-group="E"><span class="dot"></span>${r}</button>`).join('');
  return '';
}

// ───────────── 상태 ─────────────
let currentMode = '시험용';
let order = [...MODE_CONFIGS[currentMode].priority]; // 체크된 축의 순서 (= 컬럼 우선순위)
const $ = (id)=>document.getElementById(id);

// 체크 토글: 있으면 해제(나머지 자동 재번호), 없으면 맨 뒤에 추가
function toggleAxis(k){
  const i = order.indexOf(k);
  if(i >= 0){ order.splice(i,1); toast(`${AXES[k].key}. ${AXES[k].label} 순서 해제`,'off'); }
  else { order.push(k); toast(`${AXES[k].key}. ${AXES[k].label} → ${order.length}순위`,'ok'); }
  render();
}

// ───────────── 렌더 ─────────────
function render(){
  const cfg = MODE_CONFIGS[currentMode];
  // 좌측 카테고리(용도) — 세로 리스트
  $('modeTabs').innerHTML = Object.keys(MODE_CONFIGS).map(m=>`
    <button class="mode-item ${m===currentMode?'active':''}" data-mode="${m}" role="tab" aria-selected="${m===currentMode}">${MODE_CONFIGS[m].label}</button>`).join('');
  document.querySelectorAll('.mode-item').forEach(b=>b.onclick=()=>{
    currentMode=b.dataset.mode;
    order=[...MODE_CONFIGS[currentMode].priority]; // 모드 = 체크 순서 프리셋
    toast('모드 전환: '+MODE_CONFIGS[currentMode].label); render();
  });

  // 표시 순서: 체크된 축(순서대로) → 미체크 축(A~E 기본순)
  const rest = ALL.filter(k=>!order.includes(k));
  const display = [...order, ...rest];

  $('shorthand').textContent = order.length ? order.join(' > ') : '(순서 미지정)';
  $('hiddenInfo').innerHTML = `노출 <b style="color:var(--ds-color-text-secondary)">${display.length}/5</b> · 순서지정 <b style="color:var(--ds-color-text-secondary)">${order.length}</b>`;
  $('reason').textContent = '💡 '+cfg.reason;

  const cols = $('columns');
  cols.style.gridTemplateColumns = `repeat(${display.length}, minmax(0,1fr))`;
  cols.innerHTML = display.map((k)=>{
    const ax=AXES[k], grade=cfg.grades[k]||'선택';
    const idx=order.indexOf(k), checked=idx>=0;
    return `<section class="col ${checked?'':'dim'}">
      <div class="col-head">
        <div class="lead"><span class="num ${checked?'':'muted'}">${checked?idx+1:'–'}</span><span class="col-title">${ax.icon} ${ax.key}. ${ax.label}</span></div>
        <span class="grade ${GRADE_CLASS[grade]}">${grade}</span>
      </div>
      <div class="col-body scroll">${axisBody(k)}</div>
    </section>`;
  }).join('');

  // 하단 순서지정 리스트 (A~E 전부)
  $('orderList').innerHTML = ALL.map(k=>{
    const ax=AXES[k], idx=order.indexOf(k), checked=idx>=0;
    return `<button class="ord-item ${checked?'on':''}" data-axis="${k}">
      <span class="ord-num">${checked?idx+1:''}</span>${ax.icon} ${ax.key}. ${ax.label}</button>`;
  }).join('');
  $('orderList').querySelectorAll('[data-axis]').forEach(b=>b.onclick=()=>toggleAxis(b.dataset.axis));
  $('orderReset').onclick = ()=>{ order=[]; toast('순서 초기화','off'); render(); };
}

// ───────────── 스타일 Switch (직각 ⇄ 둥근) ─────────────
document.querySelectorAll('#styleSwitch .sw-opt').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#styleSwitch .sw-opt').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  const sq = b.dataset.style==='squared';
  document.body.classList.toggle('squared', sq);
  toast(sq?'직각(Squared) 스타일':'둥근(Rounded) 스타일','ok');
});

// ───────────── 버튼 인터랙션 ─────────────
$('columns').addEventListener('click', e=>{
  const b = e.target.closest('[data-act]'); if(!b) return;
  const act = b.dataset.act;
  if(act==='toggle'){
    const on = !b.classList.contains('is-selected');
    b.classList.toggle('is-selected', on);
    toast(`${b.textContent.trim()} ${on?'선택':'해제'}`, on?'ok':'off');
  } else if(act==='single'){
    const g=b.dataset.group;
    $('columns').querySelectorAll(`[data-group="${g}"]`).forEach(x=>x.classList.remove('is-selected'));
    b.classList.add('is-selected');
    toast(`${b.textContent.trim()} 선택`,'ok');
  } else if(act==='cat'){
    const cat=b.dataset.cat, sub=$('columns').querySelector(`[data-sub="${cat}"]`);
    const open=b.classList.contains('is-open');
    $('columns').querySelectorAll('[data-act="cat"]').forEach(x=>x.classList.remove('is-open','is-selected'));
    $('columns').querySelectorAll('[data-sub]').forEach(x=>x.style.display='none');
    if(!open){ b.classList.add('is-open','is-selected'); if(sub) sub.style.display='flex'; toast(`분야 「${cat}」 펼침`); }
  }
});

// ───────────── 저장 (모의 — 백엔드 없음) ─────────────
$('saveBtn').onclick = ()=>{ toast('저장되었습니다','ok'); };

// ───────────── Toast ─────────────
let toastTimer;
function toast(msg, type=''){
  const t=$('toast'); t.textContent=msg; t.className='show '+type;
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.className='', 1400);
}

render();
</script>
</body>
</html>
