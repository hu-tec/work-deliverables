<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AITP 통합 시험 플랫폼</title>
  <meta http-equiv="refresh" content="0; url=./source/design_system_major/exam-platform/index.html">
  <style>
    body {
      margin: 0;
      display: grid;
      min-height: 100vh;
      place-items: center;
      background: #f8f9fc;
      color: #222222;
      font-family: "Noto Sans KR", "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      border: 1px solid #e3e5ed;
      border-radius: 8px;
      background: #ffffff;
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 32px;
    }
    p {
      margin: 0 0 18px;
      color: #666666;
    }
    a {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: #0088ff;
      padding: 8px 14px;
      color: #ffffff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>AITP 통합 시험 플랫폼</h1>
    <p>시험 페이지로 이동합니다.</p>
    <a href="./source/design_system_major/exam-platform/index.html">바로 열기</a>
  </main>
</body>
</html>
