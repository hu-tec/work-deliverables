<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TESOL 신청서 예시</title>
    <style>
      :root {
        --page-bg: #f5f5f6;
        --apply-primary: #8b1a2b;
        --apply-primary-hover: #741524;
        --apply-primary-soft: rgb(139 26 43 / 0.07);
        --apply-bg: #ffffff;
        --apply-surface: #fafafa;
        --apply-text: #111111;
        --apply-muted: rgb(0 0 0 / 0.56);
        --apply-faint: rgb(0 0 0 / 0.36);
        --apply-border: rgb(0 0 0 / 0.1);
        --apply-input: #f3f3f5;
        --apply-radius: 12px;
        --apply-control-radius: 7px;
        --apply-shadow: 0 10px 30px rgb(0 0 0 / 0.06);
        --apply-font: Pretendard, -apple-system, BlinkMacSystemFont, system-ui,
          "Segoe UI", sans-serif;
      }

      [data-theme="neutral"] {
        --page-bg: #f4f6f8;
        --apply-primary: #1f2937;
        --apply-primary-hover: #111827;
        --apply-primary-soft: rgb(31 41 55 / 0.08);
      }

      [data-theme="green"] {
        --page-bg: #f3f7f4;
        --apply-primary: #1f7a54;
        --apply-primary-hover: #17613f;
        --apply-primary-soft: rgb(31 122 84 / 0.08);
      }

      [data-theme="blue"] {
        --page-bg: #f3f7fb;
        --apply-primary: #2563a9;
        --apply-primary-hover: #1d4f87;
        --apply-primary-soft: rgb(37 99 169 / 0.08);
      }

      [data-theme="teal"] {
        --page-bg: #f1f8f8;
        --apply-primary: #147d86;
        --apply-primary-hover: #0f646b;
        --apply-primary-soft: rgb(20 125 134 / 0.09);
      }

      [data-theme="indigo"] {
        --page-bg: #f5f6fb;
        --apply-primary: #4c5aa8;
        --apply-primary-hover: #3d4888;
        --apply-primary-soft: rgb(76 90 168 / 0.09);
      }

      [data-theme="rose"] {
        --page-bg: #fbf4f6;
        --apply-primary: #be4662;
        --apply-primary-hover: #9f3750;
        --apply-primary-soft: rgb(190 70 98 / 0.09);
      }

      [data-theme="amber"] {
        --page-bg: #fbf7ee;
        --apply-primary: #9a6a16;
        --apply-primary-hover: #7d5510;
        --apply-primary-soft: rgb(154 106 22 / 0.1);
      }

      [data-theme="mono"] {
        --page-bg: #f2f2f2;
        --apply-primary: #111111;
        --apply-primary-hover: #000000;
        --apply-primary-soft: rgb(0 0 0 / 0.07);
        --apply-radius: 6px;
        --apply-control-radius: 4px;
      }

      [data-theme="soft"] {
        --page-bg: #f7f6f2;
        --apply-primary: #6f5f4a;
        --apply-primary-hover: #554837;
        --apply-primary-soft: rgb(111 95 74 / 0.1);
        --apply-surface: #fbfaf7;
      }

      [data-theme="dark"] {
        --page-bg: #111214;
        --apply-bg: #1a1c20;
        --apply-surface: #22252a;
        --apply-text: #f4f5f7;
        --apply-muted: rgb(255 255 255 / 0.68);
        --apply-faint: rgb(255 255 255 / 0.42);
        --apply-border: rgb(255 255 255 / 0.12);
        --apply-input: #252930;
        --apply-primary: #f0c2ca;
        --apply-primary-hover: #ffd5dd;
        --apply-primary-soft: rgb(240 194 202 / 0.12);
        --apply-shadow: 0 16px 36px rgb(0 0 0 / 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page-bg);
        color: var(--apply-text);
        font-family: var(--apply-font);
      }

      .page {
        width: min(100%, 960px);
        margin: 0 auto;
        padding: 32px 16px 56px;
      }

      .demo-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }

      .demo-title {
        margin: 0;
        font-size: 22px;
        line-height: 1.3;
        font-weight: 800;
      }

      .theme-select {
        min-width: 150px;
        height: 40px;
        border: 1px solid var(--apply-border);
        border-radius: var(--apply-control-radius);
        background: var(--apply-bg);
        color: var(--apply-text);
        padding: 0 12px;
      }

      .apply-form {
        width: 100%;
        max-width: 896px;
        margin: 0 auto;
      }

      .form-card {
        background: var(--apply-bg);
        border: 1px solid var(--apply-primary);
        border-radius: var(--apply-radius);
        box-shadow: var(--apply-shadow);
        padding: 24px;
      }

      .form-head {
        display: grid;
        grid-template-columns: 1fr minmax(220px, 260px) 1fr;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid var(--apply-border);
        padding-bottom: 20px;
        margin-bottom: 22px;
      }

      .form-head h2 {
        margin: 0;
        font-size: 22px;
        line-height: 1.3;
      }

      .form-head h2 small {
        display: inline-block;
        color: var(--apply-faint);
        font-size: 12px;
        font-weight: 500;
        margin-left: 5px;
      }

      .stepper {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .step-dot {
        width: 30px;
        height: 30px;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: var(--apply-input);
        color: var(--apply-faint);
        font-size: 13px;
        font-weight: 800;
        flex: 0 0 auto;
      }

      .step-dot.is-active {
        background: var(--apply-primary);
        color: var(--apply-bg);
      }

      .step-line {
        height: 3px;
        flex: 1;
        background: var(--apply-input);
        margin: 0 -2px;
      }

      .step-line.is-active {
        background: var(--apply-primary);
      }

      .step {
        display: none;
      }

      .step.is-active {
        display: block;
      }

      .section {
        border-bottom: 1px solid var(--apply-border);
        padding-bottom: 22px;
        margin-bottom: 22px;
      }

      .section:last-child {
        border-bottom: 0;
        margin-bottom: 0;
        padding-bottom: 0;
      }

      .section-title {
        margin: 0 0 12px;
        font-size: 14px;
        line-height: 1.4;
        font-weight: 800;
      }

      .section-title small,
      .field-label small {
        color: var(--apply-faint);
        font-weight: 500;
        margin-left: 4px;
      }

      .required {
        color: var(--apply-primary);
        margin-left: 4px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .field {
        min-width: 0;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      .select-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .field-label {
        display: block;
        margin-bottom: 6px;
        color: var(--apply-muted);
        font-size: 12px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--apply-border);
        border-radius: var(--apply-control-radius);
        background: var(--apply-input);
        color: var(--apply-text);
        font: inherit;
        font-size: 14px;
        outline: none;
      }

      input,
      select {
        height: 40px;
        padding: 0 12px;
      }

      textarea {
        min-height: 116px;
        resize: vertical;
        padding: 12px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--apply-primary);
        box-shadow: 0 0 0 3px var(--apply-primary-soft);
      }

      .choices {
        display: flex;
        flex-wrap: wrap;
        gap: 9px 14px;
      }

      .choice,
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        cursor: pointer;
        color: var(--apply-text);
        font-size: 14px;
      }

      .choice input[type="checkbox"],
      .choice input[type="radio"],
      .consent input[type="checkbox"] {
        width: 14px;
        height: 14px;
        flex: 0 0 14px;
        margin: 0;
        padding: 0;
        accent-color: var(--apply-primary);
      }

      .choice small,
      .chip small {
        color: var(--apply-faint);
        font-size: 11px;
      }

      .chip {
        border: 1px solid var(--apply-border);
        border-radius: var(--apply-control-radius);
        background: var(--apply-bg);
        padding: 8px 12px;
      }

      .chip input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .chip:has(input:checked) {
        border-color: var(--apply-primary);
        background: var(--apply-primary-soft);
        color: var(--apply-primary);
        font-weight: 800;
      }

      .consent {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 18px;
        color: var(--apply-muted);
        font-size: 14px;
        cursor: pointer;
      }

      .consent input[type="checkbox"] {
        margin-top: 3px;
      }

      .actions {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding-top: 20px;
      }

      .button {
        min-width: 128px;
        height: 42px;
        border: 1px solid var(--apply-border);
        border-radius: var(--apply-control-radius);
        background: var(--apply-bg);
        color: var(--apply-text);
        padding: 0 18px;
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }

      .button.primary {
        border-color: var(--apply-primary);
        background: var(--apply-primary);
        color: var(--apply-bg);
      }

      .button.primary:hover {
        background: var(--apply-primary-hover);
      }

      .complete {
        text-align: center;
        padding: 36px 0 16px;
      }

      .complete-icon {
        width: 64px;
        height: 64px;
        display: grid;
        place-items: center;
        margin: 0 auto 18px;
        border-radius: 50%;
        background: var(--apply-primary);
        color: var(--apply-bg);
        font-size: 32px;
        font-weight: 900;
      }

      .complete h3 {
        margin: 0 0 8px;
        font-size: 24px;
      }

      .complete p {
        margin: 0;
        color: var(--apply-muted);
        line-height: 1.6;
      }

      .summary {
        width: min(100%, 520px);
        margin: 24px auto;
        border: 1px solid var(--apply-border);
        border-radius: var(--apply-radius);
        overflow: hidden;
        text-align: left;
      }

      .summary-row {
        display: grid;
        grid-template-columns: 130px 1fr;
        border-bottom: 1px solid var(--apply-border);
      }

      .summary-row:last-child {
        border-bottom: 0;
      }

      .summary-row dt,
      .summary-row dd {
        margin: 0;
        padding: 11px 13px;
        font-size: 14px;
      }

      .summary-row dt {
        background: var(--apply-surface);
        color: var(--apply-muted);
        font-weight: 800;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 720px) {
        .demo-bar,
        .form-head {
          display: block;
        }

        .theme-select {
          width: 100%;
          margin-top: 12px;
        }

        .stepper {
          margin-top: 18px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .select-row {
          grid-template-columns: 1fr;
        }

        .form-card {
          padding: 18px;
        }

        .actions {
          flex-direction: column-reverse;
        }

        .button {
          width: 100%;
        }

        .summary-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body data-theme="tesol">
    <main class="page">
      <div class="demo-bar">
        <h1 class="demo-title">신청서 삽입 예시</h1>
        <select class="theme-select" id="themeSelect" aria-label="테마 선택">
          <option value="tesol">TESOL 기본 테마</option>
          <option value="neutral">뉴트럴 테마</option>
          <option value="green">그린 테마</option>
          <option value="blue">블루 테마</option>
          <option value="teal">틸 테마</option>
          <option value="indigo">인디고 테마</option>
          <option value="rose">로즈 테마</option>
          <option value="amber">앰버 테마</option>
          <option value="mono">모노 테마</option>
          <option value="soft">소프트 테마</option>
          <option value="dark">다크 테마</option>
        </select>
      </div>

      <form class="apply-form" id="applyForm">
        <section class="form-card">
          <header class="form-head">
            <h2>신청서 <small>Application Form</small></h2>
            <div class="stepper" aria-label="진행 단계">
              <div class="step-dot is-active" data-step-dot="1">1</div>
              <div class="step-line" data-step-line="3"></div>
              <div class="step-dot" data-step-dot="3">✓</div>
            </div>
            <span></span>
          </header>

          <div class="step is-active" data-step="1">
            <div class="section">
              <p class="section-title">
                지원 구분 <small>Course</small><span class="required">*</span>
              </p>
              <div class="select-row">
                <label class="field">
                  <span class="field-label">과정 <small>Course Type</small><span class="required">*</span></span>
                  <select name="courseGroup" id="courseGroup" required>
                    <option value="">과정 선택</option>
                    <option value="일반과정">일반과정</option>
                    <option value="AI 과정">AI 과정</option>
                  </select>
                </label>
                <label class="field">
                  <span class="field-label">세부 과정 <small>Program</small><span class="required">*</span></span>
                  <select name="courseDetail" id="courseDetail" required>
                    <option value="">세부 과정 선택</option>
                  </select>
                </label>
                <label class="field">
                  <span class="field-label">신청 <small>Application</small><span class="required">*</span></span>
                  <select name="applicationType" id="applicationTypeSelect" required>
                    <option value="상담신청">상담신청</option>
                    <option value="레벨테스트">레벨테스트</option>
                    <option value="수업신청">수업신청</option>
                    <option value="설명회">설명회</option>
                    <option value="테스트 TIP">테스트 TIP</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="section">
              <p class="section-title">기본 인적사항 <small>Basic Information</small></p>
              <div class="grid">
                <label class="field">
                  <span class="field-label">성명 <small>Name</small><span class="required">*</span></span>
                  <input name="name" placeholder="성명 입력" required />
                </label>
                <label class="field">
                  <span class="field-label">연락처 <small>Phone</small><span class="required">*</span></span>
                  <input name="phone" id="phone" maxlength="13" placeholder="010-1234-5678" required />
                </label>
                <label class="field">
                  <span class="field-label">이메일 <small>E-mail</small><span class="required">*</span></span>
                  <input name="email" type="email" placeholder="example@email.com" required />
                </label>
                <label class="field">
                  <span class="field-label">생년월일 <small>Birth Date</small><span class="required">*</span></span>
                  <input name="birthDate" type="date" required />
                </label>
              </div>
            </div>

            <div class="section">
              <p class="section-title">
                내국인·외국인·재외국인 <small>Nationality</small><span class="required">*</span>
              </p>
              <div class="choices">
                <label class="choice">
                  <input type="radio" name="nationality" value="내국인" />
                  내국인 <small>Domestic</small>
                </label>
                <label class="choice">
                  <input type="radio" name="nationality" value="외국인" />
                  외국인 <small>Foreigner</small>
                </label>
                <label class="choice">
                  <input type="radio" name="nationality" value="재외국인" />
                  재외국인 <small>Overseas</small>
                </label>
              </div>
            </div>

          </div>

          <div class="step is-active" data-step="1">
            <div class="section">
              <div class="grid">
                <div class="field full">
                  <p class="field-label">직업 <small>Job</small><span class="required">*</span></p>
                  <div class="choices">
                    <label class="choice"><input type="checkbox" name="job" value="학생" /> 학생</label>
                    <label class="choice"><input type="checkbox" name="job" value="대학생" /> 대학생</label>
                    <label class="choice"><input type="checkbox" name="job" value="직장인" /> 직장인</label>
                    <label class="choice"><input type="checkbox" name="job" value="교사" /> 교사</label>
                    <label class="choice"><input type="checkbox" name="job" value="기타" /> 기타</label>
                  </div>
                </div>

                <div class="field full">
                  <p class="field-label">신청을 알게 된 경로 <small>Discovery Channel</small><span class="required">*</span></p>
                  <div class="choices">
                    <label class="choice"><input type="checkbox" name="channel" value="네이버 검색" /> 네이버 검색</label>
                    <label class="choice"><input type="checkbox" name="channel" value="인스타그램" /> 인스타그램</label>
                    <label class="choice"><input type="checkbox" name="channel" value="유튜브" /> 유튜브</label>
                    <label class="choice"><input type="checkbox" name="channel" value="지인 추천" /> 지인 추천</label>
                    <label class="choice"><input type="checkbox" name="channel" value="오프라인 안내" /> 오프라인 안내</label>
                    <label class="choice"><input type="checkbox" name="channel" value="기타" /> 기타</label>
                  </div>
                </div>
              </div>
            </div>

            <div class="section hidden" id="inquiryBox">
              <label class="field">
                <span class="field-label">문의 내용 <small>Inquiry Content</small><span class="required">*</span></span>
                <textarea name="inquiry" placeholder="문의하실 내용을 상세히 적어주세요."></textarea>
              </label>
            </div>

            <div class="section">
              <label class="field">
                <span class="field-label">자기소개 <small>Introduction</small><span class="required">*</span></span>
                <textarea name="introduction" placeholder="교육 참여 목적과 학습 목표를 간단히 적어주세요."></textarea>
              </label>
              <label class="consent">
                <input type="checkbox" name="privacy" />
                <span>개인정보제공 약관동의 <span class="required">*</span> <small>Privacy Policy Consent</small></span>
              </label>
            </div>

            <div class="actions">
              <button class="button" type="reset">취소 <small>Cancel</small></button>
              <button class="button primary" type="submit">제출하기</button>
            </div>
          </div>

          <div class="step" data-step="3">
            <div class="complete">
              <div class="complete-icon">✓</div>
              <h3>신청이 접수되었습니다</h3>
              <p>담당자가 신청 내용을 확인한 뒤 연락드릴 예정입니다.</p>
              <dl class="summary" id="summary"></dl>
              <button class="button primary" type="button" id="restartButton">새 신청서 작성</button>
            </div>
          </div>
        </section>
      </form>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const form = document.querySelector("#applyForm");
      const themeSelect = document.querySelector("#themeSelect");
      const courseGroup = document.querySelector("#courseGroup");
      const courseDetail = document.querySelector("#courseDetail");
      const applicationTypeSelect = document.querySelector("#applicationTypeSelect");
      const steps = [...document.querySelectorAll("[data-step]")];
      const dots = [...document.querySelectorAll("[data-step-dot]")];
      const lines = [...document.querySelectorAll("[data-step-line]")];
      const inquiryBox = document.querySelector("#inquiryBox");
      const phone = document.querySelector("#phone");
      const summary = document.querySelector("#summary");
      const courseDetails = {
        "일반과정": ["테솔", "영어 방과후 교사", "ITT 통역번역"],
        "AI 과정": ["AI프롬프트", "AI윤리", "AI 통역번역", "AI 방과후 교사"]
      };
      const applicationTypeAliases = {
        "설명회신청": "설명회",
        "테스트 TIP 신청": "테스트 TIP",
        "1:1문의": "상담신청"
      };
      let currentStep = 1;
      let applicationType = normalizeApplicationType(params.get("type") || "수업신청");
      const apiEndpoint = params.get("api") || "";

      function field(name) {
        return form.elements[name];
      }

      function selectedValues(name) {
        return [...form.querySelectorAll(`[name="${name}"]:checked`)].map((item) => item.value);
      }

      function selectedValue(name) {
        return form.querySelector(`[name="${name}"]:checked`)?.value || "";
      }

      function courseValue() {
        return [field("courseGroup").value, field("courseDetail").value].filter(Boolean).join(" / ");
      }

      function normalizeApplicationType(type) {
        return applicationTypeAliases[type] || type;
      }

      function setStep(step) {
        currentStep = step;
        steps.forEach((item) => item.classList.toggle("is-active", Number(item.dataset.step) === step));
        dots.forEach((dot) => dot.classList.toggle("is-active", Number(dot.dataset.stepDot) <= step));
        lines.forEach((line) => line.classList.toggle("is-active", Number(line.dataset.stepLine) <= step));
        notifyHeight();
      }

      function setApplicationType(type) {
        type = normalizeApplicationType(type);
        applicationType = type;
        applicationTypeSelect.value = type;
        inquiryBox.classList.toggle("hidden", type !== "상담신청");
        setStep(1);
      }

      function fillCourseDetails() {
        const group = courseGroup.value;
        const details = courseDetails[group] || [];
        const previous = courseDetail.value;
        courseDetail.innerHTML =
          '<option value="">세부 과정 선택</option>' +
          details.map((item) => `<option value="${item}">${item}</option>`).join("");
        if (details.includes(previous)) courseDetail.value = previous;
      }

      function applyInitialParams() {
        const theme = params.get("theme");
        if (theme) {
          document.body.dataset.theme = theme;
          themeSelect.value = theme;
        }

        const allowedTypes = params.get("allowedTypes");
        if (allowedTypes) {
          const allowed = allowedTypes.split(",").map((item) => normalizeApplicationType(item.trim()));
          [...applicationTypeSelect.options].forEach((option) => {
            option.hidden = !allowed.includes(option.value);
          });
          if (!allowed.includes(applicationType)) applicationType = allowed[0] || "수업신청";
        }

        setApplicationType(applicationType);
      }

      function validateStep1() {
        if (!field("applicationType").value) return alert("신청 유형을 선택해주세요.");
        if (!field("courseGroup").value) return alert("과정을 선택해주세요.");
        if (!field("courseDetail").value) return alert("세부 과정을 선택해주세요.");
        if (!field("name").value.trim()) return alert("이름을 입력해주세요.");
        if (!field("phone").value.trim()) return alert("연락처를 입력해주세요.");
        if (!field("email").checkValidity()) return alert("올바른 이메일을 입력해주세요.");
        if (!field("birthDate").value) return alert("생년월일을 입력해주세요.");
        if (!selectedValue("nationality")) return alert("국적 구분을 선택해주세요.");
        return true;
      }

      function validateStep2() {
        if (selectedValues("job").length === 0) return alert("직업을 1개 이상 선택해주세요.");
        if (selectedValues("channel").length === 0) return alert("신청 경로를 1개 이상 선택해주세요.");
        if (!field("introduction").value.trim()) return alert("자기소개를 입력해주세요.");
        if (!field("privacy").checked) return alert("개인정보제공 약관동의가 필요합니다.");

        if (applicationType === "상담신청" && !field("inquiry").value.trim()) {
          return alert("문의 내용을 입력해주세요.");
        }

        return true;
      }

      function createPayload() {
        const now = new Date();
        const appliedAt = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;

        return {
          applicant_id: crypto.randomUUID(),
          status: "pending",
          applied_at: appliedAt,
          basic: {
            name: field("name").value.trim(),
            email: field("email").value.trim(),
            phone: field("phone").value.trim(),
            birthDate: field("birthDate").value,
            course: courseValue(),
            job: selectedValues("job").join(", "),
            introduction: [
              field("introduction").value.trim(),
              `국적구분: ${selectedValue("nationality")}`,
              `신청경로: ${selectedValues("channel").join(", ")}`,
              field("inquiry").value.trim() ? `문의내용: ${field("inquiry").value.trim()}` : ""
            ].filter(Boolean).join("\n")
          },
          application: {
            available_languages: [applicationType],
            available_time: "미지정",
            experience: "미지정",
            occupation: selectedValues("channel"),
            education: selectedValue("nationality"),
            call_time: "신청 접수"
          },
          extra: {
            work_goals: [],
            language_certs: [],
            overseas_experience: "미지정",
            mt_experience: field("privacy").checked ? "약관동의 완료" : "약관동의 미완료"
          }
        };
      }

      async function submitPayload(payload) {
        if (!apiEndpoint) return { demo: true };

        const response = await fetch(apiEndpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`서버 오류: ${response.status}`);
        return response.json().catch(() => ({}));
      }

      function notifyHeight() {
        if (window.parent === window) return;
        window.parent.postMessage(
          {
            type: "tesol-apply-form:height",
            height: document.documentElement.scrollHeight
          },
          "*"
        );
      }

      function notifySubmit(payload) {
        if (window.parent === window) return;
        window.parent.postMessage(
          {
            type: "tesol-apply-form:submitted",
            applicationType: applicationType,
            payload: payload
          },
          "*"
        );
      }

      function renderSummary() {
        const rows = [
          ["신청 유형", applicationType],
          ["성명", field("name").value],
          ["지원 구분", courseValue()],
          ["연락처", field("phone").value]
        ];

        summary.innerHTML = rows
          .map(([label, value]) => `<div class="summary-row"><dt>${label}</dt><dd>${value}</dd></div>`)
          .join("");
      }

      themeSelect.addEventListener("change", () => {
        document.body.dataset.theme = themeSelect.value;
      });

      courseGroup.addEventListener("change", () => {
        fillCourseDetails();
        notifyHeight();
      });

      applicationTypeSelect.addEventListener("change", () => {
        setApplicationType(applicationTypeSelect.value);
      });

      phone.addEventListener("input", () => {
        const numbers = phone.value.replace(/\D/g, "").slice(0, 11);
        if (numbers.length <= 3) phone.value = numbers;
        else if (numbers.length <= 7) phone.value = `${numbers.slice(0, 3)}-${numbers.slice(3)}`;
        else phone.value = `${numbers.slice(0, 3)}-${numbers.slice(3, 7)}-${numbers.slice(7)}`;
      });

      document.querySelector("#restartButton").addEventListener("click", () => {
        form.reset();
        setApplicationType("수업신청");
        fillCourseDetails();
      });

      form.addEventListener("reset", () => {
        window.setTimeout(() => {
          setApplicationType("수업신청");
          fillCourseDetails();
        }, 0);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!validateStep1() || !validateStep2()) return;
        const payload = createPayload();
        submitPayload(payload)
          .then(() => {
            renderSummary();
            notifySubmit(payload);
            setStep(3);
          })
          .catch(() => {
            alert("제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
          });
      });

      fillCourseDetails();
      applyInitialParams();
      window.addEventListener("load", notifyHeight);
      window.addEventListener("resize", notifyHeight);
    </script>
  </body>
</html>
