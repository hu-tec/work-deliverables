  <script src="./data.js"></script>
  <script>
    (function () {
      const { NOTICES, findNotice, getParam, escapeHtml } = window.SiteData;
      const notice = findNotice(getParam("id"));
      const idx = NOTICES.findIndex((n) => n.id === notice.id);
      const prev = NOTICES[idx - 1], next = NOTICES[idx + 1];
      document.title = `${notice.title} | Times Education`;
      const filesHtml = notice.files.length
        ? `<div class="notice-files"><h4>첨부파일</h4>${notice.files.map((f) => `<a href="#">📎 ${escapeHtml(f.name)} (${escapeHtml(f.size)})</a>`).join("")}</div>` : "";
      document.getElementById("noticeView").innerHTML = `
        <div class="notice-view-head">
          <h2><span class="cat-badge" data-cat="${escapeHtml(notice.category)}">${escapeHtml(notice.category)}</span> ${escapeHtml(notice.title)}</h2>
          <div class="notice-view-meta"><span>작성자 ${escapeHtml(notice.writer)}</span><span>등록일 ${escapeHtml(notice.date)}</span><span>조회 ${notice.views.toLocaleString()}</span></div>
        </div>
        <div class="notice-view-body">${notice.body.map((p) => `<p>${escapeHtml(p)}</p>`).join("")}${filesHtml}</div>`;
      document.getElementById("noticeNavSlot").innerHTML = `<nav class="notice-nav">
        ${prev ? `<a href="./notice-detail.html?id=${encodeURIComponent(prev.id)}"><span class="dir">▲ 이전글</span><span>${escapeHtml(prev.title)}</span></a>` : `<a><span class="dir">▲ 이전글</span><span>이전 글이 없습니다.</span></a>`}
        ${next ? `<a href="./notice-detail.html?id=${encodeURIComponent(next.id)}"><span class="dir">▼ 다음글</span><span>${escapeHtml(next.title)}</span></a>` : `<a><span class="dir">▼ 다음글</span><span>다음 글이 없습니다.</span></a>`}
      </nav>`;
    })();
  </script>
  <script src="./site.js"></script>
</body>
</html>
