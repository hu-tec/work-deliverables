          "content": "# vibecoding 화면 분석 쉬운 설명\n\n작성일: 2026-05-21  \n분석 대상: `figma_pdf/vibecoding`  \n분석 기준: 폴더 내 파일 목록, `기본화면_파일업로드.jpg`, `Frame 758532606.jpg` 확인\n\n## 1. 한 줄 요약\n\n`vibecoding`은 전체 시험 사이트를 모두 설계한 자료가 아니라, **관리자가 많은 회원/시험 데이터를 한 화면에서 보고, 조건별로 걸러보고, 엑셀이나 파일로 일괄 처리하는 관리자용 대량 관리 화면**에 가깝다.\n\n쉽게 말하면, 쇼핑몰 관리자 페이지에서 주문 목록을 한꺼번에 보고 처리하듯이, 이 화면은 시험 플랫폼의 회원, 시험, 결제, 채점, 결과, 피드백 정보를 한 번에 모아 관리하려는 화면이다.\n\n## 2. 자료 구성\n\n`figma_pdf/vibecoding` 폴더에는 총 64개 파일이 있다.\n\n| 파일 종류 | 개수 | 의미 |\n|---|---:|---|\n| JPG | 2개 | 실제 화면을 크게 보여주는 대표 이미지 |\n| PDF | 16개 | `구분`, `구분-1` ~ `구분-14`, `제목 없음` 등 화면 일부 또는 상태별 PDF |\n| PNG | 46개 | 체크박스 UI 조각 이미지 |\n\n주요 파일은 다음과 같다.\n\n| 파일 | 역할 |\n|---|---|\n| `기본화면_파일업로드.jpg` | 핵심 관리자 화면. 검색, 필터, 탭, 대량 테이블, 엑셀 생성, 파일 올리기/다운로드가 보임 |\n| `Frame 758532606.jpg` | 매우 긴 가로 테이블 전체를 펼쳐 보여주는 이미지. 한 화면에 많은 컬럼이 있음을 보여줌 |\n| `구분.pdf`, `구분-1.pdf` ~ `구분-14.pdf` | 테이블 컬럼 또는 구분 조건을 나눠서 저장한 화면 조각으로 보임 |\n| `CheckBox*.png` | 필터 조건에서 쓰는 체크박스 상태 이미지 |\n\n## 3. 이 화면은 누가 쓰는가?\n\n이 화면의 주 사용자는 일반 수험생이 아니라 **관리자**다.\n\n관리자는 다음과 같은 일을 해야 한다.\n\n| 관리자 업무 | 화면에서 보이는 근거 |\n|---|---|\n| 회원을 검색한다 | 상단 검색창, 회원관리 제목 |\n| 회원을 조건별로 걸러본다 | 정회원, 일반회원, 전문가 여부, 성별, 가입경로, 알림 수신 등 체크박스 |\n| 시험 정보를 확인한다 | 시험명, 시험유형, 시험상태, 시험결과 관련 컬럼 |\n| 결제/접수 상태를 본다 | 접수구분, 시험접수기간, 결제/정산 관련 탭 |\n| 대량 데이터를 엑셀로 만든다 | `엑셀파일생성` 버튼 |\n| 파일을 올리거나 내려받는다 | `파일올리기`, `파일다운로드` 버튼 |\n| 선택한 사람에게 연락한다 | `SMS전송`, 알림 설정 컬럼 |\n\n즉, 이 화면은 “사용자가 시험을 보는 화면”이 아니라 “운영자가 수많은 데이터를 관리하는 화면”이다.\n\n## 4. 화면을 쉽게 풀어 설명\n\n`기본화면_파일업로드.jpg`를 보면 화면은 크게 여섯 영역으로 나뉜다.\n\n| 영역 | 쉬운 설명 |\n|---|---|\n| 왼쪽 아이콘 메뉴 | 홈, 회원, 학습/시험, 설정 같은 주요 관리 메뉴로 이동하는 곳 |\n| 상단 검색/계정 영역 | 검색창, 관리자 이름, 로그아웃이 있는 곳 |\n| 페이지 제목과 탭 | 현재 `회원관리` 화면이며, 전체/회원관리/활동관리/결제관리/1:1문의 관리/통계 탭으로 구분됨 |\n| 검색 조건 영역 | 원하는 사람이나 시험만 찾기 위해 체크박스, 카테고리, 날짜, 검색어를 선택하는 곳 |\n| 전체 정보 테이블 | 회원 정보와 시험 정보를 한 줄씩 보여주는 핵심 목록 |\n| 하단/우측 버튼 | 선택삭제, 메일 보내기, SMS 전송, 파일 다운로드 같은 일괄 작업 버튼 |\n\n## 5. 탭 구조\n\n화면 상단에는 다음 탭이 있다.\n\n| 탭 | 의미 |\n|---|---|\n| 전체 | 회원, 활동, 결제, 문의, 통계를 한 화면에서 통합 조회 |\n| 회원관리 | 회원 기본 정보 관리 |\n| 활동관리 | 회원의 시험 접수, 응시, 결과, 활동 이력 관리 |\n| 결제관리 | 결제 상태, 결제 내역, 정산 정보 관리 |\n| 1:1 문의 관리 | 회원 문의와 답변 상태 관리 |\n| 통계 | 회원/시험/결제/결과 데이터를 통계로 확인 |\n\n이 탭 구조는 “한 사람을 기준으로 관련 정보를 모두 보는 관리자 화면”에 적합하다. 예를 들어 어떤 회원을 찾은 뒤, 그 회원이 어떤 시험을 봤는지, 결제는 했는지, 문의는 남겼는지, 결과는 어떤지를 한 화면에서 이어서 볼 수 있다.\n\n## 6. 검색 조건의 의미\n\n검색 조건 영역에는 체크박스가 매우 많다. 일반 사용자에게 쉽게 설명하면, 이 부분은 “원하는 사람만 골라보기 위한 필터”다.\n\n예시는 다음과 같다.\n\n| 조건 종류 | 화면에서 보이는 예 | 의미 |\n|---|---|---|\n| 회원 구분 | 정식회원, 일반회원, 전문가 | 어떤 종류의 회원인지 선택 |\n| 성별 | 남, 여 | 성별 기준으로 조회 |\n| 회원 등급/상품 | 프리미엄, 스탠다드, 베이직, 없음 | 회원이 어떤 상품 또는 등급을 사용하는지 확인 |\n| 알림 수신 | 문자, 이메일, 카카오톡, 없음 | 어떤 연락 수단을 허용했는지 확인 |\n| 가입 경로 | 네이버, 카카오, 구글 | 어떤 경로로 가입했는지 확인 |\n| 에디터 유형 | 문서생성 에디터, 영상 에디터, 기타 에디터 등 | 회원이 사용하는 작업 도구 또는 기능 유형 |\n| 시험 상태 | 검증요청, 수정요청, 게시완료, 취소 | 시험 또는 작업의 진행 상태 |\n| 날짜 | 시작일, 종료일 | 특정 기간의 데이터만 조회 |\n| 카테고리 | 대/중/소 카테고리 | 시험이나 작업의 분류 기준 |\n\n체크박스 PNG가 많이 들어 있는 이유도 이 화면의 필터 조건이 많기 때문이다.\n\n## 7. 테이블에 들어 있는 정보\n\n화면 하단의 큰 테이블은 이 시안의 핵심이다. 한 행은 한 명의 회원 또는 한 건의 시험/접수 기록을 의미한다.\n\n테이블에서 확인되는 정보는 크게 다섯 묶음으로 나눌 수 있다.\n\n### 7.1 회원 기본 정보\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 번호 | 목록 순서 |\n| 회원 관련 번호 | 회원을 식별하는 고유 번호 |\n| 사이트 구분 | 어느 사이트/서비스의 회원인지 |\n| 회원 유형 | 정식회원, 일반회원, 프리미엄 등 |\n| 이름/나이/성별 | 회원 기본 인적 정보 |\n| 이메일/휴대폰 | 연락처 |\n| 주소 | 거주지 또는 배송지 |\n| 그룹 여부 | 특정 그룹에 포함되어 있는지 |\n| 가입일/가입 채널 | 언제, 어디서 가입했는지 |\n| 최근 로그인 | 마지막 접속 정보 |\n| 사진 | 회원 이미지 또는 프로필 |\n| 알림 설정 | 문자/이메일/카카오톡 수신 여부 |\n\n### 7.2 활동 및 서비스 정보\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 활동 관련 번호 | 활동 이력 또는 서비스 이용 이력 |\n| 서비스 유형 | 어떤 서비스를 이용하는지 |\n| 지역 | 서비스나 시험이 진행되는 지역 |\n| 시험일시 | 시험 날짜와 시간 |\n| 접수구분 | 정시, 추가접수 등 접수 종류 |\n| 시험 종목/등급 | 어떤 시험을 보는지 |\n| 검정과목 | 시험 과목 |\n| 시험명 | 실제 시험 이름 |\n| 출발어/도착어 | 번역 시험에서 사용하는 언어 |\n| 시험 유형 | 시험의 형태 |\n\n### 7.3 접수 및 시험 진행 정보\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 접수기간 | 신청 가능한 기간 |\n| 시험 상태 | 시험 시작, 미응시, 진행 중 등 |\n| 성적 발표일 | 결과가 공개되는 날짜 |\n| 시험 결과 | 합격, 불합격, 점수 |\n| 채점 점수 | 채점자가 부여한 점수 |\n| 피드백 | 채점 의견 또는 관리자 의견 |\n\n### 7.4 결제/정산 정보\n\n`기본화면_파일업로드.jpg`에서는 결제관리 탭이 있고, 2024 자료와 비교하면 정산/결제 정보가 함께 묶이는 구조로 보인다.\n\n예상되는 정보는 다음과 같다.\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 결제 여부 | 결제가 되었는지 |\n| 결제 금액 | 시험비 또는 서비스 비용 |\n| 결제 수단 | 카드, 포인트, 기타 |\n| 정산 상태 | 정산 완료/대기 여부 |\n| 환불 상태 | 환불 요청 또는 완료 여부 |\n\n### 7.5 문의/통계 정보\n\n탭에 `1:1 문의 관리`, `통계`가 있기 때문에 회원별 문의 이력과 통계 정보도 같은 화면에서 연결될 수 있다.\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 문의 여부 | 회원이 문의를 남겼는지 |\n| 답변 상태 | 답변 대기/답변 완료 |\n| 통계 | 접수 수, 응시 수, 합격률, 결제 현황 등 |\n\n## 8. 파일 업로드 기능의 의미\n\n파일명에 `파일업로드`가 들어가고, 화면 오른쪽에 `파일올리기`, `파일다운로드`, `엑셀파일생성` 버튼이 보인다.\n\n이 기능은 다음 용도로 쓰일 가능성이 높다.\n\n| 기능 | 쉬운 설명 |\n|---|---|\n| 엑셀 업로드 | 회원 목록이나 시험 접수 목록을 엑셀로 한 번에 등록 |\n| 엑셀 다운로드 | 현재 조회된 목록을 엑셀 파일로 내려받기 |\n| 엑셀파일생성 | 선택한 데이터로 관리용 엑셀 파일 생성 |\n| 파일올리기 | 시험 자료, 회원 자료, 결과 자료 등을 업로드 |\n| 파일다운로드 | 등록된 자료나 결과 파일을 다운로드 |\n\n일반적인 관리자 업무에서는 수백 명의 회원이나 시험 접수자를 하나씩 입력하기 어렵다. 그래서 엑셀 파일을 올려 한 번에 처리하거나, 현재 목록을 엑셀로 내려받아 검토하는 기능이 필요하다.\n\n## 9. `구분` 화면들의 의미\n\n`구분.pdf`, `구분-1.pdf`부터 `구분-14.pdf`까지 많은 PDF가 있다. 이름만 보면 모두 같은 “구분” 계열이다.\n\n여기서 `구분`은 다음 두 가지 의미로 해석할 수 있다.\n\n| 해석 | 설명 |\n|---|---|\n| 분류 기준 | 회원, 시험, 결제, 문의, 통계 등을 나누는 기준 |\n| 테이블 구간 | 너무 넓은 테이블을 여러 부분으로 나눠 보여주는 구간 |\n\n`Frame 758532606.jpg`가 아주 긴 가로 테이블을 보여주기 때문에, `구분-*` PDF들은 이 긴 테이블의 컬럼 묶음을 나눠 저장한 산출물일 가능성이 높다.\n\n쉽게 말하면, 하나의 엑셀 파일에 열이 너무 많아서 가로로 길게 펼쳐진 상태라고 보면 된다. `구분-1`, `구분-2` 같은 파일은 그 엑셀의 일부 구간을 잘라낸 화면일 수 있다.\n\n## 10. 2024 자료와의 관계\n\n`vibecoding`은 2024 전체 사이트맵 중 일부 기능만 떼어낸 것처럼 보인다.\n\n| 2024 전체 자료 | vibecoding 자료 |\n|---|---|\n| 시험 플랫폼 전체 화면 포함 | 파일 업로드/대량 테이블 관리 중심 |\n| 수험생, 출제자, 채점자, 관리자 화면 모두 포함 | 관리자 화면 중심 |\n| 로그인, 회원가입, 시험응시, 출제, 채점, 결제, 문의 등 전체 범위 | 회원관리, 활동관리, 결제관리, 문의관리, 통계를 한 화면에 통합 |\n| 여러 업무 화면이 나뉘어 있음 | 한 화면에 많은 정보를 모아 보는 방식 |\n\n따라서 `vibecoding`은 독립된 새 사이트라기보다, **관리자가 데이터를 더 빠르게 보고 처리하기 위한 고밀도 관리자 화면 실험안**으로 보는 것이 적절하다.\n\n## 11. 이 화면의 장점\n\n| 장점 | 설명 |\n|---|---|\n| 한 화면에서 많은 정보를 볼 수 있음 | 회원, 시험, 접수, 결과, 피드백 등을 한 테이블에서 확인 |\n| 조건 검색이 강함 | 체크박스와 카테고리로 원하는 대상만 빠르게 조회 |\n| 대량 작업에 적합함 | 선택삭제, 메일, SMS, 엑셀 생성, 파일 업로드/다운로드 가능 |\n| 운영자가 업무 흐름을 빠르게 파악 가능 | 시험 상태, 결과, 미응시, 합격/불합격 등을 목록에서 바로 확인 |\n| 엑셀 기반 업무와 잘 맞음 | 실제 운영 현장에서 자주 쓰는 엑셀 업로드/다운로드 흐름과 연결 |\n\n## 12. 이 화면의 위험하거나 어려운 점\n\n이 화면은 관리자에게는 강력하지만, 그대로 만들면 사용하기 어려울 수도 있다.\n\n| 문제 | 쉬운 설명 | 개선 방향 |\n|---|---|---|\n| 컬럼이 너무 많음 | 한 줄에 정보가 너무 많아 읽기 어렵다 | 컬럼 그룹화, 고정 컬럼, 보기 설정 필요 |\n| 체크박스가 너무 많음 | 처음 보는 사람은 어떤 조건을 골라야 할지 헷갈린다 | 자주 쓰는 필터와 상세 필터를 분리 |\n| 가로 스크롤이 길다 | 오른쪽 끝 정보를 보려면 계속 이동해야 한다 | 회원정보/시험정보/결제정보/결과정보 탭 분리 |\n| 권한 관리가 중요함 | 개인정보와 결제정보가 한 화면에 함께 보인다 | 관리자 권한별로 볼 수 있는 컬럼 제한 |\n| 실수 위험이 있음 | 선택삭제, 파일 업로드 같은 기능은 대량 변경을 일으킨다 | 확인 팝업, 작업 이력, 되돌리기 정책 필요 |\n\n## 13. 일반 사용자를 위한 비유\n\n이 화면은 일반적인 웹사이트 화면이라기보다 **관리자용 엑셀 대시보드**에 가깝다.\n\n예를 들어 학원에서 수강생을 관리한다고 생각하면 쉽다.\n\n1. 수강생 목록을 본다.\n2. 정회원인지, 결제를 했는지, 시험을 봤는지 확인한다.\n3. 특정 조건의 학생만 검색한다.\n4. 필요한 학생에게 문자나 메일을 보낸다.\n5. 엑셀로 내려받아 보고서를 만든다.\n6. 새 명단을 파일로 올려 한 번에 반영한다.\n\n`vibecoding` 화면도 이와 비슷하다. 다만 대상이 수강생이 아니라 시험 플랫폼의 회원, 시험 접수자, 응시자, 출제/채점/결제 데이터라는 점이 다르다.\n\n## 14. 기능 정의\n\n이 시안을 실제 기능으로 정의하면 다음과 같다.\n\n| 기능명 | 설명 |\n|---|---|\n| 통합 회원 조회 | 회원 기본정보, 가입정보, 연락처, 알림 설정을 조회 |\n| 조건 필터 | 회원 유형, 성별, 가입경로, 상품/등급, 시험 상태, 날짜 등으로 검색 |\n| 통합 활동 조회 | 회원의 시험 접수, 응시, 결과, 피드백 정보를 함께 조회 |\n| 결제 연계 조회 | 결제 상태, 정산 상태, 환불 상태를 확인 |\n| 문의 연계 조회 | 회원의 1:1 문의 상태를 확인 |\n| 대량 선택 | 여러 행을 체크해서 한 번에 처리 |\n| 선택 삭제 | 선택한 목록을 삭제 또는 제외 처리 |\n| 메일/SMS 발송 | 선택한 회원에게 안내 발송 |\n| 엑셀 생성 | 현재 데이터 또는 선택 데이터를 엑셀로 생성 |\n| 파일 업로드 | 외부 파일을 올려 데이터를 등록/갱신 |\n| 파일 다운로드 | 조회 결과 또는 첨부 파일 다운로드 |\n| 상태 배지 표시 | 합격, 불합격, 접수완료, 미응시 같은 상태를 색상으로 표시 |\n\n## 15. 구현할 때 추천하는 화면 구조\n\n현재 시안은 한 화면에 모든 정보를 보여주려는 성격이 강하다. 실제 서비스에서는 다음처럼 나누면 더 이해하기 쉽다.\n\n| 추천 화면 | 포함 내용 |\n|---|---|\n| 회원 기본정보 탭 | 이름, 연락처, 가입일, 회원유형, 알림설정 |\n| 시험/활동 탭 | 접수 시험, 시험일, 응시상태, 시험결과 |\n| 결제 탭 | 결제금액, 결제수단, 환불, 정산 |\n| 문의 탭 | 1:1문의, 답변상태, 문의일 |\n| 통계 탭 | 응시율, 합격률, 매출, 회원 증가 |\n| 파일관리 탭 | 엑셀 업로드, 다운로드, 업로드 이력 |\n\n이렇게 나누면 초보 관리자도 화면을 이해하기 쉽고, 개인정보와 결제정보 접근 권한도 더 안전하게 나눌 수 있다.\n\n## 16. 최종 판단\n\n`vibecoding`은 2024 전체 사이트의 대체안이 아니라, **관리자 업무를 빠르게 처리하기 위한 고밀도 통합 관리 화면**이다.\n\n핵심은 다음 세 가지다.\n\n1. 많은 데이터를 한 번에 본다.\n2. 원하는 조건으로 빠르게 걸러본다.\n3. 엑셀/파일/SMS/메일로 대량 처리한다.\n\n따라서 이 자료는 사이트맵의 최상위 기준으로 쓰기보다는, 2024 관리자 화면 중 `회원관리`, `활동관리`, `결제관리`, `1:1문의 관리`, `통계`, `파일 업로드` 기능을 구현할 때 참고하는 세부 관리자 화면 시안으로 쓰는 것이 적절하다.\n\n## 17. 한계\n\n현재 환경에는 PDF 렌더링/OCR 도구가 없어 `구분-*` PDF 내부의 모든 텍스트를 직접 추출하지는 못했다. 이 문서는 확인 가능한 JPG 화면과 파일명 기준 분석이다. 다만 `기본화면_파일업로드.jpg`와 `Frame 758532606.jpg`만으로도 화면의 목적과 주요 기능은 충분히 파악된다.\n\n## 18. UX/UI 관점 보완\n\n`vibecoding` 화면은 기능이 많고 정보량이 매우 크다. 숙련된 관리자에게는 빠르지만, 처음 쓰는 관리자에게는 복잡하게 느껴질 가능성이 높다. 따라서 “모든 정보를 한 번에 보여주는 화면”이 아니라 “필요한 정보를 단계적으로 펼치는 화면”으로 다듬는 것이 좋다.\n\n### 18.1 정보 구조 개선\n\n| 현재 문제 | 개선 방향 |\n|---|---|\n| 한 테이블에 회원, 시험, 결제, 결과, 피드백이 모두 들어감 | 컬럼 그룹을 `회원정보`, `시험정보`, `결제정보`, `결과정보`, `문의/피드백`으로 나눈다. |\n| 가로 스크롤이 매우 김 | 회원명, 회원번호, 상태 같은 핵심 열은 왼쪽에 고정한다. |\n| 필터 체크박스가 너무 많음 | 기본 필터와 상세 필터를 접고 펼칠 수 있게 한다. |\n| 상태값이 많아 의미 파악이 어려움 | 색상 배지와 짧은 설명을 함께 제공한다. |\n| 대량 작업 버튼이 한곳에 모여 있음 | 위험도에 따라 `조회`, `발송`, `파일`, `삭제` 작업을 분리한다. |\n\n### 18.2 관리자 사용 흐름\n\n1. 검색어 또는 기본 필터로 대상을 찾는다.\n2. 필요한 컬럼 그룹만 켠다.\n3. 목록에서 상태 이상 또는 미처리 항목을 확인한다.\n4. 개별 상세를 열어 정확한 내용을 확인한다.\n5. 필요한 경우 선택 항목에 대해 메일/SMS/파일 다운로드를 수행한다.\n6. 대량 변경이 필요한 경우 업로드 전 미리보기와 검증 결과를 확인한다.\n\n### 18.3 파일 업로드 UX\n\n파일 업로드 기능은 실수하면 많은 데이터가 한 번에 바뀔 수 있으므로 안전장치가 필요하다.\n\n| 단계 | 필요한 화면 요소 |\n|---|---|\n| 업로드 전 | 허용 파일 형식, 샘플 파일 다운로드, 필수 컬럼 안내 |\n| 업로드 직후 | 파일명, 행 수, 오류 행 수, 중복 데이터 수 표시 |\n| 반영 전 | 변경될 데이터 미리보기, 추가/수정/삭제 건수 구분 |\n| 반영 확인 | 최종 확인 팝업, 관리자 비밀번호 또는 2차 확인 |\n| 반영 후 | 처리 결과, 실패 항목 다운로드, 작업 이력 저장 |\n\n### 18.4 접근성 및 개인정보\n\n| 항목 | 권장 기준 |\n|---|---|\n| 개인정보 | 기본 목록에서는 일부 마스킹하고, 상세 권한이 있는 관리자만 전체 보기 |\n| 결제정보 | 결제 금액과 상태는 표시하되 결제수단 상세는 권한별 제한 |\n| 시험결과 | 합격/불합격과 점수는 역할 권한에 따라 노출 |\n| 대량 다운로드 | 다운로드 사유 입력과 로그 기록 |\n| SMS/메일 발송 | 발송 대상 수, 발송 내용 미리보기, 테스트 발송 제공 |\n"

          "content": "# 재사용 디자인 프롬프트 문서목록\n\n이 폴더는 현재 `design_system_major`를 다른 프로젝트나 다른 화면 제작에 재사용하기 위한 기준 프롬프트 모음이다.\n\n목표는 동일한 입력을 주었을 때 사용자 화면과 BO 테이블 화면이 같은 톤, 밀도, 컴포넌트 구조로 생성되게 하는 것이다.\n\n## 폴더 구조\n\n| 폴더 | 용도 | 먼저 볼 문서 |\n|---|---|---|\n| `사용자/` | 사용자 화면, 서비스 소개, 신청/안내 화면 제작 기준 | `사용자/00_문서목록.md` |\n| `관리자/` | BO 관리자 화면, 대량 테이블, 검색필터, inline Drawer 제작 기준 | `관리자/00_문서목록.md` |\n\n## 사용자 문서\n\n| 문서 | 기준 파일 | 용도 |\n|---|---|\n| `사용자/01_사용자화면_디자인시스템_기준.md` | `index.html`, `layout.css`, `common.js`, `dense-drawer.css`, `dense-drawer.js` | 사용자 화면, 서비스 소개 화면, 신청/안내 화면 제작 기준 |\n\n## 관리자 문서\n\n| 문서 | 기준 파일 | 용도 |\n|---|---|---|\n| `관리자/02_BO_테이블레이아웃_기준.md` | `table_design/*.html`, `table_design/table-design.css`, `table_design/table-design.js` | 관리자/BO 대량 테이블, 검색필터, inline Drawer 제작 기준 |\n| `관리자/03_BO_관리자화면_기준.md` | `index.html`, `dense-drawer.*`, `table_design/*` | BO 관리자 화면 전체 shell, 업무 전환, 액션, 상세 편집 기준 |\n| `관리자/04_BO_관리자용_레이아웃_기준.md` | `index.html`, `dense-drawer.css`, `table_design/table-design.css` | 4단 그리드, 밀도 높은 업무 패널, BO 대시보드/상세 배치 기준 |\n\n## 관리자 컴포넌트 문서\n\n| 문서 | 용도 |\n|---|---|\n| `관리자/components/상태_유형_칩_기준.md` | 상태값, 유형값, 구독/등급/결제수단 같은 반복값을 chip/pill로 표시하는 기준 |\n| `관리자/components/검색필터_기준.md` | 사용자 화면 필터와 BO 고밀도 검색조건 구성 기준 |\n| `관리자/components/인라인_Drawer_기준.md` | 행 클릭 상세, 우측 inline Drawer, 넓게보기 상세 작업영역 기준 |\n| `관리자/components/테이블선택_Drawer_상세패널_기준.md` | 테이블 행 선택 후 열리는 상세 작업 패널, 상태 UI, 고정/변동 정보 기준 |\n\n## 사용 순서\n\n1. 사용자 화면을 만들 때는 `사용자/01_사용자화면_디자인시스템_기준.md`를 먼저 적용한다.\n2. 관리자 화면 전체를 만들 때는 `관리자/03_BO_관리자화면_기준.md`를 먼저 적용한다.\n3. 관리자 대시보드나 상세 작업 레이아웃은 `관리자/04_BO_관리자용_레이아웃_기준.md`를 함께 적용한다.\n4. 관리자 대량 테이블 화면을 만들 때는 `관리자/02_BO_테이블레이아웃_기준.md`를 함께 적용한다.\n5. 상태/유형/필터/Drawer가 필요한 관리자 화면은 `관리자/components` 문서를 함께 적용한다.\n6. 테이블 행 선택 후 상세 작업을 처리하는 화면은 `관리자/components/테이블선택_Drawer_상세패널_기준.md`를 함께 적용한다.\n7. 새 프로젝트에 복사할 때는 이 폴더 전체를 기준 프롬프트로 전달한다.\n\n## 공통 금지\n\n- 기준 파일에 없는 새로운 색상 팔레트를 임의로 만들지 않는다.\n- 큰 카드, 과한 radius, 넓은 여백, 마케팅식 장식을 BO 테이블 화면에 적용하지 않는다.\n- 상태값을 색상 텍스트만으로 표시하지 않는다.\n- 날짜와 카운트 표기 형식을 화면마다 다르게 쓰지 않는다.\n- 사용자 화면과 관리자 화면의 밀도, 글자 크기, 정보 구조를 섞지 않는다.\n"

          "date": "2026-06-04",
          "content": "# 관리자 재사용 디자인 프롬프트\n\nBO 관리자 화면, 대량 테이블, 검색조건, inline Drawer를 만들 때 쓰는 최종 기준 문서다.\n\n## 기준 문서\n\n| 문서 | 용도 |\n|---|---|\n| `03_BO_관리자화면_기준.md` | 관리자 화면 전체 shell, 업무 전환, 액션, 상세 편집 기준 |\n| `04_BO_관리자용_레이아웃_기준.md` | 4단 그리드, 고밀도 업무 패널, 대시보드/상세 배치 기준 |\n| `02_BO_테이블레이아웃_기준.md` | 대량 테이블, 검색필터, inline Drawer 테이블 화면 기준 |\n\n## 컴포넌트 문서\n\n| 문서 | 용도 |\n|---|---|\n| `components/검색필터_기준.md` | 고밀도 검색조건과 필터 그룹 구성 기준 |\n| `components/상태_유형_칩_기준.md` | 상태값, 유형값, 구독/등급/결제수단 표시 기준 |\n| `components/인라인_Drawer_기준.md` | 행 클릭 상세, 우측 inline Drawer, 넓게보기 작업영역 기준 |\n| `components/테이블선택_Drawer_상세패널_기준.md` | 테이블 행 선택 후 열리는 상세 작업 패널, 상태 UI, 고정/변동 정보 기준 |\n\n## 사용 순서\n\n1. 관리자 화면 전체를 만들 때는 `03_BO_관리자화면_기준.md`를 먼저 적용한다.\n2. 대시보드나 상세 작업 화면이면 `04_BO_관리자용_레이아웃_기준.md`를 함께 적용한다.\n3. 대량 목록/검색/상세 테이블이면 `02_BO_테이블레이아웃_기준.md`를 함께 적용한다.\n4. 상태/유형/필터/Drawer가 있으면 `components` 문서를 같이 적용한다.\n5. 테이블 행 선택 후 상담/시험/결제/정산을 처리하는 상세 패널은 `components/테이블선택_Drawer_상세패널_기준.md`를 우선 적용한다.\n"

          "section": "디자인시스템",
          "title": "02 BO 테이블레이아웃 기준",
          "path": "디자인시스템/docs/재사용_디자인_프롬프트/관리자/02_BO_테이블레이아웃_기준.md",
          "date": "2026-06-04",
          "content": "# BO 테이블레이아웃 기준 프롬프트\n\n기준 파일: `table_design/관리자패널_전체회원.html`, `table_design/신규테이블관리.html`, `table_design/결제관리.html`, `table_design/table-design.css`, `table_design/table-design.js`\n\n이 문서는 관리자/BO 화면에서 대량 데이터를 검색, 비교, 편집하는 테이블 페이지를 만들 때 적용한다.\n\n## 실행 프롬프트\n\n```text\n너는 BO 관리자 화면을 설계하는 시니어 UI 디자이너이자 프론트엔드 설계자다.\n\n반드시 아래 기준 파일의 구조와 밀도를 따른다.\n- table_design/관리자패널_전체회원.html\n- table_design/신규테이블관리.html\n- table_design/결제관리.html\n- table_design/table-design.css\n- table_design/table-design.js\n\n화면 목적:\n- 운영자가 많은 행을 한 화면에서 빠르게 검색, 비교, 선택, 상세 확인, 일괄 처리할 수 있게 한다.\n- 사용자용 랜딩페이지나 마케팅 페이지처럼 만들지 않는다.\n\n전체 레이아웃:\n1. 좌측 Sidebar\n   - 업무 메뉴를 세로로 배치한다.\n   - 현재 메뉴는 active로 표시한다.\n   - 메뉴 아이콘은 Font Awesome 또는 기존 아이콘 체계를 사용한다.\n\n2. Topbar\n   - 현재 위치/업무명과 저장, 추가, 내보내기, 컬럼설정 같은 업무 action을 배치한다.\n   - 높이는 약 48px 기준으로 유지한다.\n\n3. Page Head\n   - breadcrumb, H1, 짧은 meta 문구를 둔다.\n   - H1은 `전체 회원 관리`, `결제 관리`, `신규 테이블 관리`처럼 운영 업무명을 쓴다.\n\n4. Major Tabs\n   - 사이트/업무 대분류 기준으로 구성한다.\n   - 라벨은 반드시 `전체 (50명)`, `AI번역 (13건)`처럼 괄호 카운트를 포함한다.\n\n5. Sub Tabs\n   - 테이블 종류 또는 세부 업무 기준으로 구성한다.\n   - 라벨은 반드시 `전체 회원 (전체 50명)`, `결제 내역 (전체 28건)`처럼 표기한다.\n\n6. Dense Filter\n   - `dense-filter-card`, `dense-search-main`, `dense-filter-flow`, `dense-filter-group`, `filter-chip`, `dense-check`, `dense-active-filters` 구조를 사용한다.\n   - 조건명은 고정 폭을 강제하지 않고, 화면 폭과 조건명 길이에 맞게 자연스럽게 배치한다.\n   - 옵션은 flex-wrap으로 조밀하게 배치한다.\n   - 날짜 조건은 한 줄 유지와 가로 스크롤을 허용한다.\n   - 선택된 조건은 `filter-tag`로 요약한다.\n\n7. Summary Strip\n   - 카드형 요약 박스 대신 한 줄 summary strip을 사용한다.\n   - 예: `회원 50명`, `결제 28건`, `매칭 26건`\n\n8. Table Card\n   - `table-card`, `table-headbar`, `table-wrap`, `table-section` 구조를 사용한다.\n   - 하위 탭별 테이블은 `table-section`으로 분리하고 active 섹션만 보인다.\n\n9. Inline Detail Drawer\n   - 행 클릭 시 우측 inline Drawer를 연다.\n   - Overlay modal이 아니라 `table-workspace` 안에서 테이블 오른쪽 컬럼으로 붙는다.\n   - 자세한 기준은 `components/인라인_Drawer_기준.md`를 따른다.\n\n테이블 밀도:\n- BO 테이블 기본 글자 크기는 8px 기준이다.\n- BO 테이블 제목셀은 10px로 한다.\n- 테이블 헤더, 본문 셀, 보조 텍스트, badge, status, filter chip, checkbox label 모두 8px 기준으로 맞춘다.\n- 헤더 높이는 약 42px, 본문 행 높이는 약 48~52px를 유지한다.\n- 날짜는 `YY-MM-DD`로 표기한다. 시간이 필요한 로그만 `YY-MM-DD HH:mm`을 쓴다.\n- 테이블은 넓으면 가로 스크롤을 허용한다.\n\n컬럼 묶음 원칙:\n- 컬럼 수를 늘리기보다 관련 정보를 2줄 셀로 묶는다.\n- 임의의 정보가 주어지면 먼저 각 항목의 업무 의미, 비교 빈도, 편집 단위, 표시 길이를 판단한 뒤 묶는다.\n- 같은 사람/대상에 속한 식별 정보는 묶는다. 예: 이름, 나이, 성별 / 회원명, 관리번호 / 의뢰인, 연락처\n- 같은 연락 경로 또는 위치 정보는 묶는다. 예: 이메일, 휴대폰 / 주소, 국가 / 지역, 지점\n- 같은 상태 흐름에 속한 값은 묶는다. 예: 결제상태, 결제수단 / 매칭상태, 배정상태 / 진행상태, 마감일\n- 같은 시간 축에 있는 값은 묶는다. 예: 가입일, 채널 / 등록일, 수정일 / 결제일, 환불일 / 최근 로그인, 체류시간\n- 같은 금액 계산에 쓰이는 값은 묶는다. 예: 금액, 수수료 / 결제금액, 환불금액 / 정산액, 미정산액\n- 같은 상품/서비스 분류 값은 묶는다. 예: 상품, 서비스 / 유형, 카테고리 / 언어, 분야\n- 운영자가 독립적으로 정렬, 필터, 일괄 선택해야 하는 핵심 값은 무리하게 묶지 않는다. 예: 상태, 담당자, 결제일, 금액, 등급이 화면의 주요 비교 기준이면 별도 컬럼으로 둔다.\n- 한 셀에 3개 이상 성격이 다른 값을 넣지 않는다. 2줄을 기본으로 하고, 보조값은 작은 badge 또는 muted text로만 제한한다.\n- 값 길이가 긴 항목끼리는 묶지 않는다. 긴 주소, 긴 상품명, 긴 메모는 다른 긴 텍스트와 합치지 않고 ellipsis 또는 Drawer 상세로 보낸다.\n- 판단이 애매하면 `주요값 / 보조값` 구조로 둔다. 1줄에는 식별·비교에 필요한 주요값, 2줄에는 상태·출처·날짜 같은 보조값을 배치한다.\n- 이름 / 나이·성별\n- 이메일 / 휴대폰\n- 주소 / 국가\n- 회원유형 / 구독\n- 가입일 / 채널\n- 최근 로그인 / 체류시간\n- 전문가 / 레벨·평점\n- 매칭 / 상태\n- 결제상태 / 수단\n- 상품 / 서비스\n- 금액 / 수수료\n- 등록일 / 수정일\n- 상태 / 담당자\n\n상태/유형 표시:\n- 반복되는 상태와 유형은 텍스트 색상만으로 표시하지 않는다.\n- `.status.ok`, `.status.wait`, `.status.fail`, `.status.info`를 사용한다.\n- 상태 chip은 상태 점, 연한 배경, border, 텍스트를 함께 가진다.\n- 결제수단, 서비스유형, 구독등급, 우선순위는 `badge` 또는 보조 chip으로 표시한다.\n- 자세한 기준은 `components/상태_유형_칩_기준.md`를 따른다.\n\n행 상호작용:\n- 행 전체를 클릭 대상으로 만든다.\n- 선택된 행은 연한 primary 배경과 좌측 primary 인디케이터로 표시한다.\n- 체크박스 선택 컬럼과 관리번호/ID 컬럼은 좌측 고정처럼 보이게 한다.\n- 포커스 가능한 행은 focus-visible outline을 제공한다.\n\n하단 일괄 액션:\n- 선택 건수, 선택정보내기, 이메일/SMS 전송, 상태변경, 엑셀 내보내기, 페이지네이션을 둔다.\n- 하단 액션은 table card 안쪽 하단에 붙인다.\n\n시각 스타일:\n- 배경은 흰색과 밝은 회색 중심이다.\n- 테이블 헤더는 `#eceef2` 계열이다.\n- 셀 경계는 `#eee` 또는 `#ddd` 얇은 라인이다.\n- primary는 active 탭, primary button, 선택 행, 핵심 상태에만 사용한다.\n- radius는 4~6px 수준만 사용한다. chip/status는 pill radius를 허용한다.\n\n반응형:\n- 데스크톱 BO 화면을 우선한다.\n- 모바일에서도 테이블을 카드로 완전히 바꾸지 않는다.\n- 핵심 컬럼을 남기고 가로 스크롤을 허용한다.\n\n금지:\n- 사용자용 hero, 큰 카드, 넓은 여백, 장식 이미지로 BO 화면을 채우지 않는다.\n- 날짜를 `YYYY-MM-DD`로 쓰지 않는다.\n- 하위 탭 카운트를 단독 배지만으로 표현하지 않는다.\n- 이름, 나이, 성별처럼 강하게 연결된 정보를 불필요하게 별도 컬럼으로 분리하지 않는다.\n- 상태값을 글자색만 다르게 해서 끝내지 않는다.\n\n산출물:\n- Sidebar + Topbar + Page Head\n- Major Tabs + Sub Tabs\n- Dense Filter + Active Filter Tags\n- Summary Strip\n- 1개 이상 table-section\n- 묶음 컬럼 기반 고밀도 테이블\n- 상태/유형 chip\n- 행 클릭 inline Drawer\n- Bulk action bar\n```\n\n## 권장 테이블 템플릿\n\n회원:\n- 선택\n- 회원 관리번호\n- 이름 / 나이·성별\n- 이메일 / 휴대폰\n- 주소 / 국가\n- 회원유형 / 구독\n- 가입일 / 채널\n- 최근 로그인 / 체류시간\n- 전문가 레벨 / 평점\n- 매칭 / 상태\n- 등급\n- 결제 / 상태\n- 메모\n\n결제:\n- 결제번호\n- 사이트 / 구분\n- 회원 / 관리번호\n- 상품 / 서비스\n- 금액 / 수수료\n- 결제상태 / 수단\n- 결제일 / 환불일\n- 담당 / 메모\n\n매칭:\n- 의뢰번호\n- 의뢰인 / 관리번호\n- 유형 / 카테고리\n- 언어 / 분야\n- 전문가 / 배정상태\n- 진행상태 / 마감일\n- 금액 / 결제\n- 등록일 / 수정일\n"

          "path": "디자인시스템/docs/재사용_디자인_프롬프트/관리자/03_BO_관리자화면_기준.md",
          "date": "2026-06-04",
          "content": "# BO 관리자화면 기준 프롬프트\n\n기준 파일: `index.html`, `dense-drawer.css`, `dense-drawer.js`, `table_design/*.html`, `table_design/table-design.css`, `table_design/table-design.js`\n\n이 문서는 BO 관리자 화면 전체를 만들 때 적용하는 상위 기준이다. 대량 테이블 화면은 `02_BO_테이블레이아웃_기준.md`를 함께 적용한다.\n\n## 실행 프롬프트\n\n```text\n너는 BO 관리자 화면을 설계하는 시니어 UI 디자이너이자 프론트엔드 설계자다.\n\n반드시 현재 `design_system_major`의 관리자 화면 기준을 따른다.\n기준 파일:\n- index.html\n- dense-drawer.css\n- dense-drawer.js\n- table_design/관리자패널_전체회원.html\n- table_design/신규테이블관리.html\n- table_design/결제관리.html\n- table_design/table-design.css\n- table_design/table-design.js\n\n화면 목적:\n- BO 화면은 운영자가 데이터를 빠르게 검색, 확인, 수정, 저장, 내보내기, 일괄 처리하는 업무 화면이다.\n- 사용자용 랜딩페이지, 서비스 소개 페이지, 마케팅 화면처럼 만들지 않는다.\n- 정보 밀도, 반복 업무 효율, 상태 식별, 행 단위 상세 편집을 우선한다.\n\n전체 레이아웃:\n1. App Shell\n   - 좌측 Sidebar와 우측 Content 2단 구조를 기본으로 한다.\n   - Sidebar 폭은 약 224px 기준이다.\n   - Content는 세로 스크롤을 담당하고, Topbar는 sticky로 유지한다.\n\n2. Sidebar\n   - 메뉴는 업무 도메인 기준으로 묶는다.\n   - 예: 대시보드, 회원, 활동 관리, 결제 관리, 매칭 관리, 시험 관리, 스케줄 관리, 신규 테이블 관리, 1:1 문의, 통계\n   - 현재 메뉴는 `.active`로 표시한다.\n   - 아이콘은 Font Awesome 또는 기존 아이콘 체계를 사용한다.\n   - 알림 카운트가 있으면 `nav-count`처럼 작고 명확하게 표시한다.\n\n3. Topbar\n   - 높이는 약 48px 기준이다.\n   - 좌측에는 현재 위치나 업무명을 표시한다.\n   - 우측에는 저장, 추가, 엑셀 내보내기, 컬럼설정, 필터초기화 같은 주요 action을 둔다.\n   - action 버튼은 작고 밀도 있게 배치한다.\n\n4. Page Head\n   - breadcrumb, H1, meta 문구를 포함한다.\n   - H1은 업무명을 직접 말한다. 예: `전체 회원 관리`, `결제 관리`, `신규 테이블 관리`\n   - meta는 화면 목적을 1줄로 설명한다.\n\n5. 업무 전환 영역\n   - Major Tabs는 사이트/업무 대분류 전환에 사용한다.\n   - Sub Tabs는 테이블 종류 또는 세부 업무 전환에 사용한다.\n   - 카운트는 반드시 라벨 안에 포함한다.\n   - 예: `AI번역 (13건)`, `전체 회원 (전체 50명)`\n\n6. 검색/필터\n   - BO 화면은 `dense-filter-card` 기반 고밀도 필터를 사용한다.\n   - 조건이 많아도 큰 카드 여러 개로 나누지 않는다.\n   - 활성 조건은 `filter-tag`로 요약한다.\n   - 자세한 기준은 `components/검색필터_기준.md`를 따른다.\n\n7. 본문 콘텐츠\n   - 대량 목록 화면은 `02_BO_테이블레이아웃_기준.md`를 따른다.\n   - 요약 통계는 카드형 박스보다 `summary-strip`처럼 한 줄로 정리한다.\n   - 관리 화면에서 필요한 경우에만 chart, KPI, mini table을 추가한다.\n   - 화면 첫 viewport에 필터, 요약, 테이블 시작점이 함께 보이도록 여백을 줄인다.\n\n8. 상세/편집\n   - 행 클릭 상세는 우측 inline Drawer를 우선한다.\n   - 목록 row 아래에 긴 아코디언을 펼치지 않는다.\n   - Drawer는 기본 정보, 이용 상태, 운영 메모, 저장 action을 포함한다.\n   - 자세한 기준은 `components/인라인_Drawer_기준.md`를 따른다.\n\n9. 하단 업무 action\n   - 선택 건수와 일괄 action을 table card 하단에 배치한다.\n   - 예: 선택정보내기, 이메일보내기, SMS전송, 상태변경, 엑셀내보내기\n\n시각 기준:\n- 배경은 `#f6f7f9` 계열 페이지 배경과 흰색 panel을 기본으로 한다.\n- 선은 `#ddd`, `#eee`처럼 얇고 약하게 사용한다.\n- 헤더/테이블 헤드는 `#eceef2` 계열 연한 회색을 사용한다.\n- primary `#0088ff`는 active, primary button, 선택 행, 핵심 상태에만 제한적으로 사용한다.\n- radius는 4~6px 수준을 기본으로 한다.\n- chip/status는 pill radius를 허용한다.\n- 과한 shadow, 큰 card, decorative gradient를 쓰지 않는다.\n\n타이포그래피:\n- BO 기본 폰트는 8px 기준으로 조밀하게 유지한다.\n- Topbar title, H1, section title처럼 화면 위계를 만드는 텍스트만 12~22px 범위로 키운다.\n- 테이블 헤더, 셀, filter chip, checkbox label, badge, status는 8px 기준이다.\n- 텍스트는 한 줄 말줄임을 기본으로 하고, title 또는 Drawer에서 전체 내용을 확인하게 한다.\n\n상태/유형:\n- 상태/유형/결제수단/구독등급/우선순위는 chip 또는 badge로 표시한다.\n- 상태값은 색상 텍스트만 쓰지 않는다.\n- `.status.ok`, `.status.wait`, `.status.fail`, `.status.info` 체계를 따른다.\n- 자세한 기준은 `components/상태_유형_칩_기준.md`를 따른다.\n\n권한/접근:\n- 관리자 화면은 사용자 권한에 따라 action 노출이 달라질 수 있음을 고려한다.\n- 삭제, 환불, 정산확정, 상태변경 같은 위험 action은 `danger` 또는 확인 flow를 둔다.\n- 저장/삭제/상태변경 후에는 toast 또는 명확한 feedback을 제공한다.\n\n접근성:\n- 버튼, 탭, 필터 chip, 행 클릭 영역은 키보드 접근이 가능해야 한다.\n- 선택/활성 상태는 `.active`뿐 아니라 `aria-pressed`, `aria-selected`를 함께 맞춘다.\n- Drawer는 `role=\"dialog\"`, `aria-modal=\"false\"`, `aria-labelledby`를 사용한다.\n- ESC 닫기와 focus 복귀를 지원한다.\n- 상태는 색상만으로 전달하지 않고 텍스트를 함께 제공한다.\n\n반응형:\n- BO 화면은 데스크톱 우선이다.\n- 모바일에서는 테이블을 완전히 카드화하지 말고 핵심 컬럼 유지 + 가로 스크롤을 허용한다.\n- Sidebar는 필요 시 접거나 숨길 수 있지만 업무 흐름이 끊기지 않게 한다.\n\n금지:\n- BO 화면에 사용자용 hero, 큰 마케팅 이미지, 넓은 카드형 소개 섹션을 넣지 않는다.\n- 상태값을 단순 색상 텍스트로만 표시하지 않는다.\n- 날짜를 화면마다 다르게 쓰지 않는다. 테이블 날짜는 `YY-MM-DD`를 기본으로 한다.\n- 하위 탭 카운트를 단독 배지로만 표현하지 않는다.\n- 검색조건 시작선이 어긋나게 배치하지 않는다.\n- 목록 상세를 하단 row로 길게 펼쳐 테이블 흐름을 깨지 않는다.\n\n산출물:\n- Sidebar\n- Sticky Topbar\n- Page Head\n- Major Tabs / Sub Tabs\n- Dense Filter\n- Summary Strip\n- BO Table 또는 업무 본문\n- 상태/유형 chip\n- Inline Drawer 상세\n- Bulk Action Bar\n- Toast 또는 저장 feedback\n```\n\n## 적용 우선순위\n\n1. 화면 shell: Sidebar, Topbar, Page Head\n2. 업무 전환: Major Tabs, Sub Tabs\n3. 검색 조건: Dense Filter\n4. 본문: Table 또는 운영 패널\n5. 상세: Inline Drawer\n6. 상태/유형 chip\n7. Bulk action, toast, 접근성\n\n## 관련 문서\n\n- `02_BO_테이블레이아웃_기준.md`\n- `components/검색필터_기준.md`\n- `components/상태_유형_칩_기준.md`\n- `components/인라인_Drawer_기준.md`\n"

          "section": "디자인시스템",
          "title": "04 BO 관리자용 레이아웃 기준",
          "path": "디자인시스템/docs/재사용_디자인_프롬프트/관리자/04_BO_관리자용_레이아웃_기준.md",
          "date": "2026-06-04",
          "content": "# BO 관리자용 레이아웃 기준 프롬프트\n\n기준 파일: `index.html`, `dense-drawer.css`, `table_design/table-design.css`, `table_design/*.html`\n\n이 문서는 BO 관리자 화면의 레이아웃 밀도와 4단 그리드 구성을 집중적으로 정의한다. 관리자 화면 전체 원칙은 `03_BO_관리자화면_기준.md`, 대량 테이블은 `02_BO_테이블레이아웃_기준.md`를 함께 적용한다.\n\n## 실행 프롬프트\n\n```text\n너는 BO 관리자 화면 레이아웃을 설계하는 시니어 UI 디자이너이자 프론트엔드 설계자다.\n\n현재 `design_system_major` 기준을 따르되, 이번 화면은 특히 \"4단 그리드\", \"높은 정보 밀도\", \"업무 패널을 한 화면에 많이 배치하는 구조\"를 우선한다.\n\n기준 파일:\n- index.html\n- dense-drawer.css\n- table_design/table-design.css\n- table_design/관리자패널_전체회원.html\n- table_design/신규테이블관리.html\n- table_design/결제관리.html\n\n목표:\n- 관리자 첫 화면 또는 상세 작업 화면에서 핵심 업무 정보를 4단 그리드로 압축 배치한다.\n- 사용자가 스크롤을 많이 하지 않아도 상태, 요청, 처리량, 최근 이슈, 할 일, 테이블 진입점을 동시에 확인하게 한다.\n- 단순히 카드 4개를 크게 나열하지 말고, 작고 조밀한 업무 패널을 4열 grid로 구성한다.\n\n기본 App Shell:\n- 좌측 Sidebar: 224px 고정 기준\n- 우측 Content: `minmax(0, 1fr)`\n- Topbar: 48px sticky\n- Page padding: 18~20px 수준\n- Section gap: 10~14px 수준\n- Panel padding: 10~12px 수준\n- 과한 여백을 쓰지 않는다.\n\n4단 그리드 기본:\n- 데스크톱 기준 `grid-template-columns: repeat(4, minmax(0, 1fr))`\n- gap은 8~10px 기준\n- 각 패널은 1열, 2열, 4열 span을 상황에 따라 사용한다.\n- 기본 패널 높이는 콘텐츠에 맞추되 첫 화면이 느슨해지지 않게 한다.\n- 카드 안에 또 카드를 중첩하지 않는다.\n\n권장 CSS 구조:\n\n```css\n   .bo-layout-grid {\n   display: grid;\n   grid-template-columns: repeat(4, minmax(0, 1fr));\n   gap: 10px;\n   align-items: start;\n   }\n\n   .bo-panel {\n   min-width: 0;\n   border: 1px solid var(--line);\n   background: var(--panel);\n   padding: 10px 12px;\n   }\n\n   .bo-panel--span-2 {\n   grid-column: span 2;\n   }\n\n   .bo-panel--span-4 {\n   grid-column: 1 / -1;\n   }\n```\n\n4단 그리드에 배치할 정보:\n1. KPI 패널\n   - 오늘 처리, 대기, 오류, 결제, 매칭, 문의 같은 숫자\n   - 숫자는 크되 과하지 않게 14~18px 수준\n   - 라벨은 8~11px 수준\n   - 상태 chip을 함께 둔다.\n\n2. 할 일 패널\n   - 미배정, 환불 확인, 정산 대기, 문의 답변 같은 운영 task\n   - 항목은 4~6개까지만 보이고 더보기 action을 둔다.\n   - checkbox 또는 상태 chip을 사용한다.\n\n3. 최근 활동 패널\n   - 최근 로그인, 문서 업로드, 결제, 매칭 요청, 상태 변경\n   - 2줄 이하 dense list로 구성한다.\n   - 시간은 짧게 표기한다.\n\n4. 알림/이슈 패널\n   - 실패, 취소, 환불, 미납, 검수대기 같은 주의 항목\n   - 위험도는 `status fail`, `status wait` chip으로 구분한다.\n\n5. 빠른 액션 패널\n   - 회원 추가, 엑셀 내보내기, 상태 변경, 메시지 발송, 정산 확인\n   - 버튼은 작고 한 줄에 여러 개 배치한다.\n\n6. 미니 테이블 패널\n   - 최근 결제, 최근 문의, 정산 대기, 매칭 대기\n   - 전체 테이블보다 작게 3~5행만 보여준다.\n   - 헤더와 셀은 8px 기준이다.\n\n7. 상세 작업 패널\n   - 특정 회원/결제/매칭을 선택했을 때 기본정보, 상태변경, 메모, 이력 패널을 4단에 배치한다.\n   - 상세 화면은 Drawer wide 상태에서 4단 grid로 확장할 수 있다.\n\n권장 배치 예시:\n- 1행: KPI 4개\n- 2행: 할 일 1열, 알림/이슈 1열, 최근 활동 2열\n- 3행: 미니 테이블 2열, 빠른 액션 1열, 운영 메모 1열\n- 4행: 메인 테이블 또는 상세 작업영역 4열 span\n\n상세 작업 화면 4단 예시:\n- 1열: 회원/대상 기본정보 마스터\n- 2열: 상태/권한/구독/결제 설정\n- 3열: 상담/문의/메모/처리 task\n- 4열: 최근 활동/결제/정산/로그\n- 하단 4열 span: 관련 테이블 또는 이력 전체\n\n밀도 기준:\n- BO 기본 텍스트: 8px\n- 패널 제목: 11~13px\n- KPI 숫자: 14~18px\n- 보조 텍스트: 8px\n- 버튼 높이: 24~30px\n- chip/status 높이: 18~22px\n- panel padding: 10~12px\n- row/list item 높이: 24~32px\n\n패널 헤더:\n- 좌측에는 제목, 우측에는 count 또는 더보기 action을 둔다.\n- 제목 옆에 불필요한 긴 설명을 붙이지 않는다.\n- 설명이 필요하면 작은 muted 텍스트 1줄만 사용한다.\n\nDense List:\n- 각 항목은 `main + sub + status` 조합으로 만든다.\n- 긴 문장은 말줄임 처리한다.\n- 날짜는 `YY-MM-DD`, 시간은 필요한 경우 `HH:mm`만 사용한다.\n- 리스트 항목 사이 border는 약하게 쓴다.\n\n상태/유형:\n- 반복 상태는 `status ok/wait/fail/info` chip을 쓴다.\n- 유형, 등급, 결제수단, 우선순위는 `badge` 또는 보조 chip을 쓴다.\n- 색상 텍스트만으로 상태를 표시하지 않는다.\n\n반응형:\n- 1200px 이상: 4단 유지\n- 900~1199px: 2단으로 축소\n- 900px 미만: 1단 또는 핵심 2단으로 축소\n- 모바일에서도 BO 테이블은 카드화보다 가로 스크롤을 우선한다.\n\n금지:\n- 4단 그리드를 큰 마케팅 카드 4개로 만들지 않는다.\n- 패널 안에 중첩 카드와 큰 그림을 넣지 않는다.\n- 첫 화면에 빈 여백이 크게 생기게 하지 않는다.\n- KPI 숫자만 있고 실제 업무 진입점이 없는 대시보드를 만들지 않는다.\n- 상태를 색상 텍스트만으로 표시하지 않는다.\n- 4단 그리드가 깨져 텍스트가 겹치거나 잘리게 하지 않는다.\n\n산출물:\n- Sidebar + Topbar + Page Head\n- 4단 `bo-layout-grid`\n- KPI 패널 4개 이상\n- 할 일/알림/최근 활동/빠른 액션 패널\n- 미니 테이블 또는 메인 테이블 진입 영역\n- 상태/유형 chip\n- 2단/1단 반응형 대응\n```\n\n## 4단 그리드 패널 구성 템플릿\n\n| 위치 | Span | 패널 | 내용 |\n|---|---:|---|---|\n| 1행 1열 | 1 | 오늘 처리 | 처리 수, 완료율, 상태 chip |\n| 1행 2열 | 1 | 대기 업무 | 미배정, 검수대기, 정산대기 |\n| 1행 3열 | 1 | 결제/환불 | 결제완료, 환불요청, 미납 |\n| 1행 4열 | 1 | 문의/알림 | 답변대기, 긴급 문의 |\n| 2행 1열 | 1 | 할 일 | 운영 task list |\n| 2행 2열 | 1 | 알림/이슈 | fail/wait 상태 목록 |\n| 2행 3~4열 | 2 | 최근 활동 | 2열 dense activity list |\n| 3행 1~2열 | 2 | 미니 테이블 | 최근 결제/문의/매칭 3~5행 |\n| 3행 3열 | 1 | 빠른 액션 | 작은 버튼 flow |\n| 3행 4열 | 1 | 운영 메모 | textarea 또는 memo list |\n| 4행 전체 | 4 | 메인 테이블 | 상세 목록 진입 |\n\n## 관련 문서\n\n- `03_BO_관리자화면_기준.md`\n- `02_BO_테이블레이아웃_기준.md`\n- `components/상태_유형_칩_기준.md`\n"

          "path": "디자인시스템/docs/재사용_디자인_프롬프트/관리자/components/검색필터_기준.md",
          "date": "2026-06-04",
          "content": "# 검색필터 기준\n\n기준 파일: `index.html`, `layout.css`, `table_design/table-design.css`, `table_design/table-design.js`\n\n이 문서는 사용자 화면 필터와 BO 고밀도 검색조건을 구분해서 정의한다.\n\n## 사용자 화면 필터\n\n사용자 화면은 과도하게 많은 조건을 한 번에 노출하지 않는다.\n\n권장 구조:\n- 키워드 검색\n- 1~3개 주요 카테고리 chip\n- 기간 또는 상태 필터가 필요하면 한 줄 추가\n- 활성 필터는 `filter-tag`로 표시\n\n```html\n\u003cdiv class=\"filter-bar\">\n  \u003cbutton class=\"filter-chip\" type=\"button\" aria-pressed=\"true\">전체\u003c/button>\n  \u003cbutton class=\"filter-chip\" type=\"button\" aria-pressed=\"false\">접수중\u003c/button>\n  \u003cbutton class=\"filter-chip\" type=\"button\" aria-pressed=\"false\">마감임박\u003c/button>\n\u003c/div>\n```\n\n## BO 고밀도 검색조건\n\nBO 테이블은 `dense-filter-card`를 기준으로 한다.\n\n필수 구조:\n- `dense-filter-card`\n- `dense-search-main`\n- `dense-filter-flow`\n- `dense-filter-group`\n- `dense-filter-options`\n- `filter-chip`\n- `dense-check`\n- `dense-active-filters`\n\n```html\n\u003cform class=\"dense-filter-card\" data-dense-filter>\n  \u003cdiv class=\"dense-search-main\">\n    \u003clabel class=\"dense-search-field\">\n      \u003cspan>검색어\u003c/span>\n      \u003cinput type=\"search\" name=\"keyword\" placeholder=\"이름, 이메일, 관리번호 검색\">\n    \u003c/label>\n    \u003cbutton class=\"btn primary\" type=\"submit\">검색\u003c/button>\n    \u003cbutton class=\"btn\" type=\"reset\">초기화\u003c/button>\n  \u003c/div>\n\n  \u003cdiv class=\"dense-filter-flow\">\n    \u003cfieldset class=\"dense-filter-group\" data-single-choice>\n      \u003clegend>상태\u003c/legend>\n      \u003cdiv class=\"dense-filter-options\">\n        \u003cbutton class=\"filter-chip\" type=\"button\" aria-pressed=\"true\">전체\u003c/button>\n        \u003cbutton class=\"filter-chip\" type=\"button\" aria-pressed=\"false\">완료\u003c/button>\n        \u003cbutton class=\"filter-chip\" type=\"button\" aria-pressed=\"false\">대기\u003c/button>\n      \u003c/div>\n    \u003c/fieldset>\n  \u003c/div>\n\n  \u003cdiv class=\"dense-active-filters\" data-active-filters>\u003c/div>\n\u003c/form>\n```\n\n## 정렬 기준\n\n- 조건명 `legend`는 고정 폭을 강제하지 않고, 필터 그룹 안에서 자연스럽게 흐르게 배치한다.\n- 옵션 영역은 flex-wrap으로 배치한다.\n- 조건 블록 사이에는 얇은 세로 구분선을 둘 수 있다.\n- 기간 조건은 한 줄로 유지하고, 공간이 부족하면 가로 스크롤을 허용한다.\n- 선택된 검색조건은 아래 활성 필터 영역에 tag로 요약한다.\n\n## 권장 조건 세트\n\n회원:\n- 회원유형: 일반회원, 정식회원, 기업회원, 전문가, 관리자\n- 성별: M, F\n- 구독상태: 프리미엄, 스탠다드, 베이직, free\n- 매칭상태: 완료, 대기, 취소, 검토중\n- 결제상태: 정상, 미납, 환불, 정산대기\n- 가입채널: 이메일, 홈페이지, 구글, 추천, 관리자등록, 기관계약\n\n결제:\n- 유형: 구독, 서비스의뢰, 시험응시, 문서구매\n- 상태: 결제완료, 정산대기, 환불완료, 결제취소\n- 수단: 카드, 계좌이체, 체크카드, 토스페이, 가상계좌\n\n매칭:\n- 유형, 카테고리, 언어, 분야, 배정상태, 진행상태, 결제상태\n\n## 금지\n\n- BO 필터를 큰 카드 여러 개로 나누지 않는다.\n- 선택된 필터를 화면 오른쪽 끝으로 밀어내지 않는다.\n- `전체` chip과 개별 chip의 선택 상태가 동시에 모호하게 보이게 하지 않는다.\n- 조건명이 서로 다른 시작선에 걸려 옵션 정렬이 흐트러지게 하지 않는다.\n"

          "content": "# 상태/유형 칩 기준\n\n기준 파일: `layout.css`, `table_design/table-design.css`\n\n이 문서는 상태, 유형, 구독, 결제수단, 우선순위처럼 반복되는 값을 chip/pill로 표현하는 기준이다.\n\n## 원칙\n\n- 상태값은 색상 텍스트만 사용하지 않는다.\n- chip은 텍스트, 상태 점 또는 아이콘, 연한 배경, border를 함께 가진다.\n- 같은 의미는 같은 색상 체계를 사용한다.\n- 텍스트는 항상 표시한다. 색상이나 아이콘만으로 상태를 전달하지 않는다.\n- 테이블 셀 안에서는 chip 크기를 작게 유지한다.\n\n## 상태 의미 체계\n\n| 의미 | 클래스 | 예시 | 사용처 |\n|---|---|---|---|\n| 완료/성공/정상 | `status ok` | 완료, 결제완료, 배정완료, 성공 | 처리 완료, 결제 완료, 로그인 성공 |\n| 대기/검토/정산 | `status wait` | 대기, 검수대기, 정산대기, 미납 | 확인 필요, 미처리, 보류 |\n| 실패/취소/환불 | `status fail` | 취소, 환불, 환불완료 | 실패, 취소, 환불, 위험 |\n| 진행/정보 | `status info` | 정상, 진행중, 운영중 | 진행 상태, 정보성 상태 |\n\n## BO 테이블 상태 chip CSS 기준\n\n```css\n.status {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 4px;\n  min-height: 20px;\n  padding: 2px 7px;\n  border: 1px solid var(--status-line);\n  border-radius: 999px;\n  background: var(--status-bg);\n  color: var(--status-color);\n  font-size: var(--bo-font-size-base);\n  font-weight: 700;\n  white-space: nowrap;\n}\n\n.status::before {\n  content: \"\";\n  width: 5px;\n  height: 5px;\n  border-radius: 999px;\n  background: currentColor;\n}\n```\n\n## 유형/등급 badge 기준\n\n| 의미 | 클래스 | 예시 |\n|---|---|---|\n| Primary 유형 | `badge blue` | 프리미엄, 주요 서비스 |\n| 보조/전문가 | `badge violet` | 스탠다드, 전문가 |\n| 위험/높음 | `badge red` | Lv.A, 높음 |\n| 성공/완료 | `badge green` | 활성, 완료 |\n| 기본/무료 | `badge gray` | free, 베이직 |\n| 경고/보통 | `badge warn` | 보통, 확인필요 |\n\nBadge도 원색 면을 피하고, 연한 배경 + 진한 텍스트 + border를 기본으로 한다.\n\n## 결제상태/수단 표시\n\n결제상태와 결제수단은 한 셀 안에 2줄로 묶는다.\n\n```html\n\u003ctd>\n  \u003cdiv class=\"cell\">\n    \u003cspan class=\"status ok\">결제완료\u003c/span>\n    \u003cspan class=\"sub\">신용카드\u003c/span>\n  \u003c/div>\n\u003c/td>\n```\n\n`status + .sub`는 작은 보조 chip으로 표시한다.\n\n## 매칭상태 표시\n\n전문가명과 배정상태는 한 셀 안에서 이름 + 상태 chip으로 묶는다.\n\n```html\n\u003ctd>\n  \u003cdiv class=\"cell\">\n    \u003cspan class=\"main\">이정희\u003c/span>\n    \u003cspan class=\"status ok\">배정완료\u003c/span>\n  \u003c/div>\n\u003c/td>\n```\n\n## 금지\n\n- `완료`, `대기`, `환불`을 단순 초록/노랑/빨강 텍스트로만 표시하지 않는다.\n- 같은 의미의 상태에 화면마다 다른 색을 쓰지 않는다.\n- chip 내부에 긴 문장을 넣지 않는다.\n- 상태 chip과 badge를 과도하게 크게 만들지 않는다.\n- 보조값을 회색 텍스트로만 두어 상태값과 구분이 약해지게 하지 않는다.\n"

          "section": "디자인시스템",
          "title": "인라인 Drawer 기준",
          "path": "디자인시스템/docs/재사용_디자인_프롬프트/관리자/components/인라인_Drawer_기준.md",
          "date": "2026-06-04",
          "content": "# 인라인 Drawer 기준\n\n기준 파일: `dense-drawer.css`, `dense-drawer.js`, `table_design/table-design.css`, `table_design/table-design.js`\n\n이 문서는 회원 상세, 결제 상세, 매칭 상세처럼 목록 행에서 상세 작업영역을 열 때 적용한다.\n\n## 원칙\n\n- Drawer는 기본적으로 overlay modal이 아니라 작업영역 오른쪽에 붙는 inline panel이다.\n- 기본 열림 상태의 `.table-detail-drawer`는 작업영역 기준 50% 이상을 사용한다. 테이블 맥락을 유지하되 상세 입력, 메모, 이력 패널이 좁아지지 않게 `clamp(560px, 52vw, 820px)`처럼 최소 폭과 비율 폭을 함께 둔다.\n- 사용자가 목록과 상세를 동시에 비교할 수 있어야 한다.\n- 선택된 행은 table row에서 시각적으로 강조한다.\n- Drawer는 닫기, ESC 닫기, 저장, focus 복귀를 포함한다.\n- 넓게보기 상태에서는 목록을 접고 상세 작업영역이 전체 폭을 사용할 수 있다.\n\n## 레이아웃 구조\n\n```html\n\u003cdiv class=\"table-workspace\" data-table-workspace>\n  \u003csection class=\"table-card\">...\u003c/section>\n  \u003caside class=\"table-detail-drawer\" role=\"dialog\" aria-modal=\"false\">\n    \u003cform class=\"table-detail-panel\">\n      \u003cheader class=\"table-detail-head\">...\u003c/header>\n      \u003cdiv class=\"table-detail-body\">...\u003c/div>\n      \u003cfooter class=\"table-detail-actions\">...\u003c/footer>\n    \u003c/form>\n  \u003c/aside>\n\u003c/div>\n```\n\n## 열림 상태\n\n- `table-workspace.is-drawer-open`을 추가한다.\n- 선택 행에는 `tr.is-open`을 추가한다.\n- wide 상태는 `table-workspace.is-drawer-wide`를 추가한다.\n- Drawer가 닫히면 선택 행 강조와 wide 상태를 제거한다.\n\n## 상세 정보 재구성\n\n목록에서는 묶음 컬럼을 유지하되, Drawer에서는 편집 가능한 단위로 분리한다.\n\n목록 셀:\n- 이름 / 나이·성별\n- 이메일 / 휴대폰\n- 주소 / 국가\n- 회원유형 / 구독상태\n- 매칭 / 상태\n- 결제 / 상태\n\nDrawer 필드:\n- 이름\n- 나이\n- 성별\n- 이메일\n- 휴대폰\n- 주소\n- 국가\n- 회원유형\n- 구독상태\n- 매칭상태\n- 결제상태\n- 운영 메모\n\n## Drawer 내부 구성\n\n필수:\n- 제목, 요약, 닫기 버튼\n- 기본 정보 섹션\n- 이용 상태 섹션\n- 운영 메모\n- 닫기/저장 액션\n\n선택:\n- 좌측 회원기본정보 마스터\n- 상담/시험/결제/정산 작업영역\n- 타임라인\n- 태그\n- 체크리스트\n- 권한 매트릭스\n\n## 접근성\n\n- `role=\"dialog\"`를 사용한다.\n- inline Drawer는 `aria-modal=\"false\"`를 사용한다.\n- 제목은 `aria-labelledby`로 연결한다.\n- 닫기 버튼은 `aria-label`을 제공한다.\n- ESC로 닫는다.\n- 닫은 뒤에는 열었던 행 또는 버튼으로 focus를 복귀한다.\n\n## 금지\n\n- 행 아래에 아코디언처럼 상세 row를 길게 펼치지 않는다.\n- 상세 버튼 전용 컬럼을 반드시 만들려고 하지 않는다. 행 전체 클릭을 우선한다.\n- Drawer를 열었을 때 어떤 행이 선택되었는지 표시하지 않는 상태를 만들지 않는다.\n- sparse 데이터에서 빈 영역을 크게 남기지 않는다. 운영 메모와 상태 변경 action을 붙인다.\n"
        }, {
          "section": "디자인시스템",
          "title": "테이블선택 Drawer 상세패널 기준",
          "path": "디자인시스템/docs/재사용_디자인_프롬프트/관리자/components/테이블선택_Drawer_상세패널_기준.md",
          "date": "2026-06-04",
          "content": "# 테이블 선택 Drawer 상세패널 기준\n\n기준 파일: `table_design/관리자패널_전체회원.html`, `table_design/table-design.css`, `table_design/table-design.js`\n\n이 문서는 관리자 테이블에서 행을 선택했을 때 우측에 열리는 상세 Drawer UI를 만들 때 적용한다. 단순 정보 보기 Drawer가 아니라, 선택된 행의 핵심 정보 확인, 상태 판단, 상담/시험/결제/정산 처리, 운영 메모 저장까지 한 화면에서 수행하는 작업 패널 기준이다.\n\n## 적용 범위\n\n- 대량 테이블에서 행을 클릭하거나 Enter/Space로 선택했을 때 열리는 우측 상세 영역\n- `table-workspace` 안에서 테이블 오른쪽 컬럼으로 붙는 inline Drawer\n- 회원, 결제, 매칭, 시험, 문의 등 운영자가 행 단위로 상세 처리하는 BO 화면\n- 회원 상세처럼 좌측 마스터 정보와 우측 업무 패널이 동시에 필요한 화면\n\n## 기본 동작\n\n- 테이블 행은 `role=\"button\"`, `tabIndex=\"0\"`, `aria-controls=\"table-detail-drawer\"`를 가진다.\n- 행 클릭, Enter, Space로 Drawer를 연다.\n- Drawer가 열리면 `table-workspace.is-drawer-open`을 적용하고, 선택 행에는 `tr.is-open`을 적용한다.\n- 기본 열림 상태의 `.table-detail-drawer`는 작업영역 기준 50% 이상을 사용한다. 상세 작업 패널은 단순 보기 영역이 아니라 상태 변경, 상담/메모 입력, 이력 확인을 수행하므로 좁은 보조 패널로 만들지 않는다.\n- Drawer는 `role=\"dialog\"`, `aria-modal=\"false\"`로 둔다. Overlay modal이 아니라 테이블과 같은 작업 맥락 안에 붙는 패널이다.\n- 닫기 버튼과 Escape로 닫는다.\n- 닫을 때 `is-drawer-open`, `is-drawer-wide`, `tr.is-open`을 제거하고 포커스를 선택했던 행으로 돌린다.\n- `넓게보기`를 누르면 `table-workspace.is-drawer-wide`를 적용해 테이블을 숨기고 Drawer를 전체 작업폭으로 확장한다.\n\n## Drawer 전체 구조\n\n```text\ntable-detail-drawer\n  table-detail-panel\n    table-detail-head\n      drawer-kicker\n      table-detail-title\n      detail-summary\n      넓게보기 / 닫기\n    table-detail-body\n      drawer-section-stack\n        member-master-detail 또는 일반 detail section\n      운영 메모\n    table-detail-actions\n      닫기 / 저장\n```\n\n회원 테이블처럼 `이름`과 `이메일`이 있는 행은 일반 field 묶음이 아니라 `member-master-detail`을 사용한다.\n\n## 회원 상세 Drawer 패널 구성\n\n실제 HTML 구조는 `table_design/관리자패널_전체회원.html`의 상세 Drawer 영역을 최우선으로 참고한다. 특히 `member-master-detail`, `member-master-titlebar`, `member-master-grid`, `member-profile-panel`, `member-work-panel` 구조를 따른다. 기본 Drawer는 좌측 마스터 정보와 우측 작업 패널의 2열 구조를 유지하고, 넓게보기에서는 우측 작업 패널 내부 모듈을 4단 grid로 확장한다.\n\n\n회원 상세는 `회원기본정보 마스터`와 `회원 작업 패널`의 2열 구조를 기본으로 한다.\n\n```text\nmember-master-detail\n  member-master-titlebar\n  member-master-grid\n    member-profile-panel\n    member-work-panel\n```\n\n### 좌측: 회원기본정보 마스터\n\n좌측 패널은 선택된 회원을 식별하고, 다른 업무 패널을 해석하는 기준값을 제공한다.\n\n- 성명 / 영문\n- 아이디\n- 관리번호\n- 이메일\n- 휴대폰\n- 거주지 / 국가\n- 회원유형 / 구독상태\n- 가입일 / 채널\n- 전문가 레벨 / 평점\n- 내국인/외국인 선택\n- 회원 사용 목적\n- 출제/번역, 수강등록, 시험접수, 전문가매칭 같은 사용 목적 체크\n\n좌측 마스터 정보는 한 줄 라벨 + 입력 필드 구조를 유지한다. 라벨은 좁게, 값은 편집 가능한 field로 표시한다.\n\n### 우측: 회원 작업 패널\n\n우측 패널은 실제 운영 처리를 수행하는 영역이다.\n\n- `member-dark-strip`: 현재 상담/업무 제목, 저장, 상담이력, 전환, 실패 상태\n- `member-status-line`: 완료 상담일시, 최근 상담일시, 누적 이력 수\n- `member-control-row`: 상담종목, 교육, 수강정보 같은 업무 선택값\n- `member-case-box`: 상담결과 선택과 상담 메모\n- `member-log-list`: 상담이력 피드 로그\n- `member-lt-row`: LT 인터뷰 결과\n- `member-data-table`: 시험/납부/증명서/결제/평가 상태 테이블\n- `member-settlement-box`: 환급, 수수료, 정산 요약\n- `member-memo-box`: 상담, 결제, 시험, 정산 이슈를 함께 기록하는 운영 메모\n\n## 패널별 상태 UI\n\n| 영역 | 상태 UI | 표시 기준 |\n|---|---|---|\n| Drawer 헤더 | `drawer-kicker`, `table-detail-title`, `detail-summary` | 현재 테이블 섹션명, 선택 행의 대표명, 관리번호를 표시 |\n| 선택 행 | `tr.is-open` | 현재 Drawer에 연결된 행을 연한 배경과 좌측 인디케이터로 표시 |\n| 제목 바 | `member-master-titlebar` | 회원명과 관리번호, 작업 목적을 어두운 헤더로 고정 표시 |\n| 상단 상태 | `member-master-status` 안의 `status` | 상담상태, 매칭상태, 결제상태를 chip으로 표시 |\n| 업무 액션 바 | `member-dark-strip` | 저장, 상담이력, 전환 같은 즉시 액션과 실패/위험 상태를 표시 |\n| 상담 상태 선택 | `member-counsel-tabs button.active` | 현재 상담 결과를 선택 상태로 표시 |\n| 상담 이력 | `member-log-list article` | 시간과 메모를 분리해 누적 로그로 표시 |\n| LT 결과 | `member-lt-row` radio | P/F/미 등 단일 선택 상태로 표시 |\n| 납부/시험 테이블 | `member-data-table` | 각 행의 시험, 결제, 평가, 수수료, 처리메모를 고밀도 표로 표시 |\n| 정산 요약 | `member-settlement-box` | 환급/수수료/정산 금액을 강조하고 상세 메모를 붙임 |\n| 운영 메모 | `member-memo-box` | 여러 패널에서 발생한 이슈를 최종 처리 메모로 통합 |\n\n## 상태 chip 기준\n\n상태값은 텍스트 색상만으로 처리하지 않는다. 반드시 `status` chip을 사용한다.\n\n| 클래스 | 용도 | 예시 |\n|---|---|---|\n| `status ok` | 완료, 정상, 상담중, 처리 가능 | `상담중`, `완료`, `정상` |\n| `status wait` | 대기, 미결제, 보류, 추가 확인 | `대기`, `미결제`, `정산대기` |\n| `status fail` | 실패, 취소, 환불, 위험 | `FAIL`, `취소`, `환불` |\n| `status info` | 일반 정보, 기본 상태, 정상 흐름 | `정상`, `검토중` |\n| `status` 기본 | 외부 데이터에서 상태 성격을 아직 분류하지 못한 값 | 매칭상태 또는 결제상태 원문 |\n\n상태가 업무 판단에 직접 영향을 주면 상단 상태 영역과 해당 패널 내부에 중복 노출해도 된다. 예를 들어 결제상태는 `member-master-status`에 요약으로 표시하고, 납부 상세 테이블에는 행별 상태로 다시 표시한다.\n\n## 고정되는 정보\n\n고정 정보는 선택 행이 바뀌어도 UI 위치와 의미가 유지되는 값이다. Drawer 안에서 항상 같은 영역에 둔다.\n\n### Drawer 컨텍스트 고정 정보\n\n- 현재 섹션명: `drawer-kicker`\n- 선택 대상 제목: `table-detail-title`\n- 선택 대상 식별 요약: `detail-summary`\n- 닫기, 넓게보기, 저장 액션 위치\n\n### 회원 마스터 고정 정보\n\n- 관리번호\n- 이름/성명\n- 아이디\n- 이메일\n- 휴대폰\n- 거주지/국가\n- 회원유형/구독상태\n- 가입일/가입채널\n\n### 작업 패널 고정 정보\n\n- 상담내용 제목 바\n- 완료 상담일시\n- 최근 상담일시\n- 누적 상담 이력 수\n- 상담종목/교육/수강정보 선택 컨트롤\n- 운영 메모 위치\n\n고정 정보는 Drawer 상단 또는 좌측 마스터에 배치한다. 화면을 스크롤해도 운영자가 \"누구의 어떤 업무를 처리 중인지\" 잃지 않게 해야 한다.\n\n## 변동되는 정보\n\n변동 정보는 선택된 행, 업무 상태, 처리 단계, 이력에 따라 계속 바뀌는 값이다. 같은 패널 안에서도 상태 변경과 입력이 가능해야 한다.\n\n### 상태 변동 정보\n\n- 상담상태: 상담중, 미상담, 완료, 다음등록, 부재, 기타\n- 매칭상태: 완료, 대기, 취소, 검토중\n- 결제상태: 정상, 미납, 환불, 정산대기\n- 평가상태: 완료, 미결제, 대기\n- 실패/위험 플래그: FAIL, 취소, 환불\n\n### 업무 입력 변동 정보\n\n- 상담 메모\n- 상담 결과 선택\n- 시험/납부 상세 테이블의 처리메모\n- 환급/정산 메모\n- 운영 메모\n- 체크박스 사용 목적\n- LT 인터뷰 결과\n\n### 이력 변동 정보\n\n- 상담이력 로그\n- 최근 상담일시\n- 총 이력 수\n- 결제/환불/정산 테이블 행\n- 시험 응시/평가 상태\n\n변동 정보는 우측 작업 패널에 배치한다. 고정 식별 정보와 섞지 않고, 저장 전후로 어떤 값이 바뀌었는지 추적 가능하게 한다.\n\n## 일반 테이블 Drawer fallback\n\n회원 상세 조건이 아니면 `groupDrawerDetails()` 기준으로 값을 그룹화한다.\n\n| 그룹 | 포함 값 |\n|---|---|\n| 기본 정보 | 관리번호, 이름, 나이, 성별, 등급 |\n| 연락처 | 이메일, 휴대폰, 연락처, 주소, 국가 |\n| 이용 상태 | 회원유형, 구독상태, 가입일, 가입채널, 최근 로그인, 체류시간, 전문가 레벨, 평점, 매칭상태, 결제상태 |\n| 운영 정보 | 위 그룹에 속하지 않는 기타 값 |\n\n일반 Drawer도 모든 값을 한 화면에 펼치지 말고, 업무 의미별 section으로 나누고 각 값은 라벨 + field 구조로 표시한다.\n\n## 금지\n\n- 선택 행 상세를 overlay modal로 띄우지 않는다.\n- Drawer 안에서 회원 식별 정보와 상담/결제/정산 입력 정보를 한 카드에 섞지 않는다.\n- 상태값을 텍스트 색상만 바꾸어 표시하지 않는다.\n- 고정 정보 위치를 선택 행마다 바꾸지 않는다.\n- 상담이력, 결제이력, 시험이력처럼 누적되는 정보는 단일 textarea에 합치지 않는다.\n- Drawer를 열었을 때 선택 행 표시를 생략하지 않는다.\n- 넓게보기 상태에서 닫을 때 기본보기 상태 복구를 누락하지 않는다.\n\n## 산출물\n\n- 행 클릭/키보드 선택으로 열리는 inline Drawer\n- 선택 행 `is-open` 표시\n- Drawer 헤더, 닫기, 넓게보기, 저장 액션\n- 좌측 회원기본정보 마스터\n- 우측 상담/시험/결제/정산 작업 패널\n- 패널별 상태 chip과 active 상태\n- 고정 정보 섹션과 변동 정보 섹션\n- 운영 메모와 누적 이력 로그\n"

          "date": "2026-06-04",
          "content": "# 사용자 재사용 디자인 프롬프트\n\n사용자 화면, 서비스 소개 화면, 신청/안내 화면을 만들 때 쓰는 최종 기준 문서다.\n\n## 문서\n\n| 문서 | 용도 |\n|---|---|\n| `01_사용자화면_디자인시스템_기준.md` | 사용자 화면의 레이아웃, 밀도, 컴포넌트, 문구 톤 기준 |\n\n## 사용 순서\n\n1. `01_사용자화면_디자인시스템_기준.md`를 기본 기준으로 적용한다.\n2. 화면에 검색/필터/상태 표시가 많아 BO 성격이 강해지면 `../관리자/components` 문서를 함께 확인한다.\n3. 관리자 운영 화면을 만드는 경우에는 이 폴더가 아니라 `../관리자/00_문서목록.md`를 기준으로 삼는다.\n"

          "content": "# 사용자화면 디자인시스템 기준 프롬프트\n\n기준 파일: `index.html`, `layout.css`, `common.js`, `dense-drawer.css`, `dense-drawer.js`\n\n이 문서는 `design_system_major`의 현재 기준 화면을 바탕으로 사용자용 서비스 화면을 만들 때 적용할 프롬프트다. 시험, 번역, 문서, 교육, 신청, 안내, FAQ, 결제 전 안내 화면에 사용한다.\n\n## 실행 프롬프트\n\n```text\n너는 `design_system_major`를 기준으로 사용자용 서비스 화면을 제작하는 시니어 UI 디자이너이자 프론트엔드 설계자다.\n\n반드시 아래 기준 파일의 톤과 컴포넌트 구조를 따른다.\n- index.html\n- layout.css\n- common.js\n- dense-drawer.css\n- dense-drawer.js\n\n화면 성격:\n- 사용자 화면은 서비스 이해, 신청, 상담, 결제 전 안내, FAQ, 공지 확인을 위한 화면이다.\n- 관리자 BO 화면처럼 조밀한 대량 테이블 중심으로 만들지 않는다.\n- 첫 화면은 기능 설명보다 사용자가 바로 해야 할 행동과 핵심 서비스를 먼저 보여준다.\n\n전체 구조:\n1. Header/GNB\n   - 로고, 주요 메뉴, 사용자/알림/신청 CTA를 포함한다.\n   - 메뉴는 1줄로 읽히게 하고, 과도한 depth를 첫 화면에 노출하지 않는다.\n\n2. Hero 또는 Page Head\n   - H1은 서비스명, 시험명, 신청명처럼 화면의 실제 목적을 쓴다.\n   - 보조 문구는 1~2줄로 제한한다.\n   - CTA는 primary 1개, 보조 action 1개 이내로 구성한다.\n   - 접수중, 운영중, 마감임박 같은 상태는 `state-pill` 또는 상태 chip으로 표시한다.\n\n3. 핵심 정보 섹션\n   - 기능, 대상, 기간, 비용, 절차, 준비물, 안내사항을 카드보다 표/리스트/스텝으로 읽히게 한다.\n   - 같은 성격의 정보는 한 섹션에 묶는다.\n   - 이미지가 필요한 제품/서비스/장소/인물 화면은 실제 대상을 식별할 수 있는 이미지를 첫 viewport에 배치한다.\n\n4. 신청/절차/FAQ\n   - 신청 흐름은 Stepper 또는 Timeline으로 표시한다.\n   - 비용/환불/일정은 표 또는 조밀 리스트로 표시한다.\n   - FAQ는 질문을 먼저 보이게 하고 답변은 짧게 유지한다.\n\n5. Footer\n   - 약관, 개인정보, 회사 정보, 문의 채널을 포함한다.\n\n디자인 토큰:\n- 색상과 border는 `layout.css`의 CSS 변수와 기존 조합을 우선 사용한다.\n- 브랜드 primary는 주요 CTA, active 상태, 핵심 링크에만 제한적으로 사용한다.\n- 배경은 흰색과 밝은 회색을 기본으로 한다.\n- radius는 기본적으로 작게 유지한다. pill 형태는 chip, status, switch처럼 의미가 있는 컴포넌트에만 사용한다.\n- 사용자 화면 본문은 BO 테이블보다 큰 글자 크기를 사용한다.\n\n컴포넌트:\n- Button은 `btn`, `btn--primary`, `btn--outline`, `btn--neutral`, `btn--danger`, `btn--sm`, `btn--md`, `btn--lg` 체계를 따른다.\n- Link는 버튼처럼 보이게 만들지 말고 본문 이동은 `text-link` 계열로 처리한다.\n- Tab은 목적에 따라 underline, box, pill, segmented 중 하나로 구분한다.\n- 상태는 `state-pill` 또는 `components/상태_유형_칩_기준.md`의 chip 규칙을 따른다.\n- 검색/필터가 필요하면 `components/검색필터_기준.md`를 따른다.\n- Drawer 상세가 필요하면 `components/인라인_Drawer_기준.md`를 따른다.\n\n접근성:\n- 버튼, 링크, 입력, 탭은 focus-visible 상태가 있어야 한다.\n- 탭은 `role=\"tablist\"`, `aria-selected`를 맞춘다.\n- 토스트는 `aria-live=\"polite\"`를 사용한다.\n- 모달/Drawer는 제목과 닫기 버튼, ESC 닫기, focus 복귀를 포함한다.\n- 상태는 색상만으로 전달하지 않고 텍스트를 함께 제공한다.\n\n반응형:\n- 모바일에서는 Hero, CTA, 핵심 일정/신청 정보가 먼저 읽히게 한다.\n- 표가 필요한 경우 무리하게 카드로 바꾸지 말고 핵심 열 우선 표시 또는 가로 스크롤을 허용한다.\n- 텍스트는 부모 안에서 줄바꿈되게 하고, 겹침/잘림을 만들지 않는다.\n\n금지:\n- BO 테이블용 8px 초밀도 스타일을 사용자 화면 본문 기본값으로 쓰지 않는다.\n- 큰 설명 카드만 반복해서 첫 화면을 채우지 않는다.\n- 보라/파랑 그라데이션, 장식용 blob, 의미 없는 일러스트를 기본 hero로 쓰지 않는다.\n- 상태를 빨강/노랑/초록 글자색만으로 표시하지 않는다.\n- 기존 클래스와 토큰을 무시하고 새로운 디자인 언어를 만들지 않는다.\n\n산출물:\n- 기준 토큰을 따르는 사용자용 화면\n- Header, 본문 핵심 섹션, CTA, FAQ 또는 안내 영역, Footer\n- 접근성 속성\n- 모바일 대응\n- 상태/유형 반복값은 chip 또는 pill로 정리\n```\n\n## 출력 체크리스트\n\n- H1이 화면 목적을 직접 말하는가?\n- CTA가 첫 viewport에서 보이는가?\n- 상태/유형값이 텍스트 색상만으로 표시되지 않는가?\n- `layout.css` 기준 토큰과 클래스가 우선 사용되었는가?\n- BO 테이블 화면처럼 과도하게 조밀해지지 않았는가?\n"

          "date": "2026-06-02",
          "content": "# 휴텍씨 DB 일반사용자용 정리본\n\n## 이 폴더는 무엇인가요?\n\n`수집된DB`와 `휴텍씨DB`의 초안 자료를 내용별로 나누어 읽기 쉽게 만든\n열람용 문서입니다. 원본은 여러 표가 한 CSV에 같이 들어 있어 바로 이해하기\n어려우므로, 서비스 분류, 시험 운영, 교육 자료, 문제은행, 서비스 기획으로\n나누었습니다.\n\n## 먼저 볼 문서\n\n| 알고 싶은 내용 | 열어볼 폴더 또는 문서 |\n|---|---|\n| 어떤 서비스 분야와 급수가 있는지 | `01_분류체계/` |\n| 시험이 어떻게 구성되고 채점되는지 | `02_시험운영/` |\n| 어떤 교재와 교육과정이 준비되어 있는지 | `03_교육자료/` |\n| 실제 시험 문제와 답안 자료가 무엇인지 | `04_문제은행/` |\n| 서비스, 매칭, 결제, DB 항목 초안이 무엇인지 | `05_서비스기획/` |\n\n## 정리된 자료 규모\n\n- 서비스 분야 분류: 65건\n- 자격시험 급수 분류: 39건\n- 시험 기본설정 선택항목: 75건\n- 문제은행 본문: 47건 (개발 4건, 건강 3건, 관계교육 3건, 문서작성 5건, 생활기타 3건, 영상콘텐츠 3건, 음성콘텐츠 7건, 재무생활 4건, 전문분야 5건, 창작활동 5건, 취업 2건, 통번역 3건)\n- 통합 DB 항목 사전: 214개 열\n\n## 주의해서 읽을 점\n\n- 이 자료는 원본에 기록된 기획·수집 내용을 분류한 것이며, 확정된 서비스\n  정책이나 최종 시험 규정으로 판정한 문서가 아닙니다.\n- 원본에 있는 `개발 완료 전 확정 필요`, 물음표, 중복, 맞춤법 표기는\n  검토가 필요하다는 의미가 남도록 그대로 보존했습니다.\n- 병렬로 배치된 원본 표의 관계가 분명하지 않은 경우에는 임의로 합치지\n  않았습니다. CSV의 `원본파일`, `원본행` 열로 출처를 확인할 수 있습니다.\n- 문제은행의 모범답안 및 채점자용 자료는 응시자 공개 범위를 별도로\n  결정해야 합니다.\n\n## 원본에서 어디로 정리되었나요?\n\n| 원본 파일 | 정리 위치 |\n|---|---|\n| `수집된DB/분야.csv` | `01_분류체계/` |\n| `수집된DB/대표 DB-시험정보.csv` | `02_시험운영/시험_기본설정_선택항목.csv` |\n| `수집된DB/대표DB.csv` | `02_시험운영/`, `05_서비스기획/서비스운영_기획원문_읽기자료.md` |\n| `수집된DB/문제와 채점지.csv` | `02_시험운영/` |\n| `수집된DB/통합사본.csv` | `05_서비스기획/` |\n| `휴텍씨DB/교재.csv` | `03_교육자료/` |\n| `휴텍씨DB/커리.csv`, `휴텍씨DB/커리 급수별 (프롬).csv` | `03_교육자료/교육과정_전체_읽기자료.md` |\n| `휴텍씨DB/문제은행.csv` | `04_문제은행/` |\n\n## 재생성\n\n입력 CSV가 수정된 후 동일한 구조로 다시 정리하려면\n`python3 일반사용자용_정리DB/_생성도구/정리본_생성.py`를 실행합니다.\n"

          "date": "2026-06-02",
          "content": "# 시험 문항과 채점 방식 요약\n\n이 문서는 원본 시트에 함께 배치된 문항 수, 채점 대상, 응시 급수 메모를\n읽기 위한 자료입니다. 기재된 값은 운영 확정본이 아니라 수집 자료의 원문입니다.\n\n## 원문 항목\n\n- 원본 2행: 시험영역 / 윤리-객관식 / 채점기준표 / 단답형, / 유사어 답안 / 객관식 / 단답형 / 프롬- / 질문쓰기 / 프롬 / 답변수정/ / 번역 동일 / 프롬 답변 비교 채점/  번역 동일 / 객관, 단답 답지 / 전문 응시표 / 채점기준표 / 시험영역 / 급수 / 세부급수 / 영역 / 대 / 중 / 소 / 번역 / 출발어(109개) / 번역 / 도착어(109개) / 엑셀다운\n- 원본 3행: 자동채점 / 채점자, / 관리자용 / 출제자용 / 자동채점 / 자동채점 / 자동 + 휴머주관식 - 유사어 , 모범답안 / 자동 + 휴머주관식 - 유사어 , 모범답안 / 일반 1급 / 전문가만 / 객관+휴먼 / 응시자용 / 채점표 / 형태 / 응시자용 / 채점 가이드라인 / 응시자용\n- 원본 4행: 프롬프트 / 20 / 10 / 대중소 5개 중 / 2개 선택 / 대중소 5개 중 / 2개 선택 / 일반 / 1급\n- 원본 5행: 번역 / 1~5점까지의 기준을 넣어야 함 / 채점기준 / 일반 / 2급\n- 원본 6행: 객관, 단답, 주관식 유사어 자동채점 / 채점디비확인- 유사어 / 일반 / 3급\n- 원본 7행: 10 / 2 / 2 / 2 / 2 / 2 / 전문 / 1급\n- 원본 8행: 전문 / 2급\n- 원본 9행: 교육 / 3급\n- 원본 10행: 교육 / 2급\n- 원본 11행: 교육 / 1급\n- 원본 12행: 교육 / 5급\n- 원본 13행: 교육 / 4급\n- 원본 14행: 답안채점 / 교육 / 6급\n- 원본 15행: 프롬프트 / 교육 / 7급\n- 원본 16행: 번역 / 교육 / 8급\n- 원본 17행: 윤리 - 공통 / 10 / 윤리 / 교육7-8\n- 원본 18행: 10 / 교육 5-6\n- 원본 19행: 10 / 중등 3-4\n- 원본 20행: 10 / 교육 1-2\n- 원본 21행: 15 / 일반 1-전문 2\n- 원본 22행: 15 / 일반2-3급\n- 원본 23행: 20 / 전문 1\n\n출처: `수집된DB/문제와 채점지.csv`\n"

          "content": "# 교육과정 원문 읽기자료\n\n원본 CSV에는 여러 교육과정 표가 같은 행에 병렬로 저장되어 있습니다.\n아래는 비어 있는 칸을 제거하여 원문 내용을 행 단위로 읽을 수 있게 정리한 것입니다.\n과정 간 대응 관계가 명확하지 않은 부분은 임의로 합치지 않았습니다.\n\n## 프롬프트 급수별 교육과정\n\n출처: `휴텍씨DB/커리 급수별 (프롬).csv`\n\n- 2행: 과정 명칭: 프롬프트 엔지니어 일반 1·2급 과정 / 과정 명칭: 프롬프트 엔지니어 일반 3급 과정 / 과정 명칭: 프롬프트 엔지니어 전문 1급·2급 과정 / 과정 명칭: 프롬프트 엔지니어 교육 1급 ~ 8급 과정 / 각 단계별 실습은 다음 항목을 포함합니다:\n- 3행: 대상: 일반 성인, 비전공 대학생, 프롬프트 입문자 / 대상 / 교육 목표 / 예시 주제 / 대상: 기업 실무자, 팀 리더, 정책기획자, 콘텐츠 기획자 / 대상: 변호사, 노무사, 의사, 회계사 등 고도화된 도메인 실무자 / 급수\n- 4행: 주차 / 교육 내용 / 주제 / 교육 내용 / 주제 / 초등 고학년 / GPT가 하는 일 이해 / 질문 구성 / 간단한 대화 / \"동물에 대해 물어보기\", \"상상 친구 만들기\" / 교육 내용 / 주제 / 주차 / 주차 / 교육 1~2급 / 프롬프트 설계 실습: 목적, 문체, 형식 조건을 반영하여 직접 작성\n- 5행: 1주차 / 마케팅, 교육, 정책, 제조 등 분야별 사례 분석 / 도메인 AI 활용 트렌드 / 법률, 의료, 인사, 회계 분야별 사례 리뷰 / 생성형 AI 개론 / 중학교 / 질문의 정확성, 간단한 명령어 활용 / 톤 이해 / \"자기소개서 써보기\", \"나만의 설명문 만들기\" / GPT 개념, 프롬프트란 무엇인가, 활용 사례 탐색 / 산업별 AI 활용 현황 / 1주차 / 1주차 / 교육 3~4급 / GPT 결과 생성 실습: 다양한 모델(GPT-4o, Claude 등)을 활용한 결과 생성\n- 6행: 2주차 / 조건문, 다중 지시, 모델 응답 제어 기법 / 법률/의료용 프롬프트 설계 / 실제 조문, 진단 분류 기반 명세화 방법 / 기본 프롬프트 구조 / 고1~고2 / 문체/형식 지정 / 윤리 구분 / 결과 수정 / \"학교 신문 기사 만들기\", \"비건 식단 설명 프롬프트\" / 역할 부여, 지시 목적, 형식 지정법 배우기 / 고급 프롬프트 설계 / 2주차 / 2주차 / 교육 5~6급 / 결과 수정 및 평가 실습: AI 결과의 문제점을 인식하고 보완하는 훈련\n- 7행: 3주차 / 프롬프트-출력-수정의 품질평가 기준 학습 / 판례·논문 분석 자동화 / GPT로 정보 추출, 요약, 분류 기법 실습 / 문체/톤 제어 / 고3 / 실전형 프롬프트 작성 / 결과 분석 / 수정 보완 / \"진로 탐색 자기소개서\", \"AI 토론 주제 정리\" / 따뜻한 설명체, 뉴스 스타일 등 톤 조절 연습 / 결과물 평가 루브릭 이해 / 3주차 / 3주차 / 교육 7~8급 / 도메인별 실전 실습: 교육/법률/의료/콘텐츠 등 분야 특화 프롬프트 구성\n- 8행: 4주차 / 보고서, 발표자료, 정책 제안서 등 실습 / 상담·설문 시나리오 프롬프트 / 진단/질문 자동화 설계, 인터랙티브 프롬프트 / 문서 생성 실습 / 리포트, 이메일, 안내문 등 작성 실습 / 업무용 문서 프롬프트 / 4주차 / 4주차 / 교재 제공: 연령별 맞춤형 프롬프트 실습지, 예제 중심 텍스트, GPT 대화 환경 제공 / 모의 시험 실습: PromptCert 유형에 맞춘 실전형 문제 풀이 및 루브릭 기반 자가평가\n- 9행: 5주차 / 역할 분담 기반 다중 프롬프트 연계 과제 수행 / AI 생성물의 법적·윤리적 검토 / 위법 가능성, 편향 판단, 책임 분리 구조 이해 / 일상 활용 예제 / 여행계획, 쇼핑정보, 생활조언 생성 프롬프트 / 팀 협업형 생성 과제 / 5주차 / 5주차 / 실습 도구: 학교 전용 GPT 인터페이스, 워크시트 작성, 결과 평가표 포함\n- 10행: 6주차 / 스타일 지시, 구도 설정, 내레이션 구성 등 / 복합 문서 자동화 / 계약서, 동의서, 진단서 등 실전 출력 실습 / 윤리 이해와 기본 오류 수정 / 허위정보 탐지, 과장 표현 수정 실습 / 이미지·영상 생성 실습 / 6주차 / 6주차 / 강사 운영 가이드: 초중고 교사 대상 연수 자료, 채점 기준표 및 결과 분석 도구 제공\n- 11행: 7주차 / 워크플로우 도구(Python, Zapier 등)와 연계 / 전문가 포트폴리오 구축 / 도메인별 생성 예시 + 수정본 + 활용 로그 정리 / 간단한 결과물 분석 / 생성 결과 평가 및 간단한 수정 연습 / GPT 결과 자동화 활용 / 7주차 / 7주차\n- 12행: 8주차 / 기업 시나리오 기반 프롬프트 기획 → 실행 → 평가 / 전문가 평가 + 실전 과제 / 모의 사례기반 생성 및 전문가 루브릭 평가 / 초급 종합 과제 / 주어진 주제에 맞는 프롬프트 기획 + 결과 수정 / 중급 종합 프로젝트 / 8주차 / 8주차\n\n## AI 번역, AI 윤리 및 실습 커리큘럼\n\n출처: `휴텍씨DB/커리.csv`\n\n- 2행: ① 기본 수업 커리큘럼 (이론 중심 60시간) / AI 윤리 강의 커리큘럼 (총 30시간) / 🧩 Ⅰ. 공통 과정 (총 30시간) / 기본과정을 마친 후, 실제 프로젝트 기반으로 진행되는 완전 실무형 과정입니다.\n- 3행: 구분 / 시간 / 주요 내용 / 시간 / 주요 내용 / 시간 / 주요 주제 / 세부 내용 / 교육 목표 / 구분 / 구분 / 각 단계별로 실습 비중을 높이고, 결과물 완성도를 평가합니다.\n- 4행: AI 번역 실무 (공통) / 10H / - AI에게 질문을 올바르게 던지는 기술 / 10시간 / • AI 번역 개념 이해 및 비교 실습 / 5시간 / AI 데이터 보안과 개인정보 보호 / - AI 학습 데이터에서 개인정보가 노출되는 사례 / AI 번역 전·후편집 이해 및 실무 적용 / 1️⃣ 개인정보·보안 윤리 / 1. Pre-Prompt (10시간) / Ⅰ. 공통 심화 실습 (총 30시간)\n- 5행: - 목적별 프롬프트 설계 방법 / 시간 / 주요 내용 / • Pre & Post Editing 기초 / - 프라이버시 보호를 위한 최소 수집 원칙 / 구분\n- 6행: - GPT·Gemini·Claude 비교 실습 / 10H / - 실전 과제 중심 프롬프트 설계 / • 주요 AI 번역 툴(GPT, DeepL 등) 활용 / - 국내외 개인정보 보호법(GDPR, PIPA) 비교 / 1. Pre-Prompt 실습 (10시간)\n- 7행: 콘텐츠 번역 수업 (공통) / - 프롬프트 구조 분석 및 품질 평가 / 20시간 / - 산업별 목적형 질문 훈련 / • 웹툰·웹소설·영상자막 번역 실습 / - 보안 위반 사례 분석 및 대응 가이드라인 / 다양한 콘텐츠 번역 감각 및 편집력 향상\n- 8행: 10H / - GPT 기반 프롬프트 작성 실습 / - 팀별 프롬프트 전략 피드백 / • 마케팅·비즈니스 문서 번역 / 5시간 / 생성형 AI의 저작권 및 사용 권한 / - AI 생성물의 저작권 개념과 판례 / 2️⃣ 저작권·라이선스 윤리 / 2. Prompt Translation (10시간)\n- 9행: - 한국어 ↔ 영어 변환 프롬프트 설계 / 10H / - 실무 프로젝트 기반 프롬프트 작성 / • 문체와 표현력 훈련 / - 라이선스 유형(오픈소스, 크리에이티브커먼즈 등) 이해 / 2. Prompt Translation 실습 (10시간)\n- 10행: AI 융합 수업 (공통) / - 산업별 프롬프트 응용 (기획, 마케팅, 번역 등) / 5시간 / - 협업툴 연동 (Notion, Canva, Slack 등) / • GPT 프롬프트 설계 및 적용 / - 프롬프트 결과물의 재사용·공유 시 유의점 / AI 시대 언어교육의 확장 이해\n- 11행: - 커스터마이징 프롬프트 실습 / - 데이터 입력→AI 생성→결과 활용까지 실습 / • AI 윤리와 데이터 관리 / - 실제 저작권 분쟁 사례 토론\n- 12행: 10H / - AI 결과물의 품질 평가 및 수정 기준 / 10H / - AI 결과물의 완성도 향상 /           "content": "# 디자인 시스템 ver2 통합 고도화 프롬프트\n\n아래 프롬프트는 현재 `index.html`을 기준 문서로 삼아, 기존 `index.html`의 디자인 시스템을 보존하면서 시험 랜딩페이지와 이후 추가될 페이지/컴포넌트까지 통합 적용하기 위한 작업 지시문입니다.\n\n현재 상태 기준:\n- `index.html`은 기존 `index.html`의 섹션과 예시를 유지하면서 `고도화` 탭, 게시판 예시, radius 0 정책, 컴포넌트 보완 체크리스트를 추가한 버전이다.\n- `layout.css`에는 공통 토큰, 내비게이션, 패널, 컴포넌트 스타일이 있고, `index.html`은 일부 보완 스타일을 문서 내부 `\u003cstyle>`로 추가하고 있다.\n- `common.js`는 컴포넌트 필터, 탭, 토스트, 모달, Rules 미리보기, 레이아웃 선택 예시 등 문서 상호작용을 담당한다.\n- 시험 랜딩페이지 관련 실물 폴더는 현재 저장소 루트에서 확인되지 않았으므로, 프롬프트 실행 시 실제 경로가 있으면 우선 확인하고 없으면 `index.html`, `docs/시험사이트_분석/*`, `resource/시험사이트_분석/*`, `docs/DB_정리/*`를 근거로 적용 범위를 판단한다.\n\n## 1. 분석 및 통합 설계 프롬프트\n\n```text\n너는 시니어 프론트엔드 엔지니어이자 디자인 시스템 아키텍트다.\n\n현재 레포지토리의 휴텍씨 디자인 시스템을 `index.html` 기준으로 고도화하고, 시험 랜딩페이지까지 통합 적용할 수 있는 구조를 설계해라. 이 단계에서는 파일을 수정하지 말고, 코드베이스와 문서를 분석한 뒤 실행 계획만 제시해라.\n\n우선 확인할 기준 파일:\n- index.html\n- index.html\n- layout.css\n- common.js\n- docs/디자인시스템.md\n- docs/시험사이트_분석/*\n- resource/시험사이트_분석/*\n- docs/DB_정리/*\n- 시험_랜딩페이지/layout_redesign 또는 시험 랜딩페이지 관련 실제 경로가 있으면 해당 폴더 전체\n\n핵심 판단 기준:\n1. `index.html`을 앞으로의 기준 문서로 삼되, 기존 `index.html`에 있던 섹션/컴포넌트/문서 예시가 유실되지 않았는지 확인한다.\n2. `layout.css`의 공통 토큰과 `index.html` 내부 보완 스타일 중 어떤 항목을 공통 CSS로 승격해야 하는지 구분한다.\n3. radius 0 정책을 기본값으로 유지하되, 게시판 하위 서브탭처럼 pill 형태가 필요한 예외를 명확히 문서화한다.\n4. 관리자 화면과 사용자 화면을 분리해서 본다. 관리자 화면은 검색/필터/대량 테이블/엑셀/상태 관리 중심이고, 사용자 화면과 랜딩페이지는 서비스 소개/신청 흐름/FAQ/CTA/신뢰 요소 중심이다.\n5. 시험 랜딩페이지는 별도 디자인을 새로 만들기보다 `index.html`의 Foundation, Components, Pages 패턴으로 조립 가능한지 먼저 판단한다.\n6. 시험, 번역, 문서, 매칭, 교육, 서비스 홈페이지 등 여러 도메인에 공통 적용 가능한 패턴과 도메인별 변형이 필요한 영역을 나눈다.\n7. 추가될 가능성이 높은 컴포넌트를 미리 고려하되, 실제 구현 전에는 토큰/variant/state/API 수준까지만 정리한다.\n8. 접근성은 색상 대비, focus 상태, disabled 상태, 키보드 이동, 의미 있는 HTML 구조, aria 속성, modal focus 복귀를 기준으로 점검한다.\n9. 반응형은 단순 축소가 아니라 정보 밀도와 업무 흐름이 유지되는지 기준으로 확인한다.\n10. 불필요한 대규모 리팩터링을 제안하지 말고, 기존 클래스명과 문서 톤을 최대한 유지한다.\n\n분석해야 할 기존 컴포넌트:\n- Button: primary, secondary, ghost, danger, disabled, icon 포함 여부\n- Link: 본문 링크, 외부 링크, CTA 링크\n- Tabs: 기본 탭, 세그먼트 탭, pill 서브탭, nav category, section tabs\n- Board/List: 공지사항형 게시판, 모바일 축약형 목록\n- Form: input, select, textarea, checkbox, radio, search, date/range, file upload\n- Header/GNB: 사용자 홈페이지형, 관리자형, 문서형\n- Sidebar/LNB: 문서 목차, 관리자 아이콘 메뉴, 카테고리 메뉴\n- Footer: 홈페이지형, 문서형, 간소형\n- Table/Data grid: 관리자 대량 목록, 상태 컬럼, row action, horizontal scroll\n- Feedback: toast, modal, popup, alert, confirmation\n- Card/Panel: 정보 카드, 규칙 카드, 기능 카드, 요약 패널\n- Badge/Chip/Status: 상태값, 카테고리, 필터 토큰\n- Pagination: 목록/게시판/관리자 테이블 페이지 이동\n\n추가 가능성이 높은 컴포넌트 후보:\n- Hero: 시험/서비스 랜딩페이지 첫 화면, 핵심 CTA, 일정/접수 상태 표시\n- CTA band: 신청, 상담, 견적, 전문가 매칭 유도 영역\n- Pricing/Fee table: 시험 응시료, 서비스 비용, 환불/정산 안내\n- Schedule/Timeline: 시험 접수, 응시, 채점, 결과 발표 흐름\n- Stepper/Process: 신청서 작성, 결제, 응시, 결과 확인 단계\n- FAQ/Accordion: 시험 안내, 환불, 자격, 준비물, 문의\n- Notice/Announcement: 공지, 긴급 안내, 점검 안내\n- Empty/Loading/Error state: 데이터 없음, 처리 중, 실패 상태\n- File upload/Attachment: 엑셀 업로드, 증빙서류, 시험 자료 업로드\n- Filter bar/Advanced search: 관리자 조건 검색, 날짜/상태/분류 필터\n- Bulk action toolbar: 선택 항목 일괄 처리, 엑셀 다운로드, 상태 변경\n- Detail summary: 회원/시험/결제/결과를 한 화면에서 요약\n- Stats/KPI card: 접수 수, 결제 수, 합격률, 처리 상태\n- Breadcrumb: 관리자/문서/상세 화면 위치 표시\n- Language pair selector: 번역/시험 도메인의 출발어/도착어 선택\n- Exam card: 시험 종목, 등급, 접수 기간, 응시 가능 상태 표시\n- Certificate/Result block: 합격/불합격, 점수, 수료증/자격증 안내\n\n출력 형식:\n\n1. 현재 구조 분석\n   - `index.html`, `index.html`, `layout.css`, `common.js`의 역할\n   - `index.html`에서 새로 추가된 고도화 요소\n   - 기존 index와 비교해 보존/변경/추가된 항목\n\n2. 디자인 토큰 분석\n   - 색상, 타이포그래피, 간격, radius, shadow, z-index, 상태 색상\n   - 공통 CSS로 승격할 항목\n   - 문서 내부 스타일로 남겨도 되는 항목\n\n3. 컴포넌트 현황\n   - 이미 문서화된 컴포넌트\n   - 상태/variant/size 정의가 부족한 컴포넌트\n   - 시험 랜딩페이지 적용 시 바로 쓸 수 있는 컴포넌트\n   - 추가 설계가 필요한 컴포넌트 후보\n\n4. 시험 랜딩페이지 통합 적용 방향\n   - 사용자 랜딩페이지에 필요한 섹션 구조\n   - 관리자 시험 운영 화면과 분리해야 할 패턴\n   - 공통으로 재사용할 토큰/컴포넌트\n   - 도메인별로 변형해야 할 콘텐츠/상태값\n\n5. 접근성 및 반응형 점검\n   - focus, aria, 키보드 이동, disabled, modal, toast\n   - 모바일에서 숨김/축약/스택 처리해야 할 요소\n   - 테이블과 게시판의 모바일 대응\n\n6. 우선순위별 실행 계획\n   - 1단계: 문서와 기준 정리, 위험 낮은 CSS 보완\n   - 2단계: 공통 컴포넌트 variant/state 표준화\n   - 3단계: 시험 랜딩페이지 섹션 패턴 추가\n   - 4단계: 관리자 대량 테이블/필터/업로드 패턴 정리\n   - 5단계: 접근성, 반응형, 시각 QA\n\n7. 예상 변경 파일\n   - 변경 가능성이 높은 파일\n   - 새로 만들면 좋은 문서 또는 예시 파일\n   - 변경 전 반드시 확인해야 할 파일\n\n8. 다음 작업 제안\n   - 사용자가 바로 승인할 수 있는 작은 작업 단위로 나눠 제시해라.\n   - 각 작업마다 기대 효과와 위험도를 짧게 설명해라.\n\n주의:\n- 이 응답에서는 실제 파일을 수정하지 마라.\n- 구체적인 파일명과 근거를 들어라.\n- 모호한 개선안보다 이 레포에서 바로 실행 가능한 개선안을 우선해라.\n- `index.html`을 기준으로 판단하되, 기존 `index.html`에서 유실된 내용이 있으면 반드시 지적해라.\n- 시험 랜딩페이지 실제 경로가 없으면 없다고 명시하고, 현재 문서와 DB 자료 기준의 추정 적용안으로 분리해라.\n```\n\n## 2. 후속 구현 프롬프트\n\n분석 결과를 검토한 뒤 실제 코드를 수정할 때는 아래 프롬프트를 사용한다.\n\n```text\n앞서 만든 디자인 시스템 ver2 통합 고도화 분석 결과를 기준으로, 1단계 작업부터 실제 코드와 문서를 수정해라.\n\n작업 기준:\n- `index.html`을 기준 문서로 유지한다.\n- 기존 `index.html`의 내용은 임의로 삭제하거나 덮어쓰지 않는다.\n- 변경 범위를 작게 유지한다.\n- 기존 클래스명, CSS 변수명, 문서 톤을 최대한 유지한다.\n- `index.html` 내부에 임시로 들어간 보완 스타일 중 반복 사용 가치가 있는 항목만 `layout.css`로 옮긴다.\n- radius 0 정책을 기본값으로 유지하고, 예외는 명시적으로 제한한다.\n- 버튼, 링크, 탭, 게시판, 폼, 테이블, 피드백 컴포넌트의 variant/size/state 문서화를 우선한다.\n- 시험 랜딩페이지에 필요한 Hero, CTA, Schedule, FAQ, Pricing/Fee, Stepper, Notice 컴포넌트는 기존 토큰과 패턴으로 조립한다.\n- 관리자 대량 운영 화면에 필요한 Filter bar, Bulk action toolbar, Data grid, File upload, Status badge는 사용자 랜딩페이지 컴포넌트와 분리해서 정리한다.\n- 변경 후에는 영향받는 HTML/CSS/JS를 확인하고, 가능하면 브라우저에서 시각적으로 검증한다.\n- 수정한 파일, 변경 이유, 검증 결과를 마지막에 요약한다.\n```\n\n## 3. 시험 랜딩페이지 제작 프롬프트\n\n시험 랜딩페이지를 실제 화면으로 만들 때는 아래 프롬프트를 사용한다.\n\n```text\n`index.html`과 `layout.css`의 디자인 시스템을 기준으로 시험 랜딩페이지 화면을 제작해라.\n\n화면 목적:\n- 사용자가 시험의 성격, 대상, 일정, 접수 방식, 응시 흐름, 비용, FAQ를 빠르게 이해하고 신청 또는 문의로 이동하게 한다.\n- 관리자 대량 관리 화면처럼 보이지 않게 한다. 랜딩페이지는 사용자용 서비스 소개와 신청 전환 중심으로 구성한다.\n\n필수 섹션:\n1. Header/GNB\n2. Hero: 시험명, 핵심 설명, 접수 상태, 주요 CTA\n3. 시험 개요: 대상, 등급, 과목, 응시 방식\n4. 일정/절차: 접수, 결제, 응시, 채점, 결과 발표\n5. 비용/환불 또는 안내 표\n6. 준비물/유의사항\n7. FAQ\n8. 최종 CTA\n9. Footer\n\n디자인 원칙:\n- 기존 토큰과 컴포넌트를 우선 사용한다.\n- radius는 기본 0으로 유지한다.\n- CTA는 명확하지만 과도한 장식은 피한다.\n- 일정, 상태, 비용처럼 비교가 필요한 정보는 표나 리스트로 정리한다.\n- 모바일에서는 Hero CTA, 일정, FAQ가 먼저 읽히도록 스택 순서를 조정한다.\n- 접근성 기준에 맞게 heading 구조, 버튼/링크 역할, focus 상태를 유지한다.\n\n검증:\n- 데스크톱과 모바일에서 텍스트가 겹치지 않는지 확인한다.\n- CTA, FAQ, 탭/아코디언이 있으면 키보드로 조작 가능한지 확인한다.\n- 기존 `index.html`의 컴포넌트 규칙과 어긋나는 임의 색상/간격/폰트 크기를 쓰지 않는다.\n```\n"
        }, {

          "path": "디자인시스템/docs/old/디자인시스템_밀도강화_Drawer_프롬프트.md",
          "date": "2026-06-04",
          "content": "# 디자인 시스템 ver3 밀도 강화 및 Drawer 전환 프롬프트\n\n아래 프롬프트는 현재 `index.html`, `layout.css`, `common.js`, `dense-drawer.css`, `dense-drawer.js`, `docs/디자인시스템.md`를 기준으로 디자인 시스템의 마크업 밀도를 높이고, BO 회원 테이블 상세 편집 방식을 우측 Drawer로 유지/확장하기 위한 작업 지시문입니다.\n\n현재 변경 방향:\n- 이 버전에서 가장 중요한 원칙은 밀도 강화다. 같은 정보를 더 낮은 높이와 더 적은 빈칸으로 읽을 수 있으면 그 방식을 우선한다.\n- `index.html` 자체를 최종 기준 문서로 업데이트하며, 별도 실험 파일에만 남기지 않는다.\n- 검색/필터/체크박스/옵션 그룹은 항목이 적을 때 불필요하게 양끝으로 벌어지지 않아야 한다.\n- 항목 수가 적으면 `justify-start`처럼 앞에서부터 자연스럽게 붙고, 항목이 많아지면 줄바꿈과 가용 폭을 사용해 화면을 최대한 채운다.\n- 검색바에는 다수 옵션을 넣어 실제로 많은 조건이 들어왔을 때도 레이아웃이 깨지지 않는지 테스트한다.\n- 회원목록 상세 편집은 기존의 행 하단 아코디언 방식이 아니라 우측 Drawer 방식으로 바꾼다.\n- Drawer는 목록 맥락을 유지하면서도 테이블 높이를 늘리지 않는 BO 상세 패턴으로 정의한다.\n- 참고예시는 한두 개가 아니라 검색/필터, 카드, 목록, 체크박스, 태그, 타임라인, sparse 정보, attribute overflow까지 충분히 많이 둔다.\n\n## 1. 분석 프롬프트\n\n```text\n너는 시니어 프론트엔드 엔지니어이자 디자인 시스템 아키텍트다.\n\n현재 레포지토리의 휴텍씨 디자인 시스템을 기준으로, 마크업 밀도를 높이는 새 버전을 설계해라. 이 단계에서는 파일을 수정하지 말고, 기존 구조와 수정 지점을 분석한 뒤 실행 계획만 제시해라.\n\n우선 확인할 기준 파일:\n- index.html\n- layout.css\n- common.js\n- dense-drawer.css\n- dense-drawer.js\n- docs/디자인시스템.md\n- docs/디자인시스템_고도화_프롬프트.md\n\n핵심 목표:\n1. 밀도 강화가 최우선이다. 정보가 읽히는 범위 안에서는 카드 높이, 행 높이, gap, padding을 줄이고 한 줄 표현을 우선한다.\n2. 검색/필터/체크박스/옵션 그룹이 항목 수가 적을 때 `justify-content: space-between`처럼 양끝으로 벌어지지 않게 한다.\n3. 항목 수가 적으면 좌측부터 조밀하게 배치하고, 항목 수가 많아지면 줄바꿈 또는 그리드 흐름으로 가용 행을 최대한 사용하게 한다.\n4. 컨테이너가 넓어도 각 옵션이 불필요하게 늘어나지 않도록 `width: auto`, `flex: 0 0 auto`, `max-width`, `minmax`, `auto-fit/auto-fill` 사용 여부를 판단한다.\n5. 검색바에는 실제 운영 화면처럼 많은 조건을 넣어 테스트한다. 예: 검색어, 회원유형, 권한, 상태, 등급, 가입경로, 마케팅 수신, 이메일 인증, 휴면 여부, 최근 로그인, 가입일 기간, 담당자, 정렬, 활성 필터 태그.\n6. 활성 필터 태그와 `필터 전체 해제`는 항목이 적을 때 오른쪽 끝으로 밀리지 않아야 한다. 필요하면 별도 action row를 만들되 기본은 flow 안에서 자연스럽게 배치한다.\n7. 회원목록 상세 편집은 기존 행 하단 아코디언을 폐기하고 우측 Drawer로 전환한다.\n8. Drawer는 `role=\"dialog\"`, `aria-modal` 적용 여부를 명확히 판단한다. 목록을 계속 조작할 수 없는 오버레이 Drawer라면 modal dialog로, 목록과 병행 조회하는 고정 side panel이면 complementary 영역으로 설계한다.\n9. 기존 radius 0 정책은 유지한다. 칩, 스위치, 서브탭 예외도 새 밀도 규칙과 충돌하지 않게 정리한다.\n10. 기존 클래스명과 문서 톤을 최대한 유지하되, 새 패턴이 필요하면 `dense-*`, `drawer-*`, `member-drawer-*`처럼 역할이 분명한 이름을 제안한다.\n11. 접근성은 focus 이동, ESC 닫기, 닫은 뒤 트리거 버튼으로 focus 복귀, Drawer 제목 연결, 저장/삭제 버튼의 위험도 구분을 기준으로 점검한다.\n\n분석해야 할 기존 지점:\n- `layout.css`의 `.filter-bar`, `.filter-search`, `.filter-group`, `.filter-active`, `.filter-clear`\n- `index.html`의 `검색·필터링 패턴` 예시\n- `index.html`의 `회원목록 + 우측 Dense Drawer` 예시\n- `common.js`의 `[data-filter-bar]` 상호작용\n- `dense-drawer.js`의 `[data-drawer-open]`, `[data-drawer-form]`, `[data-drawer-close]` 상호작용\n- `docs/디자인시스템.md`의 `4.6 Table` 회원목록 규칙\n\n출력 형식:\n\n1. 현재 레이아웃 문제 요약\n   - 항목이 적을 때 불필요하게 벌어지는 지점\n   - 항목이 많을 때 줄바꿈, overflow, 버튼 밀림 가능성이 있는 지점\n   - 문서 규칙과 실제 예시가 충돌하는 지점\n\n2. 밀도 강화 레이아웃 원칙\n   - `space-between`을 피해야 할 컴포넌트\n   - `justify-start`, `align-content: start`, `flex-wrap`, `gap` 기준\n   - 검색 입력만 늘어나고 옵션/버튼은 내용 폭을 유지하는 기준\n   - 많은 옵션이 있을 때 행을 최대한 쓰는 기준\n   - 모바일에서 스택 처리할 기준\n\n3. 검색바 다옵션 테스트 설계\n   - 포함할 옵션 그룹 목록\n   - 각 그룹의 단일 선택/다중 선택 여부\n   - 활성 필터 태그 생성 방식\n   - `필터 전체 해제` 버튼 위치\n   - 데스크톱/태블릿/모바일 검증 포인트\n\n4. 회원 Drawer 전환 설계\n   - 기존 하단 아코디언에서 제거할 마크업과 JS\n   - 새 Drawer DOM 구조\n   - 열기/닫기/focus/ESC/저장/삭제 상호작용\n   - Drawer 폭, 위치, 스크롤, 모바일 전체 화면 처리\n   - 테이블 행 선택 상태와 Drawer 제목/내용 동기화 방식\n   - 최근 활동, 처리 이력, 인증 이력처럼 짧은 이벤트성 정보는 항목 내부는 한 줄, 목록 전체는 2~4단으로 펼치는 기준\n   - 기본 정보 입력은 `라벨 · 입력필드`를 가능한 한 한 줄로 배치하는 기준\n\n5. 접근성 및 QA\n   - 키보드 이동\n   - focus-visible\n   - Drawer 제목과 닫기 버튼 label\n   - 삭제 확인 흐름\n   - 텍스트 겹침, 줄바꿈, 가로 스크롤 점검\n\n6. 예상 변경 파일\n   - 수정할 파일과 이유\n   - 새로 추가할 수 있는 class/data attribute\n   - 문서에서 바꿔야 할 규칙\n\n7. 구현 순서\n   - 작은 작업 단위로 나누고, 각 단계마다 검증 방법을 적어라.\n\n주의:\n- 이 응답에서는 실제 파일을 수정하지 마라.\n- 기존 디자인 시스템의 radius 0 정책과 BO 고밀도 정보 구조는 유지해라.\n- 단순히 여백만 줄이지 말고, 항목 수에 따라 자연스럽게 차는 레이아웃 규칙을 만들어라.\n- 회원 상세는 하단 아코디언이 아니라 우측 Drawer를 기준으로 설명해라.\n```\n\n## 2. 후속 구현 프롬프트\n\n분석 결과를 검토한 뒤 실제 코드를 수정할 때는 아래 프롬프트를 사용한다.\n\n```text\n앞서 만든 디자인 시스템 밀도 강화 및 Drawer 전환 분석 결과를 기준으로 실제 코드와 문서를 수정해라.\n\n작업 기준:\n- `index.html`을 기준 문서로 유지한다.\n- 기존 섹션과 컴포넌트 예시는 임의로 삭제하지 않는다.\n- 변경 범위는 검색/필터 패턴, 회원 테이블 상세 패턴, 관련 문서 규칙에 집중한다.\n- 검색/필터/체크박스/옵션 그룹은 항목이 적을 때 좌측부터 조밀하게 배치한다.\n- 항목이 많아지면 줄바꿈과 가용 폭을 사용해 행을 최대한 채운다.\n- `justify-content: space-between`은 헤더, 푸터, 명확한 양끝 액션 구조처럼 필요한 곳에만 남긴다.\n- 필터 옵션, 체크박스 옵션, 활성 필터 태그는 `justify-start` 기반 flow로 정리한다.\n- 검색 입력은 필요한 경우에만 늘어나고, 칩/버튼은 내용 폭을 유지한다.\n- 검색바 예시는 많은 옵션을 포함한 고밀도 테스트 케이스로 확장한다.\n- 회원목록의 상세 편집은 우측 Drawer 기준을 유지하고, 하단 아코디언 패턴이 다시 들어오지 않게 한다.\n- Drawer는 데스크톱에서 우측 고정 패널, 모바일에서 화면 폭을 사용하는 패널로 동작하게 한다.\n- Drawer 열기 버튼은 `aria-expanded`와 대상 연결을 유지하고, 닫기 후 focus를 원래 버튼으로 되돌린다.\n- ESC로 닫기, backdrop 또는 닫기 버튼으로 닫기, 저장/삭제/닫기 액션을 구현한다.\n- 삭제는 위험 액션이므로 기존 danger 버튼 스타일을 사용하고 확인 흐름을 남긴다.\n- `docs/디자인시스템.md`의 회원목록 규칙을 하단 아코디언이 아닌 우측 Drawer 기준으로 갱신한다.\n- `index.html`에는 밀도 강화 원칙 카드, 전체 검색 옵션, 카드/목록 케이스, 체크박스 flow, 2~4단 로그, 회원 상세 Drawer 샘플을 모두 반영한다.\n- 참고예시는 실제 운영에서 판단해야 하는 양을 보여줄 수 있도록 충분히 많이 만든다. 적은 정보, 많은 정보, 많은 옵션, 많은 속성, 짧은 이벤트 로그를 모두 포함한다.\n- 버튼/링크 컴포넌트처럼 variant가 많은 기본 UI는 한 줄씩 반복 나열하지 않는다.\n- 버튼은 variant x size 매트릭스로 비교하고, 링크는 테이블 값/보조/위험처럼 역할별 조밀 목록으로 정리한다.\n- 동일 역할의 버튼/링크 예시가 `UI별 보기`와 상세 섹션에 중복될 때는 상세 섹션에서 더 압축된 기준표를 제공하고, 카드 미리보기는 최소 샘플만 둔다.\n- 변경 후 HTML/CSS/JS를 확인하고 가능하면 브라우저에서 데스크톱/모바일 시각 검증을 수행한다.\n\n구현할 검색바 테스트 옵션 예시:\n- 검색어 입력\n- 회원유형: 전체, 일반회원, 강사, 관리자, 기업회원\n- 권한: 읽기, 작성, 승인, 정산, 시스템관리\n- 상태: 활성, 휴면, 정지, 탈퇴대기\n- 등급: Basic, Silver, Gold, VIP\n- 가입경로: 홈페이지, 관리자등록, 캠페인, 제휴사\n- 수신동의: 이메일, SMS, 카카오 알림\n- 인증상태: 이메일 인증, 휴대폰 인증, 미인증\n- 기간: 가입일 시작/종료, 최근 로그인 시작/종료\n- 담당자: 전체, 박민수, 정유진, 오지훈\n- 정렬: 최신 가입순, 최근 로그인순, 이름순, 등급순\n\n검증:\n- 검색바 옵션이 적을 때 양끝으로 벌어지지 않는지 확인한다.\n- 옵션이 많을 때 한 줄에 억지로 압축되지 않고 여러 행을 사용하면서 정렬이 유지되는지 확인한다.\n- 활성 필터 태그가 많아져도 `필터 전체 해제`가 어색하게 오른쪽 끝으로 밀리지 않는지 확인한다.\n- 회원 상세를 열었을 때 테이블 하단에 새 행이 생기지 않고 우측 Drawer가 열린다.\n- Drawer를 닫으면 선택 행 상태와 버튼 `aria-expanded`가 원복된다.\n- 키보드로 Drawer를 열고 닫을 수 있고 focus가 복귀한다.\n- 모바일에서 Drawer와 테이블이 겹쳐 읽기 어려운 상태가 되지 않는다.\n- 최근 활동 타임라인은 목록 전체를 1열로 고정하지 않는다. Drawer 폭이 허용하면 2~4단 그리드로 펼친다.\n- 각 타임라인 항목 내부만 `시간 · 이벤트명 · 처리자/상태` 한 줄로 유지한다.\n- \"시험 접수 결제 완료\", \"이메일 인증 완료\"처럼 짧은 이벤트는 별도 카드나 여러 줄 설명으로 늘리지 않는다.\n- 최근 활동/인증/처리 이력은 카드형 여백보다 로그형 밀도를 우선한다. 행 높이는 26~30px 수준을 기준으로 잡고, border box 카드 반복보다 얇은 구분선 반복을 우선한다.\n- 타임라인 gap과 padding은 최소화한다. 예: `gap: 3~6px`, `padding-block: 3~4px`, `font-size: 11~12px`.\n- 이벤트명이 길어질 때만 핵심 이벤트명을 한 줄 말줄임 처리하고, 상세 설명은 title, tooltip, 상세 로그 또는 별도 펼침 영역으로 분리한다.\n- Drawer 기본 정보 form은 `이름` 라벨과 `이름 입력필드`처럼 라벨/필드를 다른 열 카드로 분리하지 않는다.\n- 기본 정보 입력은 `label 72px + field 1fr` 같은 한 줄 row를 우선 적용한다.\n- 이름, 권한, 연락처, 이메일, 상태, 등급, 담당자처럼 짧은 필드는 모두 한 줄 row로 유지한다.\n- 관리 메모, 긴 주소, 긴 사유처럼 장문 입력만 예외적으로 같은 row 안에서 textarea 높이를 키우거나 세로 배치를 허용한다.\n\n마지막에 수정한 파일, 변경 이유, 검증 결과를 요약해라.\n```\n\n## 3. 마크업 기준 스니펫 프롬프트\n\n구현자가 레이아웃 규칙을 헷갈리지 않도록 아래 기준을 함께 전달한다.\n\n```text\n검색/필터처럼 항목 수가 유동적인 영역은 기본적으로 flow layout으로 작성한다.\n\n권장 구조:\n- 검색 입력 영역은 `.dense-search-main`\n- 옵션 묶음은 `.dense-filter-flow`\n- 각 옵션 그룹은 `.dense-filter-group`\n- 활성 태그 영역은 `.dense-active-filters`\n- 우측 고정 액션이 꼭 필요할 때만 `.dense-filter-actions`를 별도 행으로 둔다.\n\n현재 BO 회원 검색조건 CSS 기준:\n- `.dense-filter-flow`는 `display: flex`로 둔다.\n- 역할 구분 wrapper인 `.dense-filter-role-group`은 `display: contents`로 구조만 유지한다.\n- `.dense-filter-role-body`는 컬럼 구분선 역할을 하며 `height: 100%`, `border-right: 1px solid var(--line-soft)`를 사용한다.\n- `.dense-filter-group` 내부는 grid를 한 번 더 만들지 않고 `display: flex`로 둔다.\n- 조건명은 `legend { flex: 0 0 58px; }`, 옵션 묶음은 `.dense-filter-options { flex: 1 1 auto; display: flex; flex-wrap: wrap; }`로 맞춘다.\n- 기간설정처럼 긴 조건은 `.filter-date-group .dense-filter-options { flex-wrap: nowrap; overflow-x: auto; }`로 한 줄 유지한다.\n\n금지 또는 제한:\n- 옵션 그룹 전체에 `justify-content: space-between`을 기본으로 주지 않는다.\n- 버튼 하나를 오른쪽 끝으로 보내기 위해 `margin-left: auto`를 남발하지 않는다.\n- 체크박스가 2~3개뿐인데 컨테이너 전체 폭에 균등 분산하지 않는다.\n- 칩이나 체크박스 라벨을 강제로 같은 폭으로 늘리지 않는다.\n\n회원 상세:\n- 테이블 행 아래 `\u003ctr class=\"member-detail-row\">`를 펼치는 방식은 새 버전에서 사용하지 않는다.\n- `data-drawer-open` 버튼은 우측 Drawer를 여는 트리거가 된다.\n- Drawer 안에는 회원 기본 정보, 권한/상태/등급, 연락처, 메모, 위험 액션을 배치한다.\n- Drawer는 목록을 가리지 않는 폭을 우선하되, 좁은 화면에서는 전체 폭 패널로 전환한다.\n- Drawer의 활동/이력 리스트는 우선 2~4단 밀도형으로 만든다.\n- 활동/이력 항목 하나의 내부 구조는 `시간`, `이벤트명`, `처리자 또는 상태` 3요소를 한 줄로 둔다.\n- 활동/이력 컨테이너는 `grid-template-columns: repeat(auto-fit, minmax(200px, 1fr))` 같은 방식으로 2~4단을 만든다.\n- 이벤트명은 `minmax(0, 1fr)`로 남은 폭을 쓰고 `white-space: nowrap`, `overflow: hidden`, `text-overflow: ellipsis`를 적용한다.\n- 처리자/상태는 `max-content`로 유지하고, 긴 설명은 같은 줄에 억지로 모두 넣지 않는다.\n- 모바일에서도 가능하면 2단을 유지하고, 아주 좁은 화면에서만 1단으로 내린다.\n- Drawer 기본 정보 form은 `.drawer-inline-field` 같은 한 줄 row 패턴을 사용한다.\n- `.drawer-inline-field`는 `grid-template-columns: 72px minmax(0, 1fr)`처럼 라벨 폭만 고정하고 입력필드가 남은 폭을 사용하게 한다.\n- 라벨과 입력필드를 각각 별도 카드/열로 나누지 않는다.\n- 한 줄 row가 많아질 때는 row 자체를 `auto-fit/minmax` 그리드로 배치해 Drawer 폭을 채운다.\n```\n"

          "content": "# 휴텍씨 디자인 시스템\n\n기준 파일: `index.html`, `layout.css`, `common.js`, `dense-drawer.css`, `dense-drawer.js`, `table_design/*`\n\n이 문서는 현재 `index.html`에 구현된 디자인 시스템 화면을 기준으로, 이후 시험/번역/서비스 홈페이지를 만들 때 반복 적용할 공통 규칙을 정리한 문서입니다.\n\n## 1. 시스템 원칙\n\n### 1.1 공통 틀 우선\n\n홈페이지와 업무 화면은 개별 페이지를 바로 만들기보다 다음 공통 틀을 먼저 고정합니다.\n\n- Header: 로고, 주요 메뉴, 사용자/알림 영역\n- Sidebar 또는 Rail: 업무별 보조 탐색\n- Content: 검색, 필터, 목록, 상세, 작성 영역\n- Footer: 약관, 개인정보, SNS, 저작권\n\n개별 홈페이지는 이 틀 위에 서비스 소개, 기능, 실적, 전문가 신청, 견적 의뢰, FAQ, 회사 소개를 조합합니다.\n\n### 1.2 공통과 개별 분리\n\n공통 UI와 업무 콘텐츠를 분리합니다.\n\n- 공통 UI: 버튼, 입력, 탭, 칩, 상태 pill, 테이블, 토스트, 모달, 페이지네이션\n- 개별 콘텐츠: 시험 종목, 번역 분야, 고전 번역 설명, 마케팅 문구, 신청서 항목\n\n개별 홈페이지를 만들 때는 색상/문구/이미지/섹션 순서를 바꾸더라도 공통 UI class와 토큰은 유지합니다.\n\n### 1.3 홈페이지 목차 원칙\n\n첫 화면은 회사 소개보다 서비스 소개를 먼저 보여줍니다.\n\n권장 순서:\n\n1. 서비스 소개 / Hero\n2. 기능, 분야, 현황, 기술 설명\n3. 실적\n4. 전문가 신청\n5. 견적 의뢰\n6. FAQ, 상담, 신청 흐름\n7. 회사 소개\n\n고전 번역처럼 독립 브랜드 성격이 강한 홈페이지는 기존 번역 사이트 틀을 재사용하되, 별도 색상 구조와 현황/기술 설명을 강화합니다.\n\n## 2. 디자인 토큰\n\n### 2.1 색상\n\n| 역할 | 토큰 | 값 | 사용처 |\n|---|---|---:|---|\n| 기본 텍스트 | `--ds-color-text-primary` | `#222222` | 제목, 본문 핵심 텍스트 |\n| 보조 텍스트 | `--ds-color-text-secondary` | `#666666` | 설명, 보조 정보 |\n| 약한 텍스트 | `--ds-color-text-muted` | `#808080` | caption, placeholder 보조 |\n| 비활성 텍스트 | `--ds-color-text-disabled` | `#999999` | disabled 상태 |\n| 반전 텍스트 | `--ds-color-text-inverse` | `#ffffff` | 컬러 배경 위 텍스트 |\n| 브랜드 | `--ds-color-brand-primary` | `#0088ff` | 주요 버튼, 선택 상태 배경 |\n| 브랜드 강조 | `--ds-color-brand-primary-strong` | `#006dcc` | 연한 배경 위 텍스트, 링크, 칩 라벨 |\n| 보조 브랜드 | `--ds-color-brand-secondary` | `#822afd` | 전문가 신청 CTA |\n| 성공 | `--ds-color-accent-success` | `#51b117` | 성공 상태 면/아이콘 |\n| 성공 강조 | `--ds-color-accent-success-strong` | `#2f7d0c` | 성공 텍스트 |\n| 경고 | `--ds-color-accent-warning` | `#f7b22c` | 경고 상태 면/아이콘 |\n| 경고 강조 | `--ds-color-accent-warning-strong` | `#8a5a00` | 경고 텍스트 |\n| 오류 | `--ds-color-accent-danger` | `#dc3d3d` | 삭제, 오류 버튼 |\n| 오류 강조 | `--ds-color-accent-danger-strong` | `#b42323` | 오류 텍스트 |\n| 페이지 배경 | `--ds-color-bg-page` | `#f8f9fc` | 본문 배경 |\n| 기본 배경 | `--ds-color-bg-base` | `#ffffff` | 카드, 입력, 패널 |\n| 선택 배경 | `--ds-color-bg-selected` | `#d7e7fc` | 선택 영역 배경 |\n| 정보 연한 배경 | `--ds-color-bg-info-soft` | `#e7f2ff` | 상태 pill, filter tag |\n| 기본 선 | `--ds-color-border-default` | `#e3e5ed` | 카드/입력/테이블 경계 |\n\n### 2.2 간격, 곡률, 높이\n\n| 분류 | 값 | 사용처 |\n|---|---|---|\n| Spacing | `2, 4, 6, 8, 10, 12, 16, 20, 24, 30px` | 내부 여백, gap |\n| Radius | 기본 `0px`, 예외 `20px` | 기본 요소는 0, 스위치와 칩만 pill radius 유지 |\n| Height | `24, 32, 40, 60px` | 소형 버튼, 기본 입력/버튼, 사이드 메뉴, GNB/Footer |\n\n### 2.3 폰트 크기\n\n관리자 시스템은 정보 밀도가 높으므로 작은 글자 기준을 사용합니다.\n\n| 영역 | 기준 |\n|---|---:|\n| BO 기본 본문 | `8px` |\n| BO 테이블 헤더 | `8px` |\n| BO 테이블 셀 | `8px` |\n| BO 보조 정보 | `8px` |\n| BO 페이지 제목/상단바 | 화면 위계상 필요한 경우만 `12~14px` |\n\n사용자 디자인 시스템은 관리자 기준보다 약 `+2px` 크게 잡습니다.\n\n| 영역 | 기준 |\n|---|---:|\n| 제목 | `14~15px` |\n| 표 제목 | `13~14px` |\n| 내용 | `10~12px` |\n\n권장 토큰:\n\n```css\n--ds-admin-body-font-size: 8px;\n--ds-admin-table-title-font-size: 8px;\n--ds-admin-table-cell-font-size: 8px;\n--ds-admin-caption-font-size: 8px;\n--ds-admin-title-font-size: 13px;\n--ds-user-title-font-size: 15px;\n--ds-user-table-title-font-size: 14px;\n--ds-user-body-font-size: 12px;\n```\n\n## 3. 접근성 기준\n\n### 3.1 명도 대비\n\n버튼, 칩, 상태 pill, badge, tag를 만들 때는 텍스트와 배경 또는 주요 경계의 명도 대비를 최소 `3:1` 이상으로 유지합니다.\n\n현재 시스템에서 지켜야 할 조합:\n\n- 연한 파란 배경 위 텍스트: `--ds-color-brand-primary-strong` 사용\n- 컬러 버튼 위 텍스트: `--ds-color-text-inverse` 사용\n- 비활성 pill: `#f2f2f2` 배경 위 `#555555` 사용\n- 성공/경고/오류 텍스트: 일반 accent 색을 그대로 쓰지 말고 `*-strong` 토큰 사용\n\n주의:\n\n- `#0088ff` 텍스트를 `#d7e7fc` 위에 올리는 조합은 약하므로 피합니다.\n- `#51b117`, `#f7b22c`를 흰 배경 위 작은 텍스트로 쓰지 않습니다. 아이콘/면 색상으로 쓰거나 strong 토큰을 함께 씁니다.\n- 색상만으로 상태를 전달하지 말고 텍스트, 아이콘, `aria-pressed`, `aria-selected`, `role=\"switch\"` 같은 상태 정보도 함께 제공합니다.\n\n### 3.2 키보드와 포커스\n\n- 버튼, 링크, 입력, 탭은 `:focus-visible` 스타일을 유지합니다.\n- 탭은 `role=\"tablist\"`, `role=\"tab\"`, `aria-selected`를 사용합니다.\n- 토글은 `role=\"switch\"` 또는 `aria-pressed`를 사용합니다.\n- 토스트 영역은 `aria-live=\"polite\"`와 `aria-atomic=\"true\"`를 사용합니다.\n- 모달은 `role=\"dialog\"`, `aria-modal=\"true\"`, 제목 연결 `aria-labelledby`를 사용합니다.\n\n## 4. 컴포넌트 규칙\n\n### 4.1 Button\n\n기본 class는 `btn`입니다. 변형은 `btn--primary`, `btn--outline`, `btn--neutral`, `btn--secondary`, `btn--danger`를 사용합니다.\n\n크기:\n\n- `btn--sm`: 24px\n- `btn--md`: 32px\n- `btn--lg`: 40px\n\n기존 호환을 위해 `small`, `large`, `outline`, `neutral`, `secondary`, `danger` 별칭도 유지하지만 새 페이지에서는 `btn--*` 형식을 우선 사용합니다.\n버튼 예시는 한 줄씩 반복 나열하지 않고 variant와 size를 매트릭스로 비교합니다.\n\n### 4.2 Link\n\n본문 이동이나 테이블 내 강조 값은 버튼 대신 `text-link`를 사용합니다.\n\n- 기본 링크: `text-link`\n- 보조 링크: `text-link muted-link`\n- 위험 링크: `text-link danger-link`\n\n링크 예시는 테이블 값, 보조 링크, 위험 링크처럼 역할별 조밀 목록으로 정리합니다.\n\n### 4.3 Tab\n\n탭은 역할에 따라 class를 선택합니다.\n\n- `tabs--underline`: 페이지 상단 주요 구분\n- `tabs--box`: 상세 정보 패널\n- `tabs--pill`: 상태/카테고리 필터\n- `tabs--segmented`: 목록/캘린더/요약 같은 보기 전환\n\n선택 상태는 `.active`와 `aria-selected=\"true\"`를 함께 맞춥니다.\n\n### 4.4 Chip, Tag, Status Pill\n\n필터와 상태 표시는 다음 class를 사용합니다.\n\n- 필터 칩: `filter-chip`\n- 활성 필터 태그: `filter-tag`\n- 규칙 필터 칩: `chip-button`\n- 상태 표시: `state-pill`\n- 비활성/검토중 상태: `state-pill off`\n- 규칙 라벨: `rule-tag`\n\n접근성 규칙:\n\n- 활성 칩은 `aria-pressed=\"true\"`를 사용합니다.\n- 연한 배경 위 텍스트는 strong 토큰을 사용합니다.\n- 상태는 색상만으로 구분하지 않고 \"완료\", \"검토중\", \"고정\", \"준고정\"처럼 텍스트를 같이 표시합니다.\n\n### 4.5 Form\n\n입력 기본 class는 `field`입니다.\n\n- 기본 높이: 32px\n- 라벨: `label`\n- 상세 입력: `textarea.field`\n- 도움말/오류 문구가 필요한 경우 `field-help`, `field-error` 패턴을 사용합니다.\n\n로그인/회원가입은 `auth-panel`, `auth-form` 패턴을 사용합니다.\n\n- 로그인은 이메일, 비밀번호, 로그인 유지, 비밀번호 찾기, 로그인 버튼으로 최소 구성합니다.\n- 회원가입은 이름, 휴대폰, 이메일, 회원 유형, 비밀번호, 비밀번호 확인, 약관 동의를 한 화면에서 처리합니다.\n- 필수 약관은 `(필수)` 문구와 `required` 속성을 함께 사용합니다.\n- 로그인과 회원가입 화면은 카드처럼 과하게 장식하지 않고 입력 흐름이 바로 보이도록 구성합니다.\n- 제출 후 피드백은 토스트로 표시하고, 실제 서비스에서는 서버 오류/검증 오류를 `field-error`로 각 필드 아래에 표시합니다.\n\n### 4.6 Table\n\n시험 목록은 `exam-table`을 사용합니다.\n\n- 테이블은 `table-scroll` 안에 넣어 가로 스크롤을 허용합니다.\n- 헤더는 12px 보조 텍스트, 본문은 14px 기준입니다.\n- 목록 폭이 넓으면 모바일에서 억지로 줄이지 않고 가로 스크롤을 허용합니다.\n\n회원목록처럼 한 행에서 많은 정보를 보고 바로 수정해야 하는 BO 화면은 `member-table` 패턴을 사용합니다.\n\n- 목록 행에는 회원번호, 이름, 권한, 연락처, 이메일, 생년월일, 성별, 가입일, 최근 로그인, 상태, 등급, 담당자, 메모처럼 판단에 필요한 정보를 충분히 노출합니다.\n- 행의 `상세` 버튼을 선택하면 테이블 하단에 행을 추가하지 않고 우측 Drawer를 엽니다.\n- Drawer는 넓은 BO 상세 패널로 사용하며 기본 정보, 요약 카드, 권한, 최근 활동, 태그, 체크리스트, 많은 속성 목록을 같은 화면에서 조밀하게 보여줍니다.\n- 기본 정보 입력은 라벨과 입력필드를 별도 카드/열로 나누지 않고 `라벨 72px + 입력필드 1fr` 형태의 한 줄 row로 배치합니다.\n- 이름, 권한, 연락처, 이메일, 상태, 등급, 담당자처럼 짧은 필드는 모두 한 줄 row로 유지합니다.\n- 관리 메모, 긴 주소, 긴 사유처럼 장문 입력만 예외적으로 같은 row 안에서 textarea 높이를 키웁니다.\n- 최근 활동, 인증, 처리 이력은 목록 전체를 1열로 고정하지 않고 Drawer 폭이 허용하면 2~4단 그리드로 펼칩니다.\n- 각 활동 항목 내부는 `시간 · 이벤트명 · 처리자/상태` 한 줄을 유지하고, 긴 이벤트명은 말줄임 처리합니다.\n- Drawer 하단에는 `삭제`, `닫기`, `저장` 버튼을 둡니다.\n- 삭제는 위험 액션이므로 실제 서비스에서는 확인 팝업을 한 번 더 연결합니다.\n- 한 번에 하나의 Drawer만 열고, 선택 행은 배경으로 표시합니다.\n- Drawer는 `role=\"dialog\"`, 제목 연결, 닫기 버튼, ESC 닫기, 닫은 뒤 트리거 버튼으로 focus 복귀를 지원합니다.\n\n### 4.6.1 BO 회원목록 inline Drawer\n\n`table_design/관리자패널_전체회원.html`은 `index.html`의 \"회원목록 + 우측 Dense Drawer\" 패턴을 별도 BO 페이지에 적용한 현재 기준 예시입니다.\n\n- 회원 검색조건은 `dense-filter-card` 안에서 `dense-filter-flow`를 사용하며, 현재 CSS 기준은 flex flow입니다.\n- 검색조건 역할 wrapper인 `dense-filter-role-group`은 `display: contents`로 구조만 유지하고, `회원 기본`, `서비스/상태`, `운영/접근` 같은 그룹명은 화면에 노출하지 않습니다.\n- `dense-filter-role-body`는 높이 100%와 우측 border로 컬럼 구분선을 만들며, 마지막 그룹의 border는 제거합니다.\n- 개별 조건은 `dense-filter-group { display: flex; }`이고, `legend`는 `flex: 0 0 58px`, 옵션 묶음은 `.dense-filter-options { flex: 1 1 auto; display: flex; flex-wrap: wrap; }` 기준으로 맞춥니다.\n- 기간설정은 `.filter-date-group .dense-filter-options`에서 `flex-wrap: nowrap; overflow-x: auto;`로 한 줄을 유지합니다.\n- 테이블 행을 클릭하면 오버레이 모달이 아니라 목록 영역 오른쪽 컬럼에 inline Drawer가 붙어서 열립니다.\n- 선택된 row는 연한 primary 배경과 좌측 primary 인디케이터로 표시합니다.\n- 테이블에서는 `이름/나이·성별`, `이메일/휴대폰`, `주소/국가`, `회원유형/구독`처럼 2줄 묶음 컬럼을 유지합니다.\n- Drawer 상세에서는 편집성을 위해 묶음 컬럼을 다시 `이름`, `나이`, `성별`, `이메일`, `휴대폰`, `주소`, `국가`, `회원유형`, `구독상태`처럼 나눕니다.\n- Drawer는 닫기 버튼, ESC 닫기, 선택 row 해제, focus 복귀를 포함합니다.\n- 이 패턴의 공통 구현은 `table_design/table-design.css`, `table_design/table-design.js`에 둡니다.\n\n### 4.7 Feedback\n\n토스트:\n\n- 기본 class: `toast`\n- 상태 class: `success`, `warning`, `danger`, `info`\n- 고정 viewport: `toast-viewport`\n\n모달:\n\n- 배경: `modal-backdrop`\n- fixed 모달: `modal-backdrop is-fixed`\n- 본문: `modal`\n- 액션: `modal-actions`\n\n## 5. 레이아웃 패턴\n\n### 5.1 기본 페이지\n\n페이지 레이아웃 섹션처럼 콘텐츠 영역 안에서 한 번 더 구분이 필요하면 하위 탭을 사용합니다.\n\n- 상위 콘텐츠 탭은 `페이지 레이아웃`, `MD 문서 보기`, `신청서폼`처럼 큰 화면 단위를 나눕니다.\n- 하위 탭은 선택된 콘텐츠 안에서 `기본 구조`, `BO 목록 화면`, `인증·폼 화면`처럼 레이아웃 유형을 나눕니다.\n- 하위 탭은 상단 세부 목차 바로 아래에 `section-subtabs`로 노출합니다.\n- 특정 상위 탭에만 하위 탭이 필요할 때는 `data-section-subtabs=\"상위섹션ID\"`와 anchor 링크를 연결합니다.\n- 하위 탭은 3depth 이후 콘텐츠 탐색에 해당하므로 사이드바나 상위 탭을 늘리지 않고 본문 안에서 처리합니다.\n- 현재 `index.html`의 좌측 사이드바에는 `BO/DB` 분류가 있으며, 관리자 테이블 실물 페이지와 DB v2 원본 참고 화면을 iframe으로 확인합니다.\n\n- `shell`: 전체 문서 구조\n- `nav`: 디자인 시스템 문서 목차\n- `main`: 본문\n- `section`: 문서 또는 화면 단위\n- `panel`: 경계가 있는 기본 패널\n- `grid two`, `grid three`, `grid four`: 반응형 그리드\n\n### 5.2 BO/DB 페이지 허브\n\n`index.html`의 `BO/DB` 섹션은 디자인 시스템 안에서 관리자 테이블 페이지를 바로 확인하는 링크 허브입니다.\n\n- `table_design/관리자패널_전체회원.html`: 50명 회원 데이터, DB v2 검색조건, inline 우측 Dense Drawer\n- `table_design/신규테이블관리.html`: 여러 신규 테이블을 전환하는 BO 테이블 페이지\n- `table_design/결제관리.html`: 결제/환불/정산 테이블 페이지\n- `resource/DB_v2_HTML/DB페이지_v2(이거사용).html`: DB v2 원본 참고 화면\n- `resource/DB_v2_HTML/관리자패널_전체회원.html`, `resource/DB_v2_HTML/결제관리.html`: 원본 비교 화면\n\n새 BO 페이지를 추가하면 `index.html`의 `BO/DB 페이지 보기` 목록에 `data-page-src`, `data-page-title` 버튼을 추가합니다. 미리보기 전환은 `common.js`의 `[data-page-src]` 핸들러가 담당합니다.\n\n### 5.3 서비스 홈페이지\n\n홈페이지는 과한 장식보다 실제 사용자가 바로 이해할 수 있는 정보 구조를 우선합니다.\n\n권장:\n\n- Hero는 서비스명/서비스 소개를 첫 신호로 보여줍니다.\n- CTA는 \"전문가 신청\", \"견적 의뢰\", \"상담하기\"처럼 실제 행동 문구로 씁니다.\n- 카드가 필요한 경우 반복 항목에만 사용합니다.\n- 검색/필터가 있는 화면은 인라인 칩과 활성 태그를 함께 제공합니다.\n\n지양:\n\n- 회사 소개를 첫 화면의 핵심으로 두는 구성\n- 상태가 색상만으로 구분되는 칩/배지\n- 좁은 입력칸과 한 화면 과밀 배치\n- 동일 역할의 버튼 class를 페이지마다 새로 만드는 방식\n\n## 6. 새 홈페이지 제작 체크리스트\n\n- 공통 `layout.css` 토큰을 먼저 연결했는가?\n- Header, Content, Footer 구조가 유지되는가?\n- 서비스 소개가 회사 소개보다 먼저 나오는가?\n- 실적, 전문가 신청, 견적 의뢰가 빠지지 않았는가?\n- 버튼은 `btn btn--variant btn--size` 조합을 쓰는가?\n- 칩/상태/badge/tag의 대비가 최소 `3:1` 이상인가?\n- 선택 상태에 `aria-pressed` 또는 `aria-selected`가 있는가?\n- 키보드 포커스가 보이는가?\n- 모바일에서 테이블/필터/헤더가 깨지지 않는가?\n- 색상 직접 입력보다 토큰 사용을 우선했는가?\n"
