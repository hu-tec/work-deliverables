          "content": "# ITT FAQ\n\n출처: https://itt.or.kr/sbMn.php?pgNm=colum\n\n## \n\n### 접수는 어떻게 하나요?\n\n시험은 홈페이지에서 접수 받고 있으며 응시자가이드의 시험 접수 안내를 참조하시기 바랍니다.\n\n### 여러 시험을 동시에 접수가능한가요?\n\n같은 번역, 같은 통역시험 끼리는 동시에 시험을 치르실수 없으므로 동시에 신청이 불가합니다. 단, 통역,번역시험은 시간이 겹치지 않으므로 동시에 신청가능합니다.\n\n### 인터넷 접수가 안될경우 어떻게 하나요?\n\n회원가입후 신청하실 시험명과 응시료를 확인하신후 시험 사무국으로 문의주시기 바랍니다.\n\n### 접수 후 고사장 변경이 가능한가요?\n\n시험신청 마감일전까지 사무국으로 전화하셔서 장소변경 신청하시면 됩니다\n\n### 접수 후 시험이나 급수 변경이 가능한가요?\n\n시험신청 마감일전까지 사무국으로 전화하셔서 장소변경 신청하시면 됩니다\n\n### 접수 후 환불은 어떻게 하나요?\n\n환불은 시험 시행일 일주일전까지만 가능하시며 시험안내-접수취소에서 신청서다운받으신후 신청하시면됩니다\n\n### 시험 연기가 가능한가요?\n\n시험 연기신청은 시험시행일 일주일전까지만 가능하시며 마이페이지-시험연기-신청버튼 클릭하셔서신청하시면 되며 2번까지 가능합니다.\n\n### 접수 내역은 어디서 확인 가능한가요?\n\n마이페이지 나의 신청내역리스트에서 확인 가능합니다\n\n### 수험표는 어디서 출력하나요?\n\n마이페이지에서 출력가능합니다\n\n### 통역을 잘 하면 앞으로 어떤 도움이 될까요?\n\n앞으로는 실용영어구사능력이 그 무엇보다 중요합니다. 실용영어란 실제 영어로 듣고 말할 수 있는 능력과 영어문장 읽고 이해하여 지식과 정보를 얻거나 자신이 말하고자 하는 내용을 영어로 쓸 수 있는 능력을 말합니다. 통번역을 잘한다는 것은 실용영어를 아주 잘 한다는 것을 뜻합니다. 일반적으로 어떤 시험의 점수가 있다는 것과 통역과 번역을 할 수 있다는 것은 아주 다릅니다. 통번역능력은 실질적인 능력을 의미하고 글로벌 시대에 꼭 필요한 능력입니다. 따라서 국제중고등학교, 외국어고 입학은 물론 대학교 입학 전형에서 실질적인 도움이 될 것이며, 글로벌 기업 취업을 할 때도 반드시 필요합니다.\n\n### 번역을 잘 하면 앞으로 어떤 도움이 될까요?\n\n앞으로는 실용영어구사능력이 그 무엇보다 중요합니다. 실용영어란 실제 영어로 듣고 말할 수 있는 능력과 영어문장 읽고 이해하여 지식과 정보를 얻거나 자신이 말하고자 하는 내용을 영어로 쓸 수 있는 능력을 말합니다. 통번역을 잘한다는 것은 실용영어를 아주 잘 한다는 것을 뜻합니다. 일반적으로 어떤 시험의 점수가 있다는 것과 통역과 번역을 할 수 있다는 것은 아주 다릅니다. 통번역능력은 실질적인 능력을 의미하고 글로벌 시대에 꼭 필요한 능력입니다. 번역을 잘 하면 영어로 된 많은 교재들, 논문, 보고서 등을 수월하게 이해할 수 있으므로 국제중고등학교, 외국어고, 대학교입시는 물론이고, 글로벌 회사에 취업할 때 대단한 영어능력으로 평가받을 수 있습니다.\n\n## 시험\n\n### 평가기준은 어떻게 되나요?\n\n각 시험의 평가기준은 홈페이지 ITT란?에 평가급수체계를 참고 하시기 바랍니다\n\n### 시험은 언제있나요?\n\n1년에 6회 진행하며 자세한 일정은 시험일정을 참고하시기 바랍니다\n\n### 통역시험은 어떻게 보나요?\n\n스마트폰 앱을 다운로드 하여 자신의 스마트폰으로 녹음을 하여 제출하는 방식입니다. 지정된 장소에 나와서 신분증을 확인받은 뒤 자신의 스마트폰으로 앱을 다운로드 받아서 녹음하여 제출하는 방식입니다.\n\n### 번역시험은 어떻게 보나요?\n\n시험지의 지문을 보고 답안지에 번역하여 직접 쓰는 필기방식입니다.\n\n### 고사장은 어디인가요?\n\nhttp://itt.or.kr/sbMn.php?pgNm=pre00 에서 확인가능합니다. 단. 회차별로 변동사항이 많사오니 공지사항을 항상 참고하시기 바랍니다.\n\n### 시험은 언제있나요?\n\n1년에 6회 진행하며 자세한 일정은 시험일정을 참고하시기 바랍니다\n\n### 평가기준은 어떻게 되나요?\n\n각 시험의 평가기준은 홈페이지 ITT란?에 평가급수체계를 참고 하시기 바랍니다\n\n### 글씨를 잘 못 쓰는데 채점에 불이익을 받지 않나요?\n\n글씨는 채점관이 읽을 수 있도록 바르게 써야 합니다. 글씨 때문에 감점은 되지 않지만, 읽고 이해할 수 없는 애매한 표현은 감점될 수 있습니다\n\n### 시험을 보러갈 때 준비물은 어떤 것이 있나요?\n\n번역은 수험표, 신분증, 검정색볼펜,수정테이프 / 통역은 수험표, 신분증, 스마트폰(아이폰제외),마이크이어폰 가져오시기 바랍니다\n\n### 수험표가 없으면 어떻게 하나요?\n\n신분증만 일단 들고오시면 됩니다.\n\n### 결과는 언제 나오나요?\n\n시험일로부터 약 2주일후 발표됩니다\n\n### 합격을 어떻게 확인할 수 있나요?\n\n홈페이지 시험안내-시험결과확인을 통하여 확인 가능합니다\n\n### 시험에 재 응시 할 수 있나요?\n\n이미 합격한 점수보다 더 좋은 점수를 획득한다든지 하는 목적으로 재응시를 할 수 있습니다.\n\n### 합격여부를 미리 할 수는 없나요?\n\n합격여부는 합격발표일에 공지됩니다\n\n### 점수를 확인해 볼 수 없나요?\n\n유선상으로 연락주시면 안내드립니다\n"

          "content": "# 타임스테솔 FAQ\n\n출처: https://timestesol.com/sbMn.php?pgNm=colum\n\n## TESOL(영어교사 양성과정)이 무엇인가요?\n\nTESOL의 Full name은: Teaching English to Speakers of Other Languages입니다.\nTESOL이란 영어가 모국어가 아닌 사람들이 영어를 가르치기 위해 필요한 영어강사 양성과정으로 이 프로그램은 영어강사가 되고자 하는 사람들에게 Writing, Reading, Pronunciation, Speaking, Grammar, Teaching Techniques, Lesson Plan등의 교육방법을 전문적으로 가르치게 됩니다.\n타임스 테솔 과정은 해외 우수 프로그램과 강사의 수업으로 이론위주가 아닌 실무위주의 교육으로 해외 Certificate을 국내에서 취득하실 수 있는 기회를 제공하고 있습니다.\n\n## TESOL for Children(어린이테솔)은 무엇인가요?\n\nTESOL for Children은 유아부터 어린이 대상의 영어강사 양성과정입니다.\n성인영어 교수법과 어린이 영어 교수법은 교재부터 교육방법까지 접근법이 다르기 때문에 유아부터 12세까지의 교수법을 전문화시킨 과정이 어린이 테솔입니다.\n커리큘럼은 놀이지도, 동화구연 등 영어에 대한 흥미를 높일 수 있는 다양한 내용들로 구성되어 있으며 자세한 교육 커리큘럼은 홈페이지를 참고하시기 바랍니다.\n\n## 해외에서도 활용 가능한 Certificate인가요?\n\n타임스 테솔 Certificate 과정은 해외 Certificate 프로그램과 강사 그대로 한국에서 수업을 하고 해외 Certificate를 취득할 수 있는 과정으로 국내는 물론 해외에서도 인정 받으실 수 있습니다.\nTESOL 과정을 성공적으로 이수하시면 캘리포니아 주립 롱비치(California State University, Long Beach)의 Certificate가 발급됩니다.\n\n## 캘리포니아 주립대학교 롱비치는 어떤 대학인가요?\n\n캘리포니아 주립 롱비치 (California State University, Long Beach)대학은 캘리포니아 주 전역에 있는 23개의 캘리포니아 주립대학 중 최 상위에 랭크된 대학으로, 2008년 유에스 뉴스 & 월드 리포트가 조사 발표한 미국의 최고 명문 대학 리스트 중 서부지역에서 톱 5위 안에 드는 대학으로 발표 된바 있습니다.\n31,600명의 등록 학생들이 8개의 단과대학에 나뉘어 공부하고 있으며, 예술대학, 경영대학, 교육대학, 보건대학, 공과대학, 문리과대학, 자연과학대학 그리고 지속전문가교육대학으로 나뉘어 있습니다.\n로스앤젤레스와 가까운 아름다운 롱비치에 위치 해 있어서 아름다운 주위 환경을 자랑하며 University at the Beach 로 알려져 있습니다.\n\n## 학사이상만 지원할 수 있나요? 지원자격이 궁금합니다.\n\n타임스 테솔 과정은 특별한 지원자격을 필요로 하지 않지만 사전에 레벨테스트를 거쳐 통과하셔야만 수업을 들으실 수 있습니다.\n현재 저희 과정에는 학교선생님과 학원강사는 물론 일반인, 대학(원)재학생, 취업준비생등 누구나 수강이 가능하며 학원장님이나 대학교수님들도 참여하고 있을만큼 우수한 프로그램입니다.\n타임스 테솔은 전문대 재학생, 고등학교 졸업생, 수시모집 학생도 수강 가능한 지원자격 구분이 없는 능력위주의 프로그램입니다.\n\n## 한국인 강사가 강의하나요?\n\n타임스 테솔 강의는 100% 원어민 강사의 100% 영어강의로 진행됩니다.\n\n## 비용이 많이 비싸네요?\n\n그렇지 않습니다.\n국내의 대학프로그램은 입학금 + 수업료 포함 300만원~400만원(한학기 기준)대이고 해외로 자격증을 따기 위해 간다면 수업료+항공료+숙박료를 포함 1000만원(해외 3개월)정도 듭니다.\n반면 타임스 테솔과정은 입학금 60만원 + 수업료 218만원 포함 278만원으로 국내와 해외를 비교해서 비싼 수업료가 아닙니다.\n또한 해외에 가지않고도 국내에서 해외 우수한 프로그램과 강사진을 접할 수 있어 비용과 시간을 절약할 수 있습니다.\n\n## 국내대학에도 TESOL 프로그램들이 있던데 다른 점이 무엇인가요? \n\n대학테솔의 경우 이론 및 학문위주의 강의로 3~6개월 과정으로 진행하며 국내대학의 certificate를 받게 되십니다.\n저희 타임스테솔은 8주단기 과정으로 실무 위주로 직접 수업을 진행하므로 실전에서 바로 활용이 가능하십니다.\n혹은 저희와 연계되어 있는 대학교에서도 수업을 들으실 수 있습니다.\n\n## 국내대학 TESOL 프로그램과 동일하게 인정받을 수 있나요?\n\n테솔 Certificate을 인정하는 국제적인 룰은 4주 이상 교육에 100시간 이상의 수업입니다.\n국내 대학이 20주 수업에 200시간 정도의 수업을 한다면 타임스 테솔은 대비반만을 포함할 경우 200시간, 테솔과정만을 이수하실 경우에도 120시간이므로 대학 과정과 동일하게 인정받는 것은 물론 국제적인 룰에도 적합한 과정입니다.\n따라서 해외 미국 일본, 중국에서도 활용이 가능하며 한국에서도 인정을 받는 Certificate 입니다\n\n## 수업을 들을 수 있는 영어 레벨이 따로 있나요? 공인인증시험이 필요한가요?\n\n100% 영어로 수업이 되므로 외국인 교수님이 이야기하는 내용을 이해하고 본인의 의사를 말할 수 있을 정도의 듣고 말하는 영어실력이 우선적으로 필요합니다.\n기본적으로 토익점수와 영어실력과는 큰 관계가 없지만 토익점수로 어느정도 수준인지를 묻는 분들이 많아 말씀드리면 TESOL , TESOL for Children은 TOEIC 600이상정도면 들을 수 있다는 기본 테두리가 있습니다.\n하지만 토익과 말하기 듣기는 별로 큰 관계가 없으므로 정확한건 레벨테스트를 받으신 후 수업가능 여부를 확인하시는 것이 좋을 것입니다.\n\n## 레벨테스트 시험은 어떻게 보나요?\n\n레벨테스트는 paper test + Oral test로 나눠집니다.\n-Paper test : 객관식 독해 10문제 + 에세이(주어지는 주제에 대한 자신의 생각을 적기) 합격 전체 시험 성적의 평균은 7점으로 난이도는 높은편입니다.\n-Oral test는 커뮤니케이션 정도를 파악하는 것으로 강사와 인터뷰 형식으로 진행되며 직업이나 가르쳐 본 경험 등의 개인신상에 대한 질문과 함께 교육적인 질문을 몇개합니다.\n먼저 레벨테스트를 보시면 수업가능여부를 확인하실 수 있고 레벨 테스트 후 결과에 따라 혹은 필요시 테솔 대비반(Pre-TESOL)을 통해 Speaking을 보강하실 수 있습니다.\n\n## 레벨테스트에 떨어지면 수강을 못하게 되나요?\n\n테스트는 현재 영어 커뮤니케이션에 대한 피드백을 받는 단계라고 생각하시면 됩니다.\n테솔 수업을 듣기 전에 준비기간이 필요하실 경우는 테솔 대비반 (Pre-TESOL) 강좌를 수강하실 수 있으며 그 강좌를 통해 영어준비와 테솔 수강에 필요한 여러가지 테크닉을 공부하시게 됩니다.\n\n## Pre-TESOL(테솔대비반)은 무엇인가요?\n\n테솔대비반 과정은 테솔 및 어린이 테솔 과정에 필요한 영어 커뮤니케이션 능력과 기본 테솔에 대한 내용을 미리 학습하여 추후 효과적으로 테솔 및 어린이 테솔 과정을 이수할 수 있도록 준비하는 과정으로 테솔 수업 전 혹은 수업 후 영어능력향상과 테솔의 이해에 많은 도움이 되는 프로그램입니다.\n\n## 테솔과 어린이 테솔이 있는데 어떤걸 들어야 할까요?\n\n테솔은 성인 + 어린이 부문을 읽기,쓰기, 듣기, 말하기등 영어교수법 전체적으로 다루고 있습니다.\n어린이 테솔은 유아부터 12세까지 대상으로 게임, 노래, 교구를 통한 교수법을 집중적으로 다루고 있습니다.\n해외 유학시 2과정(테솔 + 어린이 테솔)을 다 수료를 하시나 시간적 여유가 부족하신 분들은 현재의 teaching 대상이나 향후의 계획을 고려하여 1과정을 선택하실 수 있습니다.\n먼저 테솔을 하셔서 포괄적인 내용들을 배우시고, 어린이 테솔을 통해 특정 부분들을 보강을 하신다면 효과적인 학습법을 배우게 되실겁니다.\n(단 영어speaking 연습이 필요할 경우는 어린이 테솔 -> 테솔로 진행)또한 타임스 테솔에서는 테솔+어린이 테솔을 수강할 경우 입학금(60만원)을 면제해 드리고 있습니다.\n\n## 영어강사가 자격증을 취득하면 무엇이 좋나요?\n\n현재 국내에서 테솔 과정은 영어교사와 영어강사는 물론 영어교육 분야의 종사자들에게 필수의 자격증이 되어가고 있습니다.\n타임스 테솔 과정은 영어 교수법을 배울 수 있는 코스이므로 국제적으로 인정받는 영어교사가 되실 수 있는 기회이며 단기 과정이므로 현직 교사들도 시간적인 부담 없이 과정을 배우실 수 있습니다.\n현직 교사들의 경우 행정직 시험(장학사) 시 가산점등이 부여되는 특전 또한 있습니다.\n\n## TESOL Certificate을 취득하면 취업도 연결해 주나요?\n\nLG, 삼성 등의 대기업과 중소기업체 출강 강사와 초,중등학교에서 방과후 강사로 취업을 지원 해드리고 있습니다.\n또한 우수한 실력자들은 대학교 강의 등을 연결시켜드리고 있습니다.\n저희 타임스 테솔 학생 중에는 학원 원장님이나 학교 선생님들이 많아서 자체적으로도 취업연계가 이뤄지고 있으며 테솔 자격증이 있는 분들을 구해달라는 요청이 많은 만큼 취업은 걱정하지 않으셔도 됩니다.\n현재 대한항공, 삼성테스코, 현대모비스, 엘지전자, 롯데연구소, 브릿지증권, KGI증권, 미쓰비시엘리베이터, 화인텍, 서울반도체, 대성전기, 유한킴벌리, 다음, 삼천리, 삼표, K2코리아, 휠라코리아, 잉가솔랜드, SK텔레콤, NHN, 다날, 대원컴퓨터, KECC, 중국건설은행, 서울보증보험, 한국케나메탈,MOLEX, 삼성선물, KOSCOM, 정보통신부 등의 기업체 출강 및 일선 학교와 학원 등에서 테솔 졸업생들이 활동중입니다.\n\n## 서울 외 다른 지역에서도 들을 수 있나요?\n\n저희 교육센터는 서울교육센터와 동국대, 단국대, 한림대, 대구(영남대), 부산교육센터에서 운영하고 있습니다.\n타임스 테솔은 8주 단기 과정이며 방학기간에는 6주, 7주 코스(수업시간은 8주와 동일)도 진행되므로 다른 지역 분들도 주말반등을 이용하여 가까운 교육센터에서 무리 없이 수업을 듣고 계십니다.\n또한 선생님들은 전 교육장을 번갈아가면서 수업을 진행함으로 서울, 동국대, 단국대, 한림대, 대구, 부산 교육원 관계없이 수업을 수강하시면 됩니다.\n-근접 교육원\nㆍ서울 교육센터 : 경기, 인천, 대전, 제주도\nㆍ동국대 교육센터 : 서울, 인천, 대전, 제주도\nㆍ한림대 교육센터 : 강원도\nㆍ대구(영남대) 교육센터 : 경북\nㆍ부산 교육센터 : 대구, 경남, 울산, 진주, 광주, 전남, 전북지역\n\n## 그동안 어떤 분들이 듣고 Certificate을 취득했나요.\n\n수업을 듣는 학생분들은 원어민(미국,호주, 캐나다), 외국인(필리핀, 독일인, 일본인등), 교포, 학교 교사, 영어학원강사, 대학교수, 교장선생님, 대학생(전문대학생 수강가능), 취업준비생, 주부, 직장인, 일반인 등 굉장히 다양합니다.\n영어교육에 관심이 있고 영어능력에 대한 기본적인 트레이닝에 관심 있는 사람들입니다\n\n## 수업을 들으면 Certificate은 다 주나요?\n\nCertifictate 취득을 위해서는 8주과정을 모두 수료 후 자격증 부여에 합당한 조건(프리젠테이션 + 중간고사 + 기말고사 평균점수 70점이상 / 출석율 85%)을 취득하였을 경우 캘리포니아 주립대의 Certificate가 발급됩니다.\n\n## 원어민이나 다른 나라 국적의 사람들도 들을 수 있나요?\n\n현재 타임스테솔 과정에는 한국에서 영어강사를 하고있는 미국,호주 등의 원어민 강사들은 물론 일본, 필리핀, 말레이시아 등의 외국인들도 수업을 듣고 있습니다.\n그러므로 원어민과 다른나라 국적의 사람들도 현재 한국인들과 함께 수업에 참여하고 있습니다.\n\n## 수강신청을 하고 싶은데 어떻게 하면 되나요?\n\n수강을 위해서는 우선 레벨테스트를 받으셔야 합니다.\n레벨테스트 신청은 타임스 테솔 홈페이지의 학사정보에 있는 레벨테스트 온라인 신청을 작성한 후 전형료를 결재하시고 전화를 주시면 레벨테스트 날짜를 예약해 드리며 반드시 교육센타에 방문하셔서 테스트를 받으셔야 합니다.\n\n## 테솔 수료후 어떻게 활용할 수 있나요? \n\n테솔은 영어 전문 강사 및 지도자로서 다양한 취업이 가능하며, 영어 Speaking과 발음교정 등을 집중적으로 트레이닝하기 때문에 단기간에 영어 구사력을 높일 수 있습니다. 이에 영어 면접이나 프레젠테이션 스킬을 키우고 싶어 하는 취업준비생, 대학생들에게 테솔(TESOL) Certificate 이 인기를 얻고 있으며, 영어교사 뿐만아니라, 일반 기업, 해외 취업과 공부방 창업, 직무 능력 향상등 유용하게 활용할 수 있습니다.\n\n## 정말 주립대 미국 Certificate를 준다는데 한국에서 가능한 것인가요?\n\n물론 가능합니다.\n타임스 테솔은 캘리포니아 주립대 롱비치의 한국센터이며, 해외가지않고도 국내에서 certificate와 타임스미디어의 certificate가 각각 발급되는데 모두 한국에서 가능합니다. 캘리포니아 주립대 롱비치는 미국 캘리포니아 주립대 3위에 랭크되어있으며, 졸업생으로는 스티븐스필버그감독,GOD박준형, 연예인 김병세등 미국내에서도 공신력있는 유명 주립대학교입니다. .\n\n## 국내 대학과정하고 다른점이 무엇이며 국내나 해ㅗ이에서 활용이 가능한 것인가요?\n\n대학테솔의 경우 이론 및 학문위주의 강으로 3~6개월 과정으로 진행하며 국내대학의 Certificate를 받게 되십니다.\n저희 타임스테솔은 8주단기 과정으로 실무 위주로 직접 수업을 진행하므로 실전에서 바로 활용이 가능하십니다.\n혹은 저희와 연계되어 있는 대학교에서도 수업을 들으실 수 있습니다.\n\n타임스 테솔 Certificate 과정은 해외 자격증 프로그램과 강사 그대로 한국에서 수업을 하고 해외 Certificate을 취득할 수 있는 과정으로 국내는 물론 해외에서도 인정 받으실 수 있습니다.\nTESOL 과정을 성공적으로 이수하시면 캘리포니아 주립 롱비치(California State University, Long Beach)의 Certificate가 발급됩니다.\n\n## 타임스테솔 졸업 후 취업연계도 해주시나요?\n\n타임스테솔은 뛰어난 언어 인재와 언어 교육 사업체 교류 활성화를 위해 취업지원 인프라를 구축하고 있습니다. 타임스테솔은 취업협력기관과, 자체 구인,구직 커뮤니티를 통해 졸업생들에게 취업연계를 지원하고있습니다.\n\n① 취업을 원하는 언어인력의 안정적인 직장을 연결\n\n② 고급 언언 인재를 구하는 업체에 적합한 인재를 연결\n\n③ 모든 언어(외국어) 인재의 풀 형성을 통한 시장의 확대\n\n④ 사이트를 통한 통번역 인력의 수준 향상\n\n⑤ 언어인재 교류의 활성화\n"

          "content": "# 타임스통번역 FAQ\n\n## 비즈니스 통역\n\n출처: https://timestesol.com/sbMn.php?pgNm=faq04\n\n## \n\n타임스통번역 과정은 통번역 대학원 압축과정으로 글로벌 비즈니스상 필요한 외국어 구사 능력을 향상시키고 통번역에 필요한 테크닉을 직접 실무 위주로 배우며, 국제통번역협회에서 발급되는 ITT 비즈니스 통번역 / 전문통번역 1급 자격증까지 취득할 수 있는 자격증 취득 과정입니다.\n\n## \n\n과정마다 상이합니다.\n1. 비즈니스통번역(영어)\n주중반) 화,수,목,금 19:15 ~ 22:15 (10주)\n주말반) 토 14:00 ~ 20:00 (20주)\n\n2. 전문통번역(영어)\n전문번역) 주말반 : 토요일 10:00 ~ 14:00 (24주)\n전문통역) 주말반 : 토요일 15:00 ~ 19:00 (24주)\n\n3. 전문통번역(중국어)\n주말반) 토요일 10:00 ~ 17:00 (20주)\n\n## \n\n타임스미디어 수료증과 함께 국제통역번역협회 ITT 비즈니스 통번역 / 전문통번역 1급 자격증이 수여 가능입니다.\n\n## \n\n네, 타임스통번역 과정은 국제통역번역협회와 국내 최초로 M.O.U. 체결하여 정규 시험을 실시 하지 않고도 수업시간에 이루어지는 평가와 과제, 출석부분에서 일정 기준 이상 되시면 수료가 가능하시며 수료 점수에 따라 ITT 통번역 1,2급 자격증을 취득하게 되십니다.\n\n## \n\n타임스통번역 교수진은 국제통역번역협회에서 위촉해주신 강사진으로 통번역대학원 출신의 전문통번역사로 다년간 경력을 쌓아오신 전문 교수 강의진이 수업합니다.\n\n## \n\n영어와 중국어가 있습니다.\n\n## \n\n과정마다 상이합니다.\n비즈니스통번역은 238만원이며 수속료(60만원) 별도입니다.\n전문통번역은 264만원이며 수속료(60만원) 별도입니다.\n\n## \n\n입학지원신청서를 제출하시면 테스트 날짜를 예약 받고, 직접 교육원에 방문하시어 번역 3문제 (한영&영한번역) 테스트와 리스닝파일 3문제를 듣고 말하는 간단한 통역테스트가 있습니다.\n\n## \n\n5만원입니다. (당일 등록시 Payback 처리 됩니다.)\n\n## \n\n고등학교 졸업자 이상으로 기본 레벨테스트 통과자는 누구나 지원 가능합니다. 통번역 대학원 진학을 목표로 두거나 비즈니스 통번역 테크닉을 배우고자 하는 모든 분들이 가능합니다.\n\n## \n\n홈페이지에서 확인 가능하십니다.\n( http://www.timestesol.com/sbMn.php?pgNm=asd01&x=2&y=9)\n\n## \n\n모듈이 끝날 때 마다 진단 평가를 실시하며 과정을 모두 마친 후 마지막 주에 최종 점수를 환산 합니다.\n\n## \n\n입학안내 - 서류심사 - 신청서접수 - 레벨테스트 응시 - 합격자 발표 - 수강 등록 (수업료 납부) - 수강 순으로 진행됩니다.\n(수강신청서 접수 http://www.timestesol.com/sbMn.php?pgNm=test0&x=3&y=5)\n\n## \n\n기본적인 외국어를 한글로 번역, 한국어를 외국어로 번역하는 시험으로 구성되어 있으며 시간은 60분정도 소요되고 70점 이상 득점해야합니다.\n\n## \n\n대기업등 여러 기업체에서 ITT 비즈니스 자격증을 공채시 반영하고 있으며 취업시 유용하게 활용 가능하십니다. 또한 통번역 프리랜서 활동 시 전문가로서 인정받게 됩니다.\n\n## \n\n과정마다 상이합니다.\n1. 비즈니스 통번역 (영어)\n주중반) 화,수,목,금 19:25 ~ 22:15 (10주)\n주말반) 토 14:00 ~ 20:00 (20주)\n2. 전문통번역 (영어)\n전문번역) 주말반 : 토요일 10:00 ~ 14:00 (24주)\n전문통역) 주말반 : 토요일 15:00 ~ 19:00 (24주)\n3. 전문통번역 (중국어)\n주말반) 토요일 10:00 ~ 17:00 (20주)\n\n## \n\n수업은 통번역대학원 압축수업으로 통번역 실무중심으로 진행되기 때문에 충분히 실전대비가 가능하며 무엇보다 추후 취업을 준비하고 계시면 현장 실무중심의 통번역을 배우고 실습하실수 있으며 ITT 비즈니스전문통번역 / 전문통번역 자격증으로 프리랜서 통번역사 활동 등 통번역사 자격증을 통해 많은 활용을 할 수 있습니다.\n\n## \n\n출석률 80% 이상시 자격증 수여가 가능합니다.\n주중반과 주말반 출석기준이 다르기 때문에 자세한 문의사항은 타임스통번역 교육원 02-558-1690 로 문의하시면 됩니다.\n"

          "content": "# ITT 기반 AI 시대 시험 홈페이지 신규 분석자료\n\n- 기준 문서: `시험홈피,아이엠분석.docx`\n- 반영 문서: `인공지능 언어전문가 및 기술전문가 관리운영규정_20260521.docx`\n- 작성일: 2026-05-21\n- 전제: 협회 홈페이지는 별도 분리, 시험 응시 홈페이지는 기존 `itt.or.kr` 중심 운영\n\n## 먼저 보여줘야 할 핵심 메시지\n\n> **ITT의 20여 년 통번역 시험 전통과 30만 외국어 전문가 기반을 AI 시대의 언어·프롬프트·윤리 자격으로 확장한다.**\n\n이 분석자료에서 가장 강조해야 할 방향은 다음 3가지다.\n\n| 강조 메시지 | 홈페이지에서 보여줄 방식 |\n|---|---|\n| **전통성** | 20여 년 통번역 자격시험 운영 경험, 30만 외국어 전문가 응시 기반을 메인 상단에 배치 |\n| **현장성** | 기업 취업, 해외영업, 전문번역, 산업문서, 콘텐츠 현지화 등 실무 활용처를 시험별로 표시 |\n| **미래성** | AI 번역 검수, 프롬프트 설계, AI 윤리, 보안, 환각 검증을 신규 자격의 핵심 가치로 제시 |\n\n한 문장으로 정리하면 다음과 같다.\n\n> **검증된 외국어 실무 자격에서, AI 시대 언어·기술·윤리 역량을 증명하는 자격으로.**\n\n사이트 분리 메시지는 다음처럼 잡는다.\n\n| 사이트 | 대표 메시지 | 사용자가 기대하는 역할 |\n|---|---|---|\n| 협회 홈페이지 | **공신력과 윤리 기준을 보여주는 공식 기관 홈페이지** | 협회 신뢰, 자격관리 원칙, 운영규정, 윤리헌장 확인 |\n| 시험 홈페이지 | **시험을 찾고 바로 접수하는 ITT 공식 시험 홈페이지** | 시험 안내, 일정, 응시료, 접수, 결과, 자격증 출력 |\n\n## 1. 핵심 결론\n\n기존 ITT 시험의 가장 큰 자산은 20여 년간 축적된 통번역 시험 운영 경험, 약 30만 명 규모의 외국어 전문가 응시 기반, 기업 취업 및 실무 현장에서 활용되어 온 자격 브랜드의 신뢰성이다. 새 홈페이지는 이 전통을 약화시키지 말고, “검증된 외국어 실무 자격이 AI 시대의 언어·기술 역량 검정으로 확장된다”는 메시지를 중심에 두어야 한다.\n\n권장 방향은 `협회 홈페이지`와 `시험 응시 홈페이지`를 분리하는 것이다. 협회 홈페이지는 공신력, 연혁, 자격관리 원칙, 기관 소개를 담당하고, 시험 응시 홈페이지는 시험 안내, 일정, 접수, 결제, 결과 확인, 자격증 출력에 집중한다. 이렇게 하면 협회는 공적 신뢰를 쌓고, 시험 사이트는 응시자가 필요한 정보를 빠르게 처리하는 실무형 구조가 된다.\n\n## 2. 자격 명칭 변경 반영\n\n운영규정 기준으로 기존 AITe 명칭은 다음처럼 정리하는 것이 맞다.\n\n\u003ctable>\n  \u003cthead>\n    \u003ctr>\n      \u003cth>기존 사이트 표현\u003c/th>\n      \u003cth>변경 후 권장 표현\u003c/th>\n      \u003cth>상위 자격 체계\u003c/th>\n    \u003c/tr>\n  \u003c/thead>\n  \u003ctbody>\n    \u003ctr>\n      \u003ctd>AITe 번역전문가\u003c/td>\n      \u003ctd>AI 외국어 통역 번역전문가\u003c/td>\n      \u003ctd rowspan=\"4\">인공지능 언어전문가 및 기술전문가\u003c/td>\n    \u003c/tr>\n    \u003ctr>\n      \u003ctd>AITe 프롬프트 전문가\u003c/td>\n      \u003ctd>AI 프롬프트 통역 번역전문가\u003c/td>\n    \u003c/tr>\n    \u003ctr>\n      \u003ctd>AI 윤리 시험\u003c/td>\n      \u003ctd>AI윤리전문가\u003c/td>\n    \u003c/tr>\n    \u003ctr>\n      \u003ctd>신규 확장 영역\u003c/td>\n      \u003ctd>AI 교육전문가\u003c/td>\n    \u003c/tr>\n  \u003c/tbody>\n\u003c/table>\n\n영문 명칭은 운영규정에 맞춰 `AI Linguist & Engineer`를 병기할 수 있다. 다만 홈페이지 전면 카피에서는 법정/규정 명칭만 반복하면 길어지므로, 메뉴명은 짧게 쓰고 상세 페이지에서 공식 명칭을 표기하는 방식이 적합하다.\n\n예시:\n\n- 메뉴명: AI 통역번역\n- 상세명: AI 외국어 통역 번역전문가\n- 메뉴명: AI 프롬프트\n- 상세명: AI 프롬프트 통역 번역전문가\n- 메뉴명: AI 윤리\n- 상세명: AI윤리전문가\n- 메뉴명: AI 교육\n- 상세명: AI 교육전문가\n\n## 3. 브랜드 메시지\n\n메인 메시지는 “새 AI 시험”보다 **“ITT의 신뢰가 AI 시대 역량 검정으로 확장된다”**에 두는 편이 좋다. 기존 응시자와 기업 담당자가 낯선 AI 자격을 볼 때 가장 먼저 확인하는 것은 운영 주체의 신뢰도이기 때문이다.\n\n### 최우선 메인 카피\n\n> **20여 년 통번역 자격시험 운영 경험과 30만 외국어 전문가 기반 위에, AI 시대의 언어·프롬프트·윤리 역량을 검정합니다.**\n\n### 짧은 슬로건 후보\n\n1. **검증된 외국어 실무 자격, AI 시대 역량 검정으로 확장**\n2. **통번역 전문성에 AI 활용 능력과 윤리 기준을 더하다**\n3. **AI가 만든 결과를 판단하고 책임지는 언어 전문가 자격**\n4. **기업 현장에서 쓰이는 외국어·AI 실무 역량 인증**\n5. **산업별·언어별·영역별 AI 번역 검수 전문가를 위한 자격**\n\n### 보조 메시지\n\n- ITT는 외국어 실무 능력을 검증해 온 자격 브랜드이고, AI 자격은 그 실무성을 미래 직무 환경으로 확장하는 시험이다.\n- AI가 번역을 대체하는 시대가 아니라, AI 결과를 판단하고 책임 있게 활용하는 전문가가 필요한 시대다.\n- 기업은 단순 외국어 점수보다 산업별 문서 이해, AI 도구 활용, 윤리적 검토 역량을 함께 갖춘 인재를 필요로 한다.\n\n### 협회 홈페이지용 메시지\n\n> **공신력 있는 자격관리 기관이 통역·번역 전문성과 AI 윤리 기준을 함께 관리합니다.**\n\n협회 홈페이지에서는 시험 홍보보다 기관 신뢰를 먼저 보여줘야 한다. 따라서 `운영 주체`, `연혁`, `자격관리 규정`, `출제·채점 기준`, `윤리헌장`을 전면에 배치한다.\n\n### 시험 홈페이지용 메시지\n\n> **ITT 자격시험과 AI 시대 신규 자격을 한눈에 확인하고 바로 접수합니다.**\n\n시험 홈페이지에서는 긴 협회 설명보다 `시험 선택`, `일정`, `접수`, `응시료`, `결과 확인`을 먼저 보여줘야 한다. 신뢰 메시지는 상단 보조 문구와 푸터에서 반복한다.\n\n## 4. 협회 홈페이지와 시험 홈페이지 분리 전략\n\n권장안은 두 사이트를 목적별로 분리하되, 상호 연결을 명확히 두는 구조다.\n\n| 구분 | 역할 | 권장 도메인/URL 구조 | 핵심 콘텐츠 |\n|---|---|---|---|\n| 협회 홈페이지 | 공신력, 연혁, 주최기관, 자격 운영 원칙 | 별도 협회 도메인 | 협회 소개, 설립 목적, 연혁, 자격관리 원칙, 운영규정, 제휴/인정기관, 윤리헌장 |\n| 시험 응시 홈페이지 | 접수, 일정, 응시료, 결과, 자격증 | 기존 `itt.or.kr` | 시험 종류, 시험 일정, 시험 접수, 응시료, 결과확인, 자격증 출력, FAQ |\n| 시험 상세 페이지 | 시험별 설득과 정보 제공 | `itt.or.kr` 내부 시험별 페이지 | 대상자, 평가역량, 등급, 시험시간, 합격기준, 활용처 |\n\n분리의 기준은 “기관 신뢰”와 “시험 처리”다. 협회 홈페이지는 시험 접수를 직접 처리하지 않고, 시험 홈페이지로 연결한다. 시험 홈페이지는 협회 소개를 길게 담지 않고, 상단 또는 푸터에 “주최/관리기관: 사단법인 국제통역번역협회”를 명확히 표기한 뒤 협회 홈페이지로 연결한다.\n\n이 구조의 장점은 다음과 같다.\n\n- 협회 홈페이지는 공신력, 제도 안정성, 사회적 신뢰를 축적한다.\n- 시험 홈페이지는 응시자 전환과 운영 편의성을 높인다.\n- 기업·기관 담당자는 협회 홈페이지에서 신뢰를 확인하고, 응시자는 시험 홈페이지에서 바로 접수할 수 있다.\n- AI 자격의 신규성은 시험 홈페이지에서 설명하되, 신뢰의 근거는 협회 홈페이지가 담당한다.\n\n사이트 간 연결 방식:\n\n```text\n협회 홈페이지\n├─ 협회 소개\n├─ 자격관리\n├─ 운영규정\n├─ 윤리헌장\n├─ 제휴/인정기관\n└─ 시험 응시하기 → itt.or.kr\n\n시험 홈페이지(itt.or.kr)\n├─ 시험 안내\n├─ 시험 접수\n├─ 일정/결과\n├─ 자격증 출력\n└─ 협회 소개 보기 → 협회 홈페이지\n```\n\n## 5. 기존 시험과 AI 시험의 분리 기준\n\n기존 ITT 시험과 AI 시험은 경쟁 관계가 아니라 직무 시대별 확장 관계로 보여야 한다.\n\n| 축 | 기존 ITT 시험 | AI 시대 신규 시험 |\n|---|---|---|\n| 핵심 가치 | 사람의 외국어 통번역 실무 능력 검증 | AI 도구를 활용한 언어·프롬프트·윤리 역량 검증 |\n| 대표 시험 | ITT 전문, ITT 비즈니스, ITT 교육급수 | AI 외국어 통역 번역전문가, AI 프롬프트 통역 번역전문가, AI 윤리전문가, AI 교육전문가 |\n| 활용 현장 | 기업 채용, 통번역 실무, 외국어 직무 | AI 번역 검수, 프롬프트 설계, 산업문서 처리, AI 윤리 검토, 교육 현장 |\n| 메시지 | 검증된 외국어 실무 자격 | 미래 직무 대응형 AI 언어 자격 |\n| 홈페이지 배치 | 기존 ITT 자격군으로 독립 노출 | AI 자격군으로 독립 노출하되 ITT 신뢰 기반을 함께 표시 |\n\n메뉴에서는 `ITT 자격시험`과 `AI 자격시험`을 같은 레벨로 두는 것이 좋다. 하위에서 시험별로 세분화하면 기존 시험이 AI 시험에 묻히지 않고, AI 시험도 기존 시험의 부가 메뉴처럼 보이지 않는다.\n\n## 6. AI 윤리 포지셔닝\n\nAI 윤리는 별도 시험이면서 동시에 모든 AI 자격의 공통 신뢰 장치로 보여야 한다. 특히 통역·번역 영역은 개인정보, 기업 기밀, 저작권, 원문 왜곡, 문화적 편향, 환각 검증 문제가 직접 발생하므로 윤리 역량을 전면에 내세울 수 있다.\n\n권장 표현:\n\n- AI를 잘 쓰는 능력보다 중요한 것은 AI 결과를 책임 있게 판단하는 능력입니다.\n- AI 번역과 프롬프트 결과물은 반드시 출처, 정확성, 개인정보, 보안, 편향을 검토해야 합니다.\n- ITT 기반 AI 자격은 언어 능력, 도구 활용 능력, 윤리적 판단 능력을 함께 검정합니다.\n\n홈페이지 구성상 AI 윤리는 다음 세 위치에 배치한다.\n\n1. `AI 윤리` 독립 상세 페이지: 시험 목적, 등급, 출제영역, 합격기준, 활용처 설명\n2. 각 AI 시험 상세 페이지의 공통 박스: “AI 윤리 검정 포함/연계” 표시\n3. 협회 홈페이지의 `윤리헌장/윤리 기준` 페이지: AI 윤리와 통역·번역사 윤리를 협회의 공적 원칙으로 제시\n\n## 7. 산업별·언어별·영역별 전문번역 시장 강조 포인트\n\nAI 시대에도 전문번역 시장은 사라지는 것이 아니라 더 세분화된다. 홈페이지에서는 “AI가 번역한다”보다 “산업·언어·문서 맥락을 이해하는 전문가가 AI 결과를 완성한다”는 관점으로 마케팅해야 한다.\n\n강조할 시장 축:\n\n| 분류 | 예시 | 마케팅 포인트 |\n|---|---|---|\n| 산업별 | 반도체, 조선, 방산, 자율주행, 피지컬 AI, 우주, 기술, 로봇 | 산업별 핵심 용어, 장비·공정·안전 기준, 수출입 규제 맥락을 이해하는 전문 번역 검수자 필요 |\n| 전문가 분야별 | 의료, 법률, 노무, 회계, 특허, 과학, 개발 | 전문 직역의 문서 관행과 책임 소재를 이해하고 AI 번역의 오류·누락·환각을 검증하는 역량 필요 |\n| 언어별 | 영어·일본어·중국어, 스페인어·아랍어·독일어, 희귀어, 제주어, 고전어, 유럽어, 예술적·창의적 언어, 이슈 언어 | 109개 언어 수요에 대응해 언어쌍별 표현 차이, 문화 맥락, 희소 언어 데이터 한계를 보완하는 전문가 필요 |\n| 영역별 | 정치, 경제, 사회, 예술, 문화, 음식, 주식, 비즈니스 | 주제 영역별 배경지식과 독자 기대가 다르므로 단순 번역보다 맥락 판단과 용어 일관성 관리가 중요 |\n| 콘텐츠별 | 시, 문학, 음악, 드라마, 소설, 영화, 시나리오, 그림, 웹툰, K문화, 유튜브, K드라마, K음식, K교육 | 창의 콘텐츠와 K콘텐츠 확산 영역에서는 직역보다 톤, 감성, 장르 관습, 현지화 품질을 판단하는 전문성이 경쟁력 |\n| 기능별 | 영상 S-T, 음성 TTS, 동시통역 S-S, 이미지, 문서, 프롬프트, 개발 | 입력·출력 형식에 따라 검수 방식이 달라지므로 자막, 음성, 이미지, 문서, 프롬프트별 AI 활용 능력을 구분해 제시 가능 |\n| 직무별 | 번역가, 통역사, 마케터, 해외영업, 기술문서 담당자, 교육자, 개발자 | 직무별 AI 활용 능력을 자격으로 설명하고 채용·배치·교육 기준으로 연결 가능 |\n\n홈페이지에서는 이를 긴 설명문보다 `산업 × 언어 × 콘텐츠` 매트릭스로 보여주는 편이 좋다. 예를 들어 “의료 영어 문서”, “반도체 기술문서”, “게임 현지화”, “계약서 번역 검수”, “AI 자막 검수”처럼 실제 수요자가 이해하는 단어로 노출해야 전환력이 높아진다.\n\n## 8. 공통 정보와 시험별 정보의 분리\n\n응시자가 반복해서 확인하는 정보는 공통 페이지에 모으고, 시험별 차이는 상세 페이지 상단 요약표로 분리한다.\n\n공통으로 묶을 정보:\n\n- 시험 접수 절차\n- 회원가입, 결제, 응시확인서 출력\n- 시험 일정\n- 응시료/환불 규정\n- 등급 체계 설명\n- 합격자 발표\n- 자격증 출력/신청\n- 부정행위 및 시험 유의사항\n- FAQ\n\n시험별로 분리할 정보:\n\n- 시험 목적\n- 대상자\n- 평가 역량\n- 시험 과목\n- 문항 수와 시험시간\n- 합격 기준\n- 응시자격\n- 샘플 문제\n- 산업·언어·영역별 활용처\n- AI 윤리 포함 여부\n\n권장 상세 페이지 상단 요약표:\n\n| 항목 | 표시 방식 |\n|---|---|\n| 공식 자격명 | AI 외국어 통역 번역전문가 |\n| 한 줄 설명 | AI 번역 결과를 산업·언어·콘텐츠 맥락에 맞게 검토·수정·관리하는 역량 검정 |\n| 등급 | 전문1급, 전문2급, 1급, 2급, 3급, 교육1급~교육9급 |\n| 시험방식 | 필기시험, 객관식/단답형/주관식/서술형 혼합 가능 |\n| 시험시간 | 전문/1·2급 90분, 3급 60분, 교육급수 40~60분 |\n| 합격기준 | 등급별 60점~80점 이상 |\n| 활용처 | 번역 검수, 산업문서 처리, 콘텐츠 현지화, AI 결과물 검토 |\n\n등급별 안내에서는 1급·2급의 공신력과 활용처를 별도로 강조한다.\n\n| 등급 | 홈페이지 표시 포인트 |\n|---|---|\n| 1급·2급 | 법무부 국가공인 자격으로 안내하고, 기업과 관공서 채용·인사 평가에서 가점 또는 우대 요소로 활용될 수 있음을 표시 |\n| 3급 | 기초 실무 역량과 입문자용 AI 언어 활용 능력 검정으로 안내 |\n| 교육급수 | 초·중·고 및 교육기관 학습자 수준별 AI 언어 활용 능력 검정으로 안내 |\n\n## 9. 최소 페이지 구성안\n\n페이지 수를 늘리지 않으려면 협회 홈페이지와 시험 홈페이지를 각각 5~7개 주요 페이지 안에서 구성하는 것이 좋다.\n\n협회 홈페이지:\n\n```text\n홈\n├─ 협회 소개\n├─ 자격관리\n├─ 윤리헌장\n├─ 연혁/공신력\n├─ 제휴/인정기관\n├─ 공지/자료\n└─ 시험 응시하기\n```\n\n협회 홈페이지는 시험 상세 정보를 많이 담지 않는다. 대신 “어떤 기관이, 어떤 원칙으로, 어떤 자격을 관리하는가”를 보여준다. 특히 문화체육관광부 산하 사단법인 국제통역번역협회가 주최한다는 점, 민간자격 운영규정, 출제·감수·채점·부정행위 처리 기준, AI 윤리 기준을 신뢰 콘텐츠로 배치한다.\n\n시험 홈페이지:\n\n```text\n홈\n├─ 시험 안내\n├─ 시험 접수\n├─ 시험 일정/결과\n├─ 응시자 가이드\n├─ 자료실/공지\n└─ 고객지원\n```\n\n`시험 안내` 안에서 탭 또는 아코디언으로 시험군을 나눈다.\n\n```text\n시험 안내\n├─ ITT 자격시험\n│  ├─ ITT 전문\n│  ├─ ITT 비즈니스\n│  └─ ITT 교육급수\n└─ AI 자격시험\n   ├─ AI 외국어 통역 번역전문가\n   ├─ AI 프롬프트 통역 번역전문가\n   ├─ AI 윤리전문가\n   └─ AI 교육전문가\n```\n\n서류, 등급, 시험시간, 합격기준처럼 정보량이 많은 내용은 개별 페이지를 계속 만들기보다 다음 방식으로 압축한다.\n\n- 첫 화면: 시험군 카드 2개, `ITT 자격시험` / `AI 자격시험`\n- 상세 영역: 상단 자격 선택 링크 제공 후 각 자격 상세 정보를 한 페이지에 순차 나열\n- 등급 정보: 접히는 아코디언\n- 응시료/시험시간/합격기준: 한눈에 보는 표\n- 운영규정 원문: PDF 또는 문서 다운로드로 제공\n- 자주 묻는 질문: 공통 FAQ로 통합\n\n## 10. 시험 홈페이지 메인 화면 구성안\n\n시험 홈페이지 메인은 설명을 길게 쓰기보다 신뢰, 시험 선택, 접수 흐름을 빠르게 보여주는 구조가 좋다.\n\n1. 히어로 영역\n   - 문구: “ITT의 검증된 외국어 실무 자격, AI 시대 언어·기술 자격으로 확장”\n   - 보조: “20여 년 시험 운영 경험과 30만 외국어 전문가 기반”\n   - 버튼: `시험 접수`, `시험 안내 보기`\n\n2. 시험 선택 카드\n   - ITT 자격시험\n   - AI 자격시험\n   - AI 윤리\n   - 단체/기업 응시\n\n3. 한눈에 보는 시험 정보\n   - 시험일정\n   - 접수기간\n   - 응시료\n   - 결과발표\n\n4. AI 시대 전문성 메시지\n   - 산업별 전문번역\n   - 언어별 AI 검수\n   - 프롬프트 기반 통역·번역\n   - AI 윤리와 보안\n\n5. 협회 신뢰 영역\n   - 주최/관리기관명\n   - 자격 운영규정\n   - 윤리헌장\n   - 협회 홈페이지 바로가기\n\n## 11. 협회 홈페이지 메인 화면 구성안\n\n협회 홈페이지는 시험 접수보다 공신력과 원칙을 앞세운다.\n\n1. 히어로 영역\n   - 문구: “국제 통역·번역 전문성과 AI 시대 언어 윤리를 관리하는 공신력 있는 자격 운영기관”\n   - 버튼: `자격관리 보기`, `시험 응시하기`\n\n2. 협회 신뢰 지표\n   - 20여 년 시험 운영 전통\n   - 30만 외국어 전문가 응시 기반\n   - 통역·번역 자격 운영 경험\n   - 기업 취업 및 실무 활용성\n\n3. 자격관리 체계\n   - ITT 통번역 자격\n   - 인공지능 언어전문가 및 기술전문가\n   - AI 윤리전문가\n   - AI 교육전문가\n\n4. 윤리와 책임\n   - 통역·번역사 직업윤리\n   - AI 활용 윤리\n   - 개인정보와 보안\n   - 저작권, 출처, 편향, 환각 검증\n\n5. 시험 응시 연결\n   - 시험 상세 정보와 접수는 `itt.or.kr`로 이동\n\n## 12. 권장 메뉴명\n\n협회 홈페이지 상단 메뉴:\n\n```text\n협회소개\n자격관리\n윤리헌장\n연혁/공신력\n공지/자료\n시험응시\n```\n\n시험 홈페이지 상단 메뉴:\n\n```text\n시험안내\n시험접수\n일정/결과\n응시자가이드\n공지/자료\n고객지원\n```\n\n`시험안내` 안에서만 시험을 세분화한다.\n\n```text\nITT 자격시험\nAI 자격시험\nAI 윤리\nAI 교육\n```\n\n## 13. 우선 적용할 수정 사항\n\n1. `AITe 번역전문가` 명칭을 `AI 외국어 통역 번역전문가`로 변경한다.\n2. `AITe 프롬프트 전문가` 명칭을 `AI 프롬프트 통역 번역전문가`로 변경한다.\n3. `AI 윤리 시험`은 독립 시험이자 AI 자격 공통 신뢰 장치로 재배치한다.\n4. 협회 홈페이지와 시험 홈페이지를 별도 구축하되, 상호 링크를 명확히 둔다.\n5. 기존 `aite-test.imweb.me`의 임시 도메인 인상을 줄이고 시험 정보는 `itt.or.kr` 중심으로 정리한다.\n6. 시험별 세부내용은 탭/아코디언/요약표로 구성해 페이지 수를 줄인다.\n7. 산업별·언어별·영역별 전문 시장을 메인과 AI 시험 상세 페이지에서 반복 노출한다.\n8. 모든 시험에 대해 응시료, 시험시간, 합격기준, 응시자격을 같은 표 형식으로 정리한다.\n9. 협회 홈페이지에는 AI 윤리와 통역·번역사 윤리를 기관의 핵심 원칙으로 별도 페이지화한다.\n\n## 14. 최종 권장 방향\n\n최종 방향은 `협회 홈페이지`와 `ITT 시험 홈페이지`의 이원화다. 협회 홈페이지는 공신력, 자격관리 원칙, 윤리 기준, 연혁을 담당하고, ITT 시험 홈페이지는 기존 ITT 자격과 AI 자격의 안내·접수·결과 확인을 담당한다. AI 자격은 기존 시험을 대체하는 새 브랜드가 아니라, ITT의 전통성과 현장성을 기반으로 AI 시대에 필요한 언어·프롬프트·윤리 역량을 추가 검정하는 확장 자격으로 포지셔닝해야 한다.\n\n이 구조가 기존 응시자에게는 익숙하고, 기업 담당자에게는 협회 차원의 신뢰를 주며, 신규 AI 시험 수요자에게는 미래 대비 자격이라는 메시지를 가장 명확하게 전달한다.\n"

          "content": "# BO 거래처 아웃콜 index 개선 프롬프트\n\n## 목적\n\n현재 폴더의 거래처 아웃콜 화면을 `design_system_major`의 BO 관련 문서와 샘플을 참고해 고밀도 관리자 화면 스타일로 개선한다.\n\n기능과 데이터 구조는 유지하면서, 반복 업무자가 검색, 필터, 목록 확인, 상태 변경, 메모 확인, 상세 편집을 빠르게 처리할 수 있는 운영 도구 화면으로 정리하는 것이 목표다.\n\n## 참고 우선순위\n\n### 1순위. 재사용 디자인 프롬프트 관리자 기준\n\n가장 먼저 아래 관리자 재사용 디자인 프롬프트를 읽고 적용한다. `design_system_bo참고.png`보다 이 문서 묶음을 우선한다.\n\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/00_문서목록.md`\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/03_BO_관리자화면_기준.md`\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/02_BO_테이블레이아웃_기준.md`\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/04_BO_관리자용_레이아웃_기준.md`\n\n### 2순위. BO 테이블과 Drawer 컴포넌트 기준\n\n거래처 아웃콜은 대량 목록, 행 선택, 메모/상태 상세 편집이 핵심이므로 BO 테이블과 Drawer 기준을 반드시 함께 적용한다.\n\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/검색필터_기준.md`\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/상태_유형_칩_기준.md`\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/인라인_Drawer_기준.md`\n- `../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/테이블선택_Drawer_상세패널_기준.md`\n\n### 3순위. 실물 BO 테이블 구현 샘플\n\n문서 기준을 실제 코드와 화면 밀도로 확인할 때 아래 파일을 참고한다.\n\n- `../design_system_major/table_design/관리자패널_전체회원.html`\n- `../design_system_major/table_design/신규테이블관리.html`\n- `../design_system_major/table_design/결제관리.html`\n- `../design_system_major/table_design/table-design.css`\n- `../design_system_major/table_design/table-design.js`\n- `../design_system_major/dense-drawer.css`\n- `../design_system_major/dense-drawer.js`\n\n### 4순위. 보조 참고 이미지와 기존 BO 문서\n\n- `../design_system_major/docs/BO_영역참고_디자인시스템_index_고도화_프롬프트.md`\n- `../design_system_major/docs/BO_사이드바_분류_정리계획.md`\n- `../design_system_major/bo-index-sample.html`\n- `../design_system_major/bo_sidebar_classification_sample.html`\n- `../design_system_major/resource/design_system_bo참고.png`\n\n`design_system_bo참고.png`는 화면 분위기와 영역 밀도 참고용이다. 구체적인 테이블, Drawer, 필터, 상태 chip, 레이아웃 기준은 `재사용_디자인_프롬프트/관리자` 문서를 우선한다.\n\n## 대상 파일\n\n- 현재 폴더에 `index.html`이 있으면 `index.html`을 수정한다.\n- `index.html`이 없으면 `HutechC 사내 Studio.html`을 현재 화면 원본으로 보고 개선한다.\n- 필요하면 개선본을 `index.html`로 생성한다.\n\n## 실행 프롬프트\n\n```text\n너는 시니어 프론트엔드 엔지니어이자 BO 관리자 화면 디자인 시스템 전문가다.\n\n현재 작업 폴더의 HTML 파일을 `design_system_major`의 BO 관련 문서를 참고해 고밀도 BO 화면 스타일로 개선해라.\n\n참고 우선순위:\n1. 가장 먼저 `재사용_디자인_프롬프트/관리자` 문서를 적용한다.\n2. 그다음 BO 테이블, 검색필터, 상태 chip, inline Drawer, 테이블 선택 Drawer 상세패널 기준을 적용한다.\n3. 그다음 `table_design` 실물 BO 테이블 페이지와 `dense-drawer` 구현을 참고한다.\n4. `design_system_bo참고.png`는 분위기와 영역 배치 보조 참고로만 사용한다.\n\n반드시 먼저 읽을 파일:\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/00_문서목록.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/03_BO_관리자화면_기준.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/02_BO_테이블레이아웃_기준.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/04_BO_관리자용_레이아웃_기준.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/검색필터_기준.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/상태_유형_칩_기준.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/인라인_Drawer_기준.md\n- ../design_system_major/docs/재사용_디자인_프롬프트/관리자/components/테이블선택_Drawer_상세패널_기준.md\n\n실물 구현 참고 파일:\n- ../design_system_major/table_design/관리자패널_전체회원.html\n- ../design_system_major/table_design/신규테이블관리.html\n- ../design_system_major/table_design/결제관리.html\n- ../design_system_major/table_design/table-design.css\n- ../design_system_major/table_design/table-design.js\n- ../design_system_major/dense-drawer.css\n- ../design_system_major/dense-drawer.js\n\n보조 참고 파일:\n- ../design_system_major/docs/BO_영역참고_디자인시스템_index_고도화_프롬프트.md\n- ../design_system_major/docs/BO_사이드바_분류_정리계획.md\n- ../design_system_major/bo-index-sample.html\n- ../design_system_major/bo_sidebar_classification_sample.html\n- ../design_system_major/resource/design_system_bo참고.png\n\n대상:\n- 현재 폴더에 `index.html`이 있으면 그것을 수정한다.\n- `index.html`이 없으면 `HutechC 사내 Studio.html`을 현재 화면 원본으로 보고, 필요한 경우 `index.html`로 생성/정리한다.\n\n목표:\n- 현재 거래처 아웃콜 화면의 기능과 데이터 구조는 유지한다.\n- BO 관리자 화면답게 정보 밀도, 표 가독성, 필터/검색/상태/메모/상세 영역을 더 명확히 만든다.\n- 장식적 랜딩 페이지처럼 만들지 말고, 반복 업무자가 오래 쓰는 운영 도구처럼 정리한다.\n- 기존 React 빌드 산출물 구조를 무리하게 해체하지 말고, HTML/CSS 레벨에서 적용 가능한 개선을 우선한다.\n- `design_system_bo참고.png`의 시각 분위기보다 `재사용_디자인_프롬프트/관리자`의 구조, 밀도, 컴포넌트 기준을 우선한다.\n\n디자인 기준:\n- border-radius는 기본 0 또는 매우 작게 유지한다.\n- 그림자보다 1px border, divider, table line으로 구획한다.\n- 색상은 흰색, 회색, 옅은 파랑, 상태 색상 중심으로 제한한다.\n- 큰 카드, 넓은 여백, 히어로 스타일, 과한 그라데이션은 사용하지 않는다.\n- 폰트 크기와 행 높이는 BO 화면에 맞게 compact하게 유지하되 읽을 수 있어야 한다.\n- 버튼, 입력창, 필터, 배지, 테이블 행, 툴바는 조밀하고 정렬감 있게 만든다.\n\n반영할 BO 구조:\n- 좌측 Sidebar: 1depth/2depth 기준, active 상태 명확화\n- 상단 Header/Toolbar: 현재 업무명, 검색, 필터, 저장/추가/내보내기 액션\n- Content: 거래처 아웃콜 목록 중심\n- Dense Filter: `검색필터_기준.md`의 고밀도 필터 구조를 적용한다.\n- BO Data Table: `02_BO_테이블레이아웃_기준.md`와 `table_design` 실물 페이지의 밀도를 따른다.\n- Inline Drawer: `인라인_Drawer_기준.md`와 `테이블선택_Drawer_상세패널_기준.md`를 따른다.\n- Status Panel: 대기/진행/완료/보류 등 처리 현황 요약\n- Log/Memo Panel: 변경 이력, 업무 메모, 후속 조치 기록\n\n거래처 아웃콜 화면에 맞춘 개선 포인트:\n- 테이블 컬럼은 날짜, 분야, 거래처/회사명, 담당자, 연락처, 상태, 메모, 액션이 한눈에 보이게 정리한다.\n- BO 테이블 컬럼은 무작정 쪼개지 말고 `02_BO_테이블레이아웃_기준.md`의 컬럼 묶음 원칙을 따른다.\n- 거래처/담당자/연락처/분야/상태/최근메모처럼 비교 빈도가 높은 값은 우선 노출하고, 긴 메모와 이력은 Drawer로 보낸다.\n- 상태값은 색상만으로 구분하지 말고 텍스트와 함께 표시한다.\n- 긴 메모는 truncate 처리하되 title 또는 상세 패널에서 전체 확인 가능하게 한다.\n- 행 hover, 선택 상태, 편집/삭제 버튼 상태가 명확해야 한다.\n- 필터 선택 chip과 초기화 액션을 제공한다.\n- 모바일에서는 핵심 컬럼만 우선 보이고, 테이블은 가로 스크롤 기준으로 깨지지 않게 한다.\n\nBO 테이블 필수 기준:\n- Major Tabs와 Sub Tabs가 필요한 경우 카운트를 라벨 안에 포함한다.\n- Dense Filter는 조건명 폭, 옵션 wrap, 선택 조건 tag를 정렬감 있게 유지한다.\n- Summary Strip은 큰 카드 대신 한 줄 요약으로 구성한다.\n- Table Card는 headbar, table-wrap, table-section 구조를 참고한다.\n- 행 전체를 클릭 대상으로 만들고, 선택 행은 primary 배경/좌측 indicator로 구분한다.\n- 선택 건수, 상태변경, 엑셀 내보내기 등 bulk action bar를 하단에 둔다.\n\nInline Drawer 필수 기준:\n- 행 클릭 시 우측 inline Drawer 또는 테이블 선택 상세 패널을 연다.\n- Overlay modal보다 목록 오른쪽에 붙는 inline Drawer를 우선한다.\n- Drawer에는 기본정보, 연락/상담 메모, 상태 변경, 후속 액션, 변경 이력을 포함한다.\n- Drawer가 열려도 목록 맥락이 유지되어야 한다.\n- 닫기, 저장, 삭제/위험 액션, ESC 닫기, focus 복귀를 고려한다.\n\n접근성 기준:\n- 모든 버튼과 입력 요소는 focus-visible 상태가 보여야 한다.\n- 아이콘 버튼에는 title 또는 aria-label을 유지한다.\n- 상태 배지는 텍스트를 포함한다.\n- Drawer/Panel을 추가하면 닫기 버튼과 키보드 접근을 고려한다.\n- 텍스트가 버튼이나 셀 밖으로 넘치지 않게 한다.\n\n구현 기준:\n- 기존 내용을 임의로 삭제하지 않는다.\n- 외부 라이브러리나 빌드 도구를 새로 추가하지 않는다.\n- 가능한 한 현재 HTML과 연결된 CSS 구조를 유지한다.\n- 필요한 CSS는 별도 `\u003cstyle>` 또는 기존 CSS 파일에 최소 범위로 추가한다.\n- 디자인 시스템 문서의 BO 샘플처럼 고밀도 운영 화면을 목표로 한다.\n\n검증:\n- 브라우저에서 열었을 때 화면이 깨지지 않아야 한다.\n- 데스크톱에서 테이블, 필터, 상태, 메모 영역이 동시에 읽혀야 한다.\n- 모바일 폭에서 텍스트 겹침과 버튼 넘침이 없어야 한다.\n- 기존 JS 로딩과 화면 렌더링을 방해하지 않아야 한다.\n\n마지막 응답에는 다음을 요약한다:\n- 수정/생성한 파일\n- 적용한 BO 디자인 시스템 기준\n- 개선한 화면 영역\n- 검증 결과\n- 남은 후속 작업\n```\n\n## BO 개선 체크리스트\n\n- [ ] `index.html` 또는 `HutechC 사내 Studio.html` 대상 확인\n- [ ] 기존 화면 기능과 데이터 구조 보존\n- [ ] 좌측 Sidebar active/분류 구조 점검\n- [ ] 상단 Toolbar와 검색/필터 영역 정리\n- [ ] 거래처 아웃콜 테이블 dense 스타일 개선\n- [ ] 상태 배지와 row action 명확화\n- [ ] 상세 Drawer 또는 상세 Panel 기준 반영\n- [ ] 메모/로그/상태 요약 영역 보강\n- [ ] 모바일 가로 스크롤과 텍스트 넘침 확인\n- [ ] 기존 JS 렌더링 영향 확인\n"

          "content": "# 마크다운 에디터 고도화 프롬프트\n\n## 작업 프롬프트\n\n브라우저에서 바로 실행되는 마크다운 에디터와 Word 변환기를 고도화한다.\n\n현재 앱 상태:\n- 단일 파일 앱: `markdown-to-word.html`\n- HTML, CSS, JavaScript만 사용\n- 빌드 과정 없음\n- 백엔드 없음\n- 외부 패키지 의존성 없음\n- 마크다운 파일 드래그 앤 드롭 지원\n- 여러 파일 선택 지원\n- 변환 전 미리보기 지원\n- 마크다운 블록을 `.docx` 파일로 변환\n- 여러 문서를 변환할 때 ZIP 다운로드 지원\n\n핵심 목표:\n- 단순한 Markdown to Word 변환기를 실무용 마크다운 에디터로 확장한다.\n- 작성, 미리보기, Word 내보내기, 문서 형식 조정이 한 화면에서 자연스럽게 이어지도록 만든다.\n\n작업 원칙:\n- 특별한 이유가 생기기 전까지 브라우저 전용 앱 구조를 유지한다.\n- 기존 Word 변환 기능은 깨지지 않게 보존한다.\n- 기능은 한 번에 크게 갈아엎지 말고 검증 가능한 단위로 추가한다.\n- UI 문구는 한국어로 짧고 명확하게 작성한다.\n- 장식적인 화면보다 문서 작성과 검토 효율을 우선한다.\n- 에디터 흐름과 내보내기 요구사항이 확정되기 전에는 대규모 구조 변경을 피한다.\n\n우선 고도화 방향:\n- 파일 업로드뿐 아니라 직접 마크다운을 작성하고 수정할 수 있게 한다.\n- 입력한 내용과 미리보기가 실시간으로 동기화되게 한다.\n- 현재 편집 중인 문서를 바로 Word로 내보낼 수 있게 한다.\n- 제목, 저장 파일명, 글꼴, 여백, 표 스타일 같은 문서 설정을 추가한다.\n- 브라우저 로컬 임시 저장 기능을 추가한다.\n- 모바일에서도 파일 선택, 편집, 미리보기, 내보내기 흐름이 무너지지 않게 한다.\n\n## 댓글 고도화 프롬프트\n\n마크다운 편집창에서 드래그로 선택한 영역에 댓글이 달리면, 미리보기에서도 해당 텍스트가 파란톤으로 표시되어야 한다.\n\n댓글 표시 원칙:\n- 댓글이 달린 텍스트는 미리보기에서 파란톤 하이라이트로 표시한다.\n- 하이라이트에는 댓글 작성자 수 또는 댓글 개수를 알 수 있는 작은 표시를 둔다.\n- 같은 영역에 여러 명이 댓글을 달 수 있다.\n- 여러 명이 댓글을 단 경우, 해당 영역에 연결된 댓글을 모두 목록으로 볼 수 있어야 한다.\n- 댓글 목록에는 작성자, 작성내용, 작성 시각, 연결된 선택 문구가 보여야 한다.\n- 댓글이 달린 미리보기 영역을 누르면 오른쪽 댓글 패널에서 해당 댓글 묶음이 강조되어야 한다.\n- 댓글 데이터는 작성자, 작성내용, 선택 텍스트, 선택 시작 위치, 선택 종료 위치를 유지한다.\n- 문서 내용이 수정되어 위치가 어긋날 수 있으므로, 우선 선택 텍스트 기반으로도 하이라이트를 복구한다.\n\n이번 구현 범위:\n- 기존 댓글 저장 API는 유지한다.\n- 미리보기 렌더링 시 댓글 선택 영역을 하이라이트한다.\n- 오른쪽 댓글 패널을 선택 영역 기준으로 묶어서 보여준다.\n- 같은 선택 영역에 여러 댓글이 있으면 하나의 묶음 안에 모두 표시한다.\n- 하이라이트 클릭 시 해당 댓글 묶음으로 스크롤하고 강조한다.\n\n다음 개선 후보:\n- 댓글 수정 및 삭제\n- 댓글 해결됨 상태\n- 하이라이트 색상 구분\n- 문서 수정 후 댓글 위치 재매핑 정확도 개선\n- Word 내보내기에 댓글 정보를 주석 또는 별도 표로 포함\n\n## 대댓글 및 파일첨부 고도화 프롬프트\n\n댓글에는 대댓글과 파일첨부가 가능해야 한다.\n\n대댓글 원칙:\n- 사용자는 기존 댓글에 답글을 달 수 있어야 한다.\n- 대댓글에는 작성자, 작성내용, 작성 시각이 표시되어야 한다.\n- 대댓글은 원 댓글 아래에 계층적으로 표시한다.\n- 대댓글은 원 댓글이 연결된 선택 영역과 같은 댓글 묶음 안에서 보여준다.\n- 대댓글이 여러 개일 경우 작성 시각 순서로 보여준다.\n\n파일첨부 원칙:\n- 댓글과 대댓글 모두 파일을 첨부할 수 있는 구조로 만든다.\n- 첨부 파일은 서버의 `uploads/attachments/` 폴더에 저장한다.\n- DB에는 원본 파일명, 저장 파일명, 파일 크기, MIME 타입, 연결된 댓글 ID를 저장한다.\n- 댓글 목록에는 첨부 파일명을 표시한다.\n- 우선 다운로드 링크 제공은 보류하고, 파일 저장과 목록 표시까지 구현한다.\n\n이번 구현 범위:\n- 댓글 DB 구조에 `parentId`와 첨부파일 목록을 추가한다.\n- 기존 원댓글은 `parentId: null`로 저장한다.\n- 대댓글은 같은 API에서 `parentId`를 받아 저장한다.\n- 댓글 작성 폼과 대댓글 작성 폼에서 첨부 파일을 함께 보낼 수 있게 한다.\n- 기존 댓글 하이라이트와 댓글 묶음 기능은 유지한다.\n\n## 댓글 하이라이트 UX 및 채팅 고도화 프롬프트\n\n작성 영역에서 드래그한 원문 위치가 미리보기에서 명확히 보여야 한다.\n\n하이라이트 UX 원칙:\n- 댓글을 달 때 사용자가 드래그한 정확한 원문 범위를 저장한다.\n- 댓글 작성자가 작성 탭에서 텍스트를 드래그하는 즉시, 같은 영역이 미리보기에도 표시되어야 한다.\n- 저장 전 선택 영역은 댓글 작성 중임을 알 수 있도록 댓글 하이라이트보다 더 선명하게 표시한다.\n- 미리보기는 저장된 시작/끝 위치를 기준으로 댓글 영역을 파란톤으로 표시한다.\n- 마크다운 문법 때문에 미리보기 텍스트가 달라져도 가능한 한 같은 위치가 표시되어야 한다.\n- 하이라이트에는 댓글 개수를 표시한다.\n- 하이라이트를 클릭하면 오른쪽 댓글 묶음이 강조된다.\n- 댓글 묶음을 클릭하면 연결된 미리보기 하이라이트로 스크롤하고 강조된다.\n- 댓글 하나만 있을 때도 어느 영역의 댓글인지 즉시 알 수 있어야 한다.\n- 문서가 수정되어 위치가 어긋난 경우에는 선택 텍스트 기반 복구를 시도한다.\n\n채팅 원칙:\n- 문서별 채팅 공간을 제공한다.\n- 채팅에는 작성자, 메시지, 작성 시각이 저장된다.\n- 채팅은 댓글과 별개로 문서 전체에 대한 대화로 사용한다.\n- 채팅 패널은 댓글 패널과 같은 오른쪽 영역 안에서 접근 가능해야 한다.\n- 우선 실시간 웹소켓은 사용하지 않고 저장/조회형 채팅으로 구현한다.\n\n이번 구현 범위:\n- 원본 마크다운 위치 기반 미리보기 하이라이트를 구현한다.\n- 작성 탭에서 드래그한 현재 선택 영역을 미리보기에서 즉시 하이라이트한다.\n- 댓글 관련 하이라이트 색상은 파란톤으로 통일한다.\n- 댓글 패널에서 댓글 묶음을 누르면 연결된 미리보기 하이라이트로 이동한다.\n- 하이라이트와 댓글 묶음의 양방향 포커스를 구현한다.\n- 문서별 채팅 저장/조회 API를 추가한다.\n- 오른쪽 패널에 댓글/채팅 탭을 추가한다.\n\n## 열린 문서 탭 고도화 프롬프트\n\n사용자는 여러 마크다운 문서 중 일부만 작업 중일 수 있으므로, IDE처럼 열린 문서를 상단 탭으로 빠르게 전환할 수 있어야 한다.\n\n열린 탭 UX 원칙:\n- 왼쪽 문서 목록은 전체 문서 탐색 역할을 유지한다.\n- 사용자가 문서를 열면 상단 열린 문서 탭에 추가한다.\n- 이미 열린 문서를 다시 열면 새 탭을 만들지 않고 기존 탭을 활성화한다.\n- 상단 탭에는 문서 제목 또는 파일명이 표시된다.\n- 현재 활성 문서 탭은 명확히 강조한다.\n- 탭에는 닫기 버튼이 있어야 한다.\n- 활성 탭을 닫으면 인접한 열린 탭으로 이동한다.\n- 마지막 탭을 닫으면 새 문서 작성 상태로 전환한다.\n- 모바일에서는 탭이 가로 스크롤되어야 한다.\n\n이번 구현 범위:\n- 에디터 상단에 열린 문서 탭 영역을 추가한다.\n- 문서 열기, 새 문서 생성, 업로드 후 열기 시 탭 상태를 갱신한다.\n- 열린 탭 클릭으로 문서를 빠르게 전환한다.\n- 탭 닫기 기능을 추가한다.\n\n## 내부용 로그인 및 삭제 권한 프롬프트\n\n내부에서만 쓰는 앱이므로 복잡한 인증보다는 간단하고 안전한 로컬 인증을 제공한다.\n\n인증 원칙:\n- 회원가입과 로그인을 제공한다.\n- 사용자는 사용자명과 비밀번호로 가입한다.\n- 비밀번호는 평문 저장하지 않고 해시로 저장한다.\n- 로그인 후 세션 쿠키로 현재 사용자를 식별한다.\n- 화면 상단에 현재 로그인 사용자를 표시한다.\n- 로그아웃을 제공한다.\n\n삭제 권한 원칙:\n- 사용자가 직접 작성한 문서, 댓글, 대댓글, 채팅은 삭제할 수 있어야 한다.\n- 내부용이므로 우선 작성자 본인만 삭제 가능하게 한다.\n- 기존 작성자 정보가 없는 데이터는 삭제 버튼을 표시하지 않는다.\n- 문서를 삭제하면 해당 문서의 댓글, 대댓글, 채팅도 함께 정리한다.\n\n열린 탭 보정 원칙:\n- 상단 열린 문서 탭 영역은 항상 보여야 한다.\n- 열린 탭이 없을 때도 안내 문구를 표시한다.\n- 문서를 여러 개 열면 즉시 상단 탭에 표시되어야 한다.\n- 문서 삭제 시 해당 문서 탭도 닫혀야 한다.\n\n다음 대화 흐름:\n1. 첫 화면을 어떤 에디터 구조로 만들지 정한다.\n2. 파일 업로드와 직접 편집을 한 화면에 둘지, 탭으로 나눌지 정한다.\n3. 최소 기능부터 추가한다: 입력창, 실시간 미리보기, 임시 저장, 현재 문서 Word 내보내기.\n4. 기존 `.docx` 변환 기능이 그대로 동작하는지 확인한다.\n5. Word 문서 품질을 제목, 목록, 표, 코드블록, 인용문, 링크 순서로 다듬는다.\n\n결정할 사항:\n- 앱 이름을 `Markdown to Word 변환기`로 유지할지, `마크다운 에디터`로 바꿀지\n- Word 결과물을 업무 보고서 스타일로 만들지, 읽기 좋은 기본 문서 스타일로 만들지\n- 여러 파일 일괄 변환을 핵심 기능으로 둘지, 보조 기능으로 분리할지\n"

          "content": "# 마크다운 에디터\n\n마크다운 문서를 작성하고, 선택한 영역에 댓글을 남기고, Word 파일로 내보낼 수 있는 로컬 Node 앱입니다.\n\n## 실행\n\n```bash\nnpm start\n```\n\n브라우저에서 다음 주소를 엽니다.\n\n```text\nhttp://localhost:3000\n```\n\n## 외부 접속 사용법\n\n이 앱은 서버 하나가 프론트 화면과 백엔드 API를 함께 제공합니다.\n\n- 프론트 접속 주소: `http://\u003cipconfig IPv4>:3000`\n- 백엔드 API 주소: `http://\u003cipconfig IPv4>:3000/api`\n- 로그인 페이지: `http://\u003cipconfig IPv4>:3000/login`\n- 회원가입 페이지: `http://\u003cipconfig IPv4>:3000/signup`\n\n### 1. Windows IPv4 주소 확인\n\nWindows 터미널 또는 PowerShell에서 실행합니다.\n\n```powershell\nipconfig\n```\n\n현재 PC가 연결된 네트워크 어댑터의 `IPv4 주소`를 확인합니다. 예를 들어 `192.168.0.25`라면 외부 접속 주소는 다음과 같습니다.\n\n```text\nhttp://192.168.0.25:3000\n```\n\n### 2. Windows Terminal에서 서버 실행\n\nWindows Terminal 또는 PowerShell에서 프로젝트 폴더로 이동합니다.\n\n```powershell\ncd \"C:\\Users\\itban\\Desktop\\업무\\markdown_editor\"\n```\n\n확인한 IPv4 주소를 `LAN_IP`에 넣고 서버를 실행합니다.\n\n```powershell\n$env:LAN_IP=\"192.168.0.25\"\nnpm start\n```\n\n서버는 기본적으로 `0.0.0.0:3000`에 바인딩되어 같은 네트워크의 다른 기기에서도 접속할 수 있습니다.\n\n### 3. Windows 방화벽 확인\n\n외부 기기에서 접속이 안 되면 Windows Defender 방화벽에서 TCP `3000` 포트를 허용합니다.\n\n관리자 PowerShell 예시:\n\n```powershell\nNew-NetFirewallRule -DisplayName \"Markdown Editor 3000\" -Direction Inbound -Protocol TCP -LocalPort 3000 -Action Allow\n```\n\n### 4. 접속 확인\n\n같은 와이파이 또는 같은 사내망에 있는 다른 PC/휴대폰 브라우저에서 다음 주소를 엽니다.\n\n```text\nhttp://192.168.0.25:3000\n```\n\n백엔드 API 확인 주소:\n\n```text\nhttp://192.168.0.25:3000/api/auth/me\n```\n\n## 저장 위치\n\n- 문서와 댓글 데이터: `data/app-db.json`\n- 업로드 원본 파일: `uploads/`\n- 화면 파일: `public/`\n- 서버 파일: `server.js`\n\n## 현재 기능\n\n- 새 마크다운 문서 작성\n- 내부용 회원가입 및 로그인\n- 로그인 사용자 기준 작성자 저장\n- 마크다운 실시간 미리보기\n- 문서 자동 저장 및 수동 저장\n- 직접 작성한 문서 삭제\n- 마크다운 파일 업로드 후 폴더에 원본 저장\n- 업로드 문서를 DB에 등록\n- 편집창에서 드래그로 선택한 영역에 댓글 저장\n- 댓글 작성자와 작성내용 저장\n- 미리보기에서 댓글 영역 파란톤 하이라이트 표시\n- 작성 영역 드래그 범위 기준 미리보기 하이라이트\n- 댓글 묶음과 미리보기 하이라이트 양방향 포커스\n- 같은 영역에 여러 댓글 표시\n- 댓글에 대댓글 작성\n- 댓글과 대댓글에 파일 첨부\n- 직접 작성한 댓글과 대댓글 삭제\n- 문서 단위 채팅 저장 및 조회\n- 직접 작성한 채팅 삭제\n- IDE처럼 상단 열린 문서 탭으로 빠른 전환\n- 열린 문서 탭 닫기\n- 현재 문서를 `.docx`로 다운로드\n\n## 다음 개선 후보\n\n- SQLite 패키지 도입 후 `data/app-db.json`을 실제 SQLite DB로 전환\n- 댓글 위치 하이라이트 표시\n- 댓글 수정 및 삭제\n- Word 문서 스타일 설정\n- 여러 파일 일괄 변환 모드 분리\n"

          "content": "# 마크다운 에디터 고도화 프롬프트\n\n## 작업 프롬프트\n\n브라우저에서 바로 실행되는 마크다운 에디터와 Word 변환기를 고도화한다.\n\n현재 앱 상태:\n- 단일 파일 앱: `markdown-to-word.html`\n- HTML, CSS, JavaScript만 사용\n- 빌드 과정 없음\n- 백엔드 없음\n- 외부 패키지 의존성 없음\n- 마크다운 파일 드래그 앤 드롭 지원\n- 여러 파일 선택 지원\n- 변환 전 미리보기 지원\n- 마크다운 블록을 `.docx` 파일로 변환\n- 여러 문서를 변환할 때 ZIP 다운로드 지원\n\n핵심 목표:\n- 단순한 Markdown to Word 변환기를 실무용 마크다운 에디터로 확장한다.\n- 작성, 미리보기, Word 내보내기, 문서 형식 조정이 한 화면에서 자연스럽게 이어지도록 만든다.\n\n작업 원칙:\n- 특별한 이유가 생기기 전까지 브라우저 전용 앱 구조를 유지한다.\n- 기존 Word 변환 기능은 깨지지 않게 보존한다.\n- 기능은 한 번에 크게 갈아엎지 말고 검증 가능한 단위로 추가한다.\n- UI 문구는 한국어로 짧고 명확하게 작성한다.\n- 장식적인 화면보다 문서 작성과 검토 효율을 우선한다.\n- 에디터 흐름과 내보내기 요구사항이 확정되기 전에는 대규모 구조 변경을 피한다.\n\n우선 고도화 방향:\n- 파일 업로드뿐 아니라 직접 마크다운을 작성하고 수정할 수 있게 한다.\n- 입력한 내용과 미리보기가 실시간으로 동기화되게 한다.\n- 현재 편집 중인 문서를 바로 Word로 내보낼 수 있게 한다.\n- 제목, 저장 파일명, 글꼴, 여백, 표 스타일 같은 문서 설정을 추가한다.\n- 브라우저 로컬 임시 저장 기능을 추가한다.\n- 모바일에서도 파일 선택, 편집, 미리보기, 내보내기 흐름이 무너지지 않게 한다.\n\n다음 대화 흐름:\n1. 첫 화면을 어떤 에디터 구조로 만들지 정한다.\n2. 파일 업로드와 직접 편집을 한 화면에 둘지, 탭으로 나눌지 정한다.\n3. 최소 기능부터 추가한다: 입력창, 실시간 미리보기, 임시 저장, 현재 문서 Word 내보내기.\n4. 기존 `.docx` 변환 기능이 그대로 동작하는지 확인한다.\n5. Word 문서 품질을 제목, 목록, 표, 코드블록, 인용문, 링크 순서로 다듬는다.\n\n결정할 사항:\n- 앱 이름을 `Markdown to Word 변환기`로 유지할지, `마크다운 에디터`로 바꿀지\n- Word 결과물을 업무 보고서 스타일로 만들지, 읽기 좋은 기본 문서 스타일로 만들지\n- 여러 파일 일괄 변환을 핵심 기능으로 둘지, 보조 기능으로 분리할지\n"

          "date": "2026-06-02",
          "content": "# Figma MCP 사용 가이드 및 통합 화면 구현 전략\n\n작성일: 2026-05-21  \n대상 프로젝트: 시험 플랫폼 Figma/PDF 분석  \n기준 사례: Figma node `5:27589` / `목록_시험접수`\n\n## 1. 먼저 결론\n\nFigma MCP는 “Figma 파일 전체를 한 번에 완벽하게 읽어서 전체 사이트를 자동 구현하는 도구”라기보다, **선택한 화면 또는 선택한 노드의 구조와 시각 정보를 정확히 가져오는 도구**에 가깝다.\n\n따라서 가장 좋은 방식은 다음 순서다.\n\n1. 전체 파일 또는 페이지 구조를 먼저 파악한다.\n2. 대표 화면을 하나씩 선택해서 정확한 디자인 기준을 추출한다.\n3. 반복되는 공통 구조를 컴포넌트로 정리한다.\n4. 화면별 차이만 따로 정리한다.\n5. 마지막에 사이트맵, 기능 정의, UI 컴포넌트, 화면 구현 우선순위를 통합한다.\n\n즉, 화면을 하나씩 선택하는 과정은 번거로운 일이 아니라 **정확한 구현을 위한 기준 화면을 수집하는 과정**으로 보는 것이 좋다.\n\n## 2. Figma MCP로 무엇을 할 수 있는가?\n\nFigma MCP는 Figma 화면을 분석하거나 구현에 참고할 정보를 가져올 때 사용한다.\n\n| 할 수 있는 일 | 설명 | 사용 상황 |\n|---|---|---|\n| 스크린샷 추출 | 선택한 프레임/노드의 실제 시각 모습을 이미지처럼 확인 | 디자인이 실제로 어떻게 생겼는지 확인할 때 |\n| 디자인 컨텍스트 추출 | 레이아웃, 텍스트, 색상, 크기, 계층 구조를 코드 형태로 참고 | HTML/CSS 또는 React 구현 기준을 잡을 때 |\n| 메타데이터 확인 | 페이지 안의 노드 목록, 이름, 크기, 위치를 확인 | 어떤 화면들이 들어 있는지 구조를 볼 때 |\n| 디자인 시스템 검색 | 버튼, 입력창, 테이블 등 기존 컴포넌트가 있는지 확인 | 같은 컴포넌트를 재사용해야 할 때 |\n| Figma 파일에 쓰기 | 새 프레임, 컴포넌트, 토큰 등을 직접 생성/수정 | Figma 안에 새 디자인을 만들거나 고칠 때 |\n\n이번 프로젝트에서는 주로 **스크린샷 추출**과 **디자인 컨텍스트 추출**이 중요하다. 이유는 PDF만 볼 때보다 실제 Figma 노드의 레이아웃 계층과 화면 비율을 더 정확히 알 수 있기 때문이다.\n\n## 3. 페이지를 통째로 선택하면 안 되는가?\n\n가능은 하지만, 항상 좋은 방식은 아니다.\n\nFigma에서 페이지 전체 또는 너무 큰 그룹을 선택하면 다음 문제가 생길 수 있다.\n\n| 문제 | 설명 |\n|---|---|\n| 정보가 너무 많아짐 | 수십 개 화면이 한 번에 들어오면 핵심 구조를 구분하기 어렵다 |\n| 일부 정보가 생략될 수 있음 | MCP 응답 크기가 커져서 코드나 텍스트가 일부만 반환될 수 있다 |\n| 화면 단위가 흐려짐 | 로그인, 목록, 상세, 팝업, 관리자 화면이 섞여 해석될 수 있다 |\n| 구현 기준이 흔들림 | 어떤 화면을 기준 디자인으로 삼아야 하는지 불명확해진다 |\n\n그래서 페이지 전체 선택은 **탐색용**으로는 괜찮지만, 실제 구현 기준을 잡을 때는 화면 단위로 선택하는 것이 좋다.\n\n## 4. 하나씩 선택하고 호출해야 하는가?\n\n정확한 답은 “중요 화면은 하나씩 선택하는 것이 좋고, 모든 화면을 하나씩 깊게 분석할 필요는 없다”이다.\n\n화면을 세 종류로 나누면 된다.\n\n| 화면 유형 | MCP 호출 방식 | 예시 |\n|---|---|---|\n| 기준 화면 | 반드시 개별 선택 후 상세 추출 | `목록_시험접수`, 관리자 홈, 시험응시 화면 |\n| 변형 화면 | 기준 화면과 비교해 차이만 확인 | 접수 변경, 접수 취소, 상세 팝업 |\n| 단순 화면 | PDF/파일명 분석으로 충분할 수 있음 | 이용약관, 저장 완료, 정보 없음 |\n\n이번에 확인한 `목록_시험접수`는 기준 화면이다. 이 화면에는 2024 디자인의 핵심 구조가 들어 있다.\n\n- 상단 글로벌 메뉴\n- 좌측 아이콘 레일\n- 마이페이지 사이드바\n- 사용자 프로필\n- 검색 조건\n- 시험 정보 테이블\n- 상태별 버튼\n- 페이지네이션\n- 푸터\n\n이런 화면은 반드시 MCP로 직접 확인해야 한다. 반대로 `저장팝업`, `로그아웃`, `정보없을경우` 같은 단순 화면은 기준 화면을 먼저 잡은 뒤 필요한 경우에만 확인해도 된다.\n\n## 5. 권장 MCP 분석 순서\n\n시험 플랫폼처럼 화면이 많은 프로젝트에서는 다음 순서가 좋다.\n\n### 5.1 1단계: 전체 구조 파악\n\n먼저 PDF 폴더, 파일명, 메뉴 구조 이미지를 기준으로 전체 화면 목록을 만든다.\n\n이 단계의 목표는 디자인을 구현하는 것이 아니라, “어떤 화면이 존재하는지”를 정리하는 것이다.\n\n확인할 것:\n\n- 사용자 역할: 수험생, 출제자, 채점자, 관리자\n- 업무 흐름: 접수, 결제, 응시, 출제, 채점, 결과, 자격증\n- 화면 유형: 목록, 상세, 등록, 수정, 팝업, 완료, 빈 상태\n- 반복 패턴: 테이블, 검색, 사이드 메뉴, 버튼, 상태값\n\n### 5.2 2단계: 기준 화면 선정\n\n모든 화면을 같은 깊이로 분석하면 시간이 많이 들고, 오히려 판단이 흐려진다. 먼저 기준 화면을 고른다.\n\n| 영역 | 우선 확인할 기준 화면 |\n|---|---|\n| 수험생 | 시험접수 목록, 시험응시, 시험결과, 자격증 신청 |\n| 출제자 | 출제관리 목록, 번역/단답형/프롬프트 출제 상세 |\n| 채점자 | 채점관리 목록, 번역/단답형/프롬프트 채점 상세 |\n| 관리자 | 관리자 홈, 회원관리, 시험관리, 결제관리, 문의관리 |\n\n이 기준 화면들은 MCP로 직접 선택해서 스크린샷과 디자인 컨텍스트를 추출하는 것이 좋다.\n\n### 5.3 3단계: 공통 레이아웃 추출\n\n기준 화면을 몇 개 보면 반복되는 구조가 보인다.\n\n2024 기준으로는 다음 공통 레이아웃이 중요하다.\n\n| 공통 구조 | 설명 |\n|---|---|\n| 상단 헤더 | 로고, 글로벌 메뉴, 사용자 도구 |\n| 좌측 레일 | 빠른 접근 아이콘 또는 보조 메뉴 |\n| 마이페이지/관리자 사이드바 | 역할별 하위 메뉴 |\n| 검색 조건 영역 | 날짜, 검색어, 상태, 버튼 |\n| 데이터 테이블 | 목록 화면의 핵심 정보 표시 |\n| 액션 버튼 | 접수, 변경, 취소, 저장, 상세, 다운로드 |\n| 페이지네이션 | 목록 화면 하단 이동 |\n| 푸터 | 회사 정보, 정책 링크 |\n\n이 공통 구조를 먼저 구현하면, 모든 화면을 새로 만드는 것이 아니라 “같은 틀 안에서 내용만 바꾸는 방식”으로 구현할 수 있다.\n\n### 5.4 4단계: 화면별 차이 정리\n\n기준 레이아웃을 만든 뒤에는 화면별 차이만 정리한다.\n\n예를 들어 시험접수 목록과 시험결과 목록은 둘 다 목록 화면이지만, 테이블 컬럼과 버튼이 다르다.\n\n| 화면 | 공통점 | 차이점 |\n|---|---|---|\n| 시험접수 | 검색 조건, 테이블, 페이지네이션 | 접수하기, 변경, 취소 버튼 |\n| 시험응시 | 검색 조건, 테이블, 페이지네이션 | 시험 시작, 이어보기, 제출 상태 |\n| 시험결과 | 검색 조건, 테이블, 페이지네이션 | 점수, 합격 여부, 결과 상세 |\n| 자격증신청 | 검색 조건, 테이블, 페이지네이션 | 자격증 신청, 발급 상태, 결제 여부 |\n\n이렇게 정리하면 전체 구현량이 크게 줄어든다.\n\n## 6. 통합적인 모든 화면 구현은 어떻게 처리하는 것이 좋은가?\n\n전체 화면 구현은 “Figma 화면을 1:1로 무작정 많이 만드는 방식”보다 **구조화된 화면 시스템**으로 접근하는 것이 좋다.\n\n권장 방식은 다음과 같다.\n\n### 6.1 화면을 먼저 그룹화한다\n\n시험 플랫폼 화면은 다음 그룹으로 나눌 수 있다.\n\n| 그룹 | 포함 화면 |\n|---|---|\n| 인증/계정 | 로그인, 회원가입, 아이디 찾기, 비밀번호 재설정, 본인인증 |\n| 수험생 마이페이지 | 시험접수, 시험응시, 시험결과, 자격증신청, 결제내역, 문의 |\n| 시험 응시 | 시험 시작, 시험중, 제출, 종료, 단답형, 번역형, 프롬프트형 |\n| 출제자 | 출제관리, 출제 상세, 임시저장, 출제내역 |\n| 채점자 | 채점관리, 채점 상세, 피드백, 채점내역 |\n| 관리자 | 관리자 홈, 회원관리, 시험관리, 문제관리, 채점관리, 결제관리, 정산관리, 통계 |\n| 운영/콘텐츠 | 게시판, FAQ, 블로그, 배너, 알림, 이메일 |\n\n이 그룹 기준으로 구현하면 화면 수가 많아도 관리가 가능하다.\n\n### 6.2 화면 유형별 템플릿을 만든다\n\n개별 화면을 모두 따로 구현하는 대신, 화면 유형별 템플릿을 만든다.\n\n| 템플릿 | 쓰이는 화면 |\n|---|---|\n| 로그인/인증 템플릿 | 로그인, 회원가입, 비밀번호 찾기 |\n| 마이페이지 목록 템플릿 | 시험접수, 시험응시, 시험결과, 결제내역 |\n| 관리자 목록 템플릿 | 회원관리, 시험관리, 결제관리, 문의관리 |\n| 상세/수정 템플릿 | 회원 상세, 시험 상세, 전문가 상세 |\n| 작업형 템플릿 | 시험 응시, 출제, 채점, 프롬프트 작업 |\n| 팝업 템플릿 | 접수 확인, 저장 확인, 제출 확인, 문의 팝업 |\n\nFigma MCP는 이 템플릿의 기준이 되는 대표 화면을 정확히 추출하는 데 사용한다.\n\n### 6.3 모든 화면을 MCP로 깊게 추출하지 않는다\n\n모든 화면을 MCP로 하나씩 깊게 추출하면 시간이 오래 걸리고, 구현 관점에서는 중복이 많다.\n\n대신 다음 기준으로 나눈다.\n\n| 우선순위 | 처리 방식 |\n|---|---|\n| 높음 | MCP 상세 추출 후 구현 기준으로 사용 |\n| 중간 | 스크린샷만 확인하고 기준 템플릿에 맞춰 변형 |\n| 낮음 | PDF/파일명/문서 분석으로 기능만 정의 |\n\n예를 들어 `목록_시험접수`를 기준으로 마이페이지 목록 템플릿을 만든 뒤, `목록_시험응시`, `목록_시험결과`, `목록_자격증신청`은 컬럼과 버튼만 바꾸는 방식이 효율적이다.\n\n## 7. 이번 프로젝트에 적용할 추천 작업 방식\n\n현재까지의 해석을 기준으로 하면 다음 방식이 가장 적절하다.\n\n### 7.1 2024는 기준 디자인으로 사용\n\n2024는 시험 플랫폼의 실제 토대다. 따라서 HTML 시안이나 향후 구현도 2024의 구조를 중심으로 잡아야 한다.\n\n우선 MCP로 확인할 2024 기준 화면:\n\n| 우선순위 | 화면 |\n|---|---|\n| 1 | `목록_시험접수` |\n| 2 | `목록_시험응시` |\n| 3 | `목록_시험결과` |\n| 4 | `관리자 홈` |\n| 5 | `회원관리` |\n| 6 | `시험관리` |\n| 7 | `출제관리` |\n| 8 | `채점관리` |\n\n### 7.2 2025는 UX/UI 참고로 사용\n\n2025는 2024를 대체하는 화면 세트로 보기보다, 일부 UX/UI 패턴을 참고하는 자료로 보는 것이 안전하다.\n\n특히 `창작작업실01.png`는 현재 기준에서 확정 메뉴가 아니라 참고 자료로 분리한다.\n\n적용 가능한 부분:\n\n- 작업형 화면의 좌우 분할\n- 입력 영역과 결과 영역의 구분\n- 파일 업로드 또는 템플릿 선택 흐름\n- 사용자가 현재 작업 상태를 이해하기 쉬운 패널 구성\n\n적용을 조심해야 하는 부분:\n\n- 2024의 기본 사이트 구조를 덮어쓰는 것\n- 창작작업실을 핵심 메뉴로 확정하는 것\n- 시험접수/응시/결과 흐름보다 작업실 UX를 앞세우는 것\n\n### 7.3 vibecoding은 관리자 고도화 기능으로 사용\n\nvibecoding은 일반 사용자 화면보다 운영자용 고급 기능에 가깝다.\n\n적용 가능한 부분:\n\n- 대량 데이터 테이블\n- 고급 검색 필터\n- 파일 업로드\n- 엑셀 다운로드\n- SMS/메일 발송\n- 다중 선택 후 일괄 처리\n\n적용할 위치:\n\n- 관리자 회원관리\n- 관리자 시험관리\n- 채점관리\n- 결제/정산관리\n- 문의/알림 관리\n\n## 8. Figma 링크를 줄 때 가장 좋은 방식\n\nFigma MCP로 정확히 분석하려면 링크를 줄 때 다음 방식이 좋다.\n\n### 8.1 가장 좋은 링크\n\n개별 화면 프레임을 선택한 뒤 복사한 링크가 가장 좋다.\n\n예:\n\n```text\nhttps://www.figma.com/design/{fileKey}/{fileName}?node-id=5-27589\n```\n\n이 방식은 MCP가 어떤 화면을 봐야 하는지 명확하다.\n\n### 8.2 페이지 전체 링크\n\n페이지 전체 링크는 탐색용으로는 좋지만, 구현 기준으로는 애매할 수 있다.\n\n이 경우에는 먼저 “이 페이지 안의 화면 목록을 파악해줘” 같은 목적으로 쓰는 것이 좋다. 이후 대표 화면을 다시 선택해서 개별 링크를 주는 방식이 더 정확하다.\n\n### 8.3 여러 화면을 분석해야 할 때\n\n한 번에 많은 링크를 주기보다, 다음 형식으로 묶어주는 것이 좋다.\n\n| 순서 | 화면명 | Figma 링크 | 목적 |\n|---|---|---|---|\n| 1 | 시험접수 목록 | node 링크 | 마이페이지 목록 기준 |\n| 2 | 시험응시 | node 링크 | 응시 상태/버튼 확인 |\n| 3 | 관리자 홈 | node 링크 | 관리자 기본틀 확인 |\n| 4 | 회원관리 | node 링크 | 관리자 목록 기준 |\n\n이렇게 주면 분석 결과도 화면별로 정리되고, 구현 우선순위도 명확해진다.\n\n## 9. MCP 분석 결과를 구현으로 바꾸는 방법\n\nMCP에서 나온 코드를 그대로 복사해서 구현하는 것은 권장하지 않는다. Figma에서 생성되는 코드는 화면 재현에는 도움이 되지만, 실제 서비스 코드로는 중복이 많고 유지보수가 어렵기 때문이다.\n\n더 좋은 방식은 다음과 같다.\n\n1. MCP 결과에서 레이아웃 구조를 파악한다.\n2. 색상, 간격, 폰트 크기, 테이블 구조 같은 기준값을 뽑는다.\n3. 실제 구현에서는 공통 컴포넌트로 다시 만든다.\n4. 화면별 데이터와 버튼 상태만 바꾼다.\n5. HTML 시안으로 먼저 검증한 뒤, 필요할 때 Next.js나 React로 옮긴다.\n\n이번에 만든 `시험플랫폼_레이아웃_통합도.html`도 이 방식에 맞춰야 한다. 즉, Figma의 2024 화면을 그대로 복사하는 것이 아니라, 2024의 화면 골격을 기준으로 사람이 이해하기 쉬운 통합 시안으로 재구성하는 것이 맞다.\n\n## 10. 최종 권장 프로세스\n\n전체 작업은 다음 순서가 가장 안정적이다.\n\n| 단계 | 작업 | 산출물 |\n|---|---|---|\n| 1 | PDF/파일명으로 전체 화면 목록 정리 | 사이트맵, 기능 정의 |\n| 2 | Figma MCP로 기준 화면 추출 | 기준 화면별 디자인 분석 |\n| 3 | 공통 레이아웃과 컴포넌트 도출 | 헤더, 사이드바, 검색, 테이블, 버튼 정의 |\n| 4 | 화면 유형별 템플릿 설계 | 목록형, 상세형, 작업형, 팝업형 |\n| 5 | 2024/2025/vibecoding 역할 분리 | 2024 기본, 2025 참고, vibecoding 고도화 |\n| 6 | HTML 시안 제작 | 빠르게 볼 수 있는 정적 레이아웃 |\n| 7 | 실제 프론트엔드 구현 | Next.js/React 등으로 전환 |\n| 8 | 기능 요구사항과 비교 | 누락 기능, 과해석 기능, 우선순위 정리 |\n\n## 11. 이 프로젝트에서 특히 주의할 점\n\n현재 분석에서 가장 중요한 주의점은 다음이다.\n\n1. 2024 디자인 기본틀을 무시하면 안 된다.\n2. 2025의 창작작업실은 확정 기능이 아니라 참고 자료로 둔다.\n3. vibecoding은 일반 사용자 화면이 아니라 운영 고도화 기능으로 분류한다.\n4. Figma MCP는 기준 화면을 정밀하게 확인하는 용도로 사용한다.\n5. 전체 구현은 개별 화면 복사가 아니라 공통 템플릿화로 처리한다.\n\n정리하면, Figma MCP는 “모든 화면을 자동으로 만들어주는 버튼”이 아니라 **기준 화면을 정확히 해석해서 전체 구현 체계를 흔들리지 않게 만드는 분석 도구**로 쓰는 것이 가장 좋다.\n\n"

          "content": "# work-history-tracker - Plan Document\n\n> Version: 1.0.0 | Date: 2026-05-26 | Status: Completed\n> Level: Starter\n\n---\n\n## 1. Overview\n\n### 1.1 Purpose\n\n프로젝트와 부서 단위로 업무 내용을 정리하고, 하나의 화면에서 업무의 발생부터 진행, 논의, 결과까지 시간 순서로 추적할 수 있는 시스템을 구축한다. 각 업무에는 댓글과 대댓글 형태의 논의 기록 및 파일 첨부를 제공하여 업무 인수인계와 과거 의사결정 확인 비용을 줄인다.\n\n### 1.2 Background\n\n업무 진행 과정이 메신저, 파일, 구두 협의 등에 흩어지면 특정 업무가 어떤 배경으로 변경되었고 누가 무엇을 확인했는지 파악하기 어렵다. 업무 본문과 논의, 첨부자료를 동일한 맥락에 보존하는 추적 가능한 기록 화면이 필요하다.\n\n### 1.3 Target Users\n\n- 부서 구성원: 담당 업무 등록, 진행 기록 작성, 파일 공유, 댓글 참여\n- 담당자 또는 협업자: 자신의 업무와 관련 논의 확인 및 후속 작업 처리\n- 부서 관리자: 프로젝트 및 부서 업무 진행 상황과 히스토리 검토\n\n## 2. Goals\n\n### 2.1 Primary Goals\n\n- [x] 프로젝트와 부서를 기준으로 업무 항목을 분류하고 조회할 수 있다.\n- [x] 업무 상세 화면 한 페이지에서 본문, 상태 변화, 댓글, 대댓글, 첨부파일을 시간 흐름으로 확인할 수 있다.\n- [x] 업무 관련 논의가 댓글 스레드로 연결되어 작성자와 작성 시점을 추적할 수 있다.\n- [x] 업무 및 논의에 필요한 파일을 첨부하고 다시 확인할 수 있다.\n- [x] 화면 여백을 줄인 정보 밀도 높은 레이아웃으로 다수의 업무 기록을 효율적으로 탐색할 수 있다.\n\n### 2.2 Non-Goals\n\n- 초기 범위에서 채팅, 화상회의, 이메일 발송 기능은 제공하지 않는다.\n- 칸반, 간트 차트, 근태 또는 비용 정산 등 종합 ERP 기능은 포함하지 않는다.\n- 외부 클라우드 드라이브와의 양방향 동기화는 초기 범위에서 제외한다.\n- AI 요약, 자동 분류, 자동 일정 추천은 후속 검토 대상으로 둔다.\n\n## 3. Scope\n\n### 3.1 In Scope\n\n- 프로젝트와 부서의 등록 또는 선택, 업무와의 연결\n- 업무 등록 및 수정: 제목, 내용, 프로젝트, 부서, 담당자, 상태, 우선순위, 작성일/수정일\n- 프로젝트별 또는 부서별 업무 목록, 필터 및 기본 검색\n- 업무 상세 단일 페이지: 기본 정보, 본문, 첨부자료, 활동 히스토리, 댓글 스레드 표시\n- 댓글과 1단계 이상 대댓글 작성, 수정 표시, 작성자와 작성 시각 표시\n- 업무 생성/수정, 상태 변경, 댓글/대댓글 작성, 파일 첨부 이벤트의 히스토리 기록\n- 업무 및 댓글 맥락에 연결된 파일 첨부, 다운로드, 파일명/크기/작성자/등록 시각 표시\n- 컴팩트 UI: 좁은 여백, 고정 필터 또는 요약 영역, 스크롤 가능한 히스토리 영역\n- 기본 접근 제어: 사용자의 열람 가능 부서 및 작성/수정 권한 고려\n\n### 3.2 Out of Scope\n\n- 조직 전체의 복잡한 결재선 및 전자결재 워크플로우\n- 실시간 공동 문서 편집 및 실시간 채팅\n- 파일 버전 비교, OCR, 문서 미리보기 고도화\n- 모바일 네이티브 앱 및 오프라인 동기화\n- 고급 대시보드, 업무량 예측, 통계 리포트\n\n## 4. Functional Requirements\n\n| ID | Requirement | Priority |\n|----|-------------|----------|\n| FR-01 | 사용자는 프로젝트와 부서를 기준으로 업무를 등록하고 분류할 수 있다. | Must |\n| FR-02 | 사용자는 업무 목록을 프로젝트, 부서, 상태, 담당자로 필터링할 수 있다. | Must |\n| FR-03 | 업무 상세 페이지는 업무 정보와 관련 활동 히스토리를 한 화면에 표시한다. | Must |\n| FR-04 | 사용자는 업무에 댓글을 작성하고 댓글에 대댓글을 남길 수 있다. | Must |\n| FR-05 | 댓글 및 대댓글에는 작성자, 작성 시간, 수정 여부가 표시된다. | Must |\n| FR-06 | 업무의 생성, 정보 변경, 상태 변경, 댓글 및 첨부 동작은 시간 순 히스토리에 남는다. | Must |\n| FR-07 | 사용자는 업무 또는 관련 논의에 파일을 첨부하고 다운로드할 수 있다. | Must |\n| FR-08 | 첨부파일에는 파일명, 크기, 등록자, 등록일 정보가 표시된다. | Must |\n| FR-09 | 삭제 또는 변경 이력의 보존 범위와 화면 표시는 설계 단계에서 정의한다. | Should |\n| FR-10 | 히스토리가 긴 업무에서도 최신/전체 활동을 쉽게 탐색할 수 있다. | Should |\n\n## 5. Non-Functional Requirements\n\n| Category | Requirement |\n|----------|-------------|\n| Usability | 목록과 상세 화면은 넓은 여백 대신 정보 중심의 컴팩트 레이아웃을 사용하고 주요 동작은 화면 이동을 최소화한다. |\n| Traceability | 추적 대상 이벤트는 작성자, 발생 시각, 대상 업무, 동작 유형을 보존한다. |\n| Security | 첨부 다운로드와 업무 열람은 사용자 권한 범위 안에서만 허용하고, 파일 업로드의 허용 형식/용량/악성 파일 대응 방침을 설계한다. |\n| Performance | 일반 업무 상세의 본문과 초기 히스토리 목록은 사용자가 기다림을 체감하지 않는 수준을 목표로 하며, 긴 스레드는 페이지네이션 또는 점진 로딩을 고려한다. |\n| Reliability | 첨부 업로드 실패와 댓글 저장 실패 시 사용자가 재시도할 수 있고 실패 상태를 분명히 표시한다. |\n| Maintainability | 업무, 댓글, 첨부, 히스토리를 명확한 데이터 단위로 분리하여 이후 알림 또는 통계 기능 추가가 가능해야 한다. |\n\n## 6. Initial Screen Concept\n\n### 6.1 Core Pages\n\n| Page | Purpose | Key Content |\n|------|---------|-------------|\n| 업무 목록 | 찾을 업무를 빠르게 좁히기 | 프로젝트/부서/담당자/상태 필터, 검색, 조밀한 테이블 또는 리스트 |\n| 업무 상세 및 히스토리 | 업무 맥락과 진행 이력을 한 곳에서 추적 | 업무 요약, 첨부 영역, 활동 타임라인, 댓글/대댓글 작성 |\n| 업무 등록/편집 | 업무 분류와 책임 정보 관리 | 제목, 내용, 프로젝트, 부서, 담당자, 상태, 우선순위, 첨부 |\n\n### 6.2 Compact Layout Direction\n\n- 데스크톱 상세 화면은 좌측 또는 상단에 업무 요약/첨부 정보를 압축 배치하고, 중심 영역에 시간 순 히스토리와 댓글 스레드를 우선 표시한다.\n- 목록은 카드보다 조밀한 행 기반 표시를 우선 검토하여 한 화면에서 많은 업무를 비교할 수 있게 한다.\n- 댓글 입력과 파일 추가 동작은 상세 페이지 안에서 제공하여 불필요한 페이지 전환을 줄인다.\n- 긴 내용은 접기/펼치기 및 필터(전체, 변경, 댓글, 파일)를 통해 탐색성을 유지한다.\n\n## 7. Success Criteria\n\n- [ ] 프로젝트 및 부서를 지정한 업무를 생성하고 목록에서 해당 기준으로 찾을 수 있다.\n- [ ] 하나의 업무 상세 화면에서 업무 내용, 상태 변경 이력, 댓글, 대댓글, 첨부파일 기록을 시간 순으로 확인할 수 있다.\n- [ ] 댓글 작성과 대댓글 작성 후 작성자 및 작성 시간이 히스토리에 반영된다.\n- [ ] 허용된 파일을 첨부하고 권한이 있는 사용자가 다운로드할 수 있다.\n- [ ] 누가 언제 업무 정보를 변경했는지 핵심 변경 이벤트를 조회할 수 있다.\n- [ ] 정보 밀도 높은 화면에서도 필터, 스레드 계층, 첨부 동작을 혼동 없이 사용할 수 있는지 검토한다.\n- [ ] 설계 문서에서 데이터 모델, 권한 모델, 파일 저장/제한 정책, 히스토리 보존 정책, API 또는 데이터 접근 방식을 확정한다.\n\n## 8. Risks & Mitigations\n\n| Risk | Impact | Probability | Mitigation |\n|------|--------|-------------|------------|\n| 댓글, 변경 이력, 첨부 이벤트가 섞여 히스토리가 읽기 어려워짐 | High | Medium | 이벤트 유형별 시각 구분과 필터, 스레드 접기/펼치기를 설계한다. |\n| 첨부파일로 인한 보안 또는 저장 용량 문제 | High | Medium | 접근 권한, 크기/확장자 제한, 스캔/저장 정책을 설계 단계에서 확정한다. |\n| 부서별 접근 범위가 불명확하여 정보 노출 발생 | High | Medium | 역할과 부서 소속에 따른 열람/편집 권한 매트릭스를 먼저 정의한다. |\n| 과도하게 조밀한 레이아웃으로 사용성이 저하됨 | Medium | Medium | 핵심 업무 흐름을 기준으로 최소 여백과 가독성의 균형을 목업에서 검증한다. |\n| 긴 히스토리 및 대용량 첨부로 상세 화면 성능 저하 | Medium | Medium | 히스토리 점진 로딩, 첨부 메타데이터 분리, 인덱스/조회 전략을 설계한다. |\n\n## 9. Architecture Considerations\n\n- 핵심 데이터 후보는 `Department`, `Project`, `WorkItem`, `Comment`, `Attachment`, `ActivityEvent`, `User`이다.\n- `Comment`는 부모 댓글 참조를 통해 대댓글 구조를 표현하고, `ActivityEvent`는 상태 변경 및 작성 행위를 일관되게 기록하는 방식을 검토한다.\n- 첨부파일 원본 저장소와 첨부 메타데이터 저장 위치, 다운로드 권한 검증 경계를 설계 단계에서 결정한다.\n- 초기 구현 기술 스택, 로그인 방식, 데이터베이스 및 배포 방식은 현재 프로젝트에 기존 구현이 없으므로 설계 전에 선택한다.\n\n## 10. Open Decisions For Design\n\n| Decision | Question |\n|----------|----------|\n| Authentication | 사용자는 어떻게 로그인하며 사내 사용자/부서 정보는 어디에서 관리할 것인가? |\n| Authorization | 부서 간 공개 범위와 관리자/작성자/담당자별 편집 권한은 어떻게 구분할 것인가? |\n| Thread Depth | 대댓글을 1단계로 제한할지, 다단계 스레드를 허용할지 결정한다. |\n| Audit Policy | 수정 전후 값, 삭제된 댓글/첨부의 보존 및 표시 정책을 결정한다. |\n| File Policy | 최대 용량, 허용 파일 형식, 스토리지, 다운로드/삭제 및 보안 검증 정책을 정한다. |\n| Deployment | 내부 전용 서비스 여부와 배포/백업/접속 환경을 결정한다. |\n\n## 11. Schedule\n\n| Phase | Target Date | Status |\n|-------|-------------|--------|\n| Plan | 2026-05-26 | Completed |\n| Design | TBD | Pending |\n| Implementation | TBD | Pending |\n| Check / Gap Analysis | TBD | Pending |\n| Report | TBD | Pending |\n\n## 12. References\n\n- User request received on 2026-05-26: project/department work tracking, one-page history with comments and replies, file attachments, compact layout.\n- Follow-up design document: `docs/02-design/features/work-history-tracker.design.md` (to be created).\n"

          "content": "# work-history-tracker - Design Document\n\n> Version: 1.0.0 | Date: 2026-05-26 | Status: Completed\n> Level: Starter | Plan: `docs/01-plan/features/work-history-tracker.plan.md`\n\n---\n\n## 1. Overview\n\n### 1.1 Purpose\n\n프로젝트 및 부서별 업무를 등록하고, 업무 상세 한 페이지에서 본문, 담당 정보, 상태 변경, 댓글/대댓글, 파일 첨부 내역을 시간 순으로 추적하는 내부 업무 기록 시스템을 설계한다.\n\n### 1.2 Design Goals\n\n- `WorkItem`을 중심으로 모든 논의 및 변경 기록을 연결한다.\n- 읽기와 탐색이 핵심인 화면이므로 밀도 높은 테이블/타임라인 UI를 우선한다.\n- 댓글, 첨부, 주요 필드 변경은 감사 가능한 활동 이벤트로 보존한다.\n- 부서 범위 접근 제어 및 비공개 파일 다운로드 검증을 서버 경계에서 수행한다.\n- 신규 프로젝트에 적합하도록 단일 애플리케이션 구조로 시작하고 이후 확장이 가능한 데이터 모델을 둔다.\n\n## 2. Technical Architecture\n\n### 2.1 Recommended Stack\n\n| Area | Selection | Reason |\n|------|-----------|--------|\n| Web application | Next.js App Router + TypeScript | 페이지와 서버 API를 단일 코드베이스에서 구현 가능 |\n| UI styling | Tailwind CSS | 조밀한 레이아웃과 상태 표시를 빠르게 구성 |\n| Persistence | PostgreSQL | 관계형 필터, 댓글 관계, 활동 이력 조회 및 인덱싱에 적합 |\n| ORM / migration | Prisma | 명시적 스키마와 마이그레이션 관리 |\n| Authentication | 서버 세션 기반 이메일 로그인 | 내부 서비스 MVP에 필요한 사용자/권한 확인 경계 제공 |\n| File storage | Private S3-compatible object storage | 원본 파일을 공개 URL로 노출하지 않고 다운로드 권한 검증 가능 |\n| Validation | Zod request schema validation | 폼/API 입력값을 동일하게 검증 |\n\n초기 구현은 위 스택을 기준으로 한다. 개발 환경에서는 S3 호환 로컬 저장소 또는 제한된 파일 저장 어댑터를 사용할 수 있지만, 첨부 메타데이터와 권한 검증 API 계약은 동일하게 유지한다.\n\n### 2.2 System Boundary\n\n```text\nBrowser\n  -> Next.js pages and server actions / route handlers\n       -> Authentication and authorization policy\n       -> Work item, comment, activity services\n       -> Attachment service\n            -> PostgreSQL metadata\n            -> Private object storage binary files\n       -> PostgreSQL domain records and audit events\n```\n\n### 2.3 Module Responsibilities\n\n| Module | Responsibility |\n|--------|----------------|\n| `auth` | 로그인 세션, 현재 사용자, 역할 및 부서 소속 확인 |\n| `departments` | 부서 조회 및 관리 권한 판단 |\n| `projects` | 프로젝트 등록, 부서 연결, 필터 옵션 제공 |\n| `work-items` | 업무 CRUD, 상태/담당자/우선순위 변경 |\n| `comments` | 댓글 및 대댓글 작성/수정/소프트 삭제 |\n| `attachments` | 업로드 메타데이터, 저장, 다운로드 권한 검증 |\n| `activities` | 변경 및 행위 이벤트 작성, 시간 순 조회 |\n\n## 3. Authorization And Audit Policy\n\n### 3.1 User Roles\n\n| Role | View Work | Create Work | Update Work | Comment | Manage Attachments | Manage Department |\n|------|-----------|-------------|-------------|---------|--------------------|-------------------|\n| `MEMBER` | 소속/공개 부서 | 소속 부서 | 본인 작성 또는 담당 업무 | 열람 가능 업무 | 본인 업로드 삭제 | No |\n| `MANAGER` | 관리 부서 | 관리 부서 | 관리 부서 전체 | 열람 가능 업무 | 관리 부서 전체 | 프로젝트/업무 범위 관리 |\n| `ADMIN` | 전체 | 전체 | 전체 | 전체 | 전체 | 전체 |\n\n### 3.2 Visibility\n\n- `Department.visibility`는 초기 버전에서 `PRIVATE` 또는 `ORGANIZATION` 값을 가진다.\n- `PRIVATE` 부서의 업무는 소속 구성원, 해당 부서 관리자, 관리자 계정만 열람한다.\n- `ORGANIZATION` 부서의 업무는 로그인 사용자가 열람할 수 있으나 수정은 역할 규칙을 적용한다.\n- 모든 조회, 댓글 작성 및 파일 다운로드 API는 서버에서 `canViewWorkItem` 검사를 수행한다.\n\n### 3.3 Comment And Deletion Policy\n\n- 댓글은 1단계 대댓글까지만 지원한다. 대댓글에 대한 추가 답글은 같은 부모 댓글 아래 대댓글로 저장한다.\n- 작성자는 자신의 댓글 내용을 수정할 수 있으며, 수정 후 `editedAt`을 노출한다.\n- 댓글 삭제는 소프트 삭제로 처리하여 스레드 위치와 이력은 유지하고 본문 대신 `삭제된 댓글입니다`를 표시한다.\n- 첨부 삭제는 원본 접근을 차단하고 메타데이터 및 삭제 이벤트는 보존한다.\n\n### 3.4 Audit Events\n\n다음 동작은 `ActivityEvent`로 기록하며 삭제하지 않는다.\n\n| Event Type | Trigger | Snapshot Detail |\n|------------|---------|-----------------|\n| `WORK_CREATED` | 업무 생성 | 제목, 부서, 프로젝트, 담당자, 상태 |\n| `WORK_UPDATED` | 제목/내용/우선순위/담당자 변경 | 변경 필드별 이전값/새값 |\n| `STATUS_CHANGED` | 상태 변경 | 이전 상태, 새 상태 |\n| `COMMENT_CREATED` | 댓글/대댓글 작성 | 댓글 ID, 부모 댓글 ID |\n| `COMMENT_EDITED` | 댓글 수정 | 댓글 ID, 수정 시각 |\n| `COMMENT_DELETED` | 댓글 삭제 | 댓글 ID, 삭제 시각 |\n| `ATTACHMENT_ADDED` | 파일 첨부 완료 | 첨부 ID, 파일명, 크기 |\n| `ATTACHMENT_REMOVED` | 파일 삭제 | 첨부 ID, 파일명 |\n\n## 4. Data Model\n\n### 4.1 Entity Relationship\n\n```text\nUser --\u003c DepartmentMember >-- Department --\u003c Project\n                                  |\n                                  +--\u003c WorkItem >-- User (assignee/creator)\n                                           |\n                                           +--\u003c Comment --\u003c Comment (reply)\n                                           +--\u003c Attachment\n                                           +--\u003c ActivityEvent\n```\n\n### 4.2 Entities\n\n#### `User`\n\n| Field | Type | Notes |\n|-------|------|-------|\n| `id` | UUID | PK |\n| `email` | varchar unique | 로그인 식별자 |\n| `name` | varchar | 표시 이름 |\n| `passwordHash` | varchar | 서버 저장 해시 |\n| `role` | enum | `MEMBER`, `MANAGER`, `ADMIN` |\n| `createdAt`, `updatedAt` | timestamp | 생성/변경 시각 |\n\n#### `Department` And `DepartmentMember`\n\n| Entity | Key Fields |\n|--------|------------|\n| `Department` | `id`, `name`, `visibility`, `createdAt`, `updatedAt` |\n| `DepartmentMember` | `departmentId`, `userId`, `isManager`, `joinedAt` |\n\n`DepartmentMember`는 `(departmentId, userId)` 조합을 유일 키로 둔다.\n\n#### `Project`\n\n| Field | Type | Notes |\n|-------|------|-------|\n| `id` | UUID | PK |\n| `departmentId` | UUID | FK to `Department` |\n| `name` | varchar | 프로젝트명 |\n| `description` | text nullable | 설명 |\n| `status` | enum | `ACTIVE`, `ARCHIVED` |\n| `createdById` | UUID | 생성자 |\n| `createdAt`, `updatedAt` | timestamp | 시각 |\n\n#### `WorkItem`\n\n| Field | Type | Notes |\n|-------|------|-------|\n| `id` | UUID | PK |\n| `departmentId` | UUID | 권한 범위 및 빠른 필터를 위한 FK |\n| `projectId` | UUID nullable | 프로젝트 없는 부서 업무 허용 |\n| `title` | varchar(200) | 필수 |\n| `description` | text | 업무 본문 |\n| `status` | enum | `OPEN`, `IN_PROGRESS`, `BLOCKED`, `DONE`, `ARCHIVED` |\n| `priority` | enum | `LOW`, `MEDIUM`, `HIGH`, `URGENT` |\n| `assigneeId` | UUID nullable | 담당자 |\n| `createdById` | UUID | 작성자 |\n| `createdAt`, `updatedAt` | timestamp | 시각 |\n\n#### `Comment`\n\n| Field | Type | Notes |\n|-------|------|-------|\n| `id` | UUID | PK |\n| `workItemId` | UUID | FK |\n| `parentId` | UUID nullable | null이면 최상위 댓글, 값이 있으면 대댓글 |\n| `authorId` | UUID | 작성자 |\n| `body` | text | 삭제 전 댓글 내용 |\n| `createdAt` | timestamp | 작성 시각 |\n| `editedAt` | timestamp nullable | 수정 표시 |\n| `deletedAt` | timestamp nullable | 소프트 삭제 |\n\n서버 검증은 `parentId`가 가리키는 댓글의 `parentId`가 null인지 확인하여 최대 깊이를 1로 제한한다.\n\n#### `Attachment`\n\n| Field | Type | Notes |\n|-------|------|-------|\n| `id` | UUID | PK |\n| `workItemId` | UUID | FK |\n| `commentId` | UUID nullable | 특정 논의와 연결 시 사용 |\n| `uploadedById` | UUID | 업로더 |\n| `originalName` | varchar | 화면 표시 파일명 |\n| `storageKey` | varchar unique | 비공개 저장소 경로 |\n| `contentType` | varchar | MIME type |\n| `sizeBytes` | bigint | 제한 검증 및 표시 |\n| `sha256` | varchar nullable | 무결성/중복 분석용 |\n| `createdAt` | timestamp | 첨부 시각 |\n| `deletedAt` | timestamp nullable | 삭제/접근 차단 |\n\n#### `ActivityEvent`\n\n| Field | Type | Notes |\n|-------|------|-------|\n| `id` | UUID | PK |\n| `workItemId` | UUID | FK |\n| `actorId` | UUID | 수행자 |\n| `type` | enum | 감사 이벤트 유형 |\n| `entityId` | UUID nullable | 댓글/첨부 등 이벤트 대상 |\n| `payload` | jsonb | 표시 가능한 변경 요약 또는 이전/새 값 |\n| `occurredAt` | timestamp | 이벤트 발생 시각 |\n\n### 4.3 Indexes\n\n| Entity | Index | Purpose |\n|--------|-------|---------|\n| `WorkItem` | `(departmentId, updatedAt desc)` | 부서별 최신 업무 목록 |\n| `WorkItem` | `(projectId, status, updatedAt desc)` | 프로젝트/상태 필터 |\n| `WorkItem` | `(assigneeId, status)` | 담당자별 조회 |\n| `Comment` | `(workItemId, createdAt)` | 댓글 스레드 조회 |\n| `ActivityEvent` | `(workItemId, occurredAt desc)` | 타임라인 점진 로딩 |\n| `Attachment` | `(workItemId, createdAt desc)` | 첨부 목록 |\n\n## 5. File Attachment Design\n\n### 5.1 Initial Policy\n\n| Item | Rule |\n|------|------|\n| Max file size | 파일 1개당 20 MB |\n| Allowed types | PDF, office 문서, 이미지(PNG/JPEG/WebP), TXT, CSV, ZIP |\n| Object access | 비공개 저장, 직접 공개 URL 제공 금지 |\n| File count | 업무당 30개까지, 댓글당 5개까지 |\n| Malware control | 운영 배포 전 업로드 스캔 또는 검역 처리 연결 지점 확보 |\n| Delete | 소프트 삭제 후 다운로드 차단, 운영 보존기간 만료 후 binary purge 가능 |\n\n### 5.2 Upload Flow\n\n1. 사용자가 업무 또는 댓글 작성 UI에서 파일을 선택한다.\n2. 서버는 로그인, 업무 열람/작성 권한, 파일 크기와 MIME/확장자를 검증한다.\n3. 서버가 비공개 저장소에 난수 `storageKey`로 파일을 저장한다.\n4. 저장 성공 트랜잭션에서 `Attachment`와 `ATTACHMENT_ADDED` 이벤트를 작성한다.\n5. 실패 시 메타데이터를 생성하지 않거나 정리 작업 대상으로 표시하고 UI에 재시도를 제공한다.\n\n### 5.3 Download Flow\n\n1. `GET /api/attachments/{id}/download` 요청을 보낸다.\n2. 서버가 첨부와 연결 업무를 조회하고 `canViewWorkItem` 및 `deletedAt`을 검사한다.\n3. 통과 시 짧은 만료시간의 서명 URL 또는 서버 스트리밍 응답을 반환한다.\n4. 권한 없음 또는 삭제 파일은 파일 존재 여부를 과도하게 노출하지 않도록 `404`를 반환한다.\n\n## 6. API Design\n\n### 6.1 Common Rules\n\n- 모든 API는 로그인 세션이 필요하다. 인증 실패는 `401`, 권한 없음은 `403` 또는 첨부 조회의 경우 `404`를 반환한다.\n- 요청 본문은 Zod 스키마로 검증하고 오류는 필드 단위 메시지를 포함한 `400`으로 반환한다.\n- 변경 API는 업무 변경과 `ActivityEvent` 생성을 동일한 데이터베이스 트랜잭션에서 수행한다.\n- 목록 조회는 기본 `limit=30`, 히스토리는 cursor 기반 `limit=30`으로 제공한다.\n\n### 6.2 Endpoints\n\n| Method | Endpoint | Purpose | Authorization |\n|--------|----------|---------|---------------|\n| `GET` | `/api/departments` | 접근 가능한 부서 목록 | Login |\n| `GET` | `/api/projects?departmentId=` | 접근 가능한 프로젝트 목록 | View department |\n| `POST` | `/api/projects` | 프로젝트 생성 | Manager/Admin |\n| `GET` | `/api/work-items` | 필터/검색된 업무 목록 | Visible scope |\n| `POST` | `/api/work-items` | 업무 생성 | Member in department+ |\n| `GET` | `/api/work-items/{id}` | 업무 상세 요약 | View work |\n| `PATCH` | `/api/work-items/{id}` | 업무 필드 및 상태 변경 | Update work |\n| `GET` | `/api/work-items/{id}/activity` | 히스토리 페이지 조회 | View work |\n| `GET` | `/api/work-items/{id}/comments` | 댓글 스레드 조회 | View work |\n| `POST` | `/api/work-items/{id}/comments` | 댓글 또는 대댓글 작성 | Comment permission |\n| `PATCH` | `/api/comments/{id}` | 댓글 수정 | Author/Admin |\n| `DELETE` | `/api/comments/{id}` | 댓글 소프트 삭제 | Author/Manager/Admin |\n| `POST` | `/api/work-items/{id}/attachments` | 업무 첨부 업로드 | Update/comment permission |\n| `POST` | `/api/comments/{id}/attachments` | 댓글 첨부 업로드 | Comment author |\n| `GET` | `/api/attachments/{id}/download` | 검증 후 다운로드 | View work |\n| `DELETE` | `/api/attachments/{id}` | 첨부 소프트 삭제 | Uploader/Manager/Admin |\n\n### 6.3 Key Payloads\n\n#### Create Work Item\n\n```json\n{\n  \"departmentId\": \"uuid\",\n  \"projectId\": \"uuid-or-null\",\n  \"title\": \"분기 보고서 초안 검토\",\n  \"description\": \"검토 의견을 댓글로 남겨주세요.\",\n  \"assigneeId\": \"uuid-or-null\",\n  \"status\": \"OPEN\",\n  \"priority\": \"HIGH\"\n}\n```\n\n#### Create Comment Or Reply\n\n```json\n{\n  \"body\": \"수정본을 첨부했습니다.\",\n  \"parentId\": \"uuid-or-null\"\n}\n```\n\n#### Activity Response Item\n\n```json\n{\n  \"id\": \"uuid\",\n  \"type\": \"STATUS_CHANGED\",\n  \"actor\": { \"id\": \"uuid\", \"name\": \"홍길동\" },\n  \"payload\": { \"from\": \"OPEN\", \"to\": \"IN_PROGRESS\" },\n  \"occurredAt\": \"2026-05-26T02:00:00Z\"\n}\n```\n\n## 7. Page And Interaction Design\n\n### 7.1 Routes\n\n| Route | View |\n|-------|------|\n| `/login` | 사용자 로그인 |\n| `/work-items` | 업무 목록 및 필터 |\n| `/work-items/new` | 업무 등록 |\n| `/work-items/[id]` | 업무 상세, 히스토리, 댓글, 첨부 |\n\n### 7.2 Work List Layout\n\n```text\n+-----------------------------------------------------------------------+\n| Header: System Name | Department Selector | User                     |\n+-----------------------------------------------------------------------+\n| Search | Project | Department | Status | Assignee | + New Work        |\n+-----------------------------------------------------------------------+\n| Status | Priority | Work Title      | Project | Assignee | Updated   |\n| ... dense table rows, sortable and clickable ...                     |\n+-----------------------------------------------------------------------+\n```\n\n- 데스크톱 화면 기준 바깥 여백 `12-16px`, 행 높이 `40-44px`를 목표로 한다.\n- 필터 상태는 URL query string에 유지하여 재방문 및 공유 가능한 목록 상태를 제공한다.\n- 제목, 상태, 담당자, 최근 변경 시각은 접기 없이 즉시 보여준다.\n\n### 7.3 Single Work History Page\n\n```text\n+-----------------------------------------------------------------------+\n| Breadcrumb / Title / Status / Priority / Edit                         |\n+----------------------+------------------------------------------------+\n| Summary panel        | Activity filters: All / Changes / Comments / File|\n| - project/department |------------------------------------------------|\n| - assignee/status    | Timeline                                       |\n| - description        |  [change] status changed                       |\n| - attachments        |  [comment] root comment                        |\n|                      |     reply                                     |\n|                      |  [file] attached document                     |\n|                      |------------------------------------------------|\n|                      | Comment editor + attach + submit               |\n+----------------------+------------------------------------------------+\n```\n\n- 화면 폭 `>= 1024px`에서는 좌측 요약 영역을 `300-340px` 고정 폭으로 유지하고 우측 타임라인이 남는 폭을 사용한다.\n- 타임라인은 이벤트 유형 필터와 최신순/과거순 전환을 제공한다. 기본은 최신 이벤트가 쉽게 보이는 최신순이다.\n- 댓글 이벤트는 스레드 내용을 표시하고 대댓글 작성 버튼을 해당 댓글 내부에 둔다.\n- 요약 패널의 첨부 목록은 파일명, 크기, 업로더, 시각을 조밀하게 표시한다.\n- 모바일 또는 좁은 화면에서는 요약을 상단 접이식 영역으로 전환하고 타임라인을 아래에 단일 열로 배치한다.\n\n### 7.4 Components\n\n| Component | Responsibility |\n|-----------|----------------|\n| `AppHeader` | 사용자 및 부서 컨텍스트 |\n| `WorkFilterBar` | 검색/프로젝트/부서/상태/담당자 필터 |\n| `WorkTable` | 조밀한 업무 행 목록 |\n| `WorkSummaryPanel` | 상세 정보 및 첨부 목록 |\n| `StatusBadge`, `PriorityBadge` | 빠른 상태 시각 구분 |\n| `ActivityTimeline` | 이벤트 페이지네이션과 필터 표시 |\n| `ActivityItem` | 이벤트 유형별 표현 |\n| `CommentThread`, `CommentEditor` | 댓글/대댓글 표시 및 작성 |\n| `AttachmentList`, `AttachmentUploader` | 업로드 및 다운로드 동작 |\n| `PermissionGuard` | 비허용 UI 동작 숨김/비활성화 |\n\n## 8. Validation And Error Handling\n\n| Scenario | Validation / UI Behavior |\n|----------|--------------------------|\n| 업무 제목 누락 또는 200자 초과 | 저장 전 필드 오류 표시 |\n| 권한 없는 부서 업무 생성 | API 거부 후 접근 불가 알림 |\n| 2단계 이상 답글 요청 | `400` 및 최상위 댓글 아래 작성 안내 |\n| 허용하지 않은 첨부 형식 또는 20 MB 초과 | 업로드 전/서버 양쪽 차단 |\n| 업로드 중 실패 | 실패 파일 표시와 재시도 버튼 |\n| 과거에 삭제된 댓글 | 스레드 위치를 유지한 삭제 문구 표시 |\n| 타임라인 조회 실패 | 기존 화면 유지, 다시 불러오기 동작 제공 |\n\n## 9. Test Plan\n\n### 9.1 Functional Tests\n\n| ID | Test | Expected Result |\n|----|------|-----------------|\n| T-01 | 부서와 프로젝트가 지정된 업무 생성 | 목록/상세에 업무 노출 및 `WORK_CREATED` 기록 |\n| T-02 | 상태와 담당자 변경 | 변경된 값 및 별도 활동 이벤트 표시 |\n| T-03 | 댓글과 대댓글 작성 | 1단계 계층과 작성자/시각 표시, 이벤트 기록 |\n| T-04 | 대댓글에 추가 깊이 답글 요청 | 서버 검증으로 거부 |\n| T-05 | 허용 파일 업로드/다운로드 | 첨부 메타정보와 이벤트 표시, 파일 다운로드 성공 |\n| T-06 | 삭제된 댓글 및 첨부 조회 | 삭제 표시 유지, 첨부 다운로드 차단 |\n| T-07 | 프로젝트/부서/상태/담당자 필터 | 일치 업무만 조밀한 목록에 노출 |\n| T-08 | 긴 히스토리 조회 | cursor로 추가 이력 로드 및 중복 없음 |\n\n### 9.2 Security Tests\n\n| ID | Test | Expected Result |\n|----|------|-----------------|\n| S-01 | 비소속 사용자가 `PRIVATE` 부서 업무 조회 | 접근 거부 |\n| S-02 | 비소속 사용자가 첨부 다운로드 URL 직접 호출 | 파일 노출 없이 실패 |\n| S-03 | 일반 사용자가 타인의 댓글 수정/삭제 | 접근 거부 |\n| S-04 | 확장자 위장 또는 크기 제한 초과 업로드 | 저장 전 거부 및 감사 가능한 오류 로그 |\n\n### 9.3 UI Review Checks\n\n- 1280px 화면에서 업무 상세의 핵심 내용, 타임라인, 댓글 입력이 과도한 빈 여백 없이 보인다.\n- 긴 파일명, 긴 댓글, 여러 대댓글이 있을 때 레이아웃이 깨지지 않는다.\n- 키보드 포커스, 라벨, 상태 색상 외 텍스트 표기가 기본 접근성을 충족한다.\n\n## 10. Implementation Order\n\n1. Next.js/TypeScript 프로젝트 초기화, 환경 설정, 공통 레이아웃을 구성한다.\n2. Prisma 스키마와 PostgreSQL 마이그레이션으로 사용자, 부서, 프로젝트, 업무, 댓글, 첨부, 활동 이벤트를 생성한다.\n3. 세션 인증과 부서/역할 기반 접근 제어 서비스를 구현한다.\n4. 업무 목록/등록/상세 API 및 활동 이벤트 트랜잭션을 구현한다.\n5. 댓글/대댓글 API와 소프트 삭제 정책을 구현한다.\n6. 비공개 첨부 업로드/다운로드 API와 검증 정책을 구현한다.\n7. 컴팩트 업무 목록 화면과 상세 요약/타임라인 화면을 연결한다.\n8. 댓글 작성, 첨부, 필터, 점진 로딩 상호작용을 완성한다.\n9. 기능/권한/첨부/레이아웃 검증을 수행하고 분석 단계에서 설계 일치율을 확인한다.\n\n## 11. Requirement Traceability\n\n| Plan Requirement | Design Coverage |\n|------------------|-----------------|\n| FR-01, FR-02 | `Department`, `Project`, `WorkItem`, 목록 API 및 필터 UI |\n| FR-03, FR-06, FR-10 | `ActivityEvent`, 상세 단일 페이지, cursor 기반 타임라인 |\n| FR-04, FR-05 | `Comment.parentId`, 1단계 스레드, 댓글 API/컴포넌트 |\n| FR-07, FR-08 | `Attachment`, private storage, 업/다운로드 API 및 첨부 목록 |\n| FR-09 | 소프트 삭제, 불변 감사 이벤트, 이전/새 값 payload 정책 |\n| Access/security NFR | 역할 매트릭스, 서버 권한 검사, private file download |\n| Compact UI direction | 밀도 높은 테이블 및 2열 상세 페이지 레이아웃 |\n\n## 12. Deferred Enhancements\n\n- 실시간 업데이트 알림과 멘션\n- 전체 텍스트 검색 또는 파일 본문 검색\n- 활동 요약 리포트, 간트/칸반 보기\n- 바이러스 스캔 결과 UI 및 첨부 검역 관리 화면\n- 사내 SSO 또는 조직 시스템 연동\n"

          "content": "# work-history-tracker - Implementation Record\n\n> Date: 2026-05-26 | Phase: Do | Design: `work-history-tracker.design.md`\n\n## Implementation Decision\n\n프로젝트가 문서만 존재하는 빈 Starter 작업공간이고 Node.js 24가 제공되므로, 설치 의존성이 필요한 Next.js/PostgreSQL 배포 구성 대신 즉시 실행 및 검증 가능한 MVP를 Node.js 기본 HTTP 서버와 내장 SQLite로 구현한다. 도메인 모델, 권한 경계, 감사 이력, 비공개 첨부파일 정책 및 조밀한 화면 구성은 설계와 동일하게 유지한다.\n\n## Implemented Items\n\n| Area | Implementation |\n|------|----------------|\n| Runtime | `src/server.js`: 정적 화면 제공 및 JSON API 서버 |\n| Persistence | SQLite: 사용자, 부서, 프로젝트, 업무, 댓글, 첨부, 활동 이벤트, 세션 테이블 및 인덱스 |\n| Authentication | 데모 사용자 이메일/비밀번호 로그인, HttpOnly/SameSite 세션 쿠키 |\n| Authorization | 비공개 부서 조회, 업무 수정, 댓글 및 첨부 다운로드/삭제 권한 검사 |\n| Timeline | 업무 생성/변경, 상태, 댓글, 첨부 활동 이벤트 저장 및 조회 |\n| Files | `uploads/` 비공개 저장, 크기/확장자 검증, 권한 확인 다운로드 |\n| UI | `public/`: 컴팩트 목록, 업무 상세, 활동 필터, 댓글/대댓글, 첨부 화면 |\n| Validation | 서버 입력 검사, 댓글 최대 1단계 깊이, 소프트 삭제 기반 코드 경로 |\n| Verification | `test/server.test.js`: 주요 workflow 및 private attachment 접근 검사 |\n\n## Runtime Notes\n\n- 실행: `npm start`, 접속 주소 기본값 `http://localhost:3000`\n- 검증: `npm run check`\n- 데모 계정: `admin@demo.local`, `manager@demo.local`, `member@demo.local`, 비밀번호 `demo1234`\n- 비소속 권한 검증 계정: `outside@demo.local`, 비밀번호 `demo1234`\n- 데이터베이스와 업로드 원본은 각각 `data/`, `uploads/`에 저장되며 소스 관리에서 제외된다.\n\n## Deferred Production Work\n\n- PostgreSQL/Prisma와 S3 호환 저장소 어댑터로 이전\n- 운영 로그인 또는 사내 SSO 연결, 초기 데모 계정 제거\n- 파일 악성코드 검역 연동 및 CSRF 보호 강화\n- 댓글 수정/삭제 및 첨부 삭제를 노출하는 UI 제어\n- 타임라인 추가 페이지 로드 UI 및 댓글별 파일 첨부 API\n"

          "content": "# Implementation Conventions\n\n- Runtime: Node.js 24 built-in modules and browser-native JavaScript; keep the MVP free of installation dependencies.\n- Naming: files use kebab-case, functions and variables use camelCase, constants use `UPPER_SNAKE_CASE`.\n- Data: SQLite records are the source of truth; uploaded binaries remain outside the public asset directory.\n- API: JSON APIs validate inputs server-side and enforce authorization before returning work or attachment data.\n- Audit: mutations that affect work history write an `activity_events` record in the same transaction as domain changes.\n- UI: compact desktop-first layout, semantic controls, escaped user content, and responsive single-column fallback.\n- Verification: run `npm run check` after source changes.\n"

          "content": "# 현업연동 커뮤니케이션 업무툴 구현 프롬프트\n\n## 목적\n\n현업 운영자가 업무를 빠르게 생성, 검색, 비교, 상세 확인, 댓글 기록, 첨부/히스토리 추적할 수 있는 BO 관리자형 업무 협업툴을 만든다.\n\n사용자용 랜딩페이지가 아니라 실무자가 매일 쓰는 고밀도 업무 화면이어야 한다.\n\n## 참고 기준\n\n- 디자인 기준은 반드시 `../design_system_major`의 BO 관리자 디자인 문서만 따른다.\n  - `docs/재사용_디자인_프롬프트/관리자/02_BO_테이블레이아웃_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/04_BO_관리자용_레이아웃_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/components/인라인_Drawer_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/components/테이블선택_Drawer_상세패널_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/components/상태_유형_칩_기준.md`\n- 현재 폴더의 `index2.html`, `index.html`, `../notations_tools/public/index.html`은 데이터 항목, 화면 흐름, 기능 동작만 참고한다.\n- 샘플 HTML의 색상, 테두리, 여백, 카드 스타일, 이모지 중심 UI, 임의 클래스 구조는 디자인 기준으로 사용하지 않는다.\n\n## 실행 프롬프트\n\n```text\n너는 BO 관리자형 업무 협업툴을 설계하고 구현하는 시니어 프론트엔드 엔지니어다.\n\n현재 폴더에 `현업연동_커뮤니케이션_업무툴`을 만든다. 기존 테스트 서비스와 디자인시스템을 조합해서, 현업 업무 생성, 목록 조회, 상세 커뮤니케이션, 첨부/히스토리 추적이 가능한 단일 HTML 기반 프로토타입을 구현한다.\n\n참고 기준:\n- 디자인 기준은 반드시 `../design_system_major`의 BO 관리자 디자인 문서만 따른다.\n  - `docs/재사용_디자인_프롬프트/관리자/02_BO_테이블레이아웃_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/04_BO_관리자용_레이아웃_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/components/인라인_Drawer_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/components/테이블선택_Drawer_상세패널_기준.md`\n  - `docs/재사용_디자인_프롬프트/관리자/components/상태_유형_칩_기준.md`\n- 현재 폴더의 `index2.html`, `index.html`, `../notations_tools/public/index.html`은 데이터 항목, 화면 흐름, 기능 동작만 참고한다.\n- 샘플 HTML의 색상, 테두리, 여백, 카드 스타일, 이모지 중심 UI, 임의 클래스 구조는 디자인 기준으로 사용하지 않는다.\n\n목표 화면:\n- 사용자용 랜딩페이지가 아니라, 현업 운영자가 업무를 빠르게 검색, 비교, 생성, 상세 확인, 댓글 기록할 수 있는 BO 업무툴이다.\n- 전체 레이아웃은 Sidebar + Topbar + Page Head + Dense Filter + Summary Strip + 업무 테이블 + 우측 Inline Detail Drawer 구조로 만든다.\n- 목록과 상세가 동시에 보이는 2-pane 또는 3-pane 구조를 유지한다.\n- 업무 상세는 모달이 아니라 우측 inline drawer/pane로 열리게 한다.\n\n핵심 기능:\n1. 업무 목록\n   - `index2.html`의 마스터 그리드 느낌을 유지한다.\n   - 컬럼은 다음 정보를 포함한다.\n     - 선택\n     - 업무번호\n     - 시작일\n     - 생성인\n     - 대/중/소 계층 분류\n     - 대표 업무 제목\n     - 중요/특이사항\n     - 세부내용 요약\n     - main 마감일\n     - HOST 마감일\n     - main 담당자\n     - sub 협업자\n     - 공유자료\n     - 상태/우선순위\n   - 관련 정보는 BO 테이블 기준에 맞게 2줄 셀로 묶는다.\n   - 상태는 텍스트 색상만 쓰지 말고 `status ok/wait/fail/info` chip으로 표현한다.\n   - 행 클릭 시 우측 상세 drawer가 열린다.\n   - 선택된 행은 강조 표시한다.\n\n2. 검색/필터\n   - 제목, 담당자, 댓글, 세부내용 통합 검색을 제공한다.\n   - 대분류/상태/우선순위/마감임박 필터를 제공한다.\n   - 선택된 필터는 active filter tag로 요약한다.\n   - Summary Strip에는 전체 업무, 진행중, 지연주의, 완료, 첨부 있음 건수를 조밀하게 표시한다.\n\n3. 신규 업무 생성\n   - `index2.html`의 가로 압축형 생성 폼을 참고한다.\n   - 필수 필드:\n     - 시작일\n     - 대분류/중분류/소분류\n     - 업무 제목\n     - main/HOST 마감일\n     - main 담당자\n     - sub 협업자 다중 선택\n     - 세부내용 1~3번 가이드\n     - 중요 및 특이사항\n     - 공유자료명\n     - 상태/우선순위\n   - 등록 시 업무 목록에 새 행을 추가하고, 해당 행을 선택 상태로 만들며 우측 상세를 즉시 갱신한다.\n\n4. 업무 상세\n   - `../notations_tools/public/index.html`의 상세 구조를 참고한다.\n   - `테이블선택_Drawer_상세패널_기준.md`를 함께 적용해, 단순 상세 보기 패널이 아니라 선택된 업무를 처리하는 작업 패널로 만든다.\n   - 상세는 다음 영역으로 구성한다.\n     - 제목/경로/상태/우선순위\n     - 업무 메타 정보\n     - 세부내용\n     - 중요 및 리스크\n     - 첨부파일 목록 및 미리보기/다운로드 버튼\n     - 활동 히스토리\n     - 댓글 및 대댓글\n     - 운영 메모\n     - 상태 변경/저장 액션\n   - 댓글 입력 시 타임라인에 즉시 추가된다.\n   - 댓글/변경/파일 활동을 탭으로 필터링할 수 있게 한다.\n   - 상세 drawer에는 닫기, 넓게보기, 저장 액션을 둔다.\n   - 테이블 행은 클릭뿐 아니라 Enter/Space 키로도 선택 가능하게 한다.\n   - 선택된 행에는 `tr.is-open` 또는 동일 의미의 선택 상태 클래스를 적용한다.\n   - Drawer가 열리면 작업영역에는 `is-drawer-open`, 넓게보기에는 `is-drawer-wide` 상태를 적용한다.\n   - 닫기 또는 Escape 동작 시 선택 행 상태와 wide 상태를 복구하고, 포커스를 선택했던 행으로 돌린다.\n   - Drawer 내부 정보는 고정 정보와 변동 정보를 분리한다.\n     - 고정 정보: 업무번호, 제목, 생성인, 대/중/소 분류, main 담당자, sub 협업자, 마감일\n     - 변동 정보: 상태, 우선순위, 댓글, 활동 이력, 첨부, 운영 메모, 리스크 처리 상태\n   - 상세 패널은 업무 의미별 section으로 나누고, 각 값은 라벨 + field 구조로 표시한다.\n   - 누적되는 댓글, 활동 히스토리, 파일 이력은 하나의 textarea에 합치지 않고 별도 리스트로 유지한다.\n\n디자인 기준:\n- BO 관리자 화면답게 고밀도, 저여백, 실무형 UI로 만든다.\n- 과한 hero, 마케팅 카드, 장식 이미지는 금지한다.\n- 기본 폰트는 Pretendard 계열, BO 테이블은 8~11px 밀도를 기준으로 한다.\n- Topbar 높이는 약 48px, Sidebar는 약 224px 기준으로 한다.\n- 테이블 헤더는 밝은 회색, 셀 경계는 얇은 라인으로 구성한다.\n- radius는 4~6px 수준으로 제한한다.\n- chip/status는 연한 배경 + border + 텍스트 + 상태 점을 함께 사용한다.\n- 카드 안에 카드를 중첩하지 않는다.\n- 긴 텍스트는 ellipsis 또는 2줄 clamp 처리한다.\n- 모바일에서도 테이블을 완전히 카드화하지 말고 가로 스크롤을 허용한다.\n\n상호작용:\n- 행 클릭: 상세 drawer 데이터 바인딩\n- 상세 닫기: 목록 영역 확장\n- 상세 다시 열기 버튼 제공\n- 신규 업무 등록: 목록 행 추가 + 상세 갱신\n- 검색/필터: 테이블 행 실시간 필터링\n- 댓글 등록: 상세 댓글 목록과 활동 히스토리에 반영\n- 첨부 미리보기: 간단한 preview modal 또는 inline preview 영역 표시\n\n산출물:\n- 단일 실행 가능한 HTML/CSS/JS 프로토타입\n- 파일명은 `work_communication_tool.html`로 생성\n- 외부 서버 없이 브라우저에서 바로 열 수 있어야 한다.\n- 샘플 데이터는 최소 5건 이상 포함한다.\n- 코드 안에 불필요한 설명 문구를 화면에 노출하지 않는다.\n```\n\n## 화면 구조 요약\n\n| 영역 | 역할 | 참고 |\n|---|---|---|\n| Sidebar | 업무 메뉴, 현재 위치 표시 | `design_system_major` BO 레이아웃 |\n| Topbar | 업무명, 주요 액션, 계정 정보 | BO 관리자 상단바 |\n| Page Head | breadcrumb, 제목, 짧은 메타 | BO 테이블 기준 |\n| Dense Filter | 통합 검색, 대분류, 상태, 우선순위, 마감 필터 | BO dense filter |\n| Summary Strip | 전체/진행/지연/완료/첨부 건수 | BO summary strip |\n| 업무 테이블 | 업무 목록, 선택, 비교, 상세 진입 | `index2.html` |\n| Inline Drawer | 상세, 첨부, 히스토리, 댓글, 운영 메모 | `notations_tools/public/index.html`, 테이블 선택 Drawer 기준 |\n| 신규 생성 폼 | 가로 압축형 업무 생성 | `index2.html`, `index.html` |\n\n## 데이터 필드 초안\n\n| 필드 | 설명 | 예시 |\n|---|---|---|\n| id | 업무번호 | 3237 |\n| startDate | 시작일 | 26-06-04 |\n| creator | 생성인 | 박지민 |\n| categoryLarge | 대분류 | 개발본부 |\n| categoryMiddle | 중분류 | 프로그램 |\n| categorySmall | 소분류 | 코어엔진 |\n| title | 대표 업무 제목 | 코어 프로그램 리팩토링 및 쿼리 최적화 |\n| description | 세부내용 | 1. 매핑 로직 점검... |\n| notice | 중요/특이사항 | 싱글쿼테이션 오류 예외처리 강화 |\n| mainDueDate | main 마감일 | 26-06-15 |\n| hostDueDate | HOST 마감일 | 26-06-18 |\n| mainOwner | main 담당자 | 홍길동 |\n| subOwners | sub 협업자 | 최민식, 송강호 |\n| fileName | 공유자료 | core_spec.pdf |\n| status | 상태 | 진행중 |\n| priority | 우선순위 | 높음 |\n| comments | 댓글 목록 | 진행사항 기록 |\n| activities | 활동 히스토리 | 상태 변경, 파일 추가 |\n\n## 구현 시 주의사항\n\n- `index2.html`, `index.html`, `notations_tools`의 스타일은 복사하지 않는다. 해당 파일은 필요한 데이터 필드와 동작 흐름만 참고한다.\n- 상세 화면의 시각 구조와 간격, 라인, 상태 표현은 디자인 시스템 문서의 Drawer 기준을 따른다.\n- 상세 Drawer는 `테이블선택_Drawer_상세패널_기준.md`처럼 선택 행의 고정 식별 정보와 실제 처리 입력 영역을 분리한다.\n- Drawer 내부 grid는 wrapper 또는 module 컨테이너가 담당한다. row 클래스에 임의의 `grid-temp
