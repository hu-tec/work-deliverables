          "content": "# 교육과정 설명 (layout_redesign 산출물)\n\n> plan.md \"산출 — 과정에 대한 설명 md를 산출\" 항목.\n> 기준 데이터: `layout_redesign/data.js` (기존 데이터 축약 없이 반영).\n> 상세 페이지: `course-detail.html?id=\u003cid>`\n\n## 과정 상세 레이아웃 (공통)\n\n과정 상세는 **2단 구조**(본문 + 우측 수강료 패널)이며, 본문은 아래 순서로 구성됩니다.\n\n1. **과정소개** — 이미지 | 과정내용 (2단, `repeat(2,1fr)`)\n2. **과목 소개** — 과목/모듈 카드 그리드 _(참고: TESOL-v3 ITT 과목소개)_\n3. **필요성 | 추천** — 왜 필요한가 | 추천 대상 (2단, `repeat(2,1fr)`)\n4. **교육 전·후 비교** — 1줄 (전/후 2열 표)\n5. **과정 특징** — 1줄 (데이터 필드에서 파생: 기간·대상·운영방식)\n6. **핵심 강점** — 4단 (`repeat(4,1fr)`). 데이터가 4개 미만이면 **AI 추천**으로 보충(`AI 추천` 표기), 2~4단으로 적응\n7. **교육과정 안내** — 교육 목표 · 구성 · 운영방식 · 수료 기준 _(참고: ai-teacher 교육과정안내)_\n8. **주차별 커리큘럼** — 표\n9. **수강안내** — 접수·일정·수강료·납부·환불·증명 + 신청 절차 4단계 _(참고: ai-teacher 수강안내)_\n10. **책임 강사** / **FAQ** / **수강후기**\n\n우측 **수강료 패널**(design-b 채택)은 수강료·기간·일시·대상·접수·상태와 신청/상담 버튼을 sticky로 고정합니다.\n\n> 추가 데이터 필드(`data.js`): `subjects[[과목명, 설명]]`(과목 소개), `goals[]`·`completion`(교육과정 안내/수료 기준). 수강안내의 접수·납부·환불 절차는 과정 공통 표준으로 구성됩니다.\n\n---\n\n## 1. AI 강사 양성과정 `id=ai-teacher` — 모집중 · 실무과정\n\n**한 줄 정의** : AI 자체를 가르치는 과정이 아니라, AI툴과 프롬프트를 활용해 초등 방과후 수업을 더 재미있고 효과적으로 운영하는 교사를 양성하는 과정입니다.\n\n**과정소개**\n- 이 과정은 AI 자체를 가르치는 과정이 아니라, AI툴과 프롬프트를 활용해 초등 방과후 수업을 더 재미있고 효과적으로 운영하는 교사를 양성하는 과정입니다.\n- 이미지, 영상, 음성, 문서형 AI툴을 활용하여 수업자료를 만들고, 활동형 콘텐츠를 구성하고, 학생 수준과 주제에 맞게 수업을 설계하는 실전 중심 구조로 운영됩니다.\n- 특히 방과후 현장에 맞게 영어, 창의활동, 문화, 발표, 프로젝트형 수업으로 연결할 수 있도록 구성됩니다.\n\n**왜 이 과정이 필요한가**\n- 기존 방과후 수업은 자료 준비 시간이 오래 걸리고 반복업무가 많기 때문\n- 학생 참여를 높이기 위해 이미지·영상·활동형 콘텐츠 구성이 중요하기 때문\n- 학부모와 학교가 신뢰할 수 있도록 AI 윤리 이해가 반드시 필요하기 때문\n- AI를 활용한 영어·창의형 수업이 학교 차별화 프로그램으로 확장될 수 있기 때문\n\n**핵심 강점**\n- AI툴 출력부터 수정·보완까지 직접 다루는 실전형 구성\n- 방과후 현장에서 바로 쓸 수 있는 수업자료 제작 중심 학습\n- 영어, 문화, 발표, 프로젝트형 수업으로 확장 가능한 구조\n- AI 윤리를 함께 익혀 학부모와 학교 신뢰 확보 가능\n\n**이런 분께 추천**\n- 초등 방과후 교사로 활동하고 싶은 분\n- 영어수업과 AI 활용을 결합하고 싶은 분\n- 학생 참여형 수업 콘텐츠를 직접 만들고 싶은 분\n- 테솔, 영어교육, 창의교육 경험을 AI와 연결하고 싶은 분\n- 학교, 기관, 공부방 등에서 차별화된 수업을 운영하고 싶은 분\n\n**교육 전 · 교육 후**\n\n| 교육 전 | 교육 후 |\n|---|---|\n| 수업자료 준비에 시간이 오래 걸리고 반복업무가 많음 | AI툴로 수업자료·활동지를 빠르게 제작 |\n| 이미지·영상 등 참여형 콘텐츠 구성이 어려움 | 이미지·영상·활동형 콘텐츠로 학생 참여를 높임 |\n| AI 활용의 윤리 기준이 불명확 | 저작권·개인정보 등 AI 윤리를 학부모·학교에 설명 가능 |\n\n**주차별 커리큘럼**\n\n| 구분 | 주제 | 주요 내용 |\n|---|---|---|\n| 1주차 | 오리엔테이션·AI툴 이해 | 이미지·영상·음성·문서형 AI툴 개요와 초등 방과후 활용 사례 |\n| 2주차 | 프롬프트·수업 설계 | 학생 수준·주제별 프롬프트 작성과 수업 흐름 설계 |\n| 3주차 | 수업자료 제작 | 이미지·영상·활동지 등 방과후 수업자료 직접 제작 |\n| 4주차 | 활동형 콘텐츠 구성 | 영어·창의·문화·발표·프로젝트형 활동 콘텐츠 구성 |\n| 5주차 | 시연·AI 윤리 | 수업 시연·피드백, 저작권·개인정보 등 AI 윤리 정리 |\n\n**과목 소개**\n- 이미지·영상 AI툴 — 이미지·영상 생성 도구로 수업 시각자료와 활동 영상을 제작\n- 음성·문서 AI툴 — 음성 합성과 문서 생성으로 듣기 자료·학습지를 제작\n- 프롬프트 설계 — 학생 수준·주제에 맞춘 프롬프트 작성\n- 활동형 콘텐츠 구성 — 영어·창의·문화·발표·프로젝트형 활동 구성\n- AI 윤리 — 저작권·개인정보·검수 기준 이해·적용\n\n**교육과정 안내 (교육 목표 / 수료 기준)**\n- 목표: ①AI툴로 방과후 수업자료를 스스로 제작 ②학생 참여형 활동 콘텐츠 직접 설계 ③AI 윤리 기준을 학부모·학교에 설명\n- 수료 기준: 총 출석 80% 이상 + 수업자료 포트폴리오 제출 시 수료증 발급\n\n**수강안내** : 온라인 신청 또는 1:1 문의 후 상담→반 배정 · 수강료 상담 후 안내(분할 가능) · 카드/계좌 납부 · 교육 시작 전 100% 환불(시작 후 진행률 적용) · 절차: 상담·신청 → 접수·납부 → 수강 → 수료·발급\n\n**운영 정보** : 교육기간 5주(주 2회, 총 40시간) · 일시 기수별 공지(평일 저녁반/주말반) · 대상 초등 방과후 교사·예비 교사 · 수강료 상담 후 안내(분할 가능)\n\n---\n\n## 2. TESOL 영어교육 과정 `id=tesol` — 모집중 · 정규과정\n\n**한 줄 정의** : 영어 교수법, 수업 설계, 시연, 학습자 관리까지 실제 교육 현장에서 필요한 역량을 체계적으로 훈련합니다.\n\n**과정소개**\n- 영어 교수법, 수업 설계, 시연, 학습자 관리까지 실제 교육 현장에서 필요한 역량을 체계적으로 훈련합니다.\n- 수업안 작성과 발표 피드백을 반복하며 강사 포트폴리오로 활용할 결과물을 완성합니다.\n\n**핵심 강점** : 국제 표준 교수법 학습 / 수업 시연·피드백 반복 훈련 / 수료증 발급\n**추천 대상** : 영어 강사를 준비하는 예비 강사 / 수업 운영 방식을 체계화하려는 현직 교사\n\n**커리큘럼** : 1~2주차 영어 교수법 기초 / 3~4주차 수업 설계 / 5~6주차 수업 시연 / 7~8주차 평가·포트폴리오\n**과목 소개** : 영어 교수법 · 수업 설계 · 수업 시연 · 학습자 관리\n**교육과정 안내** : 목표 — 교수법의 수업안 구체화·시연 검증, 학습자 관리·평가 전략 / 수료 — 출석 충족 + 시연·포트폴리오 평가 통과 시 수료증\n**수강안내** : 1:1 상담→반 배정 · 수강료 상담 안내 · 카드/계좌 납부 · 시작 전 100% 환불 · 절차 상담→접수·납부→수강→수료\n**운영 정보** : 8주(120시간) · 기수별 공지 · 대상 교사·예비 강사\n\n---\n\n## 3. AITe 인증 시험 `id=aite` — 접수중 · 자격시험\n\n**한 줄 정의** : AI 번역, 프롬프트, 윤리, ITT 통번역 역량을 분야별 급수 체계로 평가하는 자격시험입니다.\n\n**핵심 강점** : 분야별 급수 인증 / 온라인 접수·응시 확인 / 실무 연계 평가\n**추천 대상** : AI 활용 역량을 증명하려는 학습자 / 강사·번역가·콘텐츠 실무자\n\n**평가 구성** : 1교시 AI 번역 / 2교시 프롬프트 / 3교시 AI 윤리\n**과목 소개** : AI 번역 · 프롬프트 · AI 윤리 · ITT 연계\n**교육과정 안내** : 목표 — 공인 급수로 AI 활용 역량 객관 증명, 분야별 기준 점검 / 수료 — 급수별 합격 기준 충족 시 자격 인증서\n**수강안내** : 온라인 접수(접수 후 응시 확인서 발급) · 급수별 응시료 안내 · 카드/계좌 납부 · 회차별 재응시 가능\n**운영 정보** : 회차별 운영(연 4회 정기 + 수시) · 대상 AI 활용 실무자·강사·번역가 · 급수별 응시료 안내\n\n---\n\n## 4. ITT 통번역 과정 `id=itt` — 모집중 · 자격과정\n\n**한 줄 정의** : 실무 번역, 통역 표현, 자격시험 대비를 함께 다루며 언어 전문 역량을 체계적으로 준비합니다.\n\n**핵심 강점** : 실무 번역 훈련 / ITT 자격 대비 / AI 번역 검수 역량\n**추천 대상** : 통번역 전문가를 준비하는 분 / AI 번역 시대의 검수 역량을 갖추려는 분\n\n**커리큘럼** : 1~3주차 번역 실무 / 4~6주차 통역 표현 / 7~8주차 자격 대비·모의평가\n**과목 소개** : 번역 실무 · 통역 표현 · 자격 대비 · AI 번역 검수\n**교육과정 안내** : 목표 — 실무 번역 포트폴리오 확보, ITT 자격 준비, AI 번역 검수·교정 역량 / 수료 — 출석 충족 + 과제·모의평가 통과 시 수료증\n**수강안내** : 1:1 상담→반 배정 · 수강료 상담 안내 · 카드/계좌 납부 · 시작 전 100% 환불 · 절차 상담→접수·납부→수강→수료\n**운영 정보** : 8주 · 기수별 공지 · 대상 통번역 전문가 희망자\n\n---\n\n## 데이터/구현 메모\n\n- 4개 과정 모두 `data.js`에 정의(`COURSES`), 공지 7건(`NOTICES`)도 동일 파일에서 관리. 추가·수정은 `data.js`만 변경.\n- 과정이 추가될 경우 상세의 **핵심 강점** 칼럼 수는 강점 개수에 따라 2~4단으로 자동 조정(`data-cols`), 4개 미만이면 AI 추천 항목으로 보충됩니다.\n- 전체 글자 크기는 기준 대비 -2px(base 13px) 적용.\n- 헤더: `교육원소개 · 시험 소개 · 수강신청 · 시험 안내 · 커뮤니티 · 1:1문의` + 우측 `[신청하기]`, 상단 우측 `로그인 · 회원가입`.\n- `자격증 소개` 메뉴/페이지명은 `수강신청`으로 변경했습니다.\n- 수강신청 강좌 조회는 `수강신청을 진행할 센터`, `구분`, `분야/전공` 각각에 `전체` 선택지를 제공하며, `전체` 선택 시 해당 조건은 필터링하지 않습니다.\n"

          "content": "# 시험 랜딩 홈페이지 레이아웃 정의\r\n\r\n## 구현목표\r\n- `/site-template`에 있는 페이지들을 기준으로 템플릿을 생성/수정\r\n\r\n전체적으로 글자를 -2px줄이기.\r\n\r\n## 교육과정 상세\r\n과정 상세내용은 2단구조\r\n커뮤니티 : `/community-redesign/design-a-modern`을 채택\r\n수강료(우측패널) : `/community-redesign/design-b-modern`을 채택\r\n\r\n\r\n## 교육과정 상세 레이아웃 구조\r\n과정소개는\r\n- 이미지 | 과정내용 : 2단구조 (repeat(2, 1fr))\r\n- 이과정필요성 | 추천 : 2단구조 (repeat(2, 1fr))\r\n- 교육전후 비교 : 1줄 \r\n- 과정특징 : 1줄\r\n- 강점 한줄(4단) > 없는경우, ai로 생성 : 4단구조 (repeat(4, 1fr))\r\n- 교육과정이 2개이상인경우, 최소 2단 ~ 4단을 최대\r\n\r\n## 헤더\n- 시험 소개\n- 수강신청\n- 시험 안내\n- 커뮤니티\n- 1:1문의\n- 헤더 우측 액션은 [신청하기]만 유지하고, 기존 [교육원 소개] 버튼은 삭제\n\n로그인 회원가입 우측으로\n\n## 수강신청\n- 기존 `자격증 소개` 메뉴/페이지는 `수강신청`으로 변경\n- 수강신청 강좌 조회에서 `수강신청을 진행할 센터`, `구분`, `분야/전공` 각각에 `전체` 선택지를 제공\n- `전체` 선택 시 해당 조건은 필터링하지 않고 전체 강좌 대상으로 조회\n\n## 산출\n- 과정에 대한 설명 md를 산출\n\n> 현재까지 분석된 내용을 기준으로, 애매한 내용들은 판단해서 추가해도 됨. 하지만 기존에 있는 기반 데이터는 축약하지 말것\n"

          "content": "# 교육과정 설명 (layout_redesign 산출물)\n\n> plan.md \"산출 — 과정에 대한 설명 md를 산출\" 항목.\n> 기준 데이터: `layout_redesign/data.js` (기존 데이터 축약 없이 반영).\n> 상세 페이지: `course-detail.html?id=\u003cid>`\n\n## 과정 상세 레이아웃 (공통)\n\n과정 상세는 **2단 구조**(본문 + 우측 수강료 패널)이며, 본문은 아래 순서로 구성됩니다.\n\n1. **과정소개** — 이미지 | 과정내용 (2단, `repeat(2,1fr)`)\n2. **과목 소개** — 과목/모듈 카드 그리드 _(참고: TESOL-v3 ITT 과목소개)_\n3. **필요성 | 추천** — 왜 필요한가 | 추천 대상 (2단, `repeat(2,1fr)`)\n4. **교육 전·후 비교** — 1줄 (전/후 2열 표)\n5. **과정 특징** — 1줄 (데이터 필드에서 파생: 기간·대상·운영방식)\n6. **핵심 강점** — 4단 (`repeat(4,1fr)`). 데이터가 4개 미만이면 **AI 추천**으로 보충(`AI 추천` 표기), 2~4단으로 적응\n7. **교육과정 안내** — 교육 목표 · 구성 · 운영방식 · 수료 기준 _(참고: ai-teacher 교육과정안내)_\n8. **주차별 커리큘럼** — 표\n9. **수강안내** — 접수·일정·수강료·납부·환불·증명 + 신청 절차 4단계 _(참고: ai-teacher 수강안내)_\n10. **책임 강사** / **FAQ** / **수강후기**\n\n우측 **수강료 패널**(design-b 채택)은 수강료·기간·일시·대상·접수·상태와 신청/상담 버튼을 sticky로 고정합니다.\n\n> 추가 데이터 필드(`data.js`): `subjects[[과목명, 설명]]`(과목 소개), `goals[]`·`completion`(교육과정 안내/수료 기준). 수강안내의 접수·납부·환불 절차는 과정 공통 표준으로 구성됩니다.\n\n---\n\n## 1. AI 강사 양성과정 `id=ai-teacher` — 모집중 · 실무과정\n\n**한 줄 정의** : AI 자체를 가르치는 과정이 아니라, AI툴과 프롬프트를 활용해 초등 방과후 수업을 더 재미있고 효과적으로 운영하는 교사를 양성하는 과정입니다.\n\n**과정소개**\n- 이 과정은 AI 자체를 가르치는 과정이 아니라, AI툴과 프롬프트를 활용해 초등 방과후 수업을 더 재미있고 효과적으로 운영하는 교사를 양성하는 과정입니다.\n- 이미지, 영상, 음성, 문서형 AI툴을 활용하여 수업자료를 만들고, 활동형 콘텐츠를 구성하고, 학생 수준과 주제에 맞게 수업을 설계하는 실전 중심 구조로 운영됩니다.\n- 특히 방과후 현장에 맞게 영어, 창의활동, 문화, 발표, 프로젝트형 수업으로 연결할 수 있도록 구성됩니다.\n\n**왜 이 과정이 필요한가**\n- 기존 방과후 수업은 자료 준비 시간이 오래 걸리고 반복업무가 많기 때문\n- 학생 참여를 높이기 위해 이미지·영상·활동형 콘텐츠 구성이 중요하기 때문\n- 학부모와 학교가 신뢰할 수 있도록 AI 윤리 이해가 반드시 필요하기 때문\n- AI를 활용한 영어·창의형 수업이 학교 차별화 프로그램으로 확장될 수 있기 때문\n\n**핵심 강점**\n- AI툴 출력부터 수정·보완까지 직접 다루는 실전형 구성\n- 방과후 현장에서 바로 쓸 수 있는 수업자료 제작 중심 학습\n- 영어, 문화, 발표, 프로젝트형 수업으로 확장 가능한 구조\n- AI 윤리를 함께 익혀 학부모와 학교 신뢰 확보 가능\n\n**이런 분께 추천**\n- 초등 방과후 교사로 활동하고 싶은 분\n- 영어수업과 AI 활용을 결합하고 싶은 분\n- 학생 참여형 수업 콘텐츠를 직접 만들고 싶은 분\n- 테솔, 영어교육, 창의교육 경험을 AI와 연결하고 싶은 분\n- 학교, 기관, 공부방 등에서 차별화된 수업을 운영하고 싶은 분\n\n**교육 전 · 교육 후**\n\n| 교육 전 | 교육 후 |\n|---|---|\n| 수업자료 준비에 시간이 오래 걸리고 반복업무가 많음 | AI툴로 수업자료·활동지를 빠르게 제작 |\n| 이미지·영상 등 참여형 콘텐츠 구성이 어려움 | 이미지·영상·활동형 콘텐츠로 학생 참여를 높임 |\n| AI 활용의 윤리 기준이 불명확 | 저작권·개인정보 등 AI 윤리를 학부모·학교에 설명 가능 |\n\n**주차별 커리큘럼**\n\n| 구분 | 주제 | 주요 내용 |\n|---|---|---|\n| 1주차 | 오리엔테이션·AI툴 이해 | 이미지·영상·음성·문서형 AI툴 개요와 초등 방과후 활용 사례 |\n| 2주차 | 프롬프트·수업 설계 | 학생 수준·주제별 프롬프트 작성과 수업 흐름 설계 |\n| 3주차 | 수업자료 제작 | 이미지·영상·활동지 등 방과후 수업자료 직접 제작 |\n| 4주차 | 활동형 콘텐츠 구성 | 영어·창의·문화·발표·프로젝트형 활동 콘텐츠 구성 |\n| 5주차 | 시연·AI 윤리 | 수업 시연·피드백, 저작권·개인정보 등 AI 윤리 정리 |\n\n**과목 소개**\n- 이미지·영상 AI툴 — 이미지·영상 생성 도구로 수업 시각자료와 활동 영상을 제작\n- 음성·문서 AI툴 — 음성 합성과 문서 생성으로 듣기 자료·학습지를 제작\n- 프롬프트 설계 — 학생 수준·주제에 맞춘 프롬프트 작성\n- 활동형 콘텐츠 구성 — 영어·창의·문화·발표·프로젝트형 활동 구성\n- AI 윤리 — 저작권·개인정보·검수 기준 이해·적용\n\n**교육과정 안내 (교육 목표 / 수료 기준)**\n- 목표: ①AI툴로 방과후 수업자료를 스스로 제작 ②학생 참여형 활동 콘텐츠 직접 설계 ③AI 윤리 기준을 학부모·학교에 설명\n- 수료 기준: 총 출석 80% 이상 + 수업자료 포트폴리오 제출 시 수료증 발급\n\n**수강안내** : 온라인 신청 또는 1:1 문의 후 상담→반 배정 · 수강료 상담 후 안내(분할 가능) · 카드/계좌 납부 · 교육 시작 전 100% 환불(시작 후 진행률 적용) · 절차: 상담·신청 → 접수·납부 → 수강 → 수료·발급\n\n**운영 정보** : 교육기간 5주(주 2회, 총 40시간) · 일시 기수별 공지(평일 저녁반/주말반) · 대상 초등 방과후 교사·예비 교사 · 수강료 상담 후 안내(분할 가능)\n\n---\n\n## 2. TESOL 영어교육 과정 `id=tesol` — 모집중 · 정규과정\n\n**한 줄 정의** : 영어 교수법, 수업 설계, 시연, 학습자 관리까지 실제 교육 현장에서 필요한 역량을 체계적으로 훈련합니다.\n\n**과정소개**\n- 영어 교수법, 수업 설계, 시연, 학습자 관리까지 실제 교육 현장에서 필요한 역량을 체계적으로 훈련합니다.\n- 수업안 작성과 발표 피드백을 반복하며 강사 포트폴리오로 활용할 결과물을 완성합니다.\n\n**핵심 강점** : 국제 표준 교수법 학습 / 수업 시연·피드백 반복 훈련 / 수료증 발급\n**추천 대상** : 영어 강사를 준비하는 예비 강사 / 수업 운영 방식을 체계화하려는 현직 교사\n\n**커리큘럼** : 1~2주차 영어 교수법 기초 / 3~4주차 수업 설계 / 5~6주차 수업 시연 / 7~8주차 평가·포트폴리오\n**과목 소개** : 영어 교수법 · 수업 설계 · 수업 시연 · 학습자 관리\n**교육과정 안내** : 목표 — 교수법의 수업안 구체화·시연 검증, 학습자 관리·평가 전략 / 수료 — 출석 충족 + 시연·포트폴리오 평가 통과 시 수료증\n**수강안내** : 1:1 상담→반 배정 · 수강료 상담 안내 · 카드/계좌 납부 · 시작 전 100% 환불 · 절차 상담→접수·납부→수강→수료\n**운영 정보** : 8주(120시간) · 기수별 공지 · 대상 교사·예비 강사\n\n---\n\n## 3. AITe 인증 시험 `id=aite` — 접수중 · 자격시험\n\n**한 줄 정의** : AI 번역, 프롬프트, 윤리, ITT 통번역 역량을 분야별 급수 체계로 평가하는 자격시험입니다.\n\n**핵심 강점** : 분야별 급수 인증 / 온라인 접수·응시 확인 / 실무 연계 평가\n**추천 대상** : AI 활용 역량을 증명하려는 학습자 / 강사·번역가·콘텐츠 실무자\n\n**평가 구성** : 1교시 AI 번역 / 2교시 프롬프트 / 3교시 AI 윤리\n**과목 소개** : AI 번역 · 프롬프트 · AI 윤리 · ITT 연계\n**교육과정 안내** : 목표 — 공인 급수로 AI 활용 역량 객관 증명, 분야별 기준 점검 / 수료 — 급수별 합격 기준 충족 시 자격 인증서\n**수강안내** : 온라인 접수(접수 후 응시 확인서 발급) · 급수별 응시료 안내 · 카드/계좌 납부 · 회차별 재응시 가능\n**운영 정보** : 회차별 운영(연 4회 정기 + 수시) · 대상 AI 활용 실무자·강사·번역가 · 급수별 응시료 안내\n\n---\n\n## 4. ITT 통번역 과정 `id=itt` — 모집중 · 자격과정\n\n**한 줄 정의** : 실무 번역, 통역 표현, 자격시험 대비를 함께 다루며 언어 전문 역량을 체계적으로 준비합니다.\n\n**핵심 강점** : 실무 번역 훈련 / ITT 자격 대비 / AI 번역 검수 역량\n**추천 대상** : 통번역 전문가를 준비하는 분 / AI 번역 시대의 검수 역량을 갖추려는 분\n\n**커리큘럼** : 1~3주차 번역 실무 / 4~6주차 통역 표현 / 7~8주차 자격 대비·모의평가\n**과목 소개** : 번역 실무 · 통역 표현 · 자격 대비 · AI 번역 검수\n**교육과정 안내** : 목표 — 실무 번역 포트폴리오 확보, ITT 자격 준비, AI 번역 검수·교정 역량 / 수료 — 출석 충족 + 과제·모의평가 통과 시 수료증\n**수강안내** : 1:1 상담→반 배정 · 수강료 상담 안내 · 카드/계좌 납부 · 시작 전 100% 환불 · 절차 상담→접수·납부→수강→수료\n**운영 정보** : 8주 · 기수별 공지 · 대상 통번역 전문가 희망자\n\n---\n\n## 데이터/구현 메모\n\n- 4개 과정 모두 `data.js`에 정의(`COURSES`), 공지 7건(`NOTICES`)도 동일 파일에서 관리. 추가·수정은 `data.js`만 변경.\n- 과정이 추가될 경우 상세의 **핵심 강점** 칼럼 수는 강점 개수에 따라 2~4단으로 자동 조정(`data-cols`), 4개 미만이면 AI 추천 항목으로 보충됩니다.\n- 전체 글자 크기는 기준 대비 -2px(base 13px) 적용.\n- 헤더: `교육원소개 · 시험 소개 · 수강신청 · 시험 안내 · 커뮤니티 · 1:1문의` + 우측 `[신청하기]`, 상단 우측 `로그인 · 회원가입`.\n- `자격증 소개` 메뉴/페이지명은 `수강신청`으로 변경했습니다.\n- 수강신청 강좌 조회는 `수강신청을 진행할 센터`, `구분`, `분야/전공` 각각에 `전체` 선택지를 제공하며, `전체` 선택 시 해당 조건은 필터링하지 않습니다.\n"

          "content": "# 시험 랜딩 홈페이지 레이아웃 정의\r\n\r\n## 구현목표\r\n- `/site-template`에 있는 페이지들을 기준으로 템플릿을 생성/수정\r\n\r\n전체적으로 글자를 -2px줄이기.\r\n\r\n## 교육과정 상세\r\n과정 상세내용은 2단구조\r\n커뮤니티 : `/community-redesign/design-a-modern`을 채택\r\n수강료(우측패널) : `/community-redesign/design-b-modern`을 채택\r\n\r\n\r\n## 교육과정 상세 레이아웃 구조\r\n과정소개는\r\n- 이미지 | 과정내용 : 2단구조 (repeat(2, 1fr))\r\n- 이과정필요성 | 추천 : 2단구조 (repeat(2, 1fr))\r\n- 교육전후 비교 : 1줄 \r\n- 과정특징 : 1줄\r\n- 강점 한줄(4단) > 없는경우, ai로 생성 : 4단구조 (repeat(4, 1fr))\r\n- 교육과정이 2개이상인경우, 최소 2단 ~ 4단을 최대\r\n\r\n## 헤더\n- 시험 소개\n- 수강신청\n- 시험 안내\n- 커뮤니티\n- 1:1문의\n- 헤더 우측 액션은 [신청하기]만 유지하고, 기존 [교육원 소개] 버튼은 삭제\n\n로그인 회원가입 우측으로\n\n## 수강신청\n- 기존 `자격증 소개` 메뉴/페이지는 `수강신청`으로 변경\n- 수강신청 강좌 조회에서 `수강신청을 진행할 센터`, `구분`, `분야/전공` 각각에 `전체` 선택지를 제공\n- `전체` 선택 시 해당 조건은 필터링하지 않고 전체 강좌 대상으로 조회\n\n## 산출\n- 과정에 대한 설명 md를 산출\n\n> 현재까지 분석된 내용을 기준으로, 애매한 내용들은 판단해서 추가해도 됨. 하지만 기존에 있는 기반 데이터는 축약하지 말것\n"

          "content": "# 교육과정 설명 (layout_redesign 산출물)\n\n> plan.md \"산출 — 과정에 대한 설명 md를 산출\" 항목.\n> 기준 데이터: `layout_redesign/data.js` (기존 데이터 축약 없이 반영).\n> 상세 페이지: `course-detail.html?id=\u003cid>`\n\n## 과정 상세 레이아웃 (공통)\n\n과정 상세는 **2단 구조**(본문 + 우측 수강료 패널)이며, 본문은 아래 순서로 구성됩니다.\n\n1. **과정소개** — 이미지 | 과정내용 (2단, `repeat(2,1fr)`)\n2. **과목 소개** — 과목/모듈 카드 그리드 _(참고: TESOL-v3 ITT 과목소개)_\n3. **필요성 | 추천** — 왜 필요한가 | 추천 대상 (2단, `repeat(2,1fr)`)\n4. **교육 전·후 비교** — 1줄 (전/후 2열 표)\n5. **과정 특징** — 1줄 (데이터 필드에서 파생: 기간·대상·운영방식)\n6. **핵심 강점** — 4단 (`repeat(4,1fr)`). 데이터가 4개 미만이면 **AI 추천**으로 보충(`AI 추천` 표기), 2~4단으로 적응\n7. **교육과정 안내** — 교육 목표 · 구성 · 운영방식 · 수료 기준 _(참고: ai-teacher 교육과정안내)_\n8. **주차별 커리큘럼** — 표\n9. **수강안내** — 접수·일정·수강료·납부·환불·증명 + 신청 절차 4단계 _(참고: ai-teacher 수강안내)_\n10. **책임 강사** / **FAQ** / **수강후기**\n\n우측 **수강료 패널**(design-b 채택)은 수강료·기간·일시·대상·접수·상태와 신청/상담 버튼을 sticky로 고정합니다.\n\n> 추가 데이터 필드(`data.js`): `subjects[[과목명, 설명]]`(과목 소개), `goals[]`·`completion`(교육과정 안내/수료 기준). 수강안내의 접수·납부·환불 절차는 과정 공통 표준으로 구성됩니다.\n\n---\n\n## 1. AI 강사 양성과정 `id=ai-teacher` — 모집중 · 실무과정\n\n**한 줄 정의** : AI 자체를 가르치는 과정이 아니라, AI툴과 프롬프트를 활용해 초등 방과후 수업을 더 재미있고 효과적으로 운영하는 교사를 양성하는 과정입니다.\n\n**과정소개**\n- 이 과정은 AI 자체를 가르치는 과정이 아니라, AI툴과 프롬프트를 활용해 초등 방과후 수업을 더 재미있고 효과적으로 운영하는 교사를 양성하는 과정입니다.\n- 이미지, 영상, 음성, 문서형 AI툴을 활용하여 수업자료를 만들고, 활동형 콘텐츠를 구성하고, 학생 수준과 주제에 맞게 수업을 설계하는 실전 중심 구조로 운영됩니다.\n- 특히 방과후 현장에 맞게 영어, 창의활동, 문화, 발표, 프로젝트형 수업으로 연결할 수 있도록 구성됩니다.\n\n**왜 이 과정이 필요한가**\n- 기존 방과후 수업은 자료 준비 시간이 오래 걸리고 반복업무가 많기 때문\n- 학생 참여를 높이기 위해 이미지·영상·활동형 콘텐츠 구성이 중요하기 때문\n- 학부모와 학교가 신뢰할 수 있도록 AI 윤리 이해가 반드시 필요하기 때문\n- AI를 활용한 영어·창의형 수업이 학교 차별화 프로그램으로 확장될 수 있기 때문\n\n**핵심 강점**\n- AI툴 출력부터 수정·보완까지 직접 다루는 실전형 구성\n- 방과후 현장에서 바로 쓸 수 있는 수업자료 제작 중심 학습\n- 영어, 문화, 발표, 프로젝트형 수업으로 확장 가능한 구조\n- AI 윤리를 함께 익혀 학부모와 학교 신뢰 확보 가능\n\n**이런 분께 추천**\n- 초등 방과후 교사로 활동하고 싶은 분\n- 영어수업과 AI 활용을 결합하고 싶은 분\n- 학생 참여형 수업 콘텐츠를 직접 만들고 싶은 분\n- 테솔, 영어교육, 창의교육 경험을 AI와 연결하고 싶은 분\n- 학교, 기관, 공부방 등에서 차별화된 수업을 운영하고 싶은 분\n\n**교육 전 · 교육 후**\n\n| 교육 전 | 교육 후 |\n|---|---|\n| 수업자료 준비에 시간이 오래 걸리고 반복업무가 많음 | AI툴로 수업자료·활동지를 빠르게 제작 |\n| 이미지·영상 등 참여형 콘텐츠 구성이 어려움 | 이미지·영상·활동형 콘텐츠로 학생 참여를 높임 |\n| AI 활용의 윤리 기준이 불명확 | 저작권·개인정보 등 AI 윤리를 학부모·학교에 설명 가능 |\n\n**주차별 커리큘럼**\n\n| 구분 | 주제 | 주요 내용 |\n|---|---|---|\n| 1주차 | 오리엔테이션·AI툴 이해 | 이미지·영상·음성·문서형 AI툴 개요와 초등 방과후 활용 사례 |\n| 2주차 | 프롬프트·수업 설계 | 학생 수준·주제별 프롬프트 작성과 수업 흐름 설계 |\n| 3주차 | 수업자료 제작 | 이미지·영상·활동지 등 방과후 수업자료 직접 제작 |\n| 4주차 | 활동형 콘텐츠 구성 | 영어·창의·문화·발표·프로젝트형 활동 콘텐츠 구성 |\n| 5주차 | 시연·AI 윤리 | 수업 시연·피드백, 저작권·개인정보 등 AI 윤리 정리 |\n\n**과목 소개**\n- 이미지·영상 AI툴 — 이미지·영상 생성 도구로 수업 시각자료와 활동 영상을 제작\n- 음성·문서 AI툴 — 음성 합성과 문서 생성으로 듣기 자료·학습지를 제작\n- 프롬프트 설계 — 학생 수준·주제에 맞춘 프롬프트 작성\n- 활동형 콘텐츠 구성 — 영어·창의·문화·발표·프로젝트형 활동 구성\n- AI 윤리 — 저작권·개인정보·검수 기준 이해·적용\n\n**교육과정 안내 (교육 목표 / 수료 기준)**\n- 목표: ①AI툴로 방과후 수업자료를 스스로 제작 ②학생 참여형 활동 콘텐츠 직접 설계 ③AI 윤리 기준을 학부모·학교에 설명\n- 수료 기준: 총 출석 80% 이상 + 수업자료 포트폴리오 제출 시 수료증 발급\n\n**수강안내** : 온라인 신청 또는 1:1 문의 후 상담→반 배정 · 수강료 상담 후 안내(분할 가능) · 카드/계좌 납부 · 교육 시작 전 100% 환불(시작 후 진행률 적용) · 절차: 상담·신청 → 접수·납부 → 수강 → 수료·발급\n\n**운영 정보** : 교육기간 5주(주 2회, 총 40시간) · 일시 기수별 공지(평일 저녁반/주말반) · 대상 초등 방과후 교사·예비 교사 · 수강료 상담 후 안내(분할 가능)\n\n---\n\n## 2. TESOL 영어교육 과정 `id=tesol` — 모집중 · 정규과정\n\n**한 줄 정의** : 영어 교수법, 수업 설계, 시연, 학습자 관리까지 실제 교육 현장에서 필요한 역량을 체계적으로 훈련합니다.\n\n**과정소개**\n- 영어 교수법, 수업 설계, 시연, 학습자 관리까지 실제 교육 현장에서 필요한 역량을 체계적으로 훈련합니다.\n- 수업안 작성과 발표 피드백을 반복하며 강사 포트폴리오로 활용할 결과물을 완성합니다.\n\n**핵심 강점** : 국제 표준 교수법 학습 / 수업 시연·피드백 반복 훈련 / 수료증 발급\n**추천 대상** : 영어 강사를 준비하는 예비 강사 / 수업 운영 방식을 체계화하려는 현직 교사\n\n**커리큘럼** : 1~2주차 영어 교수법 기초 / 3~4주차 수업 설계 / 5~6주차 수업 시연 / 7~8주차 평가·포트폴리오\n**과목 소개** : 영어 교수법 · 수업 설계 · 수업 시연 · 학습자 관리\n**교육과정 안내** : 목표 — 교수법의 수업안 구체화·시연 검증, 학습자 관리·평가 전략 / 수료 — 출석 충족 + 시연·포트폴리오 평가 통과 시 수료증\n**수강안내** : 1:1 상담→반 배정 · 수강료 상담 안내 · 카드/계좌 납부 · 시작 전 100% 환불 · 절차 상담→접수·납부→수강→수료\n**운영 정보** : 8주(120시간) · 기수별 공지 · 대상 교사·예비 강사\n\n---\n\n## 3. AITe 인증 시험 `id=aite` — 접수중 · 자격시험\n\n**한 줄 정의** : AI 번역, 프롬프트, 윤리, ITT 통번역 역량을 분야별 급수 체계로 평가하는 자격시험입니다.\n\n**핵심 강점** : 분야별 급수 인증 / 온라인 접수·응시 확인 / 실무 연계 평가\n**추천 대상** : AI 활용 역량을 증명하려는 학습자 / 강사·번역가·콘텐츠 실무자\n\n**평가 구성** : 1교시 AI 번역 / 2교시 프롬프트 / 3교시 AI 윤리\n**과목 소개** : AI 번역 · 프롬프트 · AI 윤리 · ITT 연계\n**교육과정 안내** : 목표 — 공인 급수로 AI 활용 역량 객관 증명, 분야별 기준 점검 / 수료 — 급수별 합격 기준 충족 시 자격 인증서\n**수강안내** : 온라인 접수(접수 후 응시 확인서 발급) · 급수별 응시료 안내 · 카드/계좌 납부 · 회차별 재응시 가능\n**운영 정보** : 회차별 운영(연 4회 정기 + 수시) · 대상 AI 활용 실무자·강사·번역가 · 급수별 응시료 안내\n\n---\n\n## 4. ITT 통번역 과정 `id=itt` — 모집중 · 자격과정\n\n**한 줄 정의** : 실무 번역, 통역 표현, 자격시험 대비를 함께 다루며 언어 전문 역량을 체계적으로 준비합니다.\n\n**핵심 강점** : 실무 번역 훈련 / ITT 자격 대비 / AI 번역 검수 역량\n**추천 대상** : 통번역 전문가를 준비하는 분 / AI 번역 시대의 검수 역량을 갖추려는 분\n\n**커리큘럼** : 1~3주차 번역 실무 / 4~6주차 통역 표현 / 7~8주차 자격 대비·모의평가\n**과목 소개** : 번역 실무 · 통역 표현 · 자격 대비 · AI 번역 검수\n**교육과정 안내** : 목표 — 실무 번역 포트폴리오 확보, ITT 자격 준비, AI 번역 검수·교정 역량 / 수료 — 출석 충족 + 과제·모의평가 통과 시 수료증\n**수강안내** : 1:1 상담→반 배정 · 수강료 상담 안내 · 카드/계좌 납부 · 시작 전 100% 환불 · 절차 상담→접수·납부→수강→수료\n**운영 정보** : 8주 · 기수별 공지 · 대상 통번역 전문가 희망자\n\n---\n\n## 데이터/구현 메모\n\n- 4개 과정 모두 `data.js`에 정의(`COURSES`), 공지 7건(`NOTICES`)도 동일 파일에서 관리. 추가·수정은 `data.js`만 변경.\n- 과정이 추가될 경우 상세의 **핵심 강점** 칼럼 수는 강점 개수에 따라 2~4단으로 자동 조정(`data-cols`), 4개 미만이면 AI 추천 항목으로 보충됩니다.\n- 전체 글자 크기는 기준 대비 -2px(base 13px) 적용.\n- 헤더: `시험 소개 · 자격증 소개 · 시험 안내 · 커뮤니티 · 1:1문의` + 우측 `[신청하기][교육원 소개]`, 상단 우측 `로그인 · 회원가입`.\n"

          "content": "# 시험 랜딩 홈페이지 레이아웃 정의\r\n\r\n## 구현목표\r\n- `/site-template`에 있는 페이지들을 기준으로 템플릿을 생성/수정\r\n\r\n전체적으로 글자를 -2px줄이기.\r\n\r\n## 교육과정 상세\r\n과정 상세내용은 2단구조\r\n커뮤니티 : `/community-redesign/design-a-modern`을 채택\r\n수강료(우측패널) : `/community-redesign/design-b-modern`을 채택\r\n\r\n\r\n## 교육과정 상세 레이아웃 구조\r\n과정소개는\r\n- 이미지 | 과정내용 : 2단구조 (repeat(2, 1fr))\r\n- 이과정필요성 | 추천 : 2단구조 (repeat(2, 1fr))\r\n- 교육전후 비교 : 1줄 \r\n- 과정특징 : 1줄\r\n- 강점 한줄(4단) > 없는경우, ai로 생성 : 4단구조 (repeat(4, 1fr))\r\n- 교육과정이 2개이상인경우, 최소 2단 ~ 4단을 최대\r\n\r\n## 헤더\r\n- 신청하기 우측에 교육원 소개[신청하기, 교육원 소개]\r\n- 시험 소개\r\n- 자격증 소개\r\n- 시험 안내\r\n- 1:1문의\r\n\r\n로그인 회원가입 우측으로\r\n\r\n## 산출\r\n- 과정에 대한 설명 md를 산출\r\n\r\n> 현재까지 분석된 내용을 기준으로, 애매한 내용들은 판단해서 추가해도 됨. 하지만 기존에 있는 기반 데이터는 축약하지 말것"

          "content": "# 세 사이트 레이아웃/통일성 분석\n\n분석 대상:\n\n- https://hu-tec.github.io/TESOL-v3\n- https://aite-test.imweb.me/index\n- https://hu-tec.github.io/ai-teacher\n\n분석 목적: 세 사이트를 같은 계열의 교육/자격 랜딩페이지처럼 보이게 만들기 위한 정보 구조, 레이아웃, 스타일 공통 기준 도출.\n\n## 1. 전체 요약\n\n세 사이트는 모두 교육/자격/AI 역량을 다루며, 신뢰성, 과정 소개, 신청 유도, 상담 연결이 핵심 목표다. 다만 현재 표현 방식은 서로 다르다.\n\n| 사이트 | 성격 | 현재 강점 | 통일 시 조정 포인트 |\n|---|---|---|---|\n| TESOL-v3 | 교육기관/과정형 멀티페이지 | GNB, 과정 상세, 입학/커뮤니티/신청 플로우가 체계적 | 전체 사이트의 기준 레이아웃으로 삼기 좋음 |\n| AITe Imweb | 자격시험 원페이지/마케팅형 | 시험 종류, 신뢰 근거, 후기, 프로세스가 풍부함 | 섹션이 길고 중복 문구가 있어 구조 정리가 필요 |\n| ai-teacher | AI 강사 양성과정형 멀티페이지 | TESOL-v3와 CSS 토큰/레이아웃이 거의 동일 | TESOL-v3와 통합 브랜드 규칙 적용이 쉬움 |\n\n권장 방향: `TESOL-v3 / ai-teacher`의 1200px 컨테이너, sticky GNB, 와인 레드 포인트, 카드/그리드 구조를 공통 디자인 시스템으로 잡고, `AITe Imweb`의 풍부한 마케팅 섹션을 같은 컴포넌트 규칙으로 재배치한다.\n\n## 2. 사이트별 구조 분석\n\n### 2.1 TESOL-v3\n\n기술/구조:\n\n- React/Vite SPA.\n- 기본 경로는 `/TESOL-v3/`.\n- 라우트: 홈, 교육원 소개, 입학 안내, 과정 상세 5종, 커뮤니티, 문의, 로그인, 회원가입, 신청서.\n- 공통 UI: sticky header, dropdown GNB, footer, card, table, process flow, form panel.\n\n상단 내비게이션:\n\n- 로고: `A. TESOL`\n- 서브타이틀: `국제 영어교사 양성과정`\n- 메뉴: 홈, 교육원 소개, 입학안내, 과목 소개, 커뮤니티, 문의\n- 과목 소개 드롭다운: TESOL 영어교육, AI 번역·통역, AI 프롬프트, AI 윤리, ITT 정통 통번역\n- 데스크톱 CTA: 수강 신청\n- 모바일: 햄버거 메뉴 + 하단 신청 버튼\n\n홈 섹션 흐름:\n\n1. Hero\n   - 어두운 배경, 와인 레드 하이라이트, 중앙 정렬\n   - 키 메시지: 글로벌 TESOL, 영어교육/미래교육 강조\n   - CTA: 교육과정 보기, 수강 신청하기, 1:1 문의하기\n2. 브랜드 소개\n   - `글로벌 교육의 기준, A. TESOL`\n   - 교육기관의 미션/신뢰감 전달\n3. 과정 카드 그리드\n   - `미래를 준비하는 5가지 전문 과정`\n   - 5개 과정으로 분류\n4. 맞춤형 교육 서비스\n   - 레벨테스트, 설명회, 상담, 신청 등 빠른 액션\n5. 교육 네트워크\n   - 대학/협약처/해외 제휴 기관 수치형 신뢰 근거\n6. 하단 CTA\n   - 무료 수강상담, 입학설명회 신청\n\n레이아웃 특징:\n\n- 기본 컨테이너 `max-width: 1200px`, 좌우 `20px`.\n- 주요 섹션은 `py-16`, `py-24` 수준의 넓은 세로 간격.\n- 카드: 흰 배경, 12px radius, 얕은 shadow, 1px border.\n- 과정 상세: 상단 page header → LNB/tab → 과정 헤더 → 이미지+정보 2열 → 설명/표/커리큘럼.\n- 신청서: `max-width: 56rem`, 2단계 progress, 2열 form grid.\n\n시각 스타일:\n\n- 폰트: Pretendard.\n- 메인 컬러: `#9b2226`, 일부 신청 폼은 `#8B1A2B`.\n- 배경: `#f9fafb`, 보조 배경 `#f3f4f6`, 본문 `#1f2937`, 보조 텍스트 `#6b7280`.\n- Hero는 검정/딥 와인 그라데이션과 grid texture 사용.\n\n### 2.2 AITe Imweb\n\n기술/구조:\n\n- Imweb 기반 사이트.\n- 공개 페이지 텍스트 구조상 원페이지 성격이 강함.\n- GNB는 시험 소개, 자격 관리, 게시판, 고객지원, 협회 소개 중심.\n\n상단 내비게이션:\n\n- 메뉴: 시험 소개, 자격 관리, 게시판, 고객지원, IITA 협회 소개\n- 자격 관리 하위: AITe 번역전문가, AITe 프롬프트 전문가, ITT 통번역, AI 윤리 시험\n- 로그인/회원가입/마이페이지 요소 포함\n\n홈 섹션 흐름:\n\n1. Hero\n   - 문구: `AI시대 당신의 역량을 공식 인증합니다`\n   - 보조: `25년 전통과 AI 미래 자격 지금 바로 도전하세요`\n   - CTA: 문의하기\n2. Exam Types\n   - AI 역량 인증 시험 소개\n   - 4개 시험: AI 번역, AI 프롬프트, AI 윤리, ITT 전통 통번역\n   - 각 카드에 대상 해시태그와 시험 안내 링크\n3. 문제 제기/가치 제안\n   - `AI없이는 하루도 살 수 없는 시대`\n   - AI 활용 능력 검증 필요성 강조\n4. 자격증 카테고리 카드\n   - 번역, 웹툰 번역, 유튜브 번역, 동시통역, 개발, 프롬프트 언어 등\n   - 현재 반복 노출되는 카드가 있어 정리 필요\n5. 신뢰/차별화 섹션\n   - 공인 자격증, 법무부/과기부 인증, 25년 전통, 30만 명 응시 등\n   - 실무형 역량, 종합 자격시험, 전문가 검증 등\n6. 후기 섹션\n   - 취업, 승진/프로젝트 리더, 프리랜서 신뢰도, AI 번역 활용 사례\n7. 프로세스 섹션\n   - 회원가입 → 시험 선택 → 급수 선택 → 결제 → 응시확인서 출력\n8. Footer\n   - 전화, 운영시간, 회사 정보, 이메일, copyright\n\n레이아웃 특징:\n\n- 마케팅 원페이지에 가까운 긴 스크롤 구조.\n- 반복 카드, 이미지 카드, 후기 카드, 프로세스 step이 많이 배치됨.\n- TESOL-v3/ai-teacher보다 섹션 위계가 덜 정리되어 있어, `Hero → 시험유형 → 신뢰근거 → 후기 → 프로세스 → CTA`로 압축하면 통일성이 올라감.\n\n시각/콘텐츠 특징:\n\n- AI 자격/인증의 즉시성, 공신력, 실무성을 강조.\n- 해시태그형 대상 표현을 적극 사용.\n- 텍스트 중 오탈자/표현 정리 필요: 예) `Skiles`, `아우루는`, 띄어쓰기/문장 반복.\n\n### 2.3 ai-teacher\n\n기술/구조:\n\n- React/Vite SPA.\n- 실제 배포 HTML은 `/AI_teach-v2/` 자산을 사용.\n- 라우트: 홈, 교육원 소개, 과정 소개, 수강 안내 하위 페이지, 커뮤니티, 문의.\n- CSS 토큰과 컴포넌트 구조가 TESOL-v3와 거의 같다.\n\n상단 내비게이션 추정 구조:\n\n- 홈\n- 교육원 소개\n- 과정 소개\n- 수강 안내: 등록 안내, 일정 안내, 수강혜택, 환불 안내, 증명서 출력\n- 커뮤니티\n- 1:1 문의하기\n\n주요 페이지/섹션:\n\n1. 홈\n   - AI 강사 양성과정 중심 Hero\n   - 과정 소개/수강 신청 CTA\n2. 교육원 소개\n   - 교육기관 신뢰, AI 교육 필요성, 운영 철학\n3. 과정 소개\n   - AI 방과후 교사, 학원·공부방 강사, 온라인 전문 강사, 콘텐츠 기획 제작 등 분야별 과정\n4. 수강 안내\n   - 등록 절차\n   - 교육 일정표\n   - 수강 혜택 카드 6개\n   - 환불 기준 표\n   - 증명서 출력 절차\n5. 커뮤니티\n   - 공지사항, FAQ, 수강후기, 자료실 탭\n6. 문의\n   - 상담 분야, 이름, 연락처, 문의 내용, 개인정보 동의\n\n레이아웃 특징:\n\n- TESOL-v3와 동일한 `container`, `card`, `page-header`, `sub-tabs`, `schedule-table`, `grid col-2/3/4` 구조.\n- `page-header`는 딥 그레이/블랙 그라데이션에 중앙 제목.\n- 수강혜택은 3열 카드, 환불/증명서/일정은 표와 step flow 중심.\n- 문의 폼은 800px 내외의 단일 카드에 집중.\n\n시각 스타일:\n\n- Pretendard.\n- 메인 컬러 `#9b2226`.\n- 밝은 회색 배경, 흰 카드, 와인 레드 CTA.\n- 전체적으로 TESOL-v3와 가장 통일하기 쉬움.\n\n## 3. 공통 레이아웃 패턴\n\n세 사이트를 하나의 계열로 보이게 하려면 아래 구조를 공통 템플릿으로 잡는 것이 좋다.\n\n### 3.1 공통 페이지 골격\n\n```text\nSticky Header\n  Logo + 서비스명\n  주요 메뉴\n  우측 CTA\n\nMain\n  Hero 또는 Page Header\n  핵심 카테고리/과정/시험 카드\n  상세 설명 또는 비교 영역\n  신뢰 근거\n  프로세스/일정/커리큘럼\n  후기/FAQ/공지\n  상담/신청 CTA\n\nFooter\n  회사 정보\n  교육/시험 메뉴\n  지원 서비스\n  연락처/운영시간\n```\n\n### 3.2 홈/랜딩 공통 섹션 순서\n\n1. Hero: 브랜드/과정/시험명을 첫 화면에서 크게 노출\n2. Category Cards: 과정 또는 시험 유형 3~6개\n3. Why/Value: 왜 필요한지, 무엇을 얻는지\n4. Trust Proof: 인증, 연혁, 응시자 수, 협약, 교수진\n5. Process: 신청/응시/수강 절차\n6. Schedule 또는 Curriculum: 실제 행동에 필요한 정보\n7. Reviews/Stories: 결과 중심 후기\n8. Final CTA: 상담/신청/문의\n\n### 3.3 서브페이지 공통 구조\n\n```text\nPage Header\n  h1: 페이지명\n  breadcrumb 또는 짧은 설명\n\nLocal Nav / Tabs\n  같은 카테고리 내 하위 메뉴\n\nContent Sections\n  카드, 표, 리스트, step flow\n\nCTA Strip\n  상담 또는 신청 연결\n```\n\n## 4. 통일 디자인 가이드\n\n### 4.1 컬러\n\n현재 TESOL-v3와 ai-teacher가 이미 공유하는 토큰을 기준으로 삼는다.\n\n| 역할 | 권장값 | 용도 |\n|---|---|---|\n| Primary | `#9b2226` | CTA, active, 핵심 강조 |\n| Primary Hover | `#b82a30` | 버튼 hover |\n| Deep Text | `#1f2937` | 제목, footer 배경 |\n| Body Text | `#374151` 또는 `#4b5563` | 본문 |\n| Muted Text | `#6b7280` | 보조 설명 |\n| Page BG | `#f9fafb` | 전체 배경 |\n| Section BG | `#f3f4f6` | 보조 영역 |\n| Border | `#e5e7eb` | 카드/표 경계 |\n| White | `#ffffff` | 카드/본문 영역 |\n\nAITe 사이트도 이 색상으로 맞추면 세 사이트가 같은 브랜드 계열로 보인다.\n\n### 4.2 타이포그래피\n\n- 기본 폰트: Pretendard.\n- Hero H1: 48~64px desktop, 34~42px mobile.\n- Page Header H1: 36~40px desktop, 28~32px mobile.\n- Section Title: 26~32px.\n- Card Title: 18~22px.\n- Body: 16px, line-height 1.6.\n- 보조 영문/eyebrow: 12~14px, letter spacing은 과도하게 쓰지 않기.\n\n### 4.3 컨테이너/간격\n\n- 공통 container: `max-width: 1200px; padding: 0 20px; margin: 0 auto;`\n- Section padding: desktop `80~96px`, mobile `48~64px`.\n- 카드 grid gap: `24~32px`.\n- 카드 radius: 8~12px. 너무 둥근 24~32px 카드는 특별한 강조 영역에만 사용.\n- 버튼 radius: 6~8px.\n\n### 4.4 컴포넌트 규칙\n\n공통으로 재사용할 컴포넌트:\n\n- `Header`\n- `Footer`\n- `Hero`\n- `PageHeader`\n- `SectionTitle`\n- `CourseCard` / `ExamCard`\n- `TrustCard`\n- `ProcessStep`\n- `ScheduleTable`\n- `ReviewCard`\n- `CTASection`\n- `ContactForm`\n\nAITe의 긴 원페이지도 위 컴포넌트로 재조립하면 TESOL-v3/ai-teacher와 구조가 맞는다.\n\n## 5. AITe 사이트 재구성 권장안\n\n현재 AITe는 정보량이 많지만, 반복 섹션이 많아 메시지가 분산된다. 아래 순서로 재구성하는 것을 권장한다.\n\n```text\nHeader\nHero\n  \"AI시대 당신의 역량을 공식 인증합니다\"\n  CTA: 시험 안내 보기 / 문의하기\n\nExam Types\n  AI 번역\n  AI 프롬프트\n  AI 윤리\n  ITT 통번역\n\nWhy AITe\n  AI 활용 능력 검증\n  실무형 평가\n  공신력 있는 인증\n\nTrust Proof\n  25년 전통\n  30만 명 응시\n  법무부/과기부 인증\n  국내 유일 AI+통번역 종합 자격\n\nCareer Cards\n  번역\n  웹툰/유튜브\n  통역\n  프롬프트\n\nReviews\n  취업/커리어/프리랜서/업무 효율 사례 4개\n\nProcess\n  회원가입 → 시험 선택 → 급수 선택 → 결제 → 응시확인서 출력\n\nFinal CTA\n  전화/문의/시험 접수\n\nFooter\n```\n\n정리 기준:\n\n- `Exam Types`는 4개로 고정한다.\n- 반복되는 자격증 카드 6개 세트는 1회만 사용한다.\n- 인증/공신력 문구는 `Trust Proof`로 묶는다.\n- 후기 카드는 3~4개만 노출하고 나머지는 상세/게시판으로 이동한다.\n- 프로세스는 TESOL-v3/ai-teacher의 `flow-grid`와 동일한 형태로 통일한다.\n\n## 6. 세 사이트 통일 메뉴 제안\n\n각 사이트의 주제는 다르지만 메뉴 구조는 비슷하게 맞출 수 있다.\n\n| 역할 | TESOL-v3 | AITe | ai-teacher |\n|---|---|---|---|\n| 홈 | 홈 | 홈 | 홈 |\n| 소개 | 교육원 소개 | 시험 소개/협회 소개 | 교육원 소개 |\n| 주요 상품 | 과목 소개 | 자격 관리 | 과정 소개 |\n| 이용 안내 | 입학 안내 | 응시 안내/프로세스 | 수강 안내 |\n| 커뮤니티 | 커뮤니티 | 게시판 | 커뮤니티 |\n| 문의 | 문의 | 고객지원 | 1:1 문의 |\n| CTA | 수강 신청 | 시험 접수/문의 | 수강 신청 |\n\n권장 GNB 명칭:\n\n- 홈\n- 소개\n- 과정/시험\n- 안내\n- 커뮤니티\n- 문의\n- 우측 CTA: `신청하기` 또는 사이트별 `수강 신청`, `시험 접수`\n\n## 7. 구현 우선순위\n\n1. 공통 디자인 토큰 확정\n   - Primary, text, bg, border, radius, shadow, spacing.\n2. Header/Footer 통일\n   - 로고 위치, 메뉴 개수, CTA 위치, 모바일 메뉴 방식.\n3. Hero 규칙 통일\n   - 랜딩 첫 화면은 같은 패턴, 다른 문구/이미지/CTA만 변경.\n4. 카드/표/프로세스 컴포넌트 통일\n   - AITe의 Imweb식 긴 섹션을 카드/flow/table로 재배치.\n5. 콘텐츠 정리\n   - 중복 카드 제거, 오탈자 수정, CTA 문구 통일.\n6. 반응형 검수\n   - 768px 이하에서 GNB 접힘, 카드 1열, 표 overflow 처리.\n\n## 8. 최종 권장 기준\n\n세 사이트의 기준 디자인은 `TESOL-v3 + ai-teacher`에 맞춘다. 두 사이트는 이미 같은 색상, 컨테이너, 카드, 테이블, 페이지 헤더 구조를 공유한다. `AITe`는 콘텐츠는 유지하되, 레이아웃을 이 기준으로 다시 정리하는 방식이 가장 빠르고 통일성이 높다.\n\n핵심 원칙:\n\n- 브랜드는 다르더라도 구조는 같게 한다.\n- Hero, 카드, 프로세스, CTA, Footer는 같은 컴포넌트를 쓴다.\n- 색상은 와인 레드 `#9b2226`을 공통 포인트로 쓴다.\n- 긴 원페이지는 8개 이하의 명확한 섹션으로 줄인다.\n- 모든 신청/문의 동선은 우측 상단 CTA와 마지막 CTA에서 반복 노출한다.\n"

          "content": "# 원본 사이트 디자인 통일 작업 지침\n\n## 목적\n\n원본 사이트를 새 디자인 시스템에 맞춰 바꿀 때, 단일 랜딩페이지로 재구성하지 않고 원본의 정보구조, 메뉴, 서브페이지, 문구를 유지한 상태에서 디자인만 통일한다.\n\n이번 작업의 핵심 목표는 \"저 사이트가 우리가 만든 틀을 입으면 어떻게 보이는지\"를 확인하는 것이다. 따라서 콘텐츠 기획, 문구 재작성, 섹션 재배치, 메뉴 축소는 작업 범위가 아니다.\n\n## 반드시 지켜야 할 원칙\n\n1. 콘텐츠는 원본 그대로 사용한다.\n   - 제목, 본문, 메뉴명, CTA 문구, 표 항목, 푸터 정보는 임의로 바꾸지 않는다.\n   - 맞춤법이나 어색한 문장도 사용자가 요청하기 전에는 수정하지 않는다.\n   - 요약본으로 대체하지 않는다.\n\n2. 정보구조를 유지한다.\n   - 원본 상단 메뉴를 그대로 옮긴다.\n   - 드롭다운 메뉴와 하위 페이지도 빠짐없이 만든다.\n   - 폴더 메뉴는 첫 번째 하위 페이지 또는 별도 인덱스 페이지로 연결한다.\n\n3. 단일 랜딩페이지로 합치지 않는다.\n   - `시험 소개`, `AITe 번역전문가`, `AITe 프롬프트 전문가`, `ITT 통번역`, `AI 윤리 시험`, `게시판`, `고객지원`, `협회 소개`, `협회 구성`, `협회 연혁`은 각각 별도 페이지로 만든다.\n   - 메인 페이지에 모든 내용을 몰아넣지 않는다.\n\n4. 디자인만 통일한다.\n   - 기존 `site-template`의 레이아웃, 헤더, 카드, 표, CTA, 푸터 스타일을 적용한다.\n   - 색상은 원본 로고 색상과 기존 템플릿 디자인 토큰을 조합한다.\n   - 콘텐츠 순서와 의미는 원본 기준을 우선한다.\n\n## 원본 메뉴 매핑\n\n| 원본 메뉴 | 원본 URL | 로컬 파일 |\n|---|---:|---|\n| 시험 소개 | `/19` | `index.html` |\n| 자격 관리 > AITe 번역전문가 | `/16` | `aite-translation.html` |\n| 자격 관리 > AITe 프롬프트 전문가 | `/27` | `aite-prompt.html` |\n| 자격 관리 > ITT 통번역 | `/30` | `itt.html` |\n| 자격 관리 > AI 윤리 시험 | `/31` | `ai-ethics.html` |\n| 게시판 | `/20` | `board.html` |\n| 고객지원 | `/21` | `support.html` |\n| IITA 협회 소개 > 협회 소개 | `/36` | `association.html` |\n| IITA 협회 소개 > 협회 구성 | `/23` | `organization.html` |\n| IITA 협회 소개 > 협회 연혁 | `/24` | `history.html` |\n\n## 작업 순서\n\n1. 원본 사이트 수집\n   - 각 원본 URL의 HTML을 저장한다.\n   - 메뉴명, 페이지 제목, 본문 텍스트, 표, 이미지 URL, 푸터 정보를 추출한다.\n   - 추출 결과를 페이지별로 분리해서 기록한다.\n\n2. 콘텐츠 잠금\n   - 추출한 텍스트를 먼저 `content-source.md` 또는 데이터 파일에 원문 그대로 보관한다.\n   - 디자인 작업 중에는 이 원문을 수정하지 않는다.\n   - 변경이 필요하면 별도 \"수정 제안\"으로만 남긴다.\n\n3. 페이지 생성\n   - 메뉴 매핑표 기준으로 모든 로컬 HTML 파일을 만든다.\n   - 각 페이지는 같은 헤더/푸터를 공유하되, 본문은 해당 원본 페이지 콘텐츠만 사용한다.\n   - 드롭다운과 현재 페이지 active 상태를 구현한다.\n\n4. 디자인 적용\n   - 기존 템플릿의 공통 컴포넌트를 사용한다.\n   - 텍스트 섹션, 카드 섹션, 표 섹션, CTA 섹션으로만 시각 구조를 정리한다.\n   - 원본 콘텐츠를 새로 쓰거나 마케팅 카피로 대체하지 않는다.\n\n5. 검증\n   - 모든 메뉴 링크가 로컬 파일로 연결되는지 확인한다.\n   - 원본 메뉴에 있던 하위 페이지가 누락되지 않았는지 확인한다.\n   - 각 페이지의 핵심 제목과 CTA가 원본과 일치하는지 확인한다.\n   - 외부 이미지 의존성이 있으면 로컬 `assets/`로 저장하거나 명확히 기록한다.\n\n## 금지 사항\n\n- 원본의 여러 페이지를 하나의 랜딩페이지로 합치기\n- 원본 메뉴를 임의로 줄이기\n- \"보기 좋게\" 문구를 새로 쓰기\n- 원본에 없는 섹션을 추가해 핵심처럼 보이게 하기\n- 빈 페이지를 임의 콘텐츠로 채우기\n- 게시판/고객지원처럼 콘텐츠가 적은 페이지를 다른 내용으로 대체하기\n\n## 완료 기준\n\n- 로컬 폴더에 원본 메뉴 수와 동일한 페이지가 존재한다.\n- 상단 메뉴와 드롭다운이 원본 구조와 일치한다.\n- 각 페이지의 제목, 주요 본문, 표/카드 항목, CTA, 푸터 정보가 원본 기반이다.\n- 디자인은 기존 템플릿 톤으로 통일되어 있다.\n- 사용자가 \"콘텐츠는 그대로이고 디자인만 바뀌었다\"고 판단할 수 있다.\n\n## 다음 수정 작업 메모\n\n현재 `aite-translation-landing` 폴더는 단일 랜딩 방식으로 시작된 흔적이 있으므로, 다음 수정에서는 먼저 콘텐츠 데이터와 페이지 파일을 원본 기준으로 재검토해야 한다.\n\n우선순위는 다음과 같다.\n\n1. 원본 텍스트 전체 추출본을 별도 파일로 보관\n2. 누락된 서브페이지 콘텐츠 보강\n3. 각 페이지별 본문을 원본 순서대로 재배치\n4. `site-template`의 디자인 컴포넌트와 색상 토큰만 적용\n5. 최종 링크 검증\n"

          "content": "# AI Studio 사이드바 메뉴 단순화 가이드\n\n| 항목 | 내용 |\n| --- | --- |\n| 대상 | HutechC 사내 Studio 앱 (`http://54.116.15.136:81/app`) |\n| 기술 스택 | React + Vite + Tailwind CSS v4 + shadcn/ui (사이드바 컴포넌트 사용) |\n| 작성일 | 2026-05-26 |\n| 목적 | 사이드바에 평면 나열된 약 49개 메뉴를 5개 대그룹 + 부가영역으로 재구성하여 탐색성·안전성 개선 |\n| 근거 문서 | [01-hutechc-internal-studio-analysis.md](../homepage-analysis/01-hutechc-internal-studio-analysis.md) |\n\n---\n\n## 1. 한 줄 진단\n\n지식·규정, 일상 업무, 인사/채용, 운영 관리, 사이트 관리까지 **성격이 다른 업무 도메인이 한 사이드바에 같은 층위로 약 49개 평면 나열**되어 있다. 같은 데이터의 여러 화면(특히 규정 6~8종)이 별도 메뉴로 흩어져 있고, 이전/대체 메뉴까지 함께 노출되어 \"내 업무를 어디서 시작하는지\"가 보이지 않는다.\n\n---\n\n## 2. 현재 메뉴 구조 (AS-IS)\n\n분석 시점 기준 관찰된 그룹과 메뉴 수다. 총 **10개 그룹 / 약 49개 경로**.\n\n| # | 현재 그룹 | 메뉴 수 | 대표 메뉴 |\n| --- | --- | ---: | --- |\n| 1 | 업무 | 9 | 사내업무지침, 업무 총괄, 업무 자료, 업무일지, 서약서, 레슨플랜, 매뉴얼 리스트 |\n| 2 | 채용/인사 | 3 | 채용관리, 출퇴근 관리 A, 출퇴근 관리 B |\n| 3 | 학생관리 | 1 | 학생관리 |\n| 4 | 관리/운영 | 11 | 거래처 아웃콜, 사진모음, 미팅, 강의시간표, 미수금관리, 관리자통합, 거래처관리, 프로젝트관리 |\n| 5 | 규정 | 8 | 규정 통합, 규정관리, 규정편집, 규정 레이아웃, 규정매뉴얼, 평가기준 |\n| 6 | 서식/확인서 | 1 | 서식/확인서 |\n| 7 | 출강관리 | 2 | 출강강사관리, 거래처관리(출장) |\n| 8 | 기획/업무기획 | 5 | 업무 분류, 강사커리, 마케팅, 프롬사용법, AI 강의안 |\n| 9 | 커뮤니티/홈페이지 | 2 | 커뮤니티, 홈페이지 |\n| 10 | 대체·이전 메뉴 | 7 | 업무일지/사내지침/면접 관련 이전 화면의 대체 링크 |\n\n### 문제점 5가지\n\n1. **층위 혼재** — 일반 업무(업무일지), 민감 인사 데이터(출퇴근·채용), 고권한 시스템 설정(관리자통합)이 같은 깊이에 나란히 있어 권한 경계가 시각적으로 드러나지 않는다.\n2. **중복 메뉴** — `규정 통합 / 규정관리 / 규정편집 / 규정 레이아웃 / 규정매뉴얼 / 평가기준`은 사실상 같은 규정 데이터의 다른 보기/모드다. 6~8개 메뉴로 쪼개져 사이드바 길이를 키운다.\n3. **이전 메뉴 노출** — `대체·이전 메뉴` 7개가 현역 메뉴와 섞여 있어 사용자가 옛 화면을 잘못 사용할 위험이 있다.\n4. **그룹 과다** — 그룹이 10개라 접힘(accordion) 없이 모두 펼쳐지면 한 화면을 넘는 스크롤이 발생한다.\n5. **진입점 부재** — 로그인 직후 \"오늘 내가 할 일\"로 데려가는 개인 허브/대시보드가 사이드바 최상단에 없다.\n\n---\n\n## 3. 단순화 원칙\n\n| 원칙 | 설명 |\n| --- | --- |\n| ① 5±2 규칙 | 평상시 보이는 최상위 항목을 7개 이하로 — 대그룹 5개 + 즐겨찾기/시스템/보관함 |\n| ② 데이터 1개 = 메뉴 1개 | 같은 데이터의 여러 보기는 메뉴를 늘리지 말고 화면 안의 탭/뷰 전환으로 처리 (규정 6종 → 규정 1개) |\n| ③ 권한으로 분리 | 고권한(시스템 관리)·민감 인사 영역은 별도 섹션 + 역할 기반 표시로 분리 |\n| ④ 역할 기반 기본값 | 로그인한 역할에 맞는 그룹만 펼치고 나머지는 접어 둠 |\n| ⑤ 즐겨찾기 + 검색 | 자주 쓰는 5~7개를 상단에 고정, 상단 검색으로 49개를 한 번에 점프 |\n| ⑥ 이전 메뉴는 보관함으로 | 현역에서 분리해 `보관함(Legacy)`에 숨김 (기본 접힘) |\n\n---\n\n## 4. 개선 구조 (TO-BE)\n\n**최상위 5개 대그룹 + 즐겨찾기 + 시스템 관리 + 보관함**. 각 대그룹은 접이식(accordion) 섹션이고, 평상시엔 헤더만 보인다.\n\n```text\n🔍 [검색…]                         ← 상단 검색 (49개 전체 점프)\n⭐ 즐겨찾기                          ← 사용자가 고정한 5~7개\n─────────────────────────────\n1. 🏠 홈 · 내 업무\n     • 대시보드(개인 허브)\n     • 업무일지\n     • 업무 총괄\n     • 내 출퇴근\n2. 📚 지식 · 규정\n     • 사내업무지침\n     • 규정            ← 통합/관리/편집/레이아웃/매뉴얼/평가기준을 내부 탭으로 통합\n     • 매뉴얼 리스트\n     • 서식 · 확인서\n     • 업무 자료 / 서약서 / 레슨플랜\n3. 👥 인사 · 채용\n     • 채용관리        ← 지원서/면접/대시보드/평가를 내부 탭으로 통합\n     • 출퇴근 관리      ← A/B 통합\n     • 학생관리\n     • 출강 · 강사관리\n4. 🏢 운영 · 거래처\n     • 미팅 / 강의시간표\n     • 거래처관리       ← 거래처관리 + 아웃콜 + 출장 거래처 통합\n     • 미수금관리\n     • 프로젝트관리\n     • 사진모음\n5. 🧭 기획 · 콘텐츠\n     • 업무 분류 / 강사커리\n     • 마케팅\n     • 프롬프트 사용법 / AI 강의안\n     • 커뮤니티 / 홈페이지\n─────────────────────────────\n⚙️ 시스템 관리   (관리자 전용·권한 분리)\n     • 관리자통합\n🗄️ 보관함(Legacy)  (기본 접힘·이전 메뉴 7종)\n```\n\n### 통합 매핑 표 (49개 → 정리)\n\n| TO-BE 대그룹 | 흡수한 AS-IS 메뉴 | 통합 방식 |\n| --- | --- | --- |\n| 1. 홈·내 업무 | 업무일지, 업무 총괄, 출퇴근(개인 보기) + 신규 대시보드 | 개인 허브 신설, 출퇴근은 \"내 기록\"만 노출 |\n| 2. 지식·규정 | 사내업무지침, 규정 통합/관리/편집/레이아웃/매뉴얼/평가기준, 매뉴얼 리스트, 서식/확인서, 업무 자료, 서약서, 레슨플랜 | **규정 6~8종 → 화면 내 탭 1개로 통합** |\n| 3. 인사·채용 | 채용관리(+지원서/면접/대시보드/강사평가), 출퇴근 A/B, 학생관리, 출강강사관리 | 채용 하위 화면을 탭으로, 출퇴근 A/B 단일화 |\n| 4. 운영·거래처 | 거래처관리, 거래처 아웃콜, 거래처관리(출장), 미수금관리, 미팅, 강의시간표, 프로젝트관리, 사진모음 | 거래처 3종 → 1개(탭) |\n| 5. 기획·콘텐츠 | 업무 분류, 강사커리, 마케팅, 프롬사용법, AI 강의안, 커뮤니티, 홈페이지 | 그대로 묶음 |\n| 시스템 관리 | 관리자통합 | 권한 분리·하단 고정 |\n| 보관함 | 대체·이전 메뉴 7종 | 기본 숨김 |\n\n### 효과 (정량)\n\n| 지표 | AS-IS | TO-BE |\n| --- | ---: | ---: |\n| 최상위 그룹 수 | 10 | 5 (+부가 3) |\n| 평상시 보이는 항목 | ≈49 (전부 펼침) | ≈8 (헤더 + 즐겨찾기) |\n| 규정 관련 메뉴 | 6~8 | 1 (내부 탭) |\n| 거래처 관련 메뉴 | 3 | 1 (내부 탭) |\n| 이전/대체 메뉴 노출 | 7 (현역과 혼재) | 0 (보관함 격리) |\n\n---\n\n## 5. 구현 가이드 (shadcn/ui 사이드바 기준)\n\n현재 앱은 shadcn/ui 사이드바를 쓰므로 다음 컴포넌트로 그대로 매핑된다.\n\n1. **대그룹 = `SidebarGroup` + 접이식 `Collapsible`** — `SidebarGroupLabel`을 트리거로, 하위는 `SidebarMenuSub`.\n2. **즐겨찾기 = 별도 최상단 `SidebarGroup`** — 사용자별 `localStorage`/서버 저장, 각 메뉴 우측 `☆` 토글.\n3. **검색 = `SidebarHeader` 내 입력 + `Command` 팔레트** — 라우트 메타데이터(라벨·그룹·권한)로 필터.\n4. **권한 분리** — 라우트 메타에 `role`/`scope`를 부여하고, `시스템 관리`·민감 인사 메뉴는 권한 없으면 렌더 자체를 막는다(화면 숨김 + 서버 가드 병행).\n5. **데이터 통합(규정/채용/거래처)** — 라우트를 합치고 화면 내 `Tabs`로 보기 전환. 기존 URL은 새 탭 쿼리로 301/리다이렉트해 북마크 보존.\n6. **보관함** — 하단 접이식 `SidebarGroup`(기본 닫힘), 라벨에 `Legacy` 배지.\n\n### 라우트 메타데이터 예시\n\n```ts\n// 메뉴를 데이터로 정의하면 그룹화·검색·권한·즐겨찾기를 한 곳에서 관리\ntype NavItem = {\n  id: string;\n  label: string;\n  path: string;\n  group: '홈' | '지식규정' | '인사채용' | '운영거래처' | '기획콘텐츠' | '시스템' | 'legacy';\n  roles?: string[];     // 없으면 전체 공개\n  legacy?: boolean;     // true면 보관함으로\n  tabOf?: string;       // 다른 화면의 내부 탭이면 부모 id\n};\n```\n\n---\n\n## 6. 적용 순서 (권장)\n\n| 단계 | 작업 | 리스크 |\n| --- | --- | --- |\n| 1 | 라우트를 `NavItem[]` 데이터로 추출 (현행 그대로) | 낮음 — 표시 로직만 분리 |\n| 2 | 5개 대그룹 + 접이식으로 사이드바 렌더 교체 | 낮음 — URL 불변 |\n| 3 | 이전/대체 메뉴 7종 → 보관함으로 이동 | 중간 — 사용자 공지 필요 |\n| 4 | 규정·채용·거래처를 화면 내 탭으로 통합 | 중간 — 기존 URL 리다이렉트 |\n| 5 | 즐겨찾기 + 검색 팔레트 추가 | 낮음 |\n| 6 | 역할 기반 표시 + 서버 권한 가드 | 높음 — 인가 로직 검증 필수 |\n\n> 디자인(직각·플랫) 개선은 별도 문서 [02-디자인-개선안(border-radius).md](./02-디자인-개선안(border-radius).md) 참고. 메뉴 구조와 독립적으로 적용 가능하다.\n\n---\n\n## 7. 요약\n\n| 핵심 | 내용 |\n| --- | --- |\n| 문제 | 10그룹·49메뉴 평면 나열, 규정/거래처 중복, 이전 메뉴 혼재, 권한 경계 불명확 |\n| 해법 | 5대그룹 + 즐겨찾기 + 시스템(권한분리) + 보관함, 같은 데이터는 탭으로 통합 |\n| 효과 | 평상시 표시 49 → 8, 규정 6~8 → 1, 이전 메뉴 노출 7 → 0 |\n| 구현 | shadcn `SidebarGroup`+`Collapsible`+`Tabs`, 라우트 메타데이터 기반 |\n"

          "content": "# AI Studio 디자인 개선안 — 둥근 모서리 → 직각 플랫(관제형)\n\n| 항목 | 내용 |\n| --- | --- |\n| 대상 | HutechC 사내 Studio 앱 (`http://54.116.15.136:81/app`) |\n| 현재 스타일 | shadcn/ui 기본 — 둥근 모서리(`--radius: .625rem` ≈ 10px), 그림자, 라이트 사이드바 |\n| 목표 스타일 | 참조 사이트 `lee-byeong-chan.vercel.app/pagemanagement/index.html` — **완전 직각(`border-radius: 0`)**, 그림자 없음, 다크 네이비 사이드바, 고밀도 |\n| 작성일 | 2026-05-26 |\n| 전/후 미리보기 | [before-after.html](./before-after.html) |\n\n---\n\n## 1. 한 줄 요약\n\n현재 앱은 모든 카드·버튼·입력·사이드바에 둥근 모서리(약 10px)와 부드러운 그림자가 적용된 **소비자형 SaaS 룩**이다. 참조 사이트는 모서리를 전부 `0`으로 두고 그림자를 없앤 **직각·고밀도 관제(Control Panel) 룩**이다. 두 디자인의 결정적 차이는 단 하나, **`border-radius`**다. shadcn은 거의 모든 컴포넌트가 `var(--radius)` 파생값을 쓰므로 **변수 1개만 0으로 바꾸면 90%가 직각화**된다.\n\n---\n\n## 2. 현재(AS-IS) 디자인 토큰 — 실측\n\n앱 번들 CSS(`/app/assets/index-*.css`)에서 추출.\n\n```css\n:root {\n  --radius: .625rem;       /* = 10px : 둥근 모서리의 근원 */\n  --radius-xs: .125rem;    /* 2px */\n  --background: #fff;\n  --primary: #030213;      /* 거의 검정 */\n  --border: #0000001a;     /* 매우 옅은 테두리 */\n  --muted-foreground: #717182;\n  /* oklch 다크모드 토큰 다수, sidebar-* 토큰 보유 */\n}\n\n/* Tailwind 라운드 스케일 (전부 --radius 파생) */\n.rounded-sm  { border-radius: calc(var(--radius) - 4px); } /* 6px */\n.rounded-md  { border-radius: calc(var(--radius) - 2px); } /* 8px */\n.rounded-lg  { border-radius: var(--radius); }            /* 10px */\n.rounded-xl  { border-radius: calc(var(--radius) + 4px); }/* 14px */\n.rounded-full{ border-radius: 9999px; }                   /* 알약형 */\n```\n\n관찰된 특징:\n\n1. 카드·패널·버튼·입력·배지 대부분 `rounded-md/lg` (8~10px).\n2. 아바타·일부 태그·토글이 `rounded-full`(알약/원형).\n3. 그림자(soft shadow) 사용, 옅은 테두리(`#0000001a`).\n4. 사이드바는 라이트 배경(`--sidebar` 밝은 톤) + 둥근 활성 항목.\n5. 폰트는 일반 산세리프, 여백이 넓은 저밀도 레이아웃.\n\n---\n\n## 3. 목표(TO-BE) 디자인 토큰 — 참조 사이트 실측\n\n참조 사이트 `style/variables.css` · `components.css` · `layout.css`에서 추출.\n\n```css\n:root {\n  /* 라이트 엔터프라이즈 팔레트 */\n  --bg-base:     #f0f2f5;   /* 연한 블루그레이 바탕 */\n  --bg-panel:    #ffffff;   /* 순백 패널 */\n  --bg-card:     #f7f8fa;   /* 극연회색 카드 */\n  --bg-header:   #1e2a3a;   /* 딥 네이비 — 탑바/사이드바 */\n  --bg-selected: #dde3ff;   /* 선택 항목 배경 */\n  --border-dim:    #d1d5db; /* 일반 구분선 */\n  --border-heavy:  #6b7280;\n  --text-primary:  #111827;\n  --text-muted:    #6b7280;\n  --accent-blue:   #2563eb; /* 정보/선택/CTA */\n  --accent-green:  #059669; /* 정상 */\n  --accent-amber:  #d97706; /* 경고 */\n  --accent-red:    #dc2626; /* 위험 */\n  --font-display: 'JetBrains Mono', monospace;     /* 라벨/수치 */\n  --font-ui:      'IBM Plex Sans Condensed', sans-serif;\n}\n\n/* 핵심 철학: 둥근 모서리·그림자 전면 금지 */\n.panel, .btn, .input-field, .kpi-cell, .engine-tag {\n  border-radius: 0 !important;   /* ❌ 둥근 모서리 절대 금지 */\n  box-shadow: none !important;   /* ❌ 그림자 금지 */\n}\n```\n\n관찰된 특징:\n\n1. **모든 요소 `border-radius: 0 !important`** — 도트·토글 손잡이까지 정사각형.\n2. **그림자 없음**, 구분은 1px 테두리로만.\n3. **다크 네이비 사이드바(180px 고정)** + 네이비 탑바(36px).\n4. 활성 항목 = 연파랑 배경 + 파랑 테두리/텍스트(`#2563eb`).\n5. **고밀도** — 폰트 9~11px, 여백 2~16px 스케일, 패널 패딩 8~10px.\n6. 라벨/수치는 **모노스페이스(JetBrains Mono)**, 본문은 콘덴스드 산세리프.\n7. 좌측 3px 컬러 바(`pillar`)로 영역 구분.\n\n---\n\n## 4. 전/후 비교 표\n\n| 요소 | AS-IS (현재) | TO-BE (개선) |\n| --- | --- | --- |\n| 모서리 | 8~10px 둥글게, 일부 알약형 | `0` 완전 직각 |\n| 그림자 | soft shadow 사용 | 없음 (1px 테두리로 대체) |\n| 사이드바 | 라이트 배경, 둥근 활성 | 다크 네이비 180px, 직각 활성 |\n| 활성 표시 | 둥근 강조 배경 | 연파랑 배경 + 파랑 좌측/테두리 |\n| 폰트 | 일반 산세리프 | 라벨=모노스페이스, 본문=콘덴스드 |\n| 밀도 | 넓은 여백·큰 글자 | 고밀도·9~11px |\n| 테두리 | 거의 안 보임(#0000001a) | 명확한 회색 1px(#d1d5db) |\n| 인상 | 부드러운 소비자 SaaS | 단단한 엔터프라이즈 관제 |\n\n---\n\n## 5. 적용 방법 (shadcn/ui + Tailwind v4)\n\n### 5.1 1단계 — 변수 1개로 90% 직각화 (가장 큰 효과, 가장 적은 작업)\n\n```css\n/* globals.css 의 :root */\n:root {\n  --radius: 0rem;      /* 10px → 0 : rounded-sm/md/lg/xl 전부 0으로 cascade */\n  --radius-xs: 0rem;\n}\n```\n\n> shadcn 컴포넌트는 거의 모두 `rounded-md`(=`calc(var(--radius) - 2px)`) 등을 쓰므로 이 한 줄로 카드·버튼·입력·팝오버·탭이 일괄 직각이 된다. `calc(var(--radius) - 2px)`가 음수가 되면 브라우저가 0으로 클램프하므로 안전하다.\n\n### 5.2 2단계 — 알약형(`rounded-full`) 잔여 처리\n\n`rounded-full`은 `--radius`를 따르지 않으므로 개별 교체한다.\n\n```diff\n- \u003cBadge className=\"rounded-full ...\">\n+ \u003cBadge className=\"rounded-none ...\">\n- \u003cAvatar className=\"rounded-full\">   {/* 아바타는 직각 또는 2px 유지 선택 */}\n+ \u003cAvatar className=\"rounded-none\">\n```\n\n전역 검색 대상: `rounded-full`, `rounded-xl`, 인라인 `border-radius`.\n\n### 5.3 3단계 — 그림자 제거 + 테두리 강화\n\n```css\n/* 그림자를 1px 실선 테두리로 대체 */\n.card, [data-slot=\"card\"], .popover, .dialog {\n  box-shadow: none;\n  border: 1px solid var(--border);   /* --border 를 #d1d5db 급으로 진하게 */\n}\n:root { --border: #d1d5db; }         /* 기존 #0000001a → 또렷한 회색 */\n```\n\n### 5.4 4단계 — 다크 네이비 사이드바\n\n```css\n:root {\n  --sidebar: #1e2a3a;                 /* 딥 네이비 */\n  --sidebar-foreground: #e8ecf4;\n  --sidebar-accent: #dde3ff;          /* 활성 배경 */\n  --sidebar-accent-foreground: #2563eb;\n  --sidebar-border: #6b7280;\n  --sidebar-primary: #2563eb;\n}\n[data-sidebar=\"menu-button\"] { border-radius: 0; }          /* 직각 항목 */\n[data-sidebar=\"menu-button\"][data-active=\"true\"] {\n  background: var(--sidebar-accent);\n  color: var(--sidebar-accent-foreground);\n  border-left: 3px solid #2563eb;     /* 좌측 컬러 바 */\n}\n```\n\n### 5.5 5단계(선택) — 폰트·밀도\n\n```css\n:root {\n  --font-sans: 'IBM Plex Sans Condensed', system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', monospace;  /* 라벨·수치용 */\n}\n/* 밀도: 기본 글자 14→13px, 패널 패딩 16→10px 등 점진 조정 */\n```\n\n---\n\n## 6. 적용 순서 & 리스크\n\n| 단계 | 작업 | 효과 | 리스크 |\n| --- | --- | --- | --- |\n| 1 | `--radius: 0` | 카드/버튼/입력/탭 일괄 직각 | 낮음 — 변수 1개, 되돌리기 즉시 |\n| 2 | `rounded-full`·`rounded-xl` 교체 | 알약/큰 라운드 제거 | 낮음 — 검색·치환 |\n| 3 | 그림자 제거 + 테두리 강화 | 평평·또렷한 경계 | 낮음 |\n| 4 | 다크 네이비 사이드바 | 영역 분리·관제 인상 | 중간 — 대비/접근성 검증 |\n| 5 | 폰트·밀도 | 정보 밀도 향상 | 중간 — 한글 가독성 검증(모노는 라벨 한정) |\n\n> 권장: **1~3단계만으로도 참조 사이트의 \"직각 플랫\" 인상의 대부분이 구현**된다. 4~5단계는 관제형 색·밀도까지 원할 때 추가한다. 모든 단계는 메뉴 구조 개편( [01 가이드](./01-사이드바-메뉴-단순화-가이드.md) )과 독립적으로 적용 가능하다.\n\n---\n\n## 7. 주의 사항\n\n1. **한글 가독성** — JetBrains Mono는 한글 글리프가 약하므로 **라벨/숫자에만** 적용하고 본문 한글은 콘덴스드 산세리프 또는 기존 폰트 유지.\n2. **접근성** — 다크 네이비 사이드바는 텍스트 대비(WCAG AA 4.5:1) 확인. `--text-on-dark: #e8ecf4` 권장.\n3. **포커스 링** — 직각화 후에도 키보드 포커스 표시(`outline`)는 유지.\n4. **터치 타깃** — 고밀도 적용 시 모바일 터치 영역(≥40px) 별도 보장. 참조 사이트는 1440px+ 데스크톱 전제이므로 모바일은 밀도를 완화한다.\n5. **점진 적용** — 변수 단계(1~3) 먼저 배포해 회귀를 관찰한 뒤 색·밀도(4~5) 적용.\n\n---\n\n## 8. 요약\n\n| 핵심 | 내용 |\n| --- | --- |\n| 차이의 본질 | `border-radius` — 현재 10px 둥근 vs 목표 0 직각 |\n| 최소 변경 | `--radius: 0` 한 줄로 대부분 직각화 (shadcn cascade) |\n| 추가 | `rounded-full` 제거 → 그림자 제거·테두리 강화 → 다크 네이비 사이드바 → 폰트/밀도 |\n| 미리보기 | [before-after.html](./before-after.html) 에서 좌(현재)/우(개선) 직접 비교 |\n"
        }, {

          "date": "2026-05-26",
          "content": "# HutechC 사내 Studio 홈페이지 분석\n\n## 1. 분석 개요\n\n| 항목 | 내용 |\n| --- | --- |\n| 대상 | HutechC 사내 Studio |\n| 주소 | `http://54.116.15.136:81` |\n| 확인일 | 2026-05-26 |\n| 분석 범위 | 비로그인 초기 화면과 공개 응답 상태, 사용자가 직접 로그인한 세션의 내부 화면 구조(읽기 전용) |\n| 확인 경로 | `/`, `/dashboard.html`, `/admin.html`, `/app/`, `/api/auth/me`, `/api/interviews`, `/app/work-log`, `/app/work-hub`, `/app/company-guidelines`, `/app/recruitment`, `/app/rules`, `/app/manual-list`, `/app/admin-system`, `/app/attendance` |\n| 캡처 | [hutech-home.png](../../.captures/hutech-home.png) |\n\n공개 범위 확인 후, 사용자가 분석 전용 브라우저에서 직접 로그인한 세션에 연결하여 내부 화면을 읽기 전용으로 확인했다. 데이터 등록·수정·삭제는 실행하지 않았으며, 업무 항목·직원명·지원자 정보 등 개별 데이터 값은 수집하거나 문서화하지 않았다. 하나의 로그인 세션만 확인했으므로 역할별 권한 차이와 실제 데이터 품질은 평가 범위에서 제외했다.\n\n## 2. 한줄 진단\n\n문서 자동화 서비스의 가치를 설득하는 랜딩과 내부 업무 도구가 한 서버에 혼재한다. 화면 완성도는 양호하지만, 사내 시스템이라면 가장 먼저 처리해야 할 문제는 공개된 대시보드·관리 경로와 API 접근 통제이다.\n\n## 3. 관찰된 화면과 정보 구조\n\n### 초기 화면\n\n초기 화면은 `Premium AI Platform` 브랜드로 표현되며, 사내 Studio 명칭은 `/app/` 애플리케이션 타이틀에서 확인된다. 랜딩은 다음 순서로 구성된다.\n\n| 영역 | 관찰 내용 | 역할 |\n| --- | --- | --- |\n| 헤더 | 서비스, 전문가 네트워크, 내부 운영팀, 로그인, AI Studio, 대시보드 바로가기 | 핵심 메뉴와 내부 도구 진입 |\n| 히어로 | \"사내 모든 문서를 하나의 AI 워크스페이스로\", 테스트 CTA, 소개서 다운로드 | 가치 제안과 전환 유도 |\n| 제품 시연 패널 | 카테고리 선택, 생성된 문서 초안, 전체 화면 편집하기 | 기능 이해 보조 |\n| 지표 | 도입 기업 120+곳, 처리 시간 `-68%`, CS 응답 `-55%` | 신뢰 확보 |\n| 서비스 | 정책·규정 생성, 계약서 템플릿, CS 스크립트 추천 | 기능 소개 |\n| 전문가 연동 | 법률 자문 워크플로우, 규정 변경 모니터링 | 확장 서비스 |\n| 내부 운영팀 | 역할별 접근 권한, 버전 관리, 승인·알림 | 사내 협업 시나리오 |\n\n### 공개 연결 화면\n\n| 경로 | 공개 상태 | 화면/기능 단서 |\n| --- | --- | --- |\n| `/dashboard.html` | `200 OK` | `시온 프로세스 대시보드`, AI Studio, 데이터 관리, 면접 안내, 메뉴얼 관리 링크; 직군별 면접/업무 단계 및 메뉴얼 구조 |\n| `/admin.html` | `200 OK` | 관리 화면 HTML이 비로그인 응답 |\n| `/app/` | `200 OK` | React 앱 엔트리, 타이틀 `HutechC 사내 Studio` |\n| 앱 번들 | 공개 | 업무일지, 사내업무지침, 채용관리, 출퇴근 관리, 미팅 관리, 규정관리, 면접대시보드 등의 라우트/문구 |\n\n### 추정 사용자 흐름\n\n```text\n랜딩\n  -> AI Studio (/app/) -> 로그인 기반 사내 앱\n  -> 대시보드 (/dashboard.html) -> 데이터 관리 / 면접 안내 / 메뉴얼 관리\n  -> 페이지 내 소개 섹션 탐색\n```\n\n`/app/` 번들에는 `/api/auth/me`, `/api/auth/login`, `/api/auth/logout` 호출이 존재하므로 앱 영역은 인증 흐름을 고려해 개발된 것으로 판단된다. 반면 정적 대시보드와 관리 경로는 별도 방어 없이 공개 응답한다.\n\n## 4. 로그인 후 내부 화면 분석\n\n### 전체 메뉴 구조\n\n로그인 후 화면은 좌측에 업무 도메인별 메뉴가 길게 배치되고 우측에 선택 화면이 표시되는 포털 구조이다. 관찰된 그룹과 하위 메뉴 수는 다음과 같다.\n\n| 그룹 | 메뉴 수 | 대표 메뉴 |\n| --- | ---: | --- |\n| 업무 | 9 | 사내업무지침, 업무 총괄, 업무 자료, 업무일지, 서약서, 레슨플랜, 매뉴얼 리스트 |\n| 채용/인사 | 3 | 채용관리, 출퇴근 관리 A/B |\n| 학생관리 | 1 | 학생관리 |\n| 관리/운영 | 11 | 거래처 아웃콜, 사진모음, 미팅, 강의시간표, 미수금관리, 관리자통합, 거래처관리, 프로젝트관리 |\n| 규정 | 8 | 규정 통합, 규정관리, 규정편집, 규정 레이아웃, 규정매뉴얼, 평가기준 |\n| 서식/확인서 | 1 | 서식/확인서 |\n| 출강관리 | 2 | 출강강사관리, 거래처관리(출장) |\n| 기획/업무기획 | 5 | 업무 분류, 강사커리, 마케팅, 프롬사용법, AI 강의안 |\n| 커뮤니티 / 홈페이지 | 2 | 커뮤니티, 홈페이지 |\n| 대체·이전 메뉴 | 7 | 업무일지/사내지침/면접 관련 이전 화면의 대체 링크 |\n\n메뉴의 범위는 문서 자동화보다 훨씬 넓다. 이 시스템은 사내 지식·규정, 일상 업무, 인사/채용, 운영 관리, 사이트 관리까지 합쳐진 업무 포털로 분류하는 편이 정확하다.\n\n### 대표 화면별 구조\n\n| 화면 | 관찰된 기능 구조 | 분석 |\n| --- | --- | --- |\n| 업무일지 `/app/work-log` | 직원 선택, 오늘/주간/캘린더/리스트 전환, 추가·편집, 엑셀/워드/이미지 내보내기, 업무 목록 | 반복 업무 기록과 공유 산출물을 동시에 다루는 직원 작업 화면 |\n| 업무 총괄 `/app/work-hub` | 공지·업무지시·메모·파일·프로세스·보고 분류, 역할·담당자·부서 필터, 검색, 진행·날짜·액션 열 | 관리자/리더가 여러 부서의 업무 흐름을 한 표에서 점검하는 구조 |\n| 사내업무지침 `/app/company-guidelines` | 새 지침, 프롬프트, 업무지침/사내규정, 규정 수준, 형식·부서 필터 | 문서 저장소뿐 아니라 AI 작성 지침을 함께 관리하는 정책 허브 |\n| 채용관리 `/app/recruitment` | 지원서 작성, 면접 입력, 면접 대시보드, 강사 평가, 지원자 리스트, 채용 관련 규정/설명 | 지원 접수부터 면접·평가까지 개인정보를 다루는 흐름 |\n| 규정 통합 `/app/rules` | 사용자·관리자·총괄자 관점, 리스트/프레임/업무 설계 전환, 규정 섹션 관리 | 규정 내용과 업무 설계 원칙을 함께 관리하는 편집형 화면 |\n| 매뉴얼 리스트 `/app/manual-list` | 제목 검색, 문서 종류, 부서, 고용형태, 직군 필터, 분류별 열 | 역할별 교육/업무 자료를 탐색하는 분류 중심 저장소 |\n| 관리자 통합 `/app/admin-system` | 모듈, AI Actions, Work Order, Site Contents, 플러그인, 가격 정책, 워크플로우, 권한/역할, 새 사이트 생성 | 운영 설정과 신규 사이트 생성이 집중된 고권한 화면 |\n| 출퇴근 관리 `/app/attendance` | 직원 목록, 근무 규정/계획, 기록 요약, 조회·추가·수정·삭제·내보내기, 상태 필터 | 개인 근무 데이터를 다루는 인사 기능으로 엄격한 권한·감사가 필요 |\n\n### 로그인 후 사용자 흐름\n\n```text\n로그인\n  -> 업무일지에서 오늘 업무 기록/확인\n  -> 업무 총괄에서 부서별 진행 현황 점검\n  -> 사내업무지침 / 규정 / 매뉴얼에서 기준 문서 조회·관리\n  -> 채용관리 / 출퇴근 관리에서 인사 업무 처리\n  -> 관리자 통합에서 플랫폼·사이트·권한 설정\n```\n\n로그인 세션에서 `/api/auth/me`는 인증된 사용자 정보를 반환했다. 값은 수집하지 않았으나 사용자 표시 정보와 `tier`, `status` 성격의 속성이 존재하고 명시적인 `role` 필드는 확인되지 않았다. 고권한 기능이 많은 만큼 권한 판단을 화면 표시가 아니라 서버 측 세부 권한으로 검증할 필요가 있다.\n\n## 5. UX 평가\n\n### 강점\n\n| 항목 | 평가 |\n| --- | --- |\n| 첫 화면 전달력 | 문서 자동화의 대상과 기대 효과가 히어로 영역에서 바로 이해된다. |\n| 시각 계층 | 넓은 여백, 짙은 텍스트, 보라색 CTA로 주요 행동이 분명하다. |\n| 기능 설명 | 문서 생성 패널의 축소 표현이 추상적인 AI 문구를 업무 장면으로 바꿔 준다. |\n| 섹션 구성 | 서비스, 전문가 연동, 내부 운영이라는 메시지 확장이 자연스럽다. |\n| 내부 업무 범위 | 기록, 기준 문서, 인사, 운영 설정까지 실제 조직 업무를 폭넓게 수용한다. |\n\n### 개선 필요\n\n| 문제 | 영향 | 개선 방향 |\n| --- | --- | --- |\n| 외부 홍보형 랜딩과 사내 운영 도구가 같은 진입점에 함께 노출됨 | 실제 사용자에게 사이트 목적과 접근 범위가 혼동될 수 있음 | 공개 소개 사이트와 사내 업무 포털의 도메인·내비게이션·인증 경계를 분리 |\n| `로그인` 버튼이 동작 링크 없이 버튼 요소로만 표현됨 | 사용자가 인증 진입을 찾지 못하거나 비활성 기능으로 인식 | 명확한 로그인 URL 연결 및 실패/권한 안내 제공 |\n| 소개서 다운로드, 약관, 개인정보 처리방침, 문의하기 링크가 `#` 또는 동작 미확인 | 신뢰 메시지를 약화시키고 법적 고지 동선이 불완전 | 실제 문서/문의 경로 연결, 배포 전 링크 검증 |\n| 지표의 출처·기간이 표시되지 않음 | 내부 승인 또는 외부 제안 자료로 사용할 때 신뢰 검증 불가 | 집계 기준과 기준일 또는 사례 근거 표시 |\n| `메뉴얼` 표기 | 문서 품질 일관성 저하 | 전반적으로 표준 표기 `매뉴얼` 적용 |\n| 로그인 후 메뉴가 약 49개 경로로 확장되고 이전/대체 메뉴가 함께 노출됨 | 담당 업무를 찾기 어렵고 기존 화면을 잘못 사용할 가능성 | 역할별 기본 메뉴, 즐겨찾기, 이전 메뉴 숨김 또는 별도 보관함 제공 |\n| 업무 문서, 인사 데이터, 플랫폼 설정이 같은 내비게이션 층위에 있음 | 권한 범위가 불명확하고 고위험 작업으로의 접근이 쉬움 | 일반업무·인사·시스템관리 영역을 권한과 시각 구조 모두에서 분리 |\n| 내부 화면에 추가·편집·삭제·내보내기가 폭넓게 배치됨 | 실수나 과다 권한으로 정보 변경·반출 가능 | 동작별 권한, 삭제 확인/복구, 내보내기 감사 기록 적용 |\n\n## 6. 기능 및 운영 평가\n\n랜딩에서 제시하는 제품 범위는 정책·계약·CS 문서 생성, 전문가 검토, 승인·이력 관리까지 넓다. 로그인 후에는 채용, 출퇴근, 업무일지, 규정, 매뉴얼, 관리자 시스템까지 실제 화면 구조로 확인된다. 즉 현재 사이트는 단일 문서 AI 도구보다 사내 운영 포털이자 일부 플랫폼 관리 콘솔에 가까운 범위를 가진다.\n\n이 범위를 유지한다면 홈의 메시지도 다음 두 사용자군을 구분해야 한다.\n\n| 사용자군 | 필요한 첫 행동 | 제안 |\n| --- | --- | --- |\n| 일반 직원/관리자 | 맡은 업무와 승인 항목으로 진입 | 로그인 후 개인 대시보드를 기본 진입점으로 제공 |\n| 서비스 소개 방문자 | 제품 이해와 문의 | 별도 공개 랜딩에서 데모·문의·소개 자료 제공 |\n| 시스템 관리자 | 권한·워크플로우·사이트 설정 | 별도 관리자 진입점, 추가 인증, 변경 감사 제공 |\n\n## 7. 보안 및 기술 관찰\n\n### 즉시 검토가 필요한 사항\n\n| 우선순위 | 관찰 사실 | 위험 |\n| --- | --- | --- |\n| Critical | 인증 없이 `/api/interviews`가 `200 OK`, `application/json`, 본문 길이 `1789`로 응답 | 면접 관련 데이터가 노출될 가능성이 높음. 개인정보 또는 평가 정보라면 즉시 사고 대응 대상 |\n| High | 인증 없이 `/admin.html`, `/dashboard.html`이 `200 OK`로 응답 | 내부 메뉴·업무 구조 노출 및 관리 기능 접근 가능성 |\n| High | 응답에 `Access-Control-Allow-Origin: *`가 표시됨 | 인증/데이터 API와 결합될 경우 외부 오리진에서 데이터 접근 범위 확대 가능 |\n| Medium | 서비스가 공인 도메인 HTTPS가 아닌 IP 기반 HTTP로 제공됨 | 로그인 또는 업무 데이터가 오간다면 전송구간 보호와 신뢰성 부족 |\n| High | 인증 후 화면에 채용·출퇴근·거래처·관리자 통합 기능이 함께 존재함 | 개인정보·경영정보·플랫폼 설정이 한 앱에 집약되어 권한 오설정의 영향이 큼 |\n\n`/api/auth/me`는 본문 길이 4의 `200 OK`를 반환했고, 이는 비로그인 상태 표현일 수 있다. 그러나 `/api/interviews`처럼 데이터성 엔드포인트가 별도로 본문을 반환하는 점은 인증 적용 범위를 엔드포인트별로 전수 점검해야 함을 의미한다.\n\n### 권고 조치\n\n1. `/api/interviews`를 포함한 전체 `/api/*`에 서버 측 인증·권한 미들웨어를 적용하고 접근 로그를 확인한다.\n2. 면접·인사·출퇴근·업무일지 데이터가 공개 응답된 적이 있는지 로그와 실제 데이터 종류를 점검하고, 필요 시 노출 대응 절차를 수행한다.\n3. 공개 랜딩과 사내 운영 앱을 별도 호스트 또는 최소 별도 인증 게이트로 분리한다.\n4. CORS를 허용 오리진 목록으로 축소하고 쿠키/세션 설정(`Secure`, `HttpOnly`, `SameSite`)을 검토한다.\n5. HTTPS 도메인으로만 사내 앱을 제공하고 HTTP 접근은 리다이렉트한다.\n6. 채용·출퇴근·거래처·관리자 시스템은 기능 단위 권한과 조회/내보내기/변경 감사 로그를 적용한다.\n7. 사이트 생성, 권한/역할, 플러그인, 가격 정책 등 관리자 통합 기능에는 추가 인증 또는 관리자 전용 네트워크 정책을 검토한다.\n\n## 8. 개선 우선순위\n\n| 단계 | 조치 | 기대 결과 |\n| --- | --- | --- |\n| P0 | 데이터 API와 관리 화면 접근 통제, 로그 조사, HTTP 차단 계획 수립 | 개인정보·사내정보 노출 위험 축소 |\n| P1 | 공개 소개 페이지와 내부 앱 진입 분리, 로그인/권한 UX 정리 | 사용 목적과 접근 경계 명확화 |\n| P1 | 인사·운영·시스템관리의 역할별 RBAC 및 감사로그 적용 | 고위험 데이터/설정 오남용 방지 |\n| P1 | 약관·개인정보·문의·다운로드 링크 실제 연결 | 서비스 신뢰성과 운영 완결성 강화 |\n| P2 | 역할별 내비게이션과 이전 메뉴 정리 | 기능 범위가 넓어진 포털의 탐색성 및 안전성 개선 |\n| P2 | 지표 근거, 용어, 콘텐츠 품질 정비 | 의사결정·제안 자료로 재사용 가능 |\n\n## 9. 후속 확인 항목\n\n- 다른 계정 등급/역할별 실제 메뉴와 읽기·쓰기·내보내기 권한 차이\n- `/api/*` 전체 엔드포인트의 인증/인가 및 데이터 민감도\n- `admin.html`과 대시보드 내 쓰기 작업의 서버 측 권한 검사\n- 채용·출퇴근·거래처·관리자 통합 화면의 접근 로그 및 변경 감사 수준\n- 모바일/소형 화면에서 헤더 CTA와 대시보드 사용성\n- 공개 사이트로 유지할 콘텐츠와 내부 전용 콘텐츠의 최종 분류\n\n## 10. 근거\n\n- 2026-05-26 직접 조회: `http://54.116.15.136:81`, `/dashboard.html`, `/admin.html`, `/app/`\n- 2026-05-26 본문 미열람 상태 응답 확인: `/api/auth/me`, `/api/interviews`\n- 2026-05-26           "date": "2026-05-28",
          "content": "# 타임스미디어 인트라넷 홈페이지 분석\n\n## 1. 분석 개요\n\n| 항목 | 내용 |\n| --- | --- |\n| 대상 | 타임스미디어 인트라넷 |\n| 주소 | `https://gw.timestesol.com/` |\n| 확인일 | 2026-05-26, 로그인 이후 HTML 추가 분석 2026-05-28 |\n| 분석 범위 | 비로그인 리다이렉트와 로그인 화면, 응답 헤더, `timetesol_source`의 로그인 이후 HTML 55개 |\n| 확인 경로 | `/`, `/login.php`, 로그인 이후 스냅샷 HTML |\n| 캡처 | [times-login.png](../../.captures/times-login.png) |\n\n초기 주소는 JavaScript로 `/login.php`로 이동시킨다. 최초 분석 시에는 계정이 없어 로그인 이후 기능을 확인하지 못했으나, 이후 `timetesol_source` 폴더에 저장된 로그인 이후 화면 HTML을 기준으로 전체 인트라넷의 목적과 주요 업무 기능을 추가 분석했다.\n\n소스 HTML에는 실제 운영 데이터로 보이는 학생, 직원, 거래처, 회계, 미팅 내용 일부가 포함되어 있다. 본 문서는 개별 개인정보나 민감 업무 내용을 재기재하지 않고, 화면 구조와 기능 관점으로만 요약한다.\n\n## 2. 한줄 진단\n\n타임스미디어 인트라넷은 교육기관 운영에 필요한 학생 모집/상담, 수강·회계, 근태, 전자결재, 공지, 온라인 협업, 출강, 홈페이지 운영을 한곳에 모은 내부 업무 포털이다. 기능 범위는 넓지만, 화면 구조는 고정폭 테이블·팝업·레거시 JavaScript 중심이라 검색성, 반응형 UX, 보안, 개인정보 보호, 유지보수성 개선이 필요하다.\n\n## 3. 사이트 목적\n\n이 사이트의 핵심 목적은 타임스미디어 및 관련 교육 브랜드의 일상 운영을 내부 직원과 강사가 처리하도록 돕는 그룹웨어/학원관리 통합 시스템이다. 단순 사내 게시판이 아니라 다음 업무를 한 시스템 안에서 연결한다.\n\n| 목적 | 설명 |\n| --- | --- |\n| 교육 상품과 수강생 운영 관리 | 테솔, 번역사, ICS, 국제학교, 기타 과정의 상담·예약·등록·졸업·환불·연기 이력을 조회하고 관리한다. |\n| 회계 및 납부 상태 관리 | 입학금, 수업료, 납부 여부, 현금영수증, 환불/연기/전출, 회계 데이터와 센터 데이터의 비일치 여부를 확인한다. |\n| 조직 내부 업무 통제 | 직원 근태, 일일 업무일지, 거래처, 사내정보, 전자결재, 문서보관함을 운영한다. |\n| 센터/팀 간 커뮤니케이션 | 전체공지, 본부/팀별/센터별/업무별 공지, 자유게시판, 사진 게시판, 온라인미팅으로 업무 지시와 확인 댓글을 주고받는다. |\n| 대외 채널 운영 지원 | 홈페이지 팝업, 접속통계, 신청서 관리, 확인서 발급 요청, 출강 거래처/강사 관리를 처리한다. |\n| 자격/시험 운영 | ITT 시험관리와 확인서 발급, Certi 통합 관리를 통해 시험·자격·수료 관련 후속 업무를 지원한다. |\n\n## 4. 관찰된 진입 및 공통 구조\n\n### 접근 흐름\n\n```text\nhttps://gw.timestesol.com/\n  -> JavaScript location.href='/login.php'\n  -> 역할 선택(Staff / Teacher)\n  -> ID / PW 입력\n  -> /wl/mbr/lgnRgtr.php POST\n  -> 로그인 이후 /sbMn.php?... 기반 메뉴 화면\n```\n\n로그인 화면의 폼 반환 경로 주석과 이후 HTML을 종합하면, 로그인 후에는 `sbMn.php`가 `pgNm`, `menu`, `submenu` 파라미터로 각 업무 화면을 라우팅하는 구조다. 공통 레이아웃은 상단 사용자 영역, 메뉴/회원 검색, 1차 GNB, 좌측 서브메뉴, 본문, 우측 또는 하단 연락처/내선번호 정보로 구성된다.\n\n### 로그인 화면 구성\n\n| 영역 | 관찰 내용 | 평가 |\n| --- | --- | --- |\n| 브랜드 | `TIMES MEDIA` 로고 이미지 | 회사 식별은 가능 |\n| 안내 문구 | `Sign up the ID&Password` | 로그인 화면의 용도와 맞지 않고 문장도 어색함 |\n| 구분 | `Staff`, `Teacher` 라디오 버튼, Staff 기본 선택 | 사용자군 구분은 명확 |\n| 입력 | ID, PW 및 Login 버튼 | 최소 인증 흐름 제공 |\n| 알림 | `접속IP위치 수집중입니다.` | 수집 목적·범위·고지 의미가 불명확 |\n\n화면은 약 552px 폭의 이미지와 테이블 기반 패널이 큰 단색 배경 중앙에 놓인다. 데스크톱에서는 사용할 수 있으나 모바일·고해상도 환경에서 콘텐츠 크기와 가독성이 충분하지 않다.\n\n### 로그인 이후 공통 요소\n\n| 영역 | 관찰 내용 | 의미 |\n| --- | --- | --- |\n| 사용자/권한 영역 | 로그인 사용자명, `[관리자]`, `[쪽지팝업창]`, `[일일콜리스트]`, `[사내SMS]`, `[info관리자]`, `Log-out`, `My page`, `칭찬/벌점`, `강사관리` | 운영자 권한, 메시지, 콜 업무, SMS, 강사관리로 바로 접근하는 내부 운영 허브 |\n| 통합 검색 | `메뉴`와 `회원` 검색 타입, 메뉴검색 자동완성 형태 | 기능 수가 많아 메뉴/회원 검색이 핵심 탐색 수단으로 보임 |\n| 좌측 메뉴 | 선택된 1차 메뉴의 하위 기능을 패널 형태로 노출 | 각 업무 영역 안에서 다시 세부 업무를 선택 |\n| 연락처/내선 | 본사, 센터, 부서 내선번호 반복 노출 | 전화 기반 협업이 강한 조직 운영 환경 |\n| 도움말 링크 | 각 페이지 `페이지 도움말` 링크 | 기능별 매뉴얼 체계가 있었거나 계획된 흔적 |\n\n## 5. 로그인 이후 정보 구조\n\n상단 GNB 기준 11개 1차 메뉴가 확인된다.\n\n| 1차 메뉴 | 하위 메뉴 | 업무 성격 |\n| --- | --- | --- |\n| 학생관리 | 테솔, 테솔(이전자료), 회계관리, Certi관리, 번역사, ICS, 기타 | 수강생/상담/등록/수료/회계 데이터 관리 |\n| 일정관리 | 일정관리, 보고서관리, 국제학교시간표, 레슨플랜, 메일/웹하드 | 일정, 교육 계획, 보고서, 외부 도구 연결 |\n| 업무관리 | 업무일지작성, 업무일지확인, 거래처관리, 근태관리, 사내정보, 일일업무개별조회 | 직원 업무와 출퇴근, 거래처, 사내 구성원 정보 |\n| 전자결재 | 결재할 문서, 수신된 문서, 기안하기, 기안진행상태, 결재진행상태, 종류별 문서, 문서보관함 | 내부 승인, 지출결의, 문서 양식과 보관 |\n| 서식자료 | 서식관리, 디자인물 | 업무 문서/디자인 자료 게시판 |\n| Community | 전체공지, 본부 팀별공지, 전국 센터별공지, 전국 업무별공지, 자유게시판, 사진-이모저모, Q&A | 전사/센터/팀 커뮤니케이션 |\n| 온라인미팅 | 참여중인미팅, NEW미팅/NEW프로젝트, 리스트, 온라인미팅 검색, 종료된 미팅, 보관함, 참여중인프로젝트, 진행중인프로젝트 | 댓글 기반 업무 회의, 프로젝트, 파일 공유, 완료 관리 |\n| 확인서발급관리 | 국통, 테솔, ITT | 수상실적, 수강/수료, ITT 관련 확인서 요청/발급 관리 |\n| 출강관리 | 출강강사관리, 거래처관리 | 외부 출강 강사와 거래처 관리 |\n| 홈페이지관리 | 팝업관리, 접속통계, 신청서관리 | 대외 홈페이지 운영과 신청 데이터 확인 |\n| ITT관리 | 통역 시험관리 | ITT 시험, 문제, 응시자, 결과 관리로 확장 가능한 구조 |\n\n## 6. 주요 기능 상세 분석\n\n### 학생관리\n\n학생관리 영역은 인트라넷의 핵심 업무로 보인다. `테솔`, `번역사`, `ICS`, `기타` 화면은 공통적으로 상담/예약/등록 상태를 검색하고 목록으로 관리하는 구조이며, `회계관리`와 `Certi통합관리`가 후속 회계·수료 업무를 맡는다.\n\n| 기능 | 관찰된 항목 | 해석 |\n| --- | --- | --- |\n| 과정별 학생 조회 | 테솔, 번역사, ICS, 기타 | 교육 상품 또는 사업부별 학생 DB를 분리 조회 |\n| 상담/예약 관리 | 첫상담, 최종상담, 최종상담인, 예약상태, 예약일, 고민상담 | 문의자 유입부터 등록 전 상담 상태를 추적 |\n| 학사 상태 관리 | 졸업여부, 졸업자 포함, 강좌분류, 세부강좌, 기수/개강일 | 수강생을 강좌·기수·센터 단위로 관리 |\n| 납부 관리 | 입학금, 수업료, 모든 납부금, 납부여부, 현금영수증 | 학생 상태와 회계 상태가 직접 연결됨 |\n| 예외 상태 관리 | 환불자, 연기자, 전출자, Fail자, 입학금 납부 후 미등록자 | 운영 리스크가 큰 케이스를 별도 필터링 |\n| 통계/검증 | 입학인원, 졸업인원, 수업료합계, 비일치, 교재비일치, 전형료비일치 | 센터 입력값과 회계/수료 데이터를 대조하는 관리 화면 |\n\n학생관리 화면은 단순 CRM이라기보다 학원 운영용 ERP에 가깝다. 상담 유입 경로, 강좌 분류, 납부, 졸업, 확인서/자격증 발급까지 연결되어 있어 데이터 정합성이 전체 운영 품질에 직접 영향을 준다.\n\n### 업무관리\n\n업무관리에는 직원 개인 업무 기록과 조직 운영 기능이 모여 있다.\n\n| 기능 | 관찰된 항목 | 해석 |\n| --- | --- | --- |\n| 업무일지작성 | 날짜별 업무 제목, 기간, 완료 여부, 저장 | 직원이 일 단위/기간 단위 업무를 기록 |\n| 업무일지확인 | 작성된 업무일지 확인 | 관리자나 상급자가 업무 진행을 검토 |\n| 근태관리(Timecards) | 출근/퇴근, 정상근무, 월2회근무, 추가근무, 대체근무, 탄력근무, 대체휴무, 공가, 연차, 반차, 결근, 비고 | 월간 캘린더형 출퇴근 및 근무 유형 관리 |\n| 거래처관리 | 거래처명, 담당자, 대표자, 연락처, 팩스, 주소, 메모, 분류 | B2B 제휴/외부 거래처 등록과 검색 |\n| 사내정보 | 센터, 직무, 직원 구분, 재직 상태, 키워드 검색 | 내부 인명/조직 정보 디렉터리 |\n| 일일업무개별조회 | 특정 사용자/일자 기준 업무 조회 | 개인별 업무 상태 추적 |\n\n근태 화면은 일반 출퇴근 기록뿐 아니라 추가근무, 출장, 탄력근무, 반차 등 예외 근무 규칙이 상세히 안내된다. 비정상 근무 유형에는 비고 입력을 요구하는 로직도 있어, 실제 인사/급여 또는 내부 평가 근거로 활용될 가능성이 높다.\n\n### 전자결재\n\n전자결재는 단순 결재함 이상의 문서 양식 기반 워크플로를 갖고 있다.\n\n| 기능 | 관찰된 항목 | 해석 |\n| --- | --- | --- |\n| 결재할 문서 | 기안자, 제목, 다음결재, 작성일, 결재자 필터 | 사용자가 처리해야 할 승인 업무 |\n| 수신된 문서 | 기안자, 제목 검색 | 참조/수신 문서 확인 |\n| 기안하기 | 결재구분, 결재라인, 수신처, 제목, 지출결의 금액/결제수단, 임시보관함, 결재올리기 | 내부 승인 문서 작성과 상신 |\n| 진행상태 | 기안진행상태, 결재진행상태, 종결/보류/반려 문서 | 작성자와 결재자 관점의 상태 추적 |\n| 문서보관 | 개인문서보관함, 개인보관함, 샘플 보관함, 종류별 문서 | 완료 문서 재사용/검색 |\n\n기안 양식에는 회의록, 업무진행 보고서, 사직서, 휴학신청서, 장학금 신청서, 성적표, 교육비 납입증명서, 재학증명서, 월별일정표, 강의결과보고서 등 교육기관 운영 문서가 포함된다. 지출결의는 금액과 결제수단 입력 검증, 증빙 보관 안내, 긴급 지출 사유 입력 같은 회계 통제 규칙을 포함한다.\n\n### 온라인미팅/프로젝트\n\n온라인미팅은 일반 화상회의 예약 기능이라기보다 비동기 업무 협업 게시판에 가깝다.\n\n| 기능 | 관찰된 항목 | 해석 |\n| --- | --- | --- |\n| 미팅 생성 | 미팅안건 생성, 종료예정일, 프로젝트 여부, 첨부파일, 미팅생성하기 | 안건 기반 협업 스레드 생성 |\n| 참여/초대 관리 | 초대한미팅, 초대된미팅, 참여중인미팅, 마감지난미팅 | 호스트/게스트 관계와 마감 관리 |\n| 검색/완료 처리 | 전체/초대한/초대된/마감지난/종료된 미팅, 호스트 검색, 선택 미팅 완료처리 | 많은 미팅 중 상태별 처리 |\n| 프로젝트 관리 | NEW 프로젝트, 프로젝트리스트, 초대한/초대된/완료 프로젝트, 진행중/보류중/완료 프로젝트 | 미팅보다 긴 단위의 업무 진행 관리 |\n| 기록 보관 | 종료된 미팅, 보관함, 내가 포함된 종료미팅 | 의사결정과 업무 확인 기록 보존 |\n\n저장된 목록에는 회계 확인, 센터별 등록현황, 자격증 신청 일정, 홍보물 제작, 홈페이지/인트라 오류 보고, 근태/인사 공유, 강좌 운영, 워크샵 등 실제 조직 운영 주제가 다수 포함되어 있다. 댓글로 확인 여부와 처리 결과를 남기는 방식이 주요 업무 프로세스로 보인다.\n\n### 일정관리\n\n일정관리 영역은 개인/조직 일정과 교육 운영 계획을 연결한다.\n\n| 기능 | 해석 |\n| --- | --- |\n| 일정관리 | 로그인 사용자 기준 오늘 일정 및 월/일정 조회 |\n| 보고서관리 | 정기 보고 또는 업무 보고 자료 관리 |\n| 국제학교시간표 | 국제학교 관련 시간표 운영 |\n| 레슨플랜 | 수업 계획 자료 관리 |\n| 메일/웹하드 | 외부 메일 또는 파일 보관 도구로 이동하는 링크성 기능 |\n\n### 서식자료와 Community\n\n서식자료와 Community는 게시판 엔진을 공유하는 형태다. 검색 조건으로 제목, 내용, 작성자 체크박스가 반복되며, 카테고리/하위 카테고리와 권한별 게시판이 다수 존재한다.\n\n| 영역 | 기능 |\n| --- | --- |\n| 서식관리 | 업무 서식의 분류별 등록/조회 |\n| 디자인물 | 홍보물·디자인 파일 갤러리 |\n| 전체공지 | 전사 공지 |\n| 본부 팀별공지 | 본부 또는 팀 단위 공지 |\n| 전국 센터별공지 | 강남, 강북, 부산 등 센터별 공지 |\n| 전국 업무별공지 | 테솔팀 등 업무/사업부별 공지 |\n| 자유게시판 | 일반 소통 |\n| 사진-이모저모 | 사진 기반 공유 게시판 |\n| Q&A | 질의응답 게시판 |\n\n### 확인서발급관리\n\n확인서발급관리는 국통, 테솔, ITT 관련 증명서/확인서 요청을 관리한다.\n\n| 기능 | 관찰된 항목 | 해석 |\n| --- | --- | --- |\n| 국통/테솔 | 수상실적확인서, 수강수료확인서 화면명 | 수상·수료 증빙 요청 처리 |\n| ITT | 결제수단, 기간, 상품 종류, 시험 종류, 등급, 사용자 ID, 구매자명 | ITT 관련 확인서 또는 결제/응시 정보 기반 발급 관리 |\n| 처리 상태 | 결제 여부, 발급 여부 | 발급 전 금액 수납과 발급 처리 상태를 함께 확인 |\n\n### 출강관리\n\n출강관리는 외부 기업/기관 교육 운영에 필요한 강사와 거래처 정보를 관리한다.\n\n| 기능 | 해석 |\n| --- | --- |\n| 출강강사관리 | 출강 강사의 기본정보, 연락처, 상세 정보 관리 |\n| 출강 거래처관리 | 외부 교육 고객사/기관의 담당자, 연락처, 주소, 메모 관리 |\n\n### 홈페이지관리\n\n홈페이지관리는 외부 웹사이트 운영을 내부에서 직접 제어하는 관리자 기능이다.\n\n| 기능 | 관찰된 항목 | 해석 |\n| --- | --- | --- |\n| 팝업관리 | 센터/과정 구분, 노출 여부, 제목, 이미지, 본문, 버튼명, 링크 URL, 새창/현재창, 노출 기간 | 홈페이지 홍보 팝업 생성/수정 |\n| 접속통계 | 통계 페이지 연결 | 방문/접속 현황 확인 |\n| 신청서관리 | 과정/센터/신청 조건 필터 | 홈페이지 신청서 데이터를 내부에서 확인하고 후속 처리 |\n\n### ITT관리\n\nITT관리 화면은 현재 `통역 > 시험관리`가 확인되며, 좌측 메뉴에는 문제관리, 응시자관리, 결과관리, 임시 문제관리 항목이 함께 노출된다. 시험 생성부터 문제, 응시자, 결과까지 관리하는 시험 운영 모듈로 확장되는 구조다.\n\n## 7. 사용자와 권한 추정\n\nHTML만으로 권한 정책을 확정할 수는 없지만, 화면 구조상 다음 사용자군을 가정할 수 있다.\n\n| 사용자군 | 사용 목적 |\n| --- | --- |\n| 본부/관리자 | 메뉴 관리, 공지, 전자결재, 회계 검증, 전체 학생/센터 데이터 확인 |\n| 센터 직원/매니저 | 학생 상담, 예약, 등록, 납부 확인, 센터 공지 확인, 온라인미팅 댓글 처리 |\n| 회계/행정 담당 | 입학금/수업료/환불/현금영수증/지출결의/증빙 관리 |\n| 강사팀/출강 담당 | 강사관리, 출강 강사와 거래처 관리 |\n| 홈페이지/마케팅 담당 | 팝업, 디자인물, 접속통계, 신청서, 홍보 관련 미팅 관리 |\n| 강사(Teacher) | 로그인 유형이 별도로 있으므로 강사 전용 기능 또는 제한된 조회/업무 기능이 있을 가능성 |\n\n상단에 `[관리자]`, `[info관리자]`, `[임원용 아이디]` 등이 노출된 스냅샷이 있어 분석 HTML은 높은 권한 계정의 화면일 가능성이 있다. 실제 Staff/Teacher별 접근 가능 메뉴는 별도 계정으로 검증해야 한다.\n\n## 8. 데이터와 업무 흐름 판단\n\n전체 기능은 다음과 같은 운영 흐름으로 연결된다.\n\n```text\n홈페이지/광고/상담 유입\n  -> 학생관리에서 문의자 등록, 상담, 예약상태 관리\n  -> 강좌/센터/기수 배정\n  -> 입학금/수업료 납부 확인 및 회계관리\n  -> 수업 일정, 레슨플랜, 강사/출강 관리\n  -> 업무일지와 온라인미팅으로 운영 이슈 처리\n  -> 전자결재로 지출/문서/보고 승인\n  -> 졸업, 수료, Certi, 확인서 발급\n  -> 통계/공지/자료/보관함으로 기록 유지\n```\n\n즉, 인트라넷은 교육기관의 프론트오피스(상담·신청), 백오피스(회계·결재·근태), 학사 운영(강좌·수료·증명), 내부 협업(공지·미팅)을 모두 포괄한다. 리뉴얼 시 단순 화면 개선보다 업무 데이터 모델과 권한 모델을 먼저 정리해야 한다.\n\n## 9. UX 평가\n\n### 유지할 요소\n\n| 요소 | 이유 |\n| --- | --- |\n| Staff/Teacher 구분 | 로그인 전 역할 선택이 실제 권한 분기에 필요할 수 있다. |\n| 메뉴/회원 통합 검색 | 메뉴 수가 많아 빠른 탐색에 필수적이다. |\n| 좌측 업무별 서브메뉴 | 레거시 구조지만 사용자가 업무 영역 안에서 위치를 파악하기 쉽다. |\n| 상태별 필터와 대량 검색 | 학생/회계/미팅 데이터가 많아 운영 효율에 필요하다. |\n| 온라인미팅의 댓글 기반 이력 | 전화/메일로 흩어질 업무 확인을 시스템 안에 남긴다. |\n| 전자결재와 문서보관함 | 내부 통제와 기록 보존 관점에서 중요한 축이다. |\n\n### 문제와 개선 방향\n\n| 문제 | 영향 | 개선 방향 |\n| --- | --- | --- |\n| 테이블·GIF 이미지 기반 고정폭 화면 | 모바일 대응, 확대, 접근성, 리브랜딩이 어렵다 | 시맨틱 HTML과 반응형 레이아웃으로 재구축 |\n| `non-responsive.css`와 1200~1280px 고정폭 화면 | 노트북/태블릿/모바일 사용성이 낮음 | 업무 테이블은 가로 스크롤/컬럼 설정, 상세 패널 분리 적용 |\n| 메뉴가 11개 1차 메뉴와 다수 하위 메뉴로 과밀 | 신규 직원이 기능을 찾기 어렵고 실수 가능 | 역할별 홈, 즐겨찾기, 최근 사용 메뉴, 업무별 검색 강화 |\n| 팝업창과 `alert()/confirm()` 의존 | 흐름 단절, 접근성 저하, 브라우저 정책 변화에 취약 | 모달/토스트/인라인 검증으로 전환 |\n| 같은 게시판/검색 UI 반복 | 유지보수 비용 증가 | 공통 리스트/검색/필터 컴포넌트화 |\n| 개인정보와 운영 데이터가 목록에 과다 노출 | 권한 오남용 및 유출 리스크 | 컬럼 마스킹, 권한별 컬럼 제한, 접근 로그 강화 |\n| 온라인미팅 목록에 장문 내용이 직접 노출 | 탐색성이 떨어지고 민감 내용이 넓게 노출 | 요약/상태/담당자 중심 목록, 상세는 권한 확인 후 표시 |\n| 로그인 문구와 역할 선택 UI가 낡음 | 신뢰도와 사용성 저하 | 명확한 한글 로그인 문구, 계정 복구/문의 동선 제공 |\n| 접속 IP 위치 수집 문구가 불명확 | 개인정보 처리 투명성 문제 | 수집 항목, 목적, 보유기간, 개인정보처리방침 링크 안내 |\n\n## 10. 보안 및 기술 관찰\n\n| 우선순위 | 관찰 사실 | 위험 또는 검토 이유 |\n| --- | --- | --- |\n| High | 응답 헤더가 `Apache/2.4.57 (Unix) OpenSSL/1.0.2k-fips PHP/5.2.17`과 `X-Powered-By: PHP/5.2.17`을 노출 | 노출된 버전이 실제 운영 구성이라면 매우 오래된 PHP/OpenSSL 사용 가능성이 있으며, 공격 표면 파악도 용이 |\n| High | 로그인 이후 HTML에 학생, 연락처, 회계, 미팅, 내부 계정 관련 내용이 포함됨 | 권한 통제, 다운로드/캐시/로그 보관 정책을 엄격히 점검해야 함 |\n| High | 일부 JavaScript에 SQL 구문 또는 상세 쿼리성 문자열이 클라이언트에 노출되는 흔적이 있음 | 서버 내부 구조 노출 및 접근 통제 설계 점검 필요 |\n| Medium | 세션 쿠키가 공개 응답에서 `PHPSESSID=...; path=/` 형태로 관찰됨 | `Secure`, `HttpOnly`, `SameSite` 속성이 응답에 보이지 않아 세션 보호 설정 점검 필요 |\n| Medium | 루트 이동이 HTTP 리다이렉트가 아닌 JavaScript 이동 | 스크립트 비활성 환경과 보안/모니터링 일관성에 불리 |\n| Medium | 레거시 AJAX, ActiveXObject 분기, 팝업 중심 UI가 다수 존재 | 구형 브라우저 호환 설계가 남아 있어 보안 업데이트와 현대 브라우저 정책 대응이 어려울 수 있음 |\n| Medium | 파일 첨부, 팝업 이미지 업로드, 문서/디자인물 자료실 기능 존재 | 업로드 파일 확장자, MIME, 악성 파일 검사, 저장 경로 접근 통제 점검 필요 |\n| Medium | 로그인 페이지가 접속 IP 위치 수집을 고지하지만 상세 설명/링크가 없음 | 개인정보 및 접속기록 처리 고지 검토 필요 |\n\n버전 문자열은 헤더에서 관찰한 값이며 실제 패치 상태를 확정하는 자료는 아니다. 다만 운영 서비스라면 서버 정보 노출 최소화와 지원 종료 구성 여부 확인이 즉시 필요하다.\n\n### 권고 조치\n\n1. 서버/PHP/OpenSSL 실제 버전과 보안 패치 상태를 확인하고, PHP 5.x가 실제 사용 중이라면 지원 버전으로 이전 계획을 최우선으로 세운다.\n2. 세션 쿠키 보안 속성, 로그인 시도 제한, 계정 잠금/추가 인증, 로그 보관 정책을 점검한다.\n3. 학생, 회계, 연락처, 온라인미팅 상세 내용에 대한 역할별 조회 권한과 컬럼 마스킹 정책을 재정의한다.\n4. 서버 버전 배너와 `X-Powered-By` 헤더 노출을 제거한다.\n5. 루트 접근은 서버 측 `302` 또는 인증 상태에 따른 안전한 라우팅으로 변경한다.\n6. 파일 업로드 기능은 확장자 허용목록, 바이러스 검사, 다운로드 권한, 저장소 분리, 실행 방지 설정을 점검한다.\n7. 로그인 화면 개편 시 개인정보 처리 안내 및 계정 복구 경로를 포함한다.\n\n## 11. 리뉴얼 우선순위\n\n| 단계 | 조치 | 기대 결과 |\n| --- | --- | --- |\n| P0 | 기술 스택·세션 보안·인증 로그 점검 및 노출 헤더 제거 | 침해 위험과 정보 노출 감소 |\n| P0 | 개인정보/회계/미팅 데이터 권한 매트릭스 작성 | 민감 데이터 접근 범위 명확화 |\n| P1 | 학생관리·회계관리 데이터 모델과 상태값 정리 | 상담-등록-납부-수료 흐름의 정합성 개선 |\n| P1 | 반응형·접근성 기반 로그인 및 공통 레이아웃 재구축 | 직원·강사 로그인과 기본 탐색 성공률 개선 |\n| P1 | 메뉴 IA 재정리: 역할별 홈, 즐겨찾기, 최근 업무, 통합 검색 | 기능 과밀로 인한 탐색 비용 감소 |\n| P1 | 전자결재/온라인미팅의 상태·담당자·마감 중심 UX 개선 | 미처리 업무와 지연 업무 파악 용이 |\n| P2 | 게시판/검색/목록/상세/첨부 공통 컴포넌트화 | 중복 UI와 유지보수 비용 감소 |\n| P2 | 홈페이지관리, 확인서발급, 출강관리 등 주변 모듈 개선 | 대외 운영 업무의 처리 속도와 추적성 개선 |\n| P3 | 레거시 팝업/ActiveX 대응 코드 제거 및 현대 브라우저 기준 재작성 | 장기 유지보수성과 보안성 향상 |\n\n## 12. 후속 확인 항목\n\n- Staff와 Teacher 로그인 후 제공 기능 및 권한 차이\n- 분석 스냅샷 계정의 실제 권한 수준과 일반 직원/강사 계정의 메뉴 차이\n- 학생관리의 핵심 상태값 정의: 문의, 상담, 예약, 등록, 납부, 졸업, 환불, 연기, 전출, Fail\n- 회계관리와 Certi관리의 데이터 원천 및 비일치 검증 로직\n- 온라인미팅의 알림 방식, 마감 처리 규칙, 댓글/첨부 보존 기간\n- 전자결재의 결재라인, 위임, 반려, 재기안, 증빙 보관 정책\n- 파일 업로드/다운로드 권한과 보안 검사 체계\n- 계정 복구, 비밀번호 정책, 추가 인증 적용 여부\n- 서버 실제 패치 수준과 세션 쿠키 설정\n- 모바일 브라우저 사용 비중과 로그인 실패 통계\n\n## 13. 근거\n\n- 2026-05-26 직접 조회: `https://gw.timestesol.com/`, `https://gw.timestesol.com/login.php`\n- 공개 로그인 HTML을 `EUC-KR` 기준으로 해석하여 문구와 폼 구조 확인\n- 초기 화면 렌더링 캡처: [times-login.png](../../.captures/times-login.png)\n- 2026-05-28 `timetesol_source` 폴더의 로그인 이후 HTML 55개 분석\n- 주요 분석 파일: `index.html`, `학생관리-테솔.html`, `학생관리-회계관리.html`, `학생관리-Certi통합관리.html`, `업무관리-근태관리.html`, `전자결재-기안하기.html`, `온라인미팅_NEW미팅,프로젝트.html`, `온라인미팅_초대된미팅.html`, `홈페이지관리_팝업추가_글쓰기.html`\n"

          "content": "# Work Studio 홈페이지 분석\n\n## 1. 분석 개요\n\n| 항목 | 내용 |\n| --- | --- |\n| 대상 | Work Studio |\n| 주소 | `http://54.116.15.136/` |\n| 확인일 | 2026-05-26 |\n| 분석 범위 | 공개 로그인 화면, 단일 페이지 HTML에 포함된 UI/기능 정의, API 응답 상태 |\n| 확인 경로 | `/`, `/api/form_templates` |\n| 캡처 | [work-login.png](../../.captures/work-login.png) |\n\n사이트는 로그인 패널 안에 테스트용으로 보이는 계정 정보를 직접 표시하고 있다. 해당 계정을 사용해 데이터를 열람하거나 변경하지 않았으며, 공개 HTML과 API의 본문 미열람 응답 상태만으로 분석했다.\n\n## 2. 한줄 진단\n\n여러 홈페이지의 접수·콘텐츠·프로젝트 현황을 한곳에서 운영하려는 관리 허브지만, 화면에 표시된 기본 관리자 계정과 비인증 API 응답은 현재 기능 개선보다 앞서 차단해야 하는 중대한 위험이다.\n\n## 3. 관찰된 사용자 경험\n\n### 로그인 화면\n\n검정 배경 중앙의 흰 카드에 `Work Studio`, `홈페이지 업무 관리`, 아이디/비밀번호 입력, 파란 로그인 버튼이 표시된다. 레이아웃은 단순하고 가독성이 좋지만 카드 하단에 `admin / admin`이 그대로 노출된다.\n\n### HTML에 포함된 애플리케이션 구조\n\n로그인 오버레이 뒤에 있는 UI와 스크립트에서 다음 메뉴·업무 구조가 확인된다. 이 내용은 공개된 프론트엔드 코드에 의한 기능 단서이며 권한별 실제 노출 여부는 별도 검증이 필요하다.\n\n| 메뉴 | 확인된 목적/기능 |\n| --- | --- |\n| 실행 | 오늘 미처리, 단계별/역할별/상태별 집계, 신청 현황 행동 중심 홈 |\n| 리스트 | 홈페이지별 신청/문의/견적 데이터 검색, 기간·상태 필터, 추가·수정·삭제, 메모 |\n| 신청서 | 접수 현황, 템플릿 편집, 역할별·단계별 신청서 모듈 관리 |\n| 분석 | 분포, 시계열, 피벗 등 분석 뷰 스타일/구현 단서 |\n| 콘텐츠 | 문제, 커리큘럼, 교재 추가·수정·삭제 |\n| 전체보기 | `p2-overview.html` 링크 |\n| AnalyzeAI | 외부 AI 통합 분석 플랫폼 링크 |\n| 홈생성 | `homepage-builder.html` 링크 |\n| 홈(old) | `/db/` React 앱 iframe 링크 |\n| 프로젝트 현황 | 별도 목록 UI 구현 단서 |\n\n### 관리 대상 범위\n\n프론트엔드 정의에서 확인되는 사이트 범위는 TESOL, AI 번역, 통독문서, AI 윤리, 전시/행사, 시험사이트, 전문가매칭, 레벨테스트, 휴텍씨, IITA협회, 반도체/조선/방산 등이다. 대상 업무 역시 문의·견적·번역신청·전문가지원·시험 결과·신청서 템플릿·교육 콘텐츠까지 넓다.\n\n### 추정 업무 흐름\n\n```text\n로그인\n  -> 실행 홈: 미처리/오늘 접수 파악\n  -> 홈페이지 또는 유형 선택\n  -> 리스트: 접수 건 상세 확인, 상태 전환, 메모, 편집\n  -> 신청서: 접수 폼 및 템플릿 구성\n  -> 분석: 분포/성과 확인\n  -> 콘텐츠: 문제·커리큘럼·교재 관리\n```\n\n## 4. UX 평가\n\n### 강점\n\n| 항목 | 평가 |\n| --- | --- |\n| 로그인 첫인상 | 불필요한 요소 없이 업무 시스템임을 바로 전달한다. |\n| 업무 중심 메뉴 | 실행, 리스트, 신청서, 분석, 콘텐츠가 운영자의 업무 순서와 대체로 맞는다. |\n| 데이터 처리 기능 | 검색·필터·상태 변경·메모·상세·페이지네이션 등 관리 도구에 필요한 기능이 폭넓게 정의돼 있다. |\n| 다사이트 통합 의도 | 여러 브랜드와 신청 유형을 공통 작업 공간에서 다룰 수 있는 방향은 운영 효율성이 높다. |\n\n### 개선 필요\n\n| 문제 | 영향 | 개선 방향 |\n| --- | --- | --- |\n| 메뉴와 관리 대상이 매우 많고 `홈(old)`, 샘플/외부 링크가 동일 사이드바에 존재 | 실제 운영 메뉴와 실험 기능의 구분이 어렵고 오작동 위험 | 운영 메뉴, 설정, 실험/도구를 구분하고 권한별로 노출 |\n| 56px 아이콘 사이드바와 작은 8~11px 텍스트 중심 UI | 장시간 관리·고해상도·접근성 환경에서 읽기 어렵다 | 펼침형 내비게이션과 본문 최소 글자 크기 상향 |\n| 다수 홈페이지·테이블·폼 모듈이 한 화면 모델에 묶임 | 신규 담당자의 학습 부담과 필터 오류 증가 | 사이트군/업무 유형별 작업 공간, 저장 필터, 담당자 큐 제공 |\n| 삭제·상태변경·템플릿 수정 기능이 폭넓게 포함 | 권한과 변경 이력이 약하면 운영 사고 가능 | 역할별 권한, 승인, 감사 로그, 복구 가능한 삭제 적용 |\n\n## 5. 보안 및 운영 위험\n\n### 즉시 조치 수준의 관찰\n\n| 우선순위 | 관찰 사실 | 위험 |\n| --- | --- | --- |\n| Critical | 로그인 카드에 `admin / admin`이 표시됨 | 누구나 관리자 계정으로 로그인 시도 가능 |\n| Critical | 공개 JavaScript에 `admin:{pw:\"admin\", n:\"관리자\", r:\"admin\"}` 및 `staff:{pw:\"staff\", ...}`가 포함됨 | 인증이 브라우저 코드와 `sessionStorage`만으로 이뤄져 우회가 가능하며 비밀번호가 공개됨 |\n| Critical | 비로그인 요청 `GET /api/form_templates`가 `200 OK`, JSON 본문 길이 `12122`로 응답 | 최소 템플릿 데이터가 인증 없이 반환되며 다른 API에서도 개인정보/운영 데이터 노출 가능성 |\n| High | HTML에 다수의 `POST`, `PUT`, `DELETE` API 호출 코드가 존재 | 서버 측 인가가 없다면 외부 사용자가 데이터 변경·삭제 가능 |\n| High | HTTP 제공 및 `Access-Control-Allow-Origin: *` 응답 | 평문 전송과 교차 출처 접근 범위로 위험 증폭 |\n\n### 반드시 먼저 수행할 조치\n\n1. 외부 접근을 즉시 제한하거나 유지보수 페이지로 전환하고 `admin/admin`, `staff/staff` 자격을 폐기한다.\n2. 브라우저 단 인증과 `sessionStorage` 기반 역할 판정을 제거하고 서버 세션 또는 검증된 인증 체계를 적용한다.\n3. 전체 `/api/*`에 인증·역할별 인가를 추가하고, 특히 신청서/문의/전문가/시험 관련 데이터가 외부에 노출되었는지 로그를 조사한다.\n4. 쓰기 API에 CSRF 방어, 입력 검증, 감사 로그, 삭제 복구 정책을 적용한다.\n5. HTTPS와 제한적 CORS 정책을 적용한 뒤에만 운영 접근을 허용한다.\n\n## 6. 제품·정보 구조 개선 방향\n\n보안 조치 후에는 시스템의 넓은 범위를 운영자가 이해하기 쉬운 구조로 줄이는 작업이 필요하다.\n\n| 영역 | 현재 단서 | 제안 구조 |\n| --- | --- | --- |\n| 작업 큐 | 실행 화면에서 미처리·단계·역할 집계 | `내 할 일`, `오늘 접수`, `기한 초과`, `승인 대기` 중심 홈 |\n| 사이트 관리 | 다수 홈페이지 칩/테이블 | 브랜드/서비스군 필터와 담당 범위 기본값 |\n| 접수 관리 | 리스트와 신청서 메뉴에 기능 분산 | `접수 처리`와 `양식 관리`를 명시적으로 분리 |\n| 콘텐츠 | 문제·커리큘럼·교재 CRUD | 교육 콘텐츠 권한이 있는 사용자에게만 독립 메뉴 노출 |\n| 실험 기능 | 홈(old), 홈페이지 생성, 외부 AnalyzeAI | 관리자 도구 또는 별도 개발 환경으로 분리 |\n\n## 7. 개선 우선순위\n\n| 단계 | 조치 | 기대 결과 |\n| --- | --- | --- |\n| P0 | 기본 계정 폐기, 사이트/API 접근 차단 및 노출 조사 | 관리자 탈취와 데이터 유출·변조 위험 즉시 감소 |\n| P0 | 서버 측 인증/인가, HTTPS, CORS 축소 | 운영 가능한 보안 경계 확보 |\n| P1 | 권한·감사로그·삭제 복구·변경 승인 도입 | 통합 관리 도구의 운영 안정성 확보 |\n| P2 | 정보 구조와 사이드바 재편, 글자 크기/접근성 개선 | 담당자 생산성 및 오류 방지 |\n| P2 | 실험·레거시 기능을 운영 화면과 분리 | 관리 화면의 신뢰성과 유지보수성 개선 |\n\n## 8. 후속 확인 항목\n\n- `/api/*` 전수 목록과 인증 없는 읽기/쓰기 가능 여부\n- API 데이터에 이름, 연락처, 지원서, 시험 결과 등 개인정보가 포함되는지 여부\n- 기존 접속 및 변경 로그 보존 여부와 사고 대응 필요성\n- 관리자·직원·콘텐츠 담당자 등 역할 정의와 요구 권한\n- 운영 대상 사이트 중 실제 사용 중인 사이트와 실험/폐기 대상 분류\n\n## 9. 근거\n\n- 2026-05-26 직접 조회: `http://54.116.15.136/`\n- 공개 HTML에서 로그인 문구, 클라이언트 계정 정의, 메뉴 및 API 호출 코드 확인\n- 2026-05-26 본문 미열람 상태 응답 확인: `GET /api/form_templates`의 `200 OK`, JSON 본문 길이 `12122`\n- 초기 화면 렌더링 캡처: [work-login.png](../../.captures/work-login.png)\n\n"

          "content": "# 3개 업무 시스템 통합 방안\n\n## 1. 문서 목적\n\n이 문서는 다음 3개 분석 문서를 바탕으로, 각 시스템의 역할을 하나의 통합 업무 플랫폼으로 재구성하는 방향을 설명한다.\n\n| 문서 | 대상 | 핵심 성격 |\n| --- | --- | --- |\n| [01-hutechc-internal-studio-analysis.md](./01-hutechc-internal-studio-analysis.md) | HutechC 사내 Studio | 현대적 사내 업무 포털, AI 문서/규정/업무지침, 채용·근태·관리 기능 |\n| [02-timesmedia-intranet-analysis.md](./02-timesmedia-intranet-analysis.md) | 타임스미디어 인트라넷 | 교육기관 운영 ERP, 학생·회계·근태·결재·공지·온라인미팅·출강·홈페이지 관리 |\n| [03-work-studio-analysis.md](./03-work-studio-analysis.md) | Work Studio | 여러 홈페이지의 접수·신청서·콘텐츠·프로젝트 현황을 관리하는 운영 허브 |\n\n통합의 목표는 기존 기능을 단순히 한 화면에 모으는 것이 아니다. 중복 기능을 정리하고, 핵심 업무 데이터 모델을 통일하며, 역할별 권한과 보안을 먼저 세운 뒤, 사용자가 매일 처리해야 하는 업무를 하나의 흐름으로 연결하는 것이다.\n\n## 2. 통합 결론\n\n3개 시스템은 다음처럼 역할을 나누어 통합하는 것이 적합하다.\n\n```text\n통합 업무 플랫폼\n  -> 공개 홈페이지/신청 채널\n  -> Work Studio: 접수·문의·신청서·콘텐츠 운영\n  -> Times 운영 코어: 학생·강좌·회계·수료·출강·확인서\n  -> HutechC Studio: 업무일지·규정·매뉴얼·AI 문서·채용·근태·관리자 콘솔\n  -> 공통 기반: 인증, 권한, 감사로그, 파일, 알림, 검색, 통계\n```\n\n가장 중요한 판단은 `타임스미디어 인트라넷`을 업무 데이터의 기준 시스템으로 삼는 것이다. 학생, 강좌, 납부, 수료, 출강, 확인서, 결재 등 교육기관 운영의 실제 원장이 이 시스템에 가장 많이 드러난다. 반면 `HutechC 사내 Studio`는 이 업무를 현대적인 UI와 AI 문서/규정/매뉴얼 체계로 감싸는 상위 포털 역할이 적합하다. `Work Studio`는 외부 홈페이지에서 들어오는 신청·문의·콘텐츠 관리를 담당하는 프론트오피스 운영 계층으로 분리하는 편이 맞다.\n\n## 3. 현재 시스템별 역할 재정의\n\n| 시스템 | 현재 강점 | 통합 후 역할 | 통합 시 주의점 |\n| --- | --- | --- | --- |\n| 타임스미디어 인트라넷 | 학생관리, 회계, 전자결재, 온라인미팅, 확인서, 출강 등 실제 운영 기능이 가장 풍부함 | 교육 운영 코어 시스템 | 레거시 PHP/테이블 UI, 개인정보 노출, 권한 재정비 필요 |\n| HutechC 사내 Studio | 현대적 UI, 업무일지, 업무 총괄, 규정/매뉴얼, AI 문서, 채용/근태, 관리자 기능 | 통합 포털과 지식/규정/AI 업무 계층 | 공개 경로/API 접근 통제와 관리자 기능 분리 필요 |\n| Work Studio | 여러 홈페이지의 신청·문의·템플릿·콘텐츠를 한곳에서 관리하려는 구조 | 접수/콘텐츠/홈페이지 운영 계층 | 기본 계정, 클라이언트 인증, 비인증 API 위험을 먼저 제거해야 함 |\n\n## 4. 목표 정보 구조\n\n통합 플랫폼의 1차 메뉴는 기존 시스템 이름이 아니라 사용자의 업무 목적 기준으로 재편해야 한다.\n\n| 통합 메뉴 | 포함 기능 | 출처 시스템 |\n| --- | --- | --- |\n| 오늘의 업무 | 내 할 일, 미처리 접수, 결재 대기, 마감 지난 미팅/프로젝트, 오늘 일정, 근태 상태 | HutechC, Times, Work |\n| 접수/문의 | 홈페이지 신청, 문의/견적, 신청서 템플릿, 사이트별 접수 현황, 담당자 배정 | Work Studio |\n| 학생/강좌 | 학생 검색, 상담, 예약, 등록, 강좌/기수, 졸업, Certi, ITT/ICS/번역사/테솔 관리 | Times |\n| 회계/납부 | 입학금, 수업료, 납부 여부, 환불/연기/전출, 비일치 검증, 현금영수증 | Times |\n| 일정/수업 | 일정관리, 국제학교 시간표, 레슨플랜, 강의시간표, 출강 일정 | Times, HutechC |\n| 업무/프로젝트 | 업무일지, 업무 총괄, 온라인미팅, 프로젝트, 공지, 메모, 파일 | HutechC, Times |\n| 전자결재/문서 | 기안, 결재함, 문서보관함, 지출결의, 종결문서 첨부 | Times, HutechC |\n| 규정/매뉴얼/서식 | 사내업무지침, 규정, 매뉴얼, 서식자료, 디자인물, AI 문서 생성 | HutechC, Times |\n| 인사/채용/근태 | 채용관리, 면접, 직원/강사 정보, 출퇴근, 근무 규정 | HutechC, Times |\n| 홈페이지/콘텐츠 | 팝업, 접속통계, 신청서 관리, 문제/커리큘럼/교재, 홈페이지 생성 | Work, Times |\n| 관리자 | 권한/역할, 메뉴, 워크플로우, 사이트 설정, 감사로그, API/연동 설정 | HutechC, Work |\n\n## 5. 핵심 데이터 모델 통합\n\n통합의 난이도는 UI보다 데이터 모델에 있다. 우선 다음 기준 엔티티를 정해야 한다.\n\n| 기준 엔티티 | 설명 | 우선순위 |\n| --- | --- | --- |\n| 사용자/User | 직원, 강사, 관리자, 회계, 센터 담당자, 마케팅 담당자 | P0 |\n| 조직/센터/부서 | 본부, 센터, 팀, 직무, 역할 | P0 |\n| 학생/문의자 | 홈페이지 신청자, 상담 대상자, 수강생, 졸업생 | P0 |\n| 강좌/기수 | 과정, 세부강좌, 센터, 개강일, 졸업일, 정원 | P0 |\n| 신청/문의 | 외부 홈페이지에서 들어온 폼 데이터, 견적, 상담 요청 | P1 |\n| 납부/회계 | 입학금, 수업료, 환불, 현금영수증, 비일치 상태 | P1 |\n| 업무/프로젝트 | 업무일지, 업무지시, 온라인미팅, 댓글, 마감, 담당자 | P1 |\n| 문서/결재 | 기안서, 결재라인, 문서 양식, 지출결의, 보관 문서 | P1 |\n| 규정/매뉴얼/서식 | 지침, 규정, 매뉴얼, 서식, 디자인물, AI 생성 문서 | P2 |\n| 파일/첨부 | 신청서 첨부, 미팅 파일, 디자인물, 결재 증빙 | P2 |\n\n기존 시스템의 데이터를 즉시 하나의 DB로 합치는 방식은 위험하다. 먼저 기준 ID와 상태값을 정의하고, 시스템 간 동기화 또는 읽기 전용 연동을 거친 뒤 단계적으로 마이그레이션해야 한다.\n\n## 6. 권한 통합 원칙\n\n3개 문서에서 공통적으로 가장 큰 위험은 인증·인가·민감 데이터 노출이다. 통합은 기능 개발보다 권한 모델을 먼저 설계해야 한다.\n\n| 역할 | 기본 접근 범위 |\n| --- | --- |\n| 최고관리자 | 시스템 설정, 권한, 감사로그, 전체 데이터 접근 |\n| 본부관리자 | 전체 학생/회계/결재/공지/프로젝트 조회와 승인 |\n| 센터관리자 | 소속 센터 학생, 상담, 납부, 일정, 공지, 미팅 |\n| 회계담당자 | 납부, 환불, 지출결의, 증빙, 비일치 검증 |\n| 강사/출강담당 | 강의 일정, 레슨플랜, 출강 정보, 제한된 학생 정보 |\n| 마케팅/홈페이지담당 | 신청서, 팝업, 콘텐츠, 접속통계, 디자인물 |\n| 일반직원 | 본인 업무일지, 공지, 미팅, 매뉴얼, 제한된 검색 |\n| 채용담당자 | 지원자, 면접, 평가, 채용 관련 문서 |\n\n권한은 메뉴 노출만으로 처리하면 안 된다. 모든 API와 다운로드, 내보내기, 삭제, 상태 변경, 결재 처리에 서버 측 권한 검사가 필요하다.\n\n## 7. 단계별 통합 로드맵\n\n### P0. 보안 경계 확립\n\n| 작업 | 설명 |\n| --- | --- |\n| 기본 계정 폐기 | Work Studio의 `admin/admin`, `staff/staff` 같은 공개 계정 제거 |\n| API 인증 적용 | `/api/*` 전체에 서버 측 인증과 역할별 인가 적용 |\n| 공개/내부 분리 | 공개 랜딩, 신청 폼, 내부 업무 앱, 관리자 콘솔의 접근 경계 분리 |\n| HTTPS/CORS/쿠키 정리 | HTTPS 강제, CORS 허용 목록 제한, `Secure`, `HttpOnly`, `SameSite` 적용 |\n| 감사로그 시작 | 로그인, 조회, 다운로드, 변경, 삭제, 결재, 권한 변경 로그 기록 |\n\n### P1. 업무 기준 모델 정리\n\n| 작업 | 설명 |\n| --- | --- |\n| 통합 용어사전 작성 | 학생, 문의자, 수강생, 기수, 납부, 예약상태, 졸업, 환불, 연기 등 정의 |\n| 상태값 표준화 | 접수, 상담, 예약, 등록, 납부, 수료, 환불, 보류, 완료 등의 공통 상태 정의 |\n| 사용자/조직 마스터 정리 | 직원, 강사, 센터, 부서, 직무, 역할의 기준 데이터 정리 |\n| 데이터 소유권 지정 | 학생/회계는 Times, 접수는 Work, 규정/매뉴얼은 HutechC처럼 기준 시스템 지정 |\n\n### P2. 통합 홈과 공통 UI 구축\n\n| 작업 | 설명 |\n| --- | --- |\n| 역할별 홈 | 내 할 일, 결재 대기, 오늘 접수, 미팅 마감, 업무일지, 일정 요약 제공 |\n| 공통 검색 | 학생, 회원, 메뉴, 문서, 미팅, 신청 건을 권한 범위 안에서 검색 |\n| 공통 리스트/필터 | 상태, 담당자, 센터, 기간, 사이트, 과정 필터를 표준 컴포넌트로 제공 |\n| 공통 상세 화면 | 개인정보 마스킹, 활동 이력, 첨부, 메모, 변경 로그를 일관되게 제공 |\n\n### P3. 기능별 단계 이전\n\n| 순서 | 이전 대상 | 이유 |\n| --- | --- | --- |\n| 1 | 접수/문의 관리 | Work Studio의 보안 위험을 줄이고 외부 유입을 통합 학생 흐름으로 연결 |\n| 2 | 학생/상담/강좌 조회 | Times의 핵심 데이터를 현대 UI에서 읽기 중심으로 먼저 제공 |\n| 3 | 업무일지/온라인미팅/프로젝트 | 일상 업무 협업을 하나의 할 일/마감 체계로 통합 |\n| 4 | 전자결재/회계 | 권한·감사로그가 안정된 뒤 고위험 승인/회계 기능 이전 |\n| 5 | 홈페이지/콘텐츠/팝업 | 운영 담당자 권한과 배포 승인 체계를 갖춘 뒤 통합 |\n| 6 | 관리자 콘솔 | 추가 인증과 변경 감사가 완성된 뒤 제한적으로 제공 |\n\n### P4. 레거시 정리\n\n| 작업 | 설명 |\n| --- | --- |\n| 중복 메뉴 제거 | 이전 메뉴, old 링크, 실험 기능을 운영 메뉴에서 분리 |\n| 팝업/alert 기반 UX 제거 | 모달, 토스트, 인라인 검증, 복구 가능한 삭제로 전환 |\n| 파일 관리 통합 | 첨부, 디자인물, 결재 증빙, 신청서 파일의 보관/권한/검사 체계 통일 |\n| 데이터 마이그레이션 | 검증된 기준 데이터부터 순차 이전하고 원본 시스템은 읽기 전용으로 전환 |\n\n## 8. 통합 후 대표 사용자 흐름\n\n### 홈페이지 신청에서 수강생 등록까지\n\n```text\n외부 홈페이지 신청\n  -> Work 계층에서 접수 생성\n  -> 담당 센터/직원 배정\n  -> 학생관리 후보로 전환\n  -> 상담/예약 상태 기록\n  -> 강좌/기수 배정\n  -> 입학금/수업료 납부 확인\n  -> 수강생 확정\n```\n\n### 일상 운영 흐름\n\n```text\n직원 로그인\n  -> 오늘의 업무에서 미처리 접수, 결재 대기, 마감 미팅 확인\n  -> 업무일지 작성\n  -> 온라인미팅 댓글/완료 처리\n  -> 필요한 규정/매뉴얼/서식 조회\n  -> 결재 또는 보고서 작성\n```\n\n### 수료/확인서 발급 흐름\n\n```text\n강좌 종료\n  -> 졸업/수료 상태 확인\n  -> 납부/미납/환불 예외 검증\n  -> Certi 또는 확인서 발급 요청\n  -> 발급 상태와 결제 상태 기록\n  -> 문서 보관\n```\n\n## 9. 통합 아키텍처 제안\n\n| 계층 | 역할 |\n| --- | --- |\n| Web/App | 역할별 통합 포털, 공개 신청 폼, 관리자 콘솔 |\n| API Gateway | 인증, 인가, CORS, 요청 로깅, 레이트 리밋 |\n| Auth/RBAC | 사용자, 조직, 역할, 세션, 2차 인증 |\n| Domain APIs | 학생, 접수, 회계, 업무, 결재, 문서, 콘텐츠, 홈페이지 관리 |\n| Audit/Log | 조회, 변경, 다운로드, 삭제, 결재, 권한 변경 기록 |\n| File Service | 첨부 저장, 악성 파일 검사, 다운로드 권한, 보존 정책 |\n| Search | 메뉴, 학생, 신청, 문서, 미팅 통합 검색 |\n| Legacy Adapter | 기존 Times/Work/HutechC 데이터 연동 및 단계적 이전 |\n\n초기에는 `Legacy Adapter`를 두고 기존 시스템을 그대로 읽어오는 편이 안전하다. 기능별 검증이 끝난 뒤에 도메인 API와 데이터베이스를 분리 또는 통합한다.\n\n## 10. 리스크와 대응\n\n| 리스크 | 대응 |\n| --- | --- |\n| 통합 범위가 너무 커져 프로젝트가 장기화됨 | P0/P1/P2를 별도 마일스톤으로 나누고, 읽기 전용 통합부터 시작 |\n| 기존 직원이 익숙한 레거시 화면을 잃음 | 초기에는 기존 화면 링크와 신규 화면을 병행하고, 사용량 기준으로 이전 |\n| 학생/회계 데이터 정합성이 깨짐 | 데이터 소유권을 먼저 정하고, 쓰기 기능은 기준 시스템 하나로 제한 |\n| 권한 설계가 느슨해짐 | 메뉴 권한이 아니라 API·필드·액션 권한으로 설계 |\n| 파일/첨부가 보안 취약점이 됨 | 파일 서비스 분리, 확장자 허용목록, 악성 파일 검사, 실행 방지 적용 |\n| 관리자 기능이 과다 노출됨 | 관리자 콘솔 분리, 추가 인증, IP 제한 또는 네트워크 제한 검토 |\n\n## 11. 우선 착수 과제\n\n1. `Work Studio`의 공개 기본 계정과 비인증 API를 즉시 차단한다.\n2. `HutechC 사내 Studio`의 공개 대시보드/API와 관리자 경로 접근 통제를 점검한다.\n3. `타임스미디어 인트라넷`의 PHP/세션/파일 업로드/권한 구조를 점검한다.\n4. 통합 사용자·조직·역할·권한 매트릭스를 작성한다.\n5. 학생/문의자/강좌/납부/업무/문서의 기준 데이터 모델을 정의한다.\n6. 첫 통합 화면은 `오늘의 업무`로 제한해, 미처리 접수·결재 대기·미팅 마감·업무일지·일정을 한 화면에 모은다.\n7. 이후 접수/문의 관리와 학생 조회를 연결하는 최소 기능부터 구현한다.\n\n## 12. 최종 방향\n\n최종 통합 플랫폼은 `업무를 처리하는 곳`, `규정과 문서를 찾는 곳`, `외부 신청을 내부 업무로 전환하는 곳`이 하나로 연결된 구조여야 한다. 단, 모든 기능을 한 메뉴에 쌓는 방식은 피해야 한다. 사용자는 역할에 맞는 오늘의 업무에서 시작하고, 시스템은 뒤에서 학생·접수·회계·결재·문서·미팅 데이터를 연결해야 한다.\n\n따라서 통합 전략은 다음 순서가 가장 현실적이다.\n\n```text\n보안 차단\n  -> 권한/용어/데이터 모델 정리\n  -> 역할별 통합 홈\n  -> 접수와 학생관리 연결\n  -> 업무/결재/회계/문서 단계 이전\n  -> 레거시 시스템 읽기 전용화 또는 폐기\n```\n\n이 순서로 진행하면 기존 업무를 중단하지 않으면서도, 세 시스템의 장점을 하나의 운영 플랫폼으로 흡수할 수 있다.\n"

          "content": "# ITT AI 자격시험 예상 FAQ\n\n출처: `source/itt-ai-시험홈페이지-신규분석자료.md`\n\n작성 기준: ITT의 기존 통번역 자격시험 운영 경험, AI 시대 신규 자격 명칭, 시험 홈페이지 구성 방향, AI 윤리·프롬프트·통역번역·교육전문가 포지셔닝을 바탕으로 한 예상 FAQ입니다. 실제 시험 일정, 응시료, 등급별 세부 문항 수, 합격 기준은 최종 운영규정과 시험 홈페이지 공지에 맞춰 조정해야 합니다.\n\n## 공통 FAQ\n\n### ITT AI 자격시험은 어떤 시험인가요?\n\nITT AI 자격시험은 기존 ITT 통역·번역 자격의 실무성과 신뢰를 바탕으로, AI 시대에 필요한 언어 활용, AI 번역 검수, 프롬프트 설계, AI 윤리, 교육 활용 역량을 검정하는 자격시험입니다.\n\n### 기존 ITT 시험과 AI 자격시험은 무엇이 다른가요?\n\n기존 ITT 시험은 사람의 외국어 통역·번역 실무 능력을 중심으로 평가합니다. AI 자격시험은 AI 도구를 활용해 번역 결과를 검토하고, 프롬프트를 설계하며, AI 결과물의 정확성·윤리성·보안성을 판단하는 능력을 함께 평가합니다.\n\n### AI 자격시험은 기존 ITT 시험을 대체하나요?\n\n아닙니다. AI 자격시험은 기존 ITT 자격을 대체하는 시험이 아니라, ITT의 통역·번역 전문성을 AI 시대 직무 역량으로 확장한 신규 자격군입니다. 기존 ITT 자격시험과 AI 자격시험은 목적과 평가 영역이 다릅니다.\n\n### AI 자격시험에는 어떤 종류가 있나요?\n\nAI 자격시험은 다음 자격을 중심으로 안내할 수 있습니다.\n\n- AI 외국어 통역 번역전문가\n- AI 프롬프트 통역 번역전문가\n- AI윤리전문가\n- AI 교육전문가\n\n### AI 자격시험은 누구에게 필요한가요?\n\n번역가, 통역사, 외국어 전공자, 해외영업 담당자, 마케터, 콘텐츠 현지화 담당자, 기술문서 담당자, 교육자, 개발자, 기업 교육 담당자처럼 외국어와 AI 도구를 함께 활용해야 하는 사람에게 적합합니다.\n\n### AI를 잘 다루면 외국어 실력이 부족해도 응시할 수 있나요?\n\n시험별로 요구되는 역량이 다릅니다. AI 외국어 통역 번역전문가와 AI 프롬프트 통역 번역전문가는 외국어 문장 이해, 번역 품질 판단, 문맥 검토 능력이 중요합니다. AI윤리전문가나 AI 교육전문가는 외국어보다 AI 활용 원칙, 윤리, 보안, 교육 설계 역량의 비중이 더 클 수 있습니다.\n\n### 시험은 어떤 방식으로 진행되나요?\n\n시험 방식은 자격과 등급에 따라 객관식, 단답형, 주관식, 서술형, 실무형 문항이 혼합될 수 있습니다. 최종 시험 방식은 시험 홈페이지의 자격별 안내와 회차별 공지를 확인해야 합니다.\n\n### 시험시간은 얼마나 되나요?\n\n분석자료 기준으로 전문 등급과 1·2급은 90분, 3급은 60분, 교육급수는 40~60분 수준으로 안내할 수 있습니다. 다만 실제 시험시간은 자격별·등급별 최종 공지에 따라 달라질 수 있습니다.\n\n### 합격 기준은 어떻게 되나요?\n\n등급별로 60점~80점 이상을 기준으로 안내할 수 있습니다. 세부 합격 기준은 자격 종류, 등급, 시험 과목에 따라 달라질 수 있으므로 시험별 상세 페이지에서 확인해야 합니다.\n\n### AI 윤리는 모든 AI 자격시험과 관련이 있나요?\n\n네. AI윤리전문가는 독립 자격으로 운영될 수 있으며, 동시에 AI 외국어 통역 번역전문가, AI 프롬프트 통역 번역전문가, AI 교육전문가의 공통 신뢰 기준으로 연결될 수 있습니다. AI 결과물의 정확성, 개인정보, 보안, 저작권, 편향, 환각 검증은 모든 AI 활용 영역에서 중요합니다.\n\n### 자격증은 어디에서 확인하거나 출력하나요?\n\n시험 홈페이지의 마이페이지 또는 자격증 출력 메뉴에서 확인하도록 안내할 수 있습니다. 실제 출력 방식과 발급 절차는 시험 홈페이지 운영 방식에 맞춰 공지해야 합니다.\n\n### 시험 접수는 어디에서 하나요?\n\n시험 접수는 ITT 시험 홈페이지에서 진행하는 구조가 적합합니다. 협회 홈페이지는 기관 신뢰, 자격관리 원칙, 운영규정, 윤리헌장을 안내하고, 실제 시험 접수는 시험 홈페이지로 연결하는 방식이 좋습니다.\n\n## AI 외국어 통역 번역전문가 FAQ\n\n### AI 외국어 통역 번역전문가는 어떤 자격인가요?\n\nAI 외국어 통역 번역전문가는 AI가 생성한 번역·통역 결과를 산업, 언어, 콘텐츠 맥락에 맞게 검토하고 수정할 수 있는 역량을 평가하는 자격입니다. 단순히 AI 번역기를 사용하는 능력이 아니라 결과물의 정확성, 문맥 적합성, 용어 일관성, 문화적 표현을 판단하는 능력이 중요합니다.\n\n### 기존 번역시험과 가장 큰 차이는 무엇인가요?\n\n기존 번역시험은 응시자가 직접 번역하는 능력을 중심으로 평가합니다. AI 외국어 통역 번역전문가는 AI가 만든 결과물을 검토하고, 오류·누락·환각·부적절한 표현을 찾아 수정하는 능력까지 평가한다는 점이 다릅니다.\n\n### 어떤 사람이 응시하면 좋나요?\n\n번역가, 통역사, 외국어 전공자, 해외영업 담당자, 기술문서 담당자, 콘텐츠 현지화 담당자, 무역·마케팅 실무자, AI 번역 검수 업무를 준비하는 사람에게 적합합니다.\n\n### 시험에서는 어떤 역량을 평가하나요?\n\n외국어 원문 이해, 한국어 또는 목표 언어 표현력, AI 번역 결과 검수, 산업별 용어 판단, 문서 목적에 맞는 수정 능력, 개인정보와 보안에 대한 기본 인식, AI 결과물의 오류 검증 능력을 평가할 수 있습니다.\n\n### 산업별 전문성이 왜 중요한가요?\n\n반도체, 의료, 법률, 특허, 조선, 방산, 자율주행, 로봇, 콘텐츠 현지화 같은 분야는 일반 번역만으로는 충분하지 않습니다. 산업 용어, 문서 관행, 규제, 책임 소재를 이해해야 AI 번역의 오류를 정확히 검토할 수 있습니다.\n\n### AI 번역 도구 사용법만 알면 합격할 수 있나요?\n\n도구 사용법만으로는 부족합니다. AI가 만든 문장이 자연스러워 보여도 원문 의미를 빠뜨리거나, 전문 용어를 잘못 사용하거나, 문맥에 맞지 않는 표현을 만들 수 있습니다. 따라서 외국어 이해력과 검수 판단력이 함께 필요합니다.\n\n### 어떤 언어로 응시할 수 있나요?\n\n응시 가능 언어는 시험 운영 정책에 따라 정해져야 합니다. 홈페이지에서는 영어, 일본어, 중국어 등 주요 언어를 우선 안내하고, 향후 수요에 따라 다양한 언어쌍으로 확장 가능하다는 방향을 제시할 수 있습니다.\n\n### 통역도 평가하나요, 번역만 평가하나요?\n\n자격명은 통역과 번역을 모두 포함하지만, 실제 평가 방식은 등급과 회차에 따라 달라질 수 있습니다. 번역 검수, 통역 스크립트 검토, 자막·음성 결과물 검수 등 AI 기반 언어 처리 상황을 반영한 문항 구성이 가능합니다.\n\n### 취득 후 어디에 활용할 수 있나요?\n\nAI 번역 검수, 산업문서 번역 관리, 기업 해외 커뮤니케이션, 콘텐츠 현지화, 기술문서 검토, 프리랜서 번역·통역 업무, 외국어 직무 교육, 기업 내부 AI 활용 역량 증빙에 활용할 수 있습니다.\n\n### 샘플 문제는 제공되나요?\n\n응시자가 시험 유형을 이해할 수 있도록 원문, AI 번역 결과, 오류 검토, 수정안 작성, 용어 선택 같은 형태의 샘플 문제를 제공하는 것이 좋습니다. 실제 제공 여부는 시험 홈페이지 자료실에서 안내해야 합니다.\n\n## AI 프롬프트 통역 번역전문가 FAQ\n\n### AI 프롬프트 통역 번역전문가는 어떤 자격인가요?\n\nAI 프롬프트 통역 번역전문가는 AI에게 정확한 언어 작업 지시를 내리고, 번역·통역·요약·현지화 결과를 목적에 맞게 생성·수정·검증하는 역량을 평가하는 자격입니다.\n\n### AI 외국어 통역 번역전문가와 무엇이 다른가요?\n\nAI 외국어 통역 번역전문가는 AI 결과물의 검수와 수정에 초점이 있습니다. AI 프롬프트 통역 번역전문가는 원하는 결과를 얻기 위해 지시문을 설계하고, 역할·문맥·톤·형식·제약 조건을 프롬프트에 반영하는 능력에 더 초점을 둡니다.\n\n### 프롬프트 작성 능력이 왜 필요한가요?\n\nA
