          "content": "# 사이드바 기준 프롬프트\n\n## 목적\n\nBO(Back Office) 앱 전체에서 재사용 가능한 좌측 사이드바 컴포넌트의 기준을 정의한다.  \n이 문서는 사이드바 구현 전에 정보 구조, 시각 규칙, 상태 표현, 반응형 동작을 맞추기 위한 기준 프롬프트로 사용한다.\n\n## 기준 프롬프트\n\n```text\nBO용 사이드바 UI 기준을 설계한다.\n\n목표:\n- BO 앱 전체에서 재사용 가능한 좌측 사이드바 컴포넌트를 만든다.\n- 정보 구조, 시각 규칙, 상태 표현, 반응형 동작 기준을 명확히 정의한다.\n- BO 화면 특성에 맞게 장식은 줄이고, 정보 밀도와 반복 사용성을 우선한다.\n\n포함할 항목:\n1. 사이드바의 역할\n   - 전역 내비게이션\n   - 현재 위치 표시\n   - 주요 기능 접근\n   - 1depth와 2depth까지만 탐색 제공\n   - 3depth 이후 하위 분류는 콘텐츠 영역에서 제공\n   - 보조 액션 또는 계정 영역 포함 여부\n\n2. 레이아웃 기준\n   - 기본 너비\n   - 접힘 상태 너비\n   - 헤더, 메뉴, 하단 영역 구분\n   - 아이콘과 텍스트 정렬\n   - 메뉴 간격과 패딩은 최소화\n   - BO 화면 기준으로 한 화면에 더 많은 메뉴와 콘텐츠가 보이도록 설계\n\n3. 메뉴 구조\n   - 사이드바에는 대분류인 1depth와 중분류인 2depth까지만 표시\n   - 1depth 메뉴 기준\n   - 2depth 메뉴 표시 방식\n   - 3depth 이후 분류는 사이드바에 노출하지 않고 콘텐츠 본문 안에서 탭, 리스트, 필터, 섹션 내비게이션 등으로 처리\n   - 그룹 라벨 사용 여부\n   - 메뉴 개수가 많아질 때의 스크롤 처리\n\n4. 상태 정의\n   - 기본 상태\n   - hover\n   - active/current\n   - disabled\n   - focus\n   - collapsed\n   - expanded\n\n5. 디자인 토큰\n   - 배경색\n   - 텍스트 색\n   - 아이콘 색\n   - active 배경\n   - border 또는 divider\n   - border-radius는 0 사용\n   - spacing은 조밀하게 사용\n   - font size / weight\n\n6. 접근성\n   - 키보드 탐색 가능\n   - focus ring 표시\n   - 현재 페이지 aria-current 적용\n   - 아이콘만 보이는 경우 aria-label 또는 tooltip 제공\n\n7. 반응형 기준\n   - desktop: 고정 사이드바\n   - tablet: 접힘 또는 오버레이\n   - mobile: drawer 방식\n   - breakpoint 기준\n\n8. 구현 산출물\n   - 사이드바 컴포넌트\n   - 메뉴 데이터 구조\n   - active route 처리 방식\n   - collapsed 상태 관리\n   - 콘텐츠 영역의 3depth 이하 분류 표시 패턴\n   - 예시 메뉴 포함\n```\n\n## BO 시각 기준\n\n- BO 버전은 관리자가 반복적으로 사용하는 업무 화면을 기준으로 한다.\n- 장식적인 카드, 과한 여백, 큰 타이포그래피를 피하고 정보 탐색과 입력 효율을 우선한다.\n- `border-radius: 0`을 기본값으로 한다.\n- 사이드바, 버튼, 탭, 패널, 목록, 상태 배지 모두 둥근 모서리를 사용하지 않는다.\n- 간격은 최소화한다. 메뉴와 목록은 높이를 낮추고, 본문 패딩도 과하게 넓히지 않는다.\n- 색상은 흰색/회색 계열의 배경, 명확한 border, 제한적인 brand 색상으로 구성한다.\n- active 상태만 명확히 강조하고 hover는 약하게 표현한다.\n- BO 화면에서는 콘텐츠를 카드처럼 띄우기보다 표, 목록, 구획선 중심으로 정리한다.\n\n## 정보 구조 기준\n\n- 사이드바는 전체 서비스의 큰 구조를 잡는 영역으로 사용한다.\n- 사이드바에는 1depth 대분류와 2depth 중분류까지만 표시한다.\n- 3depth부터 그 이하 하위 분류는 콘텐츠 영역 안에서 표시한다.\n- 2depth를 선택하면 콘텐츠 영역 상단 또는 본문 안에서 3depth 이하 항목을 탐색할 수 있어야 한다.\n- 현재 위치 표시는 사이드바의 1depth/2depth active 상태와 콘텐츠 영역의 3depth 이하 active 상태가 함께 맞물리도록 한다.\n- 3depth 이하를 사이드바에 중첩 표시하지 않는다. 사이드바가 깊어져서 탐색 구조가 복잡해지는 것을 방지한다.\n\n## BO 대분류/중분류 정리 프롬프트\n\n아래 프롬프트는 HutechC 사내 Studio 개선 문서의 사이드바 단순화 원칙을 BO 기준으로 재사용하기 위한 기준이다.\n\n```text\nBO 사이드바의 대분류와 중분류를 정리한다.\n\n참고 기준:\n- 현재처럼 여러 업무 메뉴를 같은 층위에 평면 나열하지 않는다.\n- 최상위 대분류는 5개 안팎으로 제한한다.\n- 즐겨찾기, 시스템 관리, 보관함은 일반 업무 대분류와 분리한다.\n- 같은 데이터의 여러 보기/관리/편집/레이아웃 화면은 사이드바 메뉴로 쪼개지 않고 콘텐츠 영역의 탭이나 보기 전환으로 통합한다.\n- 권한이 높은 메뉴와 민감한 인사/채용 메뉴는 시각적으로도 분리한다.\n- 이전 메뉴와 대체 메뉴는 현역 메뉴와 섞지 않고 보관함(Legacy)으로 격리한다.\n\n추천 대분류:\n1. 홈 · 내 업무\n   - 대시보드\n   - 업무일지\n   - 업무 총괄\n   - 내 출퇴근\n\n2. 지식 · 규정\n   - 사내업무지침\n   - 규정\n   - 매뉴얼\n   - 서식 · 확인서\n   - 업무 자료\n\n3. 인사 · 채용\n   - 채용관리\n   - 출퇴근 관리\n   - 학생관리\n   - 출강 · 강사관리\n\n4. 운영 · 거래처\n   - 미팅 · 일정\n   - 강의시간표\n   - 거래처관리\n   - 미수금관리\n   - 프로젝트관리\n   - 사진모음\n\n5. 기획 · 콘텐츠\n   - 업무 분류\n   - 강사 커리큘럼\n   - 마케팅\n   - 프롬프트 사용법\n   - AI 강의안\n   - 커뮤니티 · 홈페이지\n\n부가 영역:\n- 즐겨찾기: 사용자별 자주 쓰는 5~7개 메뉴를 상단에 고정한다.\n- 시스템 관리: 관리자 전용 메뉴를 일반 업무와 분리한다.\n- 보관함(Legacy): 이전/대체 메뉴를 기본 접힘 상태로 격리한다.\n\n콘텐츠 영역 처리:\n- 3depth 이후는 사이드바에 넣지 않는다.\n- 예: 규정 메뉴 안에서 통합/관리/편집/레이아웃/매뉴얼/평가기준은 콘텐츠 탭으로 처리한다.\n- 예: 거래처관리 안에서 거래처 목록/아웃콜/출장 거래처/계약 이력은 콘텐츠 탭으로 처리한다.\n- 예: 채용관리 안에서 지원서/면접/대시보드/평가는 콘텐츠 탭으로 처리한다.\n```\n\n## BO 분류 정리 이유\n\n- 사용자는 먼저 업무 도메인을 선택하고, 그 다음 세부 화면으로 들어가는 방식이 더 빠르다.\n- 49개 안팎의 메뉴를 한 층에 펼치면 검색보다 스크롤과 기억에 의존하게 된다.\n- 규정, 채용, 거래처처럼 같은 데이터를 다루는 화면은 사이드바 메뉴가 아니라 한 화면 안의 탭으로 묶어야 데이터의 소유권이 분명해진다.\n- 시스템 관리와 인사/채용은 권한·민감도 기준이 다르므로 일반 업무와 시각적으로 분리하는 것이 안전하다.\n- 보관함을 두면 이전 화면을 완전히 삭제하지 않고도 현역 업무 흐름에서 분리할 수 있다.\n- BO 화면은 반복 사용성이 중요하므로 대분류는 적게, 중분류는 명확하게, 3depth 이후는 본문에서 처리하는 편이 유지보수에 유리하다.\n\n### 구조 예시\n\n```text\nSidebar\n- 1depth: 시험 운영\n  - 2depth: 기본 설정\n  - 2depth: 응시 대상\n  - 2depth: 출제/채점\n\nContent\n- 3depth: 시험 문항 구성\n- 3depth: 채점 방식\n  - 4depth: 자동 채점\n  - 4depth: 수동 채점\n- 3depth: 일정 운영\n```\n\n## 구현용 축약 프롬프트\n\n```text\nBO용 좌측 사이드바 컴포넌트를 만든다.\n구성은 상단 로고/타이틀, 중앙 내비게이션 메뉴, 하단 사용자/설정 영역으로 나눈다.\n사이드바 메뉴는 1depth 대분류와 2depth 중분류까지만 표시한다.\n3depth부터 그 이하 하위 분류는 사이드바에 넣지 않고 콘텐츠 영역 안에서 탭, 리스트, 필터, 섹션 내비게이션 등으로 표시한다.\n사이드바 메뉴는 아이콘 + 라벨 구조이며 active, hover, disabled, focus 상태를 가진다.\ndesktop에서는 260px 안팎의 고정 너비, collapsed 상태에서는 56px 안팎의 너비를 사용한다.\nmobile에서는 오버레이 drawer로 동작한다.\n현재 경로와 일치하는 메뉴에는 aria-current=\"page\"를 적용한다.\n현재 위치는 사이드바의 1depth/2depth active 상태와 콘텐츠 영역의 3depth 이하 active 상태가 함께 드러나도록 한다.\nBO 화면 기준으로 border-radius는 0을 사용하고, 메뉴 높이와 패딩은 최소화한다.\n디자인은 기존 프로젝트의 토큰, 색상, 간격, typography 규칙을 우선 사용하되 radius는 0으로 통일한다.\n장식적인 카드형 UI보다 border, table, list, tab 중심의 조밀한 레이아웃을 사용한다.\n```\n\n## 재사용 프롬프트\n\n```text\nBO 관리 화면용 사이드바 샘플을 만든다.\n\n정보 구조:\n- 사이드바는 1depth 대분류와 2depth 중분류까지만 표시한다.\n- 3depth부터 하위 분류는 콘텐츠 영역에서 탭, 필터, 리스트, 표, 섹션 내비게이션 등으로 표시한다.\n- 2depth를 선택하면 콘텐츠 영역의 3depth 탐색과 본문 내용이 갱신된다.\n- 현재 위치는 breadcrumb, 사이드바 active, 콘텐츠 3depth active가 함께 맞아야 한다.\n\n시각 기준:\n- BO 화면이므로 정보 밀도를 높인다.\n- border-radius는 모든 UI에서 0으로 통일한다.\n- 여백, 메뉴 높이, 패딩, 카드 간격을 최소화한다.\n- 장식적인 그림자와 큰 카드형 표현은 피한다.\n- 흰색/회색 배경, 얇은 border, 제한적인 brand color만 사용한다.\n- active 상태는 명확히, hover 상태는 약하게 표현한다.\n\n구현 기준:\n- 단일 HTML 샘플로 만든다.\n- 사이드바, 3depth 탭, 4depth 이하 목록/표가 한 화면에서 구조적으로 보이게 한다.\n- mobile에서는 사이드바를 drawer로 전환한다.\n- aria-current, aria-label 등 기본 접근성 속성을 포함한다.\n```\n\n## 검토 포인트\n\n- 사이드바가 필요한 화면 범위\n- 사이드바는 2depth까지만 허용하고 3depth 이후는 콘텐츠 영역에서 처리하는 기준\n- 콘텐츠 영역에서 3depth 이하를 탭, 필터, 리스트, 섹션 내비게이션 중 어떤 패턴으로 보여줄지\n- collapsed 상태가 실제로 필요한지 여부\n- 하단 영역에 계정, 설정, 도움말 중 무엇을 둘지\n- mobile에서 drawer를 사용할지, 하단 내비게이션으로 바꿀지\n- 기존 디자인 시스템 토큰과 충돌하는 수치가 있는지\n- BO 버전에서 모든 컴포넌트의 border-radius가 0으로 유지되는지\n- BO 버전에서 여백이 과하게 넓어지지 않고 정보 밀도가 유지되는지\n"

          "content": "# 회원 상세내용 이미지 분석 기반 구현 프롬프트\n\n기준 이미지: `table_design/회원_상세내용.png`\n\n## 이미지 분석 요약\n\n회원 상세 화면은 단순 조회 폼이 아니라 상담, 시험, 결제, 정산을 한 화면에서 처리하는 BO 운영 작업대다. 좌측에는 회원 기본정보 마스터가 고정되고, 우측에는 상담 진행 상태, 상담 메모, 상담 이력, 시험/납부 상세, 환급/정산 요약이 조밀하게 배치된다.\n\n## 구현 프롬프트\n\n```text\n회원 목록의 행을 클릭했을 때 열리는 우측 inline Dense Drawer에 회원 상세 작업영역을 추가한다.\n\n레이아웃:\n- Drawer 기본 정보 섹션 아래에 `회원 상세 작업영역`을 둔다.\n- 작업영역은 좌측 `회원기본정보 마스터`, 우측 `상담/시험/결제 작업 패널`의 2컬럼 구조로 만든다.\n- 넓게보기 상태에서는 목록 테이블을 접고 Drawer가 작업영역 전체 폭을 사용한다.\n- 오버레이 모달이 아니라 기존 목록과 같은 workspace 안에서 동작한다.\n\n좌측 회원기본정보 마스터:\n- 성명/영문, 아이디, 관리번호, 이메일, 휴대폰, 거주지/국가, 회원유형/구독상태, 가입일/채널, 전문가 레벨/평점을 한 줄 필드로 배치한다.\n- 내국인/외국인 radio, 작업 목적 textarea, 출제/번역·수강등록·시험접수·전문가매칭 checkbox를 포함한다.\n- 테이블의 묶음 컬럼은 상세에서 다시 이름, 나이, 성별, 이메일, 휴대폰, 주소, 국가처럼 편집 가능한 단위로 나눈다.\n\n우측 상담/시험/결제 작업 패널:\n- 상단 어두운 상태바에 `상담내용 [회원명 : 관리번호]`, 저장, 상담이력, 전환, FAIL 같은 운영 액션을 배치한다.\n- 상담일시, 최근 상담일시, 총 상담 내역 보관 상태를 한 줄 상태 영역으로 표시한다.\n- 상담종목, 교육, 수강정보를 select로 제공한다.\n- 상담결과 선택은 미상담, 완료, LT예약, 다음등록, 실종, 부재, 기타 같은 세로 탭으로 배치한다.\n- 상담 메모 textarea와 상담이력 로그를 나란히 둔다.\n- LT 인터뷰 결과는 P/F/미 radio로 관리한다.\n- 회원 납부 상세정보 및 증명서 실시간 결제·규칙 정산 현황은 작은 테이블로 표시한다.\n- 하단에는 환급 진행 수수료 총액과 실시간 진행 내용 요약 textarea를 둔다.\n\n시각 규칙:\n- BO 테이블/상세 기본 글자 크기는 8px 기준으로 유지한다.\n- 정보 밀도는 높게 유지하되, 섹션 경계는 얇은 border와 배경색 차이로만 구분한다.\n- 제목/상태바만 더 진한 색을 사용하고, 입력 필드는 실무자가 바로 수정 가능한 형태로 둔다.\n- 색상은 기존 BO 디자인 시스템 토큰을 우선 사용한다.\n```\n"

          "date": "2026-06-02",
          "content": "# BO 사이드바 분류 정리계획\n\n## 참고 문서\n\n- `/Users/shinbom/Documents/hutechC/intranet/docs/ai-studio-improvement/01-사이드바-메뉴-단순화-가이드.md`\n- `/Users/shinbom/Documents/hutechC/intranet/docs/ai-studio-improvement/02-디자인-개선안(border-radius).md`\n- `/Users/shinbom/Documents/hutechC/intranet/docs/ai-studio-improvement/before-after.html`\n\n## 목표\n\nBO 사이드바를 업무 성격 기준으로 다시 묶는다.  \n사이드바는 `1depth 대분류`와 `2depth 중분류`까지만 담당하고, `3depth 이하`는 콘텐츠 영역의 탭, 표, 필터, 섹션 내비게이션으로 처리한다.\n\n현재처럼 많은 메뉴가 같은 층위에 평면 나열되면 사용자가 업무 시작점을 찾기 어렵다. 따라서 최상위 메뉴는 5개 업무 대분류와 3개 부가영역으로 정리한다.\n\n## 정리계획\n\n### 1단계. 현행 메뉴를 데이터로 수집\n\n- 현재 사이드바 메뉴를 `id`, `label`, `path`, `group`, `role`, `legacy`, `tabOf` 구조로 정리한다.\n- 기존 URL은 바로 삭제하지 않고 새 구조의 메뉴 또는 콘텐츠 탭으로 매핑한다.\n- 중복 메뉴, 이전 메뉴, 권한 메뉴를 별도 표시한다.\n\n### 2단계. 5개 업무 대분류로 재배치\n\n| 1depth 대분류 | 역할 | 2depth 중분류 |\n| --- | --- | --- |\n| 홈 · 내 업무 | 개인 업무 시작점 | 대시보드, 업무일지, 업무 총괄, 내 출퇴근 |\n| 지식 · 규정 | 내부 기준과 문서 | 사내업무지침, 규정, 매뉴얼, 서식 · 확인서, 업무 자료 |\n| 인사 · 채용 | 사람, 지원자, 강사 관리 | 채용관리, 출퇴근 관리, 학생관리, 출강 · 강사관리 |\n| 운영 · 거래처 | 일정, 거래처, 프로젝트 운영 | 미팅 · 일정, 강의시간표, 거래처관리, 미수금관리, 프로젝트관리, 사진모음 |\n| 기획 · 콘텐츠 | 기획 자료와 외부 콘텐츠 | 업무 분류, 강사 커리큘럼, 마케팅, 프롬프트 사용법, AI 강의안, 커뮤니티 · 홈페이지 |\n\n### 3단계. 부가영역 분리\n\n| 영역 | 위치 | 기준 |\n| --- | --- | --- |\n| 즐겨찾기 | 사이드바 상단 | 사용자별 자주 쓰는 5~7개 메뉴 |\n| 시스템 관리 | 사이드바 하단 | 관리자 권한이 필요한 메뉴 |\n| 보관함(Legacy) | 사이드바 하단, 기본 접힘 | 이전 화면, 대체 화면, 사용 중단 후보 |\n\n### 4단계. 3depth 이하를 콘텐츠 영역으로 이동\n\n| 2depth 메뉴 | 콘텐츠 영역 3depth 예시 | 4depth 이하 예시 |\n| --- | --- | --- |\n| 규정 | 통합, 관리, 편집, 레이아웃, 매뉴얼, 평가기준 | 규정 목록, 버전, 승인 상태, 담당자 |\n| 채용관리 | 지원서, 면접, 대시보드, 평가 | 지원자 목록, 면접 일정, 평가표 |\n| 거래처관리 | 거래처 목록, 아웃콜, 출장 거래처, 계약 이력 | 담당자, 연락처, 미팅 기록, 미수금 |\n| 출퇴근 관리 | 일별 현황, 월별 집계, 예외 처리 | 직원별 기록, 수정 요청, 승인 상태 |\n\n### 5단계. BO 시각 기준 적용\n\n- `border-radius: 0`을 기본값으로 한다.\n- 그림자보다 1px border와 구획선을 사용한다.\n- 메뉴 높이, 패딩, 목록 간격을 줄인다.\n- active 상태는 좌측 bar, 배경색, 텍스트 색으로 명확히 표시한다.\n- 전체 화면은 고밀도 업무 화면으로 구성한다.\n\n## 왜 이렇게 정리하는가\n\n### 업무 시작점이 선명해진다\n\nBO 사용자는 메뉴를 둘러보는 것보다 업무를 빨리 시작해야 한다. `홈 · 내 업무`를 최상단에 두면 업무일지, 업무 총괄, 내 출퇴근처럼 자주 쓰는 진입점이 먼저 보인다.\n\n### 같은 데이터의 화면이 흩어지지 않는다\n\n규정 통합, 규정관리, 규정편집, 규정 레이아웃, 규정매뉴얼, 평가기준은 모두 규정이라는 하나의 데이터 묶음을 다룬다. 이를 사이드바 메뉴로 나누면 메뉴 수만 늘고 사용자는 어떤 메뉴가 원본인지 헷갈린다. `규정` 하나를 2depth로 두고 나머지는 콘텐츠 탭으로 두는 편이 좋다.\n\n### 권한 경계가 드러난다\n\n인사/채용, 시스템 관리는 일반 업무보다 민감하다. 메뉴 구조에서 따로 분리하면 권한 설계, QA, 운영 정책을 맞추기 쉽다.\n\n### 이전 메뉴 사용 사고를 줄인다\n\n이전 화면과 대체 화면을 현역 메뉴에 섞어두면 잘못된 화면에서 업무가 진행될 수 있다. 보관함으로 격리하면 접근은 가능하되 기본 업무 흐름에서는 빠진다.\n\n### 유지보수가 쉬워진다\n\n메뉴를 라우트 단위로 무작정 늘리지 않고 `업무 도메인 > 대표 화면 > 내부 탭` 구조로 두면 새 기능을 추가할 때 어느 위치에 붙일지 판단하기 쉽다.\n\n## 재사용 프롬프트\n\n```text\nBO 사이드바의 대분류와 중분류를 정리한다.\n\n목표:\n- 사이드바는 1depth 대분류와 2depth 중분류까지만 표시한다.\n- 3depth부터 하위 분류는 콘텐츠 영역에서 탭, 표, 필터, 섹션 내비게이션으로 처리한다.\n- 최상위 업무 대분류는 5개 안팎으로 유지한다.\n- 즐겨찾기, 시스템 관리, 보관함은 일반 업무 대분류와 분리한다.\n- BO 화면 기준으로 border-radius는 0, 간격은 최소화한다.\n\n추천 구조:\n1. 홈 · 내 업무\n   - 대시보드\n   - 업무일지\n   - 업무 총괄\n   - 내 출퇴근\n\n2. 지식 · 규정\n   - 사내업무지침\n   - 규정\n   - 매뉴얼\n   - 서식 · 확인서\n   - 업무 자료\n\n3. 인사 · 채용\n   - 채용관리\n   - 출퇴근 관리\n   - 학생관리\n   - 출강 · 강사관리\n\n4. 운영 · 거래처\n   - 미팅 · 일정\n   - 강의시간표\n   - 거래처관리\n   - 미수금관리\n   - 프로젝트관리\n   - 사진모음\n\n5. 기획 · 콘텐츠\n   - 업무 분류\n   - 강사 커리큘럼\n   - 마케팅\n   - 프롬프트 사용법\n   - AI 강의안\n   - 커뮤니티 · 홈페이지\n\n부가 영역:\n- 즐겨찾기: 상단 고정\n- 시스템 관리: 관리자 전용, 하단 분리\n- 보관함(Legacy): 이전/대체 메뉴, 기본 접힘\n\n통합 기준:\n- 규정 관련 여러 화면은 규정 메뉴 내부 탭으로 통합한다.\n- 채용 관련 여러 화면은 채용관리 메뉴 내부 탭으로 통합한다.\n- 거래처 관련 여러 화면은 거래처관리 메뉴 내부 탭으로 통합한다.\n- 이전/대체 메뉴는 보관함으로 이동한다.\n```\n\n## HTML 산출물\n\n화면 샘플 파일:\n\n- `bo_sidebar_classification_sample.html`\n\n이 샘플은 BO 고밀도 스타일, `border-radius: 0`, 1depth/2depth 사이드바, 3depth 콘텐츠 탭, 4depth 이하 표 구조를 보여준다.\n\n샘플에서 `규정`, `채용관리`, `거래처관리`를 누르면 각각의 콘텐츠 화면으로 전환된다.\n\n- `규정`: 통합, 관리, 편집, 레이아웃, 매뉴얼, 평가기준을 3depth 탭으로 표시\n- `채용관리`: 지원서, 면접, 대시보드, 평가, 강사 후보를 3depth 탭으로 표시\n- `거래처관리`: 거래처 목록, 아웃콜, 출장 거래처, 계약 이력, 미팅 기록을 3depth 탭으로 표시\n"

          "content": "# BO 영역 참고 기반 디자인 시스템 index 고도화 프롬프트\n\n## 목적\n\n`resource/design_system_bo참고.png`와 `resource/영역참고.png`를 기준으로 `index.html`을 고도화한다.  \n목표는 현재 디자인 시스템 문서를 유지하면서, BO 관리자 화면에서 실제로 필요한 정보 밀도, 영역 구조, 컴포넌트 상태, 업무 패턴을 더 명확히 문서화하는 것이다.\n\n## 참고 이미지 해석\n\n### `resource/design_system_bo참고.png`\n\n- BO 화면은 좌측 메뉴, 상단 업무 바, 본문 작업 영역, 우측/하단 보조 정보 영역이 동시에 보이는 고밀도 구조다.\n- 테이블, 필터, 검색, 상태 선택, 업무 메모, 금액/정산 정보, 스크롤 영역이 한 화면에 공존한다.\n- 장식보다 반복 업무 효율이 중요하다.\n- 색상은 흰색, 회색, 옅은 파랑, 상태 색상 위주로 제한한다.\n- 컴포넌트는 작고 조밀해야 하며, border, divider, table line, status badge가 주요 시각 구분 수단이다.\n\n### `resource/영역참고.png`\n\n- 디자인 시스템 문서는 단일 컴포넌트 나열이 아니라 영역별 기준을 제공해야 한다.\n- 주요 영역은 공통 개념 DB, 실제 서비스 화면 입력 폼, 운영 관리 통계/상태, 권한/보안 정책, 감사 로그/운영 이력, 사이트 미리보기 등으로 나뉜다.\n- BO 설계 시 화면을 Header, Sidebar, Content, Toolbar, Filter, Table, Detail Drawer, Status Panel, Log Panel, Preview 영역으로 구분해야 한다.\n- 각 영역별로 목적, 포함 컴포넌트, 상태값, 접근성, 반응형 처리 기준을 문서화해야 한다.\n\n## 기준 프롬프트\n\n```text\n너는 시니어 프론트엔드 엔지니어이자 디자인 시스템 아키텍트다.\n\n현재 레포지토리의 `design_system_major/index.html`을 고도화해라.\n작업 기준은 `resource/design_system_bo참고.png`와 `resource/영역참고.png`다.\n\n목표:\n- 기존 `index.html`의 섹션, 컴포넌트 예시, 문서 톤을 보존한다.\n- BO 관리자 화면에서 바로 재사용할 수 있는 영역별 디자인 시스템 기준을 추가한다.\n- 단순 UI 샘플이 아니라 실제 운영 화면을 만들 때 필요한 레이아웃, 상태, 컴포넌트 조합, 접근성 기준까지 문서화한다.\n- `layout.css`, `dense-drawer.css`, `dense-drawer.js`, `common.js`의 기존 패턴을 먼저 확인하고, 새 스타일은 기존 토큰과 클래스 체계에 맞춘다.\n\n반드시 먼저 확인할 파일:\n- `index.html`\n- `layout.css`\n- `dense-drawer.css`\n- `dense-drawer.js`\n- `common.js`\n- `docs/사이드바_기준_프롬프트.md`\n- `docs/BO_사이드바_분류_정리계획.md`\n- `resource/design_system_bo참고.png`\n- `resource/영역참고.png`\n\n고도화 방향:\n1. `index.html`의 현재 내비게이션 구조를 유지하되, BO 화면 기준을 찾기 쉽게 보강한다.\n   - Foundation, Components, Pages, 고도화 탭 중 어디에 넣을지 판단한다.\n   - 필요하면 `Pages` 또는 `고도화` 영역에 BO 화면 영역 가이드 섹션을 추가한다.\n   - 현재 기준에서는 좌측 사이드바에 `BO/DB` 분류를 별도로 두고, 관리자 테이블 실물 페이지와 DB v2 원본 참고 화면을 iframe 미리보기/새 탭 링크로 제공한다.\n   - 새 BO 페이지를 추가하면 `index.html`의 `BO/DB 페이지 보기` 목록에 `data-page-src`, `data-page-title` 버튼을 추가한다.\n   - 섹션 탭과 앵커 링크가 깨지지 않게 한다.\n\n2. BO 레이아웃 영역 기준을 추가한다.\n   - Header: 상단 업무 바, 현재 업무명, 저장/닫기/상태 액션\n   - Sidebar: 1depth/2depth 메뉴, active, collapsed, 권한 메뉴 분리\n   - Content: 본문 업무 영역, 제목, 보조 설명, 작업 단위 구획\n   - Toolbar: 검색, 필터, 보기 전환, 엑셀, 일괄 처리\n   - Filter Panel: 기본 검색, 고급 검색, 날짜 범위, 상태, 담당자, 분류\n   - Data Table: 조밀한 행 높이, 고정 헤더, 상태 컬럼, 금액/날짜/담당자, row action\n   - Detail Drawer: 목록을 유지한 채 상세 확인/수정. 회원목록은 `index.html`의 \"회원목록 + 우측 Dense Drawer\"처럼 오버레이가 아닌 inline 우측 컬럼으로 열리는 패턴을 우선한다.\n   - Status Panel: 처리 현황, 접수/결제/채점/발급 상태\n   - Log Panel: 변경 이력, 감사 로그, 처리 메모\n   - Preview Area: 사이트/신청서/문서 미리보기\n\n3. BO 컴포넌트 기준을 보강한다.\n   - Button: primary, secondary, ghost, danger, icon, compact, disabled, loading\n   - Input/Search: compact input, search with button, date range, select, textarea\n   - Filter Chip: 선택된 조건, 삭제, 전체 초기화\n   - Status Badge: 접수, 진행, 완료, 보류, 실패, 취소, 위험\n   - Data Table: dense, selectable, sortable, sticky column, horizontal scroll, empty state\n   - Pagination: compact page 이동, page size 선택\n   - Bulk Action Toolbar: 선택 개수, 일괄 상태 변경, 엑셀 다운로드\n   - Drawer: 상세 요약, 탭, 메모, 이력, 저장/닫기 액션\n   - Modal/Toast: 확인, 경고, 저장 완료, 실패 알림\n   - KPI/Stats: 처리 건수, 결제 금액, 미처리, 오류, 완료율\n\n4. 시각 기준은 BO 고밀도 화면에 맞춘다.\n   - border-radius는 기본 0으로 유지한다.\n   - 과한 카드형 UI, 넓은 여백, 큰 히어로 타이포그래피를 사용하지 않는다.\n   - 표, 리스트, 구획선, 탭, 패널 중심으로 조밀하게 정리한다.\n   - 한 화면에서 검색, 목록, 상세, 상태, 로그가 동시에 보일 수 있는 구조를 우선한다.\n   - 브랜드 색상은 active, primary action, 정보 강조에만 제한적으로 사용한다.\n   - 상태 색상은 success, warning, danger, info 의미가 일관되게 보이도록 한다.\n\n5. 영역별 문서화 방식을 추가한다.\n   각 BO 영역은 아래 형식으로 정리한다.\n   - 영역명\n   - 목적\n   - 포함 컴포넌트\n   - 주요 상태\n   - 사용하면 좋은 화면\n   - 피해야 할 사용\n   - 접근성 체크\n   - 반응형 처리\n\n6. 실제 화면 예시를 추가한다.\n   `resource/design_system_bo참고.png`처럼 하나의 BO 운영 화면 예시를 `index.html` 안에 추가한다.\n   예시는 아래 영역을 포함해야 한다.\n   - 좌측 Sidebar\n   - 상단 Toolbar\n   - 검색/필터 패널\n   - 데이터 테이블\n   - 우측 또는 오버레이 Detail Drawer\n   - 상태 요약 패널\n   - 변경 이력/메모 패널\n\n7. `resource/영역참고.png`의 영역 구성을 반영한 문서 섹션을 추가한다.\n   예시 영역:\n   - 공통 개념/DB 기준\n   - 실제 서비스 화면 입력 폼\n   - 운영 관리 통계/상태\n   - 권한/보안 정책\n   - 감사 로그/운영 이력\n   - 사이트 미리보기\n   각 영역은 단순 이미지 설명이 아니라, 디자인 시스템에서 어떤 컴포넌트와 패턴으로 구현해야 하는지 연결해라.\n\n8. 접근성과 반응형 기준을 함께 보강한다.\n   - 모든 인터랙션 요소는 키보드 접근이 가능해야 한다.\n   - focus 상태는 보이게 유지한다.\n   - Drawer와 Modal은 열림/닫힘, focus 이동, ESC 닫기, 닫은 뒤 focus 복귀를 고려한다.\n   - 테이블은 모바일에서 무리하게 카드로 바꾸기보다, 핵심 컬럼 축약과 가로 스크롤 기준을 명시한다.\n   - 상태 색상은 텍스트나 아이콘 없이 색상만으로 의미를 전달하지 않는다.\n\n구현 기준:\n- 기존 내용은 삭제하지 않는다.\n- 중복 스타일이 생기면 `layout.css` 또는 `dense-drawer.css`의 기존 패턴에 맞춰 정리한다.\n- `index.html` 내부 `\u003cstyle>`에 임시 스타일을 추가할 수 있지만, 반복 사용 가치가 있으면 공통 CSS로 이동한다.\n- 새 JS가 필요하면 `common.js` 또는 `dense-drawer.js`의 기존 이벤트 패턴을 따른다.\n- 클래스명은 의미 기반으로 작성하고, 기존 `ds`, `bo`, `drawer`, `table`, `filter`, `status` 계열 네이밍과 충돌하지 않게 한다.\n- 불필요한 프레임워크, 빌드 도구, 외부 라이브러리를 추가하지 않는다.\n\n산출물:\n1. `index.html` 고도화 반영\n2. 필요한 경우 `layout.css`, `dense-drawer.css`, `common.js` 최소 수정\n3. BO 영역별 디자인 시스템 가이드 섹션\n4. BO 운영 화면 조합 예시\n5. 컴포넌트 상태/variant 보강\n6. 접근성/반응형 체크리스트\n\n검증:\n- 브라우저에서 `index.html`을 열었을 때 기존 섹션 이동과 탭 전환이 정상 동작해야 한다.\n- 새로 추가한 앵커와 내비게이션이 연결되어야 한다.\n- 데스크톱에서 BO 예시 화면이 조밀하지만 읽을 수 있어야 한다.\n- 모바일에서 텍스트 겹침, 버튼 넘침, 테이블 영역 깨짐이 없어야 한다.\n- Drawer, Modal, Toast 등 기존 상호작용이 망가지지 않아야 한다.\n\n마지막 응답에는 아래 항목을 요약해라.\n- 수정한 파일\n- 추가한 BO 영역 기준\n- 추가/보강한 컴포넌트\n- 검증 결과\n- 남은 후속 작업\n```\n\n## 축약 실행 프롬프트\n\n```text\n`resource/design_system_bo참고.png`와 `resource/영역참고.png`를 기준으로 `design_system_major/index.html`을 고도화해라.\n기존 디자인 시스템 문서와 컴포넌트 예시는 삭제하지 말고, BO 관리자 화면용 영역 가이드와 고밀도 운영 화면 예시를 추가한다.\n\n추가할 핵심:\n- Header, Sidebar, Content, Toolbar, Filter, Data Table, Detail Drawer, Status Panel, Log Panel, Preview Area 영역 기준\n- 각 영역의 목적, 포함 컴포넌트, 상태, 접근성, 반응형 기준\n- BO용 compact button/input/select/filter chip/status badge/data table/pagination/bulk action/drawer/modal/toast/KPI 컴포넌트 기준\n- `design_system_bo참고.png`처럼 검색, 필터, 목록, 상세, 상태, 로그가 한 화면에 공존하는 BO 운영 화면 예시\n- `영역참고.png`처럼 공통 개념 DB, 실제 서비스 입력 폼, 운영 통계/상태, 권한/보안, 감사 로그, 사이트 미리보기 영역을 문서화\n\n시각 원칙:\n- border-radius는 0\n- 장식보다 정보 밀도와 반복 업무 효율 우선\n- 표, 리스트, 구획선, 탭, 패널 중심\n- 색상은 제한적으로 사용하고 상태 의미는 텍스트와 함께 표시\n- 모바일에서는 핵심 컬럼 축약과 가로 스크롤 기준을 명시\n\n기존 `layout.css`, `dense-drawer.css`, `dense-drawer.js`, `common.js` 패턴을 우선 사용하고, 불필요한 외부 라이브러리나 대규모 리팩터링은 하지 않는다.\n```\n"

          "content": "# DB v2 신규 테이블 별도 페이지 제작 프롬프트\n\n아래 프롬프트는 Figma Make의 `B. DB 페이지 v2` 화면을 기준으로, 기존 관리자 화면과 분리된 신규 테이블 전용 페이지를 만들기 위한 작업 지시문이다.\n\n## 실행 프롬프트\n\n```text\n너는 BO 관리자 화면을 설계하는 시니어 UI 디자이너이자 프론트엔드 설계자다.\n\n아래 Figma Make 화면을 기준으로 신규 DB 테이블 전용 페이지를 새로 만들어라.\n참고 화면:\nhttps://www.figma.com/make/uGCONfLFy7YzzZEbu1yiQQ/B.-DB-%ED%8E%98%EC%9D%B4%EC%A7%80-v2?p=f&t=WYMZJlnEAs9kFsTm-0\n\n목표:\n- 기존 `B. DB 페이지 v2`의 관리자 패널 톤, 좌측 사이드바, 상단 헤더, 사이트 필터, 조밀한 테이블 밀도를 유지한다.\n- 기존 페이지를 덮어쓰지 말고, 신규 테이블을 위한 별도 페이지를 만든다.\n- 페이지 이름은 `DB 테이블 v3` 또는 `신규 테이블 관리`로 한다.\n- 새 페이지는 \"여러 신규 테이블을 빠르게 전환하고 비교하는 운영 화면\"이어야 한다.\n\n전체 레이아웃:\n1. 좌측에는 기존 관리자 사이드바를 유지한다.\n   - 대시보드, 회원, 활동 관리, 결제 관리, 매칭 관리, 시험 관리, 스케줄 관리, 대중소 관리, 1:1 문의, 통계 구조를 유지한다.\n   - 현재 메뉴는 신규 테이블 관리 또는 DB 관리 성격으로 active 처리한다.\n\n2. 본문 상단에는 제목 영역을 둔다.\n   - 상단 breadcrumb: 관리자 > DB 테이블\n   - H1: 신규 테이블 관리\n   - 우측 액션: 저장, 새 테이블 추가, 엑셀 내보내기\n\n3. 제목 바로 아래에는 대분류 탭을 둔다.\n   - 대분류 탭은 사이트/업무 도메인 기준으로 구성한다.\n   - 예: 전체 (149건), AI번역 (34건), 통독문서 (22건), 교육센터 (31건), 전시/행사 (18건), 시험사이트 (44건)\n   - 대분류 탭도 반드시 `탭명 (0명)` 또는 `탭명 (0건)` 형식으로 카운트를 함께 표기한다.\n   - 대분류 탭 자체에는 과한 설명을 넣지 않는다.\n   - 대분류 탭 선택 시 하위 탭의 카운트와 테이블 내용이 바뀌게 보이도록 구성한다.\n\n4. 대분류 탭 아래에는 하위 탭을 둔다.\n   - 하위 탭의 라벨은 반드시 `탭명 (전체 00명)` 또는 데이터 성격에 맞게 `탭명 (전체 00건)` 형식으로 표기한다.\n   - 예:\n     - 전체 회원 (전체 45명)\n     - 일반 회원 (전체 26명)\n     - 기업 회원 (전체 8명)\n     - 전문가 (전체 10명)\n     - 결제 내역 (전체 28건)\n     - 문의 내역 (전체 16건)\n   - 카운트는 별도 배지로 떨어뜨리지 말고, 탭 텍스트 안에서 자연스럽게 읽히게 한다.\n   - 단, 시각적으로는 괄호 안 카운트를 더 연한 색으로 처리해도 된다.\n\n5. 하위 탭 아래에는 필터/검색 영역을 둔다.\n   - 검색창 placeholder: 이름, 이메일, 회원번호, 연락처, 관리번호 검색\n   - 필터는 기존 `design_system_major`의 검색필터 패턴을 그대로 사용한다.\n   - 기본형은 `filter-bar`, `filter-group`, `filter-chip`, `filter-active` 구조를 따른다.\n   - BO 고밀도 테이블 화면은 `dense-filter-card`, `dense-search-main`, `dense-filter-flow`, `dense-filter-group`, `filter-chip`, `dense-check`, `dense-active-filters` 구조를 우선 사용한다.\n   - 필터는 2줄 이하로 조밀하게 배치하되, 체크박스 조건을 충분히 넣어 빈 영역 없이 꽉 차게 구성한다.\n   - `DB페이지_v2(이거사용).html`의 검색조건을 빠뜨리지 않고 반영한다.\n   - 회원 검색조건은 역할에 맞게 구조적으로 그룹핑하되, 화면 좌측에 `회원 기본`, `서비스/상태`, `운영/접근` 같은 그룹명을 별도 라벨로 노출하지 않는다.\n   - 현재 BO 회원 검색조건 CSS 기준은 `.dense-filter-flow { display: flex; align-items: start; gap: 4px 7px; }`이다.\n   - `.dense-filter-role-group`은 `display: contents`로 구조만 유지하고, 화면에는 그룹명 텍스트를 노출하지 않는다.\n   - `.dense-filter-role-body`는 `height: 100%`와 `border-right: 1px solid var(--line-soft)`로 검색조건 컬럼 사이 세로 구분선을 만든다. 마지막 그룹의 border는 제거한다.\n   - 각 조건 블록인 `.dense-filter-group`은 `display: flex`로 정렬한다. 내부에서 grid column을 한 번 더 만들지 않는다.\n   - 조건명은 `.dense-filter-group legend { flex: 0 0 58px; }`로 고정하고, 옵션은 `.dense-filter-options { flex: 1 1 auto; display: flex; flex-wrap: wrap; }`로 배치한다.\n   - `회원유형`, `서비스유형`, `성별`, `매칭상태`의 옵션 시작선이 어긋나지 않게 `legend` 58px 기준을 공통으로 유지한다.\n   - 기간설정은 한 줄로 처리한다. `.filter-date-group .dense-filter-options`는 `flex-wrap: nowrap; overflow-x: auto;`를 사용한다.\n   - 체크박스 조건: 회원유형, 성별, 구독상태, 서비스유형, 매칭상태, 전문가레벨, 시험종목, 결제상태, 가입채널, 알림, 기기\n   - 셀렉트 조건: 카테고리 대분류, 중분류, 소분류\n   - 기간 조건: 가입일순, 결제일순, 활동일순, 시험일순 + 시작일/종료일 + 오늘, 1주, 1개월, 3개월, 6개월, 1년 빠른 선택\n   - 검색어 조건: 전체, 이름, 이메일, 관리번호, 연락처, 그룹명\n   - 체크박스 후보: 일반회원, 정식회원, 기업회원, 전문가, M, F, 프리미엄, 스탠다드, 베이직, free, AI번역, 통독문서, 교육센터, 전시/행사, 시험사이트, 완료, 대기, 취소, 검토중, Lv.S, Lv.A, Lv.B, Lv.C, 번역시험, 영어교육, AI윤리, 문서관리, 정상, 미납, 환불, 정산대기, 이메일, 홈페이지, 구글, 추천, 관리자등록, 기관계약, SMS, 알림톡, PC, Mobile, Tablet\n   - 필터 라벨은 13px 수준의 작은 텍스트로, 버튼/셀렉트는 높이 30px 내외로 유지한다.\n\n6. 테이블 행 클릭 상세 Drawer\n   - 테이블 행을 클릭하면 기존 `index.html`의 \"회원목록 + 우측 Dense Drawer\"처럼 목록 영역 오른쪽에 상세 패널이 붙어서 열린다.\n   - 상세 버튼을 별도 컬럼으로 강제하지 말고, 행 전체를 클릭 가능한 대상으로 만든다.\n   - Drawer는 오버레이 모달이 아니라 테이블과 같은 작업영역 안의 우측 컬럼이다.\n   - 닫기 버튼, Escape 닫기, 선택 행 강조, 포커스 복귀를 포함한다.\n   - Drawer 내부는 선택 행의 컬럼값을 요약 그리드와 입력 필드로 재구성한다.\n   - 정보가 적은 행도 빈 공간을 크게 남기지 말고 운영 메모, 상태 변경, 저장 액션을 바로 붙인다.\n\n테이블 설계 원칙:\n- 테이블은 운영자가 한 화면에서 많은 행을 볼 수 있도록 조밀하게 만든다.\n- BO 테이블의 기본 폰트 크기는 `8px`로 정의한다. `12px`를 기본값으로 쓰지 않는다.\n- 테이블 헤더, 본문 셀, 보조 텍스트, badge, status, filter chip, checkbox label은 모두 `8px` 기준으로 맞춘다.\n- 페이지 제목, 상단 업무명처럼 화면 위계를 만드는 텍스트만 예외적으로 더 크게 쓴다.\n- 헤더 높이는 약 42px, 본문 행 높이는 약 48~52px 수준으로 유지한다.\n- 날짜는 모든 곳에서 `YY-MM-DD` 형식으로 표기한다.\n  - 예: 2026-02-09가 아니라 `26-02-09`\n  - 날짜+시간이 꼭 필요한 활동 로그는 `YY-MM-DD HH:mm` 형식으로 표기한다.\n- 짧은 정보이거나 같은 맥락의 정보는 반드시 한 컬럼 안에 묶는다.\n  - 이름 + 나이 + 성별\n  - 이메일 + 휴대폰\n  - 가입일 + 가입채널\n  - 최근 로그인 + 체류시간\n  - 회원유형 + 구독상태\n  - 전문가 레벨 + 평점\n  - 매칭상태 + 진행상태\n  - 결제상태 + 결제수단\n- 컬럼 수를 늘리는 것보다 2줄 셀을 적극적으로 사용한다.\n- 긴 메모, 주소, 제목, 카테고리명은 말줄임 처리하고 title/tooltip으로 전체 내용을 확인할 수 있게 보이게 한다.\n- 상태값은 색상만으로 구분하지 말고 텍스트를 함께 표기한다.\n- 체크박스 선택 컬럼과 관리번호/ID 컬럼은 좌측 고정처럼 보이게 한다.\n\n권장 컬럼 묶음:\n\n회원 테이블:\n- 선택\n- 회원 관리번호\n- 이름 / 나이·성별\n- 이메일 / 휴대폰\n- 주소 / 국가\n- 회원유형 / 구독\n- 가입일 / 채널\n- 최근 로그인 / 체류시간\n- 전문가 레벨 / 평점\n- 매칭 / 상태\n- 등급\n- 결제 / 상태\n- 메모\n\n결제 테이블:\n- 결제번호\n- 회원 / 관리번호\n- 상품 / 서비스\n- 금액 / 수수료\n- 결제상태 / 수단\n- 결제일 / 환불일\n- 담당 / 메모\n\n매칭 테이블:\n- 의뢰번호\n- 의뢰인 / 관리번호\n- 유형 / 카테고리\n- 언어 / 분야\n- 전문가 / 배정상태\n- 진행상태 / 마감일\n- 금액 / 결제\n- 등록일 / 수정일\n\n시험 테이블:\n- 시험번호\n- 시험명 / 분류\n- 대상 / 등급\n- 응시료 / 시간\n- 문항수 / 채점방식\n- 일정 / 회차\n- 응시자 / 합격률\n- 관리\n\n문의 테이블:\n- 문의번호\n- 회원 / 관리번호\n- 제목 / 문의유형\n- 접수일 / 답변일\n- 상태 / 담당자\n- 우선순위 / 메모\n\n활동 로그 테이블:\n- 로그번호\n- 회원 / 관리번호\n- 활동 / 경로\n- IP / 기기\n- 발생일시\n- 결과 / 메모\n\n시각 스타일:\n- 배경은 흰색과 밝은 회색 중심으로 유지한다.\n- 주요 브랜드 컬러는 active 탭, primary button, 핵심 상태 강조에만 제한적으로 사용한다.\n- 테이블 헤더는 `#eceef2` 계열의 연한 회색 배경을 사용한다.\n- 셀 경계는 얇은 `#eee` 또는 `#ddd` 라인으로 구분한다.\n- radius는 기존 화면처럼 4~6px 수준만 사용하고, 과한 카드형 UI는 만들지 않는다.\n- 이모지는 기존 참고 화면에 있는 수준으로만 제한적으로 사용한다. 컬럼 제목에는 가능하면 텍스트 중심으로 정리한다.\n- 한 화면에 검색, 필터, 하위 탭, 테이블, 하단 일괄 액션이 모두 보이도록 여백을 줄인다.\n- 선택된 검색조건 아래 요약 정보는 카드형 border 박스로 만들지 말고, `전체 회원 50명 · 일반 24명 · 기업 12명`처럼 한 줄 summary strip으로 나열한다.\n\n하단 액션:\n- 테이블 하단에는 선택된 행에 대한 일괄 액션 영역을 둔다.\n- 예: 선택정보내기, 이메일보내기, SMS전송, 상태변경, 엑셀내보내기\n- 페이지네이션 또는 총 건수 표기를 함께 둔다.\n\n반응형:\n- 데스크톱 BO 화면을 우선한다.\n- 모바일에서는 테이블을 카드로 바꾸지 말고, 핵심 컬럼만 남기고 가로 스크롤을 허용한다.\n- 이름/연락처/상태/날짜 컬럼은 모바일에서도 우선 표시한다.\n\n금지:\n- 기존 DB v2 페이지를 삭제하거나 구조를 크게 바꾸지 마라.\n- 제목 아래의 하위 탭 카운트를 `29` 같은 단독 배지로만 표현하지 마라. 반드시 `전체 회원 (전체 45명)`처럼 텍스트 안에 포함해라.\n- 이름, 나이, 성별처럼 짧고 강하게 연결된 정보를 각각 별도 컬럼으로 분리하지 마라.\n- 날짜를 `YYYY-MM-DD`로 쓰지 마라. 반드시 `YY-MM-DD`로 줄여라.\n- 넓은 카드, 큰 히어로, 마케팅 페이지 같은 장식을 넣지 마라.\n\n산출물:\n- 신규 별도 페이지 1개\n- 대분류 탭 + 하위 탭 구조\n- 대분류 탭 라벨의 `(0명/0건)` 표기\n- 하위 탭 라벨의 `(전체 00명/00건)` 표기\n- 6개 이상 신규 테이블 예시\n- 묶음 컬럼이 적용된 조밀한 테이블\n- YY-MM-DD 날짜 표기\n- 기존 검색필터 패턴 기반의 고밀도 필터 영역\n- 행 클릭 시 목록 오른쪽 컬럼에 붙어서 열리는 inline 우측 Dense Drawer 상세 UI\n- 하단 일괄 액션과 총 건수/페이지네이션\n```\n\n## 핵심 규칙 요약\n\n- 새 테이블은 기존 화면과 분리된 별도 페이지로 만든다.\n- 제목 아래 대분류 탭을 먼저 두고, 대분류 탭은 `탭명 (00명/00건)`, 하위 탭은 `탭명 (전체 00명/00건)` 형식으로 수량을 표기한다.\n- 검색필터는 새로 만들지 말고 기존 `filter-bar` 또는 `dense-filter-card` 패턴을 재사용한다.\n- 테이블 행 클릭 시 기존 `index.html`의 \"회원목록 + 우측 Dense Drawer\"처럼 목록 영역 오른쪽 컬럼에 inline 상세 UI가 열린다.\n- 테이블 목록에서는 묶음 컬럼을 유지하되, Drawer 상세에서는 `이름`, `나이`, `성별`, `이메일`, `휴대폰`, `주소`, `국가`처럼 편집 가능한 단위로 다시 분리한다.\n- 회원 상세는 `docs/회원상세내용_이미지분석_프롬프트.md` 기준으로 좌측 회원기본정보 마스터와 우측 상담/시험/결제/정산 작업영역을 포함한다.\n- Drawer 넓게보기 상태에서는 목록 테이블을 접고 상세 작업영역이 workspace 전체 폭을 사용한다.\n- 선택 row는 배경색과 좌측 primary 인디케이터로 표시한다.\n- 이름/나이/성별, 이메일/휴대폰, 가입일/채널처럼 짧거나 같은 맥락인 정보는 한 컬럼 안에 2줄로 묶는다.\n- 모든 날짜는 `YY-MM-DD`, 활동 로그처럼 시간이 필요한 경우만 `YY-MM-DD HH:mm`으로 쓴다.\n- 테이블은 BO 운영용으로 조밀하게 유지하고, 컬럼 수보다 정보 묶음과 말줄임 처리를 우선한다.\n"

          "content": "# 휴텍씨 디자인 시스템 작업물\n\n이 저장소는 휴텍씨 디자인 시스템 문서와 별도 검증용 화면을 보관합니다.\n\n## 주요 파일\n\n| 파일 | 설명 |\n|---|---|\n| `index.html` | dense Drawer와 밀도 강화 기준이 반영된 현재 기준 디자인 시스템 |\n| `design-system-ver2-dense-drawer.html` | ver2 문서 구조에 dense Drawer 규칙을 적용한 별도 확인용 화면 |\n| `layout.css` | 기존 공통 토큰과 컴포넌트 스타일 |\n| `common.js` | 기존 디자인 시스템 상호작용 |\n| `design-system-v3-dense-drawer.html` | 새로 분리한 ver3 밀도 강화 및 회원 Drawer 테스트 화면 |\n| `dense-drawer.css` | 현재 `index.html`과 별도 샘플에서 쓰는 밀도 강화/Drawer 스타일 |\n| `dense-drawer.js` | 현재 `index.html`과 별도 샘플에서 쓰는 검색 필터와 회원 Drawer 상호작용 |\n| `table_design/관리자패널_전체회원.html` | DB v2 기준 회원목록 + inline 우측 Dense Drawer 적용 페이지 |\n| `table_design/신규테이블관리.html` | 신규 DB 테이블 전환/비교용 BO 테이블 페이지 |\n| `table_design/결제관리.html` | 결제/환불/정산 BO 테이블 페이지 |\n| `table_design/table-design.css` | `table_design` 페이지 공통 BO 테이블, 고밀도 검색조건, inline Drawer 스타일 |\n| `table_design/table-design.js` | `table_design` 페이지 공통 탭, 검색조건, 행 클릭 inline Drawer 상호작용 |\n| `docs/디자인시스템_밀도강화_Drawer_프롬프트.md` | 밀도 강화/Drawer 설계·구현용 프롬프트 |\n| `docs/DB_v2_신규테이블_페이지_프롬프트.md` | DB v2 기반 신규 테이블/검색조건/inline Drawer 제작 프롬프트 |\n| `docs/회원상세내용_이미지분석_프롬프트.md` | `회원_상세내용.png` 분석 기반 회원 상세 작업영역 구현 프롬프트 |\n\n## 이번에 추가된 내용\n\n- 기존 디자인 시스템 오염을 막기 위해 ver3 화면을 `design-system-v3-dense-drawer.html`로 별도 분리했습니다.\n- 검색/필터/체크박스 옵션이 적을 때 양끝으로 벌어지지 않는 `dense flow` 레이아웃을 추가했습니다.\n- 검색바에 회원유형, 권한, 상태, 등급, 가입경로, 수신동의, 인증상태, 담당자, 정렬 등 다수 옵션 테스트 케이스를 넣었습니다.\n- 활성 필터 태그와 `필터 전체 해제` 버튼이 오른쪽 끝으로 밀리지 않고 좌측 flow 안에서 자연스럽게 배치되도록 구성했습니다.\n- 회원목록 상세 편집을 하단 아코디언이 아닌 우측 Drawer 패턴으로 별도 구현했습니다.\n- Drawer는 목록 오른쪽 inline 컬럼으로 열리며, 열기/닫기, ESC 닫기, focus 복귀, 저장/삭제 토스트 예시를 포함합니다.\n- Drawer 폭을 넓히고 기본 정보, 요약 카드, 권한 매트릭스, 타임라인, 태그, 체크리스트가 함께 차는 상세 패턴으로 확장했습니다.\n- 본문에 카드, 메트릭, 미니 테이블, 태그 클라우드, 체크박스 flow 등 다양한 꽉 찬 레이아웃 케이스를 추가했습니다.\n- Drawer 안에 회원정보가 적은 sparse 케이스와 회원속성이 아주 많은 attribute overflow 케이스를 추가했습니다.\n- 최근 활동 타임라인은 항목 내부는 한 줄로 유지하되, 목록 전체는 2~4단 초밀도 로그 그리드로 펼치도록 변경했습니다.\n- Drawer 기본 정보는 라벨과 입력필드를 별도 열로 나누지 않고 한 줄 row로 배치하는 규칙을 적용했습니다.\n- ver2 문서 구조에 dense Drawer를 적용한 `design-system-ver2-dense-drawer.html` 확인용 버전을 추가했습니다.\n- `design-system-ver2-dense-drawer.html`의 예시자료에도 ver3 밀도 강화 원칙, 전체 검색 옵션, 카드/목록 케이스, 체크박스 flow, 2~4단 로그 케이스, 회원 상세 Drawer 샘플을 이식했습니다.\n- 위 적용본을 `index.html`에도 반영해 현재 기준 디자인 시스템으로 업데이트했습니다.\n- 버튼/링크 컴포넌트 예시는 한 줄 반복 나열을 줄이고 매트릭스/역할별 조밀 목록으로 정리했습니다.\n- `index.html` 좌측 사이드바에 `BO/DB` 분류를 추가하고, `table_design` 페이지와 `resource/DB_v2_HTML` 원본 참고 화면을 iframe 미리보기/새 탭 링크로 확인할 수 있게 했습니다.\n- `table_design/관리자패널_전체회원.html`은 50명 회원 데이터, DB페이지 v2 기준 검색조건 전체, 행 클릭 inline 우측 Dense Drawer를 포함합니다.\n- BO 회원 검색조건 CSS는 `dense-filter-flow` flex, `dense-filter-role-group` display contents, `dense-filter-group` flex, `legend 58px + dense-filter-options flex` 기준으로 정리했습니다.\n- `table_design`의 회원 상세 Drawer는 테이블의 묶음 컬럼을 상세 화면에서 `이름`, `나이`, `성별`, `이메일`, `휴대폰`, `주소`, `국가`처럼 편집 가능한 단위로 다시 분리합니다.\n- `회원_상세내용.png`를 기준으로 회원 상세 Drawer에 좌측 회원기본정보 마스터, 우측 상담/시험/결제/정산 작업영역을 추가했습니다.\n- 선택된 회원 row는 배경색과 좌측 primary 인디케이터로 표시합니다.\n\n## 확인 방법\n\n브라우저에서 아래 파일을 직접 열어 확인합니다.\n\n```text\ndesign-system-v3-dense-drawer.html\n```\n\n현재 기준 디자인 시스템은 `index.html`에서 확인합니다.\nBO/DB 관리자 테이블 페이지는 `index.html`의 `BO/DB` 사이드바 항목에서 확인하거나 아래 파일을 직접 엽니다.\n\n```text\ntable_design/관리자패널_전체회원.html\ntable_design/신규테이블관리.html\ntable_design/결제관리.html\n```\n\nver2 dense 적용 확인본은 아래 파일에도 남겨둡니다.\n\n```text\ndesign-system-ver2-dense-drawer.html\n```\n\n## 격리 원칙\n\n- `index.html`은 dense Drawer와 밀도 강화 예시를 반영한 현재 기준 문서입니다.\n- `index.html`의 `BO/DB` 섹션은 관리자 테이블 페이지 링크 허브입니다. 신규 BO 페이지를 만들면 이 섹션에 미리보기 링크를 추가합니다.\n- `table_design` 페이지는 기존 `index.html`의 검색필터와 \"회원목록 + 우측 Dense Drawer\" 패턴을 BO 운영 화면에 적용한 별도 실물 페이지입니다.\n- dense Drawer 샘플은 `index.html`, `design-system-v3-dense-drawer.html`, `design-system-ver2-dense-drawer.html`에서 확인합니다.\n- ver2 적용 확인본은 `design-system-ver2-dense-drawer.html`로 별도 분리합니다.\n- 공통 토큰은 `layout.css`를 링크해서 재사용하고, 밀도 강화/Drawer 전용 스타일은 `dense-drawer.css`에 작성합니다.\n"

          "content": "# 휴텍씨 디자인 시스템\n\n기준 파일: `index.html`, `layout.css`, `common.js`\n\n이 문서는 현재 `index.html`에 구현된 디자인 시스템 화면을 기준으로, 이후 시험/번역/서비스 홈페이지를 만들 때 반복 적용할 공통 규칙을 정리한 문서입니다.\n\n## 1. 시스템 원칙\n\n### 1.1 공통 틀 우선\n\n홈페이지와 업무 화면은 개별 페이지를 바로 만들기보다 다음 공통 틀을 먼저 고정합니다.\n\n- Header: 로고, 주요 메뉴, 사용자/알림 영역\n- Sidebar 또는 Rail: 업무별 보조 탐색\n- Content: 검색, 필터, 목록, 상세, 작성 영역\n- Footer: 약관, 개인정보, SNS, 저작권\n\n개별 홈페이지는 이 틀 위에 서비스 소개, 기능, 실적, 전문가 신청, 견적 의뢰, FAQ, 회사 소개를 조합합니다.\n\n### 1.2 공통과 개별 분리\n\n공통 UI와 업무 콘텐츠를 분리합니다.\n\n- 공통 UI: 버튼, 입력, 탭, 칩, 상태 pill, 테이블, 토스트, 모달, 페이지네이션\n- 개별 콘텐츠: 시험 종목, 번역 분야, 고전 번역 설명, 마케팅 문구, 신청서 항목\n\n개별 홈페이지를 만들 때는 색상/문구/이미지/섹션 순서를 바꾸더라도 공통 UI class와 토큰은 유지합니다.\n\n### 1.3 홈페이지 목차 원칙\n\n첫 화면은 회사 소개보다 서비스 소개를 먼저 보여줍니다.\n\n권장 순서:\n\n1. 서비스 소개 / Hero\n2. 기능, 분야, 현황, 기술 설명\n3. 실적\n4. 전문가 신청\n5. 견적 의뢰\n6. FAQ, 상담, 신청 흐름\n7. 회사 소개\n\n고전 번역처럼 독립 브랜드 성격이 강한 홈페이지는 기존 번역 사이트 틀을 재사용하되, 별도 색상 구조와 현황/기술 설명을 강화합니다.\n\n## 2. 디자인 토큰\n\n### 2.1 색상\n\n| 역할 | 토큰 | 값 | 사용처 |\n|---|---|---:|---|\n| 기본 텍스트 | `--ds-color-text-primary` | `#222222` | 제목, 본문 핵심 텍스트 |\n| 보조 텍스트 | `--ds-color-text-secondary` | `#666666` | 설명, 보조 정보 |\n| 약한 텍스트 | `--ds-color-text-muted` | `#808080` | caption, placeholder 보조 |\n| 비활성 텍스트 | `--ds-color-text-disabled` | `#999999` | disabled 상태 |\n| 반전 텍스트 | `--ds-color-text-inverse` | `#ffffff` | 컬러 배경 위 텍스트 |\n| 브랜드 | `--ds-color-brand-primary` | `#0088ff` | 주요 버튼, 선택 상태 배경 |\n| 브랜드 강조 | `--ds-color-brand-primary-strong` | `#006dcc` | 연한 배경 위 텍스트, 링크, 칩 라벨 |\n| 보조 브랜드 | `--ds-color-brand-secondary` | `#822afd` | 전문가 신청 CTA |\n| 성공 | `--ds-color-accent-success` | `#51b117` | 성공 상태 면/아이콘 |\n| 성공 강조 | `--ds-color-accent-success-strong` | `#2f7d0c` | 성공 텍스트 |\n| 경고 | `--ds-color-accent-warning` | `#f7b22c` | 경고 상태 면/아이콘 |\n| 경고 강조 | `--ds-color-accent-warning-strong` | `#8a5a00` | 경고 텍스트 |\n| 오류 | `--ds-color-accent-danger` | `#dc3d3d` | 삭제, 오류 버튼 |\n| 오류 강조 | `--ds-color-accent-danger-strong` | `#b42323` | 오류 텍스트 |\n| 페이지 배경 | `--ds-color-bg-page` | `#f8f9fc` | 본문 배경 |\n| 기본 배경 | `--ds-color-bg-base` | `#ffffff` | 카드, 입력, 패널 |\n| 선택 배경 | `--ds-color-bg-selected` | `#d7e7fc` | 선택 영역 배경 |\n| 정보 연한 배경 | `--ds-color-bg-info-soft` | `#e7f2ff` | 상태 pill, filter tag |\n| 기본 선 | `--ds-color-border-default` | `#e3e5ed` | 카드/입력/테이블 경계 |\n\n### 2.2 간격, 곡률, 높이\n\n| 분류 | 값 | 사용처 |\n|---|---|---|\n| Spacing | `2, 4, 6, 8, 10, 12, 16, 20, 24, 30px` | 내부 여백, gap |\n| Radius | `2, 4, 6, 8, 12, 20px` | 입력, 버튼, 카드, 프로필, pill |\n| Height | `24, 32, 40, 60px` | 소형 버튼, 기본 입력/버튼, 사이드 메뉴, GNB/Footer |\n\n## 3. 접근성 기준\n\n### 3.1 명도 대비\n\n버튼, 칩, 상태 pill, badge, tag를 만들 때는 텍스트와 배경 또는 주요 경계의 명도 대비를 최소 `3:1` 이상으로 유지합니다.\n\n현재 시스템에서 지켜야 할 조합:\n\n- 연한 파란 배경 위 텍스트: `--ds-color-brand-primary-strong` 사용\n- 컬러 버튼 위 텍스트: `--ds-color-text-inverse` 사용\n- 비활성 pill: `#f2f2f2` 배경 위 `#555555` 사용\n- 성공/경고/오류 텍스트: 일반 accent 색을 그대로 쓰지 말고 `*-strong` 토큰 사용\n\n주의:\n\n- `#0088ff` 텍스트를 `#d7e7fc` 위에 올리는 조합은 약하므로 피합니다.\n- `#51b117`, `#f7b22c`를 흰 배경 위 작은 텍스트로 쓰지 않습니다. 아이콘/면 색상으로 쓰거나 strong 토큰을 함께 씁니다.\n- 색상만으로 상태를 전달하지 말고 텍스트, 아이콘, `aria-pressed`, `aria-selected`, `role=\"switch\"` 같은 상태 정보도 함께 제공합니다.\n\n### 3.2 키보드와 포커스\n\n- 버튼, 링크, 입력, 탭은 `:focus-visible` 스타일을 유지합니다.\n- 탭은 `role=\"tablist\"`, `role=\"tab\"`, `aria-selected`를 사용합니다.\n- 토글은 `role=\"switch\"` 또는 `aria-pressed`를 사용합니다.\n- 토스트 영역은 `aria-live=\"polite\"`와 `aria-atomic=\"true\"`를 사용합니다.\n- 모달은 `role=\"dialog\"`, `aria-modal=\"true\"`, 제목 연결 `aria-labelledby`를 사용합니다.\n\n## 4. 컴포넌트 규칙\n\n### 4.1 Button\n\n기본 class는 `btn`입니다. 변형은 `btn--primary`, `btn--outline`, `btn--neutral`, `btn--secondary`, `btn--danger`를 사용합니다.\n\n크기:\n\n- `btn--sm`: 24px\n- `btn--md`: 32px\n- `btn--lg`: 40px\n\n기존 호환을 위해 `small`, `large`, `outline`, `neutral`, `secondary`, `danger` 별칭도 유지하지만 새 페이지에서는 `btn--*` 형식을 우선 사용합니다.\n\n### 4.2 Link\n\n본문 이동이나 테이블 내 강조 값은 버튼 대신 `text-link`를 사용합니다.\n\n- 기본 링크: `text-link`\n- 보조 링크: `text-link muted-link`\n- 위험 링크: `text-link danger-link`\n\n### 4.3 Tab\n\n탭은 역할에 따라 class를 선택합니다.\n\n- `tabs--underline`: 페이지 상단 주요 구분\n- `tabs--box`: 상세 정보 패널\n- `tabs--pill`: 상태/카테고리 필터\n- `tabs--segmented`: 목록/캘린더/요약 같은 보기 전환\n\n선택 상태는 `.active`와 `aria-selected=\"true\"`를 함께 맞춥니다.\n\n### 4.4 Chip, Tag, Status Pill\n\n필터와 상태 표시는 다음 class를 사용합니다.\n\n- 필터 칩: `filter-chip`\n- 활성 필터 태그: `filter-tag`\n- 규칙 필터 칩: `chip-button`\n- 상태 표시: `state-pill`\n- 비활성/검토중 상태: `state-pill off`\n- 규칙 라벨: `rule-tag`\n\n접근성 규칙:\n\n- 활성 칩은 `aria-pressed=\"true\"`를 사용합니다.\n- 연한 배경 위 텍스트는 strong 토큰을 사용합니다.\n- 상태는 색상만으로 구분하지 않고 \"완료\", \"검토중\", \"고정\", \"준고정\"처럼 텍스트를 같이 표시합니다.\n\n### 4.5 Form\n\n입력 기본 class는 `field`입니다.\n\n- 기본 높이: 32px\n- 라벨: `label`\n- 상세 입력: `textarea.field`\n- 도움말/오류 문구가 필요한 경우 `field-help`, `field-error` 패턴을 사용합니다.\n\n### 4.6 Table\n\n시험 목록은 `exam-table`을 사용합니다.\n\n- 테이블은 `table-scroll` 안에 넣어 가로 스크롤을 허용합니다.\n- 헤더는 12px 보조 텍스트, 본문은 14px 기준입니다.\n- 목록 폭이 넓으면 모바일에서 억지로 줄이지 않고 가로 스크롤을 허용합니다.\n\n### 4.7 Feedback\n\n토스트:\n\n- 기본 class: `toast`\n- 상태 class: `success`, `warning`, `danger`, `info`\n- 고정 viewport: `toast-viewport`\n\n모달:\n\n- 배경: `modal-backdrop`\n- fixed 모달: `modal-backdrop is-fixed`\n- 본문: `modal`\n- 액션: `modal-actions`\n\n## 5. 레이아웃 패턴\n\n### 5.1 기본 페이지\n\n- `shell`: 전체 문서 구조\n- `nav`: 디자인 시스템 문서 목차\n- `main`: 본문\n- `section`: 문서 또는 화면 단위\n- `panel`: 경계가 있는 기본 패널\n- `grid two`, `grid three`, `grid four`: 반응형 그리드\n\n### 5.2 서비스 홈페이지\n\n홈페이지는 과한 장식보다 실제 사용자가 바로 이해할 수 있는 정보 구조를 우선합니다.\n\n권장:\n\n- Hero는 서비스명/서비스 소개를 첫 신호로 보여줍니다.\n- CTA는 \"전문가 신청\", \"견적 의뢰\", \"상담하기\"처럼 실제 행동 문구로 씁니다.\n- 카드가 필요한 경우 반복 항목에만 사용합니다.\n- 검색/필터가 있는 화면은 인라인 칩과 활성 태그를 함께 제공합니다.\n\n지양:\n\n- 회사 소개를 첫 화면의 핵심으로 두는 구성\n- 상태가 색상만으로 구분되는 칩/배지\n- 좁은 입력칸과 한 화면 과밀 배치\n- 동일 역할의 버튼 class를 페이지마다 새로 만드는 방식\n\n## 6. 새 홈페이지 제작 체크리스트\n\n- 공통 `layout.css` 토큰을 먼저 연결했는가?\n- Header, Content, Footer 구조가 유지되는가?\n- 서비스 소개가 회사 소개보다 먼저 나오는가?\n- 실적, 전문가 신청, 견적 의뢰가 빠지지 않았는가?\n- 버튼은 `btn btn--variant btn--size` 조합을 쓰는가?\n- 칩/상태/badge/tag의 대비가 최소 `3:1` 이상인가?\n- 선택 상태에 `aria-pressed` 또는 `aria-selected`가 있는가?\n- 키보드 포커스가 보이는가?\n- 모바일에서 테이블/필터/헤더가 깨지지 않는가?\n- 색상 직접 입력보다 토큰 사용을 우선했는가?\n"

          "content": "# 2024 Figma PDF 기준 사이트맵 및 기능 정의\n\n작성일: 2026-05-21  \n분석 대상: `figma_pdf/2024`  \n분석 기준: PDF/이미지 파일명, `메뉴 구조.png`, `관리자 홈.png`, 기존 비교 문서의 2024 범위\n\n## 1. 전체 서비스 개요\n\n2024 Figma 자료는 AITP 시험 플랫폼의 전체 업무 흐름을 담고 있다. 단순한 시험 접수 사이트가 아니라, 수험생이 시험을 신청하고 응시한 뒤 결과와 자격증을 받는 흐름, 출제자가 문제를 만들고 제출하는 흐름, 채점자가 답안을 평가하는 흐름, 관리자가 회원·시험·문제·결제·운영을 통제하는 흐름이 함께 설계되어 있다.\n\n일반 사용자가 이해하기 쉽게 말하면, 이 서비스는 다음 네 종류의 사용자를 위한 통합 시험 운영 시스템이다.\n\n| 사용자 | 하는 일 | 대표 화면 |\n|---|---|---|\n| 수험생 | 시험 접수, 결제, 시험 응시, 결과 확인, 자격증 신청, 문의 | `목록_시험접수.pdf`, `목록_시험응시.pdf`, `목록_시험결과.pdf`, `수험생_자격증 신청하기.png` |\n| 출제자 | 시험 문제 작성, 임시저장, 출제내역 확인, 반려 문항 수정 | `출제관리.pdf`, `출제관리_번역상세.pdf`, `출제관리_프롬프트상세.pdf`, `출제관리_단답형상세.pdf` |\n| 채점자 | 배정된 답안 채점, 채점내역 확인, 피드백 작성 | `채점관리.pdf`, `채점관리_번역상세.pdf`, `채점관리_프롬프트상세.pdf`, `채점자 홈_시험 채점하기.png` |\n| 관리자 | 회원, 시험 일정, 문제, 채점, 결제, 정산, 게시판, 문의, 통계, 코드 관리 | `관리자 홈.png`, `회원관리.pdf`, `시험관리.pdf`, `결제관리.pdf`, `1_1 문의관리.pdf` |\n\n## 2. 상위 사이트맵\n\n`메뉴 구조.png` 기준으로 상단 메뉴는 다음과 같이 구성된다.\n\n| 상단 메뉴 | 주요 사용자 | 설명 |\n|---|---|---|\n| 관리자 홈 | 관리자 | 전체 운영 현황과 주요 관리 기능 진입점 |\n| 회원관리 | 관리자 | 수험생, 출제자, 채점자, 관리자 계정 관리 |\n| 시험관리 | 관리자, 수험생 | 시험 일정, 시험 응시, 시험 결과, 자격증 관리 |\n| 문제관리 | 관리자, 출제자 | 출제, 출제내역, 문제 검수, 시험 결과 연계 |\n| 채점관리 | 관리자, 채점자 | 채점 배정, 채점 진행, 채점 결과 확인 |\n| 결제관리 | 관리자, 수험생 | 결제정보, 카드정보, 정산정보, 자격증 정산 |\n| 코드추가 | 관리자 | 시험 분류, 언어, 등급, 대/중/소분류 코드 관리 |\n| 1:1 문의 관리 | 관리자, 전체 사용자 | 문의 접수, 답변, 문의 상세 확인 |\n| 내 정보 | 전체 사용자 | 계정 정보, 비밀번호, 프로필, 로그아웃 |\n\n역할별 홈 메뉴는 다음과 같다.\n\n| 역할 | 홈에서 바로 접근하는 기능 |\n|---|---|\n| 수험생 홈 | 시험응시, 시험결과, 자격증신청, 1:1문의, 내 정보 |\n| 출제자 홈 | 시험 출제하기, 출제 내역, 1:1문의, 내 정보 |\n| 채점자 홈 | 시험 채점하기, 채점내역, 1:1문의, 내 정보 |\n| 관리자 홈 | 회원관리, 시험관리, 문제관리, 채점관리, 결제관리, 운영관리, 통계관리, 문의관리 |\n\n## 3. 인증 및 계정 기능\n\n사용자가 서비스를 이용하기 전 또는 계정 정보를 관리할 때 필요한 기능이다.\n\n| 기능 | 화면 파일 | 기능 설명 |\n|---|---|---|\n| 로그인 | `로그인.pdf` | 아이디/비밀번호로 로그인하고 권한에 맞는 홈으로 이동 |\n| 로그아웃 | `로그아웃.pdf`, `로그아웃-1.pdf` | 현재 세션 종료 |\n| 회원가입 | `회원가입.pdf`, `회원가입_간편가입.pdf` | 일반 가입 또는 간편 가입 |\n| 본인/휴대폰 인증 | `본인인증 2.pdf`, `휴대폰 인증.pdf` | 가입, 아이디 찾기, 비밀번호 재설정 전 본인 확인 |\n| 아이디 찾기 | `아이디찾기.pdf`, `아이디확인.pdf` | 인증 후 계정 ID 확인 |\n| 비밀번호 찾기/재설정 | `비밀번호찾기.pdf`, `비밀번호재설정.pdf`, `비밀번호설정완료.pdf` | 새 비밀번호 설정 |\n| 회원탈퇴 | `회원탈퇴.pdf`, `회원탈퇴-1.pdf`, `회원탈퇴_환불.pdf`, `회원탈퇴_환불-1.pdf` | 탈퇴 전 환불/보존 정보 확인 후 탈퇴 처리 |\n| 이용약관 | `이용약관.pdf` | 가입 및 서비스 이용 약관 확인 |\n\n핵심 정책은 계정 권한에 따라 화면 접근이 달라져야 한다는 점이다. 같은 로그인 화면을 사용하더라도 수험생은 시험 접수와 응시 중심, 출제자는 출제 작업 중심, 채점자는 채점 작업 중심, 관리자는 운영 관리 중심으로 진입해야 한다.\n\n## 4. 수험생 영역\n\n수험생 영역은 “시험을 찾고 접수한다 → 결제한다 → 시험을 본다 → 결과를 확인한다 → 자격증을 신청한다”의 흐름으로 이해하면 된다.\n\n### 4.1 시험 접수\n\n| 화면 | 기능 |\n|---|---|\n| `목록_시험접수.pdf` | 접수 가능한 시험 목록 확인 |\n| `목록_시험접수_팝업.pdf` | 시험 접수 전 상세 확인 또는 신청 팝업 |\n| `목록_시험접수_변경.pdf` | 접수 정보 변경 |\n| `목록_시험접수_변경확인.pdf` | 변경 내용 최종 확인 |\n| `목록_시험접수_취소.pdf` | 접수 취소 및 환불 가능 여부 확인 |\n\n주요 기능은 시험명, 차수, 등급, 언어, 시험일, 접수기간, 응시료, 접수상태를 확인하고 접수/변경/취소를 처리하는 것이다.\n\n### 4.2 시험 응시\n\n| 화면 | 기능 |\n|---|---|\n| `목록_시험응시.pdf`, `목록_시험응시-1.pdf` | 응시 가능한 시험 목록 확인 |\n| `응시생_시험시작.png` | 시험 시작 전 진입 화면 |\n| `응시생_시험중.png` | 실제 시험 진행 화면 |\n| `응시생_시험중_문장나누기).png` | 문장 분할형 시험 진행 |\n| `응시생_시간확인.png` | 남은 시간 확인 |\n| `응시생_전체화면.png` | 시험 중 전체화면 상태 |\n| `응시생_제출.png`, `응시생_제출확인.png` | 답안 제출 및 제출 확인 |\n| `응시생_종료.png` | 시험 종료 화면 |\n| `응시생_다음차시.png` | 다음 차시 이동 |\n\n시험 응시 화면은 부정행위 방지, 시간 제한, 답안 저장, 제출 확인이 중요하다. 특히 시험 도중에는 현재 문항, 남은 시간, 다음/이전 이동, 임시저장 또는 자동저장, 최종 제출 상태가 명확해야 한다.\n\n### 4.3 시험 유형별 응시\n\n| 유형 | 화면 | 설명 |\n|---|---|---|\n| 번역형 | `시험_번역(번역기지정).pdf`, `시험_출제_번역기선택(텍스트)_전체보기.pdf` | 번역기 선택, 원문/번역문 작성, 전체보기 |\n| 음성/영상 번역 | `시험_음성영상(번역기2개).pdf`, `시험_음성영상(번역기3개).pdf`, `영상.pdf` | 음성·영상 자료 기반 응시 |\n| 웹툰 번역 | `시험_웹툰번역(번역기선택).png` | 이미지/웹툰 콘텐츠 번역 |\n| 프롬프트형 | `응시생_프롬프트AI선택.png`, `응시생_프롬프트설정.png`, `응시생_프롬프트시작.png`, `응시생_프롬프트에디터.png` | AI 선택, 프롬프트 조건 설정, 에디터 작성 |\n| 단답형 | `응시생_단답형시작.png`, `응시생_단답형시험.png`, `상세_단답형.pdf` | 짧은 답안 입력형 시험 |\n\n### 4.4 시험 결과 및 자격증\n\n| 화면 | 기능 |\n|---|---|\n| `목록_시험결과.pdf` | 응시한 시험의 결과 목록 확인 |\n| `목록_자격증신청.pdf` | 합격 후 자격증 신청 목록 확인 |\n| `수험생_자격증 신청하기.png` | 자격증 발급 신청 |\n\n결과 화면에서는 합격/불합격, 점수, 채점중 여부, 성적표 보기, 자격증 신청 가능 여부가 표시되어야 한다. 자격증 신청은 합격자에게만 활성화되어야 하며 결제 또는 배송 정보와 연결될 수 있다.\n\n## 5. 출제자 영역\n\n출제자 영역은 문제를 새로 만들고, 임시저장하고, 제출하고, 승인/반려 상태를 확인하는 업무 공간이다.\n\n| 화면 | 기능 |\n|---|---|\n| `출제관리.pdf` | 출제 업무 목록과 검색 |\n| `출제관리_번역상세.pdf` | 번역형 문제 상세 작성/확인 |\n| `출제관리_프롬프트상세.pdf` | 프롬프트형 문제 상세 작성/확인 |\n| `출제관리_단답형상세.pdf` | 단답형 문제 상세 작성/확인 |\n| `목록_출제내역.pdf` | 출제자가 제출한 문제 목록 |\n| `시험 출제내역.png` | 출제 이력 화면 |\n| `상세_출제_설정.pdf`, `상세_출제_설정-1.pdf` | 출제 기본 설정 |\n| `상세_프롬프트출제_설정.pdf`, `상세_프롬프트출제_설정-1.pdf` | 프롬프트 출제 조건 설정 |\n| `상세_프롬프트출제_확인.pdf` | 프롬프트 출제 최종 확인 |\n| `상세_단답형출제_출제.pdf` | 단답형 문항 작성 |\n| `상세_단답형출제_확인.pdf` | 단답형 문항 확인 |\n| `임시저장.pdf`, `저장.pdf`, `저장팝업.pdf` | 저장/임시저장 확인 |\n\n출제 기능의 핵심 필드는 시험명, 차수, 등급, 언어쌍, 대/중/소분류, 문제 유형, 난이도, 배점, 지문, 문제, 정답, 해설, 평가기준, 첨부파일이다.\n\n출제 프로세스는 다음과 같다.\n\n1. 출제자가 로그인한다.\n2. 담당 시험 또는 새 문제 생성을 선택한다.\n3. 시험/언어/분류/난이도/문제 유형을 설정한다.\n4. 지문, 문제, 정답, 해설, 평가기준을 입력한다.\n5. 미리보기로 수험생 화면 기준 표시를 확인한다.\n6. 임시저장 또는 최종제출을 한다.\n7. 관리자가 검수한다.\n8. 반려되면 수정 후 재제출하고, 승인되면 문제은행 또는 시험에 반영된다.\n\n## 6. 채점자 영역\n\n채점자 영역은 배정된 답안을 확인하고, 기준표에 따라 점수와 피드백을 입력하는 업무 공간이다.\n\n| 화면 | 기능 |\n|---|---|\n| `채점자 홈.png` | 채점자 작업 현황 |\n| `채점자 홈_시험 채점하기.png` | 채점 대상 시험 선택 |\n| `채점자 홈_시험 채점하기_개별채점하기.png` | 개별 답안 채점 |\n| `채점자 홈_채점내역.png` | 완료/진행 중 채점 내역 |\n| `채점관리.pdf` | 관리자 또는 채점자용 채점 목록 |\n| `채점관리_번역상세.pdf` | 번역형 답안 채점 |\n| `채점관리_프롬프트상세.pdf` | 프롬프트형 답안 채점 |\n| `채점관리_단답형상세.pdf` | 단답형 답안 채점 |\n| `상세_번역채점.pdf`, `상세_번역채점_피드백.pdf` | 번역 채점과 피드백 |\n| `상세_프롬프트채점.pdf`, `상세_프롬프트채점_상세.pdf` | 프롬프트 채점 상세 |\n| `목록_채점내역.pdf` | 채점 완료/진행 목록 |\n| `평가서 팝업.png` | 평가서 또는 채점 의견 팝업 |\n\n채점 화면은 문제, 수험생 답안, 평가 기준, 점수 입력, 코멘트, 임시저장, 채점완료 버튼이 한 흐름으로 보여야 한다. 특히 주관식/번역형/프롬프트형은 자동 채점이 어렵기 때문에 채점 기준표와 이력 추적이 중요하다.\n\n## 7. 관리자 영역\n\n관리자 영역은 전체 플랫폼을 운영하는 본부 화면이다. `관리자 홈.png` 기준으로 검색 조건, 체크박스 필터, 대량 테이블, 상태 버튼, 팝업, 삭제 안내, 시험 추가/삭제 기능이 확인된다.\n\n### 7.1 회원관리\n\n| 화면 | 기능 |\n|---|---|\n| `회원관리.pdf` | 전체 회원 목록 조회 |\n| `회원관리_상세_전체.pdf` | 회원 상세 정보 확인/수정 |\n| `그룹관리.pdf` | 회원 그룹 또는 권한 그룹 관리 |\n| `관리자관리.pdf` | 관리자 계정 관리 |\n| `전문가관리.pdf`, `전문가관리_상세_전체.pdf` | 출제자/채점자 등 전문가 계정과 프로필 관리 |\n| `전문가신청.pdf`, `전문가신청_저장.pdf` | 전문가 신청 및 저장 |\n| `목록_전문가프로필.pdf`, `목록_전문가프로필-1.pdf` | 전문가 프로필 목록 |\n| `프로필관리.pdf` | 프로필 정보 관리 |\n\n회원관리에서는 수험생, 출제자, 채점자, 관리자, 전문가를 구분하고 승인/반려, 정지/복구, 그룹 변경, 상세 조회, 엑셀 다운로드가 가능해야 한다.\n\n### 7.2 시험관리\n\n| 화면 | 기능 |\n|---|---|\n| `시험관리.pdf` | 시험 목록 및 일정 관리 |\n| `시험관리_신규.pdf` | 새 시험 등록 |\n| `관리자 홈.png` | 시험 일정 관리, 시험 추가, 시험 삭제, 상태 필터 |\n| `다음 출제 화면.pdf`, `다음 채점 화면.pdf` | 시험 이후 출제/채점 단계 이동 |\n\n시험관리는 시험일정, 시험응시관리, 시험결과관리, 자격증관리와 연결된다. 시험을 등록할 때는 시험명, 회차, 시험일, 접수기간, 응시시간, 응시료, 언어, 등급, 분류, 응시자 제한, 결과 발표일 등을 다룬다.\n\n### 7.3 문제관리 및 코드관리\n\n| 화면 | 기능 |\n|---|---|\n| `카테고리관리.pdf` | 시험/문제 카테고리 관리 |\n| `구분.pdf`, `구분-1.pdf` ~ `구분-8.pdf`, `구분.png` | 대/중/소 구분 또는 분류 코드 관리 |\n| `관리자 추가 버튼들 - 미완료.pdf` | 관리자 화면에 추가될 버튼/액션 |\n| `정보없을경우.pdf` | 데이터 없음 상태 |\n\n코드/분류 관리는 시험 종목, 언어 코드, 등급 코드, 대분류/중분류/소분류, 사용 여부, 노출 순서 등을 관리하는 기능으로 해석된다. 이 기능은 시험 등록, 문제 출제, 채점, 통계의 기준값으로 쓰인다.\n\n### 7.4 결제 및 정산\n\n| 화면 | 기능 |\n|---|---|\n| `결제관리.pdf` | 결제 목록 관리 |\n| `결제.pdf`, `결제-1.pdf`, `결제-2.pdf`, `결제-3.pdf` | 결제 단계 또는 결제 상태별 화면 |\n| `결제미승인.pdf` | 미승인 결제 확인 |\n| `결제완료.pdf` | 결제 완료 |\n| `신용카드.pdf` | 카드 결제 |\n| `포인트 결제.pdf`, `포인트 결제-1.pdf` | 포인트 결제 |\n| `목록_결제내역.pdf` | 사용자 결제내역 |\n| `정산관리.pdf`, `목록_정산내역.pdf`, `결제/정산 관리.pdf` | 정산 내역과 보고서 관리 |\n| `요금제.pdf`, `장바구니.pdf` | 요금제 선택 및 장바구니 |\n\n결제 기능은 시험 응시료, 자격증 발급비, 포인트 결제, 결제 취소/환불, 정산 보고서와 연결된다.\n\n### 7.5 고객지원 및 운영관리\n\n| 화면 | 기능 |\n|---|---|\n| `1_1 문의관리.pdf` | 관리자 문의 목록 |\n| `목록_1_1문의.pdf` | 사용자 문의 목록 |\n| `마이페이지_1_1 문의 상세.pdf` | 문의 상세와 답변 |\n| `문의팝업.pdf` | 문의 작성/확인 팝업 |\n| `고객지원.pdf`, `고객지원(신규).pdf` | 고객지원 메인/신규 화면 |\n| `게시판+FAQ.pdf`, `게시판+FAQ_상세.pdf` | 게시판 및 FAQ 목록/상세 |\n| `블로그_목록.pdf`, `블로그_상세.pdf` | 블로그 운영 |\n| `사이트관리.pdf`, `사이트관리_메인배너(수정).pdf` | 사이트 기본정보 및 메인 배너 관리 |\n| `알림창관리.png` | 팝업/알림창 관리 |\n| `이메일발송.pdf` | 이메일 발송 |\n| `통계.pdf` | 통계 관리 |\n\n운영관리 영역은 사용자가 직접 보는 게시판/FAQ/블로그/공지와, 관리자만 사용하는 사이트 설정/배너/알림창/이메일/통계를 포함한다.\n\n## 8. AI·미디어 기능\n\n2024 자료에는 일반 시험 기능 외에 STT, TTS, STS, Youtube, 영상, 음성, 번역 관련 화면이 포함된다.\n\n| 기능 | 화면 | 설명 |\n|---|---|---|\n| STT | `STT.pdf`, `STT(음성파일 업로드 후).pdf` | 음성 파일을 텍스트로 변환하거나 시험 자료로 활용 |\n| TTS | `TTS.pdf` | 텍스트를 음성으로 변환 |\n| STS | `STS.pdf` | 음성 간 변환 또는 음성 기반 처리 기능으로 추정 |\n| Youtube | `Youtube.pdf` | 유튜브 영상 기반 자료 처리 |\n| 영상 | `영상.pdf` | 영상 자료 기반 시험/문제 |\n| 번역 | 번역 관련 시험/출제/채점 화면 | 텍스트, 음성, 영상, 웹툰 번역 시험에 사용 |\n\n이 영역은 시험 콘텐츠의 입력 소스와 문제 유형을 확장하는 기능으로 보는 것이 적절하다.\n\n## 9. 주요 상태값\n\n| 도메인 | 상태 예시 |\n|---|---|\n| 시험 접수 | 접수가능, 접수완료, 접수마감, 접수취소 |\n| 결제 | 결제대기, 결제완료, 결제미승인, 환불신청, 환불완료 |\n| 응시 | 응시대기, 응시가능, 응시중, 응시완료, 미응시, 응시마감 |\n| 결과 | 채점중, 합격, 불합격, 성적공개, 미발표 |\n| 자격증 | 신청가능, 신청완료, 발급중, 발급완료 |\n| 출제 | 작성중, 임시저장, 검토대기, 반려, 수정요청, 확정, 등록완료 |\n| 채점 | 채점대기, 채점중, 임시저장, 채점완료, 재검토요청, 최종확정 |\n| 문의 | 접수완료, 처리중, 답변완료 |\n| 회원 | 정상, 승인대기, 반려, 정지, 탈퇴 |\n\n## 10. 공통 UI/기능 패턴\n\n2024 자료 전체에서 반복되는 공통 패턴은 다음과 같다.\n\n| 패턴 | 설명 |\n|---|---|\n| 상단 헤더 | 로고, 주요 메뉴, 사용자명, 로그아웃 |\n| 좌측 사이드 메뉴 | 현재 역할/메뉴에 맞는 하위 메뉴 |\n| 검색/필터 | 체크박스, 셀렉트, 날짜, 키워드 검색 |\n| 데이터 테이블 | 목록 조회, 상태 확인, 상세 이동, 대량 선택 |\n| 상태 버튼 | 접수하기, 결제하기, 시험시작, 채점하기, 승인/반려 등 |\n| 팝업 | 저장 확인, 삭제 안내, 문의, 시험 추가, 평가서 |\n| 상세 화면 | 기본 정보, 상태, 첨부, 이력, 저장 버튼 |\n| 빈 상태 | 정보 없음 또는 조회 결과 없음 |\n\n## 11. 구현 관점 우선순위\n\n1. 권한별 라우팅과 공통 레이아웃을 먼저 만든다.\n2. 수험생의 시험 접수/결제/응시/결과/자격증 흐름을 연결한다.\n3. 출제자 문제 작성과 관리자 문제 검수 흐름을 연결한다.\n4. 채점자 채점과 관리자 결과 확정 흐름을 연결한다.\n5. 결제/정산/환불을 시험 접수 및 자격증 신청과 연결한다.\n6. 고객지원, 게시판, FAQ, 블로그, 사이트관리, 통계를 운영관리로 묶는다.\n7. STT/TTS/Youtube/영상/번역 기능은 시험 유형 확장 모듈로 분리한다.\n\n## 12. 주의 사항\n\n현재 문서는 PDF 내부 텍스트 전문 OCR이 아니라, 파일명과 확인 가능한 대표 이미지 기준으로 정리했다. 따라서 세부 컬럼명, 버튼명, 입력값은 실제 PDF 화면을 개별 확인하면서 보완해야 한다. 다만 전체 IA와 기능 범위, 역할별 흐름은 2024 Figma 자료만으로도 명확하게 파악된다.\n\n## 13. UX/UI 관점 보완\n\n2024 화면은 기능 범위가 넓기 때문에 단순히 메뉴를 모두 노출하면 사용자가 길을 잃기 쉽다. 역할별로 “지금 해야 할 일”을 먼저 보여주고, 상세 기능은 그 다음 단계에서 펼쳐야 한다.\n\n| 역할 | 첫 화면에서 가장 먼저 보여줘야 할 것 | UX/UI 설계 방향 |\n|---|---|---|\n| 수험생 | 접수한 시험, 오늘 응시 가능 여부, 결과 발표 여부 | 상태 카드와 다음 행동 버튼을 크게 배치한다. 예: `결제하기`, `시험시작`, `결과보기`, `자격증신청` |\n| 출제자 | 임시저장 문항, 반려 문항, 제출 마감 | `이어쓰기`, `수정 후 재제출`, `새 문제 생성`을 빠르게 누를 수 있게 한다. |\n| 채점자 | 채점 대기 건수, 진행 중 채점, 마감 임박 | 채점 대상 목록과 `채점 시작` 버튼을 우선 배치하고, 기준표는 채점 화면에서 고정 영역으로 제공한다. |\n| 관리자 | 미처리 업무, 오류/대기 상태, 오늘의 운영 지표 | 대시보드에서 문의 미답변, 결제 미승인, 환불 대기, 검수 대기를 바로 확인하게 한다. |\n\n### 13.1 목록 화면 UX\n\n관리자와 사용자 화면 모두 목록 테이블이 많다. 테이블은 다음 기준을 적용하는 것이 좋다.\n\n| 항목 | 권장 방식 |\n|---|---|\n| 핵심 열 | 회원명, 시험명, 상태처럼 판단에 필요한 값은 왼쪽에 고정한다. |\n| 상태값 | 텍스트만 쓰지 말고 색상 배지와 문구를 함께 표시한다. |\n| 주요 버튼 | 한 행에 버튼을 너무 많이 넣지 않고 가장 중요한 1개 행동만 먼저 노출한다. |\n| 가로 스크롤 | 핵심 열은 고정하고 세부 정보는 탭 또는 상세 화면으로 분리한다. |\n| 검색 조건 | 기본 검색과 상세 검색을 나누어 초보 관리자가 부담을 느끼지 않게 한다. |\n| 빈 목록 | `정보 없음`만 보여주지 말고 다음 행동을 안내한다. 예: `등록된 시험이 없습니다. 새 시험을 등록하세요.` |\n\n### 13.2 입력 화면 UX\n\n시험 등록, 출제, 채점, 문의 작성처럼 입력 항목이 많은 화면은 한 페이지에 모든 필드를 노출하면 실수가 늘어난다.\n\n| 화면 | 권장 UX |\n|---|---|\n| 시험 등록 | 기본정보, 일정, 접수/환불, 시험유형, 공개설정 단계로 나눈다. |\n| 문제 출제 | 시험 선택, 문제 작성, 정답/해설, 평가기준, 미리보기, 제출 단계로 나눈다. |\n| 채점 | 문제/답안/기준표/점수입력/코멘트를 한 화면에 두되, 기준표와 저장 버튼은 항상 보이게 한다. |\n| 결제/환불 | 금액, 환불 가능 여부, 처리 후 결과를 명확히 보여주고 최종 확인 팝업을 둔다. |\n| 1:1 문의 | 문의 유형, 관련 시험, 제목, 내용, 첨부파일만 우선 제공한다. |\n\n### 13.3 접근성과 신뢰성\n\n| 항목 | 보완 기준 |\n|---|---|\n| 색상 | 합격/불합격, 완료/대기, 위험/취소 상태는 색상과 텍스트를 함께 사용한다. |\n| 버튼 | 삭제, 환불, 최종제출, 성적공개 같은 되돌리기 어려운 작업은 확인 팝업과 이력 기록을 둔다. |\n| 자동저장 | 응시, 출제, 채점 화면에는 자동저장 또는 저장 상태 표시가 필요하다. |\n| 시간 표시 | 시험 시간, 접수 마감, 결과 발표일은 날짜와 시간을 함께 명확히 표시한다. |\n| 개인정보 | 관리자 테이블에서는 연락처, 이메일, 주소 같은 개인정보를 권한에 따라 마스킹할 수 있어야 한다. |\n"

          "content": "# figma_pdf/2025 사이트맵 및 기능 정의\n\n작성일: 2026-05-21  \n분석 범위: `figma_pdf/2025` 폴더의 화면 파일명, 주요 PNG/JPG 화면 확인, 기존 `figma_pdf_2024_2025_vibecoding_비교분석.md` 참고  \n주의: PDF 내부 텍스트 추출 도구가 설치되어 있지 않아, PDF는 파일명과 확인 가능한 메타 정보 중심으로 해석했다. PNG/JPG 화면은 직접 확인했다.\n\n## 1. 한눈에 보는 2025 구성\n\n`figma_pdf/2025`는 전체 시험 플랫폼을 처음부터 끝까지 모두 담은 완전한 IA라기보다, 기존 시험 플랫폼 위에 적용할 **UX/UI 참고 화면과 일부 관리자/전문가 화면**을 묶은 자료로 보는 것이 적절하다.\n\n1. 사용자 경험 참고 영역\n   - 창작작업실\n   - 메타-T 번역\n   - 장바구니\n   - 결제\n   - 마이페이지 참고 화면\n\n2. 전문가 업무 영역\n   - 프롬프트 출제\n   - 단답형 출제\n   - 출제 내역, 채점 내역, 정산 내역, 전문가 프로필\n\n3. 관리자 운영 영역\n   - 대시보드\n   - 회원관리\n   - 관리자 관리\n   - 시험관리\n   - 자격증관리\n   - 카테고리 관리\n   - 양식관리\n   - 템플릿 양식 관리자\n   - 파일 업로드형 대량 관리 화면\n\n4. 연결 설명 자료\n   - `Group 758531575.jpg`\n   - `Frame 758532606.jpg`\n   - `Rectangle 34625361.pdf`, `Rectangle 34625362.pdf`\n   - 다수의 `CheckBox*.png`\n\n특히 `창작작업실01.png`와 `Group 758531575.jpg`는 시험 플랫폼의 신규 핵심 메뉴를 확정하는 자료라기보다, **향후 화면 구성과 상호작용을 참고하기 위한 UX/UI 레퍼런스**로 분류하는 것이 안전하다. `Group 758531575.jpg`는 별도 서비스 화면이 아니라, 관리자/양식 설정 화면의 항목들이 작업 화면과 하단 번역/편집 패널로 어떻게 연결될 수 있는지 설명하는 참고 이미지다.\n\n## 2. 사용자 관점 서비스 설명\n\n일반 사용자가 보는 2025 자료는 \"시험 플랫폼\"에 바로 붙일 확정 기능이라기보다, 시험 플랫폼의 화면 경험을 확장할 때 참고할 수 있는 AI 작업 도구형 UI 예시를 포함한다.\n\n`창작작업실01.png`는 사용자가 문서, 유튜브, 리서치, 프로그래밍, 이미지/디자인, 음악, 음성 같은 작업 유형을 고르고 파일이나 텍스트를 입력하는 방식을 보여준다. 다만 현재 해석에서는 이 화면을 독립 구현 대상이라기보다, 시험 플랫폼의 향후 UX/UI를 설계할 때 참고할 수 있는 패턴으로 본다.\n\n관리자는 사용자, 시험, 자격증, 카테고리, 양식, 템플릿을 관리한다. 2025에서 새로 강조되는 부분은 기존 시험 관리뿐 아니라 AI 작업에 쓰이는 양식과 템플릿을 운영자가 관리한다는 점이다.\n\n전문가는 프롬프트 출제, 단답형 출제, 채점, 정산, 전문가 프로필 관리를 수행한다. 일반 사용자 화면과 달리 전문가 영역은 문제 작성, 평가요소 설정, 답변 예시 입력처럼 시험/검수 업무 중심이다.\n\n## 3. 최상위 사이트맵\n\n| 구분 | 대메뉴 | 주요 하위 기능 | 대표 파일 |\n|---|---|---|---|\n| 참고 | 창작작업실 | AI 작업 유형 선택, 카테고리 선택, AI 선택, 파일/텍스트 입력, 추천 서식, 임시저장, 적용의 UX/UI 참고 | `창작작업실01.png` |\n| 사용자 | 메타-T 번역 | 동시통역, 문서번역, YouTube, 기타, 웹툰번역, 언어 선택, 번역 엔진 선택, 편집기 사용 | `메타번역.png` |\n| 사용자 | 장바구니 | 작업 상품 선택, 가격 확인, 총액 계산, 결제 이동, 구독 신청, 전문가 견적 요청 | `장바구니.png` |\n| 사용자 | 결제 | 선택 상품 확인, 신용카드/페이 결제, 포인트 결제, 구독 신청, 전문가 견적 요청 | `결제.png` |\n| 사용자 | 마이페이지 | 내 작업/결제/프로필 확인용 참고 화면 | `마이페이지 1920해상도 참고.pdf` |\n| 전문가 | 출제관리 | 프롬프트 출제, 단답형 출제, 평가 설정, 답변 예시 | `상세_프롬프트출제_설정.png`, `상세_단답형출제.png` |\n| 전문가 | 전문가 프로필 | 학력, 경력, 저서, 해외거주 경험 등록 | `목록_전문가프로필_상세입력.png` |\n| 관리자 | 대시보드 | 운영 현황 요약 | `어드민/대시보드_01.pdf` |\n| 관리자 | 회원관리 | 회원 상세, 활동, 결제, 문의, 통계 확인 | `회원관리_상세_전체.pdf`, `기본화면_파일업로드.jpg` |\n| 관리자 | 시험관리 | 시험 신규 등록, 시험 기본정보 관리 | `시험관리_신규.pdf`, `관리자_시험관리_신규.pdf` |\n| 관리자 | 자격증관리 | 자격증 상세, 발급/상태 관리 | `관리자_자격증관리_상세.pdf` |\n| 관리자 | 카테고리관리 | 시험/작업 카테고리 관리 | `관리자_카테고리 관리.pdf` |\n| 관리자 | 양식관리 | AI 작업 양식 목록, 신규 양식, 프롬프트 첫 화면 설정 | `양식관리.pdf`, `양식관리_신규.pdf`, `양식관리_프롬프트첫화면.pdf` |\n| 관리자 | 템플릿 양식 관리자 | 사용자에게 제공할 템플릿 양식 관리 | `템플릿 양식 관리자.pdf` |\n\n## 4. 사용자 영역 상세 기능\n\n### 4.1 창작작업실 참고 화면\n\n대표 파일: `창작작업실01.png`\n\n창작작업실은 현재 기준에서 사용자가 실제로 진입해야 하는 확정 메뉴라기보다, 2025 자료가 제안하는 작업형 UX/UI 참고 화면이다. 상단에는 `창작작업실`, `요금제`, `고객센터`, `회사소개` 메뉴가 있고, 우측에는 알림, 장바구니, 계정 아이콘이 있다.\n\n작업 유형 탭:\n\n| 탭 | 의미 | 사용 예 |\n|---|---|---|\n| Youtube | 유튜브 영상 기반 요약, 번역, 분석, 콘텐츠 생성 | 영상 요약, 자막 번역, 영상 내용 분석 |\n| 문서 | 문서 파일 기반 작업 | PDF 번역, 문서 요약, 문서 변환 |\n| 리서치&분석 | 자료 조사와 분석 | 시장 조사, 법률/논문 분석 |\n| 프로그래밍 | 코드 생성/검토/설명 | 코드 작성, 오류 분석, 리팩터링 |\n| 이미지,디자인 | 이미지 또는 디자인 관련 작업 | 이미지 설명, 디자인 검토, 시안 생성 |\n| 음악 | 음악 관련 작업 | 가사, 음악 분석, 추천 |\n| 음성 | 음성 파일 관련 작업 | STT, 요약, 음성 분석 |\n| 기타 | 정형화되지 않은 AI 요청 | 일반 질의, 혼합 작업 |\n\n작업 방식 버튼:\n\n| 버튼 | 사용자 의미 | 기능 정의 |\n|---|---|---|\n| 보유한 양식에 텍스트 입력 | 기존 양식을 선택해 내용을 넣는 방식 | 관리자가 등록한 양식/템플릿을 기반으로 입력 폼을 표시 |\n| 나만의 양식 만들기 | 사용자가 직접 양식을 구성 | 필드, 안내문, 옵션을 사용자 정의 |\n| 양식 생성 후 내용 작성 | AI 또는 시스템이 양식을 먼저 만든 뒤 내용 입력 | 양식 생성 단계와 작성 단계를 분리 |\n| 양식 만들기 | 빈 양식 작성 | 신규 양식 생성 화면으로 이동 |\n| 내용 작성 후 검수 받기 | 작성 결과를 전문가/관리자에게 검수 요청 | 후면 작업 요청, 검수비/소요시간 연동 가능 |\n| 관련 서비스 표시 영역 | 현재 작업과 관련된 부가 서비스를 보여주는 영역 | 추천 서식, 전문가 서비스, 결제 상품 노출 |\n\n입력/설정 영역:\n\n| 영역 | 기능 |\n|---|---|\n| 카테고리 선택 | 대분류, 중분류, 소분류를 선택하고 검색한다. 예시는 법률, 국내 법률, 고소장이다. |\n| 편집 에디터 | 에디터 사용/미사용을 선택한다. 사용 시 결과 편집 패널과 연결된다. |\n| 사용 AI | ChatGPT, Gemini, wrtn., 다른 AI 등 사용할 엔진을 선택한다. |\n| 후면 작업 요청 | 검수 요청, 고급전문가, 긴급 여부를 선택한다. |\n| 설정 | 기능 사용/미사용을 지정한다. |\n| 사용프롬프트 설정 | 전문 분야와 세부분야를 선택한다. |\n| 다룰설정 | 관련 내용 체크박스를 선택한다. 실제 서비스에서는 추천 키워드, 검수 기준, 포함 정보 같은 세부 옵션으로 구체화해야 한다. |\n| 파일/텍스트 입력 | 파일 업로드 또는 AI 텍스트 입력을 받는다. |\n| 추천 서식 | AI 추천 관련 서식을 표시한다. |\n| 임시저장/카드/적용 | 임시 저장, 장바구니 담기, 작업 적용을 수행한다. |\n\n### 4.2 메타-T 번역\n\n대표 파일: `메타번역.png`\n\n메타-T 번역은 창작작업실 참고 화면과 비슷한 레이아웃을 쓰지만, 번역 작업에 특화된 화면이다. 이 화면도 시험 플랫폼 본류 기능으로 바로 확정하기보다, 번역/편집 UX 참고 자료로 우선 분류한다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 번역 유형 탭 | 동시통역, 문서번역, YouTube, 기타, 웹툰번역 중 선택한다. |\n| 번역 목적 칩 | 아나운서, 관광가이드, 큐레이터, 안내 같은 세부 작업 유형을 선택한다. |\n| 카테고리 선택 | 법률, 국내 법률, 고소장 같은 분야를 지정한다. |\n| 언어 설정 | 출발어와 도착어를 선택하고, 영어/중국어/일어/아랍어/베트남어 등 언어 옵션을 고른다. |\n| 사용 AI | 번역에 사용할 AI 엔진을 선택한다. |\n| 양식 에디터 | 결과를 편집기에서 다룰지 선택한다. |\n| 후면 작업 요청 | 검수 요청, 전문가 요청, 긴급 여부를 지정한다. |\n| 파일/텍스트 입력 | 번역할 파일 또는 텍스트를 입력한다. |\n| 관련 서식 추천 | 번역 작업에 맞는 관련 서식을 제안한다. |\n\n### 4.3 번역/편집 작업 화면\n\n대표 근거: `Group 758531575.jpg` 하단 화면\n\n이 화면은 창작작업실 참고 화면 또는 메타-T 번역에서 입력한 자료가 작업 패널로 펼쳐질 수 있음을 보여준다. 원문, AI 번역기, 비교 번역기, 에디터가 나란히 표시된다.\n\n주요 기능:\n\n| 패널 | 기능 |\n|---|---|\n| 원문 텍스트 | 원문 제목/본문 표시, 원본 동영상 확인, 음성 내보내기 |\n| AI 번역기 | ChatGPT 등 번역기별 결과 표시, 언어 선택, AI 설정 팝업 |\n| 비교 번역기 | 다른 번역 엔진 결과와 비교, 시간/버전 선택 |\n| 에디터 | 최종 편집, 문장별 체크, 수정 내용 강조, 서식/링크/인용/설정 도구 사용 |\n| 추천 단어 | 추천 단어, 설명, 맞춤법/추천어 후보 표시 |\n| 메모 | 작업 중 참고 메모 입력 |\n| 저장/결제/적용 | 편집 결과 저장, 결제, 최종 적용 |\n\n### 4.4 장바구니와 결제\n\n대표 파일: `장바구니.png`, `결제.png`\n\n장바구니는 AI 작업 또는 번역 작업을 상품처럼 담아 결제 전 확인하는 화면이다.\n\n장바구니 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 전체 선택 | 여러 작업을 한 번에 선택한다. |\n| 선택 삭제 | 선택한 작업을 장바구니에서 제거한다. |\n| 작업 카드 | 작업명, 첨부 파일명, 언어쌍, 번역기, 문서 변환 유형, 에디팅 사용 여부, 글자 수, 가격을 표시한다. |\n| 선택 요약 | 선택된 번역 수, 작업명, 단가, 추가 옵션 금액을 보여준다. |\n| 총액 계산 | 선택한 작업의 최종 결제 금액을 계산한다. |\n| 신용카드/페이 결제 | 일반 결제 수단으로 결제한다. |\n| 포인트 결제 | 보유 포인트를 사용한다. |\n| 구독 신청 | 정기 구독 상품으로 전환한다. |\n| 전문가 견적 요청 | 고급 전문가 작업이 필요한 경우 별도 견적을 요청한다. |\n\n결제 화면은 장바구니의 축약 버전이다. 선택된 작업 1건의 상세와 총 결제 금액, 결제 버튼을 보여준다.\n\n## 5. 전문가 영역 상세 기능\n\n### 5.1 프롬프트 출제하기\n\n대표 파일: `상세_프롬프트출제_설정.png`, `상세_프롬프트출제_확인.png`, `출제관리_프롬프트상세.pdf`\n\n전문가가 프롬프트형 시험 문제를 작성하는 화면이다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 문제 탭 | 문제1, 문제2, 문제3 등 문항 단위 이동 |\n| 시험 문제 | 수험생에게 제시할 문제 내용을 입력한다. |\n| 단계 구성 | 1단계, 2단계, 3단계처럼 풀이 또는 작성 단계를 나눈다. |\n| 입력 유형 | 단일선택, 복수선택, 단답형, 사용자 입력 영역 등을 지정한다. |\n| 보기 입력 | 선택형 문항의 보기를 입력한다. |\n| 평가 설정 | 1차 평가 요소, 2차 평가 요소, 단어수, 문장부호수, 전체 문장수, 유사어를 설정한다. |\n| 답변 예시 | 정답 또는 모범 답변을 입력한다. |\n| 저장/취소 | 작성 내용을 저장하거나 취소한다. |\n\n### 5.2 단답형 출제\n\n대표 파일: `상세_단답형출제.png`, `채점관리_단답형상세.pdf`\n\n단답형 문제 작성과 채점 기준을 다루는 화면이다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 문제 입력 | 단답형 질문을 입력한다. |\n| 정답 입력 | 허용 정답, 대체 정답, 유사어를 입력한다. |\n| 배점 설정 | 문항별 점수와 평가 기준을 설정한다. |\n| 채점 기준 | 자동 채점 또는 수동 검토에 필요한 기준을 정의한다. |\n| 답변 예시 | 수험생 답변 예시 또는 채점 참고 문구를 입력한다. |\n\n### 5.3 전문가 프로필\n\n대표 파일: `목록_전문가프로필_상세입력.png`\n\n전문가가 본인의 이력과 증빙 자료를 등록하는 화면이다.\n\n등록 항목:\n\n| 항목 | 입력 내용 |\n|---|---|\n| 학력 등록 | 학교, 학과, 졸업/휴학 상태, 입학년도, 졸업년도, 첨부 파일 |\n| 저서 및 역서 등록 | 저서명, 출판사, 출판일, 첨부 파일 |\n| 해외거주 경험 등록 | 국가명, 해외 나간 이유, 출국일, 입국일, 첨부 파일 |\n| 경력사항 등록 | 회사명, 부서, 직위, 재직 상태, 입사년도, 퇴사년도, 첨부 파일 |\n\n## 6. 관리자 영역 상세 기능\n\n### 6.1 관리자 대시보드\n\n대표 파일: `어드민/대시보드_01.pdf`\n\n운영자가 서비스 현황을 요약해서 보는 시작 화면이다. 현재 2025 폴더에서는 PDF 파일명만 확인되므로, 상세 지표는 `ai_docs/ia분석파일.docx`의 관리자 대시보드 정의와 연결해 해석하는 것이 합리적이다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 신규 회원 수 | 기간별 가입 현황 |\n| 시험 접수 현황 | 접수중, 접수마감, 응시예정 상태 |\n| 결제 현황 | 결제완료, 환불대기, 미결제 |\n| 문제/채점 대기 | 출제 검수 대기, 채점 대기 |\n| 문의 미답변 | 고객센터 처리 필요 건수 |\n| 바로가기 | 회원관리, 시험관리, 양식관리, 고객센터 등 주요 업무 이동 |\n\n### 6.2 회원관리\n\n대표 파일: `기본화면_파일업로드.jpg`, `회원관리_상세_전체.pdf`\n\n`기본화면_파일업로드.jpg`는 관리자형 회원관리 목록 화면으로 확인된다. 상단 탭은 `전체`, `회원관리`, `활동관리`, `결제관리`, `1:1 문의 관리`, `통계`로 구성되어 있다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 검색/필터 | 회원 유형, 에디터 유형, AI 선택, 프리미엄 여부, 결제/문의/게시 상태, 날짜 범위 등을 조합해 검색한다. |\n| 전체 정보 테이블 | 회원 기본정보, 활동, 시험, 결제, 자격증, 피드백 관련 컬럼을 가로 스크롤로 표시한다. |\n| 선택 작업 | 선택 항목 삭제, 메일 보내기, SMS 전송 등 일괄 작업을 수행한다. |\n| 엑셀 파일 생성 | 관련/상담 이력 등 목적별 엑셀 파일을 생성한다. |\n| 파일 올리기/다운로드 | 대량 회원 또는 관련 데이터를 업로드/다운로드한다. |\n| 저장 | 변경된 목록 설정이나 상태를 저장한다. |\n\n관리 시 주의점:\n\n| 항목 | 설명 |\n|---|---|\n| 개인정보 마스킹 | 이름, 휴대폰, 이메일, 주소는 권한별 마스킹이 필요하다. |\n| 비밀번호 미노출 | 운영 화면에 비밀번호 원문 또는 유추 가능한 정보가 노출되면 안 된다. |\n| 변경 이력 | 회원 상태, 결제 상태, 시험 상태 변경은 감사 로그로 남겨야 한다. |\n\n### 6.3 시험관리\n\n대표 파일: `시험관리_신규.pdf`, `관리자_시험관리_신규.pdf`\n\n시험을 신규 등록하고 운영 조건을 설정하는 관리자 기능이다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 시험 기본정보 등록 | 시험명, 시험 구분, 등급, 언어, 카테고리, 설명 |\n| 접수 기간 설정 | 접수 시작일, 종료일, 취소/환불 가능 기간 |\n| 시험 일정 설정 | 시험일, 시작/종료 시간, 시간대 |\n| 응시 조건 설정 | 자격 조건, 응시료, 정원, 시험 방식 |\n| 문제/양식 연결 | 프롬프트형, 단답형, 번역형 등 문제 유형 연결 |\n| 결과 공개 설정 | 채점 완료 후 공개일과 공개 범위 |\n\n### 6.4 자격증관리\n\n대표 파일: `관리자_자격증관리_상세.pdf`\n\n합격자에게 발급되는 자격증 정보를 관리한다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 자격증 상세 조회 | 회원, 시험, 합격 정보, 발급 상태 확인 |\n| 자격증 번호 부여 | 합격자에게 번호를 수동 또는 일괄 부여 |\n| 발급 상태 관리 | 신청, 입금대기, 제작중, 배송중, 발급완료 |\n| 발급 파일 관리 | PDF, 이미지, 출력용 데이터 관리 |\n| 재발급/취소 | 오류 또는 사용자 요청에 따른 재발급 처리 |\n\n### 6.5 카테고리 관리\n\n대표 파일: `관리자_카테고리 관리.pdf`\n\n시험, 창작작업실, 번역 작업, 양식에 공통으로 쓰이는 분류 체계를 관리한다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 대/중/소분류 등록 | 예: 법률 > 국내 법률 > 고소장 |\n| 사용 여부 | 노출/비노출, 사용/미사용 상태 설정 |\n| 정렬 순서 | 사용자 화면에 표시되는 순서 관리 |\n| 연결 화면 | 시험관리, 양식관리, 창작작업실, 메타-T 번역에서 공통 사용 |\n| 삭제 제한 | 이미 사용 중인 카테고리는 삭제보다 비활성화 처리 |\n\n### 6.6 양식관리\n\n대표 파일: `양식관리.pdf`, `양식관리_신규.pdf`, `양식관리_프롬프트첫화면.pdf`, `양식관리_프롬프트첫화면-1.pdf`\n\n2025에서 가장 중요한 관리자 참고 기능이다. 사용자가 보는 작업형 화면의 양식과 프롬프트 첫 화면을 운영자가 어떻게 관리할 수 있는지 보여주는 자료로 해석된다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 양식 목록 조회 | 등록된 양식, 사용 여부, 카테고리, 작성자, 수정일을 확인한다. |\n| 신규 양식 등록 | 양식명, 설명, 카테고리, 입력 필드, 안내 문구를 등록한다. |\n| 프롬프트 첫 화면 설정 | 작업형 참고 화면에서 사용자가 처음 보게 될 입력 구조를 정의한다. |\n| AI 엔진 연결 | 양식별로 사용 가능한 AI 엔진을 지정한다. |\n| 검수/전문가 옵션 | 후면 작업 요청, 전문가 검수, 긴급 옵션 사용 여부를 지정한다. |\n| 추천 서식 연결 | 사용자에게 노출할 관련 서식을 연결한다. |\n| 미리보기 | 사용자 작업 화면에서 보이는 형태를 참고용으로 확인한다. |\n| 게시/비게시 | 사용자가 선택할 수 있는 상태로 공개하거나 숨긴다. |\n\n### 6.7 템플릿 양식 관리자\n\n대표 파일: `템플릿 양식 관리자.pdf`\n\n템플릿은 반복적으로 쓰는 양식을 상품화 또는 추천 서식으로 제공하기 위한 관리 기능이다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 템플릿 등록 | 템플릿명, 설명, 카테고리, 대상 작업 유형 등록 |\n| 템플릿 편집 | 입력 필드, 기본 문구, 추천 옵션 수정 |\n| 가격/상품 연결 | 유료 작업이나 결제 상품과 연결할 수 있다. |\n| 추천 노출 | 작업형 참고 화면의 `AI 추천 관련 서식` 영역에 노출되는 구조를 참고한다. |\n| 버전 관리 | 템플릿 수정 이력과 이전 버전을 관리한다. |\n\n## 7. 연결 설명 자료 처리 기준\n\n| 파일 | 분류 | 처리 기준 |\n|---|---|---|\n| `Group 758531575.jpg` | 기능 연결 설명도 | 관리자 설정 화면과 사용자 작업 화면의 연결 관계를 보여주는 설명 자료다. 별도 화면으로 구현하지 않는다. |\n| `Frame 758532606.jpg` | 참고 프레임 | 파일 업로드/구분 계열 화면의 참고 이미지로 본다. |\n| `Rectangle 34625361.pdf`, `Rectangle 34625362.pdf` | 디자인 조각 또는 배경 요소 | 독립 기능이 아니라 화면 구성 리소스로 본다. |\n| `CheckBox*.png` | UI 리소스 | 체크박스 라벨 또는 상태 이미지다. 실제 구현에서는 이미지가 아니라 공통 체크박스 컴포넌트로 대체한다. |\n\n`Group 758531575.jpg`에서 보이는 보라색 연결선은 기능 흐름의 힌트다. 왼쪽 관리자/설정 화면의 카테고리, AI 선택, 필터, 상세 옵션이 오른쪽 작업형 참고 화면의 입력 패널과 하단 번역/에디터 작업 패널에 반영될 수 있다는 의미로 해석해야 한다. 즉 \"관리자가 만든 양식/옵션이 사용자 작업 화면을 구성할 수 있다\"는 구조 설명이다.\n\n## 8. 주요 데이터 객체\n\n| 데이터 | 설명 | 관련 화면 |\n|---|---|---|\n| 사용자 | 일반 회원, 전문가, 관리자 등 계정 정보 | 회원관리, 마이페이지 |\n| 전문가 프로필 | 학력, 경력, 저서, 해외거주 경험, 증빙 파일 | 전문가 프로필 |\n| 카테고리 | 대/중/소분류, 사용 여부, 정렬 순서 | 카테고리 관리, 창작작업실, 메타-T 번역 |\n| 양식 | 사용자가 입력할 폼 구조와 안내 문구 | 양식관리, 창작작업실 |\n| 템플릿 | 반복 사용 가능한 양식 묶음 또는 추천 서식 | 템플릿 양식 관리자, 추천 서식 |\n| AI 엔진 | ChatGPT, Gemini, wrtn., 기타 AI | 창작작업실, 메타-T 번역 |\n| 작업 요청 | 파일/텍스트 입력, 번역/분석/작성 요청, 후면 작업 옵션 | 창작작업실, 메타-T 번역 |\n| 번역 결과 | 원문, AI 번역, 비교 번역, 에디터 수정본 | 번역/편집 작업 화면 |\n| 장바구니 항목 | 작업명, 파일, 언어쌍, 옵션, 가격 | 장바구니, 결제 |\n| 결제 | 결제수단, 포인트, 구독, 전문가 견적 | 장바구니, 결제 |\n| 시험 | 시험명, 일정, 등급, 카테고리, 문제 유형 | 시험관리 |\n| 문제 | 프롬프트형, 단답형, 평가 기준, 답변 예시 | 출제관리 |\n| 자격증 | 합격자, 자격증 번호, 발급 상태 | 자격증관리 |\n\n## 9. 사용자 플로우\n\n### 9.1 창작작업실 참고 플로우\n\n1. 사용자가 작업형 화면에 진입한다고 가정한다.\n2. 작업 유형을 선택한다. 예: Youtube, 문서, 리서치&분석.\n3. 카테고리를 선택한다. 예: 법률 > 국내 법률 > 고소장.\n4. 사용할 AI를 선택한다.\n5. 파일 또는 텍스트를 입력한다.\n6. 필요하면 검수 요청, 고급전문가, 긴급 작업을 선택한다.\n7. 추천 서식을 선택하거나 직접 입력한다.\n8. 임시저장, 장바구니 담기, 적용 중 하나를 선택한다.\n9. 결과 편집이 필요한 경우 번역/편집 작업 화면으로 이동한다.\n10. 작업 완료 후 장바구니 또는 결제로 이동한다.\n\n### 9.2 메타-T 번역 플로우\n\n1. 사용자가 메타-T 번역에 진입한다.\n2. 번역 유형을 선택한다. 예: 문서번역.\n3. 번역 목적을 선택한다. 예: 큐레이터.\n4. 출발어와 도착어를 선택한다.\n5. 사용할 AI 번역기를 선택한다.\n6. 파일 또는 텍스트를 입력한다.\n7. AI 번역 결과와 비교 번역 결과를 확인한다.\n8. 에디터에서 최종 번역문을 수정한다.\n9. 저장, 결제, 적용을 수행한다.\n\n### 9.3 양식관리와 작업형 참고 화면 연결 플로우\n\n1. 관리자가 카테고리와 양식을 등록한다.\n2. 관리자가 양식에 사용할 AI, 입력 필드, 추천 서식, 검수 옵션을 설정한다.\n3. 사용자가 작업형 화면에서 해당 카테고리나 양식을 선택한다고 가정한다.\n4. 좌측 설정 패널과 우측 입력 영역이 관리자 설정값에 맞춰 표시되는 구조를 참고한다.\n5. 사용자가 입력한 작업은 AI 처리, 전문가 검수, 번역/편집, 결제 흐름으로 이어진다.\n\n이 플로우가 `Group 758531575.jpg`에서 연결선으로 설명된 핵심 내용이다.\n\n## 10. 구현 시 우선순위\n\n| 우선순위 | 기능 | 이유 |\n|---:|---|---|\n| 1 | 공통 레이아웃 | 사용자/관리자/전문가 화면이 상단 메뉴와 좌측 아이콘 구조를 공유한다. |\n| 2 | 카테고리 관리 | 창작작업실, 메타-T 번역, 양식관리, 시험관리에서 공통으로 쓰인다. |\n| 3 | 양식관리 | 2025 신규 기능의 중심이며 사용자 화면을 구성하는 근거가 된다. |\n| 4 | 창작작업실 참고 UX | 일반 사용자 작업 화면을 설계할 때 참고할 수 있는 레이아웃이다. |\n| 5 | 메타-T 번역 참고 UX | 번역/편집 화면을 설계할 때 참고할 수 있는 구체적인 레이아웃이다. |\n| 6 | 장바구니/결제 | 유료 작업, 포인트, 구독, 전문가 견적과 연결된다. |\n| 7 | 전문가 출제 화면 | 기존 시험 플랫폼 업무와 연결되는 전문 영역이다. |\n| 8 | 관리자 회원/시험/자격증 | 기존 IA와 겹치는 운영 기능이므로 공통 패턴을 재사용한다. |\n\n## 11. 확인이 필요한 미정 항목\n\n| 항목 | 확인 필요 내용 |\n|---|---|\n| 창작작업실의 성격 | 실제 구현 대상인지, UX/UI 참고 자료인지 확정 필요. 현재 해석은 참고 자료에 가깝다. |\n| 양식과 템플릿의 차이 | 양식은 입력 폼, 템플릿은 추천/상품화된 양식으로 보이나 정책 확정 필요 |\n| 가격 계산 방식 | 글자 수, 번역기 수, 에디팅, 긴급, 검수 옵션별 과금 규칙 확인 필요 |\n| AI 엔진별 결과 저장 | 각 엔진 결과를 모두 저장할지 최종 결과만 저장할지 확인 필요 |\n| 전문가 검수 흐름 | 검수 요청 후 전문가 배정, 견적, 결제, 결과 전달 절차 확인 필요 |\n| 파일 업로드 제한 | 파일 형식, 용량, 개수, 보안 검사 정책 확인 필요 |\n| 관리자 대시보드 지표 | 실제 운영 KPI와 표시 우선순위 확인 필요 |\n\n## 12. 요약\n\n2025 구성은 \"시험 플랫폼 운영 시스템\" 위에 적용할 수 있는 UX/UI 참고 자료와 일부 관리자/전문가 화면을 포함한다. 특히 창작작업실과 메타-T 번역은 현재 기준에서 핵심 구현 기능이라기보다, 사용자 작업 화면과 번역/편집 화면의 참고 레이아웃으로 보는 것이 안전하다.\n\n`Group 758531575.jpg`는 이 연결 구조를 설명하는 자료다. 따라서 별도 화면으로 구현하지 않고, 양식관리와 작업형 참고 화면, 번역/편집 패널 간 연결 관계를 설명하는 근거로 문서화해야 한다.\n\n## 13. UX/UI 관점 보완\n\n2025 화면은 2024의 시험 운영 화면보다 사용자가 직접 작업물을 만드는 성격이 강하다. 따라서 단순 관리자 테이블보다 “입력 → AI 처리 → 결과 확인 → 수정 → 저장/결제” 흐름이 자연스럽게 이어져야 한다.\n\n| 영역 | UX/UI 핵심 |\n|---|---|\n| 창작작업실 참고 화면 | 작업 유형, 카테고리, AI, 파일/텍스트 입력, 옵션을 순서대로 배치하는 UX/UI 참고 자료로 활용한다. |\n| 메타-T 번역 | 원문, AI 번역 결과, 에디터 수정본을 비교하기 쉽게 배치해야 한다. |\n| 양식관리 | 관리자가 만든 양식이 사용자 화면에 어떻게 보일지 미리보기로 확인할 수 있어야 한다. |\n| 템플릿 양식 관리자 | 템플릿이 어떤 카테고리와 작업 유형에 쓰이는지 명확히 표시해야 한다. |\n| 장바구니/결제 | 작업 옵션이 가격에 어떻게 반영되는지 사용자가 이해해야 한다. |\n\n### 13.1 창작작업실 참고 화면 설계 기준\n\n| 화면 요소 | 권장 설계 |\n|---|---|\n| 작업 유형 탭 | Youtube, 문서, 리서치&분석 등은 상단 탭으로 제공하되 선택된 탭을 명확히 표시한다. |\n| 카테고리 선택 | 대/중/소분류가 길어질 수 있으므로 단계형 선택 또는 검색형 셀렉트를 사용한다. |\n| AI 선택 | 여러 AI를 동시에 비교할 수 있는지, 하나만 선택하는지 정책을 명확히 한다. |\n| 파일 입력 | 업로드 가능 형식, 용량, 처리 상태, 실패 사유를 바로 보여준다. |\n| 옵션 | 긴급, 전문가 검수, 고급전문가 같은 비용 발생 옵션은 가격 영향과 함께 표시한다. |\n| 실행 버튼 | `임시저장`, `장바구니`, `적용`의 차이를 사용자가 이해할 수 있도록 버튼 위치와 문구를 구분한다. |\n\n### 13.2 번역/편집 UX\n\n| 항목 | 권장 방식 |\n|---|---|\n| 원문/번역문 | 좌우 또는 상하 분할로 비교 가능하게 배치한다. |\n| AI별 결과 | ChatGPT, Gemini 등 AI별 결과를 탭이나 카드로 구분한다. |\n| 최종 편집본 | 사용자가 수정한 최종본은 별도 저장 영역으로 분리한다. |\n| 변경 이력 | 원문, AI 결과, 사용자 수정본의 차이를 추적할 수 있어야 한다. |\n| 저장/결제 | 결과를 저장하는 행동과 결제로 넘어가는 행동을 분리한다. |\n\n### 13.3 관리자 UX\n\n2025 관리자 화면은 기존 시험 운영과 신규 AI 서비스 설정이 섞인다. 관리자가 헷갈리지 않도록 메뉴를 다음처럼 분리하는 것이 좋다.\n\n| 메뉴 그룹 | 포함 기능 |\n|---|---|\n| 서비스 설정 | 카테고리, 양식관리, 템플릿 양식 관리자 |\n| 시험 운영 | 시험관리, 자격증관리, 출제/채점 관리 |\n| 사용자 운영 | 회원관리, 전문가 프로필 |\n| 판매/결제 | 장바구니, 결제, 요금제, 포인트 |\n| 콘텐츠 운영 | 메인 화면, 추천 서식, 안내 문구 |\n\n### 13.4 빈 상태와 오류 상태\n\n| 상태 | 필요한 안내 |\n|---|---|\n| 파일 없음 | `파일을 업로드하거나 텍스트를 입력하세요.` |\n| 파일 형식 오류 | 허용 파일 형식과 최대 용량을 표시한다. |\n| AI 처리 실패 | 재시도 버튼과 실패 사유를 제공한다. |\n| 결과 없음 | 입력 조건을 다시 확인하도록 안내한다. |\n| 결제 전 | 선택한 옵션과 예상 금액을 다시 확인시킨다. |\n"

          "content": "# vibecoding 화면 분석 쉬운 설명\n\n작성일: 2026-05-21  \n분석 대상: `figma_pdf/vibecoding`  \n분석 기준: 폴더 내 파일 목록, `기본화면_파일업로드.jpg`, `Frame 758532606.jpg` 확인\n\n## 1. 한 줄 요약\n\n`vibecoding`은 전체 시험 사이트를 모두 설계한 자료가 아니라, **관리자가 많은 회원/시험 데이터를 한 화면에서 보고, 조건별로 걸러보고, 엑셀이나 파일로 일괄 처리하는 관리자용 대량 관리 화면**에 가깝다.\n\n쉽게 말하면, 쇼핑몰 관리자 페이지에서 주문 목록을 한꺼번에 보고 처리하듯이, 이 화면은 시험 플랫폼의 회원, 시험, 결제, 채점, 결과, 피드백 정보를 한 번에 모아 관리하려는 화면이다.\n\n## 2. 자료 구성\n\n`figma_pdf/vibecoding` 폴더에는 총 64개 파일이 있다.\n\n| 파일 종류 | 개수 | 의미 |\n|---|---:|---|\n| JPG | 2개 | 실제 화면을 크게 보여주는 대표 이미지 |\n| PDF | 16개 | `구분`, `구분-1` ~ `구분-14`, `제목 없음` 등 화면 일부 또는 상태별 PDF |\n| PNG | 46개 | 체크박스 UI 조각 이미지 |\n\n주요 파일은 다음과 같다.\n\n| 파일 | 역할 |\n|---|---|\n| `기본화면_파일업로드.jpg` | 핵심 관리자 화면. 검색, 필터, 탭, 대량 테이블, 엑셀 생성, 파일 올리기/다운로드가 보임 |\n| `Frame 758532606.jpg` | 매우 긴 가로 테이블 전체를 펼쳐 보여주는 이미지. 한 화면에 많은 컬럼이 있음을 보여줌 |\n| `구분.pdf`, `구분-1.pdf` ~ `구분-14.pdf` | 테이블 컬럼 또는 구분 조건을 나눠서 저장한 화면 조각으로 보임 |\n| `CheckBox*.png` | 필터 조건에서 쓰는 체크박스 상태 이미지 |\n\n## 3. 이 화면은 누가 쓰는가?\n\n이 화면의 주 사용자는 일반 수험생이 아니라 **관리자**다.\n\n관리자는 다음과 같은 일을 해야 한다.\n\n| 관리자 업무 | 화면에서 보이는 근거 |\n|---|---|\n| 회원을 검색한다 | 상단 검색창, 회원관리 제목 |\n| 회원을 조건별로 걸러본다 | 정회원, 일반회원, 전문가 여부, 성별, 가입경로, 알림 수신 등 체크박스 |\n| 시험 정보를 확인한다 | 시험명, 시험유형, 시험상태, 시험결과 관련 컬럼 |\n| 결제/접수 상태를 본다 | 접수구분, 시험접수기간, 결제/정산 관련 탭 |\n| 대량 데이터를 엑셀로 만든다 | `엑셀파일생성` 버튼 |\n| 파일을 올리거나 내려받는다 | `파일올리기`, `파일다운로드` 버튼 |\n| 선택한 사람에게 연락한다 | `SMS전송`, 알림 설정 컬럼 |\n\n즉, 이 화면은 “사용자가 시험을 보는 화면”이 아니라 “운영자가 수많은 데이터를 관리하는 화면”이다.\n\n## 4. 화면을 쉽게 풀어 설명\n\n`기본화면_파일업로드.jpg`를 보면 화면은 크게 여섯 영역으로 나뉜다.\n\n| 영역 | 쉬운 설명 |\n|---|---|\n| 왼쪽 아이콘 메뉴 | 홈, 회원, 학습/시험, 설정 같은 주요 관리 메뉴로 이동하는 곳 |\n| 상단 검색/계정 영역 | 검색창, 관리자 이름, 로그아웃이 있는 곳 |\n| 페이지 제목과 탭 | 현재 `회원관리` 화면이며, 전체/회원관리/활동관리/결제관리/1:1문의 관리/통계 탭으로 구분됨 |\n| 검색 조건 영역 | 원하는 사람이나 시험만 찾기 위해 체크박스, 카테고리, 날짜, 검색어를 선택하는 곳 |\n| 전체 정보 테이블 | 회원 정보와 시험 정보를 한 줄씩 보여주는 핵심 목록 |\n| 하단/우측 버튼 | 선택삭제, 메일 보내기, SMS 전송, 파일 다운로드 같은 일괄 작업 버튼 |\n\n## 5. 탭 구조\n\n화면 상단에는 다음 탭이 있다.\n\n| 탭 | 의미 |\n|---|---|\n| 전체 | 회원, 활동, 결제, 문의, 통계를 한 화면에서 통합 조회 |\n| 회원관리 | 회원 기본 정보 관리 |\n| 활동관리 | 회원의 시험 접수, 응시, 결과, 활동 이력 관리 |\n| 결제관리 | 결제 상태, 결제 내역, 정산 정보 관리 |\n| 1:1 문의 관리 | 회원 문의와 답변 상태 관리 |\n| 통계 | 회원/시험/결제/결과 데이터를 통계로 확인 |\n\n이 탭 구조는 “한 사람을 기준으로 관련 정보를 모두 보는 관리자 화면”에 적합하다. 예를 들어 어떤 회원을 찾은 뒤, 그 회원이 어떤 시험을 봤는지, 결제는 했는지, 문의는 남겼는지, 결과는 어떤지를 한 화면에서 이어서 볼 수 있다.\n\n## 6. 검색 조건의 의미\n\n검색 조건 영역에는 체크박스가 매우 많다. 일반 사용자에게 쉽게 설명하면, 이 부분은 “원하는 사람만 골라보기 위한 필터”다.\n\n예시는 다음과 같다.\n\n| 조건 종류 | 화면에서 보이는 예 | 의미 |\n|---|---|---|\n| 회원 구분 | 정식회원, 일반회원, 전문가 | 어떤 종류의 회원인지 선택 |\n| 성별 | 남, 여 | 성별 기준으로 조회 |\n| 회원 등급/상품 | 프리미엄, 스탠다드, 베이직, 없음 | 회원이 어떤 상품 또는 등급을 사용하는지 확인 |\n| 알림 수신 | 문자, 이메일, 카카오톡, 없음 | 어떤 연락 수단을 허용했는지 확인 |\n| 가입 경로 | 네이버, 카카오, 구글 | 어떤 경로로 가입했는지 확인 |\n| 에디터 유형 | 문서생성 에디터, 영상 에디터, 기타 에디터 등 | 회원이 사용하는 작업 도구 또는 기능 유형 |\n| 시험 상태 | 검증요청, 수정요청, 게시완료, 취소 | 시험 또는 작업의 진행 상태 |\n| 날짜 | 시작일, 종료일 | 특정 기간의 데이터만 조회 |\n| 카테고리 | 대/중/소 카테고리 | 시험이나 작업의 분류 기준 |\n\n체크박스 PNG가 많이 들어 있는 이유도 이 화면의 필터 조건이 많기 때문이다.\n\n## 7. 테이블에 들어 있는 정보\n\n화면 하단의 큰 테이블은 이 시안의 핵심이다. 한 행은 한 명의 회원 또는 한 건의 시험/접수 기록을 의미한다.\n\n테이블에서 확인되는 정보는 크게 다섯 묶음으로 나눌 수 있다.\n\n### 7.1 회원 기본 정보\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 번호 | 목록 순서 |\n| 회원 관련 번호 | 회원을 식별하는 고유 번호 |\n| 사이트 구분 | 어느 사이트/서비스의 회원인지 |\n| 회원 유형 | 정식회원, 일반회원, 프리미엄 등 |\n| 이름/나이/성별 | 회원 기본 인적 정보 |\n| 이메일/휴대폰 | 연락처 |\n| 주소 | 거주지 또는 배송지 |\n| 그룹 여부 | 특정 그룹에 포함되어 있는지 |\n| 가입일/가입 채널 | 언제, 어디서 가입했는지 |\n| 최근 로그인 | 마지막 접속 정보 |\n| 사진 | 회원 이미지 또는 프로필 |\n| 알림 설정 | 문자/이메일/카카오톡 수신 여부 |\n\n### 7.2 활동 및 서비스 정보\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 활동 관련 번호 | 활동 이력 또는 서비스 이용 이력 |\n| 서비스 유형 | 어떤 서비스를 이용하는지 |\n| 지역 | 서비스나 시험이 진행되는 지역 |\n| 시험일시 | 시험 날짜와 시간 |\n| 접수구분 | 정시, 추가접수 등 접수 종류 |\n| 시험 종목/등급 | 어떤 시험을 보는지 |\n| 검정과목 | 시험 과목 |\n| 시험명 | 실제 시험 이름 |\n| 출발어/도착어 | 번역 시험에서 사용하는 언어 |\n| 시험 유형 | 시험의 형태 |\n\n### 7.3 접수 및 시험 진행 정보\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 접수기간 | 신청 가능한 기간 |\n| 시험 상태 | 시험 시작, 미응시, 진행 중 등 |\n| 성적 발표일 | 결과가 공개되는 날짜 |\n| 시험 결과 | 합격, 불합격, 점수 |\n| 채점 점수 | 채점자가 부여한 점수 |\n| 피드백 | 채점 의견 또는 관리자 의견 |\n\n### 7.4 결제/정산 정보\n\n`기본화면_파일업로드.jpg`에서는 결제관리 탭이 있고, 2024 자료와 비교하면 정산/결제 정보가 함께 묶이는 구조로 보인다.\n\n예상되는 정보는 다음과 같다.\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 결제 여부 | 결제가 되었는지 |\n| 결제 금액 | 시험비 또는 서비스 비용 |\n| 결제 수단 | 카드, 포인트, 기타 |\n| 정산 상태 | 정산 완료/대기 여부 |\n| 환불 상태 | 환불 요청 또는 완료 여부 |\n\n### 7.5 문의/통계 정보\n\n탭에 `1:1 문의 관리`, `통계`가 있기 때문에 회원별 문의 이력과 통계 정보도 같은 화면에서 연결될 수 있다.\n\n| 항목 | 쉬운 설명 |\n|---|---|\n| 문의 여부 | 회원이 문의를 남겼는지 |\n| 답변 상태 | 답변 대기/답변 완료 |\n| 통계 | 접수 수, 응시 수, 합격률, 결제 현황 등 |\n\n## 8. 파일 업로드 기능의 의미\n\n파일명에 `파일업로드`가 들어가고, 화면 오른쪽에 `파일올리기`, `파일다운로드`, `엑셀파일생성` 버튼이 보인다.\n\n이 기능은 다음 용도로 쓰일 가능성이 높다.\n\n| 기능 | 쉬운 설명 |\n|---|---|\n| 엑셀 업로드 | 회원 목록이나 시험 접수 목록을 엑셀로 한 번에 등록 |\n| 엑셀 다운로드 | 현재 조회된 목록을 엑셀 파일로 내려받기 |\n| 엑셀파일생성 | 선택한 데이터로 관리용 엑셀 파일 생성 |\n| 파일올리기 | 시험 자료, 회원 자료, 결과 자료 등을 업로드 |\n| 파일다운로드 | 등록된 자료나 결과 파일을 다운로드 |\n\n일반적인 관리자 업무에서는 수백 명의 회원이나 시험 접수자를 하나씩 입력하기 어렵다. 그래서 엑셀 파일을 올려 한 번에 처리하거나, 현재 목록을 엑셀로 내려받아 검토하는 기능이 필요하다.\n\n## 9. `구분` 화면들의 의미\n\n`구분.pdf`, `구분-1.pdf`부터 `구분-14.pdf`까지 많은 PDF가 있다. 이름만 보면 모두 같은 “구분” 계열이다.\n\n여기서 `구분`은 다음 두 가지 의미로 해석할 수 있다.\n\n| 해석 | 설명 |\n|---|---|\n| 분류 기준 | 회원, 시험, 결제, 문의, 통계 등을 나누는 기준 |\n| 테이블 구간 | 너무 넓은 테이블을 여러 부분으로 나눠 보여주는 구간 |\n\n`Frame 758532606.jpg`가 아주 긴 가로 테이블을 보여주기 때문에, `구분-*` PDF들은 이 긴 테이블의 컬럼 묶음을 나눠 저장한 산출물일 가능성이 높다.\n\n쉽게 말하면, 하나의 엑셀 파일에 열이 너무 많아서 가로로 길게 펼쳐진 상태라고 보면 된다. `구분-1`, `구분-2` 같은 파일은 그 엑셀의 일부 구간을 잘라낸 화면일 수 있다.\n\n## 10. 2024 자료와의 관계\n\n`vibecoding`은 2024 전체 사이트맵 중 일부 기능만 떼어낸 것처럼 보인다.\n\n| 2024 전체 자료 | vibecoding 자료 |\n|---|---|\n| 시험 플랫폼 전체 화면 포함 | 파일 업로드/대량 테이블 관리 중심 |\n| 수험생, 출제자, 채점자, 관리자 화면 모두 포함 | 관리자 화면 중심 |\n| 로그인, 회원가입, 시험응시, 출제, 채점, 결제, 문의 등 전체 범위 | 회원관리, 활동관리, 결제관리, 문의관리, 통계를 한 화면에 통합 |\n| 여러 업무 화면이 나뉘어 있음 | 한 화면에 많은 정보를 모아 보는 방식 |\n\n따라서 `vibecoding`은 독립된 새 사이트라기보다, **관리자가 데이터를 더 빠르게 보고 처리하기 위한 고밀도 관리자 화면 실험안**으로 보는 것이 적절하다.\n\n## 11. 이 화면의 장점\n\n| 장점 | 설명 |\n|---|---|\n| 한 화면에서 많은 정보를 볼 수 있음 | 회원, 시험, 접수, 결과, 피드백 등을 한 테이블에서 확인 |\n| 조건 검색이 강함 | 체크박스와 카테고리로 원하는 대상만 빠르게 조회 |\n| 대량 작업에 적합함 | 선택삭제, 메일, SMS, 엑셀 생성, 파일 업로드/다운로드 가능 |\n| 운영자가 업무 흐름을 빠르게 파악 가능 | 시험 상태, 결과, 미응시, 합격/불합격 등을 목록에서 바로 확인 |\n| 엑셀 기반 업무와 잘 맞음 | 실제 운영 현장에서 자주 쓰는 엑셀 업로드/다운로드 흐름과 연결 |\n\n## 12. 이 화면의 위험하거나 어려운 점\n\n이 화면은 관리자에게는 강력하지만, 그대로 만들면 사용하기 어려울 수도 있다.\n\n| 문제 | 쉬운 설명 | 개선 방향 |\n|---|---|---|\n| 컬럼이 너무 많음 | 한 줄에 정보가 너무 많아 읽기 어렵다 | 컬럼 그룹화, 고정 컬럼, 보기 설정 필요 |\n| 체크박스가 너무 많음 | 처음 보는 사람은 어떤 조건을 골라야 할지 헷갈린다 | 자주 쓰는 필터와 상세 필터를 분리 |\n| 가로 스크롤이 길다 | 오른쪽 끝 정보를 보려면 계속 이동해야 한다 | 회원정보/시험정보/결제정보/결과정보 탭 분리 |\n| 권한 관리가 중요함 | 개인정보와 결제정보가 한 화면에 함께 보인다 | 관리자 권한별로 볼 수 있는 컬럼 제한 |\n| 실수 위험이 있음 | 선택삭제, 파일 업로드 같은 기능은 대량 변경을 일으킨다 | 확인 팝업, 작업 이력, 되돌리기 정책 필요 |\n\n## 13. 일반 사용자를 위한 비유\n\n이 화면은 일반적인 웹사이트 화면이라기보다 **관리자용 엑셀 대시보드**에 가깝다.\n\n예를 들어 학원에서 수강생을 관리한다고 생각하면 쉽다.\n\n1. 수강생 목록을 본다.\n2. 정회원인지, 결제를 했는지, 시험을 봤는지 확인한다.\n3. 특정 조건의 학생만 검색한다.\n4. 필요한 학생에게 문자나 메일을 보낸다.\n5. 엑셀로 내려받아 보고서를 만든다.\n6. 새 명단을 파일로 올려 한 번에 반영한다.\n\n`vibecoding` 화면도 이와 비슷하다. 다만 대상이 수강생이 아니라 시험 플랫폼의 회원, 시험 접수자, 응시자, 출제/채점/결제 데이터라는 점이 다르다.\n\n## 14. 기능 정의\n\n이 시안을 실제 기능으로 정의하면 다음과 같다.\n\n| 기능명 | 설명 |\n|---|---|\n| 통합 회원 조회 | 회원 기본정보, 가입정보, 연락처, 알림 설정을 조회 |\n| 조건 필터 | 회원 유형, 성별, 가입경로, 상품/등급, 시험 상태, 날짜 등으로 검색 |\n| 통합 활동 조회 | 회원의 시험 접수, 응시, 결과, 피드백 정보를 함께 조회 |\n| 결제 연계 조회 | 결제 상태, 정산 상태, 환불 상태를 확인 |\n| 문의 연계 조회 | 회원의 1:1 문의 상태를 확인 |\n| 대량 선택 | 여러 행을 체크해서 한 번에 처리 |\n| 선택 삭제 | 선택한 목록을 삭제 또는 제외 처리 |\n| 메일/SMS 발송 | 선택한 회원에게 안내 발송 |\n| 엑셀 생성 | 현재 데이터 또는 선택 데이터를 엑셀로 생성 |\n| 파일 업로드 | 외부 파일을 올려 데이터를 등록/갱신 |\n| 파일 다운로드 | 조회 결과 또는 첨부 파일 다운로드 |\n| 상태 배지 표시 | 합격, 불합격, 접수완료, 미응시 같은 상태를 색상으로 표시 |\n\n## 15. 구현할 때 추천하는 화면 구조\n\n현재 시안은 한 화면에 모든 정보를 보여주려는 성격이 강하다. 실제 서비스에서는 다음처럼 나누면 더 이해하기 쉽다.\n\n| 추천 화면 | 포함 내용 |\n|---|---|\n| 회원 기본정보 탭 | 이름, 연락처, 가입일, 회원유형, 알림설정 |\n| 시험/활동 탭 | 접수 시험, 시험일, 응시상태, 시험결과 |\n| 결제 탭 | 결제금액, 결제수단, 환불, 정산 |\n| 문의 탭 | 1:1문의, 답변상태, 문의일 |\n| 통계 탭 | 응시율, 합격률, 매출, 회원 증가 |\n| 파일관리 탭 | 엑셀 업로드, 다운로드, 업로드 이력 |\n\n이렇게 나누면 초보 관리자도 화면을 이해하기 쉽고, 개인정보와 결제정보 접근 권한도 더 안전하게 나눌 수 있다.\n\n## 16. 최종 판단\n\n`vibecoding`은 2024 전체 사이트의 대체안이 아니라, **관리자 업무를 빠르게 처리하기 위한 고밀도 통합 관리 화면**이다.\n\n핵심은 다음 세 가지다.\n\n1. 많은 데이터를 한 번에 본다.\n2. 원하는 조건으로 빠르게 걸러본다.\n3. 엑셀/파일/SMS/메일로 대량 처리한다.\n\n따라서 이 자료는 사이트맵의 최상위 기준으로 쓰기보다는, 2024 관리자 화면 중 `회원관리`, `활동관리`, `결제관리`, `1:1문의 관리`, `통계`, `파일 업로드` 기능을 구현할 때 참고하는 세부 관리자 화면 시안으로 쓰는 것이 적절하다.\n\n## 17. 한계\n\n현재 환경에는 PDF 렌더링/OCR 도구가 없어 `구분-*` PDF 내부의 모든 텍스트를 직접 추출하지는 못했다. 이 문서는 확인 가능한 JPG 화면과 파일명 기준 분석이다. 다만 `기본화면_파일업로드.jpg`와 `Frame 758532606.jpg`만으로도 화면의 목적과 주요 기능은 충분히 파악된다.\n\n## 18. UX/UI 관점 보완\n\n`vibecoding` 화면은 기능이 많고 정보량이 매우 크다. 숙련된 관리자에게는 빠르지만, 처음 쓰는 관리자에게는 복잡하게 느껴질 가능성이 높다. 따라서 “모든 정보를 한 번에 보여주는 화면”이 아니라 “필요한 정보를 단계적으로 펼치는 화면”으로 다듬는 것이 좋다.\n\n### 18.1 정보 구조 개선\n\n| 현재 문제 | 개선 방향 |\n|---|---|\n| 한 테이블에 회원, 시험, 결제, 결과, 피드백이 모두 들어감 | 컬럼 그룹을 `회원정보`, `시험정보`, `결제정보`, `결과정보`, `문의/피드백`으로 나눈다. |\n| 가로 스크롤이 매우 김 | 회원명, 회원번호, 상태 같은 핵심 열은 왼쪽에 고정한다. |\n| 필터 체크박스가 너무 많음 | 기본 필터와 상세 필터를 접고 펼칠 수 있게 한다. |\n| 상태값이 많아 의미 파악이 어려움 | 색상 배지와 짧은 설명을 함께 제공한다. |\n| 대량 작업 버튼이 한곳에 모여 있음 | 위험도에 따라 `조회`, `발송`, `파일`, `삭제` 작업을 분리한다. |\n\n### 18.2 관리자 사용 흐름\n\n1. 검색어 또는 기본 필터로 대상을 찾는다.\n2. 필요한 컬럼 그룹만 켠다.\n3. 목록에서 상태 이상 또는 미처리 항목을 확인한다.\n4. 개별 상세를 열어 정확한 내용을 확인한다.\n5. 필요한 경우 선택 항목에 대해 메일/SMS/파일 다운로드를 수행한다.\n6. 대량 변경이 필요한 경우 업로드 전 미리보기와 검증 결과를 확인한다.\n\n### 18.3 파일 업로드 UX\n\n파일 업로드 기능은 실수하면 많은 데이터가 한 번에 바뀔 수 있으므로 안전장치가 필요하다.\n\n| 단계 | 필요한 화면 요소 |\n|---|---|\n| 업로드 전 | 허용 파일 형식, 샘플 파일 다운로드, 필수 컬럼 안내 |\n| 업로드 직후 | 파일명, 행 수, 오류 행 수, 중복 데이터 수 표시 |\n| 반영 전 | 변경될 데이터 미리보기, 추가/수정/삭제 건수 구분 |\n| 반영 확인 | 최종 확인 팝업, 관리자 비밀번호 또는 2차 확인 |\n| 반영 후 | 처리 결과, 실패 항목 다운로드, 작업 이력 저장 |\n\n### 18.4 접근성 및 개인정보\n\n| 항목 | 권장 기준 |\n|---|---|\n| 개인정보 | 기본 목록에서는 일부 마스킹하고, 상세 권한이 있는 관리자만 전체 보기 |\n| 결제정보 | 결제 금액과 상태는 표시하되 결제수단 상세는 권한별 제한 |\n| 시험결과 | 합격/불합격과 점수는 역할 권한에 따라 노출 |\n| 대량 다운로드 | 다운로드 사유 입력과 로그 기록 |\n| SMS/메일 발송 | 발송 대상 수, 발송 내용 미리보기, 테스트 발송 제공 |\n"

          "content": "# 휴텍씨 DB 일반사용자용 정리본\n\n## 이 폴더는 무엇인가요?\n\n`수집된DB`와 `휴텍씨DB`의 초안 자료를 내용별로 나누어 읽기 쉽게 만든\n열람용 문서입니다. 원본은 여러 표가 한 CSV에 같이 들어 있어 바로 이해하기\n어려우므로, 서비스 분류, 시험 운영, 교육 자료, 문제은행, 서비스 기획으로\n나누었습니다.\n\n## 먼저 볼 문서\n\n| 알고 싶은 내용 | 열어볼 폴더 또는 문서 |\n|---|---|\n| 어떤 서비스 분야와 급수가 있는지 | `01_분류체계/` |\n| 시험이 어떻게 구성되고 채점되는지 | `02_시험운영/` |\n| 어떤 교재와 교육과정이 준비되어 있는지 | `03_교육자료/` |\n| 실제 시험 문제와 답안 자료가 무엇인지 | `04_문제은행/` |\n| 서비스, 매칭, 결제, DB 항목 초안이 무엇인지 | `05_서비스기획/` |\n\n## 정리된 자료 규모\n\n- 서비스 분야 분류: 65건\n- 자격시험 급수 분류: 39건\n- 시험 기본설정 선택항목: 75건\n- 문제은행 본문: 47건 (개발 4건, 건강 3건, 관계교육 3건, 문서작성 5건, 생활기타 3건, 영상콘텐츠 3건, 음성콘텐츠 7건, 재무생활 4건, 전문분야 5건, 창작활동 5건, 취업 2건, 통번역 3건)\n- 통합 DB 항목 사전: 214개 열\n\n## 주의해서 읽을 점\n\n- 이 자료는 원본에 기록된 기획·수집 내용을 분류한 것이며, 확정된 서비스\n  정책이나 최종 시험 규정으로 판정한 문서가 아닙니다.\n- 원본에 있는 `개발 완료 전 확정 필요`, 물음표, 중복, 맞춤법 표기는\n  검토가 필요하다는 의미가 남도록 그대로 보존했습니다.\n- 병렬로 배치된 원본 표의 관계가 분명하지 않은 경우에는 임의로 합치지\n  않았습니다. CSV의 `원본파일`, `원본행` 열로 출처를 확인할 수 있습니다.\n- 문제은행의 모범답안 및 채점자용 자료는 응시자 공개 범위를 별도로\n  결정해야 합니다.\n\n## 원본에서 어디로 정리되었나요?\n\n| 원본 파일 | 정리 위치 |\n|---|---|\n| `수집된DB/분야.csv` | `01_분류체계/` |\n| `수집된DB/대표 DB-시험정보.csv` | `02_시험운영/시험_기본설정_선택항목.csv` |\n| `수집된DB/대표DB.csv` | `02_시험운영/`, `05_서비스기획/서비스운영_기획원문_읽기자료.md` |\n| `수집된DB/문제와 채점지.csv` | `02_시험운영/` |\n| `수집된DB/통합사본.csv` | `05_서비스기획/` |\n| `휴텍씨DB/교재.csv` | `03_교육자료/` |\n| `휴텍씨DB/커리.csv`, `휴텍씨DB/커리 급수별 (프롬).csv` | `03_교육자료/교육과정_전체_읽기자료.md` |\n| `휴텍씨DB/문제은행.csv` | `04_문제은행/` |\n\n## 재생성\n\n입력 CSV가 수정된 후 동일한 구조로 다시 정리하려면\n`python3 일반사용자용_정리DB/_생성도구/정리본_생성.py`를 실행합니다.\n"

          "content": "# 시험 문항과 채점 방식 요약\n\n이 문서는 원본 시트에 함께 배치된 문항 수, 채점 대상, 응시 급수 메모를\n읽기 위한 자료입니다. 기재된 값은 운영 확정본이 아니라 수집 자료의 원문입니다.\n\n## 원문 항목\n\n- 원본 2행: 시험영역 / 윤리-객관식 / 채점기준표 / 단답형, / 유사어 답안 / 객관식 / 단답형 / 프롬- / 질문쓰기 / 프롬 / 답변수정/ / 번역 동일 / 프롬 답변 비교 채점/  번역 동일 / 객관, 단답 답지 / 전문 응시표 / 채점기준표 / 시험영역 / 급수 / 세부급수 / 영역 / 대 / 중 / 소 / 번역 / 출발어(109개) / 번역 / 도착어(109개) / 엑셀다운\n- 원본 3행: 자동채점 / 채점자, / 관리자용 / 출제자용 / 자동채점 / 자동채점 / 자동 + 휴머주관식 - 유사어 , 모범답안 / 자동 + 휴머주관식 - 유사어 , 모범답안 / 일반 1급 / 전문가만 / 객관+휴먼 / 응시자용 / 채점표 / 형태 / 응시자용 / 채점 가이드라인 / 응시자용\n- 원본 4행: 프롬프트 / 20 / 10 / 대중소 5개 중 / 2개 선택 / 대중소 5개 중 / 2개 선택 / 일반 / 1급\n- 원본 5행: 번역 / 1~5점까지의 기준을 넣어야 함 / 채점기준 / 일반 / 2급\n- 원본 6행: 객관, 단답, 주관식 유사어 자동채점 / 채점디비확인- 유사어 / 일반 / 3급\n- 원본 7행: 10 / 2 / 2 / 2 / 2 / 2 / 전문 / 1급\n- 원본 8행: 전문 / 2급\n- 원본 9행: 교육 / 3급\n- 원본 10행: 교육 / 2급\n- 원본 11행: 교육 / 1급\n- 원본 12행: 교육 / 5급\n- 원본 13행: 교육 / 4급\n- 원본 14행: 답안채점 / 교육 / 6급\n- 원본 15행: 프롬프트 / 교육 / 7급\n- 원본 16행: 번역 / 교육 / 8급\n- 원본 17행: 윤리 - 공통 / 10 / 윤리 / 교육7-8\n- 원본 18행: 10 / 교육 5-6\n- 원본 19행: 10 / 중등 3-4\n- 원본 20행: 10 / 교육 1-2\n- 원본 21행: 15 / 일반 1-전문 2\n- 원본 22행: 15 / 일반2-3급\n- 원본 23행: 20 / 전문 1\n\n출처: `수집된DB/문제와 채점지.csv`\n"

          "content": "# 교육과정 원문 읽기자료\n\n원본 CSV에는 여러 교육과정 표가 같은 행에 병렬로 저장되어 있습니다.\n아래는 비어 있는 칸을 제거하여 원문 내용을 행 단위로 읽을 수 있게 정리한 것입니다.\n과정 간 대응 관계가 명확하지 않은 부분은 임의로 합치지 않았습니다.\n\n## 프롬프트 급수별 교육과정\n\n출처: `휴텍씨DB/커리 급수별 (프롬).csv`\n\n- 2행: 과정 명칭: 프롬프트 엔지니어 일반 1·2급 과정 / 과정 명칭: 프롬프트 엔지니어 일반 3급 과정 / 과정 명칭: 프롬프트 엔지니어 전문 1급·2급 과정 / 과정 명칭: 프롬프트 엔지니어 교육 1급 ~ 8급 과정 / 각 단계별 실습은 다음 항목을 포함합니다:\n- 3행: 대상: 일반 성인, 비전공 대학생, 프롬프트 입문자 / 대상 / 교육 목표 / 예시 주제 / 대상: 기업 실무자, 팀 리더, 정책기획자, 콘텐츠 기획자 / 대상: 변호사, 노무사, 의사, 회계사 등 고도화된 도메인 실무자 / 급수\n- 4행: 주차 / 교육 내용 / 주제 / 교육 내용 / 주제 / 초등 고학년 / GPT가 하는 일 이해 / 질문 구성 / 간단한 대화 / \"동물에 대해 물어보기\", \"상상 친구 만들기\" / 교육 내용 / 주제 / 주차 / 주차 / 교육 1~2급 / 프롬프트 설계 실습: 목적, 문체, 형식 조건을 반영하여 직접 작성\n- 5행: 1주차 / 마케팅, 교육, 정책, 제조 등 분야별 사례 분석 / 도메인 AI 활용 트렌드 / 법률, 의료, 인사, 회계 분야별 사례 리뷰 / 생성형 AI 개론 / 중학교 / 질문의 정확성, 간단한 명령어 활용 / 톤 이해 / \"자기소개서 써보기\", \"나만의 설명문 만들기\" / GPT 개념, 프롬프트란 무엇인가, 활용 사례 탐색 / 산업별 AI 활용 현황 / 1주차 / 1주차 / 교육 3~4급 / GPT 결과 생성 실습: 다양한 모델(GPT-4o, Claude 등)을 활용한 결과 생성\n- 6행: 2주차 / 조건문, 다중 지시, 모델 응답 제어 기법 / 법률/의료용 프롬프트 설계 / 실제 조문, 진단 분류 기반 명세화 방법 / 기본 프롬프트 구조 / 고1~고2 / 문체/형식 지정 / 윤리 구분 / 결과 수정 / \"학교 신문 기사 만들기\", \"비건 식단 설명 프롬프트\" / 역할 부여, 지시 목적, 형식 지정법 배우기 / 고급 프롬프트 설계 / 2주차 / 2주차 / 교육 5~6급 / 결과 수정 및 평가 실습: AI 결과의 문제점을 인식하고 보완하는 훈련\n- 7행: 3주차 / 프롬프트-출력-수정의 품질평가 기준 학습 / 판례·논문 분석 자동화 / GPT로 정보 추출, 요약, 분류 기법 실습 / 문체/톤 제어 / 고3 / 실전형 프롬프트 작성 / 결과 분석 / 수정 보완 / \"진로 탐색 자기소개서\", \"AI 토론 주제 정리\" / 따뜻한 설명체, 뉴스 스타일 등 톤 조절 연습 / 결과물 평가 루브릭 이해 / 3주차 / 3주차 / 교육 7~8급 / 도메인별 실전 실습: 교육/법률/의료/콘텐츠 등 분야 특화 프롬프트 구성\n- 8행: 4주차 / 보고서, 발표자료, 정책 제안서 등 실습 / 상담·설문 시나리오 프롬프트 / 진단/질문 자동화 설계, 인터랙티브 프롬프트 / 문서 생성 실습 / 리포트, 이메일, 안내문 등 작성 실습 / 업무용 문서 프롬프트 / 4주차 / 4주차 / 교재 제공: 연령별 맞춤형 프롬프트 실습지, 예제 중심 텍스트, GPT 대화 환경 제공 / 모의 시험 실습: PromptCert 유형에 맞춘 실전형 문제 풀이 및 루브릭 기반 자가평가\n- 9행: 5주차 / 역할 분담 기반 다중 프롬프트 연계 과제 수행 / AI 생성물의 법적·윤리적 검토 / 위법 가능성, 편향 판단, 책임 분리 구조 이해 / 일상 활용 예제 / 여행계획, 쇼핑정보, 생활조언 생성 프롬프트 / 팀 협업형 생성 과제 / 5주차 / 5주차 / 실습 도구: 학교 전용 GPT 인터페이스, 워크시트 작성, 결과 평가표 포함\n- 10행: 6주차 / 스타일 지시, 구도 설정, 내레이션 구성 등 /
