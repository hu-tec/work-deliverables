      }

      function group(items) {
        return items.reduce((a, d) => {
          (a[d.section] || (a[d.section] = [])).push(d);
          return a
        }, {})
      }

      function inlineMd(v) {
        const bt = String.fromCharCode(96);
        return esc(v).replace(new RegExp(bt + '([^' + bt + ']+)' + bt, 'g'), '<code>$1</code>').replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>').replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
      }

      function renderMarkdown(markdown) {
        const fence = String.fromCharCode(96, 96, 96),
          lines = markdown.replace(/\r\n/g, '\n').split('\n'),
          html = [];
        let inCode = false,
          code = [],
          inList = false;

        function closeList() {
          if (inList) {
            html.push('</ul>');
            inList = false
          }
        }
        lines.forEach(line => {
          if (line.startsWith(fence)) {
            if (inCode) {
              html.push('<pre><code>' + esc(code.join('\n')) + '</code></pre>');
              code = [];
              inCode = false
            } else {
              closeList();
              inCode = true
            }
            return
          }
          if (inCode) {
            code.push(line);
            return
          }
          if (/^\s*$/.test(line)) {
            closeList();
            return
          }
          const h = line.match(/^(#{1,3})\s+(.+)$/);
          if (h) {
            closeList();
            const level = h[1].length;
            html.push('<h' + level + '>' + inlineMd(h[2]) + '</h' + level + '>');
            return
          }
          const li = line.match(/^\s*[-*]\s+(.+)$/);
          if (li) {
            if (!inList) {
              html.push('<ul>');
              inList = true
            }
            html.push('<li>' + inlineMd(li[1]) + '</li>');
            return
          }
          const q = line.match(/^>\s?(.+)$/);
          if (q) {
            closeList();
            html.push('<blockquote>' + inlineMd(q[1]) + '</blockquote>');
            return
          }
          closeList();
          html.push('<p>' + inlineMd(line) + '</p>')
        });
        if (inCode) html.push('<pre><code>' + esc(code.join('\n')) + '</code></pre>');
        closeList();
        return html.join('\n')
      }

      function renderTable(items) {
        return '<div class="table-wrap"><table class="work-table"><thead><tr><th>순서</th><th>제목</th><th>파일명</th><th>날짜</th></tr></thead><tbody>' +
          items.map((d, i) => '<tr><td class="num">' + (i + 1) + '</td><td>' + esc(d.title) + '</td><td><a href="' + encodeURI(d.path) + '" target="_blank" rel="noopener">' + esc(d.path) + '</a></td><td class="date">' + esc(d.date) + '</td></tr>').join('') +
          '</tbody></table></div>'
      }

      function renderCards(items) {
        return '<div class="card-grid">' +
          items.map(d => '<a class="html-card" href="' + encodeURI(d.path) + '" target="_blank" rel="noopener"><strong>' + esc(d.title) + '</strong><span>수정일 ' + esc(d.date) + ' · ' + esc(d.path) + '</span></a>').join('') +
          '</div>'
      }

      function renderHtmlList() {
        const term = htmlSearch.value.trim().toLowerCase(),
          filtered = DATA.htmlDocs.filter(d => !term || (d.section + ' ' + d.title + ' ' + d.path + ' ' + d.date).toLowerCase().includes(term)),
          grouped = group(filtered);
        htmlSections.innerHTML = Object.keys(grouped).map(section => '<section class="section"><h3>' + esc(section) + ' <span class="count">' + grouped[section].length + '개</span></h3>' + (htmlView === 'table' ? renderTable(grouped[section]) : renderCards(grouped[section])) + '</section>').join('') || '<div class="placeholder">검색 결과가 없습니다.</div>'
      }

      function renderMdList() {
        const term = mdSearch.value.trim().toLowerCase(),
          filtered = DATA.mdDocs.filter(d => !term || (d.section + ' ' + d.title + ' ' + d.path + ' ' + d.date).toLowerCase().includes(term)),
          grouped = group(filtered);
        mdSections.innerHTML = Object.keys(grouped).map(section => '<section class="section"><h3>' + esc(section) + ' <span class="count">' + grouped[section].length + '개</span></h3><ul class="doc-list">' + grouped[section].map(d => '<li><button class="doc-button" type="button" data-path="' + esc(d.path) + '"><strong>' + esc(d.title) + '</strong><span>수정일 ' + esc(d.date) + ' · ' + esc(d.path) + '</span></button></li>').join('') + '</ul></section>').join('') || '<div class="placeholder">검색 결과가 없습니다.</div>'
      }

      function openDoc(p) {
        const doc = DATA.mdDocs.find(d => d.path === p);
        if (!doc) return;
        document.querySelectorAll('.doc-button').forEach(b => b.classList.toggle('active', b.dataset.path === p));
        titleEl.textContent = doc.title;
        pathEl.textContent = '수정일 ' + doc.date + ' · ' + doc.path;
        rawLink.href = encodeURI(doc.path);
        rawLink.hidden = false;
        copyLink.hidden = false;
        bodyEl.className = 'markdown';
        bodyEl.innerHTML = renderMarkdown(doc.content)
      }
      document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.panel).classList.add('active')
      }));
      document.querySelectorAll('.view-button').forEach(button => button.addEventListener('click', () => {
        htmlView = button.dataset.view;
        document.querySelectorAll('.view-button').forEach(item => item.classList.toggle('active', item === button));
        renderHtmlList()
      }));
      mdSections.addEventListener('click', e => {
        const b = e.target.closest('.doc-button');
        if (b) openDoc(b.dataset.path)
      });
      htmlSearch.addEventListener('input', renderHtmlList);
      mdSearch.addEventListener('input', renderMdList);
      copyLink.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(pathEl.textContent.replace(/^수정일 [0-9-]+ · /, ''));
          copyLink.textContent = '복사됨';
          setTimeout(() => copyLink.textContent = '경로 복사', 1200)
        } catch (e) {
          copyLink.textContent = '복사 실패';
          setTimeout(() => copyLink.textContent = '경로 복사', 1200)
        }
      });
      renderHtmlList();
      renderMdList();
    </script>
  </body>
</html>
