<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>업무산출물</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #fff;
        --text: #17191c;
        --muted: #5f6875;
        --line: #dfe3e8;
        --accent: #0f6b63;
        --accent-soft: #e8f3f1;
        --ink: #17202a;
        --code: #f1f3f5
      }

      * {
        box-sizing: border-box
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, "Noto Sans KR", sans-serif
      }

      header {
        background: var(--ink);
        color: #fff;
        padding: 8px 10px
      }

      .wrap,
      main {
        width: 100%;
        max-width: none;
        margin: 0
      }

      h1 {
        margin: 0 0 2px;
        font-size: 24px
      }

      .sub {
        margin: 0;
        color: #d7dde3;
        line-height: 1.25
      }

      .tabs {
        display: flex;
        gap: 4px;
        margin-top: 6px
      }

      .tab {
        border: 1px solid rgba(255, 255, 255, .28);
        border-radius: 8px;
        background: rgba(255, 255, 255, .08);
        color: #fff;
        padding: 5px 8px;
        cursor: pointer;
        font: inherit
      }

      .tab.active {
        background: #fff;
        color: var(--ink)
      }

      main {
        padding: 6px
      }

      .panel {
        display: none
      }

      .panel.active {
        display: block
      }

      .box,
      .library,
      .viewer {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden
      }

      .head {
        padding: 6px 8px;
        border-bottom: 1px solid var(--line)
      }

      .section-title {
        margin: 0;
        font-size: 18px
      }

      .note {
        margin: 2px 0 0;
        color: var(--muted);
        line-height: 1.25;
        font-size: 13px
      }

      .search {
        width: 100%;
        margin-top: 5px;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
        outline: none
      }

      .search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 107, 99, .12)
      }

      .view-toggle {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 5px
      }

      .view-button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 5px 8px;
        cursor: pointer;
        font: inherit;
        font-size: 13px
      }

      .view-button.active {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent)
      }

      .sections {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 5px;
        padding: 5px
      }

      .section {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        overflow: hidden
      }

      .section:first-child {
        border-top: 1px solid var(--line)
      }

      .section h3 {
        margin: 0;
        padding: 5px 7px;
        border-bottom: 1px solid var(--line);
        background: #fafbfc;
        font-size: 15px
      }

      .count {
        display: inline-block;
        margin-left: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 400
      }

      .table-wrap {
        overflow: auto;
        margin-bottom: 0;
        border: 0;
        border-radius: 0;
        background: #fff
      }

      .work-table {
        width: 100%;
        min-width: 0;
        border-collapse: collapse
      }

      .work-table th,
      .work-table td {
        border-bottom: 1px solid var(--line);
        padding: 4px 5px;
        text-align: left;
        vertical-align: top;
        font-size: 13px
      }

      .work-table th {
        background: #f1f3f5;
        color: #313942;
        font-weight: 700;
        white-space: nowrap
      }

      .work-table tr:last-child td {
        border-bottom: 0
      }

      .work-table .num {
        width: 48px;
        color: var(--muted);
        text-align: right
      }

      .work-table .date {
        width: 96px;
        color: var(--muted);
        white-space: nowrap
      }

      .work-table a {
        color: var(--accent);
        text-decoration: none;
        word-break: break-all
      }

      .work-table a:hover {
        text-decoration: underline
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 5px;
        padding: 5px;
        margin-bottom: 0
      }

      .html-card {
        display: block;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        padding: 6px 7px;
        text-decoration: none
      }

      .html-card:hover {
        border-color: var(--accent);
        box-shadow: 0 6px 18px rgba(15, 107, 99, .12)
      }

      .html-card strong,
      .doc-button strong {
        display: block;
        font-size: 14px;
        line-height: 1.35
      }

      .html-card span,
      .doc-button span {
        display: block;
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        word-break: break-all
      }

      .md-layout {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
        align-items: start
      }

      .library {
        grid-column: span 1
      }

      .viewer {
        grid-column: span 3
      }

      .doc-list {
        list-style: none;
        margin: 0;
        padding: 0 4px 4px
      }

      .doc-list li {
        margin: 1px 0
      }

      .doc-button {
        width: 100%;
        display: block;
        border: 0;
        border-radius: 7px;
        background: transparent;
        color: var(--text);
        padding: 5px 6px;
        text-align: left;
        cursor: pointer;
        font: inherit
      }

      .doc-button:hover,
      .doc-button.active {
        background: var(--accent-soft)
      }

      .viewer {
        position: sticky;
        top: 6px;
        min-height: calc(100vh - 12px)
      }

      .viewer-actions {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-top: 5px
      }

      .viewer-actions a,
      .viewer-actions button {
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fff;
        color: var(--text);
        padding: 5px 7px;
        text-decoration: none;
        cursor: pointer;
        font: inherit;
        font-size: 13px
      }

      .markdown {
        padding: 6px 8px;
        line-height: 1.35;
        word-break: keep-all;
        overflow-wrap: anywhere
      }

      .markdown h1,
      .markdown h2,
      .markdown h3 {
        line-height: 1.2;
        margin: .45em 0 .2em
      }

      .markdown h1 {
        font-size: 28px
      }

      .markdown h2 {
        font-size: 22px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 2px
      }

      .markdown h3 {
        font-size: 18px
      }

      .markdown p {
        margin: .25em 0
      }

      .markdown ul {
        padding-left: 1.4em
      }

      .markdown code {
        background: var(--code);
        border-radius: 4px;
        padding: 2px 4px;
        font-family: Consolas, Monaco, monospace
      }

      .markdown pre {
        background: #101820;
        color: #eef3f7;
        border-radius: 8px;
        padding: 6px;
        overflow: auto
      }

      .markdown pre code {
        background: transparent;
        color: inherit;
        padding: 0
      }

      .markdown blockquote {
        margin: .35em 0;
        padding: 4px 7px;
        border-left: 4px solid var(--accent);
        background: #f4f8f7
      }

      .placeholder {
        color: var(--muted);
        padding: 8px;
        line-height: 1.35
      }

      @media(max-width:920px) {
        header {
          padding: 6px
        }

        main {
          padding: 4px
        }

        .md-layout {
          grid-template-columns: 1fr
        }

        .library,
        .viewer {
          grid-column: auto
        }

        .viewer {
          position: static;
          min-height: 0
        }

        h1 {
          font-size: 24px
        }

        .tabs {
          flex-wrap: wrap
        }

        .sections {
          grid-template-columns: repeat(4, minmax(0, 1fr));
          padding: 4px
        }
      }
    </style>
  </head>

      <section id="markdown-panel" class="panel">

            <div id="viewer-body" class="placeholder">Markdown 탭의 문서 목록에서 항목을 선택하세요.</div>
          </article>
        </div>
      </section>
    </main>

          "content": "# 보유 스킬 및 상세 체크리스트 분리/보완안\n\n## 목적\n\n`interview.html`의 \"보유 스킬 및 상세 체크리스트\"는 현재 도구, 업무 경험, 교육 운영 역량, 콘텐츠 제작 역량이 한 영역에 함께 배치되어 있다. 면접이나 역량 확인 용도로 사용하려면 다음처럼 목적별로 분리하는 편이 좋다.\n\n- 지원자의 실제 업무 수행 가능성을 빠르게 확인한다.\n- AI/바이브코딩 도구처럼 최신성이 중요한 항목은 별도 그룹으로 관리한다.\n- 단순 사용 경험과 실무 산출 가능 역량을 구분한다.\n- HTML 체크리스트를 수정할 때 항목 추가/삭제가 쉽도록 카테고리 기준을 명확히 둔다.\n\n## 권장 분리 구조\n\n### 1. AI 개발/바이브코딩\n\n목적: 프롬프트만으로 프로토타입, 웹앱, 자동화 도구, 코드 수정까지 진행할 수 있는지 확인한다.\n\n기존 항목:\n\n- 피그마 AI\n- 커서\n- 와프\n- 엔티\n\n보완 권장 항목:\n\n- Cursor\n- Windsurf\n- GitHub Copilot\n- Claude Code\n- OpenAI Codex CLI\n- Gemini CLI\n- Cline\n- Roo Code\n- Continue\n- Aider\n- Tabnine\n- Devin\n- Replit Agent\n- Bolt.new\n- Lovable\n- v0\n- Base44\n- Firebase Studio\n- Kiro\n- Warp AI\n\n세부 분리안:\n\n- AI IDE/에디터: Cursor, Windsurf, GitHub Copilot, Kiro, Zed AI\n- 터미널/CLI 에이전트: Claude Code, OpenAI Codex CLI, Gemini CLI, Aider, Warp AI\n- VS Code 확장형 에이전트: Cline, Roo Code, Continue\n- 노코드/로우코드 앱 빌더: Replit Agent, Bolt.new, Lovable, v0, Base44, Firebase Studio\n- 검토/협업형 개발 도구: Devin, GitHub Copilot, Tabnine\n\n체크 기준:\n\n- 단순 코드 생성 가능\n- 기존 코드 수정 가능\n- 오류 로그 기반 디버깅 가능\n- GitHub 연동 가능\n- 배포까지 경험\n- 프롬프트로 UI/DB/API 구조 설명 가능\n- 생성 코드의 보안/품질 검토 가능\n\n### 2. 범용 LLM/프롬프트 활용\n\n목적: 업무 질문, 문서 작성, 요약, 기획, 리서치, 사고 정리에 AI를 활용할 수 있는지 확인한다.\n\n기존 항목:\n\n- 제미나이\n- GPT\n- 클로드\n\n보완 권장 항목:\n\n- ChatGPT\n- Claude\n- Gemini\n- Perplexity\n- NotebookLM\n- Microsoft Copilot\n- Grok\n- Poe\n- You.com\n\n체크 기준:\n\n- 역할/목표/제약조건을 포함한 프롬프트 작성\n- 긴 문서 요약 및 비교\n- 표/체크리스트/템플릿 생성\n- 근거 확인 및 출처 검토\n- 회의록/상담 기록 정리\n- 반복 업무용 프롬프트 템플릿화\n\n### 3. 디자인/프레젠테이션/시각자료 제작\n\n목적: 발표자료, 카드뉴스, 홍보물, 이미지 생성, UI 초안을 빠르게 만들 수 있는지 확인한다.\n\n기존 항목:\n\n- 감마\n- 미드저니\n- 미리 캔버스\n- Canva\n- Adobe Express\n- Prezi\n- Canva 프레젠테이션\n- PowerPoint\n- Keynote\n- 피그마 AI\n\n보완 권장 항목:\n\n- Figma\n- FigJam\n- Gamma\n- Canva AI\n- Adobe Firefly\n- Adobe Express\n- Midjourney\n- DALL-E\n- Ideogram\n- Leonardo AI\n- Krea\n- Runway\n- Beautiful.ai\n- Pitch\n- Tome\n\n세부 분리안:\n\n- UI/협업 디자인: Figma, FigJam\n- 발표자료: Gamma, PowerPoint, Keynote, Prezi, Beautiful.ai, Pitch, Tome\n- 이미지 생성/편집: Midjourney, DALL-E, Adobe Firefly, Ideogram, Leonardo AI, Krea\n- 마케팅/콘텐츠 디자인: Canva, Canva AI, Adobe Express, 미리 캔버스\n\n체크 기준:\n\n- 브랜드 톤에 맞춘 템플릿 제작\n- 발표 흐름 구성\n- 카드뉴스/썸네일 제작\n- AI 이미지 생성 프롬프트 작성\n- 이미지 보정/배경 제거/리사이즈\n- 디자인 산출물 공유 및 피드백 반영\n\n### 4. 문서 작성/지식관리\n\n목적: 업무 문서, 보고서, 매뉴얼, 상담 기록, 자료 정리를 체계적으로 수행할 수 있는지 확인한다.\n\n기존 항목:\n\n- 글쓰기\n- 글정리\n- 맥락파악\n- 노션\n- 노트북 LM\n\n보완 권장 항목:\n\n- Notion\n- Notion AI\n- Google Docs\n- Microsoft Word\n- Microsoft Loop\n- Obsidian\n- Coda\n- Dropbox Paper\n- Confluence\n\n체크 기준:\n\n- 회의록 작성\n- 보고서/제안서 작성\n- 산재된 자료 구조화\n- 문서 템플릿 제작\n- 지식베이스 관리\n- 문서 버전 관리\n- 업무 맥락 요약\n\n### 5. 업무 협업/커뮤니케이션\n\n목적: 팀 단위 업무 진행, 요청/보고/공유가 가능한지 확인한다.\n\n기존 항목:\n\n- 슬랙\n- 깃허브\n\n보완 권장 항목:\n\n- Slack\n- Microsoft Teams\n- Discord\n- Google Chat\n- Zoom\n- Google Meet\n- Webex\n- Jira\n- Trello\n- Asana\n- Monday.com\n- Linear\n- GitHub Issues\n\n체크 기준:\n\n- 채널 기반 커뮤니케이션\n- 업무 요청/상태 공유\n- 이슈/태스크 관리\n- 댓글/멘션/스레드 활용\n- 회의 일정 및 링크 관리\n- 회의 후 액션 아이템 정리\n\n### 6. 온라인 강의/교육 운영\n\n목적: 온라인 강의, 워크숍, 교육생 관리, 실시간 피드백을 운영할 수 있는지 확인한다.\n\n기존 항목:\n\n- Zoom\n- MS Teams\n- Google Meet\n- Webex\n- Miro\n- Jamboard\n- Padlet\n- Mural\n- Kahoot\n- Quizizz\n- Mentimeter\n- Slido\n\n보완 권장 항목:\n\n- Google Classroom\n- Moodle\n- Canvas LMS\n- ClassDojo\n- Nearpod\n- Edpuzzle\n- Socrative\n- FigJam\n\n세부 분리안:\n\n- 화상 강의: Zoom, MS Teams, Google Meet, Webex\n- 화이트보드/협업: Miro, FigJam, Padlet, Mural\n- 퀴즈/평가: Kahoot, Quizizz, Mentimeter, Slido, Socrative\n- LMS/학습관리: Google Classroom, Moodle, Canvas LMS\n- 강의 콘텐츠 상호작용: Nearpod, Edpuzzle\n\n체크 기준:\n\n- 온라인 강의 개설/초대\n- 출석/참여 관리\n- 화면 공유/녹화\n- 실시간 퀴즈 진행\n- 수업 자료 배포\n- 교육생 질문 관리\n- 결과 리포트 정리\n\n### 7. 영상/녹화/미디어 제작\n\n목적: 교육 영상, 숏폼, 화면 녹화, 튜토리얼, 홍보 영상을 만들 수 있는지 확인한다.\n\n기존 항목:\n\n- 캡컷\n- 프리미어 프로\n- 파이널 컷\n- DaVinci Resolve\n- OBS\n- Loom\n- Bandicam\n- Camtasia\n\n보완 권장 항목:\n\n- Descript\n- Runway\n- Pika\n- HeyGen\n- Synthesia\n- ElevenLabs\n- OpusClip\n- Veed\n- Riverside\n- Screen Studio\n\n세부 분리안:\n\n- 편집: CapCut, Premiere Pro, Final Cut Pro, DaVinci Resolve\n- 화면 녹화: OBS, Loom, Bandicam, Camtasia, Screen Studio\n- AI 영상 생성/편집: Runway, Pika, Descript, HeyGen, Synthesia\n- 음성/자막: ElevenLabs, Veed, Descript\n- 숏폼 재가공: OpusClip, CapCut\n\n체크 기준:\n\n- 컷 편집\n- 자막 삽입\n- 화면 녹화\n- 음성 정리\n- 썸네일 제작\n- 강의 영상 내보내기\n- 유튜브/블로그 업로드 경험\n\n### 8. 데이터 정리/자동화\n\n목적: 반복 업무, 엑셀 정리, 데이터 입력/정제, 간단한 자동화를 수행할 수 있는지 확인한다.\n\n기존 항목:\n\n- 데이터 정리\n- 문서정리관리\n- MCP\n\n보완 권장 항목:\n\n- Excel\n- Google Sheets\n- Airtable\n- Zapier\n- Make\n- n8n\n- Power Automate\n- AppSheet\n- Google Apps Script\n- Python\n- SQL\n- Looker Studio\n- Power BI\n- Tableau\n\n체크 기준:\n\n- 표 데이터 정리\n- 함수/필터/피벗 사용\n- 반복 작업 자동화\n- 폼 응답 정리\n- 간단한 데이터 시각화\n- API/MCP 개념 이해\n- 업무 자동화 흐름 설계\n\n### 9. 웹 운영/인프라/배포\n\n목적: 웹사이트, CMS, 서버, 배포, 도메인 등 운영 경험을 확인한다.\n\n기존 항목:\n\n- 서버(아마존등)\n- 까페 24\n- 워드프레스\n- 깃허브\n\n보완 권장 항목:\n\n- AWS\n- Google Cloud\n- Azure\n- Vercel\n- Netlify\n- Cloudflare\n- Render\n- Railway\n- Supabase\n- Firebase\n- Cafe24\n- WordPress\n- Shopify\n- Webflow\n- GitHub Pages\n\n체크 기준:\n\n- 도메인 연결\n- 호스팅 설정\n- CMS 게시물 관리\n- 간단한 웹사이트 수정\n- GitHub 저장소 사용\n- 정적 사이트 배포\n- 환경변수/권한 관리\n- 백업 및 복구 이해\n\n### 10. 번역/로컬라이제이션\n\n목적: 번역 도구, 용어 관리, 문맥 검토, 다국어 콘텐츠 작업 가능성을 확인한다.\n\n기존 항목:\n\n- SDL\n- 멘소스\n\n보완 권장 항목:\n\n- Trados\n- memoQ\n- Phrase\n- Lokalise\n- Smartcat\n- DeepL\n- Google Translate\n- Papago\n- Crowdin\n\n체크 기준:\n\n- 번역 메모리 이해\n- 용어집 관리\n- 문맥 기반 번역 검토\n- 기계번역 후편집\n- 다국어 파일 관리\n- 자막/웹 콘텐츠 번역\n\n### 11. 업무 경험/직무 역량\n\n목적: 도구 사용 능력이 아니라 실제 업무 역할과 경험을 분리해서 확인한다.\n\n기존 항목:\n\n- 사무\n- 상담\n- 문서정리관리\n- 데이터 정리\n- 관리-조직학생\n\n보완 권장 항목:\n\n- 일정 관리\n- 고객 응대\n- 교육생 관리\n- 행정 문서 처리\n- 자료 조사\n- 보고서 작성\n- 콘텐츠 운영\n- 커뮤니티 운영\n- 프로젝트 보조\n- 품질 검수\n\n체크 기준:\n\n- 반복 행정 업무 처리\n- 상담 내용 기록/정리\n- 교육생/사용자 문의 대응\n- 문서/파일 체계 관리\n- 업무 우선순위 조정\n- 결과 보고\n- 예외 상황 대응\n\n## HTML 반영 시 추천 섹션 구성\n\n현재 `interview.html`의 한 섹션을 다음 3개 블록으로 나누는 것을 권장한다.\n\n### A. AI/디지털 도구\n\n- AI 개발/바이브코딩\n- 범용 LLM/프롬프트\n- 디자인/콘텐츠 제작\n- 영상/미디어 제작\n- 데이터/자동화\n\n### B. 업무 수행 도구\n\n- 문서 작성/지식관리\n- 협업/커뮤니케이션\n- 온라인 강의/교육 운영\n- 웹 운영/인프라\n- 번역/로컬라이제이션\n\n### C. 실무 경험/역량\n\n- 사무/행정\n- 상담/고객응대\n- 교육생/조직 관리\n- 데이터 정리\n- 문서 관리\n- 콘텐츠 운영\n\n## 체크리스트 표시 방식 제안\n\n단순 체크박스만 두면 \"써본 적 있음\"과 \"업무에 투입 가능\"이 구분되지 않는다. 가능하면 각 항목에 숙련도 표시를 추가하는 것이 좋다.\n\n권장 숙련도:\n\n- 경험: 사용해 본 적 있음\n- 가능: 기본 업무 수행 가능\n- 실무: 실제 업무 산출물 제작 가능\n- 고급: 다른 사람에게 설명/교육 가능\n\nHTML이 좁은 체크리스트 형태를 유지해야 한다면 다음처럼 섹션 제목에 목적을 넣는다.\n\n- AI 개발: Cursor, Windsurf, Claude Code, Codex CLI, Replit Agent, Bolt.new, Lovable, v0\n- AI 활용: ChatGPT, Claude, Gemini, Perplexity, NotebookLM\n- 디자인: Figma, Canva, Gamma, Midjourney, Adobe Firefly\n- 문서/협업: Notion, Google Docs, Slack, Teams, GitHub\n- 교육 운영: Zoom, Meet, Miro, Kahoot, Mentimeter, Google Classroom\n- 영상 제작: CapCut, Premiere Pro, OBS, Loom, Descript, Runway\n- 데이터/자동화: Excel, Sheets, Airtable, Zapier, Make, n8n\n- 웹 운영: WordPress, Cafe24, AWS, Vercel, Netlify, Supabase\n- 번역: Trados, memoQ, DeepL, Phrase, Lokalise\n- 실무 경험: 사무, 상담, 문서관리, 데이터정리, 교육생관리\n\n## 우선 반영 추천 항목\n\nHTML 공간이 제한되어 있다면 우선순위를 두고 넣는 것이 좋다.\n\n1. AI 개발/바이브코딩: Cursor, Windsurf, Claude Code, OpenAI Codex CLI, GitHub Copilot, Gemini CLI, Replit Agent, Bolt.new, Lovable, v0\n2. 범용 AI: ChatGPT, Claude, Gemini, Perplexity, NotebookLM\n3. 디자인/발표: Figma, Canva, Gamma, Midjourney, Adobe Firefly, PowerPoint\n4. 문서/협업: Notion, Google Docs, Slack, Teams, GitHub\n5. 교육/강의: Zoom, Google Meet, Miro, Kahoot, Mentimeter, Google Classroom\n6. 영상/녹화: CapCut, Premiere Pro, OBS, Loom, Descript\n7. 데이터/자동화: Excel, Google Sheets, Airtable, Zapier, Make, n8n\n8. 웹 운영: WordPress, Cafe24, AWS, Vercel, Netlify, Supabase\n9. 번역: Trados, memoQ, DeepL, Phrase\n10. 업무 경험: 사무, 상담, 문서관리, 데이터정리, 교육생관리\n\n## 정리\n\n핵심은 \"도구별 나열\"이 아니라 \"목적별 역량 확인\"으로 바꾸는 것이다. 특히 바이브코딩 도구는 기존의 `AI 바이브코딩` 하나로 묶기보다 `AI IDE`, `CLI 에이전트`, `앱 빌더`, `확장형 개발 도구`로 나누면 지원자의 실제 활용 범위를 더 정확하게 볼 수 있다.\n"

          "content": "# 보유 스킬 및 상세 체크리스트 분리/보완안 ver_2\n\n## 목적\n\n`interview.html`의 \"보유 스킬 및 상세 체크리스트\"는 현재 도구, 업무 경험, 교육 운영 역량, 콘텐츠 제작 역량이 한 영역에 함께 배치되어 있다. 면접이나 역량 확인 용도로 사용하려면 다음처럼 목적별로 분리하는 편이 좋다.\n\n- 지원자의 실제 업무 수행 가능성을 빠르게 확인한다.\n- AI/바이브코딩 도구처럼 최신성이 중요한 항목은 별도 그룹으로 관리한다.\n- 단순 사용 경험과 실무 산출 가능 역량을 구분한다.\n- HTML 체크리스트를 수정할 때 항목 추가/삭제가 쉽도록 카테고리 기준을 명확히 둔다.\n\n## ver_2 변경 사항\n\n- `★ 자주 사용` 표기를 추가해 변경 후 보완 및 추가항목 중 현장에서 가장 많이 쓰이는 도구를 바로 구분할 수 있게 했다.\n- 12번 항목으로 마케팅, 회계, 행정, 교육 운영, 고객 응대 등 직무별로 강조하기 좋은 역량 묶음을 추가했다.\n\n표기 기준:\n\n- `★ 자주 사용`: 일반 사무, 콘텐츠, 교육, 협업, AI 활용 현장에서 범용성이 높고 실제 사용 빈도가 높은 항목\n- 표기 없음: 특정 직무, 조직, 프로젝트 상황에 따라 유용한 보완 항목\n\n## 자주 사용하는 핵심 항목 빠른 보기\n\n- AI 개발/바이브코딩: Cursor, GitHub Copilot, Claude Code, OpenAI Codex CLI, Replit Agent, Bolt.new, Lovable, v0\n- 범용 LLM/프롬프트: ChatGPT, Claude, Gemini, Perplexity, NotebookLM\n- 디자인/발표: Figma, Canva AI, Gamma, PowerPoint, Adobe Express, Midjourney\n- 문서/지식관리: Notion, Google Docs, Microsoft Word, Notion AI, Confluence\n- 협업/커뮤니케이션: Slack, Microsoft Teams, Zoom, Google Meet, Jira, Trello, GitHub Issues\n- 교육 운영: Zoom, Google Meet, Miro, Padlet, Kahoot, Mentimeter, Google Classroom\n- 영상/미디어: CapCut, Premiere Pro, OBS, Loom, Descript, Runway\n- 데이터/자동화: Excel, Google Sheets, Airtable, Zapier, Make, Power Automate, SQL\n- 웹 운영: WordPress, Cafe24, AWS, Vercel, Netlify, GitHub Pages\n- 번역: DeepL, Papago, Google Translate, Trados, memoQ\n\n## 권장 분리 구조\n\n### 1. AI 개발/바이브코딩\n\n목적: 프롬프트만으로 프로토타입, 웹앱, 자동화 도구, 코드 수정까지 진행할 수 있는지 확인한다.\n\n기존 항목:\n\n- 피그마 AI\n- 커서\n- 와프\n- 엔티\n\n보완 권장 항목:\n\n- Cursor ★ 자주 사용\n- Windsurf ★ 자주 사용\n- GitHub Copilot ★ 자주 사용\n- Claude Code ★ 자주 사용\n- OpenAI Codex CLI ★ 자주 사용\n- Gemini CLI ★ 자주 사용\n- Cline\n- Roo Code\n- Continue\n- Aider\n- Tabnine\n- Devin\n- Replit Agent ★ 자주 사용\n- Bolt.new ★ 자주 사용\n- Lovable ★ 자주 사용\n- v0 ★ 자주 사용\n- Base44\n- Firebase Studio\n- Kiro\n- Warp AI ★ 자주 사용\n\n세부 분리안:\n\n- AI IDE/에디터: Cursor, Windsurf, GitHub Copilot, Kiro, Zed AI\n- 터미널/CLI 에이전트: Claude Code, OpenAI Codex CLI, Gemini CLI, Aider, Warp AI\n- VS Code 확장형 에이전트: Cline, Roo Code, Continue\n- 노코드/로우코드 앱 빌더: Replit Agent, Bolt.new, Lovable, v0, Base44, Firebase Studio\n- 검토/협업형 개발 도구: Devin, GitHub Copilot, Tabnine\n\n체크 기준:\n\n- 단순 코드 생성 가능\n- 기존 코드 수정 가능\n- 오류 로그 기반 디버깅 가능\n- GitHub 연동 가능\n- 배포까지 경험\n- 프롬프트로 UI/DB/API 구조 설명 가능\n- 생성 코드의 보안/품질 검토 가능\n\n### 2. 범용 LLM/프롬프트 활용\n\n목적: 업무 질문, 문서 작성, 요약, 기획, 리서치, 사고 정리에 AI를 활용할 수 있는지 확인한다.\n\n기존 항목:\n\n- 제미나이\n- GPT\n- 클로드\n\n보완 권장 항목:\n\n- ChatGPT ★ 자주 사용\n- Claude ★ 자주 사용\n- Gemini ★ 자주 사용\n- Perplexity ★ 자주 사용\n- NotebookLM ★ 자주 사용\n- Microsoft Copilot ★ 자주 사용\n- Grok\n- Poe\n- You.com\n\n체크 기준:\n\n- 역할/목표/제약조건을 포함한 프롬프트 작성\n- 긴 문서 요약 및 비교\n- 표/체크리스트/템플릿 생성\n- 근거 확인 및 출처 검토\n- 회의록/상담 기록 정리\n- 반복 업무용 프롬프트 템플릿화\n\n### 3. 디자인/프레젠테이션/시각자료 제작\n\n목적: 발표자료, 카드뉴스, 홍보물, 이미지 생성, UI 초안을 빠르게 만들 수 있는지 확인한다.\n\n기존 항목:\n\n- 감마\n- 미드저니\n- 미리 캔버스\n- Canva\n- Adobe Express\n- Prezi\n- Canva 프레젠테이션\n- PowerPoint\n- Keynote\n- 피그마 AI\n\n보완 권장 항목:\n\n- Figma ★ 자주 사용\n- FigJam ★ 자주 사용\n- Gamma ★ 자주 사용\n- Canva AI ★ 자주 사용\n- Adobe Firefly ★ 자주 사용\n- Adobe Express ★ 자주 사용\n- Midjourney ★ 자주 사용\n- DALL-E ★ 자주 사용\n- Ideogram\n- Leonardo AI\n- Krea\n- Runway ★ 자주 사용\n- Beautiful.ai\n- Pitch\n- Tome\n\n세부 분리안:\n\n- UI/협업 디자인: Figma, FigJam\n- 발표자료: Gamma, PowerPoint, Keynote, Prezi, Beautiful.ai, Pitch, Tome\n- 이미지 생성/편집: Midjourney, DALL-E, Adobe Firefly, Ideogram, Leonardo AI, Krea\n- 마케팅/콘텐츠 디자인: Canva, Canva AI, Adobe Express, 미리 캔버스\n\n체크 기준:\n\n- 브랜드 톤에 맞춘 템플릿 제작\n- 발표 흐름 구성\n- 카드뉴스/썸네일 제작\n- AI 이미지 생성 프롬프트 작성\n- 이미지 보정/배경 제거/리사이즈\n- 디자인 산출물 공유 및 피드백 반영\n\n### 4. 문서 작성/지식관리\n\n목적: 업무 문서, 보고서, 매뉴얼, 상담 기록, 자료 정리를 체계적으로 수행할 수 있는지 확인한다.\n\n기존 항목:\n\n- 글쓰기\n- 글정리\n- 맥락파악\n- 노션\n- 노트북 LM\n\n보완 권장 항목:\n\n- Notion ★ 자주 사용\n- Notion AI ★ 자주 사용\n- Google Docs ★ 자주 사용\n- Microsoft Word ★ 자주 사용\n- Microsoft Loop\n- Obsidian\n- Coda\n- Dropbox Paper\n- Confluence ★ 자주 사용\n\n체크 기준:\n\n- 회의록 작성\n- 보고서/제안서 작성\n- 산재된 자료 구조화\n- 문서 템플릿 제작\n- 지식베이스 관리\n- 문서 문서 관리\n- 콘텐츠 운영\n\n### D. 직무별 강조 역량\n\n- 마케팅/콘텐츠\n- 회계/정산\n- 사무/행정\n- 교육 운영/강의 지원\n- 고객 응대/상담\n\n## 체크리스트 표시 방식 제안\n\n단순 체크박스만 두면 \"써본 적 있음\"과 \"업무에 투입 가능\"이 구분되지 않는다. 가능하면 각 항목에 숙련도 표시를 추가하는 것이 좋다.\n\n권장 숙련도:\n\n- 경험: 사용해 본 적 있음\n- 가능: 기본 업무 수행 가능\n- 실무: 실제 업무 산출물 제작 가능\n- 고급: 다른 사람에게 설명/교육 가능\n\nHTML이 좁은 체크리스트 형태를 유지해야 한다면 다음처럼 섹션 제목에 목적을 넣는다.\n\n- AI 개발: Cursor ★, Windsurf ★, Claude Code ★, Codex CLI ★, Replit Agent ★, Bolt.new ★, Lovable ★, v0 ★\n- AI 활용: ChatGPT ★, Claude ★, Gemini ★, Perplexity ★, NotebookLM ★\n- 디자인: Figma ★, Canva ★, Gamma ★, Midjourney ★, Adobe Firefly ★\n- 문서/협업: Notion ★, Google Docs ★, Slack ★, Teams ★, GitHub ★\n- 교육 운영: Zoom ★, Meet ★, Miro ★, Kahoot ★, Mentimeter ★, Google Classroom ★\n- 영상 제작: CapCut ★, Premiere Pro ★, OBS ★, Loom ★, Descript ★, Runway ★\n- 데이터/자동화: Excel ★, Sheets ★, Airtable ★, Zapier ★, Make ★, n8n ★\n- 웹 운영: WordPress ★, Cafe24 ★, AWS ★, Vercel ★, Netlify ★, Supabase ★\n- 번역: Trados ★, memoQ ★, DeepL ★, Phrase, Lokalise\n- 실무 경험: 사무 ★, 상담 ★, 문서관리 ★, 데이터정리 ★, 교육생관리 ★\n- 직무별 강조: 마케팅/콘텐츠 ★, 회계/정산 ★, 사무/행정 ★, 교육 운영 ★, 고객 응대 ★\n\n## 우선 반영 추천 항목\n\nHTML 공간이 제한되어 있다면 우선순위를 두고 넣는 것이 좋다.\n\n1. AI 개발/바이브코딩: Cursor, Windsurf, Claude Code, OpenAI Codex CLI, GitHub Copilot, Gemini CLI, Replit Agent, Bolt.new, Lovable, v0\n2. 범용 AI: ChatGPT, Claude, Gemini, Perplexity, NotebookLM\n3. 디자인/발표: Figma, Canva, Gamma, Midjourney, Adobe Firefly, PowerPoint\n4. 문서/협업: Notion, Google Docs, Slack, Teams, GitHub\n5. 교육/강의: Zoom, Google Meet, Miro, Kahoot, Mentimeter, Google Classroom\n6. 영상/녹화: CapCut, Premiere Pro, OBS, Loom, Descript\n7. 데이터/자동화: Excel, Google Sheets, Airtable, Zapier, Make, n8n\n8. 웹 운영: WordPress, Cafe24, AWS, Vercel, Netlify, Supabase\n9. 번역: Trados, memoQ, DeepL, Phrase\n10. 업무 경험: 사무, 상담, 문서관리, 데이터정리, 교육생관리\n11. 마케팅/콘텐츠 강조: 콘텐츠 기획, 카드뉴스/썸네일, SNS 운영, 캠페인 성과 정리\n12. 회계/정산 강조: 지출 증빙, 매출/매입 자료, 세금계산서/영수증, 정산표, 월별 비용 리포트\n\n## 정리\n\n핵심은 \"도구별 나열\"이 아니라 \"목적별 역량 확인\"으로 바꾸는 것이다. 특히 바이브코딩 도구는 기존의 `AI 바이브코딩` 하나로 묶기보다 `AI I           "content": "# Windows 사용자를 위한 WSL 접속 및 Codex 실행 매뉴얼\n\n작성일: 2026-05-30\n\n이 문서는 Windows 사용자가 WSL에 접속해 OpenAI Codex CLI를 실행하는 과정을 처음부터 따라 할 수 있도록 만든 초심자용 매뉴얼입니다.\n\n## 1. 먼저 알아야 할 개념\n\n### Windows\n\n평소 사용하는 운영체제입니다. PowerShell, 명령 프롬프트, 파일 탐색기, 바탕화면 등이 Windows 환경입니다.\n\n### WSL\n\nWSL은 Windows Subsystem for Linux의 약자입니다. Windows 안에서 Ubuntu 같은 Linux 환경을 실행할 수 있게 해 줍니다.\n\nCodex CLI는 터미널에서 실행되는 개발 도구이므로, Windows 사용자는 WSL의 Ubuntu 터미널 안에서 실행하는 방식이 가장 안정적입니다.\n\n### Ubuntu\n\nWSL에서 가장 많이 사용하는 Linux 배포판입니다. 이 문서에서는 Ubuntu 기준으로 설명합니다.\n\n### 터미널\n\n명령어를 입력하는 검은색 또는 흰색 창입니다.\n\nWindows에서는 PowerShell을 사용하고, WSL에 들어간 뒤에는 Ubuntu 터미널을 사용합니다.\n\n## 2. 전체 진행 순서\n\n1. Windows에서 WSL 설치\n2. Ubuntu 계정 만들기\n3. WSL에 접속하기\n4. 기본 Linux 명령어 익히기\n5. Node.js와 npm 설치\n6. Codex CLI 설치\n7. Codex 로그인 또는 API 키 설정\n8. 작업 폴더로 이동해 Codex 실행\n\n## 3. Windows에서 WSL 설치하기\n\n### 3.1 PowerShell 관리자 권한으로 열기\n\n1. Windows 시작 버튼을 누릅니다.\n2. `PowerShell`을 검색합니다.\n3. `Windows PowerShell` 또는 `Terminal`을 마우스 오른쪽 버튼으로 클릭합니다.\n4. `관리자 권한으로 실행`을 선택합니다.\n\n관리자 권한으로 실행해야 WSL 설치 명령이 정상적으로 동작합니다.\n\n### 3.2 WSL 설치 명령 실행\n\nPowerShell에 아래 명령어를 입력합니다.\n\n```powershell\nwsl --install\n```\n\n기본적으로 Ubuntu가 함께 설치됩니다.\n\n설치가 끝나면 Windows를 다시 시작하라는 안내가 나올 수 있습니다. 안내가 나오면 컴퓨터를 재부팅합니다.\n\n### 3.3 Ubuntu만 지정해서 설치하고 싶은 경우\n\n기본 설치가 잘 안 되거나 Ubuntu를 명확히 지정하고 싶다면 아래 명령어를 사용할 수 있습니다.\n\n```powershell\nwsl --install -d Ubuntu\n```\n\n### 3.4 설치 가능한 Linux 목록 보기\n\n어떤 Linux 배포판을 설치할 수 있는지 보고 싶다면 PowerShell에서 아래 명령어를 실행합니다.\n\n```powershell\nwsl --list --online\n```\n\n짧은 명령어로는 다음도 가능합니다.\n\n```powershell\nwsl -l -o\n```\n\n## 4. Ubuntu 처음 실행하기\n\n### 4.1 Ubuntu 실행\n\nWindows 시작 메뉴에서 `Ubuntu`를 검색해 실행합니다.\n\n또는 PowerShell에서 아래 명령어를 입력해도 됩니다.\n\n```powershell\nwsl\n```\n\n특정 Ubuntu 배포판으로 접속하려면 아래처럼 입력합니다.\n\n```powershell\nwsl -d Ubuntu\n```\n\n### 4.2 사용자 이름과 비밀번호 만들기\n\nUbuntu를 처음 실행하면 Linux 사용자 이름과 비밀번호를 만들라고 나옵니다.\n\n예시:\n\n```text\nEnter new UNIX username: gildong\nNew password:\nRetype new password:\n```\n\n주의할 점:\n\n- 사용자 이름은 영어 소문자로 만드는 것이 좋습니다.\n- 비밀번호를 입력할 때 화면에 아무 글자도 표시되지 않는 것이 정상입니다.\n- 비밀번호는 Windows 로그인 비밀번호와 달라도 됩니다.\n- 이 비밀번호는 나중에 `sudo` 명령을 사용할 때 필요합니다.\n\n## 5. WSL이 잘 설치되었는지 확인하기\n\nPowerShell에서 아래 명령어를 실행합니다.\n\n```powershell\nwsl --list --verbose\n```\n\n짧게는 아래처럼 입력할 수 있습니다.\n\n```powershell\nwsl -l -v\n```\n\n예상 결과:\n\n```text\n  NAME      STATE           VERSION\n* Ubuntu    Running         2\n```\n\n`VERSION`이 `2`이면 WSL2로 실행 중입니다.\n\n## 6. WSL 접속과 종료\n\n### 6.1 WSL 접속하기\n\nPowerShell에서:\n\n```powershell\nwsl\n```\n\n또는 Windows 시작 메뉴에서 `Ubuntu` 실행.\n\n### 6.2 WSL에서 빠져나오기\n\nUbuntu 터미널에서:\n\n```bash\nexit\n```\n\n### 6.3 실행 중인 WSL 종료하기\n\nPowerShell에서:\n\n```powershell\nwsl --shutdown\n```\n\n이 명령은 실행 중인 모든 WSL 환경을 종료합니다.\n\n## 7. WSL 기본 명령어\n\n이 장은 Codex를 실행하기 전에 꼭 알아야 하는 Linux 기본 명령어입니다.\n\n### 7.1 현재 위치 확인: `pwd`\n\n현재 내가 어느 폴더에 있는지 확인합니다.\n\n```bash\npwd\n```\n\n예상 결과:\n\n```text\n/home/gildong\n```\n\n`/home/gildong`은 Windows의 사용자 폴더처럼, Ubuntu 안의 내 기본 폴더입니다.\n\n### 7.2 파일과 폴더 목록 보기: `ls`\n\n현재 폴더 안에 있는 파일과 폴더를 봅니다.\n\n```bash\nls\n```\n\n자세히 보고 싶다면:\n\n```bash\nls -la\n```\n\n`ls -la` 결과 예시:\n\n```text\ndrwxr-xr-x  3 gildong gildong 4096 May 30 10:00 .\ndrwxr-xr-x  4 root    root    4096 May 30 09:50 ..\n-rw-r--r--  1 gildong gildong  220 May 30 09:50 .bash_logout\n-rw-r--r--  1 gildong gildong 3771 May 30 09:50 .bashrc\ndrwxr-xr-x  2 gildong gildong 4096 May 30 10:00 projects\n```\n\n간단히 해석하면:\n\n- 맨 앞이 `d`이면 폴더입니다.\n- 맨 앞이 `-`이면 파일입니다.\n- `.bashrc`처럼 점으로 시작하는 파일은 숨김 파일입니다.\n- 숨김 파일까지 보려면 `ls -la`를 사용합니다.\n\n### 7.3 폴더 만들기: `mkdir`\n\n`projects`라는 폴더를 만듭니다.\n\n```bash\nmkdir projects\n```\n\n폴더가 만들어졌는지 확인합니다.\n\n```bash\nls\n```\n\n여러 단계의 폴더를 한 번에 만들고 싶다면 `-p` 옵션을 사용합니다.\n\n```bash\nmkdir -p projects/my-app\n```\n\n이 명령은 `projects` 폴더가 없으면 만들고, 그 안에 `my-app` 폴더도 만듭니다.\n\n### 7.4 경로 이동: `cd`\n\n`projects` 폴더로 이동합니다.\n\n```bash\ncd projects\n```\n\n현재 위치 확인:\n\n```bash\npwd\n```\n\n한 단계 위 폴더로 이동:\n\n```bash\ncd ..\n```\n\n홈 폴더로 이동:\n\n```bash\ncd ~\n```\n\n또는:\n\n```bash\ncd\n```\n\n### 7.5 파일 내용 보기: `cat`\n\n파일 내용을 터미널에 출력합니다.\n\n```bash\ncat README.md\n```\n\n파일이 길다면 `less`를 사용할 수 있습니다.\n\n```bash\nless README.md\n```\n\n`less`에서 빠져나오려면 `q`를 누릅니다.\n\n### 7.6 파일 또는 폴더 이름 자동 완성: Tab 키\n\n명령어를 입력하다가 `Tab` 키를 누르면 이름이 자동 완성됩니다.\n\n예를 들어 `projects` 폴더가 있을 때:\n\n```bash\ncd pro\n```\n\n여기까지 입력하고 `Tab`을 누르면:\n\n```bash\ncd projects\n```\n\n처럼 자동 완성될 수 있습니다.\n\n## 8. Windows 폴더와 WSL 폴더의 차이\n\nWSL에서는 크게 두 종류의 경로를 볼 수 있습니다.\n\n### 8.1 WSL 내부 폴더\n\n예:\n\n```text\n/home/gildong/projects\n```\n\n이 위치는 Ubuntu 내부의 Linux 파일 시스템입니다.\n\n개발 작업은 가능하면 이 위치에서 하는 것을 권장합니다. WSL 안에서 속도가 빠르고 권한 문제가 적습니다.\n\n### 8.2 Windows 폴더\n\n예:\n\n```text\n/mnt/c/Users/gildong/Desktop\n```\n\nWindows의 `C:\\Users\\gildong\\Desktop`은 WSL에서 `/mnt/c/Users/gildong/Desktop`으로 보입니다.\n\n예를 들어 Windows 바탕화면으로 이동하려면:\n\n```bash\ncd /mnt/c/Users/gildong/Desktop\n```\n\n주의할 점:\n\n- Windows 폴더(`/mnt/c/...`)에서도 작업은 가능하지만, 프로젝트가 커지면 느릴 수 있습니다.\n- Codex로 개발 작업을 할 프로젝트는 가능하면 `/home/사용자이름/projects` 아래에 두는 것이 좋습니다.\n\n## 9. Codex 작업용 폴더 만들기\n\nUbuntu 터미널에서 아래 명령어를 실행합니다.\n\n```bash\ncd ~\nmkdir -p projects\ncd projects\nmkdir my-codex-test\ncd my-codex-test\n```\n\n현재 위치 확인:\n\n```bash\npwd\n```\n\n예상 결과:\n\n```text\n/home/gildong/projects/my-codex-test\n```\n\n간단한 파일도 하나 만들어 봅니다.\n\n```bash\necho \"# My Codex Test\" > README.md\nls\ncat README.md\n```\n\n## 10. Ubuntu 패키지 업데이트\n\nCodex 설치 전에 Ubuntu의 패키지 목록을 업데이트합니다.\n\n```bash\nsudo apt update\n```\n\n설치된 패키지를 최신 상태로 올리고 싶다면:\n\n```bash\nsudo apt upgrade -y\n```\n\n`sudo`는 관리자 권한으로 실행한다는 뜻입니다. 처음 실행하면 Ubuntu 비밀번호를 물어볼 수 있습니다.\n\n## 11. Node.js와 npm 설치\n\nCodex CLI는 npm으로 설치할 수 있습니다. 먼저 Node.js와 npm이 있는지 확인합니다.\n\n```bash\nnode -v\nnpm -v\n```\n\n둘 중 하나라도 `command not found`가 나오면 설치합니다.\n\n```bash\nsudo apt install -y nodejs npm\n```\n\n설치 후 다시 확인합니다.\n\n```bash\nnode -v\nnpm -v\n```\n\n버전 번호가 나오면 설치된 것입니다.\n\n## 12. Codex CLI 설치\n\nUbuntu 터미널에서 아래 명령어를 실행합니다.\n\n```bash\nnpm install -g @openai/codex\n```\n\n설치가 끝나면 버전을 확인합니다.\n\n```bash\ncodex --version\n```\n\n버전 번호가 나오면 Codex CLI가 설치된 것입니다.\n\n업데이트가 필요할 때는 아래 명령어를 사용할 수 있습니다.\n\n```bash\ncodex --upgrade\n```\n\n또는 npm으로 최신 버전을 다시 설치할 수 있습니다.\n\n```bash\nnpm install -g @openai/codex\n```\n\n## 13. Codex 인증하기\n\nCodex CLI는 OpenAI 계정 인증 또는 API 키를 사용합니다. 사용하는 조직이나 계정 정책에 따라 인증 방식이 다를 수 있습니다.\n\n### 13.1 Codex를 실행해서 로그인하기\n\n가장 먼저 아래 명령어를 실행합니다.\n\n```bash\ncodex\n```\n\n로그인이 필요하면 터미널에 안내가 나옵니다. 화면의 안내에 따라 브라우저에서 로그인하거나 인증 코드를 입력합니다.\n\n### 13.2 API 키를 환경 변수로 설정하기\n\n조직에서 API 키 사용을 안내받은 경우 아래처럼 설정할 수 있습니다.\n\n```bash\nexport OPENAI_API_KEY=\"여기에_API_키_붙여넣기\"\n```\n\n주의:\n\n- API 키는 비밀번호처럼 다뤄야 합니다.\n- 다른 사람에게 공유하지 않습니다.\n- 화면 공유 중에는 노출하지 않습니다.\n\n매번 입력하지 않으려면 `~/.bashrc` 파일에 추가할 수 있습니다.\n\n```bash\nnano ~/.bashrc\n```\n\n파일 맨 아래에 아래 줄을 추가합니다.\n\n```bash\nexport OPENAI_API_KEY=\"여기에_API_키_붙여넣기\"\n```\n\n저장 방법:\n\n1. `Ctrl + O`를 누릅니다.\n2. `Enter`를 누릅니다.\n3. `Ctrl + X`를 눌러 나옵니다.\n\n바로 적용하려면:\n\n```bash\nsource ~/.bashrc\n```\n\n## 14. Codex 실행하기\n\nCodex는 현재 폴더를 기준으로 파일을 읽고 작업합니다. 그래서 먼저 작업할 프로젝트 폴더로 이동해야 합니다.\n\n```bash\ncd ~/projects/my-codex-test\n```\n\n현재 위치 확인:\n\n```bash\npwd\nls\n```\n\n그 다음 Codex를 실행합니다.\n\n```bash\ncodex\n```\n\nCodex가 실행되면 자연어로 요청할 수 있습니다.\n\n예시:\n\n```text\nREADME.md 파일에 이 프로젝트의 목적과 실행 방법을 초심자용으로 정리해줘.\n```\n\n또는 실행하면서 바로 요청할 수도 있습니다.\n\n```bash\ncodex \"README.md 파일을 초심자용 설명으로 개선해줘\"\n```\n\n## 15. Codex 사용 시 기본 흐름\n\n1. 프로젝트 폴더로 이동합니다.\n2. `codex`를 실행합니다.\n3. 원하는 작업을 한국어 또는 영어로 요청합니다.\n4. Codex가 제안하는 파일 변경이나 명령 실행 내용을 확인합니다.\n5. 필요한 경우 승인합니다.\n6. 작업이 끝나면 결과 파일을 확인합니다.\n\n예시:\n\n```bash\ncd ~/projects/my-codex-test\ncodex\n```\n\nCodex 안에서 요청:\n\n```text\n이 폴더의 파일 목록을 확인하고, README.md를 더 보기 좋게 정리해줘.\n```\n\n## 16. 자주 쓰는 WSL 명령어 요약\n\n| 목적 | 명령어 | 설명 |\n| --- | --- | --- |\n| 현재 위치 보기 | `pwd` | 내가 있는 폴더 경로 확인 |\n| 파일 목록 보기 | `ls` | 현재 폴더의 파일과 폴더 보기 |\n| 숨김 파일까지 보기 | `ls -la` | 자세한 목록 보기 |\n| 폴더 만들기 | `mkdir 폴더명` | 새 폴더 생성 |\n| 여러 단계 폴더 만들기 | `mkdir -p a/b/c` | 중간 폴더까지 한 번에 생성 |\n| 폴더 이동 | `cd 폴더명` | 해당 폴더로 이동 |\n| 상위 폴더 이동 | `cd ..` | 한 단계 위로 이동 |\n| 홈 폴더 이동 | `cd ~` | 내 기본 폴더로 이동 |\n| 파일 내용 보기 | `cat 파일명` | 파일 내용을 출력 |\n| 긴 파일 보기 | `less 파일명` | 긴 파일을 페이지 단위로 보기 |\n| 명령 중단 | `Ctrl + C` | 실행 중인 명령 중지 |\n| 터미널 지우기 | `clear` | 화면 정리 |\n| WSL 종료 | `exit` | Ubuntu 터미널에서 나가기 |\n\n## 17. 자주 쓰는 WSL 관리 명령어\n\n아래 명령어들은 PowerShell에서 실행합니다.\n\n| 목적 | 명령어 |\n| --- | --- |\n| WSL 실행 | `wsl` |\n| Ubuntu로 실행 | `wsl -d Ubuntu` |\n| 설치된 배포판 보기 | `wsl -l -v` |\n| 설치 가능한 배포판 보기 | `wsl -l -o` |\n| 모든 WSL 종료 | `wsl --shutdown` |\n| 기본 WSL 버전 2로 설정 | `wsl --set-default-version 2` |\n| 기본 배포판 설정 | `wsl --set-default Ubuntu` |\n\n## 18. 자주 발생하는 문제 해결\n\n### 18.1 `wsl` 명령어가 안 됩니다\n\nPowerShell을 관리자 권한으로 열고 아래 명령어를 다시 실행합니다.\n\n```powershell\nwsl --install\n```\n\n설치 후 Windows를 재부팅합니다.\n\n### 18.2 Ubuntu 비밀번호를 입력해도 화면에 표시되지 않습니다\n\n정상입니다. Linux 터미널에서는 비밀번호 입력 시 별표도 표시하지 않는 경우가 많습니다.\n\n비밀번호를 입력하고 `Enter`를 누르면 됩니다.\n\n### 18.3 `npm: command not found`가 나옵니다\n\nUbuntu에서 npm이 설치되지 않은 상태입니다.\n\n```bash\nsudo apt update\nsudo apt install -y nodejs npm\n```\n\n설치 후 확인:\n\n```bash\nnpm -v\n```\n\n### 18.4 `codex: command not found`가 나옵니다\n\nCodex CLI가 설치되지 않았거나 경로가 잡히지 않은 상태입니다.\n\n먼저 설치합니다.\n\n```bash\nnpm install -g @openai/codex\n```\n\n설치 후 새 터미널을 열고 다시 확인합니다.\n\n```bash\ncodex --version\n```\n\n### 18.5 권한 오류가 납니다\n\nnpm 전역 설치 중 권한 오류가 나면 아래처럼 `sudo`를 붙여 시도할 수 있습니다.\n\n```bash\nsudo npm install -g @openai/codex\n```\n\n단, 회사 또는 교육기관 PC에서는 관리자 권한 정책 때문에 실패할 수 있습니다. 이 경우 담당자에게 WSL 내부 npm 전역 설치 권한을 문의해야 합니다.\n\n### 18.6 Windows 폴더에서 작업했더니 느립니다\n\n`/mnt/c/...` 아래는 Windows 파일 시스템입니다. WSL에서 개발할 때 느릴 수 있습니다.\n\n가능하면 프로젝트를 아래와 같은 WSL 내부 경로에 두세요.\n\n```text\n/home/사용자이름/projects\n```\n\n예:\n\n```bash\nmkdir -p ~/projects\ncd ~/projects\n```\n\n### 18.7 Codex가 파일을 못 찾습니다\n\nCodex는 현재 폴더를 기준으로 작업합니다.\n\n먼저 현재 위치와 파일 목록을 확인하세요.\n\n```bash\npwd\nls -la\n```\n\n원하는 프로젝트 폴더가 아니라면 `cd`로 이동한 뒤 Codex를 다시 실행합니다.\n\n```bash\ncd ~/projects/my-codex-test\ncodex\n```\n\n## 19. 초심자용 실습 예제\n\n아래 명령어를 순서대로 실행하면 Codex 테스트용 폴더를 만들고 실행할 수 있습니다.\n\n```bash\ncd ~\nmkdir -p projects/codex-practice\ncd projects/codex-practice\necho \"# Codex Practice\" > README.md\nls -la\ncat README.md\ncodex\n```\n\nCodex가 열리면 아래처럼 요청합니다.\n\n```text\nREADME.md 파일을 초심자가 이해하기 쉽게 한국어로 작성해줘. 프로젝트 소개, 사용 방법, 폴더 구조 섹션을 넣어줘.\n```\n\n작업 후 확인:\n\n```bash\ncat README.md\n```\n\n## 20. 권장 작업 습관\n\n- Codex 실행 전에는 항상 `pwd`로 현재 위치를 확인합니다.\n- `ls -la`로 작업할 파일이 있는지 확인합니다.\n- 프로젝트는 가능하면 `~/projects` 아래에 만듭니다.\n- API 키는 절대 다른 사람에게 공유하지 않습니다.\n- Codex가 파일을 수정한다고 할 때는 어떤 파일을 바꾸는지 확인합니다.\n- 중요한 프로젝트는 Git으로 관리하는 것이 좋습니다.\n\n## 21. 참고 자료\n\n- Microsoft Learn: WSL 설치 문서  \n  https://learn.microsoft.com/en-us/windows/wsl/install\n\n- Microsoft Learn: WSL 기본 명령어  \n  https://learn.microsoft.com/en-us/windows/wsl/basic-commands\n\n- OpenAI Help Center: OpenAI Codex CLI Getting Started  \n  https://help.openai.com/en/articles/11096431\n\n- OpenAI Help Center: Codex CLI and Sign in with ChatGPT  \n  https://help.openai.com/en/articles/11381614-api-codex-cli-and-sign-in-with-chatgpt\n"

          "content": "# Codex 자동 승인 모드를 현재 폴더로 제한해서 사용하는 방법\n\n이 문서는 Codex를 사용할 때 매번 승인하지 않고도 자주 쓰는 명령을 자동 승인하되, 파일 쓰기 권한은 현재 프로젝트 폴더 안으로 제한하는 방법을 정리한 것입니다.\n\n핵심은 두 가지입니다.\n\n1. 파일 시스템 권한은 `workspace-write`로 둔다.\n2. 자동 승인은 필요한 명령 prefix만 좁게 허용한다.\n\n## 바로 실행하는 방법\n\n현재 폴더를 작업 루트로 두고, 현재 폴더 안에서만 쓰기 가능한 상태로 Codex를 실행하려면 프로젝트 폴더에서 아래처럼 실행합니다.\n\n```bash\ncd /path/to/my-project\ncodex --sandbox workspace-write\n```\n\n짧은 옵션으로는 이렇게 쓸 수 있습니다.\n\n```bash\ncd /path/to/my-project\ncodex -s workspace-write\n```\n\n특정 폴더를 작업 루트로 지정해서 실행하려면 `--cd`를 같이 사용합니다.\n\n```bash\ncodex --cd /path/to/my-project --sandbox workspace-write\n```\n\n짧은 옵션으로는 다음과 같습니다.\n\n```bash\ncodex -C /path/to/my-project -s workspace-write\n```\n\n## 현재 폴더 제한 + 승인 질문 최소화\n\n승인 질문 없이 진행하게 하려면 `--ask-for-approval never`를 붙입니다.\n\n```bash\ncd /path/to/my-project\ncodex --sandbox workspace-write --ask-for-approval never\n```\n\n짧은 옵션으로는 이렇게 쓸 수 있습니다.\n\n```bash\ncd /path/to/my-project\ncodex -s workspace-write -a never\n```\n\n이 조합의 의미는 다음과 같습니다.\n\n- `-s workspace-write`: 현재 작업 폴더 안에서는 쓰기를 허용한다.\n- `-a never`: 명령 실행 전에 승인 질문을 하지 않는다.\n- 현재 폴더 밖에 쓰는 명령은 샌드박스 때문에 실패한다.\n\n즉, 자동 승인처럼 동작하게 만들고 싶다면 아래 명령이 기본 추천값입니다.\n\n```bash\ncodex -s workspace-write -a never\n```\n\n단, 이 설정은 승인 질문을 줄이는 설정이지 모든 위험을 없애는 설정은 아닙니다. 현재 폴더 안의 파일 삭제나 변경은 가능하므로 Git 저장소라면 먼저 커밋하거나 백업해 두는 것이 좋습니다.\n\n## 권장 설정\n\n현재 폴더에서만 파일을 만들거나 수정하게 하려면 Codex 세션의 권한 모델을 다음처럼 유지합니다.\n\n```text\nsandbox_mode = workspace-write\n```\n\n`workspace-write`는 기본적으로 현재 작업 폴더와 명시적으로 허용된 writable root 안에서만 쓰기를 허용합니다. 다른 폴더를 수정해야 하는 명령은 별도 승인이 필요합니다.\n\n자동 승인은 파일 시스템 전체 권한을 푸는 방식이 아니라, 반복적으로 쓰는 안전한 명령 prefix만 허용하는 방식으로 설정하는 것이 좋습니다.\n\n예를 들어 프로젝트 안에서 테스트만 자동 승인하려면 다음과 같은 prefix를 허용합니다.\n\n```text\nnpm test\nnpm run test\npnpm test\nyarn test\ncargo test\npytest\n```\n\n개발 서버 실행만 자동 승인하려면 다음처럼 좁게 둡니다.\n\n```text\nnpm run dev\npnpm dev\nyarn dev\n```\n\n## 피해야 할 설정\n\n다음처럼 너무 넓은 자동 승인은 피해야 합니다.\n\n```text\npython\nnode\nbash\nsh\nzsh\nrm\ngit\n```\n\n이런 prefix는 사실상 임의 명령 실행에 가깝거나, 삭제 및 외부 변경을 너무 쉽게 허용할 수 있습니다.\n\n특히 아래 명령은 자동 승인 대상으로 두지 않는 것이 안전합니다.\n\n```text\nrm\nrm -rf\ngit reset\ngit checkout\ngit clean\nsudo\nchmod\nchown\nmv\n```\n\n삭제, 권한 변경, Git 되돌리기, 시스템 권한 상승은 항상 수동 승인으로 남겨두는 편이 안전합니다.\n\n## 현재 폴더만 허용하는 실전 운영 방식\n\n1. Codex를 프로젝트 루트 폴더에서 실행합니다.\n\n   ```bash\n   cd /path/to/my-project\n   codex -s workspace-write -a never\n   ```\n\n2. 세션 권한은 `workspace-write`를 사용합니다.\n\n   이 상태에서는 현재 프로젝트 폴더 밖에 쓰는 작업이 제한됩니다.\n\n3. 자동 승인은 필요한 명령 단위로만 추가합니다.\n\n   예를 들어 `npm run test`를 자주 실행한다면, 자동 승인 rule은 `npm` 전체가 아니라 다음처럼 둡니다.\n\n   ```text\n   [\"npm\", \"run\", \"test\"]\n   ```\n\n4. 네트워크가 필요한 설치 명령은 자동 승인하지 않습니다.\n\n   예를 들어 아래 명령은 매번 확인하는 편이 안전합니다.\n\n   ```bash\n   npm install\n   pnpm install\n   pip install\n   cargo install\n   brew install\n   ```\n\n5. 삭제 명령은 자동 승인하지 않습니다.\n\n   현재 폴더 안이라고 해도 실수로 중요한 파일을 지울 수 있으므로 `rm`, `git clean`, `git reset --hard`는 직접 확인 후 승인합니다.\n\n## 추천 자동 승인 예시\n\n프론트엔드 프로젝트라면 보통 아래 정도가 적당합니다.\n\n```text\n[\"npm\", \"run\", \"dev\"]\n[\"npm\", \"run\", \"test\"]\n[\"npm\", \"run\", \"lint\"]\n[\"npm\", \"run\", \"build\"]\n```\n\nPython 프로젝트라면 아래처럼 좁게 둡니다.\n\n```text\n[\"pytest\"]\n[\"ruff\", \"check\"]\n[\"ruff\", \"format\"]\n```\n\nRust 프로젝트라면 아래 정도가 적당합니다.\n\n```text\n[\"cargo\", \"test\"]\n[\"cargo\", \"check\"]\n[\"cargo\", \"fmt\"]\n[\"cargo\", \"clippy\"]\n```\n\n## 안전 체크리스트\n\n자동 승인 설정 전에 아래를 확인합니다.\n\n- Codex를 프로젝트 루트에서 실행했는가?\n- `sandbox_mode`가 `workspace-write`인가?\n- writable root가 현재 프로젝트 폴더로 제한되어 있는가?\n- 자동 승인 prefix가 너무 넓지 않은가?\n- 삭제, 되돌리기, 권한 변경 명령은 자동 승인에서 제외했는가?\n- 설치, 배포, 네트워크 작업은 수동 승인으로 남겨두었는가?\n\n## 결론\n\n가장 안전한 방식은 `workspace-write`로 현재 폴더 안의 쓰기만 허용하고, 자동 승인은 `npm run test`처럼 구체적인 명령 prefix만 등록하는 것입니다.\n\n자동 승인 편의성을 높이고 싶더라도 `python`, `bash`, `git`, `rm`처럼 넓거나 위험한 prefix는 허용하지 않는 것이 좋습니다.\n"

          "date": "2026-06-04",
          "content": "# UI 구성 조립 프롬프트\n\n## 역할\n\n당신은 `design_system_major`를 참고해 빽빽하고 정보 밀도가 높은 UI 구성을 설계하는 조립 도우미입니다.\n새로운 디자인을 창작하기보다, 이미 존재하는 UI 유형과 모듈을 참고해 화면의 구성 순서, 배치 위치, 중첩 구조를 명확하게 정리합니다.\n\n## 목적\n\n이 프롬프트의 목적은 UI를 만들기 전에 화면이 어떤 구조로 조립되어야 하는지 보여주는 것입니다.\n\n대표님께서 선호하는 빽빽한 UI 스타일을 기준으로, 다음과 같은 내용을 명확히 표현합니다.\n\n- 헤더 안에서 로고, 메뉴, 버튼, 상태 정보가 어디에 들어가는지\n- 네비게이션이 몇 단 구조로 구성되는지\n- 콘텐츠 영역 안에 몇 개의 row가 들어가는지\n- 각 row 안에 몇 단 구조가 들어가는지\n- 특정 단 안에 다시 몇 단이 중첩되는지\n- 화면 전체가 어떤 순서로 조립되는지\n\n## 기준 자료\n\n- UI 유형과 모듈 구성은 `design_system_major`를 기준으로 한다.\n- `design_system_major`에 있는 UI 유형을 우선 참고하거나 복사한다.\n- 없는 구조를 억지로 새로 만들기보다, 기존 모듈을 조합해 유사한 구조를 만든다.\n- 결과물은 실제 UI 구현자가 화면 구조를 바로 이해할 수 있어야 한다.\n\n## 핵심 원칙\n\n- 목적은 업무 템플릿 작성이 아니라 UI 구성 조립이다.\n- 문구보다 구조가 중요하다.\n- 예쁜 설명보다 배치와 중첩 관계가 중요하다.\n- 넓고 여유 있는 UI보다 정보가 밀도 있게 들어간 UI를 우선한다.\n- 각 영역이 몇 단으로 나뉘는지 명확히 표시한다.\n- 단 안에 단이 들어가는 중첩 구조를 적극적으로 표현한다.\n- 같은 화면 안에서 헤더, 네비게이션, 콘텐츠, 사이드 영역, 하단 영역을 분리해 설명한다.\n\n## 단의 의미\n\n여기서 1단, 2단, 3단, 4단은 업무 중요도가 아니라 UI 안에서의 배치 단위를 의미한다.\n\n### 1단\n\n가장 큰 단위의 화면 블록입니다.\n\n예시:\n\n- 전체 페이지\n- 헤더\n- 네비게이션\n- 메인 콘텐츠\n- 콘텐츠 row\n- 사이드 패널\n- 푸터\n\n### 2단\n\n1단 안에 들어가는 주요 하위 구역입니다.\n\n예시:\n\n- 헤더 안의 로고 영역과 메뉴 영역\n- 콘텐츠 row 안의 좌측 영역과 우측 영역\n- 카드 안의 제목 영역과 본문 영역\n- 네비게이션 안의 상위 메뉴 그룹\n\n### 3단\n\n2단 안에 들어가는 더 작은 구성 요소입니다.\n\n예시:\n\n- 메뉴 그룹 안의 메뉴 아이템\n- 본문 영역 안의 정보 카드\n- 우측 영역 안의 필터, 상태값, 버튼 묶음\n- 리스트 안의 항목 그룹\n\n### 4단\n\n가장 작은 조립 단위입니다.\n\n예시:\n\n- 아이콘\n- 라벨\n- 숫자값\n- 버튼\n- 배지\n- 입력 필드\n- 체크박스\n- 상태 표시\n\n## 조립 방식\n\n화면을 만들 때 다음 순서로 구성합니다.\n\n1. 전체 화면을 큰 1단 영역으로 나눈다.\n2. 각 1단 영역 안에 필요한 2단 구조를 배치한다.\n3. 각 2단 안에 3단 구성 요소를 넣는다.\n4. 각 3단 안에 4단 요소를 촘촘히 배치한다.\n5. 필요한 경우 4단 안에도 다시 4단 요소를 중첩해 밀도 있는 UI를 만든다.\n6. 각 단의 방향을 표시한다.\n   - 가로 배치\n   - 세로 배치\n   - grid 배치\n   - 고정 영역\n   - 스크롤 영역\n7. 각 영역의 역할과 포함 요소를 짧게 설명한다.\n\n## 출력해야 하는 내용\n\n사용자가 만들고 싶은 화면이나 기능을 말하면 다음 내용을 출력합니다.\n\n```markdown\n# [UI 구성 이름]\n\n## 1. 참고할 design_system_major 유형\n\n- 참고 UI 유형:\n- 참고 모듈:\n- 참고 이유:\n\n## 2. 전체 화면 구성\n\n| 순서 | 1단 영역 | 배치 방식 | 포함 내용 |\n| --- | --- | --- | --- |\n| 1 | 헤더 | 가로 고정 | 로고, 네비게이션, 액션 버튼 |\n| 2 | 메인 콘텐츠 | 세로 스크롤 | row 그룹, 카드, 리스트 |\n| 3 | 하단 영역 | 가로 고정 | 상태 정보, 보조 버튼 |\n\n## 3. 영역별 조립 구조\n\n### 1단: 헤더\n\n- 배치: 가로 고정\n- 밀도: 높음\n- 구성:\n  - 2단: 로고 영역\n    - 4단: 로고 이미지\n    - 4단: 서비스명\n  - 2단: 네비게이션 영역\n    - 3단: 1차 메뉴 그룹\n      - 4단: 메뉴명\n      - 4단: 활성 상태\n    - 3단: 2차 메뉴 그룹\n      - 4단: 메뉴명\n      - 4단: 카운트 배지\n  - 2단: 우측 액션 영역\n    - 4단: 검색 버튼\n    - 4단: 알림 버튼\n    - 4단: 사용자 상태\n\n### 1단: 메인 콘텐츠\n\n- 배치: 세로 스크롤\n- 밀도: 높음\n- 구성:\n  - 2단: 콘텐츠 row 1\n    - 3단: 좌측 카드 그룹\n      - 4단: 제목\n      - 4단: 핵심 수치\n      - 4단: 상태 배지\n    - 3단: 우측 카드 그룹\n      - 4단: 필터\n      - 4단: 테이블\n      - 4단: 페이지네이션\n  - 2단: 콘텐츠 row 2\n    - 3단: 리스트 영역\n      - 4단: 리스트 아이템\n        - 4단: 아이콘\n        - 4단: 라벨\n        - 4단: 값\n        - 4단: 액션 버튼\n\n## 4. 중첩 구조 요약\n\n| 위치 | 중첩 구조 |\n| --- | --- |\n| 헤더 > 네비게이션 | 1단 > 2단 > 3단 > 4단 |\n| 메인 콘텐츠 > row 1 > 카드 | 1단 > 2단 > 3단 > 4단 |\n| 리스트 아이템 내부 | 1단 > 2단 > 3단 > 4단 > 4단 |\n\n## 5. 구현 메모\n\n- 여백은 작게 유지한다.\n- 정보는 한 화면에 많이 보이게 구성한다.\n- 반복되는 요소는 같은 폭과 높이를 유지한다.\n- 중요한 상태값은 배지, 색상, 숫자로 빠르게 식별되게 한다.\n- 버튼과 필터는 관련 데이터 가까이에 배치한다.\n```\n\n## 작성 규칙\n\n- 결과는 반드시 UI 구조 중심으로 작성한다.\n- 업무 목적, 직원 행동, 의사소통 요약 같은 내용은 넣지 않는다.\n- 각 영역의 위치와 중첩 관계를 명확히 쓴다.\n- `1단 > 2단 > 3단 > 4단`처럼 계층을 눈으로 따라갈 수 있게 쓴다.\n- 헤더, 네비게이션, 콘텐츠, row, 카드, 리스트, 버튼, 배지, 필터 같은 UI 단어를 적극적으로 사용한다.\n- 화면이 빽빽하게 느껴지도록 작은 단위 요소를 충분히 배치한다.\n- 단순한 설명보다 실제 조립 구조를 우선한다.\n\n## 품질 점검\n\n출력 전에 다음을 확인한다.\n\n- UI 구성 조립 프롬프트로 읽히는가?\n- `design_system_major`를 참고한다는 기준이 드러나는가?\n- 헤더, 네비게이션, 콘텐츠 영역의 위치가 명확한가?\n- 1단부터 4단까지의 중첩 구조가 보이는가?\n- 4단 안에 4단이 다시 들어가는 밀도 높은 구조도 표현되어 있는가?\n- 실제 구현자가 화면 구조를 보고 바로 만들 수 있는가?\n- 업무 지시서처럼 보이는 문장이 제거되어 있는가?\n\n"

          "date": "2026-06-02",
          "content": "# 휴텍씨 디자인 시스템\n\n기준 파일: `index.html`, `layout.css`, `common.js`\n\n이 문서는 현재 `index.html`에 구현된 디자인 시스템 화면을 기준으로, 이후 시험/번역/서비스 홈페이지를 만들 때 반복 적용할 공통 규칙을 정리한 문서입니다.\n\n## 1. 시스템 원칙\n\n### 1.1 공통 틀 우선\n\n홈페이지와 업무 화면은 개별 페이지를 바로 만들기보다 다음 공통 틀을 먼저 고정합니다.\n\n- Header: 로고, 주요 메뉴, 사용자/알림 영역\n- Sidebar 또는 Rail: 업무별 보조 탐색\n- Content: 검색, 필터, 목록, 상세, 작성 영역\n- Footer: 약관, 개인정보, SNS, 저작권\n\n개별 홈페이지는 이 틀 위에 서비스 소개, 기능, 실적, 전문가 신청, 견적 의뢰, FAQ, 회사 소개를 조합합니다.\n\n### 1.2 공통과 개별 분리\n\n공통 UI와 업무 콘텐츠를 분리합니다.\n\n- 공통 UI: 버튼, 입력, 탭, 칩, 상태 pill, 테이블, 토스트, 모달, 페이지네이션\n- 개별 콘텐츠: 시험 종목, 번역 분야, 고전 번역 설명, 마케팅 문구, 신청서 항목\n\n개별 홈페이지를 만들 때는 색상/문구/이미지/섹션 순서를 바꾸더라도 공통 UI class와 토큰은 유지합니다.\n\n### 1.3 홈페이지 목차 원칙\n\n첫 화면은 회사 소개보다 서비스 소개를 먼저 보여줍니다.\n\n권장 순서:\n\n1. 서비스 소개 / Hero\n2. 기능, 분야, 현황, 기술 설명\n3. 실적\n4. 전문가 신청\n5. 견적 의뢰\n6. FAQ, 상담, 신청 흐름\n7. 회사 소개\n\n고전 번역처럼 독립 브랜드 성격이 강한 홈페이지는 기존 번역 사이트 틀을 재사용하되, 별도 색상 구조와 현황/기술 설명을 강화합니다.\n\n## 2. 디자인 토큰\n\n### 2.1 색상\n\n| 역할 | 토큰 | 값 | 사용처 |\n|---|---|---:|---|\n| 기본 텍스트 | `--ds-color-text-primary` | `#222222` | 제목, 본문 핵심 텍스트 |\n| 보조 텍스트 | `--ds-color-text-secondary` | `#666666` | 설명, 보조 정보 |\n| 약한 텍스트 | `--ds-color-text-muted` | `#808080` | caption, placeholder 보조 |\n| 비활성 텍스트 | `--ds-color-text-disabled` | `#999999` | disabled 상태 |\n| 반전 텍스트 | `--ds-color-text-inverse` | `#ffffff` | 컬러 배경 위 텍스트 |\n| 브랜드 | `--ds-color-brand-primary` | `#0088ff` | 주요 버튼, 선택 상태 배경 |\n| 브랜드 강조 | `--ds-color-brand-primary-strong` | `#006dcc` | 연한 배경 위 텍스트, 링크, 칩 라벨 |\n| 보조 브랜드 | `--ds-color-brand-secondary` | `#822afd` | 전문가 신청 CTA |\n| 성공 | `--ds-color-accent-success` | `#51b117` | 성공 상태 면/아이콘 |\n| 성공 강조 | `--ds-color-accent-success-strong` | `#2f7d0c` | 성공 텍스트 |\n| 경고 | `--ds-color-accent-warning` | `#f7b22c` | 경고 상태 면/아이콘 |\n| 경고 강조 | `--ds-color-accent-warning-strong` | `#8a5a00` | 경고 텍스트 |\n| 오류 | `--ds-color-accent-danger` | `#dc3d3d` | 삭제, 오류 버튼 |\n| 오류 강조 | `--ds-color-accent-danger-strong` | `#b42323` | 오류 텍스트 |\n| 페이지 배경 | `--ds-color-bg-page` | `#f8f9fc` | 본문 배경 |\n| 기본 배경 | `--ds-color-bg-base` | `#ffffff` | 카드, 입력, 패널 |\n| 선택 배경 | `--ds-color-bg-selected` | `#d7e7fc` | 선택 영역 배경 |\n| 정보 연한 배경 | `--ds-color-bg-info-soft` | `#e7f2ff` | 상태 pill, filter tag |\n| 기본 선 | `--ds-color-border-default` | `#e3e5ed` | 카드/입력/테이블 경계 |\n\n### 2.2 간격, 곡률, 높이\n\n| 분류 | 값 | 사용처 |\n|---|---|---|\n| Spacing | `2, 4, 6, 8, 10, 12, 16, 20, 24, 30px` | 내부 여백, gap |\n| Radius | `2, 4, 6, 8, 12, 20px` | 입력, 버튼, 카드, 프로필, pill |\n| Height | `24, 32, 40, 60px` | 소형 버튼, 기본 입력/버튼, 사이드 메뉴, GNB/Footer |\n\n## 3. 접근성 기준\n\n### 3.1 명도 대비\n\n버튼, 칩, 상태 pill, badge, tag를 만들 때는 텍스트와 배경 또는 주요 경계의 명도 대비를 최소 `3:1` 이상으로 유지합니다.\n\n현재 시스템에서 지켜야 할 조합:\n\n- 연한 파란 배경 위 텍스트: `--ds-color-brand-primary-strong` 사용\n- 컬러 버튼 위 텍스트: `--ds-color-text-inverse` 사용\n- 비활성 pill: `#f2f2f2` 배경 위 `#555555` 사용\n- 성공/경고/오류 텍스트: 일반 accent 색을 그대로 쓰지 말고 `*-strong` 토큰 사용\n\n주의:\n\n- `#0088ff` 텍스트를 `#d7e7fc` 위에 올리는 조합은 약하므로 피합니다.\n- `#51b117`, `#f7b22c`를 흰 배경 위 작은 텍스트로 쓰지 않습니다. 아이콘/면 색상으로 쓰거나 strong 토큰을 함께 씁니다.\n- 색상만으로 상태를 전달하지 말고 텍스트, 아이콘, `aria-pressed`, `aria-selected`, `role=\"switch\"` 같은 상태 정보도 함께 제공합니다.\n\n### 3.2 키보드와 포커스\n\n- 버튼, 링크, 입력, 탭은 `:focus-visible` 스타일을 유지합니다.\n- 탭은 `role=\"tablist\"`, `role=\"tab\"`, `aria-selected`를 사용합니다.\n- 토글은 `role=\"switch\"` 또는 `aria-pressed`를 사용합니다.\n- 토스트 영역은 `aria-live=\"polite\"`와 `aria-atomic=\"true\"`를 사용합니다.\n- 모달은 `role=\"dialog\"`, `aria-modal=\"true\"`, 제목 연결 `aria-labelledby`를 사용합니다.\n\n## 4. 컴포넌트 규칙\n\n### 4.1 Button\n\n기본 class는 `btn`입니다. 변형은 `btn--primary`, `btn--outline`, `btn--neutral`, `btn--secondary`, `btn--danger`를 사용합니다.\n\n크기:\n\n- `btn--sm`: 24px\n- `btn--md`: 32px\n- `btn--lg`: 40px\n\n기존 호환을 위해 `small`, `large`, `outline`, `neutral`, `secondary`, `danger` 별칭도 유지하지만 새 페이지에서는 `btn--*` 형식을 우선 사용합니다.\n\n### 4.2 Link\n\n본문 이동이나 테이블 내 강조 값은 버튼 대신 `text-link`를 사용합니다.\n\n- 기본 링크: `text-link`\n- 보조 링크: `text-link muted-link`\n- 위험 링크: `text-link danger-link`\n\n### 4.3 Tab\n\n탭은 역할에 따라 class를 선택합니다.\n\n- `tabs--underline`: 페이지 상단 주요 구분\n- `tabs--box`: 상세 정보 패널\n- `tabs--pill`: 상태/카테고리 필터\n- `tabs--segmented`: 목록/캘린더/요약 같은 보기 전환\n\n선택 상태는 `.active`와 `aria-selected=\"true\"`를 함께 맞춥니다.\n\n### 4.4 Chip, Tag, Status Pill\n\n필터와 상태 표시는 다음 class를 사용합니다.\n\n- 필터 칩: `filter-chip`\n- 활성 필터 태그: `filter-tag`\n- 규칙 필터 칩: `chip-button`\n- 상태 표시: `state-pill`\n- 비활성/검토중 상태: `state-pill off`\n- 규칙 라벨: `rule-tag`\n\n접근성 규칙:\n\n- 활성 칩은 `aria-pressed=\"true\"`를 사용합니다.\n- 연한 배경 위 텍스트는 strong 토큰을 사용합니다.\n- 상태는 색상만으로 구분하지 않고 \"완료\", \"검토중\", \"고정\", \"준고정\"처럼 텍스트를 같이 표시합니다.\n\n### 4.5 Form\n\n입력 기본 class는 `field`입니다.\n\n- 기본 높이: 32px\n- 라벨: `label`\n- 상세 입력: `textarea.field`\n- 도움말/오류 문구가 필요한 경우 `field-help`, `field-error` 패턴을 사용합니다.\n\n### 4.6 Table\n\n시험 목록은 `exam-table`을 사용합니다.\n\n- 테이블은 `table-scroll` 안에 넣어 가로 스크롤을 허용합니다.\n- 헤더는 12px 보조 텍스트, 본문은 14px 기준입니다.\n- 목록 폭이 넓으면 모바일에서 억지로 줄이지 않고 가로 스크롤을 허용합니다.\n\n### 4.7 Feedback\n\n토스트:\n\n- 기본 class: `toast`\n- 상태 class: `success`, `warning`, `danger`, `info`\n- 고정 viewport: `toast-viewport`\n\n모달:\n\n- 배경: `modal-backdrop`\n- fixed 모달: `modal-backdrop is-fixed`\n- 본문: `modal`\n- 액션: `modal-actions`\n\n## 5. 레이아웃 패턴\n\n### 5.1 기본 페이지\n\n- `shell`: 전체 문서 구조\n- `nav`: 디자인 시스템 문서 목차\n- `main`: 본문\n- `section`: 문서 또는 화면 단위\n- `panel`: 경계가 있는 기본 패널\n- `grid two`, `grid three`, `grid four`: 반응형 그리드\n\n### 5.2 서비스 홈페이지\n\n홈페이지는 과한 장식보다 실제 사용자가 바로 이해할 수 있는 정보 구조를 우선합니다.\n\n권장:\n\n- Hero는 서비스명/서비스 소개를 첫 신호로 보여줍니다.\n- CTA는 \"전문가 신청\", \"견적 의뢰\", \"상담하기\"처럼 실제 행동 문구로 씁니다.\n- 카드가 필요한 경우 반복 항목에만 사용합니다.\n- 검색/필터가 있는 화면은 인라인 칩과 활성 태그를 함께 제공합니다.\n\n지양:\n\n- 회사 소개를 첫 화면의 핵심으로 두는 구성\n- 상태가 색상만으로 구분되는 칩/배지\n- 좁은 입력칸과 한 화면 과밀 배치\n- 동일 역할의 버튼 class를 페이지마다 새로 만드는 방식\n\n## 6. 새 홈페이지 제작 체크리스트\n\n- 공통 `layout.css` 토큰을 먼저 연결했는가?\n- Header, Content, Footer 구조가 유지되는가?\n- 서비스 소개가 회사 소개보다 먼저 나오는가?\n- 실적, 전문가 신청, 견적 의뢰가 빠지지 않았는가?\n- 버튼은 `btn btn--variant btn--size` 조합을 쓰는가?\n- 칩/상태/badge/tag의 대비가 최소 `3:1` 이상인가?\n- 선택 상태에 `aria-pressed` 또는 `aria-selected`가 있는가?\n- 키보드 포커스가 보이는가?\n- 모바일에서 테이블/필터/헤더가 깨지지 않는가?\n- 색상 직접 입력보다 토큰 사용을 우선했는가?\n"

          "content": "# 2024 Figma PDF 기준 사이트맵 및 기능 정의\n\n작성일: 2026-05-21  \n분석 대상: `figma_pdf/2024`  \n분석 기준: PDF/이미지 파일명, `메뉴 구조.png`, `관리자 홈.png`, 기존 비교 문서의 2024 범위\n\n## 1. 전체 서비스 개요\n\n2024 Figma 자료는 AITP 시험 플랫폼의 전체 업무 흐름을 담고 있다. 단순한 시험 접수 사이트가 아니라, 수험생이 시험을 신청하고 응시한 뒤 결과와 자격증을 받는 흐름, 출제자가 문제를 만들고 제출하는 흐름, 채점자가 답안을 평가하는 흐름, 관리자가 회원·시험·문제·결제·운영을 통제하는 흐름이 함께 설계되어 있다.\n\n일반 사용자가 이해하기 쉽게 말하면, 이 서비스는 다음 네 종류의 사용자를 위한 통합 시험 운영 시스템이다.\n\n| 사용자 | 하는 일 | 대표 화면 |\n|---|---|---|\n| 수험생 | 시험 접수, 결제, 시험 응시, 결과 확인, 자격증 신청, 문의 | `목록_시험접수.pdf`, `목록_시험응시.pdf`, `목록_시험결과.pdf`, `수험생_자격증 신청하기.png` |\n| 출제자 | 시험 문제 작성, 임시저장, 출제내역 확인, 반려 문항 수정 | `출제관리.pdf`, `출제관리_번역상세.pdf`, `출제관리_프롬프트상세.pdf`, `출제관리_단답형상세.pdf` |\n| 채점자 | 배정된 답안 채점, 채점내역 확인, 피드백 작성 | `채점관리.pdf`, `채점관리_번역상세.pdf`, `채점관리_프롬프트상세.pdf`, `채점자 홈_시험 채점하기.png` |\n| 관리자 | 회원, 시험 일정, 문제, 채점, 결제, 정산, 게시판, 문의, 통계, 코드 관리 | `관리자 홈.png`, `회원관리.pdf`, `시험관리.pdf`, `결제관리.pdf`, `1_1 문의관리.pdf` |\n\n## 2. 상위 사이트맵\n\n`메뉴 구조.png` 기준으로 상단 메뉴는 다음과 같이 구성된다.\n\n| 상단 메뉴 | 주요 사용자 | 설명 |\n|---|---|---|\n| 관리자 홈 | 관리자 | 전체 운영 현황과 주요 관리 기능 진입점 |\n| 회원관리 | 관리자 | 수험생, 출제자, 채점자, 관리자 계정 관리 |\n| 시험관리 | 관리자, 수험생 | 시험 일정, 시험 응시, 시험 결과, 자격증 관리 |\n| 문제관리 | 관리자, 출제자 | 출제, 출제내역, 문제 검수, 시험 결과 연계 |\n| 채점관리 | 관리자, 채점자 | 채점 배정, 채점 진행, 채점 결과 확인 |\n| 결제관리 | 관리자, 수험생 | 결제정보, 카드정보, 정산정보, 자격증 정산 |\n| 코드추가 | 관리자 | 시험 분류, 언어, 등급, 대/중/소분류 코드 관리 |\n| 1:1 문의 관리 | 관리자, 전체 사용자 | 문의 접수, 답변, 문의 상세 확인 |\n| 내 정보 | 전체 사용자 | 계정 정보, 비밀번호, 프로필, 로그아웃 |\n\n역할별 홈 메뉴는 다음과 같다.\n\n| 역할 | 홈에서 바로 접근하는 기능 |\n|---|---|\n| 수험생 홈 | 시험응시, 시험결과, 자격증신청, 1:1문의, 내 정보 |\n| 출제자 홈 | 시험 출제하기, 출제 내역, 1:1문의, 내 정보 |\n| 채점자 홈 | 시험 채점하기, 채점내역, 1:1문의, 내 정보 |\n| 관리자 홈 | 회원관리, 시험관리, 문제관리, 채점관리, 결제관리, 운영관리, 통계관리, 문의관리 |\n\n## 3. 인증 및 계정 기능\n\n사용자가 서비스를 이용하기 전 또는 계정 정보를 관리할 때 필요한 기능이다.\n\n| 기능 | 화면 파일 | 기능 설명 |\n|---|---|---|\n| 로그인 | `로그인.pdf` | 아이디/비밀번호로 로그인하고 권한에 맞는 홈으로 이동 |\n| 로그아웃 | `로그아웃.pdf`, `로그아웃-1.pdf` | 현재 세션 종료 |\n| 회원가입 | `회원가입.pdf`, `회원가입_간편가입.pdf` | 일반 가입 또는 간편 가입 |\n| 본인/휴대폰 인증 | `본인인증 2.pdf`, `휴대폰 인증.pdf` | 가입, 아이디 찾기, 비밀번호 재설정 전 본인 확인 |\n| 아이디 찾기 | `아이디찾기.pdf`, `아이디확인.pdf` | 인증 후 계정 ID 확인 |\n| 비밀번호 찾기/재설정 | `비밀번호찾기.pdf`, `비밀번호재설정.pdf`, `비밀번호설정완료.pdf` | 새 비밀번호 설정 |\n| 회원탈퇴 | `회원탈퇴.pdf`, `회원탈퇴-1.pdf`, `회원탈퇴_환불.pdf`, `회원탈퇴_환불-1.pdf` | 탈퇴 전 환불/보존 정보 확인 후 탈퇴 처리 |\n| 이용약관 | `이용약관.pdf` | 가입 및 서비스 이용 약관 확인 |\n\n핵심 정책은 계정 권한에 따라 화면 접근이 달라져야 한다는 점이다. 같은 로그인 화면을 사용하더라도 수험생은 시험 접수와 응시 중심, 출제자는 출제 작업 중심, 채점자는 채점 작업 중심, 관리자는 운영 관리 중심으로 진입해야 한다.\n\n## 4. 수험생 영역\n\n수험생 영역은 “시험을 찾고 접수한다 → 결제한다 → 시험을 본다 → 결과를 확인한다 → 자격증을 신청한다”의 흐름으로 이해하면 된다.\n\n### 4.1 시험 접수\n\n| 화면 | 기능 |\n|---|---|\n| `목록_시험접수.pdf` | 접수 가능한 시험 목록 확인 |\n| `목록_시험접수_팝업.pdf` | 시험 접수 전 상세 확인 또는 신청 팝업 |\n| `목록_시험접수_변경.pdf` | 접수 정보 변경 |\n| `목록_시험접수_변경확인.pdf` | 변경 내용 최종 확인 |\n| `목록_시험접수_취소.pdf` | 접수 취소 및 환불 가능 여부 확인 |\n\n주요 기능은 시험명, 차수, 등급, 언어, 시험일, 접수기간, 응시료, 접수상태를 확인하고 접수/변경/취소를 처리하는 것이다.\n\n### 4.2 시험 응시\n\n| 화면 | 기능 |\n|---|---|\n| `목록_시험응시.pdf`, `목록_시험응시-1.pdf` | 응시 가능한 시험 목록 확인 |\n| `응시생_시험시작.png` | 시험 시작 전 진입 화면 |\n| `응시생_시험중.png` | 실제 시험 진행 화면 |\n| `응시생_시험중_문장나누기).png` | 문장 분할형 시험 진행 |\n| `응시생_시간확인.png` | 남은 시간 확인 |\n| `응시생_전체화면.png` | 시험 중 전체화면 상태 |\n| `응시생_제출.png`, `응시생_제출확인.png` | 답안 제출 및 제출 확인 |\n| `응시생_종료.png` | 시험 종료 화면 |\n| `응시생_다음차시.png` | 다음 차시 이동 |\n\n시험 응시 화면은 부정행위 방지, 시간 제한, 답안 저장, 제출 확인이 중요하다. 특히 시험 도중에는 현재 문항, 남은 시간, 다음/이전 이동, 임시저장 또는 자동저장, 최종 제출 상태가 명확해야 한다.\n\n### 4.3 시험 유형별 응시\n\n| 유형 | 화면 | 설명 |\n|---|---|---|\n| 번역형 | `시험_번역(번역기지정).pdf`, `시험_출제_번역기선택(텍스트)_전체보기.pdf` | 번역기 선택, 원문/번역문 작성, 전체보기 |\n| 음성/영상 번역 | `시험_음성영상(번역기2개).pdf`, `시험_음성영상(번역기3개).pdf`, `영상.pdf` | 음성·영상 자료 기반 응시 |\n| 웹툰 번역 | `시험_웹툰번역(번역기선택).png` | 이미지/웹툰 콘텐츠 번역 |\n| 프롬프트형 | `응시생_프롬프트AI선택.png`, `응시생_프롬프트설정.png`, `응시생_프롬프트시작.png`, `응시생_프롬프트에디터.png` | AI 선택, 프롬프트 조건 설정, 에디터 작성 |\n| 단답형 | `응시생_단답형시작.png`, `응시생_단답형시험.png`, `상세_단답형.pdf` | 짧은 답안 입력형 시험 |\n\n### 4.4 시험 결과 및 자격증\n\n| 화면 | 기능 |\n|---|---|\n| `목록_시험결과.pdf` | 응시한 시험의 결과 목록 확인 |\n| `목록_자격증신청.pdf` | 합격 후 자격증 신청 목록 확인 |\n| `수험생_자격증 신청하기.png` | 자격증 발급 신청 |\n\n결과 화면에서는 합격/불합격, 점수, 채점중 여부, 성적표 보기, 자격증 신청 가능 여부가 표시되어야 한다. 자격증 신청은 합격자에게만 활성화되어야 하며 결제 또는 배송 정보와 연결될 수 있다.\n\n## 5. 출제자 영역\n\n출제자 영역은 문제를 새로 만들고, 임시저장하고, 제출하고, 승인/반려 상태를 확인하는 업무 공간이다.\n\n| 화면 | 기능 |\n|---|---|\n| `출제관리.pdf` | 출제 업무 목록과 검색 |\n| `출제관리_번역상세.pdf` | 번역형 문제 상세 작성/확인 |\n| `출제관리_프롬프트상세.pdf` | 프롬프트형 문제 상세 작성/확인 |\n| `출제관리_단답형상세.pdf` | 단답형 문제 상세 작성/확인 |\n| `목록_출제내역.pdf` | 출제자가 제출한 문제 목록 |\n| `시험 출제내역.png` | 출제 이력 화면 |\n| `상세_출제_설정.pdf`, `상세_출제_설정-1.pdf` | 출제 기본 설정 |\n| `상세_프롬프트출제_설정.pdf`, `상세_프롬프트출제_설정-1.pdf` | 프롬프트 출제 조건 설정 |\n| `상세_프롬프트출제_확인.pdf` | 프롬프트 출제 최종 확인 |\n| `상세_단답형출제_출제.pdf` | 단답형 문항 작성 |\n| `상세_단답형출제_확인.pdf` | 단답형 문항 확인 |\n| `임시저장.pdf`, `저장.pdf`, `저장팝업.pdf` | 저장/임시저장 확인 |\n\n출제 기능의 핵심 필드는 시험명, 차수, 등급, 언어쌍, 대/중/소분류, 문제 유형, 난이도, 배점, 지문, 문제, 정답, 해설, 평가기준, 첨부파일이다.\n\n출제 프로세스는 다음과 같다.\n\n1. 출제자가 로그인한다.\n2. 담당 시험 또는 새 문제 생성을 선택한다.\n3. 시험/언어/분류/난이도/문제 유형을 설정한다.\n4. 지문, 문제, 정답, 해설, 평가기준을 입력한다.\n5. 미리보기로 수험생 화면 기준 표시를 확인한다.\n6. 임시저장 또는 최종제출을 한다.\n7. 관리자가 검수한다.\n8. 반려되면 수정 후 재제출하고, 승인되면 문제은행 또는 시험에 반영된다.\n\n## 6. 채점자 영역\n\n채점자 영역은 배정된 답안을 확인하고, 기준표에 따라 점수와 피드백을 입력하는 업무 공간이다.\n\n| 화면 | 기능 |\n|---|---|\n| `채점자 홈.png` | 채점자 작업 현황 |\n| `채점자 홈_시험 채점하기.png` | 채점 대상 시험 선택 |\n| `채점자 홈_시험 채점하기_개별채점하기.png` | 개별 답안 채점 |\n| `채점자 홈_채점내역.png` | 완료/진행 중 채점 내역 |\n| `채점관리.pdf` | 관리자 또는 채점자용 채점 목록 |\n| `채점관리_번역상세.pdf` | 번역형 답안 채점 |\n| `채점관리_프롬프트상세.pdf` | 프롬프트형 답안 채점 |\n| `채점관리_단답형상세.pdf` | 단답형 답안 채점 |\n| `상세_번역채점.pdf`, `상세_번역채점_피드백.pdf` | 번역 채점과 피드백 |\n| `상세_프롬프트채점.pdf`, `상세_프롬프트채점_상세.pdf` | 프롬프트 채점 상세 |\n| `목록_채점내역.pdf` | 채점 완료/진행 목록 |\n| `평가서 팝업.png` | 평가서 또는 채점 의견 팝업 |\n\n채점 화면은 문제, 수험생 답안, 평가 기준, 점수 입력, 코멘트, 임시저장, 채점완료 버튼이 한 흐름으로 보여야 한다. 특히 주관식/번역형/프롬프트형은 자동 채점이 어렵기 때문에 채점 기준표와 이력 추적이 중요하다.\n\n## 7. 관리자 영역\n\n관리자 영역은 전체 플랫폼을 운영하는 본부 화면이다. `관리자 홈.png` 기준으로 검색 조건, 체크박스 필터, 대량 테이블, 상태 버튼, 팝업, 삭제 안내, 시험 추가/삭제 기능이 확인된다.\n\n### 7.1 회원관리\n\n| 화면 | 기능 |\n|---|---|\n| `회원관리.pdf` | 전체 회원 목록 조회 |\n| `회원관리_상세_전체.pdf` | 회원 상세 정보 확인/수정 |\n| `그룹관리.pdf` | 회원 그룹 또는 권한 그룹 관리 |\n| `관리자관리.pdf` | 관리자 계정 관리 |\n| `전문가관리.pdf`, `전문가관리_상세_전체.pdf` | 출제자/채점자 등 전문가 계정과 프로필 관리 |\n| `전문가신청.pdf`, `전문가신청_저장.pdf` | 전문가 신청 및 저장 |\n| `목록_전문가프로필.pdf`, `목록_전문가프로필-1.pdf` | 전문가 프로필 목록 |\n| `프로필관리.pdf` | 프로필 정보 관리 |\n\n회원관리에서는 수험생, 출제자, 채점자, 관리자, 전문가를 구분하고 승인/반려, 정지/복구, 그룹 변경, 상세 조회, 엑셀 다운로드가 가능해야 한다.\n\n### 7.2 시험관리\n\n| 화면 | 기능 |\n|---|---|\n| `시험관리.pdf` | 시험 목록 및 일정 관리 |\n| `시험관리_신규.pdf` | 새 시험 등록 |\n| `관리자 홈.png` | 시험 일정 관리, 시험 추가, 시험 삭제, 상태 필터 |\n| `다음 출제 화면.pdf`, `다음 채점 화면.pdf` | 시험 이후 출제/채점 단계 이동 |\n\n시험관리는 시험일정, 시험응시관리, 시험결과관리, 자격증관리와 연결된다. 시험을 등록할 때는 시험명, 회차, 시험일, 접수기간, 응시시간, 응시료, 언어, 등급, 분류, 응시자 제한, 결과 발표일 등을 다룬다.\n\n### 7.3 문제관리 및 코드관리\n\n| 화면 | 기능 |\n|---|---|\n| `카테고리관리.pdf` | 시험/문제 카테고리 관리 |\n| `구분.pdf`, `구분-1.pdf` ~ `구분-8.pdf`, `구분.png` | 대/중/소 구분 또는 분류 코드 관리 |\n| `관리자 추가 버튼들 - 미완료.pdf` | 관리자 화면에 추가될 버튼/액션 |\n| `정보없을경우.pdf` | 데이터 없음 상태 |\n\n코드/분류 관리는 시험 종목, 언어 코드, 등급 코드, 대분류/중분류/소분류, 사용 여부, 노출 순서 등을 관리하는 기능으로 해석된다. 이 기능은 시험 등록, 문제 출제, 채점, 통계의 기준값으로 쓰인다.\n\n### 7.4 결제 및 정산\n\n| 화면 | 기능 |\n|---|---|\n| `결제관리.pdf` | 결제 목록 관리 |\n| `결제.pdf`, `결제-1.pdf`, `결제-2.pdf`, `결제-3.pdf` | 결제 단계 또는 결제 상태별 화면 |\n| `결제미승인.pdf` | 미승인 결제 확인 |\n| `결제완료.pdf` | 결제 완료 |\n| `신용카드.pdf` | 카드 결제 |\n| `포인트 결제.pdf`, `포인트 결제-1.pdf` | 포인트 결제 |\n| `목록_결제내역.pdf` | 사용자 결제내역 |\n| `정산관리.pdf`, `목록_정산내역.pdf`, `결제/정산 관리.pdf` | 정산 내역과 보고서 관리 |\n| `요금제.pdf`, `장바구니.pdf` | 요금제 선택 및 장바구니 |\n\n결제 기능은 시험 응시료, 자격증 발급비, 포인트 결제, 결제 취소/환불, 정산 보고서와 연결된다.\n\n### 7.5 고객지원 및 운영관리\n\n| 화면 | 기능 |\n|---|---|\n| `1_1 문의관리.pdf` | 관리자 문의 목록 |\n| `목록_1_1문의.pdf` | 사용자 문의 목록 |\n| `마이페이지_1_1 문의 상세.pdf` | 문의 상세와 답변 |\n| `문의팝업.pdf` | 문의 작성/확인 팝업 |\n| `고객지원.pdf`, `고객지원(신규).pdf` | 고객지원 메인/신규 화면 |\n| `게시판+FAQ.pdf`, `게시판+FAQ_상세.pdf` | 게시판 및 FAQ 목록/상세 |\n| `블로그_목록.pdf`, `블로그_상세.pdf` | 블로그 운영 |\n| `사이트관리.pdf`, `사이트관리_메인배너(수정).pdf` | 사이트 기본정보 및 메인 배너 관리 |\n| `알림창관리.png` | 팝업/알림창 관리 |\n| `이메일발송.pdf` | 이메일 발송 |\n| `통계.pdf` | 통계 관리 |\n\n운영관리 영역은 사용자가 직접 보는 게시판/FAQ/블로그/공지와, 관리자만 사용하는 사이트 설정/배너/알림창/이메일/통계를 포함한다.\n\n## 8. AI·미디어 기능\n\n2024 자료에는 일반 시험 기능 외에 STT, TTS, STS, Youtube, 영상, 음성, 번역 관련 화면이 포함된다.\n\n| 기능 | 화면 | 설명 |\n|---|---|---|\n| STT | `STT.pdf`, `STT(음성파일 업로드 후).pdf` | 음성 파일을 텍스트로 변환하거나 시험 자료로 활용 |\n| TTS | `TTS.pdf` | 텍스트를 음성으로 변환 |\n| STS | `STS.pdf` | 음성 간 변환 또는 음성 기반 처리 기능으로 추정 |\n| Youtube | `Youtube.pdf` | 유튜브 영상 기반 자료 처리 |\n| 영상 | `영상.pdf` | 영상 자료 기반 시험/문제 |\n| 번역 | 번역 관련 시험/출제/채점 화면 | 텍스트, 음성, 영상, 웹툰 번역 시험에 사용 |\n\n이 영역은 시험 콘텐츠의 입력 소스와 문제 유형을 확장하는 기능으로 보는 것이 적절하다.\n\n## 9. 주요 상태값\n\n| 도메인 | 상태 예시 |\n|---|---|\n| 시험 접수 | 접수가능, 접수완료, 접수마감, 접수취소 |\n| 결제 | 결제대기, 결제완료, 결제미승인, 환불신청, 환불완료 |\n| 응시 | 응시대기, 응시가능, 응시중, 응시완료, 미응시, 응시마감 |\n| 결과 | 채점중, 합격, 불합격, 성적공개, 미발표 |\n| 자격증 | 신청가능, 신청완료, 발급중, 발급완료 |\n| 출제 | 작성중, 임시저장, 검토대기, 반려, 수정요청, 확정, 등록완료 |\n| 채점 | 채점대기, 채점중, 임시저장, 채점완료, 재검토요청, 최종확정 |\n| 문의 | 접수완료, 처리중, 답변완료 |\n| 회원 | 정상, 승인대기, 반려, 정지, 탈퇴 |\n\n## 10. 공통 UI/기능 패턴\n\n2024 자료 전체에서 반복되는 공통 패턴은 다음과 같다.\n\n| 패턴 | 설명 |\n|---|---|\n| 상단 헤더 | 로고, 주요 메뉴, 사용자명, 로그아웃 |\n| 좌측 사이드 메뉴 | 현재 역할/메뉴에 맞는 하위 메뉴 |\n| 검색/필터 | 체크박스, 셀렉트, 날짜, 키워드 검색 |\n| 데이터 테이블 | 목록 조회, 상태 확인, 상세 이동, 대량 선택 |\n| 상태 버튼 | 접수하기, 결제하기, 시험시작, 채점하기, 승인/반려 등 |\n| 팝업 | 저장 확인, 삭제 안내, 문의, 시험 추가, 평가서 |\n| 상세 화면 | 기본 정보, 상태, 첨부, 이력, 저장 버튼 |\n| 빈 상태 | 정보 없음 또는 조회 결과 없음 |\n\n## 11. 구현 관점 우선순위\n\n1. 권한별 라우팅과 공통 레이아웃을 먼저 만든다.\n2. 수험생의 시험 접수/결제/응시/결과/자격증 흐름을 연결한다.\n3. 출제자 문제 작성과 관리자 문제 검수 흐름을 연결한다.\n4. 채점자 채점과 관리자 결과 확정 흐름을 연결한다.\n5. 결제/정산/환불을 시험 접수 및 자격증 신청과 연결한다.\n6. 고객지원, 게시판, FAQ, 블로그, 사이트관리, 통계를 운영관리로 묶는다.\n7. STT/TTS/Youtube/영상/번역 기능은 시험 유형 확장 모듈로 분리한다.\n\n## 12. 주의 사항\n\n현재 문서는 PDF 내부 텍스트 전문 OCR이 아니라, 파일명과 확인 가능한 대표 이미지 기준으로 정리했다. 따라서 세부 컬럼명, 버튼명, 입력값은 실제 PDF 화면을 개별 확인하면서 보완해야 한다. 다만 전체 IA와 기능 범위, 역할별 흐름은 2024 Figma 자료만으로도 명확하게 파악된다.\n\n## 13. UX/UI 관점 보완\n\n2024 화면은 기능 범위가 넓기 때문에 단순히 메뉴를 모두 노출하면 사용자가 길을 잃기 쉽다. 역할별로 “지금 해야 할 일”을 먼저 보여주고, 상세 기능은 그 다음 단계에서 펼쳐야 한다.\n\n| 역할 | 첫 화면에서 가장 먼저 보여줘야 할 것 | UX/UI 설계 방향 |\n|---|---|---|\n| 수험생 | 접수한 시험, 오늘 응시 가능 여부, 결과 발표 여부 | 상태 카드와 다음 행동 버튼을 크게 배치한다. 예: `결제하기`, `시험시작`, `결과보기`, `자격증신청` |\n| 출제자 | 임시저장 문항, 반려 문항, 제출 마감 | `이어쓰기`, `수정 후 재제출`, `새 문제 생성`을 빠르게 누를 수 있게 한다. |\n| 채점자 | 채점 대기 건수, 진행 중 채점, 마감 임박 | 채점 대상 목록과 `채점 시작` 버튼을 우선 배치하고, 기준표는 채점 화면에서 고정 영역으로 제공한다. |\n| 관리자 | 미처리 업무, 오류/대기 상태, 오늘의 운영 지표 | 대시보드에서 문의 미답변, 결제 미승인, 환불 대기, 검수 대기를 바로 확인하게 한다. |\n\n### 13.1 목록 화면 UX\n\n관리자와 사용자 화면 모두 목록 테이블이 많다. 테이블은 다음 기준을 적용하는 것이 좋다.\n\n| 항목 | 권장 방식 |\n|---|---|\n| 핵심 열 | 회원명, 시험명, 상태처럼 판단에 필요한 값은 왼쪽에 고정한다. |\n| 상태값 | 텍스트만 쓰지 말고 색상 배지와 문구를 함께 표시한다. |\n| 주요 버튼 | 한 행에 버튼을 너무 많이 넣지 않고 가장 중요한 1개 행동만 먼저 노출한다. |\n| 가로 스크롤 | 핵심 열은 고정하고 세부 정보는 탭 또는 상세 화면으로 분리한다. |\n| 검색 조건 | 기본 검색과 상세 검색을 나누어 초보 관리자가 부담을 느끼지 않게 한다. |\n| 빈 목록 | `정보 없음`만 보여주지 말고 다음 행동을 안내한다. 예: `등록된 시험이 없습니다. 새 시험을 등록하세요.` |\n\n### 13.2 입력 화면 UX\n\n시험 등록, 출제, 채점, 문의 작성처럼 입력 항목이 많은 화면은 한 페이지에 모든 필드를 노출하면 실수가 늘어난다.\n\n| 화면 | 권장 UX |\n|---|---|\n| 시험 등록 | 기본정보, 일정, 접수/환불, 시험유형, 공개설정 단계로 나눈다. |\n| 문제 출제 | 시험 선택, 문제 작성, 정답/해설, 평가기준, 미리보기, 제출 단계로 나눈다. |\n| 채점 | 문제/답안/기준표/점수입력/코멘트를 한 화면에 두되, 기준표와 저장 버튼은 항상 보이게 한다. |\n| 결제/환불 | 금액, 환불 가능 여부, 처리 후 결과를 명확히 보여주고 최종 확인 팝업을 둔다. |\n| 1:1 문의 | 문의 유형, 관련 시험, 제목, 내용, 첨부파일만 우선 제공한다. |\n\n### 13.3 접근성과 신뢰성\n\n| 항목 | 보완 기준 |\n|---|---|\n| 색상 | 합격/불합격, 완료/대기, 위험/취소 상태는 색상과 텍스트를 함께 사용한다. |\n| 버튼 | 삭제, 환불, 최종제출, 성적공개 같은 되돌리기 어려운 작업은 확인 팝업과 이력 기록을 둔다. |\n| 자동저장 | 응시, 출제, 채점 화면에는 자동저장 또는 저장 상태 표시가 필요하다. |\n| 시간 표시 | 시험 시간, 접수 마감, 결과 발표일은 날짜와 시간을 함께 명확히 표시한다. |\n| 개인정보 | 관리자 테이블에서는 연락처, 이메일, 주소 같은 개인정보를 권한에 따라 마스킹할 수 있어야 한다. |\n"

          "content": "# figma_pdf/2025 사이트맵 및 기능 정의\n\n작성일: 2026-05-21  \n분석 범위: `figma_pdf/2025` 폴더의 화면 파일명, 주요 PNG/JPG 화면 확인, 기존 `figma_pdf_2024_2025_vibecoding_비교분석.md` 참고  \n주의: PDF 내부 텍스트 추출 도구가 설치되어 있지 않아, PDF는 파일명과 확인 가능한 메타 정보 중심으로 해석했다. PNG/JPG 화면은 직접 확인했다.\n\n## 1. 한눈에 보는 2025 구성\n\n`figma_pdf/2025`는 전체 시험 플랫폼을 처음부터 끝까지 모두 담은 완전한 IA라기보다, 기존 시험 플랫폼 위에 적용할 **UX/UI 참고 화면과 일부 관리자/전문가 화면**을 묶은 자료로 보는 것이 적절하다.\n\n1. 사용자 경험 참고 영역\n   - 창작작업실\n   - 메타-T 번역\n   - 장바구니\n   - 결제\n   - 마이페이지 참고 화면\n\n2. 전문가 업무 영역\n   - 프롬프트 출제\n   - 단답형 출제\n   - 출제 내역, 채점 내역, 정산 내역, 전문가 프로필\n\n3. 관리자 운영 영역\n   - 대시보드\n   - 회원관리\n   - 관리자 관리\n   - 시험관리\n   - 자격증관리\n   - 카테고리 관리\n   - 양식관리\n   - 템플릿 양식 관리자\n   - 파일 업로드형 대량 관리 화면\n\n4. 연결 설명 자료\n   - `Group 758531575.jpg`\n   - `Frame 758532606.jpg`\n   - `Rectangle 34625361.pdf`, `Rectangle 34625362.pdf`\n   - 다수의 `CheckBox*.png`\n\n특히 `창작작업실01.png`와 `Group 758531575.jpg`는 시험 플랫폼의 신규 핵심 메뉴를 확정하는 자료라기보다, **향후 화면 구성과 상호작용을 참고하기 위한 UX/UI 레퍼런스**로 분류하는 것이 안전하다. `Group 758531575.jpg`는 별도 서비스 화면이 아니라, 관리자/양식 설정 화면의 항목들이 작업 화면과 하단 번역/편집 패널로 어떻게 연결될 수 있는지 설명하는 참고 이미지다.\n\n## 2. 사용자 관점 서비스 설명\n\n일반 사용자가 보는 2025 자료는 \"시험 플랫폼\"에 바로 붙일 확정 기능이라기보다, 시험 플랫폼의 화면 경험을 확장할 때 참고할 수 있는 AI 작업 도구형 UI 예시를 포함한다.\n\n`창작작업실01.png`는 사용자가 문서, 유튜브, 리서치, 프로그래밍, 이미지/디자인, 음악, 음성 같은 작업 유형을 고르고 파일이나 텍스트를 입력하는 방식을 보여준다. 다만 현재 해석에서는 이 화면을 독립 구현 대상이라기보다, 시험 플랫폼의 향후 UX/UI를 설계할 때 참고할 수 있는 패턴으로 본다.\n\n관리자는 사용자, 시험, 자격증, 카테고리, 양식, 템플릿을 관리한다. 2025에서 새로 강조되는 부분은 기존 시험 관리뿐 아니라 AI 작업에 쓰이는 양식과 템플릿을 운영자가 관리한다는 점이다.\n\n전문가는 프롬프트 출제, 단답형 출제, 채점, 정산, 전문가 프로필 관리를 수행한다. 일반 사용자 화면과 달리 전문가 영역은 문제 작성, 평가요소 설정, 답변 예시 입력처럼 시험/검수 업무 중심이다.\n\n## 3. 최상위 사이트맵\n\n| 구분 | 대메뉴 | 주요 하위 기능 | 대표 파일 |\n|---|---|---|---|\n| 참고 | 창작작업실 | AI 작업 유형 선택, 카테고리 선택, AI 선택, 파일/텍스트 입력, 추천 서식, 임시저장, 적용의 UX/UI 참고 | `창작작업실01.png` |\n| 사용자 | 메타-T 번역 | 동시통역, 문서번역, YouTube, 기타, 웹툰번역, 언어 선택, 번역 엔진 선택, 편집기 사용 | `메타번역.png` |\n| 사용자 | 장바구니 | 작업 상품 선택, 가격 확인, 총액 계산, 결제 이동, 구독 신청, 전문가 견적 요청 | `장바구니.png` |\n| 사용자 | 결제 | 선택 상품 확인, 신용카드/페이 결제, 포인트 결제, 구독 신청, 전문가 견적 요청 | `결제.png` |\n| 사용자 | 마이페이지 | 내 작업/결제/프로필 확인용 참고 화면 | `마이페이지 1920해상도 참고.pdf` |\n| 전문가 | 출제관리 | 프롬프트 출제, 단답형 출제, 평가 설정, 답변 예시 | `상세_프롬프트출제_설정.png`, `상세_단답형출제.png` |\n| 전문가 | 전문가 프로필 | 학력, 경력, 저서, 해외거주 경험 등록 | `목록_전문가프로필_상세입력.png` |\n| 관리자 | 대시보드 | 운영 현황 요약 | `어드민/대시보드_01.pdf` |\n| 관리자 | 회원관리 | 회원 상세, 활동, 결제, 문의, 통계 확인 | `회원관리_상세_전체.pdf`, `기본화면_파일업로드.jpg` |\n| 관리자 | 시험관리 | 시험 신규 등록, 시험 기본정보 관리 | `시험관리_신규.pdf`, `관리자_시험관리_신규.pdf` |\n| 관리자 | 자격증관리 | 자격증 상세, 발급/상태 관리 | `관리자_자격증관리_상세.pdf` |\n| 관리자 | 카테고리관리 | 시험/작업 카테고리 관리 | `관리자_카테고리 관리.pdf` |\n| 관리자 | 양식관리 | AI 작업 양식 목록, 신규 양식, 프롬프트 첫 화면 설정 | `양식관리.pdf`, `양식관리_신규.pdf`, `양식관리_프롬프트첫화면.pdf` |\n| 관리자 | 템플릿 양식 관리자 | 사용자에게 제공할 템플릿 양식 관리 | `템플릿 양식 관리자.pdf` |\n\n## 4. 사용자 영역 상세 기능\n\n### 4.1 창작작업실 참고 화면\n\n대표 파일: `창작작업실01.png`\n\n창작작업실은 현재 기준에서 사용자가 실제로 진입해야 하는 확정 메뉴라기보다, 2025 자료가 제안하는 작업형 UX/UI 참고 화면이다. 상단에는 `창작작업실`, `요금제`, `고객센터`, `회사소개` 메뉴가 있고, 우측에는 알림, 장바구니, 계정 아이콘이 있다.\n\n작업 유형 탭:\n\n| 탭 | 의미 | 사용 예 |\n|---|---|---|\n| Youtube | 유튜브 영상 기반 요약, 번역, 분석, 콘텐츠 생성 | 영상 요약, 자막 번역, 영상 내용 분석 |\n| 문서 | 문서 파일 기반 작업 | PDF 번역, 문서 요약, 문서 변환 |\n| 리서치&분석 | 자료 조사와 분석 | 시장 조사, 법률/논문 분석 |\n| 프로그래밍 | 코드 생성/검토/설명 | 코드 작성, 오류 분석, 리팩터링 |\n| 이미지,디자인 | 이미지 또는 디자인 관련 작업 | 이미지 설명, 디자인 검토, 시안 생성 |\n| 음악 | 음악 관련 작업 | 가사, 음악 분석, 추천 |\n| 음성 | 음성 파일 관련 작업 | STT, 요약, 음성 분석 |\n| 기타 | 정형화되지 않은 AI 요청 | 일반 질의, 혼합 작업 |\n\n작업 방식 버튼:\n\n| 버튼 | 사용자 의미 | 기능 정의 |\n|---|---|---|\n| 보유한 양식에 텍스트 입력 | 기존 양식을 선택해 내용을 넣는 방식 | 관리자가 등록한 양식/템플릿을 기반으로 입력 폼을 표시 |\n| 나만의 양식 만들기 | 사용자가 직접 양식을 구성 | 필드, 안내문, 옵션을 사용자 정의 |\n| 양식 생성 후 내용 작성 | AI 또는 시스템이 양식을 먼저 만든 뒤 내용 입력 | 양식 생성 단계와 작성 단계를 분리 |\n| 양식 만들기 | 빈 양식 작성 | 신규 양식 생성 화면으로 이동 |\n| 내용 작성 후 검수 받기 | 작성 결과를 전문가/관리자에게 검수 요청 | 후면 작업 요청, 검수비/소요시간 연동 가능 |\n| 관련 서비스 표시 영역 | 현재 작업과 관련된 부가 서비스를 보여주는 영역 | 추천 서식, 전문가 서비스, 결제 상품 노출 |\n\n입력/설정 영역:\n\n| 영역 | 기능 |\n|---|---|\n| 카테고리 선택 | 대분류, 중분류, 소분류를 선택하고 검색한다. 예시는 법률, 국내 법률, 고소장이다. |\n| 편집 에디터 | 에디터 사용/미사용을 선택한다. 사용 시 결과 편집 패널과 연결된다. |\n| 사용 AI | ChatGPT, Gemini, wrtn., 다른 AI 등 사용할 엔진을 선택한다. |\n| 후면 작업 요청 | 검수 요청, 고급전문가, 긴급 여부를 선택한다. |\n| 설정 | 기능 사용/미사용을 지정한다. |\n| 사용프롬프트 설정 | 전문 분야와 세부분야를 선택한다. |\n| 다룰설정 | 관련 내용 체크박스를 선택한다. 실제 서비스에서는 추천 키워드, 검수 기준, 포함 정보 같은 세부 옵션으로 구체화해야 한다. |\n| 파일/텍스트 입력 | 파일 업로드 또는 AI 텍스트 입력을 받는다. |\n| 추천 서식 | AI 추천 관련 서식을 표시한다. |\n| 임시저장/카드/적용 | 임시 저장, 장바구니 담기, 작업 적용을 수행한다. |\n\n### 4.2 메타-T 번역\n\n대표 파일: `메타번역.png`\n\n메타-T 번역은 창작작업실 참고 화면과 비슷한 레이아웃을 쓰지만, 번역 작업에 특화된 화면이다. 이 화면도 시험 플랫폼 본류 기능으로 바로 확정하기보다, 번역/편집 UX 참고 자료로 우선 분류한다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 번역 유형 탭 | 동시통역, 문서번역, YouTube, 기타, 웹툰번역 중 선택한다. |\n| 번역 목적 칩 | 아나운서, 관광가이드, 큐레이터, 안내 같은 세부 작업 유형을 선택한다. |\n| 카테고리 선택 | 법률, 국내 법률, 고소장 같은 분야를 지정한다. |\n| 언어 설정 | 출발어와 도착어를 선택하고, 영어/중국어/일어/아랍어/베트남어 등 언어 옵션을 고른다. |\n| 사용 AI | 번역에 사용할 AI 엔진을 선택한다. |\n| 양식 에디터 | 결과를 편집기에서 다룰지 선택한다. |\n| 후면 작업 요청 | 검수 요청, 전문가 요청, 긴급 여부를 지정한다. |\n| 파일/텍스트 입력 | 번역할 파일 또는 텍스트를 입력한다. |\n| 관련 서식 추천 | 번역 작업에 맞는 관련 서식을 제안한다. |\n\n### 4.3 번역/편집 작업 화면\n\n대표 근거: `Group 758531575.jpg` 하단 화면\n\n이 화면은 창작작업실 참고 화면 또는 메타-T 번역에서 입력한 자료가 작업 패널로 펼쳐질 수 있음을 보여준다. 원문, AI 번역기, 비교 번역기, 에디터가 나란히 표시된다.\n\n주요 기능:\n\n| 패널 | 기능 |\n|---|---|\n| 원문 텍스트 | 원문 제목/본문 표시, 원본 동영상 확인, 음성 내보내기 |\n| AI 번역기 | ChatGPT 등 번역기별 결과 표시, 언어 선택, AI 설정 팝업 |\n| 비교 번역기 | 다른 번역 엔진 결과와 비교, 시간/버전 선택 |\n| 에디터 | 최종 편집, 문장별 체크, 수정 내용 강조, 서식/링크/인용/설정 도구 사용 |\n| 추천 단어 | 추천 단어, 설명, 맞춤법/추천어 후보 표시 |\n| 메모 | 작업 중 참고 메모 입력 |\n| 저장/결제/적용 | 편집 결과 저장, 결제, 최종 적용 |\n\n### 4.4 장바구니와 결제\n\n대표 파일: `장바구니.png`, `결제.png`\n\n장바구니는 AI 작업 또는 번역 작업을 상품처럼 담아 결제 전 확인하는 화면이다.\n\n장바구니 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 전체 선택 | 여러 작업을 한 번에 선택한다. |\n| 선택 삭제 | 선택한 작업을 장바구니에서 제거한다. |\n| 작업 카드 | 작업명, 첨부 파일명, 언어쌍, 번역기, 문서 변환 유형, 에디팅 사용 여부, 글자 수, 가격을 표시한다. |\n| 선택 요약 | 선택된 번역 수, 작업명, 단가, 추가 옵션 금액을 보여준다. |\n| 총액 계산 | 선택한 작업의 최종 결제 금액을 계산한다. |\n| 신용카드/페이 결제 | 일반 결제 수단으로 결제한다. |\n| 포인트 결제 | 보유 포인트를 사용한다. |\n| 구독 신청 | 정기 구독 상품으로 전환한다. |\n| 전문가 견적 요청 | 고급 전문가 작업이 필요한 경우 별도 견적을 요청한다. |\n\n결제 화면은 장바구니의 축약 버전이다. 선택된 작업 1건의 상세와 총 결제 금액, 결제 버튼을 보여준다.\n\n## 5. 전문가 영역 상세 기능\n\n### 5.1 프롬프트 출제하기\n\n대표 파일: `상세_프롬프트출제_설정.png`, `상세_프롬프트출제_확인.png`, `출제관리_프롬프트상세.pdf`\n\n전문가가 프롬프트형 시험 문제를 작성하는 화면이다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 문제 탭 | 문제1, 문제2, 문제3 등 문항 단위 이동 |\n| 시험 문제 | 수험생에게 제시할 문제 내용을 입력한다. |\n| 단계 구성 | 1단계, 2단계, 3단계처럼 풀이 또는 작성 단계를 나눈다. |\n| 입력 유형 | 단일선택, 복수선택, 단답형, 사용자 입력 영역 등을 지정한다. |\n| 보기 입력 | 선택형 문항의 보기를 입력한다. |\n| 평가 설정 | 1차 평가 요소, 2차 평가 요소, 단어수, 문장부호수, 전체 문장수, 유사어를 설정한다. |\n| 답변 예시 | 정답 또는 모범 답변을 입력한다. |\n| 저장/취소 | 작성 내용을 저장하거나 취소한다. |\n\n### 5.2 단답형 출제\n\n대표 파일: `상세_단답형출제.png`, `채점관리_단답형상세.pdf`\n\n단답형 문제 작성과 채점 기준을 다루는 화면이다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 문제 입력 | 단답형 질문을 입력한다. |\n| 정답 입력 | 허용 정답, 대체 정답, 유사어를 입력한다. |\n| 배점 설정 | 문항별 점수와 평가 기준을 설정한다. |\n| 채점 기준 | 자동 채점 또는 수동 검토에 필요한 기준을 정의한다. |\n| 답변 예시 | 수험생 답변 예시 또는 채점 참고 문구를 입력한다. |\n\n### 5.3 전문가 프로필\n\n대표 파일: `목록_전문가프로필_상세입력.png`\n\n전문가가 본인의 이력과 증빙 자료를 등록하는 화면이다.\n\n등록 항목:\n\n| 항목 | 입력 내용 |\n|---|---|\n| 학력 등록 | 학교, 학과, 졸업/휴학 상태, 입학년도, 졸업년도, 첨부 파일 |\n| 저서 및 역서 등록 | 저서명, 출판사, 출판일, 첨부 파일 |\n| 해외거주 경험 등록 | 국가명, 해외 나간 이유, 출국일, 입국일, 첨부 파일 |\n| 경력사항 등록 | 회사명, 부서, 직위, 재직 상태, 입사년도, 퇴사년도, 첨부 파일 |\n\n## 6. 관리자 영역 상세 기능\n\n### 6.1 관리자 대시보드\n\n대표 파일: `어드민/대시보드_01.pdf`\n\n운영자가 서비스 현황을 요약해서 보는 시작 화면이다. 현재 2025 폴더에서는 PDF 파일명만 확인되므로, 상세 지표는 `ai_docs/ia분석파일.docx`의 관리자 대시보드 정의와 연결해 해석하는 것이 합리적이다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 신규 회원 수 | 기간별 가입 현황 |\n| 시험 접수 현황 | 접수중, 접수마감, 응시예정 상태 |\n| 결제 현황 | 결제완료, 환불대기, 미결제 |\n| 문제/채점 대기 | 출제 검수 대기, 채점 대기 |\n| 문의 미답변 | 고객센터 처리 필요 건수 |\n| 바로가기 | 회원관리, 시험관리, 양식관리, 고객센터 등 주요 업무 이동 |\n\n### 6.2 회원관리\n\n대표 파일: `기본화면_파일업로드.jpg`, `회원관리_상세_전체.pdf`\n\n`기본화면_파일업로드.jpg`는 관리자형 회원관리 목록 화면으로 확인된다. 상단 탭은 `전체`, `회원관리`, `활동관리`, `결제관리`, `1:1 문의 관리`, `통계`로 구성되어 있다.\n\n주요 기능:\n\n| 영역 | 기능 |\n|---|---|\n| 검색/필터 | 회원 유형, 에디터 유형, AI 선택, 프리미엄 여부, 결제/문의/게시 상태, 날짜 범위 등을 조합해 검색한다. |\n| 전체 정보 테이블 | 회원 기본정보, 활동, 시험, 결제, 자격증, 피드백 관련 컬럼을 가로 스크롤로 표시한다. |\n| 선택 작업 | 선택 항목 삭제, 메일 보내기, SMS 전송 등 일괄 작업을 수행한다. |\n| 엑셀 파일 생성 | 관련/상담 이력 등 목적별 엑셀 파일을 생성한다. |\n| 파일 올리기/다운로드 | 대량 회원 또는 관련 데이터를 업로드/다운로드한다. |\n| 저장 | 변경된 목록 설정이나 상태를 저장한다. |\n\n관리 시 주의점:\n\n| 항목 | 설명 |\n|---|---|\n| 개인정보 마스킹 | 이름, 휴대폰, 이메일, 주소는 권한별 마스킹이 필요하다. |\n| 비밀번호 미노출 | 운영 화면에 비밀번호 원문 또는 유추 가능한 정보가 노출되면 안 된다. |\n| 변경 이력 | 회원 상태, 결제 상태, 시험 상태 변경은 감사 로그로 남겨야 한다. |\n\n### 6.3 시험관리\n\n대표 파일: `시험관리_신규.pdf`, `관리자_시험관리_신규.pdf`\n\n시험을 신규 등록하고 운영 조건을 설정하는 관리자 기능이다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 시험 기본정보 등록 | 시험명, 시험 구분, 등급, 언어, 카테고리, 설명 |\n| 접수 기간 설정 | 접수 시작일, 종료일, 취소/환불 가능 기간 |\n| 시험 일정 설정 | 시험일, 시작/종료 시간, 시간대 |\n| 응시 조건 설정 | 자격 조건, 응시료, 정원, 시험 방식 |\n| 문제/양식 연결 | 프롬프트형, 단답형, 번역형 등 문제 유형 연결 |\n| 결과 공개 설정 | 채점 완료 후 공개일과 공개 범위 |\n\n### 6.4 자격증관리\n\n대표 파일: `관리자_자격증관리_상세.pdf`\n\n합격자에게 발급되는 자격증 정보를 관리한다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 자격증 상세 조회 | 회원, 시험, 합격 정보, 발급 상태 확인 |\n| 자격증 번호 부여 | 합격자에게 번호를 수동 또는 일괄 부여 |\n| 발급 상태 관리 | 신청, 입금대기, 제작중, 배송중, 발급완료 |\n| 발급 파일 관리 | PDF, 이미지, 출력용 데이터 관리 |\n| 재발급/취소 | 오류 또는 사용자 요청에 따른 재발급 처리 |\n\n### 6.5 카테고리 관리\n\n대표 파일: `관리자_카테고리 관리.pdf`\n\n시험, 창작작업실, 번역 작업, 양식에 공통으로 쓰이는 분류 체계를 관리한다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 대/중/소분류 등록 | 예: 법률 > 국내 법률 > 고소장 |\n| 사용 여부 | 노출/비노출, 사용/미사용 상태 설정 |\n| 정렬 순서 | 사용자 화면에 표시되는 순서 관리 |\n| 연결 화면 | 시험관리, 양식관리, 창작작업실, 메타-T 번역에서 공통 사용 |\n| 삭제 제한 | 이미 사용 중인 카테고리는 삭제보다 비활성화 처리 |\n\n### 6.6 양식관리\n\n대표 파일: `양식관리.pdf`, `양식관리_신규.pdf`, `양식관리_프롬프트첫화면.pdf`, `양식관리_프롬프트첫화면-1.pdf`\n\n2025에서 가장 중요한 관리자 참고 기능이다. 사용자가 보는 작업형 화면의 양식과 프롬프트 첫 화면을 운영자가 어떻게 관리할 수 있는지 보여주는 자료로 해석된다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 양식 목록 조회 | 등록된 양식, 사용 여부, 카테고리, 작성자, 수정일을 확인한다. |\n| 신규 양식 등록 | 양식명, 설명, 카테고리, 입력 필드, 안내 문구를 등록한다. |\n| 프롬프트 첫 화면 설정 | 작업형 참고 화면에서 사용자가 처음 보게 될 입력 구조를 정의한다. |\n| AI 엔진 연결 | 양식별로 사용 가능한 AI 엔진을 지정한다. |\n| 검수/전문가 옵션 | 후면 작업 요청, 전문가 검수, 긴급 옵션 사용 여부를 지정한다. |\n| 추천 서식 연결 | 사용자에게 노출할 관련 서식을 연결한다. |\n| 미리보기 | 사용자 작업 화면에서 보이는 형태를 참고용으로 확인한다. |\n| 게시/비게시 | 사용자가 선택할 수 있는 상태로 공개하거나 숨긴다. |\n\n### 6.7 템플릿 양식 관리자\n\n대표 파일: `템플릿 양식 관리자.pdf`\n\n템플릿은 반복적으로 쓰는 양식을 상품화 또는 추천 서식으로 제공하기 위한 관리 기능이다.\n\n필요 기능:\n\n| 기능 | 설명 |\n|---|---|\n| 템플릿 등록 | 템플릿명, 설명, 카테고리, 대상 작업 유형 등록 |\n| 템플릿 편집 | 입력 필드, 기본 문구, 추천 옵션 수정 |\n| 가격/상품 연결 | 유료 작업이나 결제 상품과 연결할 수 있다. |\n| 추천 노출 | 작업형 참고 화면의 `AI 추천 관련 서식` 영역에 노출되는 구조를 참고한다. |\n| 버전 관리 | 템플릿 수정 이력과 이전 버전을 관리한다. |\n\n## 7. 연결 설명 자료 처리 기준\n\n| 파일 | 분류 | 처리 기준 |\n|---|---|---|\n| `Group 758531575.jpg` | 기능 연결 설명도 | 관리자 설정 화면과 사용자 작업 화면의 연결 관계를 보여주는 설명 자료다. 별도 화면으로 구현하지 않는다. |\n| `Frame 758532606.jpg` | 참고 프레임 | 파일 업로드/구분 계열 화면의 참고 이미지로 본다. |\n| `Rectangle 34625361.pdf`, `Rectangle 34625362.pdf` | 디자인 조각 또는 배경 요소 | 독립 기능이 아니라 화면 구성 리소스로 본다. |\n| `CheckBox*.png` | UI 리소스 | 체크박스 라벨 또는 상태 이미지다. 실제 구현에서는 이미지가 아니라 공통 체크박스 컴포넌트로 대체한다. |\n\n`Group 758531575.jpg`에서 보이는 보라색 연결선은 기능 흐름의 힌트다. 왼쪽 관리자/설정 화면의 카테고리, AI 선택, 필터, 상세 옵션이 오른쪽 작업형 참고 화면의 입력 패널과 하단 번역/에디터 작업 패널에 반영될 수 있다는 의미로 해석해야 한다. 즉 \"관리자가 만든 양식/옵션이 사용자 작업 화면을 구성할 수 있다\"는 구조 설명이다.\n\n## 8. 주요 데이터 객체\n\n| 데이터 | 설명 | 관련 화면 |\n|---|---|---|\n| 사용자 | 일반 회원, 전문가, 관리자 등 계정 정보 | 회원관리, 마이페이지 |\n| 전문가 프로필 | 학력, 경력, 저서, 해외거주 경험, 증빙 파일 | 전문가 프로필 |\n| 카테고리 | 대/중/소분류, 사용 여부, 정렬 순서 | 카테고리 관리, 창작작업실, 메타-T 번역 |\n| 양식 | 사용자가 입력할 폼 구조와 안내 문구 | 양식관리, 창작작업실 |\n| 템플릿 | 반복 사용 가능한 양식 묶음 또는 추천 서식 | 템플릿 양식 관리자, 추천 서식 |\n| AI 엔진 | ChatGPT, Gemini, wrtn., 기타 AI | 창작작업실, 메타-T 번역 |\n| 작업 요청 | 파일/텍스트 입력, 번역/분석/작성 요청, 후면 작업 옵션 | 창작작업실, 메타-T 번역 |\n| 번역 결과 | 원문, AI 번역, 비교 번역, 에디터 수정본 | 번역/편집 작업 화면 |\n| 장바구니 항목 | 작업명, 파일, 언어쌍, 옵션, 가격 | 장바구니, 결제 |\n| 결제 | 결제수단, 포인트, 구독, 전문가 견적 | 장바구니, 결제 |\n| 시험 | 시험명, 일정, 등급, 카테고리, 문제 유형 | 시험관리 |\n| 문제 | 프롬프트형, 단답형, 평가 기준, 답변 예시 | 출제관리 |\n| 자격증 | 합격자, 자격증 번호, 발급 상태 | 자격증관리 |\n\n## 9. 사용자 플로우\n\n### 9.1 창작작업실 참고 플로우\n\n1. 사용자가 작업형 화면에 진입한다고 가정한다.\n2. 작업 유형을 선택한다. 예: Youtube, 문서, 리서치&분석.\n3. 카테고리를 선택한다. 예: 법률 > 국내 법률 > 고소장.\n4. 사용할 AI를 선택한다.\n5. 파일 또는 텍스트를 입력한다.\n6. 필요하면 검수 요청, 고급전문가, 긴급 작업을 선택한다.\n7. 추천 서식을 선택하거나 직접 입력한다.\n8. 임시저장, 장바구니 담기, 적용 중 하나를 선택한다.\n9. 결과 편집이 필요한 경우 번역/편집 작업 화면으로 이동한다.\n10. 작업 완료 후 장바구니 또는 결제로 이동한다.\n\n### 9.2 메타-T 번역 플로우\n\n1. 사용자가 메타-T 번역에 진입한다.\n2. 번역 유형을 선택한다. 예: 문서번역.\n3. 번역 목적을 선택한다. 예: 큐레이터.\n4. 출발어와 도착어를 선택한다.\n5. 사용할 AI 번역기를 선택한다.\n6. 파일 또는 텍스트를 입력한다.\n7. AI 번역 결과와 비교 번역 결과를 확인한다.\n8. 에디터에서 최종 번역문을 수정한다.\n9. 저장, 결제, 적용을 수행한다.\n\n### 9.3 양식관리와 작업형 참고 화면 연결 플로우\n\n1. 관리자가 카테고리와 양식을 등록한다.\n2. 관리자가 양식에 사용할 AI, 입력 필드, 추천 서식, 검수 옵션을 설정한다.\n3. 사용자가 작업형 화면에서 해당 카테고리나 양식을 선택한다고 가정한다.\n4. 좌측 설정 패널과 우측 입력 영역이 관리자 설정값에 맞춰 표시되는 구조를 참고한다.\n5. 사용자가 입력한 작업은 AI 처리, 전문가 검수, 번역/편집, 결제 흐름으로 이어진다.\n\n이 플로우가 `Group 758531575.jpg`에서 연결선으로 설명된 핵심 내용이다.\n\n## 10. 구현 시 우선순위\n\n| 우선순위 | 기능 | 이유 |\n|---:|---|---|\n| 1 | 공통 레이아웃 | 사용자/관리자/전문가 화면이 상단 메뉴와 좌측 아이콘 구조를 공유한다. |\n| 2 | 카테고리 관리 | 창작작업실, 메타-T 번역, 양식관리, 시험관리에서 공통으로 쓰인다. |\n| 3 | 양식관리 | 2025 신규 기능의 중심이며 사용자 화면을 구성하는 근거가 된다. |\n| 4 | 창작작업실 참고 UX | 일반 사용자 작업 화면을 설계할 때 참고할 수 있는 레이아웃이다. |\n| 5 | 메타-T 번역 참고 UX | 번역/편집 화면을 설계할 때 참고할 수 있는 구체적인 레이아웃이다. |\n| 6 | 장바구니/결제 | 유료 작업, 포인트, 구독, 전문가 견적과 연결된다. |\n| 7 | 전문가 출제 화면 | 기존 시험 플랫폼 업무와 연결되는 전문 영역이다. |\n| 8 | 관리자 회원/시험/자격증 | 기존 IA와 겹치는 운영 기능이므로 공통 패턴을 재사용한다. |\n\n## 11. 확인이 필요한 미정 항목\n\n| 항목 | 확인 필요 내용 |\n|---|---|\n| 창작작업실의 성격 | 실제 구현 대상인지, UX/UI 참고 자료인지 확정 필요. 현재 해석은 참고 자료에 가깝다. |\n| 양식과 템플릿의 차이 | 양식은 입력 폼, 템플릿은 추천/상품화된 양식으로 보이나 정책 확정 필요 |\n| 가격 계산 방식 | 글자 수, 번역기 수, 에디팅, 긴급, 검수 옵션별 과금 규칙 확인 필요 |\n| AI 엔진별 결과 저장 | 각 엔진 결과를 모두 저장할지 최종 결과만 저장할지 확인 필요 |\n| 전문가 검수 흐름 | 검수 요청 후 전문가 배정, 견적, 결제, 결과 전달 절차 확인 필요 |\n| 파일 업로드 제한 | 파일 형식, 용량, 개수, 보안 검사 정책 확인 필요 |\n| 관리자 대시보드 지표 | 실제 운영 KPI와 표시 우선순위 확인 필요 |\n\n## 12. 요약\n\n2025 구성은 \"시험 플랫폼 운영 시스템\" 위에 적용할 수 있는 UX/UI 참고 자료와 일부 관리자/전문가 화면을 포함한다. 특히 창작작업실과 메타-T 번역은 현재 기준에서 핵심 구현 기능이라기보다, 사용자 작업 화면과 번역/편집 화면의 참고 레이아웃으로 보는 것이 안전하다.\n\n`Group 758531575.jpg`는 이 연결 구조를 설명하는 자료다. 따라서 별도 화면으로 구현하지 않고, 양식관리와 작업형 참고 화면, 번역/편집 패널 간 연결 관계를 설명하는 근거로 문서화해야 한다.\n\n## 13. UX/UI 관점 보완\n\n2025 화면은 2024의 시험 운영 화면보다 사용자가 직접 작업물을 만드는 성격이 강하다. 따라서 단순 관리자 테이블보다 “입력 → AI 처리 → 결과 확인 → 수정 → 저장/결제” 흐름이 자연스럽게 이어져야 한다.\n\n| 영역 | UX/UI 핵심 |\n|---|---|\n| 창작작업실 참고 화면 | 작업 유형, 카테고리, AI, 파일/텍스트 입력, 옵션을 순서대로 배치하는 UX/UI 참고 자료로 활용한다. |\n| 메타-T 번역 | 원문, AI 번역 결과, 에디터 수정본을 비교하기 쉽게 배치해야 한다. |\n| 양식관리 | 관리자가 만든 양식이 사용자 화면에 어떻게 보일지 미리보기로 확인할 수 있어야 한다. |\n| 템플릿 양식 관리자 | 템플릿이 어떤 카테고리와 작업 유형에 쓰이는지 명확히 표시해야 한다. |\n| 장바구니/결제 | 작업 옵션이 가격에 어떻게 반영되는지 사용자가 이해해야 한다. |\n\n### 13.1 창작작업실 참고 화면 설계 기준\n\n| 화면 요소 | 권장 설계 |\n|---|---|\n| 작업 유형 탭 | Youtube, 문서, 리서치&분석 등은 상단 탭으로 제공하되 선택된 탭을 명확히 표시한다. |\n| 카테고리 선택 | 대/중/소분류가 길어질 수 있으므로 단계형 선택 또는 검색형 셀렉트를 사용한다. |\n| AI 선택 | 여러 AI를 동시에 비교할 수 있는지, 하나만 선택하는지 정책을 명확히 한다. |\n| 파일 입력 | 업로드 가능 형식, 용량, 처리 상태, 실패 사유를 바로 보여준다. |\n| 옵션 | 긴급, 전문가 검수, 고급전문가 같은 비용 발생 옵션은 가격 영향과 함께 표시한다. |\n| 실행 버튼 | `임시저장`, `장바구니`, `적용`의 차이를 사용자가 이해할 수 있도록 버튼 위치와 문구를 구분한다. |\n\n### 13.2 번역/편집 UX\n\n| 항목 | 권장 방식 |\n|---|---|\n| 원문/번역문 | 좌우 또는 상하 분할로 비교 가능하게 배치한다. |\n| AI별 결과 | ChatGPT, Gemini 등 AI별 결과를 탭이나 카드로 구분한다. |\n| 최종 편집본 | 사용자가 수정한 최종본은 별도 저장 영역으로 분리한다. |\n| 변경 이력 | 원문, AI 결과, 사용자 수정본의 차이를 추적할 수 있어야 한다. |\n| 저장/결제 | 결과를 저장하는 행동과 결제로 넘어가는 행동을 분리한다. |\n\n### 13.3 관리자 UX\n\n2025 관리자 화면은 기존 시험 운영과 신규 AI 서비스 설정이 섞인다. 관리자가 헷갈리지 않도록 메뉴를 다음처럼 분리하는 것이 좋다.\n\n| 메뉴 그룹 | 포함 기능 |\n|---|---|\n| 서비스 설정 | 카테고리, 양식관리, 템플릿 양식 관리자 |\n| 시험 운영 | 시험관리, 자격증관리, 출제/채점 관리 |\n| 사용자 운영 | 회원관리, 전문가 프로필 |\n| 판매/결제 | 장바구니, 결제, 요금제, 포인트 |\n| 콘텐츠 운영 | 메인 화면, 추천 서식, 안내 문구 |\n\n### 13.4 빈 상태와 오류 상태\n\n| 상태 | 필요한 안내 |\n|---|---|\n| 파일 없음 | `파일을 업로드하거나 텍스트를 입력하세요.` |\n| 파일 형식 오류 | 허용 파일 형식과 최대 용량을 표시한다. |\n| AI 처리 실패 | 재시도 버튼과 실패 사유를 제공한다. |\n| 결과 없음 | 입력 조건을 다시 확인하도록 안내한다. |\n| 결제 전 | 선택한 옵션과 예상 금액을 다시 확인시킨다. |\n"
